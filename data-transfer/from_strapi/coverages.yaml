    source: DELFI
    url: >-
        http://www.delfi.ee/news/paevauudised/eesti/kaja-kallas-ei-jata-jurgen-ligi-teravustele-vastamata-jurgen-ma-kain-sulle-vist-koletul-kombel-narvidele?id=72391441
    content: >-
        "Kaja Kallase käes muutub ikka kõik kullaks, kui on vaja kehvasti öelda
        erakonna kohta, mille aseesimees ta on," kirjutas Ligi saate järel
        sotsiaalmeedias. Ta lisas katke Kaja Kallase kirjavahetuse
        erakonnakaaslastele, kus Kallas avaldas arvamust Tallinna Sadama
        korruptsiooniskandaaliga seotud Allan Kiili väljaviskamist erakonnast.
        "Seni kuni kehtib süütuse presumptsioon, tundub inimese põhiõigusi
        arvestades vale ta ilma süüdimõistva kohtuotsuseta välja arvata," oli
        Kallase seisukoht. Ligi lisas postituses, et reedel räägiti
        Reformierakonna juhatuse koosolekul asjast sedagi, et otsesed ja kaudsed
        (varad, elustiil) tõendid ei jäta Kiili juriidiliseski vastutuses
        erilist kahtlust, et nõukogu on tagasi astunud, ning majandusminister
        tutvustas riigiettevõttete juhtimise reformi.
