    description_et: >-
        M. Casey Rehm on disaini ja algoritmilise konsultatsioonifirma Kinch
        asutaja. Nende projektid varieeruvad arhitektuurse disaini,
        interaktiivse meedia, robot-tarkvara arendamise, informatsiooni
        visualiseerimise ja algoritmilise konsultatsiooni vahel. Hetkel on
        stuudio töö suunatud tehisintellekti agentide väljatöötamisele, mille
        eesmärk on vahendada ja tugevdada suhteid digitaalse, analoogse ja
        inimese vahel. M. Casey Rehm on õppinud Columbia ülikooli MSAAD
        programmis (lõpetanud 2009) ja Carnige Mellon ülioolis (lõpetanud 2005).
        Enne Kinch’i avamist praktiseeris ta üle kümne aasta arhitektina New
        Yorgis, Los Angeleses, Berliinis ja Londonis. Hetkel juhendab ta
        disainistuudiot ja seminare arhitektuurist, programmeerimisest ja
        robootikast SCI-Arc ülikoolis Los Angeleses.  


        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikuid, kriitikuid ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile.
    description_en: >-
        M. Casey Rehm founded Kinch as a design and algorithmic consulting
        studio. The office’s work spans architectural design, interactive media,
        robotic software development, data visualization and algorithmic
        consulting. The studio currently focuses on projects driven by the use
        of non-human intelligent agents to mediate and amplify the relationship
        between the digital, analog, and the human. M. Casey Rehm received a
        MSAAD from Columbia University in 2009 and his BARCH from Carnegie
        Mellon University in 2005. He has over 10 years of architectural
        experience, working for firms in New York, Los Angeles, Berlin, and
        London prior to opening Kinch. Currently he teaches design studios and
        seminars in architecture, programming and robotics in design at SCI-Arc
        in Los Angeles.  


        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment.
