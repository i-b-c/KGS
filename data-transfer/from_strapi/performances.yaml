    description_et: >-
        Kanuti Gildi SAAL alustab oma 16. hooaega avaüritusega Vertikaalstart.
        Õhtul astuvad üles kunstnikud ja residendid, kes heidavad valgust oma
        ideedele, mille kallal nad hakkavad hooaja jooksul Kanuti Gildi SAALis
        töötama. Kõik huvilised ja sõbrad nii kaugelt kui lähedalt on
        teretulnud.


        Järgmisel hooajal on Kanuti Gildi SAALis:


        Emer Värk, Karl Saks, Hendrik Kaljujärv, Maria Arusoo / NU Performance
        Festival, Kristian Smeds, WAUHAUS, Marit Sirgmets, Henri Hütt & Mihkel
        Ilus, Iggy Lond Malmborg, Raho Aadla, Kädi Metsoja, Rene Köster, Mart
        Soo & Taavi Kerikmäe / Improtest, Annika Üprus / SAAL Biennaal, Joanna
        Kalm,  Nele Suisalu & Maarja Tõnisson, Karolin Poska, Kinoteater, made
        in estonia maraton, Sille Pihlak & Siim Tuksam / EKA
        arhitektuuriteaduskonna avatud loengute sari  jt.


        Kanuti Gildi SAAL alustab oma 16. hooaega, mis koosneb esietendustest,
        mille hulka kuuluvad Kanuti Gildi SAALi kaasproduktsioonid nii meilt kui
        mujalt, külalisetendustest ja juba traditsioonilistest sarjadest nagu
        kontsertsari Improtest, EKA arhitektuuriloengud ning residentuuridest ja
        muudest uuringulistest projektidest. Selle hooaja sisse jäävad ka
        festivalid - NU Performance Festival oktoobris-novembris Maria Arusoo
        kureerituna, lühivormide festival made in estonia maraton märtsis ning
        augustis tuleb taas SAAL Biennaal, sel korral Annika Üpruse käe all.


        Kanuti Gildi SAALi hooaeg on ikka olnud erinevustest koosnev tervik,
        mitte ühtne objekt või üritus. Meie roll on pigem luua riskivaba tsoon,
        kus kunstnik saab tegutseda piiranguteta, kus lavastus poleks ainsaks
        kunstiteose vormiks. Seda hetkel, mil näib, et kogu maailm otsib kunsti
        ja kunstniku rolli uues muutunud maailmas. Nüüd tasub tähelepanu pöörata
        teistele kunstiloome vormidele - residentuuridele ja muudele sisulistele
        tegevustele, mis võivad jääda esialgu avalikkuse ees ebaselgeteks või
        varjatumateks. Need on tegevused, mis ei pruugi olla otseselt seotud
        järgmise kunstiprodukti loomise ehk rutiinse vormi kordamisega vaid on
        pigem alles protsessis olevad mõttekäigud, mistõttu pole esialgu teada,
        kuhu need välja viia võivad. Kanuti Gildi SAALis kogetav on ümbritsevat
        ja ennast aksepteeriv kuid samas ka küsimuse alla seadev. See on
        ebamugav. Me räägime haprusest, mis meid hetkel ümbritseb ning mida
        kunstnikud ja ka meie ei pruugi õrnalt ja delikaatselt uurida. Tundub,
        et me kõik oleme maailmas jõudnud punkti, kus me ei tea vastuseid. Aga
        me oleme valmis neid otsima ja samas küsimuse alla seadma iga vastuse
        mis meie teele ette tuleb. Kanuti Gildi SAAL, meie kunstnikud ning
        publik ei taha probleeme ignoreerida vaid julgeda nendest rääkida ja
        neid uurida. Olla dialoogis, suhelda ja arutleda.
    description_en: >-
        Kanuti Gildi SAAL starts its new 16th season with the opening event
        Vertikaalstart. New season is introduced together with the artists,
        residents and guests, who will shed some light to their ideas that will
        keep them busy during the upcoming season at Kanuti Gildi SAAL. All
        visitors and friends from here and there are more than welcome. <br />

        <br />

        The upcoming season at Kanuti Gildi SAAL:<br />

        Emer Värk, Karl Saks, Hendrik Kaljujärv, Maria Arusoo / NU Performance
        Festival, Kristian Smeds, WAUHAUS, Marit Sirgmets, Henri Hütt & Mihkel
        Ilus, Iggy Lond Malmborg, Raho Aadla, Kädi Metsoja, Rene Köster, Mart
        Soo & Taavi Kerikmäe / Improtest, Annika Üprus / SAAL Biennaal, Joanna
        Kalm,  Nele Suisalu & Maarja Tõnisson, Karolin Poska, Kinoteater, made
        in estonia maraton, Sille Pihlak & Siim Tuksam / Open Lecture Series of
        Faculty of Architecture of the Estonian Academy of Arts jt.<br />

        <br />

        Kanuti Gildi SAAL starts its new 16th season, that consists premieres,
        Kanuti Gildi SAAL local and international co-productions, guest
        performances, traditional event series  such as Improtest concerts and
        Estonian Academy of Arts open architecture lectures as well as
        residencies and other research projects. This season encloses also
        festivals - NU Performance Festival in October-November curated by Maria
        Arusoo, made in estonia maraton in march and SAAL Biennaal in August
        curated by Annika Üprus.<br />

        <br />

        The complete whole of season in Kanuti Gildi SAAL has always been
        constituted of differences not a  unified whole or event. Our role is
        rather to create a risk-free zone for artists to operate without limits,
        where premiering a performance is not the only form of creating art.
        This in times when it seems the whole world is looking for the new role
        of art and artists in our transmuting world. This is the moment to pay
        attention to the other forms of creating art - residencies and other
        content based activities that can stay for the time being unclear or
        hidden for wider audiences. These activities may not be related with
        creating the next piece of art as in not repeating the existing
        routines, but instead are thoughts that still take form and hence it is
        yet unclear where they might lead us. The experiences that Kanuti Gildi
        SAAL offers acknowledge ourselves and surroundings, but simultaneously
        question them. This is uncomfortable. We are speaking of fragility that 
        surrounds us at the moment, that artists and we are studying, even if
        not in the most delicate way. Seems we all have reached in point in this
        world where we do not know the answers, but we are ready and up to look
        for them while staying critical. Kanuti Gildi SAAL, our artists and
        audience do not want to ignore the problems, but have the courage to
        speak and study them. To be in dialogue, communicate and discuss.
