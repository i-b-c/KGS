        **Evening tickets 10 EUR**:<br />

        Evening tickets for the performance nights in Kanuti Gildi SAAL are on
        presale at Piletilevi and half an hour before at the door.<br />

        <br />

        Tickets to the concert on November 1 in Punane Maja with Peaches, Black
        Cracker, DJ Maria Minerva are on presale at Piletilevi - 20 EUR till
        October 26; 25 EUR from October 27 and 30 EUR on November 1 as well as
        at the door.<br />

        <br />

        “NU Performance Festival meets MÜRK” on November 4 in Punane Maja with
        Huoratron / Last Gang Records, Emer Värk & Renzo van Steenbergen, MÜRK
        DJs event tickets 10 EUR on presale at Piletilevi and at the door.<br />

        <br />

        **Festival pass: 35 EUR**<br />

        NU Performance Festival pass includes 7 performance evenings at Kanuti
        Gildi SAAL and event “NU Performance Festival meets MÜRK” at Punane Maja
        on November 4. Please choose the date for Dana Michel’s “Mercurial
        George” (October 29 at 19:30 or October 30 at 17:00)<br />

