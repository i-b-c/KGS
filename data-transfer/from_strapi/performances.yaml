    description_et: >-
        Nanna Nordström ja Gideonsson Londré “The Thin Man: chapter I ja II"


        Selles *performance*’is käsitlevad Nanna Nordström ja Gideonsson Londré
        vertikaalset kui uut mõtte- ja tegutsemislaadi. Koreografeeritud jadas
        on esemed, mida lohistatakse ja esitletakse ning tõstetakse
        horisontaalsest seisundist välja.<br /> 

        <br /> 

        Paberipress, kapsapea, toru, mida hoidab koos savist vorst,
        tualetitaburet ja paar kingi lebavad viiel erineval kummiribal.  <br /> 

        Esineja astub kummiribasse ja hakkab seda aeglaselt üle põranda
        lohistama, venitades seda samal ajal välja eseme raskusega. Kummiriba ja
        eset esitletakse ühtlasi vertikaalselt peeglis, mis on raamatu („The
        Thin Man“) abil esineja seljale kinnitatud. <br /> 

        Esineja sammub ruumi vastasseina juurde, kus ta põlvitab nii, et
        kummiribal lebavat eset näidatakse peeglist. Mõne aja pärast jätab ta
        kummiriba maha ja läheb uue eseme järele. Kui kõik ribad on ära
        lohistatud, välja venitatud ja vaatamiseks välja pandud, riputab ta
        peegli vastasseinale, kasutades selle toetamiseks taas raamatut, nii et
        peeglist on näha põrandal lebavad esemed. <br /> 

        <br /> 

        Tehislike struktureeritud olukordade kaudu käsitleb kunstnikepaar
        **GIDEONSSON/LONDRÉ** tegutsemise ja töötamise erinevaid tahke nii
        üksikisiku kui ka kollektiivi seisukohast. Nad tegelevad
        performance’ite, installatsioonide ja interventsioonidega, mis koosnevad
        mitmesugustest äärmiselt struktureeritud argitegevustest, mille tõttu on
        sageli raske teha vahet töö- ja puhkeajal.
    description_en: >-
        Nanna Nordström ja Gideonsson Londré “The Thin Man: chapter I and II" 


        In this collaborative performance, Nanna Nordström and Gideonsson Londré
        explore ‘the vertical’ as a new way of thinking and acting. In a
        choreographed sequence, objects are dragged and displayed, lifted from
        their horizontal state.<br /> 

        <br /> 

        A paper press, a cabbage head, a tube held together by a clay sausage, a
        toilet stool and a pair of shoes lies on five different latex sheets. 
        <br /> 

        The performer steps into the latex and starts to slowly drag it across
        the floor, stretching it by the weight of the object. The latex and the
        object are also displayed vertically in a mirror balanced on the
        performers back, with the help of a book (The Thin Man).<br />  

        The performer walks to the opposing wall of the space, where he kneels
        down, displaying the object on the latex in the mirror. After a while he
        leaves the latex and walks back to get the next one. When all the latex
        sheets are dragged, stretched and displayed, he hangs the mirror on the
        opposite wall, balancing it once again with the book, mirroring the
        objects on the floor.<br /> 

        <br /> 

        Through created structured situations the artist duo
        **GIDEONSSON/LONDRÉ** investigate different aspects of acting and
        working from both an individual and a collective point of view. Their
        practice involves performances, installations and interventions that
        consist of different forms of highly structured everyday activities,
        which often complicates the line between work and leisure.
