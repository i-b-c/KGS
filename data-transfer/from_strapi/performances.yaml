    description_et: >-
        MDLSX näol on tegemist plahvatusliku helikujundiga, see on psühhedeelne
        ja üksildane hümn kujunemisvabadusele, genderblendingule (sugude
        binaarsuse painutamisele/lõhkumisele), vabadusele murda välja keha,
        nahavärvi ja genitaalide poolt ette määratud raamidest, julgusele
        erineda indiviidina omandatud või kehtestatud rahvustundest ning
        jäägituna kuulumisest ühele ja ainsale isamaale. Oma raamatus
        „Eurooplaseks kujunemine“ käsitles Rosi Braidotti „kultuurilise
        identiteedi mitmesuse teooriat ja indiviidi avatust sellele“, tekst, mis
        viitab post-rahvusliku identiteedi loomisele...  


        MDLSX üritab minna kategooriatest kaugemale – ka kunstivaldkonnas.
        Tegemist on Silvia Calderoni rännakuga, kes peale kümmet aastat Motuse
        liikmena eksperimenteerib DJ/VJ formaadiga, astudes pulti ning viies
        vaataja piiride kompamise avastusretkele. Autobiograafilised aspektid
        põimuvad kirjanduslike seostega ja selle tulemusel võngub MDLSX
        reaalsuse ja fiktsiooni piire hägustades Judith Butleri raamatute
        “Gender Troubles” teooriatest “Undoing Gender” sõnumiteni. Etenduses
        tsiteeritakse Judith Butlerilt ja Donna Haraway ning Paul B. Preciado
        kirjatükke - “A cyborg Manifesto” ja “Manifeste Contra-sexuel”, lisaks
        täiendavad monsteretenduse taustamustreid viited teistele queer
        kultuuriruumi nähtustele.   


        Vajadus muutuste järele on nii põhjapanev, et seda on võimatu sõnades
        edasi anda. Niivõrd sügav, et seda on raske ette kujutada. Aga võimatu
        on realiseerumas ja mõeldamatu tulemas... („Feminism pole humanism“ 
        Paul B. Preciado)  


        Eelmise sajandi üheksakümnendatel jõuliselt esile kerkinud, Enrico
        Casagrande ja Daniela Nicolò poolt asutatud trupp Motus on kahekümne
        viie aasta jooksul vaatajateni toonud mitmeid füüsiliselt ja
        emotsionaalset sügavuti minevaid teoseid ning ette tunnetanud ning
        kajastanud ühiskonnas tugevaid vastuolusid tekitavaid teemasid. Läbi
        aastate on trupp loonud etendusi, lavastusi, installatsioone ja videoid,
        läbi viinud seminare ja töötubasid ning osalenud interdistsiplinaarsetel
        festivalidel. Trupp on saanud mitme tunnustuse osaliseks, kaasa arvatud
        kolm UBU auhinda, lisaks on neid pärjatud mainekate eriauhindadega. 

        Vabamõtlejatena on Motus üles astunud mitmel pool maailmas ning esinenud
        järgmiste festivalide raames: New Yorgi „Under the Radar“, Montreali
        „Festival Trans Amériques“, Buenos Airese „Fiba Festival“, „Santiago a
        Mil“ Tšiilis, „Adelaide Festival“ Austraalias ning „Taipei Arts
        Festival“ Taiwanis, lisaks on trupp osa võtnud arvukatest Euroopa
        teatrifestivalidest.  

        Trupi väsimatu protagonist Silvia Calderoni on Motuse koosseisus tegev
        2005. aastast. Silviat on pärjatud mitmete auhindadega, muuhulgas UBU
        Prize parima Itaalia naisnäitleja auhinnaga ning Elizabeth Turroni,
        Marte ja Virginia Reiter auhinnaga.   


        [www.motusonline.com/](http://www.motusonline.com)
    description_en: >-
        MDLSX is an explosive sound device, a lysergic and solitary hymn to the
        freedom of becoming, to gender b(l)ending, to being other than the
        borders of the body, skin colour, sexual organs, being other than an
        imposed or acquired nationality, a belonging to a Fatherland. Rosi
        Braidotti in “On Becoming Europeans” talked of “an open belonging to
        Multiplicities”, a text that suggests a post-nationalist identity... And
        MDLSX aims at going beyond categories – the artistic ones, too. It is
        Silvia Calderoni’s road trip, who – after 10 years with Motus –
        experiments a Dj/Vj Set like format, in order to start an exploration
        around borders. Autobiographical bits and literary evocations come
        together, and MDLSX, by blurring fiction and reality, swings from Gender
        Trouble to Undoing Gender. We quote Judith Butler who, with Donna
        Haraway’s A cyborg Manifesto, Paul B. Preciado’s Manifeste Contra-sexuel
        and other bits of the kaleidoscopic universe of Queer, weaves the
        background of this “Monster-Performance”.   


        The change needed is so profound that it is impossible to say. So deep
        that says it is unimaginable. But the impossible is to come. And the
        unthinkable is due... (“Feminism is not a humanism”, Paul B.
        Preciado)   


        The company Motus founded by Enrico Casagrande and Daniela Nicolò
        celebrates its twenty-fifth anniversary, an important one for this group
        that burst onto the scene in the nineties with productions wielding
        great physical and emotional impact and has always anticipated and
        portrayed some of the harshest contradictions of the present day.
        Throughout the years, the group has created theatre shows, performances,
        installations and videos, conducted seminars and workshops, taken part
        in interdisciplinary festivals. They’ve received numerous
        acknowledgements, including three UBU Prizes and prestigious special
        awards for their work. Freethinkers, Motus have performed all over the
        world, from Under the Radar in New York, to Festival Trans Amériques in
        Montreal, Santiago a Mil (Chile), the Fiba Festival in Buenos Aires,
        Adelaide Festival in Australia or Taipei Arts Festival in Taiwan, as
        well as all over Europe. 

        Silvia Calderoni – their tireless protagonist – has worked with Motus
        since 2005 and is the winner of many awards that include “Best Italian
        Actress” honors UBU Prize, Elizabeth Turroni, Marte and Virginia Reiter
        Awards.   


        [www.motusonline.com/](http://www.motusonline.com)
