    description_et: >
        <!-- Toimetatud 09.09.16 --><strong>Moving in November Festival meets NU
        Performance Festival 2016.</strong><br />

        <br />

        Viimasest asjast jäi küünte alla ainult pisut mulda. Nüüd kahlan
        antropoloogilistel eelkaevamistel läbi karvadega segunenud kiviprügi.
        Nii palju kiviprahti! Ei oleks osanud ette näha, kui palju kiviprahti
        tuleb ja kui palju tööd selle eluka äratamisega enda jaoks tekitan. Aga
        äratamist oli vaja. Olen näinud silmi ning käin nüüd ringiratast
        hüpeldes ringi, õrnalt jäsemeid tõstes ja tema lõhna ninna tõmmates.
        Milline on kellegi ülekülluse lõhn, keda oled terve elu vältinud? Mida
        teha kehaga? Järjekordne teaduseksperiment. Järjekordne polügoon, kus
        katsetada mulle kuuluvaid nahku, riietuse komplekte ja ideid, mis on
        võib-olla peale surutud või ka mitte.<br />

        (Dana Michel)<br />

        <br />

        <strong>Dana Michel</strong> on koreograaf ja etenduskunstnik. Enne
        Concordia Ülikooli lõpetamist kaunite kunstide bakalaureusekraadiga
        kaasaegse tantsukunsti alal, kui ta oli 20. eluaastates, tegutses ta
        turundusjuhi ning jooksja ja jalgpallurina, osaledes ka võistlustel.
        2011. aastal sai ta danceWEBi stipendiumi Viini ja on hetkel resideeruv
        kunstnik tantsukompaniis DanceMakers (Toronto) ning loomekeskuses Usine
        C (Montréal).<br />

        Tema kunstipraksis, milles sulanduvad koreograafia, intuitiivne
        improvisatsioon ja etenduskunst, on juurtega kinni identiteedi kui
        korrastamata kordsuse uurimises. Tema töövahenditeks on arusaamad
        performatiivsest alkeemiast ja postkultuurilisest juhuslikust
        materjalist – ta kasutab elavhetki, esemete omastamist, isiklikku
        minevikku, tulevasi soove ning praegusi mõttesuundi, et luua enda ja
        pealtnägijate vahele empaatiale toetuv elamuste tsentrifuug.<br />

        <br />

        Idee ja esitus: <strong>Dana Michel</strong><br />

        Valguskunstnik ja tehniline režii: <strong>Karine Gauthier</strong><br
        />

        Artistic activators: <strong>Martin Bélanger, Peter James, Mathieu
        Léger, Roscoe Michel, Yoan Sorin</strong><br />

        Helikonsultant: <strong>David Drury</strong><br />

        Produkstioon: <strong>Dana Michel</strong><br />

        Produtsent: <strong>Marie-Andrée Gougeon </strong>(Daniel Léveillé
        Danse)<br />

        Kaasproduktsioon: Festival TransAmériques (Montréal), Tanz im August
        (Berliin), CDC Atelier de Paris-Carolyn Carlson (Pariis), ImPulsTanz
        (Viin), Chapter (Cardiff)<br />

        Loomeresidentuurid: Usine C (Montréal), Dancemakers (Toronto),
        ImPulsTanz, Actoral/La Friche Belle de Mai (Marseille), WOOP
        (Douamenez), CDC Atelier de Paris-Carolyn Carlson, M.A.I. (Montréal)<br
        />

        Projekti on toetanud: Conseil des Arts et des Lettres du Québec, Conseil
        des arts du Canada<br />

        Esietendus: 02.06.2016, Festival TransAmérique, Montréal<br />

        Kestus: 60`<br />

        <br />

        NB! Etenduses kasutatakse strobo valgust!<br />

        <br />

        29. oktoobri etendusele järgneb vestlus kunstnikuga.<br />
    description_en: >-
        <!-- Toimetatud 09.09.16 --><strong>Moving in November Festival meets NU
        Performance Festival 2016.</strong><br />

        <br />

        I only just got a bit of dirt under the nails with the last thing. Now
        wading through the hairy rubble of a preliminary anthropological dig. So
        much debris! I couldn’t have predicted how much debris there would be
        and how much work I had created for myself in waking this beast. But
        they needed waking. I have seen the eyes and I’m circling, skipping,
        daintily lifting limbs and sniffing its scent. What is the smell of a
        plethora of someone that you have been avoiding your whole life? What do
        you do with the body? This is another science experiment. This is
        another ground on which to test skins that belong to me, outfits and
        ideas that may or may not have been imposed. (Dana Michel)<br />

        <br />

        <strong>Dana Michel</strong> is a choreographer and performer. Before
        obtaining a BFA in Contemporary Dance at Concordia University in her
        late twenties, she was a marketing executive, competitive runner and
        football player. She is a 2011 danceWEB scholar (Vienna) and is
        currently an artist-in-residence at DanceMakers (Toronto) and at Usine C
        (Montreal). An amalgam of choreography, intuitive improvisation and
        performance art, her artistic practice is rooted in exploring identity
        as disordered multiplicity. She works with notions of performative
        alchemy and post-cultural bricolage – using live moments, object
        appropriation, personal history, future desires and current
        preoccupations to create an empathetic centrifuge of experience between
        her and her witnesses.<br />

        <a
        href="http://www.danielleveilledanse.org">www.danielleveilledanse.org</a><br
        />

        <br />

        Conceived and performed by: <strong>Dana Michel</strong><br />

        Lighting design, technical direction: <strong>Karine
        Gauthier</strong><br />

        Artistic activators: <strong>Martin Bélanger, Peter James, Mathieu
        Léger, Roscoe Michel, Yoan Sorin</strong><br />

        Helikonsultant: <strong>David Drury</strong><br />

        Production: <strong>Dana Michel</strong><br />

        Producer: <strong>Marie-Andrée Gougeon</strong> (Daniel Léveillé
        Danse)<br />

        Coproduction: Festival TransAmériques (Montréal), Tanz im August
        (Berlin), CDC Atelier de Paris-Carolyn Carlson (Paris), ImPulsTanz
        (Vienna), Chapter (Cardiff)<br />

        Creative residencies: Usine C (Montréal), Dancemakers (Toronto),
        ImPulsTanz, Actoral/La Friche Belle de Mai (Marseille), WOOP
        (Douamenez), CDC Atelier de Paris-Carolyn Carlson, M.A.I. (Montréal)<br
        />

        With the support of: Conseil des Arts et des Lettres du Québec, Conseil
        des arts du Canada<br />

        Premiere: 02.06.2016, Festival TransAmérique, Montréal<br />

        Duration: 60`<br />

        <br />

        Dana Michel receives administrative/development support from Daniel
        Léveillé danse company (Montreal, Canada) as part of its sponsorship
        project.<br />

        <br />

        Dana Michel “Mercurial George” performances are part of NU Performance
        Festival and Moving in November Festival (Helsinki).<br />

        <br />

        NB! Stroboscope light effect used during the performance!<br />

        <br />

        NB!The performance on October 29 will be followed by artist talk.
