    description_et: >-
        FOMO — hirm jääda ilma. See on sotsiaalse ärevuse üks vormidest, mis
        avaldub pidevas muretsemises selle pärast, et millestki olulisest
        jäädakse ilma.  
          
        Inimkontakti puudumine. Näed kõike. Silmad on kinni. Näilisus.
        Eeldamine.   
          
        Fomo otsib vastust küsimustele - mida teeb ja tekitab FOMO inimese kehas
        ja mõistuses; kuidas ja kus see väljendub? Lavastus on uurimus, mille
        üheks eesmärgiks on vaadelda 24 tunni möödudes kahe etenduskorra
        erinevust, mida mõjutab unetus, informatsioon ja lisaülesanded.  
          
        “Pigem teistega koos sotsiaalmeedia-maailmas; kui üksinda
        pärismaailmas.”   
          
        Kaisa Kattai on noor tantsukunstnik ja tantsija, kes on õppinud
        moderntantsu Taanis, loomemajandust EBSis ja hetkel lõpetamas TLÜ
        koreograafia eriala. Kaisa on õpetaja mitmes Eesti tantsustuudios ning
        täiendab ennast erinevates töötubades siin ja välismaal. Alates 2018.
        aastast on Kaisa osa HTF’i meeskonnast. Sama suve lõpus tõi ta koju I
        koha BATTLEJÄMM 2018 experimental performance`i kategoorias. Lisaks on
        ta avaldanud mitmeid mõtteid tantsust Eesti maastikul; kureeris
        Sõltumatu Tantsu Lava selle hooaja esimest Greenfieldi ja on pidevalt
        tegevuses erinevate projektidega. 2017. aastal tõi Kaisa koostöös Keithy
        Kuuspuga välja esimese lavastuse “Palun”, mis küsitles ja uuris
        erinevaid tantsukunsti vorme. Sama etendust esitati ka Hiiumaa
        Tantsufestivalil ja 2019. aasta kevadel Leedu Muusika- ja
        Teatriakadeemia teatripäevade raames Vilniuses. 2018. sügisel pärjati
        tema kirjutatud tantsufilm (koostöös Keithy Kuuspu ja Samuel Koppeliga)
        Summer Media Studio (Leedus) parima filmi auhinnaga.  
          
        Tegemist on Kaisa Kattai koreograafia eriala BA diplomitööga. Lavastus
        kuulub KorFest 2019 programmi. Lavastuse parimaks mõistmiseks on
        soovitatav vaadata mõlemat etendust.
    description_en: >-
        FOMO — fear of missing out. It is one of the forms of social anxiety
        that is expressed in the constant concern that one is missing out on
        something important.  
          
        Lack of human contact. You see everything. Eyes are closed. Deceptive.
        Assumption.  
          
        What FOMO does and creates in the human body and mind; how and where it
        expresses?

        The performance is a study, one of the aims of which is to look at the
        difference between two performances after 24 hours, which are affected
        by insomnia, information and additional tasks.  
          
        “Rather together in social media-world; than alone in real-world.”  
          
        Kaisa Kattai is a young choreographer and dancer. She has previously
        studied modern dance in Denmark, creative industry at EBS and is
        currently graduating choreography studies at Tallinn University. Kaisa
        is a (guest)teacher at several Estonian dance studios and also
        participating in workshops in and outside of Estonia. She has been part
        of the HTF team since 2018. At the end of the same summer, she took home
        the first place in BATTLEJÄMM 2018 experimental performance category. In
        addition, she has published several thoughts on dance in Estonian dance
        landscape; curated the first Greenfield of the STL season and is
        constantly working on various projects.  
          
        “fomo” is her BA graduation piece from Tallinn University. It is a part
        of KorFest 2019. For the best understanding of the piece it is
        recommended to see both performances.
