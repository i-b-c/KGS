    description_et: >-
        Ma tunnen su tunnet kui olen su sees  

        Palun. Tule. Oleme natukene, natukene koos  

        Iha 0-100  

        Ma tulen.  
          
        Eksperimentaalne teekond seksuaaliha tekkimise protsessis.  
          
        Keithy Kuuspu on noor tantsukunstnik, kes huvitub kõigest, mis on päris.
        Oma inspiratsiooni ammutab ta reaalsest elust ning naudib saadud
        informatsiooni sünteesimist liikumiseks. Eriti huvitavad teda inimeste
        suhtluses toimuvad protsessid ning reaktsioonid, inimeste mõju
        üksteisele ning kuidas ja mille pinnalt tekib nii inimestevaheline kui
        üksikisiku energia. Keithy on Tantspiratsiooni kunstiline juht ning
        tantsubatteli Battlejämm peakorraldaja. Aastal 2017 tõi ta koostöös
        Kaisa Kattaiga välja enda esimese lavastusega “Palun”, mis pani küsimuse
        alla ja uuris erinevaid tantsu(kunsti) vorme. „Palunit“ esitati ka
        Hiiumaa TantsuFestivalil ning Leedu Muusika -ja Teatriakadeemia
        teatripäevade raames Vilniuses. Aastal 2018 hinnati teda parima filmi
        auhinnaga Summer Media Studios Leedus, millele ta kirjutas stsenaariumi
        (koos Kaisa Kattai ning Samuel Koppeliga) ning osales tantsijana.  
          
        Tegemist on Keithy koreograafia eriala BA diplomitööga. Lavastus kuulub
        KorFest 2019 programmi.
    description_en: >-
        I feel your feelings when I’m inside of you  

        Please. Come. Let’s be together, for a little while  

        Lust 1-100  

        I am coming.  
          
        Experimental journey on the birth of sexual desire.  
          
        Keithy Kuuspu is a young choreographer who is fascinated by everything
        that is authentic. She gets her inspiration from the reality surrounding
        her and enjoys synthesizing it into movement. Her special interest is
        human relationships and how people affect each other. She is interested
        in those processes which allow the energy between two people to come to
        life. Keithy is an art director of Tantspiratsioon studio and the main
        organizer of Battlejämm. In 2017 she created her first dance performance
        “Palun” in collaboration with Kaisa Kattai, which was questioning and
        analyzing different forms of dance. “Palun” was also performed at
        Hiiumaa DanceFestival and at LMTA Theatre Days in Vilnius. In 2018 she
        was nominated for the price of best movie in the Summer Media Studio in
        Lithuania, where she wrote script (with Kaisa Kattai and Samuel Koppel)
        and performed as a dancer.  
          
        “IHA” is her BA graduation piece from Tallinn University. It is a part
        of KorFest 2019.
