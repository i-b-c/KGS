    description_et: >-
        Henri ja Tencu ja installatiivne kogemuslik ruum.  
          
        Ajaliini mustrites on turvaline korrapära: mis läks üles, tuleb ka alla
        või mis hakkas tööle, lõpetab kord ka töö. Funktsionaalse mõistmise
        tasandist edasi asuvad võimatused, millest ruum, seisund, paratamatus,
        optilisus ning maagia on need kõige üksikumad.  


        Kuidas (ning milliseid vahendeid kasutades) ilmneb teatri-maagia
        tänapäeval?
          
        Reaalse olemusega residentuur tootmaks reaalse olemuseta mustreid…  
          
        Henri Hütt on (etendus)kunstnik, kelle laia loominguspektrisse kuuluvad
        tehnoloogilise dominandiga etenduskunsti vormid, helietendused,
        lavastatud näitused, kureerimised, kirjutamised, installatiivsete
        etenduste genereerimised ja muu tabamatu. Lähtub kestuses olemisest,
        sest kes palju teeb, see jõuab vähe ajalukku. Henri loomingulistest
        näidetest leiab käesolevas dekaadis lavastusi, mis hõlmavad nii kõiki
        teatreid kui ka tühja ruumi mikrotonaalset värelust. On rühmituse
        MIMproject liige ning Baltikumi ja Skandinaavia kunstiülikoolide
        võrgustiku DAMA visionäär.  
          
        Tencu (Andres Tenusaar) on vabakutseline režissöör, animaator ja
        videokunstnik, kes tegutseb oma stuudios Peata Film. Lisaks filmidele ja
        muusikavideotele on teinud animatsiooni ja videot teatri- ja
        tantsuetendustele, loonud mäppinguid ja installatsioone ning töötanud
        VJ-na paljude muusikutega. Tencu lavastatud filmid on regulaarselt
        osalenud erinevatel rahvusvahelistel festivalidel üle maailma ning olnud
        korduvalt nomineeritud ja auhinnatud.  


        Toetaja: Eesti Kultuurkapital
    description_en: >-
        Henri and Tencu and installative cognitive space.


        Harmonic structures can be found in every time based pattern: what goes
        up must come down or every working engine has to stop at some point.
        Beyond functional understanding level, one can find the most loneliest
        components of impossibilities such as space, state, opticality and
        magic.  
          
        How (and using which tools) does theatre-magi c occur nowadays?  
          
        Realistically present residency produces realistically un/non-present
        patterns…  
          
        Henri Hütt is an artist / performer whose creative spectre centres
        around technological performative acts, staged exhibitions, performative
        installations/installative performances and other "not there yet"
        formats. He has directed pieces where all (local) theatres are together
        and also pieces where one can focus on minimalistic microtonal
        afterlife. Henri is also part of MIMproject team and coordinates
        dance-art media-art network DAMA in Scandinavian and Baltic countries.  
          
        Tencu (Andres Tenusaar) is a freelance animator, director and video
        artist at his studio Peata Film. Besides films and music videos he has
        also provided stage video and animation for theatre plays, created video
        mappings and installations, worked together with numerous musicians as a
        VJ and also composed original film soundtracks for films.  
          
        Supported by Estonian Cultural Ministry
