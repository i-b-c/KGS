    description_et: >-
        Eesti Kunstiakadeemia arhitektuuri ja linnaplaneerimise eriala
        magistritööde kaitsmised on avalikud. Kuulama ja vaatama on oodatud kõik
        huvilised.  


        Magistrantide lõputööks valitud teemad varieeruvad sel aastal
        kaasaegsest varjendist Jumalate arhitektuurini, tervisespordi
        tulevikuruumist digitaalselt võimendatud ruumielamusteni. Tegeletakse
        nii aktuaalsete kui universaalsete teemadega nagu suremise ruum ning
        dementseid ja nende lähedasi toetav keskkond. Analüüsitakse Narva
        aktiveerimise võimalikkust ning ökoloogia ja tehiskeskkonna vastastikust
        toimet Valgejõe näitel. Vaadeldakse tühjenevaid ja liikuvaid linnu.
        Mõtestatakse mobiilse inimese elamise ruume, lapse teekonda tänaval ja
        tänapäevast õppimisruumi. Lisaks tegeletakse nii avaliku ruumi kui
        kaubandusruumiga ning uuritakse tasakaalustatud ruumiarenguid
        rannikualade kontekstis. Lõpetuseks heidetakse värske pilk kriitilisse
        regionalismi. Kaitsmisele ootame 17 magistranti.   


        Magistrantidega diskuteerivad hindamiskomisjoni liikmed arhitekt Peeter
        Pere, filosoof ja arhitektuuriosakonna doktorant Eik Hermann, EKA
        urbanistika õppetooli juhataja prof. Maroš Krivý, arhitekt Siiri
        Vallner, EKA arhitektuuriteaduskonna dekaan Toomas Tammis ning
        väliskriitikutena arhitekt ja Delfti Tehnikaülikooli dotsent Klaske
        Havik ja Tampere Tehnikaülikooli arhitektuuriosakonna professor Panu
        Lehtovuori.
    description_en: >-
        The defence of the MA theses of the Faculty of Architecture and Urban
        Design of the Estonian Academy of Arts is a public event open to
        everybody.  


        The topics explored by MA students cover a wide range: from the
        contemporary emergency shelters to the architecture of the Gods, from
        the space created for recreational sports to digitally enhanced spatial
        experience. There are both current topical issues as well as universal
        research topics, such as a space for dying and an environment supporting
        people with dementia and their loved ones. One of the papers explores
        the possibilities of revitalizing Narva city; another: the interaction
        of ecology and the built environment on the example of Valgejõe.
        Emptying cities and cities on the move are explored, the living
        environment of a mobile human is conceptualised, as well as the path of
        a child moving about in a city, and a contemporary school environment.
        There’s research into public space as well as commercial; one of the
        thesis papers looks into balanced spatial development of coastal areas.
        And finally, a fresh look into critical regionalism is proposed.
        Altogether 17 theses are expected to be presented.

        MA students will discuss their work with the following evaluation
        committee members: architect Peeter Pere, philosopher and Ph.D. student
        in the Faculty of Architecture Eik Hermann, head of the Faculty of Urban
        Studies Maroš Krivý, architect Siiri Vallner, head of the Department of
        Architecture and Urban Planning Toomas Tammis and external evaluators
        Klaske Havik (assistant professor of architecture at Delft University of
        Technology) and Panu Lehtovuori (Professor of Planning Theory at Tampere
        University of Technology).
