    description_et: >-
        „Jerk” on Ameerika sarimõrvari Dean Corlli sooritatud kuritegude
        kujuteldav – kummaline, poeetiline, naljakas ja morn – rekonstruktsioon.
        Koos teismeliste David Brooksi ja Wayne Henleyga tappis Corll 1970date
        keskpaigas Texase osariigis üle 20 poisi.  


        Näidendis kannab David Brooks eluaegset vanglakaristust. Ta õpib vanglas
        nukunäitlemist, mis teeb tema jaoks mingil moel võimalikuks võtta
        vastutus nendes roimades osalemise eest. Ta on kirjutanud näidendi, mis
        lahkab Dean Corlli sooritatud mõrvu ja kus kõiki rolle täidavad nukud.
        Näidendit esitab ta vanglas kohaliku ülikooli psühholoogiatudengitele.  


        Hoolimata realistlikust ilmest võbeleb lugu ise ebausutavuse piiril.
        Näidendi näiline realism tuleneb lineaarsest jutustusest, lihtsast
        tõsielulisest loost ning petise-nukunäitleja täielikust samastumisest
        väljamõeldud tegelase David Brooksiga. 


        „Jerk” on neljas näidend, mis Gisèle Vienne on loonud koostöös Ameerika
        kirjaniku Dennis Cooperiga – sellele eelnesid „I Apologize” (2004), „Une
        belle enfant blonde” (2005) ja „Kindertotenlieder” (2007). Nendes
        näidendites kombitakse pidevalt väljamõeldise ja reaalsuse piire, muutes
        nii meie reaalsustaju. Pisut realistlikumas „Jerkis” esitatakse sidus
        lineaarne jutustus ja luuakse usutavus, mis tuleneb kahtlemata just
        vormist. Ja meie erinevate vormiliste kogemuste kaudu vaadeldaksegi
        sedasama kahtlematust.



        **Gisèle Vienne** on prantsuse-austria kunstnik, koreograaf ja
        lavastaja. Pärast filosoofiaõpingute lõpetamist õppis ta nukunäitlemist
        Ecole Supérieure Nationale des Arts de la Marionnette’is. Alates
        kompanii asutamisest 1999. a. on loodud 14 lavastust.  Alates 2005.
        aastast on ta esitlenud oma fotosid ja installatsioone mitmetel
        näitustel. Gisèle Vienne, Dennis Cooper, Peter Rehberg ja Jonathan
        Capdevielle andsid välja ka kakskeelse (prantsuse ja inglise keeles)
        audioraamatu „JERK / Through Their Tears” (väljaandja: DIS VOIR). Ta on
        avaldanud ka raamatu „40 PORTRAITS 2003-2008” koos Dennis Cooperi ja
        Pierre Dourthe’iga (väljaandja: P.O.L).     

        [www.g-v.fr/fr/](http://www.g-v.fr/fr/)


        **Dennis Cooper** on romaanikirjanik, luuletaja ja kriitik, kes elab
        Pariisis ja Los Angeleses. Ta on avaldanud 10 romaani, neist viimasena
        ilmus 2015. aasta jaanuaris „Zac's Haunted House” (animeeritud gif-idest
        koosnev romaan). Lisaks on tal koostöös kunstnik Zac Farleyga valminud
        film „Like Cattle Towards Glow”. Cooper on ajakirja „Artforum”
        kaastoimetaja ja Ameerika kirjastuse „Little House on the Bowery”
        toimetaja.  Ta teinud koostööd Gisèle Vienne’iga alates 2004. aastast. 

        [denniscooper-theweaklings.blogspot.com/](http://denniscooper-theweaklings.blogspot.com/)



        **Peter Rehberg** on elektrooniliste heliteoste looja ja autor, kes elab
        Viinis. Rehberg on esinenud nii koos teiste muusikute kui sooloartistina
        Euroopas, Põhja- ja Lõuna-Ameerikas, Jaapanis ja Austraalias. Ta oli üks
        esimesi artiste, kes hakkas 1990. aastate keskpaigas kasutama
        esinemistel mobiilseid arvutiseadmeid. Rehberg on teinud koostööd
        näiteks artistidega: Jim O'Rourke ja Christian Fennesz (nime all Fenn
        O’Berg), Stephen O’Malley (KTL), Gisèle Vienne / DACM, Peterlicker, Z’EV
        Russell Haswell, Florian Hecker, Meg Stuart, Chris Haring, Marcus
        Schmickler, Jade, SUNNO))). Lisaks on ta MIMEO liige ning on alates
        2006. aastast juhtinud plaadifirmat Editions Mego ning oli 1995. aastal
        Mego kaasasutaja. 

        Tema koostöö Gisèle Vienne’iga sai alguse 2004 aastal ning hõlmab
        mitmeid lavastusi. Samuti oli ta Meg Stuarti lavastuse „Highway 101” ja
        Chris Haringi lavastuse „Fremdkörper” muusika üks loojaid ning osales 2.
        Göteborgi kunstibiennaalil.

        [editionsmego.com/](http://editionsmego.com/)
    description_en: >-
        *Jerk* is an imaginary reconstruction – strange, poetic, funny and
        somber – of the

        crimes perpetrated by American serial killer Dean Corll who, with the
        help of teenagers David

        Brooks and Wayne Henley, killed more than twenty boys in the state of
        Texas during the

        mid-70s.



        This show sees David Brooks serving his life sentence. In prison, he
        learns the art of

        puppets, which somehow enables him to face up to his responsibility as
        partner in the

        crimes. He has written a show that reconstructs the murders committed by
        Dean Corll, using

        puppets for all the roles. He performs his show in prison for a class of
        psychology students

        from a local university.



        The story, however realist it may be, seems to border on unrealism. The
        play’s

        apparent realism stems from its linear narration, as well as from its
        basic true story and from

        the trickster-puppeteer’s total identification with the fictive
        character of David Brooks.



        *Jerk* is the fourth play that were produced in collaboration with the
        American writer

        Dennis Cooper: *I Apologize* (2004), *Une belle enfant blonde* (2005)
        and *Kindertotenlieder* (2007). In these three plays, the links between
        fantasy and reality are being constantly probed, thereby altering our
        perception of reality. The more realist *Jerk* puts forth a consistent
        linear narrative, generating the credibility that undeniably stems from
        this form. And it is this undeniability that is reexamined by way of our
        different formal

        experiences.




        **Gisèle Vienne** is a Franco-Austrian artist, choreographer and
        director. After graduating in Philosophy, she studied at the
        puppeteering school Ecole Supérieure Nationale des Arts de la
        Marionnette. Since the company was founded in 1999, 14 shows have been
        created. Since 2005, she has been frequently exhibiting her photographs
        and installations. Gisèle Vienne, Dennis Cooper, Peter Rehberg and
        Jonathan Capdevielle published an audio book in 2 versions French and
        English: *JERK / Through Their Tears* (publisher DIS VOIR).She has
        published a book *40 PORTRAITS 2003-2008*, in collaboration with Dennis
        Cooper

        and Pierre Dourthe (publisher: P.O.L).<br /> 

        [www.g-v.fr/fr/](http://www.g-v.fr/fr/)


        **Dennis Cooper** is a novelist, poet and critic. He lives in Paris and
        and Los Angeles. He has

        published ten novels, most recently Zac's Haunted House (a novel
        composed of animated

        gifs) in January 2015. He completed a feature film, Like Cattle Towards
        Glow, which he

        created in collaboration with the artist Zac Farley. He is a
        contributing Editor of Artforum Magazine and the editor of the American
        publishing imprint Little House on the Bowery. Collaborating with Gisèle
        Vienne since 2004. 

        [denniscooper-theweaklings.blogspot.com/](http://denniscooper-theweaklings.blogspot.com/)


        **Peter Rehberg** is an author and performer of electronic audio works
        based in Vienna, Austria. Rehberg has given live performances both solo
        and collaborative throughout Europe, North and South America, Japan and
        Australia. He is one of the first batch of artists that turned to mobile
        computing devices for presentation of live audio performances in the
        mid-1990s. He has collaborated live and in the studio with, amongst
        others, Jim O'Rourke and Christian Fennesz (as Fenn O’Berg), Stephen
        O’Malley (as KTL), Gisele Vienne/DACM, Peterlicker, Z’EV Russell
        Haswell, Florian Hecker, Meg Stuart, Chris Haring, Marcus Schmickler,
        Jade, SUNNO))), as well as being a member of MIMEO. He also runs the
        Editions Mego label since 2006, and was co-leader of the original Mego
        label since 1995. Collaborating with Gisèle Vienne since 2004. He also
        collaborated on the music for Highway 101, a show choreographed by Meg
        Stuart, and for Fremdkörper by Chris Haring, as well as taking part in
        the 2nd Göteborg Art Biennale.<br /> 

        [editionsmego.com/](http://editionsmego.com/)
