    description_et: "Isaïe Bloch on Belgia arhitekt ja Londonis asuva disainibüroo asutaja. Isaïe uurib oma töödes digitaalset käsitööd, orienteerudes arhitektuuri, skulptuuri, moe ja tootedisaini piirimail. Eragatory projektid kombineerivad uusimad digitaalsed disainiprotsessid vanimate käsitöö meetoditega, luues nn digitaalse käsitöö eklektitsismi. \n\nIsaïe Blochi tööde hulka kuuluvad mitmed koostööd moedisaineritega, sealhulgas Karl Lagerfeldiga (The little black jacket). Eragatory looming on publitseeritud ajakirjas AD - Tärkamine läbi disaini. Digitaalne käsitöö - \_ja lisaks eksponeeritud Metropolitani kunstimuuseumis New Yorgis, FRAC keskuses Orleansis, SHOWcabinet’is Londonis, Eksperimentaalse arhitektuuri beinaalil Prahas. Lisaks on Isaïe arhitektuuri õppejõud Bartlett UCL ja UEL ülikoolis Londonis.  \n[wwww.eragatory.com](http://www.eragatory.com/)<br />\n\nArhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste laiemale ringile. Loengud on inglise keeles ning tasuta.  \n[www.avatudloengud.ee](http://www.avatudloengud.ee/)<br />"
    description_en: >-
        Belgian Architect Isaïe Bloch is founder of Eragatory - a versatile
        design practice based in London. Isaïe’s ongoing research and design
        ambitions are focused on the impact of digital craftsmanship on a large
        range of disciplines including Architecture, Plastic arts, Fashion and
        Design.

        Eragatory aims to produce work that embodies crafted digital eclecticism
        through an engagement with both new digital design processes and the the
        oldest of manufacturing techniques and vice versa.


        The work of the practice has been published internationally in Karl
        Lagerfeld`s - The little black jacket, AD - Evoking Through Design,
        Digital Handmade – published by Thames & Hudson and exhibited widely
        including at the Metropolitan Museum of Art New York USA, the FRAC
        Centre Orleans Fr, SHOWcabinet London UK, Experimental Architecture
        Biennial Prague CZ. Isaïe is simultaneously lecturing Architectural
        design at the Bartlett UCL and UEL in London.

        [wwww.eragatory.com](http://www.eragatory.com/)<br />


        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment. The lectures are
        held in English, free of charge.  

        [www.avatudloengud.ee](http://www.avatudloengud.ee/)<br />
