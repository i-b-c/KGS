    description_et: >-
        Vaade tänapäeva inimese stressi- ja hirmurohkesse igapäevaellu.  


        Unikaalse visuaaliga „Hirmu anatoomia” vaatleb hirmu läbikukkumise ees,
        kasutades füüsilist teatrit, nukke, videokunsti, elavat muusikat ja
        visuaalseid viiteid Francis Baconi maalidele. Lavastus lähtub näitleja
        ja lavastaja Davide Giovanzana isiklikest kogemustest ja partneriks on
        talle kahe näitleja poolt juhitav inimsuurune nukk. Lavastus uurib, kui
        palju hirmu on inimeste elus ja kui palju on hirm kujundanud inimese
        iseloomu ning laiemas plaanis – kuidas hirm mõjutab kollektiivseid
        otsuseid ja käitumist.  


        Teater Metamorfoos on Helsingis tegutsev professionaalne maski- ja
        füüsilise teatri trupp, mille asutasid 2005. aastal soome teatripedagoog
        ja -praktik Soile Mäkelä, rootsi lavastaja Davide Giovanzana ja soome
        skulptor Laura Mäkelä. Trupp on kasvanud 12-liikmeliseks dünaamiliseks
        ansambliks, kuhu kuuluvad draama- ja nukunäitlejad, muusik, skulptor,
        maskivalmistajad ja dramaturg. Kõiki neid ühendab sügav huvi maskide ja
        füüsilise teatri vastu.
    description_en: >-
        Anatomy of Fear is a visually unique performance that explores the fear
        of failure using physical theatre, puppetry, video art, live music and
        visual references of Francis Bacon's paintings. The actor and theatre
        director Davide Giovanzana places himself on the stage with a human size
        puppet manipulated by two puppeteers and uses his personal life
        experience as the catalyst of the show. The performance consists in
        exploring how much fear is present in someone’s life and to what degree
        this presence has shaped someone’s personality and on a larger scale how
        fear influences collective decisions and behaviour.  


        Theatre Metamorfoosi is a professional mask theatre company based in
        Helsinki, Finland. It was founded in 2005 by Finnish theatre pedagogue
        and theatre maker Soile Mäkelä, Swiss director Davide Giovanzana and
        Finnish sculptor Laura Mäkelä. The company has grown into a dynamic
        ensemble of 13 members, including actors, puppeteers, musicians,
        sculptors, mask makers and dramaturges, all of whom share a deep
        curiosity about masks and physical theatre.

        Teatteri Metamorfoosi is one of the rare European theatre companies
        focusing on the exploration of mask theatre. Our work is visible in
        performances, mask making, pedagogy, applied drama projects and an
        international mask theatre festival MasQue organized in Helsinki.
