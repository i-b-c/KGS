    description_et: >-
        Eesti Kontserdi ja Tallinn Music Weeki koostöös tuleb taaskord publiku
        ette 2016. aasta sügisel esietendunud noorte produtsentide programmi EK:
        Labor võiduprojekt „Kommentaarium“, et esitleda põneva ideega
        kontsertetendust ka välismaistele kontserdikorraldajatele.  
         
        „Kommentaarium“ on eelkuulamisega kontsertetendus - see tähendab, et
        publik saab juba enne kontserti projektist osa ning tegelikult võtab
        kontsert oma kuju just nimelt publiku abil. Kava autor on noor helilooja
        Marianna Liik, teoseid leidub nii harfile, tšellole kui ka
        löökpilliansamblile, lisaks saab kuulda elektroonilist muusikat. Teoste
        lindistused laetakse enne kontserti üles internetti, kus inimesed saavad
        neid rahulikult kuulata - seejärel innustatakse neid muusikat
        kommenteerima, pannes kirja oma mõtted, tunded või ka kriitika, mida
        muusika neis tekitas. Saadud kommentaare kasutab helilooja uue
        kooriteose tekstina, mis tuleb ettekandele kontserdi lõpus.  
         
        Kommentaare kasutatakse ka kontserdi valgus- ja videolahenduses, lisaks
        esitab samu kommentaare ka vokaalimprovisaator. Üheaegselt kõlavad ja
        põimuvad kokku nii muusika kui kommentaarid, teos kui selle kriitika.
        Publikut ümbritsevad nende enda mõtted, mis saavad interpreetide käes
        uue varjundi. Nii tekibki uus põnev loominguline keskkond -
        kommentaarium. <br />

        <br />

        **Marianna Liik** on pärit Hiiumaalt, kus alustas oma muusikaõpinguid
        viiuli erialal. 2017. aastal lõpetas ta heliloomingu magistriõppe Helena
        Tulve ja Margo Kõlari juhendamisel, 2014. aastal omandas ta samas koolis
        bakalaureusekraadi elektroakustilise kompositsiooni erialal, õppides
        Margo Kõlari ja Malle Maltise käe all. Liik on osalenud Wim Henderickxi,
        Fausto Sebastiani, Daniele Bravi, Bryan Christiani, Niels Rosing-Schow,
        Ivan Fedele jt meistrikursustel.

        Marianna Liik on kirjutanud muusikat orkestrile, ansamblitele, koorile
        ning elektroakustilisi teoseid. Tema eriliseks huviks on elektrooniliste
        ja akustiliste väljendusvahendite ühendamisel tekkiv kõlamaailm. Liigi
        muusikat on esitanud Eesti Riiklik Sümfooniaorkester, Olari Elts,
        Uusinta Ensemble (Soome), Laura Remmel (vokaal), Theodor Sink (tšello),
        Eda Peäske (harf), Aare Tammesalus (tšello), Arvo Leibur (viiul),
        segakoor Noorus jt. Tema teosed on kõlanud mitmetel festivalidel Eestis,
        aga ka Poolas, Saksamaal, USA-s, Venemaal, Austraalias. 2014. aastal
        etendus Telliskivi Loomelinnakus Marianna Liigi ja Sander Mölderi
        ühistööna ooper "Korduma kippuvad küsimused" Andra Teede libretole.    

        Marianna Liik pälvis Rahvusvahelisel heliloojate rostrumil 2013. aastal
        Prahas alla 30-aastaste kategoorias teise koha oma elektroonilise
        teosega "Mets". Novembris 2014 võitis ta Euroopa filmimuusika ja -heli
        festivalil "SoundTrack_Cologne 11" Westdeutscher Rundfunki filmimuusika
        preemia. Marianna Liik’ i ja Leika Leemetsa unikaalne projekt
        “Kommentaarium” Liik’i autorikavaga oli 2016. aasta EK:Labori (Eesti
        Kontserdi uue publiku, muusikaekspordi ja haridusprogramm) võidutöö.
        2017. aastal pälvis Liik Luzerni Festivali Akadeemia noore helilooja
        auhinna “Roche Young Commissions”.
    description_en: >-
        Eesti Kontsert and Tallinn Music Week are proud to collaborate in order
        to present to the visiting producers the winning concept of the EK:Labor
        Young Producers Competition 2016, Tallinn.   “Kommentaarium” (The
        Commentary) is a concert experience with preparation cycle, so the
        audiences are involved before even entering the concert venue. The
        concert is shaped by both performers and the listeners.    

        Young Estonian composer Marianna Liik presents works for harp, cello,
        percussion ensemble and electronical instruments. So how does it work?
        The recordings of the aforementioned musical pieces are made available
        online prior to the concert. The listeners are encouraged to comment the
        music, describing their thoughts, emotions and critics. The collected
        commentaries are used as a libretto for a brand new choir piece which
        will be premiered as the finale of the concert. The commentary texts
        will also be used as a design bases for light and video artists and a
        vocal improviser. So here we are - surrounded by the original music and
        the thoughts and critics of its listeners. The audiences are therefore
        influenced by their own previous thoughts and with the help of musicians
        the unity is born- The Commentary. <br />

        <br />


        In 2017 **Marianna Liik** graduated Master’s studies in composition at
        the Estonian Academy of Music and Theatre with Helena Tulve and Margo
        Kõlar. She obtained there Bachelor’s degree in 2014 under the tutelage
        of Malle Maltis and Margo Kõlar. Liik has taken part in several
        masterclasses with Wim Henderickx, Fausto Sebastiani, Daniele Bravi,
        Bryan Christian, Niels Rosing-Schow and Ivan Fedele.  

        Marianna Liik has written music for orchestra, ensembles and choir as
        well as electroacoustic works. Her special interest is the sound world
        that is created by combining the acoustic and electronic means of
        expression. Liik's music has been performed by Olari Elts, Estonian
        National Symphony Orchestra, Uusinta Ensemble (Finland), Laura Remmel
        (vocal), Theodor Sink (cello), Eda Peäske (harp), Aare Tammesalu
        (cello), Arvo Leibur (violin) and others. Her works has been in the
        program of many festivals in Estonia, as well as in USA, Poland,
        Germany, Russia, Australia.  

        Marianna Liik’s composition Mets (Forest) was awarded the second prize
        at the International Rostrum of Composers in Prague in 2013 in the
        category of composers under 30 years. In November 2014, Marianna Liik
        won the Westdeutscher Rundfunk film music award at the competition
        SoundTrack_Cologne 11. The project "Commentarium" by Marianna Liik and
        Leika Leemets was the winning work of EK:Labor 2016 (Estonian Concert's
        programme for young producers). In 2017, Liik was awarded Lucerne
        Festival Academy prize Roche Young Commissions.
