    description_et: >-
        Ruumi-aja-masinas ilmuvad Nüganen ja van Bergem ning kõnelevad eelmise
        sajandi dialooge, suhestudes nii igiaja kui lähiminevikuga. Elutoast
        kasiinosse, relvapoodi ja sohu reisides otsivad nad narratiive
        mitte-lineaarsel ajateljel. Baldahhiin-narivoodi, vahvlilokid,
        keraamiline padi, harf. Muusika ja tantsu abil loovad nad kompositsioone
        kummalisse, müstilisse ja progressiivsesse tänapäeva. Elav sündmus, mida
        mälestuse sähvides oma tulevikku suunatud silmadega vaadata.
         
        **Laura van Bergem** on Amsterdamis sündinud koreograaf ja tantsija.
        Tantsijatreening viis ta Amsterdami Kunstikooli, kus ta lõpetas 2018.
        aastal SNDO koreograafia eriala. Enne koreograafiaõpinguid tegeles ta
        akadeemilise filosoofiaga, mis on osutunud oluliseks tema lavastustes.
        Van Bergem läheneb oma ideedele mänguliselt ja kõrvutab vasturääkivusi,
        luues elavaid ning tihti provotseerivaid kollaaže. 2011. aastast kuulub
        ta gruppi The Imperial Armpits, mis uurib meelelahutuslikku tähelepanu
        luues etteasteid peokonteksti. 


        **Netti Nüganen** on lõpetanud Amsterdami Kunstikoolis (SNDO)
        koreograafia eriala. Tema video- ja lavatööd jutustavad lugusid
        karakteritest, kes tema sees koos eksisteerivad: tõstja, teismeline
        vlogger, detektiiv, kauboi jt. Läbi müstilisuse kehastab ta nende
        karakterite banaalset igapäeva ja harjumusi. Leides lohutust
        vasturääkivustest ning ideede paljususest, püüab Nüganen läheneda valvsa
        ja hoolika tähelepanuga kõigele, mis tundub võõras ja kohatu.
    description_en: >-
        In a space-time-machine van Bergem and Nüganen appear and speak out
        dialogues, relating both to ‘ancient’ and ‘the good old’ times. From a
        livingroom to a casino, a bog and a weapon store they travel and find
        storylines on a non-linear timeline. Imagine a canopy-bunkbed, waffle
        hair, a ceramic pillow, a harp. 

        With choreographic precision and the help of music and dance they create
        new compositions for a confusing, mystical and advanced world. A live
        event to see with your future-oriented eyes, while vivid memories blink
        through.


        **Laura van Bergem** is an Amsterdam born choreographer and dancer.
        After years of dance training she entered Amsterdam School of the Arts
        where she graduated the SNDO choreography department in 2018. Prior to
        her choreography studies she was busy with academic philosophy. She
        playfully molds her ideas and enjoys placing contradictions into her
        exciting and often provocative collages. Since 2011 she is part of the
        group The Imperial Armpits that deals with questions of entertainment by
        creating performances in party contexts. 


        **Netti Nüganen** has graduated from choreography department in SNDO,
        Amsterdam. Through her video and stage works she tells stories about
        characters like a weightlifter, a teenager vlogger, a detective or a
        cowboy, approaching their banal habits through mystification. While
        finding comfort in contradictions, displacement and pluralism, she
        treats everything known with careful deconstruction and everything
        unknown with vigilant attention.
