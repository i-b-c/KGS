    description_et: >-
        Mis on eufooria voorused?  

        Miks püüdleme selle suunas ja kuidas selleni jõuda?  

        Millised on kaasaegsed eufooria ülistamise viisid?  

        Miks me tahame põgeneda?  


        Pärast kolme nädalat aktiivset uurimist, on meie töö Eufooria hakanud
        kõnetama ja meeleldi jagame oma mõtteid ja ideid sellega seoses.  


        “In great distress comes a sorceress, when in despair only, open this
        box and see”  


        **Marit Sirgmets** on Eestist pärit teatritegija. Tegutsenud
        vabakutselise lavastaja ja näitlejana USAs ja Euroopas, muu hulgas Oslo
        Black Box Teatris, Leedus Oskar Koršunovase Teatris, Von Krahli Teatris
        ja LaMama teatris New Yorgis.  

        **Ann Sofie Godø** on Norra stsenograaf. Ta on teinud enamasti koostööd
        Skandinaavias baseeruva TITS-grupiga ja tuuritanud nendega üle
        Euroopa.  

        **Corentin JPM Leven** on Prantsuse päritolu Norras tegutsev
        teatrikunstnik. Ta on tuuritanud Bianca Cassadyga (CocoRosie), töötanud
        Robert Wilsoniga („Aadama passioon“) ja eksperimenteerinud NYC downtown
        tegijatega (Witness Relocation, LaMama).
    description_en: >-
        What are the virtues of euphoria?   

        Why do we strive for it and how does one achieve it?  

        What are the modern ways of glorifying euphoria?   

        And why do we long for escape?   


        After almost three weeks of active research, our piece Euphoria has
        started to articulate and we are now delighted to share some of our
        research with you. 


        “In great distress comes a sorceress, when in despair only, open this
        box and see”



        **Marit Sirgmets** is a theatre artist from Estonia. She has worked as a
        freelance director and actress in USA and in Europe. Among other places
        Black Box Theatre in Oslo, Oskaras Koršunovas Theatre in Lithuania, Von
        Krahl Theatre in Estonia and LaMama Theatre in New York.


        **Ann Sofie Godø** is a Norwegian scenographer. She has done most of her
        work for TITS-group based in Scandinavia and has toured with them all
        over Europe.


        **Corentin JPM Leven** is a French scenographer based in Norway. He has
        toured with Bianca Cassady (CocoRosie), worked with Robert Wilson
        (“Adam’s Passion”) and experimented with NYC downtown artists (Witness
        Relocation, LaMama).
