    description_et: >-
        *Tulevik on tume, midagi pole veel selgunud. Silmade all olid tumedad
        rõngad. Tumedad äikesepilved. Taevas tõmbus tumedaks. Tumedad varjud.
        Jõevesi on tume kui tökat. Palgid on tumedamaks tõmbunud. Esiplaanil on
        mäed tumedamad. Nägi tulevikku vaid tumedates värvides ‘süngena,
        rõõmutuna, lohutuna’.*   

        <br>

        Karolin Poska kutsub sind tumedatel aegadel lahtiste silmadega unistama.
        Kasutades keha, objekte, häält, maagiat ja ruumi, proovib ta elamise
        ärevuses luua lohutust.   

        <br>

        Ta paneb enda puusad valetama, ta paneb sibula nutma, ta teeb midagi,
        mis viib mitte millegini– miski pole tõene ja kõik on võimalik. Ta näeb
        igavesti, ootab nirvaanat, kaaperdab, kukub jalad koos ja ihkab, mida
        süda saab. Ta kutsub sind osa saama ilma osalemata.    

        <br>

        **Karolin Poska** on Tallinnas tegutsev koreograaf, etenduskunstnik ja
        tantsija. Oma loomingu abil proovib ta aru saada, mis tunne on antud
        hetkel maailmas elada. Talle meeldib transformeerida reaalsust, mängida
        objektide ja publiku ootustega. Tema esimene soololavastus “Thank you,
        you are welcome, THANK YOU, you are welcome, thank you” etendus mitmel
        pool Eestis ja ka piiri taga. Hetkel uudistab ta visuaalkunsti
        piirimail, õppides kaasaegset kunsti Eesti Kunstiakadeemias.
    description_en: >-
        *The future is dark, nothing is clear yet. There were dark rings under
        their eyes. Dark thunderclouds. It was dark outside and I couldn't see
        much. River water is as dark as hard work. The mountains are darker in
        the foreground. They saw the future only in dark colors, 'gloomy,
        unhappy, discomforted'.*  

        <br>

        Karolin Poska invites you to dream in dark times with open eyes. Using
        body, objects, sorcery, voice, space, she tries to create consolation
        for the anxieties of living.   

        <br>

        She makes her hips lie, she makes onions cry, she does things which lead
        nowhere - nothing is true and everything is possible. She sees forever,
        she waits for nirvana, hijacks, falls legs together, and longs for what
        the heart gets. She invites you to participate without participation. No
        one is forced to do anything but, is gently allowed to join.   

        <br>


        **Karolin Poska** is a Tallinn based choreographer, performance artist
        and dancer. Through her creative activities she tries to understand what
        it is like to be alive nowadays. She likes to play with objects,
        transform reality and mess with the audience’s expectations. Her first
        solo performance “Thank you, you are welcome, THANK YOU, you are
        welcome, thank you” was performed both in Estonia and internationally.
        At the moment she wonders about the borders of visual art while studying
        contemporary art at
         the Estonian Academy of Arts.
