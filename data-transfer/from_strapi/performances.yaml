    description_et: >-
        Émilie Girard-Charest ja Mart Soo esitlevad kontserdil oma uut CD-d RACE
        WITH TIME, mis lindistati 2015. aastal Tallinnas.<br />

        <br />

        <strong>Émilie Girard-Charest</strong> on tšellist, helilooja ja
        improviseerija. Kammermuusiku, solisti ja koostöös erinevate ansamblite
        (Allogène, Super- musique, La Machine, Quatuor d’occasion, Stéphane
        Pécas, Ensemble for New Music Tallinn, duo Collard-Neven-Girard-Charest)
        on ta pühendunud uue muusika esitamisele. Ta on teinud koostööd
        heliloojatega Malcolm Goldstein, Michel Gonneville, Maxime McKinley,
        Joane Hétu, Guillaume Primard, Jean-Luc Fafchamps, Isaiah Ceccarelli,
        Hans Zender, Graciela Paras- kevaidis ja Fredrik Gran. Ta teeb koostööd
        ka tantsija ja visuaalkunstniku Sarah Bronsardiga.<br />

        <br />

        <strong>Mart Soo</strong> on kitarrist, improviseerija ja helilooja.
        Esinenud Euroopas, USAs ja Jaapanis. Mänginud mitmete mainekate
        muusikutega – Fred Frith, Markus Reuter, Paul Lovens, Isabelle Duthuoit,
        Xavier Charles, Bob Ferrel, Jan Bang, Toyah Wilcox jpt. Huvitunud
        paljudest eri stiilidest – jazz, vaba-impro, maailmamuusika, minimalism
        ja klassikaline muusika (Tunnetusüksus, Weekend Guitar Trio, Vox
        Clamantis, Taavi Kerikmäe, MiaMee, EGO, Roomet Jakapi jpt). Kirjutanud
        muusikat filmidele, teatrilavastustele, kuuldemängudele. Osalenud
        poolesaja CD plaadi salvestamisel.<br />

        <br />

        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.<br />

        <br />

        <a href="http://www.improtest.ee">www.improtest.ee </a><br />

        <br />
    description_en: >-
        The duo Émilie Girard-Charest and Mart Soo will present their brand new
        CD RACE WITH TIME which was recorded in March 2015 in Tallinn.<br />

        <br />

        <strong>Émilie Girard-Charest</strong> is a cellist, composer and
        improviser. As a chamber musician, a soloist and with different
        ensembles (Allogène, Supermu- sique, La Machine, Quatuor d’occasion,
        Stép- hane Pécas, Ensemble for New Music Tallinn, duo
        Collard-Neven-Girard-Charest), she dedicates herself to new music. She
        has worked with many composers including Malcolm Goldstein, Michel
        Gonneville, Maxime McKinley, Joane Hétu, Guill- aume Primard, Jean-Luc
        Fafchamps, Isaiah Ceccarelli, Hans Zender, Graciela Paraskevaidis and
        Fredrik Gran. She is now working on a duet with the dancer and visual
        artist Sarah Bronsard.<br />

        <br />

        <strong>Mart Soo</strong> is a guitarist, composer and improviser. Mart
        has performed and collaborated with an impressive cast of international
        musicians at festivals throughout Europe, Japan and the U.S. The
        musicians he has worked with represent a wide and diverse range of music
        styles – jazz, classical, non-Western, improvised, electro-acoustic,
        vocal etc. Some of the notable names include Fred Frith, Weekend Guitar
        Trio, Markus Reuter, Uchihashi Kazuhisa, Paul Lovens, Xavier Charles,
        Isabelle Duthuoit, Vox Claimants, Eugene Chadbourne and many others.<br
        />

        <br />

        Improtest is concert series that brings improvisational music from local
        and foreign authors to local audience. The concerts have been taking
        place since 2005 once a month.<br />

        <br />

        <a href="http://www.improtest.ee">www.improtest.ee</a><br />

        <br />
