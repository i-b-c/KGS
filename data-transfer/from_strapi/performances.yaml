    description_et: >-
        Kosto I-IX (Kättemaks I-IX) on retsitatiivne fantaasia, mille on TADaCi
        magistritudengitest koosnevale tantsukompaniile lavastanud koreograaf
        Elina Pirinen. Lavastus esitleb lauluga nelja visiooni kättemaksust -
        keeleliselt, visuaalselt ja kehaliselt teravmeelsel ja otsesel viisil.
        Laulmine laval on ümbritsetud üheksast kehast, kes puhkavad ja
        pidutsevad. Tummpilt, kord valgustatud, kord kustunud, toob esile
        inimkonna ilusat sisemist melu. Tere tulemast helendavasse tulekõrbe ja
        leegitsevasse pimedusse!  


        TADaC (Theatre Academy Dance Company) on Helsingi Kunstide Ülikooli
        Teatriakadeemia tantsukompanii. Magistriõpingute viimasel aastal teevad
        tudengid koostööd tunnustatud koreograafidega ja esitlevad spetsiaalselt
        neile loodud tööd. TADaC sai loodud, et lihtsustada üleminekut
        treeningult professionaalsele tegevusele ja täidab oma missiooni. TADaC
        tutvustab jätkuvalt uute kaasaegsete tantsijate värsket generatsiooni.
        Kompanii kunstiline juht on professor Ari Tenhula. Kosto I-IX on
        lõpetavate tantsutudengite magistritöö kunstiline osa.
    description_en: >-
        Kosto I-IX (Revenge I-IX) is a recitative fantasy directed by
        choreographer Elina Pirinen for dance company TADaC, made up of MA
        students of dance. It sings forth visions of revenge in linguistically,
        visually and corporeally subtle and direct ways. The singing on stage is
        surrounded by nine bodies incorporating rest and festivo. The tableau
        vivant, in turn illuminated and extinguished, brings forth the beautiful
        inner tumult of humanity. Welcome to a desert of glowing light and
        flaming darkness.  


        TADaC (Theatre Academy Dance Company) is a dance company within the
        Theatre Academy of the University of the Arts Helsinki. In the final
        year of their MA studies dancers collaborate with established
        choreographers and perform work created especially for them. TADaC was
        designed to facilitate the transition from training to professional
        practice and is fulfilling the mission. TADaC continually introduces a
        fresh generation of new contemporary dancers. Artistic director of the
        company is Professor Ari Tenhula. Kosto I-IX is the artistic part of the
        Master’s thesis for the graduating dancers.
