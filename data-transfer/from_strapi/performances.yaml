    description_et: >-
        The Estonian performer Mart Kangro is not averse to radical changes.
        After the premiere of “Start”, for instance, he said farewell to his
        ballet career at the National Opera of Estonia and decided to
        concentrate on contemporary performance art. Since then, he has
        collaborated with visual artists, created works for drama theatres and
        directed productions for contemporary classical music. The aim of his
        own choreographic works is to dismantle the mechanisms of contemporary
        dance. 


        Performance "Start" is an eclectic abstract of the relentless ideas and
        dance quests important for  the performer at that particular moment
        reflecting his growing need to take critical distance from his own
        religion that is dance theatre dogmas. 

        “Start” has been performed all over Europe and became one of the
        milestones of Estonian contemporary dance. Even though it premiered
        nearly 20 years ago the questions posed in this performance seem
        surprisingly relevant and up to date.
