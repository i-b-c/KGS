    description_et: >-
        **Doris Hallmägi**  

        “How They Used to”  

        2020  

        <br>

        “How They Used to” fookuses on artisti inspireerinud elektronmuusika
        naispioneerid koos nende teoste ja tehnikatega.  

        <br>

        **Doris Hallmägi** alustas elektronmuusikaga tegelemist digitaalseid
        vahendeid kasutades. Akadeemias õppides sattus ta elektroonilise muusika
        ansamblisse EMA, kus hakkas huvituma modulaarsüntesaatoritest. Teda
        köitsid ettearvamatud helid, mida analoogsüntesaatoritest on võimalik
        kätte saada. “How They Used to” kaasab tsitaate Daphne Orami, Delia
        Derbyshire'i, Eliane Radigue'i, Laurie Spiegeli, Suzanne Cianni jt
        naispioneeride loomingust.  

        <br>

        Doris Hallmägi lõpetas 2018. aastal Eesti Muusika- ja Teatriakadeemia
        elektroakustilise kompositsiooni eriala. Ta on tegev Eesti
        Elektroonilise Muusika Seltsi ansamblis. Doris on huvitatud nii
        akustilisest kui ka elektroonilisest muusikast, kasutades digitaalseid
        ja analooginstrumente. Ta on kirjutanud teoseid väiksematele
        instrumentaalansamblitele, sümfooniaorkestrile ja elektroonilistele
        pillidele. Kuigi esinemisi elektroonilise muusikaga on olnud ka varem,
        on seekordne esinemine esimene pikem sooloetteaste.  

        <br>

        <br>

        **Nicolas Buzzi**  

        “Us”  

        2020  

        <br>

        kvadrofooniline kompositsioon Buchla süntesaatorile  

        <br>

        Hääl on keha ja atmosfääri hübriid, see põhineb ajal, liigub ruumis,
        pärineb uskumatult täpsest elundist. See on nii isiklik nagu sõrmeots ja
        kiviviskest paremini võib see jõuda sobivalt kaugete inimesteni. Hääl on
        liides keha ja välismaailma vahel. Keha katse laiendada oma
        materiaalsust.  

        Hääl aktiveerib meid ümbritseva materjali, paneb vibreerima osakesed, et
        saata välja sõnum, mida kõneleja või laulja soovib edastada. Nii võib
        hääl jõuda teiste kehadeni, mis omakorda võivad muuta neid ümbritseva
        materjali vibreerimise informatsiooniks. Kui need kehad otsustavad kaasa
        lüüa, laulda või rääkida, moodustub koor ja koos sellega keha hääl, mida
        ennast võib mõista eraldi olemusena. Keele kui laieneva, ühendava
        elemendi kaudu luuakse inimrühmast – kus võib silmaga selgesti eristada
        omaette inimesi – keha, sünkroonsuse konsensuse vahendusel. Kuni üks
        hääl hakkab peale käima.  

        <br>

        Teoses „Us“ kasutab Nicolas Buzzi tajupsühholoogia avastusi, sidudes eri
        elemendid tervikuks, helimaailmaks, mis ümbritseb publikut. Samal ajal
        võimaldavad samad parameetrid (kujude eristamine) üksikutel elementidel
        sellest tervikust aegamisi eralduda ja oma iseseisvust näidata. Nii saab
        tunnise teose jooksul kümmelda vaheldumisi unisoonis ja ohjeldamatus
        polüfoonias, isolatsioonis ja sülemis.  

        <br>

        **Nicolas Buzzi** on Zürichis elav helilooja/esineja ja kunstnik, kes
        loob elektroonilist ja elektro-akustilist muusikat kontsertidele,
        installatsioonidele, performance'itele, filmidele ja teatrile. 2019.
        aastal lõpetas ta magistriõpingud elektro-akustilises komponeerimises
        Germán Toro-Pérezi juures. Tema sageli kollaboratiivsed, ruumile
        suunatud teosed on alati lähedal heli materiaalsusele ja selle
        tootmisele. Nii on tema loomepraktika eluline osa akustiliste nähtuste
        käsitlemine ja spetsiaalsete muusikariistade ehitamine, mis on viinud
        mitmete akustilisel tagasisidel põhinevate pillide, mitmesuguste
        spetsiaalsete tarkvararakenduste, kineetilis-akustiliste süsteemide ja
        eksperimentaalsete kõlarite loomiseni. Tema loomingus on sageli
        korduvateks elementideks suvaliste protsesside vormistamine ning
        vaistlik juurdepääs heli- ja muusikastruktuuridele, mis on sageli
        ühendatud jadade ajalise liigendamisega.  

        Tema teoseid ja tema loomingulise osalusega teoseid on näidatud näiteks
        Taylor Macklinis Zürichis, Kunsthausis Bregenzis, HEKis Baselis,
        Istituto Svizzero di Romas, Walcheturmis Zürichis, Fri-Artis Fribourgis,
        Schauspielhausis Zürichis, SIGNAL Art Gallery’s (NYC), HKW-s Berliinis,
        ZKMis Karlsruhes, Locarno filmifestivalil, Kölnischer Kunstvereinil,
        Kampnagelis Hamburgis, NUS Museumis Singapuris, Veneetsia
        arhitektuuribiennaalil ja São Paulo arhitektuuribiennaalil.  

        <br>

        <br>


        **DARKSIDE**  

        <br>


        Live-artistina kasutab **Darkside** lähenemist, mida ise nimetab
        sünditrippimiseks, kus eelprogrammeeritud pätternid segunevad kohapeal
        leiutatavaga ning seega on iga performance suhteliselt kordumatu.  

        Esinemise ajal on inimestele ainus nõue, et nad tunneksid end vabalt ja
        hästi ning naudiksid võimalust viibida suures süntesaatorikosmoses. Ka
        stiililiselt on need sünditripid üsna laiahaardelised, olles võimelised
        kokku põimima mitmeid elektroonilise muusika vorme non-stop võtmes ja
        üllatused on võimalikud. Tehnilise poole pealt eelistab Darkside
        analoogi, kuid ikka leiab koha ka mõne digipilli tarbeks - loomulikult
        ei puudu ka modulaar.

        Kuna mehe masinapark on suhteliselt lai ja mitmekülgne ning täieneb ja
        muutub üsna sageli, püütakse teadlikult iga esinemise tarbeks
        kombineerida suuremal või vähemal määral erinev setup. Darkside'i näol
        on tegemist marsslasest sündinohikuga, kes läbi masinate saavutab
        inimestega oluliselt parema ja tõelisema kontakti, kui nendega niisama
        suheldes. Stiililiselt ja kõlaliselt piire ei seata, kuigi rütm ja
        meloodia on esmatähtsad ja kui need on olemas, saab kõike muud võtta
        vabalt.  

        <br>

        <br>


        **Nina Elektrichka**  

        <br>


        Modulaarsünteesile keskenduvas live-esinemises vaatleb **Nina
        Elektrichka** seda, kuidas hääle modulatsioon ja edastatud signaalid
        suhtlevad keha sageduste, neuronite, atmosfääri ja ruumi endaga. Ta
        ühendab pulseerivad ebamaised elektroonilised rõõmud löövate
        trummimasina rütmidega, tähtedevaheliste võngete ja meloodiatega
        eksperimentaalses sünergias, mis muutub tee peal intiimseks ja
        ennustamatuks.

        Nina on esinenud DJ-na alates 2008. aastast ning on praegu üks
        aktiivsemaid esinejaid Riia underground-klubides ja resident klubis
        Serviss. Ta korraldab pidusid ja reive klubides/mitteklubides ja vabas
        õhus ning kutsub sinna esinejaid kogu maailmast. Ta on esinenud
        festivalidel Kometa, Underfestival ja Sansusi Lätis ning mitmel pool
        välismaal. Nina osaleb kohalikus skeenes eri nurkade alt, täiendades oma
        teadmisi muusika produtseerimise, live-settide ja audiovisuaalsete
        installatsioonide vallas. Ta osaleb ka mitmetes otsesaadetes, näiteks
        Erica Synths Garage ja RTS FM platvormidel. Tema DJ-setid loovad
        dünaamilise segu elektroonilise muusika alažanritest, pannes kokku
        eksperimenteerimise, kulgemise, toored biidid ja sünteetilised
        helimaastikud. Iga koht ja üritus on ainulaadne ning ta otsib alati
        rõõmuga uusi helisid ja plaate, millega rahvast liikumas hoida.
    description_en: "**Doris Hallmägi**  \n“How They Used to”  \n2020  \n\nHow They Used to focuses on the female electronic music pioneers that inspired the artist with their works and techniques.  \n\n**Doris Hallmägi** began making electronic music by using digital means. While studying at the music academy, she became a member of the electronic music group EMA, where she took an interest in modular synthesizers. She was attracted to the unpredictable sounds that can be conjured out of analogue synthesizers. How They Used to includes references to the works of Daphne Oram, Delia Derbyshire, Eliane Radigue, Laurie Spiegel, Suzanne Cianni and other female pioneers.  \n\nDoris Hallmägi graduated from the Estonian Academy of Music and Theatre in 2018 with a degree in electro-acoustic composition. She is part of the ensemble of the Estonian Electronic Music Association. Doris is interested in both acoustic as well as electronic music, using both digital as well as analogue instruments. She has written works for smaller instrumental ensembles, symphony orchestras and electronic instruments. Although she has previously performed with her electronic works, this is her first major solo performance.  \n\n**Nicolas Buzzi**  \n“Us”  \n2020\n\nquadraphonic composition for Buchla synthesizer  \n\nThe voice is a hybrid of body and atmosphere, it is time-based, moves through space, it comes from an incredibly precise organ. It is as personal as the tip of a finger and, better than a stone's throw, is able to reach suitably distant people. The voice is an interface between the body and the outside world. An attempt of the body to expand its materiality.\n\nThe voice activates the material surrounding us, sets particles in vibration to send out what the person speaking or singing wants to communicate. The voice can thus reach other bodies, which in turn can transform the vibration of the material around them into information. If these bodies decide to join in, to sing along or to speak, a choir is formed and with it a sound body, which itself can be understood as an entity. Through the voice as an expanding, connecting element, from a group of people - clearly distinguishable from the eye as independent persons - a body is created, through the consensus of synchronicity. Until a voice begins to solicit.\n\nIn Us **Nicolas Buzzi** uses findings from the psychology of perception to combine elements into a whole, a world of sound that surrounds the audience. In the reverse, the same parameters (of shape separation) allow individual elements to gradually break out of this whole, to demonstrate their independence. In this way, the one-hour work creates an alternating bath between unison and wild polyphony, between isolation and swarm.\n\nNicolas Buzzi is a Zurich-based composer/performer and artist in the fields of electronic and electroacoustic music for concerts, installation art, performance, film and theatre. In 2019 he completed his master's degree in Electroacoustic Composition with Germán Toro-Pérez.\nHis often collaborative, space-oriented works are always close to the materiality of sound and its production. Thus the treatment of acoustic phenomena and the construction of specialized instruments is an integral part of his practice, which has led to the development of several instruments based on acoustic feedback, a variety of specialized software applications, kinetic-acoustic systems and experimental loudspeakers. The formalization of random processes and the intuitive access to sound and musical structure are, often paired with an elaborate temporal structuring of sequences, recurring elements of his work.\nHis works, respectively works with his artistic participation, have been shown at Taylor Macklin Zurich, Kunsthaus Bregenz, HEK Basel, Istituto Svizzero di Roma, Walcheturm Zurich, at Fri-Art Fribourg, at the Schauspielhaus Zurich, at the SIGNAL Art Gallery (NYC), at the HKW Berlin, at ZKM Karlsruhe, at the Locarno Film Festival, at the Kölnischer Kunstverein, at Kampnagel Hamburg, the NUS Museum Singapore, the Venice Architecture Biennale, and the São Paulo Architecture Biennial among others.\n\n\n**DARKSIDE**\n\nAs a live artist, **Darkside** is using an approach he himself calls synth tripping, where pre-programmed patterns mix with those created in the spot, making every performance pretty much unique.\nDuring his performances, the only requirement for the audience is to feel relaxed and great and enjoy the chance to spend time in the great synthesizer cosmos.\nThe style of these synth trips also cover quite a wide range, they can blend together several forms of electronic music in a non-stop key and surprises are possible. When it comes to technology, Darkside prefers analogue but still finds a spot for some digital instruments – and naturally, the modular is not missing.\nAs his machinery is quite extensive and varied, and is constantly being expanded and changed often, a more or less different setup is the deliberate goal for every performance.\nDarkside is a Martian synth nerd who connects with people through machines much better and in a more real way than through direct communication. There are no stylistic or sound boundaries, however, rhythm and melody are primary, and as long as they exist, you can take it easy with everything else.\n\n\n**Nina Elektrichka**\n\nIn the live performance focusing on modular synthesis **Nina Elektrichka** explores how voice modulations and transmitted signals interact with body frequencies, neurons, atmosphere and the space itself. She combines unearthly electronic delights rich in pulsating to punchy drum machine rhythms, interstellar vibes and melodies in an experimental synergy that becomes intimate and unpredictable on the way.\L\n\nAs a DJ Nina has been performing since 2008 and is today one of the most active performers in Riga's underground hotspots and resident at the club Serviss. She hosts own parties and raves at club/non-club and open air venues inviting artists from around the world. She has performed at festival Kometa, Underfestival, Sansusi in Latvia as well as multiple venues abroad. Nina contributes to the local scene from different angles, extending her knowledge in music producing, live sets and audio-visual installations. She also participated in several Live stream broadcasts, among them on Erica Synths Garage and RTS FM platforms. Her Dj sets merge a dynamic blend of electronic music subgenres blending with experimentation, flow, raw beats and synthetic soundscapes. Every place and every event is unique and she's always thrilled digging for new sounds and records that keep the crowd moving."
