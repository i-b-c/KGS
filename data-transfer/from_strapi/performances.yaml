    description_et: >-
        Ilu ja valu, grotesk ja fetišism. Kosmos ja keha. <br />

        Abstraksed märksõnad milest püüda leida narratiivset vormi, punuda
        sellest visuaali, filmi. 

        Lähtekohaks on film kui meedium teatris. Teatri vahenditega ja live
        keskonnas.<br />

