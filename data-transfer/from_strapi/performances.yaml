    description_et: >-
        Duo strøm on tegutsenud juba 15 aastat, olles Šveitsi üks huvitavamaid
        ja pikemaealisemaid oma valdkonnas. Nende instrumentaariumi moodustavad
        analoog- ja digitaalsed efektid, protsessorid, laptop. Pealtnäha lihtne
        setup kätkeb endas mitmeid riske, sest elektrooniline maailm kipub
        aeg-ajalt oma elu elama.<br />

        <br />

        <strong>Gaudenz Badrutt</strong> alustas oma karjääri kaasaegset
        klassikalist muusikat mängiva pianistina, kuid on nüüdseks juba 15
        aastat tegutsenud vaba improvisatsiooni ja eksperimentaalmuusika
        valdkonnas.<br />

        Tema koostööpartnerid on olnud Morishige Yasumune, Bertrand Gauguet,
        Ilia Belorukov, Naoya Murata, Strotter Inst., Michael Vorfeld,
        Jean-Philippe Gross, Toshimaru Nakamura, Hans Koch, Jonas Kosher jpt.<br
        />

        <br />

        <strong>Christian Müller</strong> on Baseli lähedalt pärit klarnetist ja
        elektronmuusik. Tema varasemad koostööpartnerid on Martin Schütz, Hans
        Koch, Michel Doneda, Le Quan Ninh, Jonas Kosher jpt.<br />

        <br />

        <a href="http://www.shizophonic.ch">www.shizophonic.ch</a><br />

        <br />

        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.<br />

        <br />

        <a href="http://www.improtest.ee">www.improtest.ee</a><br />

        <br />
    description_en: >-
        Strøm are Gaudenz Badrutt (electronics) and Christian Müller
        (electronics). They are working together for 15 years and have played
        numerous concerts all over Europe and realized many musical and
        interdisciplinary projects. The artistic practice of the Swiss duo is
        first and foremost syncretic: it recombines free improvisation with
        conceptual music, contemporary music ideas with noise explosions,
        minimalism and drone, construction with disruption. A massive amount of
        effects pedals, two computers used as live samplers and loads of cables
        and switches are the duo's machinery: an instrument with a life on its
        own to play with the unpredictable. The electronics does not only
        influence the sound itself, but also the musicians in their play.
        Without being awake, alert and fast it doesn't work. Without not knowing
        where to end up, they don't even start.<br />

        <br />

        <strong>Gaudenz Badrutt</strong> began his career as a pianist in the
        field of contemporary classic music and spent the past 15 years as an
        electronics musician in the field of improvised, experimental music. He
        is best known in current times as an improvising electronics musician
        using computers (sampling) and various other electronic apparatus.
        Filigree, minimal noises, drones and dense structures are key
        characteristics of his music. Central to Badrutt’s activities are the
        working-band duo strøm with Christian Müller (electronics), the duo with
        Hans Koch (bass clarinet, sopranosaxophone) and the duo with Jonas
        Kocher (accordion). He is further occupied in the fields of electronic
        composition and sound &amp; video installation.<br />

        Gaudenz Badrutt has collaborated with Morishige Yasumune, Bertrand
        Gauguet, Ilia Belorukov, Naoya Murata, Strotter Inst., Michael Vorfeld,
        Jean-Philippe Gross, Toshimaru Nakamura, Diatribes, FM Einheit et al.
        with concerts at home and abroad, including at the Festivals Sound
        Reasons 2015 in India, Musikfestival Bern 2015, Vertical Collisions and
        Irtijal Beirut 2015, Croisements Kagoshima 2014, Airegin/Improfestival
        Yokohama 2013, SwissMusicDays Belgrade 2013, Zwei Tage Zeit Zürich 2012,
        Terrains Basel 2011, Influx Toulouse 2011, Transmediale Berlin 2009,
        Zoom in Bern 2008, Rue du Nord Lausanne 2008, Norberg Festival (Sweden)
        2006, Taktlos/Tonart Bern 2006. Gaudenz Badrutt lives as a freelance
        musician in Biel (Switzerland).<br />

        <br />

        <strong>Christian Müller</strong>, born in 1971 near Basel, Switzerland,
        is clarinettist and electronic-musician. He completed his classical
        studies at the Conservatory for Music &amp; Theater Berne in 1996 with a
        teacher's diploma and in 1998 with a Reifediplom (Master).<br />

        He collaborates and has collaborated in diverse constallations for
        concerts and multimedia-based works, a. o. with the musicians Martin
        Schütz, Hans Koch, Tomas Korber, Diatribes, Jonas Kocher, Burkhard
        Beins, Clayton Thomas, Oren Ambarchi, Bertrand Gauguet, Michel Doneda,
        Flo Götte, Norbert Möslang, Günter Müller, FM Einheit, toktek, Simon
        Berz, Nicole Johänntgen, Peter Conradin Zumthor, Lionel Friedli, Lê Ninh
        Quan, Strotter Inst., dieb13, Susanna Gartmayer, Patricia Bosshard, Loïc
        Grobéty, Yan Jun, Yan Yulong, Cristián Alvear, Sergio Merce, Loenel
        Kaplan, Federico Barabino, Fernando Perales etc.<br />

        <br />

        <a href="http://www.shizophonic.ch">www.shizophonic.ch</a><br />

        <br />

        Improtest is concert series that brings improvisational music from local
        and foreign authors to local audience. The concerts have been taking
        place since 2005 once a month.<br />

        <br />

        <a href="http://www.improtest.ee">www.improtest.ee</a><br />

        <br />

        Artists: <strong>Gaudenz Badrutt</strong> – elektroonika,&nbsp;
