    description_et: >-
        Sakraalsed ruumid ja formaalne koreograafia.<br />

        <br />

        Kontrollitud tehnika ja nõrkuse võimendamine.<br />

        <br />

        Need ei ole personaalsed sisekaemuslikud märksõnad, vaid funktsionaalsed
        vahendid töötamiseks.<br />

        Seisund ja disain ehk hakkama saamine.<br />

        <br />

        **Karl Saks** on vabakutseline koreograaf ja tantsija. Hetkel õpib EKA
        uusmeedia magistriprogrammis, teeb kaasa Maroko koreograafi Radouan
        Mriziga lavastuses “3600” ja tegeleb aktiivselt heliloomega Cubus
        Larviku kaitsva müüri taga.<br />

        <br />

        Residentuuri toetab: Eesti Kultuurkapital<br />
    description_en: >-
        Sacral spaces and formal choreography.<br />

        <br />

        Controlled technique and amplification of weakness. <br />

        <br />

        Above mentioned are not notes of inner investigation but functional
        tools for working.

        State and design is coping. <br />

        <br />

        **Karl Saks** is freelance choreographer and dancer. He is currently
        studying at Estonian Academy of Arts new media masters program,
        participating in the performance “3600” by choreographer Radouan Mriziga
        and actively creating sound under the name of Cubus Larvik. <br />

        <br />

        Residency is supported by: Eesti Kultuurkapital<br />
