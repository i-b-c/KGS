    description_et: >-
        Esa Pietilä on loov ja mitmekülgne soome saksofonist, kes tunneb ennast
        võrdselt hästi kodus nii kaasaegses kammermuusikas (seda nii esitaja kui
        heliloojana) kui ka jazz- ja vabaimprovisatsioonilises muusikas. Ta on
        esinenud  mitmel pool Euroopas, USAs, Austraalias, Brasiilias ja mujal
        ning tema ansamblipartneriteks on olnud Paal Nilssen-Love, Mark Helias,
        Christoph Baumann, Rauol Björkenheim, Mikko Innanen, Jaak Sooäär jpt.
        Samuti väärib esiletoomist tema koostöö dirigent Esa-Pekka Saloneni &
        Avanti! Kammerorkestriga ja Zagros Ensemblega. Esa üks hiljutisi
        projekte - Liberty Shipi CD “Approaching” on pälvinud mitmeid auhindu ja
        leidnud sooja vastuvõtu muusikakriitikute poolt.  
            
        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.
    description_en: >-
        Esa Pietilä is a very versatile saxophone player working in the fields
        of contemporary chamber music, modern jazz and free improvised music. He
        has played around Europe, USA, Asia and collaborated with numerous jazz
        and impro players like Paal Nilssen-Love, Mark Helias, Christoph
        Baumann, Rauol Björkenheim, Mikko Innanen, Jaak Sooäär and many
        others.  
          
        Improtest is concert series that brings improvisational music from local
        and foreign authors to local audience. The concerts have been taking
        place since 2005 once a month.
