    description_et: >-
        Märtsis aastal 2014 otsustasid Eesti teatrid, et Eesti Vabariigi
        sünnipäevaks kingitakse suurejooneline lavastusprojekt, kus tuuakse
        publiku ette vabariigi sajandi lugu ja mille raames 24 teatri osavõtul
        sünnib aasta jooksul – sügisest 2017 kuni kevadeni 2018 – 12 lavastust.
        Teatrid loosisid partnerid ja jagasid omavahel kümnendid. Rahvusooperil
        Estonia ja Kanuti Gildi SAALil tuleb ühiselt kajastada 60.–70.
        aastaid.<br />

        <br />

        Partnerite ühise otsusena tuuakse lavale ooper, mille osatäitjad on
        praeguseks juba valitud ja lavastusprotsess hoogsalt käimas. Libreto ja
        muusika avastati novaatorliku teadlase ja leiutaja Manfred MIMi
        käsikirjade hulgast. 60ndatel, kui Manfred MIM partituuri kirja pani,
        polnud olemas tehnilisi võimalusi nii keeruka projekti teostamiseks.
        Nüüd on. Esialgselt võib vaid öelda, et uuringud, mida Manfred MIM
        libreto loomisel läbi viis, tõestavad eksimatult, et elu Eestimaal on
        alguse saanud Kaali meteoriidi kukkumisest Saaremaale.<br />

        <br />

        Kanuti Gildi SAALis toimub ooperi „Eesti ajalugu. Ehmatusest sündinud
        rahvas“ esmaesitlus, kus tutvustatakse koostööd ja projekti üldiselt.
        Esitletakse Manfredi 3D noodikirja ning saab kuulda ka muusikat.
        Näidatakse videosalvestust juba toimunud ettevalmistustest.<br />
    description_en: >-
        In March 2014 Estonian theatres decided to make a gift for Estonia 100
        jubilee year and create a big performance project that stages a story of
        a century of the republic and that will culminate with 12 performances
        from fall 2017 to spring 2018 in collaboration with 24 theatres.
        Theatres raffled and shared decades and Estonian National Opera and
        Kanuti Gildi SAAL share the decades 60's and 70's. <br />

        <br />

        Partners decided on staging an opera and the process is already on full
        speed. Libretto and music was discovered from the scripts of innovative
        scientist Manfred MIM. During the 60's when Manfred MIM wrote the
        partiture there was no technical opportunites to carry out such a
        difficult project. It is possible now. For the time being we can say
        that life in Estonia has begun with the fall of Kaali meteorite on
        Saaremaa. <br />

        <br />

        At Kanuti Gildi SAAL will take place the first presentation of the opera
        “Estonian History. A Nation Born of Shock”. There will be a presentation
        of Manfred's 3D musical scores, video materials and preparations of the
        project.
