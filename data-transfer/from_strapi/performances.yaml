    description_et: >-
        Melbourne’i kuningliku tehnikainstituudi innovatsiooniprofessor Leon van
        Schaik edendab kohalikku ja rahvusvahelist arhitektuurikultuuri. Tema
        uurimus keskendub uuenduslike praktikutest koosnevate kogukondade
        loomisele ja toetamisele. Tema arhitektidele ja disaineritele mõeldud
        praktikapõhise uurimuse programmist on saanud murranguline uuendus
        arhitektuurihariduses üle maailma ja oluline eeskuju uurimisasutustele.
        See lähenemine tunnistab innovaatilist arhitektuuripraktikat iseseisva
        uurimistööna, ning mõjutab seeläbi tugevalt praktika mõistet
        akadeemilises kontekstis. Van Schaik on tunnustatud esimese Neville
        Quarry arhitektuurihariduse autasuga ning on nimetatud Austraalia Ordu
        ohvitseriks teenete eest arhitektuuris ja hariduses. 2015. aastal andis
        Wiley välja tema viimase raamatu “Practical Poetics in Architecture”.<br
        />

        [www.leonvanschaik.com](http://www.leonvanschaik.com/)<br />

        <br />

        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhi- tekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile.
    description_en: >-
        Professor Leon van Schaik, Innovation Professor of Architecture at the
        Royal Melbourne Institute of Technology, promotes local and
        international architectural culture. His research focuses on creating
        and sustaining innovative communities of practice. His practice-based
        research programme for architects and designers has become a ground
        breaking innovation in architectural educa- tion worldwide and an
        important template for research institutions. This approach considers
        innovative architectural practice as research in of itself, and has
        far-reaching consequences for how we view architectural practice in an
        academic context. Van Schaik was awarded the inaugural Neville Quarry
        Prize for Archi- tectural Education and has been recognised an Officer
        (AO) in the General Division of the Order of Australia for his services
        to both architecture and education. His most recent book, Practical
        Poetics in Architecture, was published by Wiley in April 2015. <br
        />[www.leonvanschaik.com](http://www.leonvanschaik.com/)<br />

        <br />

        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment.
