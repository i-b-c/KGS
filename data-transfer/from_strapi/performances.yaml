    description_et: >-
        "us as a useless duet" on tantsulavastus, mis on mõeldud kahele
        inimesele. Mina olen üks neist ja teist ma veel ei tea. See on peaaegu
        nähtamatu duett, mida kogevad ainult need, kes selles osalevad. See
        projekt koosneb viiest sessioonist, jaotatud viie nädala peale.
        Paljudele on see tõesti pikaajaline pühendumus. Iga kahetunnisel
        sessioonil peavad mõlemad osalejad tegema ühe ettepaneku. Me ei tea
        kumbki, mis hakkab juhtuma: see duett, mille koos loome endale, on meie
        mõlema soovide põimumine ja vastuseis. Me tantsime koos , kuid me ei loo
        koos uurimistööd. See ei ole loovusharjutus, see on võimalus kaotada
        ennast tantsu käigus.<br />

        <br />

        Tantsuprojekt "us as a useless duet" on olnud Kanuti Gildi SAALis 11.
        juulist kuni 12. augustini 2016. aastal. Selle perioodi jooksul on
        toimunud igal nädalal neli kahetunnist seanssi kahele inimesele ja nüüd
        on need lõppenud. Seda, mis juhtus nende sessioonide ajal, ei saa me
        jagada, kuna need on loodud ainult meile endile. Duetid kuuluvad
        pikemaajalisse ja käivasse kohtumiste jadasse, mis paneb proovile tantsu
        kui teisiti koosolemise vormi. Küsida endalt, mida me sellest
        kogemustest kaasa võtsime ning milleks need muunduvad pärast meie
        kohtumisi.<br />

        <br />

        Ootame teid Kanuti Gildi SAALi 11. augustil kell 19:30, et jagada oma
        muljed, kogemusi ja mõtteid kirjeldatud protsessi ja kohtumiste kohta.
        Tahame muuta need ideed ja mõtted ka teistele ligipääsetavaks.
    description_en: >-
        "us as a useless duet" is a dance performance by and for two people. I
        am one and the other I do not know yet. It is an (almost) invisible
        performance, seen only by us who are dancing it. The piece is composed
        of five sessions, dispersed throughout five weeks. And yes, for some
        people this is already a long-term commitment. In each two-hour session
        both of us has time to make a proposal. We don’t know in advance what
        will happen: this duet that we make together and for ourselves is a
        negotiation between two desires. We dance together, and we research
        nothing. This is not a creativity exercise; it is the risk of losing
        ourselves.<br />

        <br />

        "us as a useless duet" has been in Kanuti Gildi SAAL from the 11th of
        July to the 12th of August 2016. Four one-to-one duets have taken place
        once a week during this period and now they are coming to an end. What
        has happened in these dances cannot be shared, they are made for no
        audience, they were made for the two of us. The duets are embedded in a
        broader and ongoing series of encounters that want to test the supposed
        potential of dance for making us be together otherwise. And to find out
        what stays with us and eventually transforms us after having met the
        other.<br />

        <br />

        As a closing event we would like to expand the accessibility of these
        dancing encounters and try and give insights into our meetings and our
        thoughts on the process. You are welcome to Kanuti Gildi SAAL on
        Thursday the 11th of August at 7:30 to share a few drinks and traces
        with us.
