    description_et: >-
        Curva Minore piccolo ensemble on kolmeliikmeline nüüdismuusikat,
        eksperimentaalmuusikat ja vabaimprovisatsiooni viljelev grupp
        Sitsiiliast, Palermost


        **Lelio Giannetto** muusikutee algas jazzimängijana, kust ta tasapisi
        liikus edasi barokkmuusika, nüüdismuusika ja radikaalsemate
        improvisatsioonivormide poole. Tema arvukate koostööpartnerite seast
        leiab muusikuid nagu:  Joëlle Leandre,  Butch Morris, Thomas Lehn, Barre
        Phillip jpt

        Lelio on ka nüüdis- ja eksperimentaalmuusikale pühendunud, 1997. aastal
        Sitsiilias asutatud  organisatsiooni Curva Minore juht


        **Alessandro Librio** teeb Curva Minorega koostööd aastast 2005.
        Alessandro koostööpartnerid muusikas on teiste hulgas olnud näiteks
        Patti Smith, Peter Evans, Barre Philips, Wim Wenders jpt


        **Benedetto Basile** erihuviks on Butch Morrise loodud improvisatsiooni
        dirigeerimissüsteem. Sel moel dirigendina on ta koos töötanud arvukate
        improvisatsioonikoosseisudega. Tema koostööpartnerite seas on näit. John
        Butcher, Michel Doneda, Christopher Dell, Silke Eberhard, Ulrich
        Gumpert, Sebastian Gramss, Christian Kobi jpt


        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.
