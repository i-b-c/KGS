    description_et: >-
        „Made in Estonia maraton on justkui vastupanuruum, kus tasakaalustatakse
        valitsevaid kultuuritöö mustreid, asetatakse rõhud valmistoote
        lõplikkuse asemel vahevariantidele, harjutatakse publikuna empaatiat ja
        solidaarsust.“ (Maarin Mürk, Sirp, 20.04.2018 „Fännikiri Made in Estonia
        maratonile”)


        Etenduskunstide pühadeaeg on käes! Etenduskunstide THE GOOD, THE BAD,
        THE UGLY - lühivormide festival Made in Estonia maraton - tuleb sel
        aastal 16. märtsil, et anda võimalus kõigile, kes soovivad katsetada
        uusi ideid, panna ennast proovile publiku ees või lihtsalt tulla
        vaatajana osa saama ühest erakordsest õhtust. Hoolimata ürituse nimest
        pole tegemist võistluse vaid ühisüritusega, mille loovad need, kes
        laval, lava taga ja saalis.
          
        Meil on äärmiselt hea meel teatada, et seekord astuvad maratonil üles ja
        jagavad oma loomingut: Elina Masing, Sigrid Savi, Karolin Poska, Katrin
        Kreutzberg, Üüve-Lydia Toompere, Siim Tõniste, Raho Aadla, Joosep
        Jürgenson ja Maria Lee Liivak, Liis Maria Kaabel ja Matthias Kann, Edgar
        ja Marta Vunsh, Henri Hütt, Andre Joosep Arming ja Karl-Christoph
        Rebane, Laura Kõiv, Rait Rosin, Ryan Galer, Keithy Kuuspu, Ragnar
        Uustal, eleOnora, Karoline Suhhov, Vishnu Vardhani Rajan, 10 x 10
        meetrit, Sylvia Köster, Brite Vilgo, Liina-Mai Püüa jt.
    description_en: >-
        “Made in Estonia marathon is like a resistance space, where the cultural
        patterns are balanced, the emphasis is rather placed on the intermediate
        options than on the ready-made-creation and people as an audience
        exercise empathy and solidarity.”  (Maarin Mürk, Sirp, 20.04.2018 “Fan
        letter to the Made in Estonia marathon”)


        Performing arts holidays are upon us! Performing arts THE GOOD, THE BAD,
        THE UGLY – short format festival Made in Estonia marathon – is coming on
        the 16th of March, to offer the chance for those who want to test out
        new ideas, perform in front of large audience or simply come and enjoy
        an extraordinary evening. In spite of the event name, it is not a race,
        but a joint celebration for those who are on and off stage.


        Evening programme like always is not curated and at this moment unknown,
        that means everybody can still send their ideas - on the condition that
        the performance is an original creation, has not been performed before,
        is maximum 15 minutes long and technically possible.  
          
        We are pleased and happy to announce the performers and creators of this
        years maraton: Elina Masing, Sigrid Savi, Karolin Poska, Katrin
        Kreutzberg, Üüve-Lydia Toompere, Siim Tõniste, Raho Aadla, Joosep
        Jürgenson ja Maria Lee Liivak, Liis Maria Kaabel ja Matthias Kann, Edgar
        ja Marta Vunsh, Henri Hütt, Andre Joosep Arming ja Karl-Christoph
        Rebane, Laura Kõiv, Rait Rosin, Ryan Galer, Keithy Kuuspu, Ragnar
        Uustal, eleOnora, Karoline Suhhov, Vishnu Vardhani Rajan, 10 x 10
        meetrit, Sylvia Köster, Brite Vilgo, Liina-Mai Püüa jt.
