    description_et: "Liustiku raskus oli lasunud maal aastatuhandeid. Kui päikese kannatlik kiirgus jõudis uuesti valge raskuse pinnale, muutusid kunagised orud fjordideks ja looded voolasid jõgedena üle maastiku. Peagi naasid vesi-inimahvid. Nad ehitasid asulaid endistele mäetippudele, mida nüüd ümbritses vesi. Inimahvide kehad olid raskes vees aeglased. Ent koos vee raskusega tuli ka ujuvus. Vesi-inimahvid avastasid, kuidas tulega hiiglaslikke puid õõnestada. Nad valmistasid tihedal veel ujuvaid nõgusaid taskuid. Peagi õppisid nad sõitma nende hiiglaslike õõnsate vormidega deltadel ja märgaladel. Ujuvad vormid muutusid suuremaks, kui inimahvid saavutasid nende ehitamisel meisterlikkuse ja õppisid kasutama neid kõige vedamiseks, mis on veest raskem. Kaugetest kivimurdudest nihutasid nad suuri kivipanku, langetades neid madalasse vette. Nüüdseks suurteks kivirahnudeks muutunud moodustised tõusid aeglaselt veest ja koos inimahvide aregu ning tõusva maaga kadus piirkonnas mälestus leviteerimisest.\LTerve igaviku hiljem rakendasid inimahvid vee valguseks muundamise võimalikkust. Betoonist hiidehitistesse kogunes vett, mis teisenes puhtaks energiaks. Energia muutus teabeks, mis kulges valgusimpulssidega ookeanide all, teostades kõikjal planeedil looja tahet.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Vee isandatest said nüüd valguse isandad.\L\L<br />\n<div style=\"text-align: center;\">\n\tVahtu mähitud kvantvaht<br />\n\t\Lmoodustab vorme<br />\n\t\Lelustunud tühjusest<br />\n\t\LKilpkonnad alla välja.<br />\n\t\LPindpinevusest piiratud tumeainemullid.<br />\n\t\LIga kera on oma tegelikkuse vikerkaarepeegeldus.<br />\n\t\LHooletult<br />\n\t\Lilmalikes tegelikkustes<br />\n\t<br />\n\thävinud tulevike<br />\n\t\Lprojitseeritud paralleelid\L</div>\n<br />\n<strong>Kolbeinn Hugi</strong> on 1979. aastal Reykjavíkis sündinud saareelanikust kunstnik, kelle põlvkond tõusis esile kaasaja kõledas uuskapitalistlikus Reykjavíkis kunsti ja kunstnike vahelise kataklüsmilise suure lõhe kiiluvees.<br />\nKolbeinn on töötanud välja keeruka audiovisuaalse keele, kasutades juhuslikke materjale, veevahtu, kangaid ja kihilisi sünteesitud helimaastikke. Tema loomingus moodustavad rituaalse süsteemi püramiidide ja teemantide visuaalsed motiivid. Tema praktikas, kus keha kasutatakse ideede tööriista ja kandjana, kordub teostes absurdsete tegelikkuste, unenäoruumi, utoopiliste projektsioonide ning inimese tänapäevase irdumise ja keskkonnast võõrandumise temaatika.<br />\nKolbeinniga võttis ühendust Edgar Cayce mitteametlike unenäo-olekuliste transside käigus, mille suur magav selgeltnägija tekitas pärast oma 1945. aastal toimunud surma. Transis olles omandas ta Tähepaviljoni püstitamise ajal Cayce'i fantoomskulptuuridega seostatud terava aja- ja ruumitunnetuse.<br />\nKolbeinni looming on lihtne, ei vaja selgitamist ja on suunatud südamele, mitte peale.<br />\nTema loomingut on eksponeeritud laialdaselt näitustel läänemaailmas ja seda säilitatakse Islandi Rahvusgalerii kogus.<br />\n<a href=\"http://kolbeinnhugi.net\">kolbeinnhugi.net</a>\n.<br />\nKolbeinn Hugi installatioon avatud 01.-04. novembril . Toimuvad ette teada ja ette teatamata aktsioonid."
    description_en: "The weight of the glacier had pushed the land down over millennia. As the sun’s patient radiation reached the surface of the white weight again, what had in the past been valleys became fjords and tides flowed as rivers across the landscape. Soon the aquatic apes returned. Building settlements on former mountain peaks, now surrounded by water. The apes’ bodies were slow in the heavy water. But with the weight of the water came buoyancy. The Aquatic Apes discovered how to hollow giant trees with fire. Making concave pockets that floated on the dense water. Soon they mastered riding on the deltas and wetlands in these giant hollow shapes. The floating shapes got bigger as the apes mastered building them and they learned to use them to carry anything that was heavier than water. They moved large monoliths from distant quarries lowering them down to shallow water. The now megalithic structures slowly rose from the water and as the apes evolved with the rising land, the memory of levitation in this region disappeared. \L\LEons later the apes harnessed the ability to transform water into light. Giant concrete structures gathered water and altered it into pure energy. The energy became information that rode on pulses of light beneath the oceans, performing its creator’s will anywhere on the planet. <br />\nThe masters of water were now the masters of light.\L\L<br />\nQuantum foam wrapped in foam<br />\n\Lforming shapes<br />\n\Lof animated emptiness<br />\n\LTurtles all the way down.<br />\n\LBubbles of dark matter, contained by surface tension.<br />\n\LEach sphere a rainbow reflection of its own reality.<br />\n\LProjected parallels<br />\n\Lof destroyed futures<br />\n<br />\nby carelessly<br />\n\Lmundane realities\L<br />\n<br />\nBorn in 1979 in Reykjavík, Kolbeinn Hugi is an island dwelling artist of a generation that emerged in the wake of the cataclysmic great rift between art and artists in the bleak neo-capitalist Reykjavík of modern times.<br />\nKolbeinn has developed a complex audiovisual language, using found materials, water-foam, fabrics and layered synthesized soundscapes. Visual motifs of pyramids and diamonds create ritualistic system within his work. Often using the body as a tool or a vehicle for ideas within his practice, recurring themes within his works have included, absurd realities, dream spaces, utopian projections and man’s modern day disconnect and systematic alienation from the environment.\nKolbeinn was contacted by Edgar Cayce in the informal setting of dream state trances established by the great sleeping medium after his death in 1945. There, he absorbed the acute sensibility to time and space associated with Cayce’s phantom sculptures as set up in his Astral Pavilion.<br />\nKolbeinn’s work is simple work that doesn’t need explanation and aims for the heart, not for the head.<br />\nHis work has been exhibited widely around the western world, and is preserved in the collection of the National Gallery of Iceland.\n[kolbeinnhugi.net](http://kolbeinnhugi.net/)"
