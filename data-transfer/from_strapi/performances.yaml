    description_et: >-
        “Mida ma teen siis, kui mind juhib lihtsustatud vormide all peidus olev
        kompleksne pimedus...??”, küsib Jaak Sikk.  
           
        Jaak Siku jaoks on improvisatsioon antielitaristlik – iga inimese vahetu
        reaktsioon läbi improvisatsiooni iseloomustab selle indiviidi unikaalset
        ja ainulaadset reaalsust. Ja sellest tuleb Jaagu arvates lugu pidada.  

        Analüüs ja ratsionaalne mõtlemine on seotud prefrontaalse kortekstiga
        ajus, mis on ühtlasi ka aju kõige aeglasem ja hiljem välja arenenud osa.
        Kui impulss tegutsemiseks rakendub kiiremini, kui prefrontaalse korteksi
        poolne analüüs, hakkavad juhtuma huvitavad asjad…  
           
        Kontekst on Jaagu arvates partituuride partituur.  
          
        Jaak Siku lavapartnerite hulka kuuluvad: Sergio Castrillon, Agusti
        Fernandez, Kirke Karja, Vlady Bystrov, Harri Kuusijärvi, Katri Tikka,
        Natalia Castrillon, Laura Põldvere, Libero Mureddu, Una McGlone,
        Alistair McDonald, Fredrik Brandstorp Olsen, Milda Sokolovaite, Dana
        Indane, Juan Fran Cabrera, Farištamo Eller jpt.  
          
        Kontserdil kõlab Bohlen-Pierce süntesaator, mille on programmeerinud
        Hans-Gunther Lock.   
          
        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.
    description_en: >-
        “What will I do when I’m guided by the hidden complex darkness under
        simplified forms…??” asks Jaak Sikk.  
          
        For Jaak Sikk improvisation is anti-elitist – each person’s firsthand
        reaction through improvisation characterizes that individuals’ unique
        and one-of-a-kind reality. And in  Jaak’s opinion one must respect
        this.  

        Analysis and rational thinking is connected to the prefrontal cortex in
        the brain, which is the slowest and most recently developed part of the
        brain. If the impulse to react applies sooner than the analysis in the
        prefrontal cortex, interesting things are about to happen.  
           
        From Jaak’s viewpoint context is the score of scores.  
          
        Jaak Sikk stage partners include: Sergio Castrillon, Agusti Fernandez,
        Kirke Karja, Vlady Bystrov, Harri Kuusijärvi, Katri Tikka, Natalia
        Castrillon, Laura Põldvere, Libero Mureddu, Una McGlone, Alistair
        McDonald, Fredrik Brandstorp Olsen, Milda Sokolovaite, Dana Indane, Juan
        Fran Cabrera, Farištamo Eller etc.  
          
        Jaak Sikk is performing at the concert on Bohlen-Pierce synthesizer,
        which is programmed by Hans-Gunther Lock.  
          
        Improtest is a concert series that brings improvisational music from
        local and foreign authors to local audiences. The concerts have been
        taking place since 2005 once a month.
