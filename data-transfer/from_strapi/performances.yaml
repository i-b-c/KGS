    description_et: >-
        Viimasest asjast jäi küünte alla ainult pisut mulda. Nüüd kahlan
        antropoloogilistel eelkaevamistel läbi karvadega segunenud kiviprügi.

        Nii palju kiviprahti! Ei oleks osanud ette näha, kui palju kiviprahti
        tuleb ja kui palju tööd selle eluka äratamisega enda jaoks tekitan. Aga
        äratamist oli vaja. Olen näinud silmi ning käin nüüd ringiratast
        hüpeldes ringi, õrnalt jäsemeid tõstes ja tema lõhna ninna tõmmates.
        Milline on kellegi ülekülluse lõhn, keda oled terve elu vältinud? Mida
        teha kehaga? Järjekordne teaduseksperiment. Järjekordne polügoon, kus
        katsetada mulle kuuluvaid nahku, riietuse komplekte ja ideid, mis on
        võib-olla peale surutud või ka mitte. (Dana Michel)<br />

        <br />

        “Micheli poeetiline suhe asjadega on rõhutatud. Ta uurib kujusid ja
        materjale, leiutades skulpturaalseid vorme uuesti plastide, elastsete
        materjalide ning tainaste kujul. Tema looming lõikab radu läbi vildi,
        kogeledes veenvalt etenduskunsti liikuvates registrites. Tema etendused,
        mis on nii vaimukad kui ka sotsiaalselt nutikad, lõdvendavad tundmusi.
        Ta hoiab tagasi keha kontuure (viivitades visuaalset tuvastust),
        taotledes samas läbipaistmatuse metamorfset ulatust. “Mercurial George“
        vibreerib – vibreerib ikka veel minuga.“ (Allikas: VK Preston,
        etenduskunstiteadlane, Browni Ülikool / Toronto Ülikool)

        <br />

        <br />

        **Dana Michel** on koreograaf ja etenduskunstnik, kes elab Montréalis.
        Enne Concordia Ülikooli lõpetamist kaunite kunstide bakalaureusekraadiga
        kaasaegse tantsukunsti alal, kui ta oli 20. eluaastates, tegutses ta
        turundusjuhi ning jooksja ja jalgpallurina, osaledes ka võistlustel.
        2011. aastal sai ta danceWEBi stipendiumi (Viin, Austria) ja on hetkel
        resideeruv kunstnik tantsukompaniis DanceMakers (Toronto, Kanada) ning
        loomekeskuses Usine C (Montréal, Kanada).<br />

        <br />

        Tema kunstipraksis, milles sulanduvad koreograafia, intuitiivne
        improvisatsioon ja etenduskunst, on juurtega kinni identiteedi kui
        korrastamata kordsuse uurimises. Tema töövahenditeks on arusaamad
        performatiivsest alkeemiast ja postkultuurilisest juhuslikust
        materjalist – ta kasutab elavhetki, esemete omastamist, isiklikku
        minevikku, tulevasi soove ning praegusi mõttesuundi, et luua enda ja
        pealtnägijate vahele empaatiale toetuv elamuste tsentrifuug.<br />

        <br />

        Micheli uusim sooloetendus “Yellow Towel” oli vastavalt ajalehe Voir
        (Montréal) ja ajakirja Dance Current (Kanada) 2013. aasta viie ning
        kümne parima tantsusündmuse hulgas. 2014. aastal sai ta vastloodud
        auhinna Impulstanz Award (Viin) tunnustamaks teda silmapaistvate
        kunstiliste saavutuste eest ning teda tõsteti esile ühena aasta
        tähelepanuväärsetest naiskoreograafidest ajalehes New York Times.

        2014 aasta lõpus arvati “Yellow Towel” ajakirjas Time Out Magazine (New
        York, USA) kümne parima etenduse hulka.

        „… Kunstnik, kes keeldub järeleandmistest ja julgeb leiutada oma keelt.“
        (P. Couture ja E. Pépin, Voir, 2013)<br />

        <br />
    description_en: >-
        I only just got a bit of dirt under the nails with the last thing. Now
        wading through the

        hairy rubble of a preliminary anthropological dig. So much debris! I
        couldn’t have predicted how much debris there would be and how much work
        I had created for myself in waking this beast. But they needed waking. I
        have seen the eyes and I’m circling, skipping, daintily lifting limbs
        and sniffing its scent. What is the smell of a plethora of someone that
        you have been avoiding your whole life? What do you do with the body?
        This is another science experiment. This is another ground on which to
        test skins that belong to me, outfits and ideas that may or may not have
        been imposed. (Dana Michel)<br />

        <br />

        “Michel’s poetic relationship to things is insistent. She investigates
        shapes and materials, reinventing sculptural forms in plastics,
        elastics, and doughs. Her work carves pathways through the felt,
        stuttering persuasively in moving registers of performance. Witty as
        well as socially astute, her performances loosen feeling. She withholds
        her body’s outlines (deferring visual recognition) while claiming
        opacity’s metamorphic scope. Mercurial George vibrates; it vibrates with
        me still.” (Source: VK Preston, Performance Studies Scholar, Brown
        University/University of Toronto)<br />

        <br />

        **Dana Michel** is a choreographer and performer based in Montreal.
        Before obtaining a BFA in Contemporary Dance at Concordia University in
        her late twenties, she was a marketing executive, competitive runner and
        football player. She is a 2011 danceWEB scholar (Vienna, Austria) and is
        currently an artist-in-residence at DanceMakers (Toronto, Canada) and at
        Usine C (Montreal, Canada).<br />

        <br />

        An amalgam of choreography, intuitive improvisation and performance art,
        her artistic practice is rooted in exploring identity as disordered
        multiplicity. She work with notions of performative alchemy and
        post-cultural bricolage – using live

        moments, object appropriation, personal history, future desires and
        current preoccupations to create an empathetic centrifuge of experience
        between her and her witnesses.<br />

        <br />

        Michel's newest solo, Yellow Towel, was featured on the “Top Five” and
        the “Top Ten” 2013 dance moments in the Voir newspaper (Montreal) and
        Dance Current Magazine (Canada) respectively. In 2014, she was awarded
        the newly created

        Impulstanz Award (Vienna) in recognition for outstanding artistic
        accomplishments and was highlighted amongst notable female
        choreographers of the year by the New York Times. The year concluded
        with Yellow Towel appearing on the Time

        Out Magazine (New York City, U.S.) “Top Ten Performances” list.

        “…An artist who refuses to compromise and dares to invent her own
        language.”(P. Couture and E. Pépin, Voir, 2013)<br />

        <br />
