    description_et: >-
        4.mail ilmub Taavi Tulevi uus sooloalbum 12” vinüülplaadil, mis kannab
        sümboolset pealkirja ⬤⬤.   


        Taavi Tulev on Eesti elektroonilise muusika maastikul üks pikemalt
        tegutsenud muusikuid ning avaldatav plaat on järjekorras Taavi seitsmes
        sooloalbum. 


        See neljalooline kauamängiv on kontseptuaalne tervik, kunstiteos, mille
        üheks osaks on heli ja teiseks värv. Album koosneb teostest, mis on
        mõnes mõttes võimalikult minimalistlikud, kuid sealjuures sügavad
        kompositsioonid. Lugusid iseloomustab matemaatiline täpsus, kuid teisalt
        on tähtsal kohal orgaanilised kõlamustrid oma nihestatuse, detailide ja
        ootamatustega. 


        Plaadikujundus on sündinud koostöös tunnustatud maalikunstniku Kristi
        Kongiga, kes maalis igale plaadile ja selle ümbrisele albumi pealkirja –
        kaks erivärvilist täppi. Nende maalimiseks olid abiks albumi teoste
        loomisel palju kasutatud süntesaatori Arturia Microbrute nuppude jaoks
        mõeldud šabloonid – nupp kui täpp, mõlemal vinüüli poolel oma täpp ja
        värv. Maalitud täpid teevad iga plaadi teisest erinevaks, ühtlasi on
        need kaks värvi juhisteks plaadi mõlemal poolel orienteerumiseks.
