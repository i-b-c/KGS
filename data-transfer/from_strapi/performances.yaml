    description_et: >-
        „Mortal Kombat 2: JÄRELVÄRELUS“ on sureliku võitluse teine vaatus. Urmas
        Lüüsi Hobusepea galeriis toimuva näituse (06.02.2019-25.02.2019) raames
        leiab keldrisaalis aset performatiivne installatsioon. Nii näituse kui
        performance´i lähtepunktiks on soov tõlgendada inimlikke seisundeid ja
        emotsioone läbi füüsilise materjali poeetilisuse ning kasutada ära
        tehnoloogia ja mateeria etenduslikku potentsiaali. Tund aega kestvasse
        installatsiooni on võimalik siseneda ja lahkuda vabalt valitud ajal ning
        külastada ka kõrvaltänaval asuvat näitust.  


        Urmas Lüüs on eesti sepp, kes ühendab oma loomingus materjalikunsti
        meistrioskuseid, installatiivsust, performance´it, heli ja videokunsti,
        fotograafiat, tehnoloogilise teatri vahendeid ja skulptuuri üheks
        suureks hingavaks organismiks. Ta huvitub põhiliselt teemadest nagu keha
        ja ruumi suhe, objekti performatiivne kvaliteet ja uitab ringi black
        box´i ja white cube´i vahelistel hallaladel.
    description_en: >-
        Mortal Kombat 2: AFTERGLOW“ Performative installation is a part of the
        personal exhibition (06.02.2019-25.02.2019) of Estonian artist Urmas
        Lüüs. Both exhibition and performance are passing on the mental states
        and emotions with poetry of physical materials and use the performative
        potentsial of technology and matter. Audience can enter and leave the
        installation on their own chosen moment. Everybody are also welcome to
        visit the exhibition on the next street (Hobusepea 2).


        Urmas Lüüs is an Estonian blacksmith who combines contemporary craft
        skills, installations, performance, sound art, video, photography,
        technological theatre and sculpture into one big breathing organism. He
        is interested in topics like the relationship between body and space,
        performativity of an object and wondering around in the gray zones
        between black box andwhite cube.
