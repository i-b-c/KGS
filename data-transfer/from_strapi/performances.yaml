        artist talk<br />

        <br />

        **Friday 04.11 19:00**<br />

        Kris Lemsalu “Veenuse sünd”<br />

        Helena Keskküla “+1”<br />

        Screening<br />

        Kolbeinn Hugi “The Future Must Be Destroyed Yesterday”<br />

        <br />

        **Friday 04.11 doors 23:00 Punane Maja **<br />

        NU Performance Festival meets MÜRK<br />

        Emer Värk & Renzo van Steenbergen<br />

        Huoratron (Last Gang Records)<br />

