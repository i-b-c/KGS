    description_et: >-
        Aastal 2003 lõpetasin Viljandi Kultuuriakadeemia valguskujunduse
        erialal. 13 aastat olen teinud valguskujundusi peamiselt
        teatrilavastustele erinevates Eesti teatrites (9 aastat Von Krahli
        Teatris), aga ka tantsulavastustele ja live kontsertitele. Viimasel ajal
        olen tegema hakanud ka valgusinstallatsioone ja sinna suunas on mu
        valgusesteetika hetkel ka liikumas.  

        [www.et.wikipedia.org/wiki/Oliver_Kulpsoo](https://et.wikipedia.org/wiki/Oliver_Kulpsoo)  


        Residentuuris kavatsen tegeleda LEDi ja hõõgniidiga. Valguse tulevik ja
        minevik. Kas nad sobivad kokku või üldse ei sobi. Kui sobivad, mis siis
        saab ja kui ei sobi, kas siis ka midagi saab?<br />

        <br />

        Oliver Kulpsoo (1982)  

        Elika abikaasa  

        Uku ja Mirti isa  

        Arno ja Maria poeg  

        Lauri, Merlini ja Sandra vend  

        E-mail: oliverolen@gmail.com  

        Mobiil: +372 5224421  

        Valguskujundaja  

        Isetegija  

        Tehnik<br />

        <br />
    description_en: >-
        In 2003 I graduated from Viljandi Cultural Academy as a lighting
        designer. For the last 13 years I have mostly made light designs for
        theatre performances in different Estonian theatres (9 years in Von
        Krahl Theatre) but also for dance performances and live music concerts.
        For the last years I have also made some light installations and that's
        the way my light works are heading for right now.

        [www.et.wikipedia.org/wiki/Oliver_Kulpsoo](https://et.wikipedia.org/wiki/Oliver_Kulpsoo) 


        During my residency I'm going to work with LED and filament. The future
        and the past of the light. Do they go together or not. What's the
        outcome when they do match and when they don't what's then?<br />

        <br />

        Oliver Kulpsoo (1982)  

        Husband of Elika  

        Father of Uku and Mirt  

        Son of Arno and Maria  

        Brother of Lauri, Merlin and Sandra  

        E-mail: oliverolen@gmail.com  

        Mobile: +372 5224421  

        Lighting designer  

        Technician  

        DIY'er<br />

        <br />
