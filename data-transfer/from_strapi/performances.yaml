    description_et: >-
        KAVA  
          
        Alex Taylor (1988, Uus-Meremaa)  

        „Three Endings“ / „Kolm lõppu“ viiulile ja klaverile (2017)  
          
        Bart de Vrees (1974, Holland)  

        „For Flute or Piano or Mandolin or Percussion or Bassoon or Guitar or
        Violin or Harp or Clarinet or………“ / „Flöödile, klaverile, mandoliinile,
        löökpillidele, fagotile, kitarrile, viiulile, harfile, klarnetile või …“
        võimendatud sooloinstrumendile ja videole (2017)  
          
        Chin-ting Chan (1986, Hiina/Hongkong)  

        „Double Exposure“ / „Topeltsäritus“ flöödile, klarnetile, löökpillidele,
        klaverile, viiulile ja tšellole (2017)  
          
        Gordon Fitzell (1968, Kanada)  

        „Elea“ viiulile, tšellole ja klaverile (2011/2016, Eesti esiettekanne)  
          
        Ansamblit U: ja Mart Kangrot seob pikaajaline koostöö, mille keskmes on
        peale nüüdismuusika tutvustamise olnud ka interpreedi rolli ja staatuse
        käsitlused muusikakultuuri hierarhiates. See kontsertlavastus toob
        nüüdismuusika esituse taas lähemale etenduskunstidele, kus silmaga
        nähtaval ja kõrvaga kuuldaval on tähendusloomes võrdne kaal. Ka
        instrumendid, mida muusikutel hallata tuleb, ei piirdu pelgalt nendega,
        mis tekitavad heli.   
          
        Mart Kangro on lõpetanud TPÜ koreograafia õppetooli 1996 aastal.
        1997-2001 töötas Rahvusooperis Estonia balletiartistina, peale mida
        jätkas loometööd vabakutselise etenduskunstniku ja koreograafina.  Oma
        töödes keskendub ta inimkeha ja liigutuse tähenduslikkusele teatris kui
        semiootilises aegruumis ning lavasituatsiooni olemuslikele küsimustele.
        Ta on üles astunud erinevatel festivalidel Moskvast New Yorkini ning on
        pälvinud kahel korral Eesti Teatriliidu aastapreemia tantsulavastuse
        kategoorias. 2017 aastal omistati talle Eesti Kultuurkapitali peapreemia
        näitekunsti valdkonnas.  
          
        Ansambel U: on aktiivseim ning tuntuim uue muusika ansambel Eestis.
        Ansamblile on iseloomulik tundlik kõlapilt, avatus julgetele
        eksperimentaalsetele ideedele ning ka kõige nõudlikumate teoste
        esitamine dirigendita. Kõrvuti eesti nüüdismuusika festivalidega on U:
        esinenud olulistel rahvusvahelistel festivalidel. U: tegeleb nii uue
        muusika klassikasse kuuluvate teoste kui ka eksperimentaalsete
        kompositsioonidega. Üks ansambli oluline suund on süvenemine
        improvisatsiooni ja ebatraditsioonilise notatsiooni tõlgendamist
        nõudvate teoste ettekandmisesse. Mängitakse eesti muusikat ning
        tellitakse uudisteoseid ka välisheliloojatelt.  
          
        Ansamblil on ilmunud albumid “U:” (2009), “Protuberantsid” (2011) ja
        “Alive” (2015). Hooajal 2013/2014, kui U: tähistas oma kümnendat
        tegevusaastat, sai koostöös Eesti Rahvusringhäälinguga alguse
        loengkontsertide sari “URR:”, kus tutvustatakse ja esitatakse
        nüüdismuusika olulisi teemasid. U: tähelepanu võitnud oma interaktiivse
        projektiga “Publikuorkester” ning nüüdismuusikat ja virtuaalreaalsust
        siduva kontserdiga “Vaata enda ümber, vaata enda sisse”.  
          
        www.uuu.ee
    description_en: >-
        The long-term collaboration between Ensemble U: and Mart Kangro has
        concentrated on introducing contemporary music but also on the treatment
        of interpreter’s role and status in hierarchies of music culture. This
        production will bring the performance of contemporary music closer to
        performance arts where both the visual and the auditory are equally 
        important in meaning making. Also, the instruments that musicians have
        to manage won’t be limited to those making sound. 


        Ensemble U: is currently the most active and renowned contemporary music
        ensemble in Estonia. It has gained recognition for its ability to
        perform even the most demanding works without conductor, openness for
        bold experimental ideas and sensitivity for sound. In addition to
        Estonia U: has performed at many important international festivals.


        U: performs the masterworks of modern composers as well as experimental
        compositions. One distinct field for U: is to delve into improvisational
        works and perform pieces that require the rendering of non-traditional
        notation. The repertoire includes authors from Estonia and abroad and
        the ensemble values the opportunity to continuously commission new music
        to be written for them. In April 2009 ensemble U: released their first
        album “U:” consisting of works by Estonian composers dedicated to U:
        between 2004–2009. The CD’s presentation took place in a ‘double
        reality’ – a virtual concert in the Estonian Virtual Embassy in Second
        Life, simultaneous with the live presentation, was the first of its kind
        in Estonia. The second album “Protuberances” was released two years
        later, 2011. Ensemble’s third CD, entitled “Alive” (2015) holds
        exclusively selected live recordings from 2012–2014. In recent years U:
        has gained recognition for its original interactive project “Audience
        orchestra”.  
          
        In the field of musical theatre Ensemble U: has worked with Mart Kangro,
        one of the internationally most renowned conceptual dance choreographers
        in Estonia, for several times. Performances “Play” (2006), “Romeo &
        Juliet” (2008) and “Harmony” (2009) have stemmed from this
        collaboration.  
          
        Mart Kangro is a freelance choreographer, director and dancer. In his
        works, he focuses on the meaningfulness of the human body and movement
        in theatre as semiotic space-time, and on existential issues of stage
        situation. His productions, of which many have come about in the Kanuti
        Gildi SAAL, have been performed at major festivals in more than 20
        countries across Europe (Kunstenfestivaldesarts in Brussels, Steirischer
        Herbst in Graz, Foreign Affairs and Tanz im August in Berlin, Helsinki
        Festival in Helsinki, Fringe Festival in Dublin, La Bâtie in Geneva,
        Internationale Keuze in Rotterdam, Golden Mask in Moscow, Aerowaves in
        London, Lignes de Corps in Valenciennes, and more. In recent years, he
        has produced works where he himself is not cast (Theatre NO99 and Von
        Krahl Theatre, as well as in Moscow). Kangro has won many awards and
        other recognition for his work, both in and outside Estonia.  
          
        www.uuu.ee
