    description_et: >-
        Kuidas saada heaks õpetajaks?</strong><br />

        <br />

        Priit&nbsp;Kruus on pedagoog. Ta töötas aastaid eesti keele ja
        kirjanduse&nbsp;õpetajana, praegu aga koolitab tulevasi õpetajaid.
        Neid&nbsp;ei ole piisavalt. Umbes kümmekonna aasta&nbsp;pärast, siis kui
        Priidu enda lapsed koolipinki nühivad, ootab Eestit&nbsp;ees suurem
        õpetajatepuudus. Mida siis teha – kas minna&nbsp;tagasi kooli? Selgub,
        et see ei olegi nii lihtne...<br />

        <br />

        Kinoteatri uus lavastus „Õpetaja Tammiku rehabiliteerimine“ on
        lugu&nbsp;noorest õpetajast, kel on veel hästi meeles oma
        põhikooliaegsed õpetajad -&nbsp;vana kooli pedagoogid, raudse kaardikepi
        ja&nbsp;terava ütlemisega. Teda kannustab soov saada heaks õpetajaks,
        aga mitte&nbsp;muutuda nendesugusteks. Meil kõigil on olnud oma
        õpetaja&nbsp;Tammik, kes kõigi karmide õpetaja koondkujuna on meie
        edasist elu mõjutanud. Aga milline peaks olema see&nbsp;õpetaja, keda
        tahaksime oma lapsi õpetama?<br />

        <br />

        „Õpetaja Tammiku rehabiliteerimine“ on ühest küljest
        hariv&nbsp;võimalus&nbsp;vaadata, mismoodi paistavad asjad klassi eest.
        Teisalt on see elust võetud&nbsp;teater. Etendus on ilma vaheajata ja
        kestab 1 tund ja 10 minutit.<br />

        <br />

        Kinoteater on sõprade seltskond, kes on varem lavale toonud
        mustkunstnike loo "Kaota mu naine ära ehk mis tunne on olla
        mustkunstnik", tüdrukute loo "Võidab see, kellel on kõige hullem mees"
        ja teatriauhinnale nomineeritud aktsioonide sarja Manifest.<br />

        <br />
    description_en: >-
        „The Lessons of a Young Teacher“ is a memoire by a young teacher. Priit
        Kruus remembers all too well the teachers that used to teach him –
        old-school Soviet pedagogues with stern looks and abusive manners. He is
        driven by an ambition to become a good teacher, whilst not turning into
        them. We have all had memorably awful teachers in our past. But what
        should the future teacher look like, one we would like to teach our
        kids?<br />

        <br />

        „The Lessons...“ is an entertaining and educating way to see things from
        a teacher's perspective. It is also theatre made up of real life. <br />

        <br />

        Kinoteater is a small cell of theatre terrorism that has previously
        created stand-up comedy, sketch shows, performances, as well as
        occasional stabs at actual theatre productions with costumes and all.
        They were nominated for a prize once at Estonian theatre awards but did
        not win. Amongst their productionry are such diverse elements as:
        “Püstijalukomöödia” (2011), “Võidab see, kellel on kõige hullem mees”
        (2013), “Kaota mu naine ära ehk mis tunne on olla mustkunstnik” (2014),
        “Tüdrukud ei nuta ehk Katharina lähetamine” (2015), "A Festival Piece
        ehk meeleheitlik katse pälvida festivalikutse" (2016), "Aadama õunad"
        (2016).<br />
