    description_et: >-
        **Lolina** on elektroonilise ja digitaalse muusika artist, keda tuntakse
        ka tema eelmistest projektidest Inga Copelandina. Aastail 2009–2013 oli
        ta bändi Hype Williams liige ja tegi koos Dean Bluntiga albumeid, EPsid,
        CD-R-e, videoid ja performance’eid. Sellel ajal salvestas ta ka mitu
        EP-d sooloartistina, oma viimase albumi Inga Copelandi nime all –
        „Because I’m Worth It” (2014) – andis ta pärast bändi laialiminekut ise
        välja.  

        <br>

        Tema esimene album Lolinana, „Live in Paris“, ilmus täispika videona
        2016. aastal. Erinedes tavalistest plaadi avaldamise formaatidest,
        iseloomustas selle helipilti üleminek digikompositsioonile. Lolina teine
        album „The Smoke“ (2018) koondas tema EP-de „RELAXIN’ with Lolina”
        (2015) ja „Lolita EP“ (2017) laulukirjutamise tehnikad ja muusikalised
        seaded, kaasa arvatud eelseadistuse, lo-fi trummide ning pooleldi laulva
        ja pooleldi kõneldud vokaali kasutamise.  

        <br>

        Lolina elavad esitused on arenenud DJ-varustusega katsetamise kaudu.
        Kasutades CDJ mängijatega oma olemasolevate helide peal luupimist,
        scratch-tehnikat ja manipuleerimist, arendas ta välja
        improvisatsioonilise hakitud stiili, mille näide on tema kolmas album
        „Live in Geneva“ (2019). Edasised katsetused playback-tehnikaga ja
        tarkvaraga viisid „Who is experimental music?“ (2019) avaldamiseni.  

        <br>

        <br>



        **Serious Serious Showreel**  

        <br>

        Viinamarjaistandustes, sõbra korteris, ühes Viini klubis, Tallinna
        laevatehases filmides ja intiimsetele etenduslikele stsenaariumitele
        tuginedes on kunstnikud Michaela Kisling, Till Megerle ja Artjom Astrov
        loonud videoklipi, mis hõljub dokumentalistika ja väljamõeldise piiril.
        Nad punuvad keeruka emotsionaalsete tõugete võrgu, mis võngub
        pühendumuse ja võõrandumise vahel, segades omavahel kokku stiliseeritud
        stseene ja improviseeritud hetki. Heli ja pildid, mis mõlemad kaevuvad
        popkultuuri koodidesse ja niššidesse, täiendavad teineteist.  

        <br>

        <br>


        **Practice Room**  

        <br>

        “Practice Room” oli eksperimentaalsele DJ-kultuurile pühendatud madala
        profiiliga kogukondlik üritus Tallinnas 2018. aastal. Ürituse „Kajahääl
        ja jee“ jaoks äratab Serious Serious „Practice Roomi“ algse formaadi
        taas ellu ja sämpeldab seda, tuues kokku mitte ainult DJ-d, vaid ka MC-d
        ja freestyle-tantsijad, et moodustada ajutine installatsioon.  

        <br>

        Koos: **Court Rat, arxcharlaide & baribari mai, Marta & Edgar Vunsh,
        Ganna Bogomol** etc.
    description_en: >-
        **Lolina** is an electronic and digital musician, also known for her
        past projects as Inga Copeland. She was a member of the band Hype
        Williams between 2009 and 2013, collaborating with Dean Blunt on albums,
        EPs, CD-Rs, videos and performances. During this time she also recorded
        several solo EPs, with her final album under the Inga Copeland alias,
        Because I’m Worth It (2014), self-released after the split of the
        band.  

        <br>


        Her first album as Lolina, Live in Paris, came out as a full-length
        video in 2016. A departure from traditional release formats, sonically
        it was defined by a move to digital composition. Lolina’s second album,
        The Smoke (2018), consolidated the songwriting techniques and musical
        arrangements of her EPs RELAXIN’ with Lolina (2015) and Lolita EP
        (2017), including the use of presets, lo-fi drums, and half-sung
        half-spoken vocals.  

        <br>

        Lolina’s live performances evolved through experiments with DJ
        equipment. Using CDJ players to loop, scratch and manipulate her
        existing recordings, she developed an improvisational cut up style
        exemplified on her third album Live in Geneva (2019). Further trials
        with playback equipment and software led to the release of Who is
        experimental music? (2019).  

        <br>

        <br>

        **Serious Serious Showreel**  

        <br>

        <br>

        Shot in the vineyards, a friend’s apartment, a club in Vienna, a
        shipyard in Tallinn and based on intimate performative scenarios, the
        artists Michaela Kisling, Till Megerle and Artjom Astrov have created a
        showreel hovering between documentary and fiction. They construct an
        intricate web of emotional impacts oscillating between devotion and
        estrangement by mixing stylized scenes with improvised moments. Sound
        and imagery, both diving into pop cultural codes and niches, are
        complementing each other in equal parts.  

        <br>

        <br>


        **Practice Room**  

        <br>

        Practice Room was a low profile community event dedicated to
        experimental DJ culture that took place in Tallinn in 2018. For the
        Voice of Echoes and Yeah occasion Serious Serious is reviving and
        resampling the original format of Practice Room by bringing together not
        only DJs, but also MCs and freestyle dancers to form a temporary
        installation.  

        <br>

        By: **Court Rat, arxcharlaide & baribari mai, Marta & Edgar Vunsh, Ganna
        Bogomol** etc.
