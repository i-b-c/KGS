    description_et: >-
        Kutse kõik ühes audiosensoorsele rännakule 03.05 ajavahemikul
        20:00-22:00 Kanuti Gildi SAALi projektiruumi.  


        Teekond sisaldab - tervitust, ruumitõlkeid, pimestavaid helisid,
        argipäevaks redutseeritud sisekaemust ja kontekstist väljarebitud
        fotojäädvustusi. Temporaalne otsetee Pühavaimu tänavalt Pikale tänavale.
        Kruiis kui tõttamata liikumine, millegi avastamise ootuses, kui muretult
        ja kiirustamata ristlemine. Mugavustsoonist muutusesse!  


        Kruiisi ajutise aegruumi on **Annika Üpruse** kutsel loonud **Anu Jalas,
        Helen Västrik, Mari Männa, Heidi Paju** üheskoos.
    description_en: >-
        Invitation to all inclusive audio-sensory journey on May 3 in the
        timeframe 20:00-22:00 at Kanuti Gildi SAAL.  


        Journey encloses - welcome, space translations, blinding sounds,
        introspective reduced to everydayness, out of context photos. Temporary
        shortcut from Pühavaimu street to Pikk street. Cruise - moving leisurely
        in the hope of discovering something. Out of comfort zone into
        transformation!  


        This temporary spacetime has been created in collaboration of **Anu
        Jalas, Helen Västrik, Mari Männa, Heidi Paju** on the invitation of
        **Annika Üprus**.
