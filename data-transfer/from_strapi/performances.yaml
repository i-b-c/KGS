    description_et: "NU Performance Festival 2018 keskmes on objektse kunsti ajaliin ning performatiivsed võimalused, mis mõtestavad ümber publiku individuaalset ja kollektiivset kogemust.   \n \nKui teatril on objektsele kunstile pakkuda dramaturgilist ajaliini ning distsipliini, siis vastupidise vahetusena annab näitusesaalide kunst teatrile tõlgendusvabadust ja formaadi variatiivsust.\n  \nLavaline aeg muudab objekti vastuvõttu: objektse kunsti ajatelg, ruumi dramaturgia, selle kontekst ja kommunikatiivsus fokusseerivad publikut teadvustamata aladele ja aspektidele.  \n\t  \nPubliku roll ja tähendus sellises vaatemängus on mitmes mõttes olla kunstiteose osa. Enda kohalolu panus teose tekkes loob nii võimaluse kui ka vastutuse.  \n \nVaatemäng moodustub objektsuse performatiivsusest. Objekt ise ongi vaatemäng.    \n\nNU Performance Festival 2018 programmi huvi on tuua esile ootamatut, viia kõrvale harjumuspärasest ning luua pinnast performatiivsuse avaramale tajumisele. \n\nNU Performance Festivali 2018 kuraatoriteks on Henri Hütt ja Mihkel Ilus, kes on kunstnike-duona tegutsenud läbi seitsme aasta. Hetkel töötavad nad järgmise ühise näituse ja lavastuse kallal ning on aktiivsed ka oma autoripraktikates.  \n\n\n**Henri Hütt** on (etendus)kunstnik, kes väärtustab loomingulisi hübriidvorme, kuhu kuuluvad nii tehnoloogilise dominandiga etenduskunsti vormid, helietendused, lavastatud näituse kontseptsiooni arendamine ning koostööd erinevate valdkondade kunstnikega. Hütt on rühmituse MIMproject liige ning Baltikumi ja Skandinaavia kunstiülikoolide võrgustiku DAMA koordinaator. \n\n**Mihkel Ilus** on visuaalkunstnik, kelle põhifookus on maal laiendatud väljal. See tähendab, et sageli töötab Ilus suuremõõtmelise installatsiooniga, milles maaliline lähenemine omab keskset rolli. Ilusa praktika oluline osa on ka kaasaegse näitusekultuuri ja etenduskunsti põimumine. Viimasel ajal tegeleb peamiselt objektse kunsti erinevuste uurimisega black box ja white cube tingimustes.<br />\n<br />\nAeg: 20.-28.10.2018<br />\nFoto: Hannes Aasamets"
    description_en: >-
        In the center of NU Performance Festival 2018 is the timeline and
        performative possibilities of object based art. It redefines the
        individual and collective experience of the audience.
          
        When theater has to offer to visual arts the dramaturgy based timeline
        and discipline, then vice versa the exhibition culture to theatre gives
        liberty of interpretation and varieties of format.  


        Stage time changes the reception of an object: timeline of an object,
        the dramaturgy of space, its context and communicativity focus the
        audience towards unexplored areas and aspects.   


        The role and significance of the audience in the spectacle in many ways
        is to be one component of the artwork.  


        The spectacle consists of performativity of objecthood. Object itself is
        the spectacle.  


        The program of NU Performance Festival 2018 will bring forward the
        unexpected and drift apart from the conventional for paving ground to
        wider perception of performativity.


        The curators of NU Performance Festival 2018 are Henri Hütt and Mihkel
        Ilus, who have worked together as an artist-duo more than seven years.
        They are currently working on their next collaborative exhibition and
        performance, as well are active in their artist practices
        individually.  
          

        **Henri Hütt** is an artist-performer, who is primarily a dancer. Since
        the beginning of this decade, he has created many technological
        performative acts, staged exhibitions, sound performances and other
        unprecedented formats. Henri Hütt is also part of the MIMproject team
        and coordinates Dance And Media Art network DAMA in Scandinavia and the
        Baltics.  
          

        **Mihkel Ilus** is a visual artist, whose main focus is painting and its
        extended field. Ilus often works with large-scale installations where
        painting plays the central role. In the practice of Ilus, contemporary
        exhibition culture and performance practices are inextricably
        intertwining. Recently Ilus has been concentrating on the distinction of
        objecthood as such in conditions of the white cube and black box
        situations.<br />

        <br />

        When: October 20-28, 2018<br />

        Photo: Hannes Aasamets
