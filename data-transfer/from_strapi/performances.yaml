    description_et: >-
        Vaata festivali siin: http://elektron.live/


        **19:00 HENRI HÜTT, VEIKO TUBIN "Sisenemine sisenemisse"** // nagu
        etendus //  

        Lavastus "Sisenemine sisenemisse" keskendub reaalse elu ning kujundatud
        situatsiooni vahelisele häälestamisele. Henri Hütt ja Veiko Tubin
        kogusid kokku kõikide Eesti teatrite ja etendusasutuste helilised
        publikukutsungid ja seostatud tähistajad. Heliline märguanne, mis
        reeglina tähistab etenduseks valmisolekut ning on signaal saali
        kogunemiseks, on lavastuse keskne tegelane.   

        Henri Hütt on (etendus)kunstnik, kelle loominguspektrisse kuuluvad
        tehnoloogilise dominandiga etenduskunsti vormid, helietendused,
        lavastatud näitused, kureerimised, kirjutamised, installatiivsete
        etenduste genereerimised ja muu tabamatu. Lähtub kestuses olemisest,
        sest kes palju teeb, see jõuab vähe ajalukku.  

        Veiko Tubin on vabakutseline näitleja, helilooja ja lavastaja. Lõpetanud
        Eesti Muusika- ja Teatriakadeemia Lavakunstikooli 22. lennu Priit
        Pedajase juhendamise all. 

          
        **20:00 METTE EDVARDSEN "WE TO BE"**  // nagu etendus //  

        Algselt on "We to be" (2015) etendus, mis on kirjutatud näidendina ja
        seda loeb ette üks esitaja, istudes koos publikuga tühja lava ees.
        Lisaks kantakse etendust üle raadio otse-eetris. Niisiis kasutab teos
        kolme erinevat meediumi, mida esitatakse üheaegselt kolmes eri kohas:
        etendusena teatris, näidendina raamatus ja otseülekandena raadios.
        Festivalil Kõhe Vastasmõju loeb Mette seda oma kodus. Virtuaalselt siis
        ka sinu kodus. Keerates oma ekraanivalguse maha, muutub We to be
        raadiosaateks.  
          
        Mette Edvardsen tegutseb etenduskunstide väljal koreograafi ja
        etendajana. Kuigi osa tema teostest uurib teisi meediume või teisi
        formaate, nagu näiteks video, raamatud ja kirjutamine, huvitab teda
        alati nende suhe etenduskunstide praktika ja situatsiooniga. Ta on palju
        aastaid töötanud tantsija ja etendajana mitmetes kompaniides ja
        projektides ning tegeleb isikliku loominguga alates 2002. aastast. Tema
        teoseid esitatakse rahvusvaheliselt ja ta jätkab projektide arendamist
        koostöös teiste kunstnikega nii kaaslooja kui esitajana.  
          
        **21:00 EESTI ELEKTROONILISE MUUSIKA SELTSI ANSAMBEL EMA Udo Kasemets:
        "Tt – tribute to Buckminster Fuller, Marshall McLuhan, John Cage"** //
        nagu kontsert //  

        „Tt – tribute to Buckminster Fuller, Marshall McLuhan, John Cage“ on
        Kasemetsa interaktiivne multimeediateos aastast 1968, milles publik saab
        mõjutada oma otsustega nii heli, visuaale kui ka valguskujundust.  
          
        Udo Kasemetsa (1919–2014) on naljatamisi nimetatud kõige vähemtuntud
        kõige kuulsa­ maks eesti heliloojaks, kelle kohta leidub artikkel vast
        igas väärikamas muusikaentsük­ lopeedias. Kanadas, kus Udo Kasemets
        veetis suurema osa oma elust, nimetati teda „ilmselt kõige
        kompromissitumaks muusikuks Kanada muusika ajaloos“, tema mõju Toronto
        muusika­ elule ja järgnevatele põlvkondadele on raske üle hinnata.

        Eesti Elektroonilise Muusika Seltsi Ansambel EMA on 2017. aastal loodud
        koosseis, mis on pühendunud elektroonilise kammermuusika mängimisele.
        Ansambli eesmärgiks on ületada tehnoloogilised kammitsad ning arendada
        tundlikku musitseerimist, üksteisele reagee­rimist ning teravat
        kuulamist, kasutades ära erinevate elektrooniliste instrumentide
        usku­matult rikkalikke kõlavõimalusi.
    description_en: >-
        Join the festival at http://elektron.live/
          
        19:00 HENRI HÜTT, VEIKO TUBIN **"Enter the enter"** // almost a show
        //     

        "Enter the enter" focuses on the fine tuning between real life and
        created situations. During the process, the audience entrance calls from
        all the Estonian performing arts venues were collected. Entrance melody
        (a unique tradition of Estonian theaters) that usually starts the
        preparation of the show and is the sign to take the seat will be this
        time the main character on stage. ”Enter the enter” as the preparation
        for the connection between the spectator and spectacle.  

        Henri Hütt is a (performing) artist, whose spectrum of artwork contains
        predominantly technological performative acts, sound-performances,
        staged exhibitions, curating, writing, installative performances and
        other unattainable formats.  

        Veiko Tubin is a freelance actor, composer and director. Graduated from
        the Estonian Academy of Music and Theater, under the supervision of
        Priit Pedajas.   
          
          
        20:00 METTE EDVARDSEN **"WE TO BE"** // almost a show //    

        Originally, "We to be" (2015) is a performance that is written as a play
        and read out loud by one performer sitting together with the audience,
        in front of an empty stage. Additionally, the performance is broadcast
        live on the radio. Thus, the piece works with three media presented
        simultaneously in three places: a performance in a theatre, a play in a
        book, and a live radio broadcast. In Festival of Spooky Action At The
        Distance Mette is at home, reading. Virtually in your home too. Darken
        your screen and We to be becomes a radio broadcast.  

        The work of Mette Edvardsen is situated within the performing arts field
        as a choreographer and performer. Although some of her works explore
        other media or other formats her interest is always in their
        relationship to the performing arts as a practice and a situation. She
        presents her works internationally and continues to develop projects
        with other artists, both as a collaborator and as a performer.   
          
        21:00 THE ESTONIAN ELECTRONIC MUSIC SOCIETY **Udo Kasemets: "Tt –
        tribute to Buckminster Fuller, Marshall McLuhan, John Cage"**  // almost
        a concert //  

        “Tt – tribute to Buckminster Fuller, Marshall McLuhan, John Cage” is an
        interactive multimedia composition by Kasemets from year 1968, where the
        audience can influence the sound, visuals and light design with their
        decisions. 


        Udo Kasemets (1919–2014) has been jokingly called the most famous least
        known composer of Estonia. There is an article about him in every
        respected music encyclopedia. In Canada, where Kasemets spent most of
        his creative life, he was named “probably the most uncompromising
        musician in the history of Canadian music”. 


        The Estonian Electronic Music Society (EES) was founded in 2017. The aim
        of the Society is to introduce and develop contemporary electronic music
        in Estonia. In order to achieve a wider audience, it is planned to
        systemati­cally organize concerts, workshops, lectures and professional
        meetings to create an inter­ national audience for creative life, to
        record music, to publish and to present Estonian electronic music
        internationally.
