    description_et: >-
        Ansamblit Nordic Affect on kiidetud tema “tundlike avastusretkede” (BBC
        Music Magazine) ja “repertuaaripanuse” (Classical Music) eest. Nordic
        Affect, mida kriitik Jónas Sen nimetas hiljuti “Islandi muusikaelu
        pärliks”, on kujundanud väga unikaalse väljenduslaadi, mis on toonud
        ansamblile ka rahvusvahelise tunnustuse.<br />

        <br />

        Eesti Muusika Päevadeks on auhinnatud ansambel ette valmistanud
        ökoloogia ümber keerleva põneva kava eesti ja islandi muusikast. Kavas
        on rahvusvaheliselt tuntud heliloojate, nende hulgas ka eestlaste Helena
        Tulve ja Mirjam Tally teosed. Islandi muusikast on muuhulgas kavas
        tõusva tähe Úlfur Hanssoni Nordic Affectile kirjutatud teos, mis kutsub
        publikut kaasa lööma.<br />

        <br />

        <strong>Kava</strong><br />

        Mirjam Tally (1976). “Warm Life at the Foot of the Iceberg” / “Soe elu
        jäämäe jalamil” viiulile, vioolale, tšellole ja klavessiinile (2014,
        versiooni Eesti esiettekanne)<br />

        Hildur Guðnadóttir (1982). “Point of Departure”<br />

        Helena Tulve (1972). Uudisteos (esiettekanne)<br />

        Úlfur Hansson (1988). “Þýð” keelpillitriole (2014)<br />

        María Huld Markan Sigfúsdóttir (1980). “Clockworking”<br />

        <br />

        7.-16. aprillini toimuval Eesti vanimal, alates 1979. aastast peetaval
        muusikafestivalil Eesti Muusika Päevad saab kuulda eesti heliloojate
        värskeimat loomingut. Festival on Eesti nüüdismuusika visiitkaart,
        pakkudes publikule avastamiseks peaasjalikult uudisteoseid. Festivali
        kunstilised juhid on tunnustatud heliloojad Helena Tulve ja Timo
        Steiner. 

        <br />

        Kogu kava

        <a
        href="http://www.eestimuusikapaevad.ee">www.eestimuusikapaevad.ee</a><br
        />

        <br />

        <a href="http://www.nordicaffect.com">www.nordicaffect.com</a><br />

        <a href="http://www.mirjamtally.com">www.mirjamtally.com</a><br />

        <a
        href="http://www.eestimuusikaapaevad.ee">www.eestimuusikaapaevad.ee</a><br
        />
    description_en: "Nordic Affect have been applauded for their „affectionate explorations” (BBC Music Magazine) and „commitment to their repertoire” (Classical Music). Recently described as a „gem in Iceland´s musical life” by critic Jónas Sen, Nordic Affect hascreated a highly unique sound, which has earned them International recognition.<br />\n<br />\nAt their special appearance at the Estonian Music Days, the prize-winning ensemble performs an exciting programme of Estonian and Icelandic music. All works at the programme evolve aroundecology. Works by internationally remowned Estonian composers Helena Tulve and Mirjam Tally will be performed. There is always something special in store when Nordic Affect comes to town!<br />\n<br />\nSince 1979, Estonian Composers’ Union has organised the festival Estonian Music Days (EMD), the visiting card of contemporary Estonian music.\_This year the festival takes place on April 7th-16th. An excessive amount of new commissions each year has made it the most established festival focusing on Estonian contemporary music. Artistic directors of the festival are\_internationally renowned Estonian composers Helena Tulve and Timo Steiner.<br />\n<br />\nProgram<br />\n<ahref=\"http://www.eestimuusikapaevad.ee\">www.eestimuusikapaevad.ee</a><br />\n<br />\n<a href=\"http://www.nordicaffect.com\">www.nordicaffect.com</a><br />\n<a href=\"http://www.mirjamtally.com\">www.mirjamtally.com</a><br />\n<a href=\"http://www.eestimuusikaapaevad.ee\">www.eestimuusikaapaevad.ee</a><br />"
