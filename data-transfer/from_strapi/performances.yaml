    description_et: >-
        Etendust saab vaadata tasuta 21.11 kell 20:00 kuni 23.11 kell 8:00ni (36
        tundi)
        [SIIT](https://www.youtube.com/watch?v=ra1ekAmxFQk&feature=youtu.be).  

        <br>

        <br>



        Kanuti Gildi SAALi kodulehe kaudu saab alates 21. novembrist kella
        20:00st 36 tunni jooksul tasuta eesti keelsete subtiitritega osa saada
        maailmakuulsa Poola lavastaja Krzysztof Warlikowski lavateosest “Me
        sõidame ära”. See saab teoks Varssavi Nowy Teatr’i ja Kanuti Gildi SAALi
        koostööna ning Adam Mickiewiczi Instituudi toetusel.Lavastuse tõlke
        autor on Hendrik Lindepuu.  

        <br>

        Warlikowski kui fenomeni tagamaid avab dramaturg Laur Kaunissaare:

        “Ühes kunagises intervjuus ütles Krzysztof Warlikowski, et nooruses, kui
        ta ei tegelenud veel teatriga, vaid õppis Sorbonne'is
        vahetusüliõpilasena filosoofiat, tahtis ta olla kõike muud, kui
        poolakas. Poola ajalugu on täis muidugi eriti lopsakat raskust, nii
        20ndast kui varasematestki sajanditest, aga ehk rusus Warlikowskit
        midagi sarnast nagu Emil Tode “Piiririigi” pealtegelast, kes pärit
        sealt, kus kujundlikult “kuivkempsu hais matab hinge, Ida-Euroopast”.
        Warlikowski räägib, et pööre teatri poole tuli õigupoolest soovist püüda
        võimatut, seista vastu ja luua teistmoodi Poola, püüda oma ja teiste
        hirmudele, tabudele ja kompleksidele kartmatult silma vaadata. 1993.
        aastal, samal aastal, mil ilmus “Piriiriik”, lõpetas Warlikowski Krakowi
        teatrikooli lavastajana.  

        <br>

        “Hamlet” homoseksuaalina, “Veneetsia kaupmees” holokaustijärgses Poolas.
        Teatri julgus saabki tõeliselt mõjuda vaid mööduvas ajahetkes.
        Tagantjärgi tundub kõik nii näiliselt loogiline, isegi banaalne.
        Warlikowski unistused täitusid. Tema ümber kogunes juba varakult
        kümmekond näitlejat, valiksugulased, nagu Goethe nii kaunilt ütleb,
        kellega koos on veerandsajandi jooksul tehtud nii mõnigi geniaalne
        lavastus (mu isiklik lemmik on Kane’i “Puhastatud” ja “(A)pollonia”). Ja
        muidugi Małgorzata Szczęśniak, asendamatu stsenograaf. Peamine, mille
        nad tõid Poola teatrisse, aga miks mitte ka Euroopa ja maailma teatrisse
        laiemalt, on oskus ühendada klassikatõlgendus, julge ühiskondlik pilk,
        veatu esteetine taju ning lõikav isiklikkus a la varajane Nan Goldin.
        Esimesed 20 aastat oli see midagi uut, aga eks ajaga muutu kõik
        iseenesestmõistetavaks. Warlikowskiga alustanud näitlejad on nüüd
        superstaarid, Warlikowski ise rüütliks löödud ja töötab juba aastaid
        eeskätt ooperis (Opera de Paris, Royal Opera House, La Monnaie, mida
        soovite) nagu selliste karjääride puhul hiljem tihti läheb.  

        <br>

        Warlikowski juhib Varssavi Uut Teatrit. Ta ise lavastab harva ja on
        andnud vabad käed pigem noortele, mis on imetlusväärselt suuremeelne.
        Mõned aastad tagasi, kui ajad olid Poolas juba niisama huvitavad, kui
        praegugi, vestlesin selle teatri dramaturgi ja direktoriga valitsuse
        järjekordsest seaduseelnõust. “Neil on neli aastat aega rumalusi teha,
        majanduse hea seis võimaldab seda,” ütles direktor, kes alustas koostööd
        Warlikowskiga niisamuti 90ndate algul ja on selles teatris palju
        rohkemat, kui lihtsalt produtsent. “Kõige kurvem, kõige ahastamapanevam”
        ütles dramaturg, “on näha, kuidas Poolat, mida me oleme ehitanud,
        millest me oleme unistanud, kivi kivi haaval lammutatakse.” Ükskord,
        väikekeses seltskonnas ühe Varssavi (mis pole just tuntud kui ilus linn)
        restorani rõdul, tundus mulle, et stoilist ja neurootilist sarmi ühendav
        Warlikowski on nagu välja astunud Sorrentino “Kohutavast ilust”.  

        <br>

        Iisraeli näitekirjanikku Hanoch Levinit on Warlikowski  lavastanud
        varemgi, aga “Me sõidame ära” on hetkel kahtlemata sümboolne
        materjalivalik. Eesti Poola kajastusest võib jääda mulje, et seal ainult
        üks, konservatiivne pool ongi. Miski pole kaugemal tõest. Minna või
        jääda, küsivad endalt Poolas paljud, aga ilma võitluseta minemine ei
        sobi kuidagi Poola ajaloo heroilisse mustrisse. Selle näiteks sobib
        elegantselt ka Warlikowski enda loometee. Ja ei ütleks, et meilgi Eestis
        oluliselt lihtsamad küsimused silme ees oleks.”
    description_en: >-
        Starting from November 21 at 20:00 (available for free log-in for 36
        hours)
        [HERE](https://www.youtube.com/watch?v=ra1ekAmxFQk&feature=youtu.be)

        In Polish with Estonian subtitles  

        <br>

        <br>


        **Krzysztof Warlikowski** returns to the work of Hanoch Levin 12 years
        after the release of “Krum”, which was a great breakthrough in the stage
        reading of this author’s work and a huge success in Warlikowski’s
        career. This time, the director reaches for the „Suitcase Packers”. The
        time that elapsed since the first enstaging of Levin’s text marked the
        history of Poland and Europe with many dramatic turns. Once, Krum
        returned to his homeland after an unsuccessful expedition abroad, full
        of hope for fulfillment. Now, everyone is packing-up or dying. This
        great world migration of peoples in Levin’s text finds its local face
        and local scale, reflecting all the anxieties and movements taking place
        in the macro scale. The direction in which Levin’s characters are headed
        is unknown but, undoubtedly, everyone is trying to move as far away from
        “here” as possible, and yet no one wants to leave home. When returning
        to his favorite authors, Warlikowski never settles for well trodden
        paths. A rebellion is brewing, a fight of maturity against the attempted
        appropriation of its territory of freedom and imprisonment in peaceful
        regimes in exchange for submission. Life does not bring peace even
        without politics, even less so when the times are hot! Levin’s text,
        which is a starting point upon which the performance is being built,
        offers a wonderful gallery of characters which will be brought to life
        by the performative presence of Krzysztof Warlikowski’s company of Nowy
        Teatr in Warsaw. The play’s subtitle – „Comedy with Eight Funerals” –
        sounds like a subtitle of a musical piece suggesting a need to employ an
        excellent “orchestra” made up of great acting personalities, such as
        those with whom Warlikowski has been working for years.

        So, we are leaving! It won’t be easy, but there will be no compromises.
        It’s high time we go! Let’s leave right now!
