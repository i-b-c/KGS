    description_et: >-
        Ta peatub neljatärnihotellis-SPAs kuskil Horvaatia pärapõrgus koos grupi
        õnne otsivate inimestega. Igaühel selles grupis on tootemloom. Kuna ta
        on uustulnuk, siis määratakse talle automaatselt tootemloomaks KOER koos
        numbriga 23 – ta on 23. koer. Grupiliikmed ei tunne üksteist, aga
        annavad üksteisele nõu ja jagavad vastastikku oma uskumusi ja harjumusi.
        Nad on üsna veendunud, et elavad ÄÄRMISELT ELAVAS maailmas lõputut elu.

        Anne Lise Le Gac kutsub meid arutlema. Ta viib meid maa-alusesse
        maailma, tutvustab meile marginaalseid kombeid, piraatarmastust ja
        ristandliike.  
          
        “La Caresse du Coma ft. Ange 92 Kcal” ("Surma silitus  ft. Ange 92
        Kcal") on kui triiv: peatükist peatükki kohaldab Anne Lise Le Gac oma
        teemat, püüdes alati “muuta reaalsust hübriidseks, et lasta tegevusel
        selles märkamatult ilmneda”. Ülaltoodud fiktsioon lähtub soovist
        ümberdefineerida meie suhet teisega, olgu see teine siis inimlik,
        digitaalne, loomne või isegi taimne.  
           
        Anne Lise Le Gac elab Marseilles's. Aastatel 2003 - 2008 õppis ta
        Strasbourg'i kunstiakadeemias etenduskunstide põhisuunal. 2013. aastal
        lõpetas ta ESSAIS magistriprogrammi tantsu alal Angers' riiklikus
        kaasaegse tantsu keskuses (CNDC). 2014. aastal töötas ta koos Claudia
        Triozzi'ga. Anne Lise Le Gac on loonud sooloetendusi nagu “La Caresse du
        Coma” ja koostöös Élie Ortis'ega etendusprojekti “GRAND MAL”, mida
        esitati festivalil Les Urbaines (Lausanne), Festival Parallèle'il
        (Marseilles) ja TQW'i taasavamise nädalavahetusel. Alates 2015. aastast
        on ta olnud üks performance festivali OKAY CONFIANCE organiseerijatest,
        viimati toimus festival La Ferme du Buisson'is (Pariis). Juulis 2018,
        olles residentuuris Centrale Fies'is (Itaalia), sai alguse uus
        etendusprojekt koostöös kunstnik ja muusik Arthur Chambry'ga. Seda teost
        esitati Kunstenfestivaldesarts'il 2019. aasta kevadel.  
          
         www.al-lg.com
    description_en: >-
        She is staying at a four-star hotel spa in a godforsaken part of Croatia
        among a group of people seeking happiness. Everybody in this group has a
        totem: as she is new, she is automatically assigned DOG, with the number
        23 – she is the 23rd dog. The members of the group don’t know one
        another but give each other advice and share their beliefs and habits.
        They are quite convinced that they live in an EXTREMELY LIVELY world, a
        life ad infinitum.  

        Anne Lise Le Gac invites us to a conversation. She takes us to
        subterranean worlds, introduces us to marginal customs, pirate love and
        crossbred species.  
          
        "La Caresse du Coma  ft. Ange 92 Kcal" is building up as a drift: from
        chapter to chapter Anne Lise Le Gac is adjusting her intentions, always
        trying to „hybridize the reality in order to let the action ooze out of
        it“ . The above-mentioned ficton unfolds from a desire to redefine our
        relationship to the other, whether it be human, digital, animal, or
        vegetal.  
           
           
        Anne Lise Le Gac lives in Marseille. She studied at the Fine Arts School
        in Strasbourg from 2003 to 2008, focusing on performance art. She
        completed the ESSAIS master programme for dance at CNDC Angers in 2013.
        In 2014, she worked with choreographer Claudia Triozzi. Anne Lise Le Gac
        has also created solo pieces such as La Caresse du Coma and a
        collaborative performance project, GRAND MAL, with Élie Ortis, which
        they presented at the Les Urbaines festival (Lausanne), at Festival
        Parallèle (Marseilles) and at the TQW reopening weekend. Since 2015, she
        has been co-organising the performance festival OKAY CONFIANCE that was
        recently held at La Ferme du Buisson (Paris). In July 2018, in residency
        at Centrale Fies (IT), she starts a new performance project in
        collaboration with the artist and musician Arthur Chambry. This creation
        has been presented in spring 2019 in the frame of the
        Kunstenfestivaldesarts.  


        www.al-lg.com
