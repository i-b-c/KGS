    description_et: >-
        KAVA  

        Helena Tulve (1972)  

        Uudisteos (esiettekanne)  


        Silvia Borzelli (1978)  

        "own pace (amnesia 3b)" kontrabassile (2011)  


        Dario Calderone (1978)  

        Uudisteos (esiettekanne)  


        Giorgio Netti (1963)  

        "ur, I rito" kontrabassile (2015)  


        Kava keskmeks on Giorgio Netti teos "ur, I rito, millega algab ulatuslik
        teos kontrabassile. Järelliide -ur viitab objektide päritolule, mis
        omakorda avaldab vastupanu kesktõmbejõule, millele on omane esile
        kutsuda soovimatuid tagajärgi. "ur-i" peaks suhtuma kui rituaali, ta on
        reeglite ja viidete kogum, mille alusel viiakse läbi pühasid talitusi. 
        "ur-is" sisalduv rituaal peaks aitama mäletada ja väärtustada iha püha
        päritolu. (Dario Calderone)  


        **Dario Calderone** (1978) on õppinud kontrabassi Massimo Giorgi, Franco
        Petracchi ja Stefano Scodanibbio juures. Aastatel 2001-2007 tegi ta
        kontrabassisolistina koostööd mitmesuguste orkestritega. 2007. aastast
        on ta pühendunud peamiselt viimase 40 aasta jooksul komponeeritud
        muusika esitamisele. Ta on koostööd teinud paljude heliloojatega, nende
        hulgas Salvatore Sciarrino, Bernhard Lang, Louis Andriessen, Robert
        Ashley, Christian Marclay ja Yannis Kyriakides, ja andnud neile
        heliloominguks inspiratsiooni. Ta annab soolokontserte ja mängib ka
        kammermuusikat ning teda kutsutakse pidevalt esinema suurtele
        nüüdismuusikafestivalidele. Dario Calderone mängib ansamblitega Nieuw,
        NAP, Atlas ja Algoritmo. 2013. aastal asutas ta Yannis Kyriakidesi, Anne
        La Berge, Wiek Hijmansi, Gareth Davise ja Reinier van Houtiga ansambli
        MAZE, mis pühendub kontseptuaalsete heliteoste äärmuslikele
        eksperimentidele. Calderone annab meistriklasse Taškendi ja Amsterdami
        konservatooriumis. Ta on salvestanud hulga plaate plaadifirmadele
        Stradivarius, Attacca, Wergo ja Unsounds.
    description_en: >-
        PROGRAMME  

        Helena Tulve (b. 1972)  

        New work (premiere)  


        Silvia Borzelli (b. 1978)  

        "own pace (amnesia 3b)" for solo double bass (2011)  


        Dario Calderone (b. 1978)  

        New work (premiere)  


        Giorgio Netti (b. 1963)  

        "ur, I rito" for solo double bass (2015)  



        The program rotates around the piece by Giorgio Netti, "ur, I rito",
        which is the first part of a monumental diptych for solo double bass.
        -ur is the suffix that indicates the origin, the center from which a
        certain object has developed, and indicates then what resists from an
        historical centripetal force, through which consequences take their
        ramifications. "ur" is intended as a ritual, as it is the complex of
        rules and indications which regulates the unfolding of a sacred action.
        The ritual contained in "ur" is aimed to remember and treasure the
        sacred origin of the desire. (Dario Calderone)  


        **Dario Calderone** (b. 1978) has studied the double bass with Massimo
        Giorgi, Franco Petracchi and Stefano Scodanibbio. Between 2001 and 2007
        he played the  doublebass in various ensembles. Since 2007 Calderone has
        mainly dedicated himself to the diffusion of music composed during the
        last 40 years. He has collaborated with a number of composers, among
        others Salvatore Sciarrino, Bernhard Lang, Louis Andriessen, Robert
        Ashley, Christian Marclay and Yannis Kyriakides. His activity spans from
        solo performances to chamber music and involves performing regularly at
        major contemporary musical festivals. He plays with Nieuw Ensemble, NAP,
        Atlas Ensemble and Ensemble Algoritmo. In 2013, Calderone funded
        Ensemble MAZE in collaboration with Yannis Kyriakides, Ann La Berge,
        Wiek Hijmans, Gareth Davis and Reinier Van Hout. The group is deeply
        involved in radical experimentations in the field of conceptual
        composition. Calderone regularly gives masterclasses at Tashkent
        Conservatory and Amsterdam Conservatory. He has recorded a number of
        albums for Stradivarius, Attacca records, Wergo and Unsounds.
