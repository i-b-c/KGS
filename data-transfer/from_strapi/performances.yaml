    description_et: >-
        „Group Show“ on immateriaalsete teoste immateriaalne galerii, etendus,
        mille kuraatoriks ja esitajaks on rühmitus Galerie. Laval on muuhulgas
        järgmiste kunstnike tööd; Maria Metsalu, Iggy Lond Malmborg, Jennifer
        Lacey, Krõõt Juurak, Alex Bailey, Mårten Spångberg, Valentina Desideri,
        Audrey Cottin, Pontus Petterson, Jan Ritsema, Jonathan Burrows, Diego
        Tonus, Angela Goh jt.  


        “Group Show” on performance’i formaadis esitatud immateriaalsete teoste
        immateriaalne kehastus. Esindatud kunstilaadide spekter on lai, ulatudes
        tantsust kuni teraapia, luule, konfliktsituatsioonide ja muu
        võimalikuni. Kõigeni, mis mahutub kategooria alla, mida loojad ise
        nimetavad immateriaalseks kunstiks, loominguni, mida ei ole võimalik
        taandada materiaalsele objektile või mingi kindla tegevuse
        dokumenteerimisele.  


        Relatsioonilise esteetika aspektist on kaasaegne kunst kogemuspõhise
        majanduse ning sotsiaalse kujundamise ja/või sotsiaalsete “olukordade”
        asemel keskendunud pigem subjektiivsuse loomisele, kasutades elu ning
        elusolemist eelkõige vahendina eesmärgi saavutamisel. Dialoogist,
        käitumismudelitest, liigutusest või meelestatusest kujuneb pintsel ja
        samas ka lõuend. Millised on objektifitseerimise ning elu genereerimise
        seosed kunstis ja ühiskonnas? Mis juhtub kunstiga, kui elu ja
        elusolemine koondub uutesse loomevormidesse?  


        Publiku hinnang:  

        “”Group Show” on tõeliselt omanäoline. Etenduse käigus esitatakse terve
        rida teoseid, millest igaüks genereerib olustiku ja seetõttu vaid
        sellele olustikule omase suhte vaatajaga. Etenduse avavad kaks
        tantsijat, kes esitavad fragmendi koereograaf DD Dorvillier’i tükist „A
        Catalog of Steps“, sellele järgneb visuaalkunstniku Audrey Cottin’i
        Paris Clapping Group’i etteaste, mis võimaldab publikul etenduses
        osaleda kollektiivse aplodeerimise teel (ma ei oska öelda, millist
        tunnet ma plaksutamise ajal täpselt tundsin - rõõmu, piinlikkust,
        armastust või hoopis segadust?!). Etendust läbiva joonena rullus taustal
        lahti veel üks sisuliin - “Internal Conflict”, hõlmates sisekonflikti
        lavalt läbikäivaid kunstnikke. Etenduse jooksul ei mainitud taustal
        toimuvat kordagi, tegevus tudus toimuvat hooti, nagu ka siis, kui
        letiääres seisnud naine lavaltoimuvasse sekkus ning etenduse käiku muuta
        soovitas.“     

        Jessica  


        Galerie (2014, INT) on immateriaalsete teoste immateriaalne kehastus.
        Galerie eesmärk on immateriaalseks subjektiks olemise propageerimine,
        pakkudes loomingut, mida ei ole võimalik taandada materiaalsele
        objektile või mingi kindla tegevuse dokumenteerimisele. Olles
        samaaegselt nii äriüksus kui etenduskunstide- ja teadusprojekt on
        Galerie alates oma asutamistest 2014. aastal olnud osaline paljudes
        projektides, kaasa arvatud “Group Show” - immateriaalsete teoste
        immateriaalne galerii, “The Booth” – tühi boks kunstimessil, milles kaks
        galeriipidajat üritavad kõikvõimalike vahendite abil kunstiteoseid müüa,
        “The Intensive Curse” – workshop kunstniku ja kunstiteoste esindamisest,
        The Grand Opening – näituse, millelt puuduvad eksponeeritavad teosed,
        eelavamise koreograafia. 

        Galerie on osa võtnud järgmistest kunstisündmustest - Material Art Fair
        (Mexico City, 2017); Jan Mot (Brüssel, 2017); Le Menagerie de Verre
        (Pariis, 2017) ArtRotterdam (Rotterdam, 2016); De Appel (Amsterdam
        2016); La BF15 ja ENSBA-École Nationale Supérieure des Beaux Arts (Lyon,
        2016).  


        [www.galerie.international](http://www.galerie.international/)
    description_en: >-
        A performed exhibition curated and performed by Galerie, an immaterial
        gallery for immaterial artworks.  


        With works by Maria Metsalu, Iggy Lond Malmborg, Jennifer Lacey, Krõõt
        Juurak, Alex Bailey, Mårten Spångberg, Valentina Desideri, Audrey
        Cottin, Pontus Petterson, Jan Ritsema, Jonathan Burrows, Diego Tonus,
        Angela Goh and others.  


        Group Show is an exhibition of immaterial artworks in the format of a
        performance. The artworks span over a wide range of media like dance,
        therapy, poetry, conflict and others. All of which could fit into the
        category of what we call immaterial artworks, artworks that can not be
        reduced to a material object or the documentation of an action.  

        From relational aesthetics, over social sculpture or “situations”,
        contemporary art practices have been addressing the production of
        subjectivity in the realm of experience economy, using life as means and
        ends. A conversation, a behaviour, a movement, or a mood has become the
        brush, but also the painting. What are the relations between the
        objectification and the production of life in art and society? What
        happens to art when life is capitalized into new forms of production?  


        Spectator's reaction: "Group Show is an unusual performance. A selection
        of artworks is performed, each work proposes a specific situation and
        therefore a particular relationship with the audience. Starting with A
        Catalog of Steps by choreographer DD Dorvilliers, the two performers
        danced a fragment of Dorvilliers' dance catalog, followed by Paris
        Clapping Group of visual artist Audrey Cottin, where we were all part of
        the work, doing a big collective applause (I didn't know if I felt joy,
        embarrassment, love or confusion!). Another work seemed to take place in
        throughout the whole piece: Internal Conflict is a conflict involving
        other accomplices. At no time was this work announced, but it appeared
        to be intermittent, such as the moment when the young woman at the
        counter interrupted and proposed to change something in the
        performance." Jessica  


        Galerie is an immaterial gallery for immaterial artworks. The mission of
        Galerie is to promote immaterial objecthood: works that cannot be
        reduced to an object or to the documentation of an action.
        Simultaneously a commercial entity, a performance and a research
        project, Galerie has been involved in a wide range of activities since
        its launch in 2014, including Group Show - a performed exhibition, The
        Booth - an empty art fair booth where the two gallerists represent
        artworks using their own means and offer the works for sale, The
        Intensive Curse - a workshop on artist and artwork representation, The
        Grand Opening – the choreography of a vernissage without artworks.
        Galerie has been working in venues such as Material Art Fair (Mexico
        City, 2017); Jan Mot (Brussels, 2017); Le Menagerie de Verre (Paris,
        2017) ArtRotterdam (Rotterdam, 2016); De Appel (Amsterdam 2016); La BF15
        and ENSBA-École Nationale Supérieure des Beaux Arts (Lyon, 2016) a.o.  


        [www.galerie.international](http://www.galerie.international/)
