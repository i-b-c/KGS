    description_et: "Etenduskunstide lühivormide festival MADE IN ESTONIA MARATON'' tuleb täie lõbususega juba 11. korda. Kaasaegsesse etenduskunsti on juba eos sisse kirjutatud katsetamine ja risk. MADE IN ESTONIA MARATON'' pühitseb neid kaht omadust oma anarhilises meelelaadis ja kutsub kõikide maade etendajad ja muud tegelased kokku ning vaatame:\n\nMis toimib?\n\nja\n\nMis ei toimi?\n\nKohal on nii veteran-maratoonlased kui ka alles alustajad. Seega on loota maratonile omaseid eriilmelisi etteasteid õhkkonnas, kus hõljub magus illusioon potentsiaalist, kus kõik on võimalik!\n\nSTART!\n\n''Mitte segi ajada samanimeliste odavate koopiatega.<br />\n<br />\nKAVA:\n\n**18:00-18:50 MUST KAST**  \n\n**Joanna Kalm** JUST FOR THE SAKE OF WHIPPING 10'   \nLaval: Madli Paves, Helin Jürmann, Kaisa Kattai, Karolin Poska, Eliisa Sokk  \n\n**Triin Tasuja** MAAJAMAA 8'\n\n**Mari-Liis Eskusson, Arolin Raudva, Katrin Kreutzberg, Alise Bokaldere** OPPORTUNITIES NOT USED 12'   \nKoostöös: Maike ja Iggy Lond Malmborgiga\n\n**Ursula** VOX POPULI 3'\n\n**Indrek Spungin** MIKS LÕHNAB NAINE? 3'  \n*Marie Underi ja Schopenhaueri ainetel kokku klopsitud teos uurib kahte maailma liikuma panevat jõudu: Naist ja Tungi.  \nTegelased: Pime tung. Naine. Abstraktsed Armastajad. Konkreetsed armastajad. Ripsmetušš ja Mina.*\n\n**Üüve-Lydia Toompere, Siim Tõniste ja Piret Jaaks** Plaan T KONTROLL\n\n\n18:50-19:20 VAHEAEG\n\n\n**19:20-20:00  EKRAANIGA LAVA**\n\n**Sigrid Savi** HIGHER THAN A MOUNTAIN 5'\n\nHenri Hütt  \"∞\"   \nLaval: Anonymous Content 2'\n\n**Indrek Spungin** IGAVESED NAHKPÜKSID 3'  \n*Teos jutustab igavesest rühkimisest ja olemise kammitsais siplemisest.  Mõnikord nimetatakse seda Sansaaraks. Teinekord nahkpüksteks. Nahkpüksid tähistavad ühteaegu nii ahelaid kui ka pidurüüd, mis on pidevalt peal, et pühitseda elu ja kiita takka elujanu. Kuid kas see on siis elu? *  \nTegelased: Kass, Hiir, Vana Karu, Trumm, Nahkpüksid.\n\n**Karolin Poska** GIVE ME A SIGN 10'\n\n**Emer Värk** DEPRESSIOON 10'\n\n**Ursula** VOX POPULI 3'\n\n**Üüve-Lydia Toompere, Siim Tõniste ja Piret Jaaks** Plaan T KONTROLL\n\n20:00-20:30 VAHEAEG\n\n**20:30-21:25 ALASTI LAVA**\n\n**Raho Aadla** ROHELINE, KOLLANE JA ROOSA 8'\n\n**Doris Tislar & Hanna Junti** SMALL TALK 8'\n\n**Ursula** VOX POPULI 3'\n\n**Elina Masing** TIT OR ENCO 10'   \nLaval: Jaan Männima\n\n**Edgar Vunsh** KALLE 5'\n\n**Indrek Spungin** SELAVII  8'  \n*Selavii on soov-unenäoline lugu sellest, kuidas võrgutada näitlejaid ja pimedatesse raadiostuudiotesse meelitada, et vaadata, mis inimesed nad on ja mis juhtub nendega eetris, kas eeter vabastab näitleja või on vaja näitlejat vabastada eetrist?*  \nTegelased: Tiit, Ene-Liis, Margus Lepa, Lapsed, Leedukad, Vabamüürlaste täielik nimekiri, Eeter ja Mina.\n\n**Kädi Metsoja** TSIRKUS 5'   \nLaval: Helery Kuld & Matthias Kann\n\n**Katrin Kreutzberg** `EESMÄRGISTAMITTE? Endiselt ühel kohal ja rütmiseeritult. 4'  \n\n\n\"\tenn of estland installatsioonid metsas sada aastat üksildust"
    description_en: "Performing arts festival focused on short formats MADE IN ESTONIA MARATHON'' is approaching in full jolliness already for the 11th time at Kanuti Gildi SAAL. Contemporary performing arts is fuelled with experiment and risk taking. MADE IN ESTONIA MARATHON'' celebrates these two attributes in an anarchic disposition and invites all the performers and other folks of the world to join and let's check out:\n\nWhat works?\n\nand\n\nWhat doesn't?\n\nThis year there are marathon all-timers but also the novice section in the program. Thus we are hoping to have very diverse performers doing their thing whilst sensing the teasing smell of potential in the air, the kind where everything is possible.\n\nSTART!\n\n''Not to mix up with the same named copies.<br />\n<br />\nKAVA:\n\n**18:00-18:50 MUST KAST**  \n\n**Joanna Kalm** JUST FOR THE SAKE OF WHIPPING 10'   \nLaval: Madli Paves, Helin Jürmann, Kaisa Kattai, Karolin Poska, Eliisa Sokk  \n\n**Triin Tasuja** MAAJAMAA 8'\n\n**Mari-Liis Eskusson, Arolin Raudva, Katrin Kreutzberg, Alise Bokaldere** OPPORTUNITIES NOT USED 12'   \nKoostöös: Maike ja Iggy Lond Malmborgiga\n\n**Ursula** VOX POPULI 3'\n\n**Indrek Spungin** MIKS LÕHNAB NAINE? 3'  \n*Marie Underi ja Schopenhaueri ainetel kokku klopsitud teos uurib kahte maailma liikuma panevat jõudu: Naist ja Tungi.  \nTegelased: Pime tung. Naine. Abstraktsed Armastajad. Konkreetsed armastajad. Ripsmetušš ja Mina.*\n\n**Üüve-Lydia Toompere, Siim Tõniste ja Piret Jaaks** Plaan T KONTROLL\n\n\n18:50-19:20 VAHEAEG\n\n\n**19:20-20:00  EKRAANIGA LAVA**\n\n**Sigrid Savi** HIGHER THAN A MOUNTAIN 5'\n\nHenri Hütt  \"∞\"   \nLaval: Anonymous Content 2'\n\n**Indrek Spungin** IGAVESED NAHKPÜKSID 3'  \n*Teos jutustab igavesest rühkimisest ja olemise kammitsais siplemisest.  Mõnikord nimetatakse seda Sansaaraks. Teinekord nahkpüksteks. Nahkpüksid tähistavad ühteaegu nii ahelaid kui ka pidurüüd, mis on pidevalt peal, et pühitseda elu ja kiita takka elujanu. Kuid kas see on siis elu? *  \nTegelased: Kass, Hiir, Vana Karu, Trumm, Nahkpüksid.\n\n**Karolin Poska** GIVE ME A SIGN 10'\n\n**Emer Värk** DEPRESSIOON 10'\n\n**Ursula** VOX POPULI 3'\n\n**Üüve-Lydia Toompere, Siim Tõniste ja Piret Jaaks** Plaan T KONTROLL\n\n20:00-20:30 VAHEAEG\n\n**20:30-21:25 ALASTI LAVA**\n\n**Raho Aadla** ROHELINE, KOLLANE JA ROOSA 8'\n\n**Doris Tislar & Hanna Junti** SMALL TALK 8'\n\n**Ursula** VOX POPULI 3'\n\n**Elina Masing** TIT OR ENCO 10'   \nLaval: Jaan Männima\n\n**Edgar Vunsh** KALLE 5'\n\n**Indrek Spungin** SELAVII  8'  \n*Selavii on soov-unenäoline lugu sellest, kuidas võrgutada näitlejaid ja pimedatesse raadiostuudiotesse meelitada, et vaadata, mis inimesed nad on ja mis juhtub nendega eetris, kas eeter vabastab näitleja või on vaja näitlejat vabastada eetrist?*  \nTegelased: Tiit, Ene-Liis, Margus Lepa, Lapsed, Leedukad, Vabamüürlaste täielik nimekiri, Eeter ja Mina.\n\n**Kädi Metsoja** TSIRKUS 5'   \nLaval: Helery Kuld & Matthias Kann\n\n**Katrin Kreutzberg** `EESMÄRGISTAMITTE? Endiselt ühel kohal ja rütmiseeritult. 4'  \n\n\n\"\tenn of estland installatsioonid metsas sada aastat üksildust"
