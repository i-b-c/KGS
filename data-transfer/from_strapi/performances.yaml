    description_et: >-
        Lavastus põhineb švetisi kunstniku Alberto Giacometti sürreaalsetel
        tekstidel, joonistustel ja skulptuuridel, luues nendest visuaalse
        poeemi. Giacometti tööd on lähtepunktiks – need on kui teerada, mis viib
        läbi lausutud ja kirjutatud sõnade, joonistatud ja tantsitud joonte,
        figuuride, helide, kipskujude, teokarpide ja kivide uude kohta.
        Kirjanduse ning visuaal- ja etenduskunstide kohtumispaigas ilmneb
        nähtamatu paik.<br />

        Aastatel 1942–1945 elas Giacometti Genfis. Sõja ajal oli linn
        varjupaigaks paljudele Pariisi kunstnikele ja kirjanikele, pakkudes
        neile võimalust intellektuaalseks mõttevahetuseks. Giacometti kuulus
        ajakirja Labyrinthe toimetaja Albert Skira lähemasse ringi ning kirjutas
        ajakirjale kolm visionaarset artiklit. Genfis kohtas Giacometti ka oma
        tulevast naist Anettet. Genfis veedetud aeg langes kokku tema kunstilise
        karjääri keerulise järgu ja fundamentaalse loomingilise kriisiga. Ta
        elas tagasihoidlikus toas Hôtel de Rive’is, mida kasutas ka oma
        stuudiona. Päevade kaupa püüdis ta luua skulptuure, suutmata valmistada
        enamat kui tillukesed, miniatuursed figuurid. Sikra sõnul mahtusid
        Giacometti Genfi tööd kuude tikutoosi, mille ta peale sõda Pariisi
        naastes taskus kaasa võttis.<br />

        <br />

        <strong>Frank Soehnle</strong> õppis nukukunsti Stuttgarti muusika- ja
        etenduskunstide ülikoolis aastatel 1983–1987. 1987–1990 töötas ta
        Karlsruhe nukuteatri kunstilise juhina ning 1991. aastal asutas ta
        sõltumatu teatritrupi Figurentheater Tübingen. Frank Soehnle töötab
        nukunäitleja, näitleja ja lavastajana ning ka külalisõppejõuna mitmes
        tunnustatud rahvusvahelises koolis. Ta teeb filme televisioonile,
        lavastusi teistele teatritele ning on andnud etendusi Euroopas,
        Iisraelis, Mehhikos, Austraalias, Aasias, Indias ja USAs.<br />

        <br />

        <strong>Figurentheater Tübingen</strong> on professionaalne sõltumatu
        teater, mis otsib oma töös nukuteatri ja teiste kunstide piirimaid. Uute
        teatrivormide loomisel kasutatakse lisaks traditsioonilistele
        nukuteatriliikidele nagu objekti- ja materjaliteater ning
        draamaelementidele ka kujutavat kunsti ja muusikat. Iga uue lavastusega
        rajab kollektiiv teed uute vormiliste ja sisuliste teostuste ja
        küsimuste püstitusteni, mis tavapärasest teatrist oluliselt erinevad.<br
        />

        Teater, mille 1991. aastal rajasid nukunäitlejad Frank Soehnle ja Karin
        Ersching, koondab vabakutselisi kõigist kunstivaldkondadest. Lisaks
        omalavastustele hõlmab teatri töö külalislavastusi teistes teatrites,
        lühifilme kultuurikanalile arte/ZDF ja 3sat, loenguid erinevates
        ülikoolides ning külalisetendusi nii Saksamaal kui ka mujal maailmas.
    description_en: >-
        The production is based on four surrealistic texts of Alberto
        Giacometti: “Yesterday, Quicksand”, “A blind man reaches out the hand in
        the night…” , “Paris without an end” and “The dream, the Sphinx and the
        death of T.” The production is inspired by Giacometti’s sculptures,
        drawings and texts to create a visual poem of its own. His work is the
        starting point, like a trail, which leads to a new place. An invisible
        place appears where visual and performing arts unite with literature. An
        approach in spoken and written words, drawn and danced lines, figures,
        sounds and plaster castings, shells and stones.<br />

        <br />

        **Frank Soehnle** studied the art of puppetry from 1983 to 1987 at the
        University of Music and Performing Arts in Stuttgart. He was artistic
        director of the Puppet Theatre in Karlsruhe from 1987 to 1990 and in
        1991 he founded the Figurentheater Tübingen, an independent company. He
        works as a puppeteer, actor and director as well as a guest lecturer in
        many reputed international schools. He makes films for television,
        produces for other theatre companies and has toured in Europe, Israel,
        Mexico, Australia, Asia, India and the United States.<br />
