    description_et: >-
        Manja van de Worp on YIP Structural Engineering London juhataja, tal on
        magistrikraad arhitektuuris, ehitusinseneerias ning tärkavates
        tehnoloogiates ja disainis. Tal on insenerina ehituses 10 aastat
        kogemust konstruktsioonide, geomeetria ja tootmise vallas. Samal ajal
        õetab ta Royal College of Art-is, Architectural Association-is ja
        IaaC-is.  

        Ta on töötanud Arup London-is kõrgema geomeetria üksuses ning kõrgema
        tehnoloogia ja teaduse grupis, kus projekteeris keeruka geomeetriaga
        liikuvaid konstruktsioone. Aastal 2013 asutas van de Worp inseneeria
        nõustamisbüroo NOUS Engineering London (nüüd YIP), mille pädevusse
        kuuluvad kõrgemad konstruktsiooni analüüsimise tööriistad, keerukad
        kandekonstruktsioonid, materjalid ja tootmistehnoloogiad. Käsilolevate
        projektide seas on näiteks kiudtugevdatudpolumeerist (FRP) koorik ja
        modulaarne terasest katusekonstruktsioon. YIP-i fookuses on ka
        konstruktiivne tootedisain ja uurimisprojektid puidu, betooni
        3D-printimise ja ehitusinseneerias ebatavaliste materjalide vallas.  


        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile. Loengud on inglise keeles ning tasuta.
    description_en: >-
        Manja van de Worp is the director of YIP Structural Engineering, holding
        Master degrees in Architecture, Structural Engineering and in Emergent
        Technologies and Design. She is a structural engineer with 10 years
        professional experience in the construction industry focusing on
        structure, geometry and fabrication, while teaching at the RCA,
        Architectural Association & IAAC.  

        She has worked for Arup in London in the Advanced Geometry Unit and at
        the Advanced Technology and Research group in ARUP, designing structures
        with a complex geometry and moveable structures.

        Manja has Launched NOUS engineering LONDON (now YIP) in 2013 an
        engineering consultancy bearing extensive knowledge of advanced
        structural analysis tools, complex structural systems, materials and
        fabrication technologies. Current projects involve a FRP shell and a
        modular steel roof structure. YIP also focuses on structural product
        design and research based projects, looking at innovative ways to use
        timber, 3d printing of concrete, searching how materials not
        conventionally used in structural design could find their way into
        building engineering.  


        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment. The lectures are
        held in English, free of charge.
