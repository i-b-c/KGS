    description_et: >-
        HELIjaKEEL sarja hooaja aukülalise, soome kuulsaima nüüdishelilooja
        Kaija Saariaho ja kolme eesti helilooja – Arvo Pärdi, Jüri Reinvere ja
        Helena Tulve muusikat esitavad tippmuusikud Eestist ning välismaalt –
        sopran ja harfimängija Arianna Savall (Hispaania) ja flötist Camilla
        Hoitenga (USA).<br />

        <br />

        Kammermuusikute korraldatud muusikalis-kirjandusliku sarja HELIjaKEEL
        selle hooaja põhirõhk on mitte niivõrd heli ja keele, kuivõrd erinevate
        helikeelte kõrvutamisel.<br />

        HELIjaKEEL Saariaho festivali avakontserdil PEEGLID kõlavad vaheldumisi
        Arvo Pärdi ja Kaija Saariaho teosed, mis on helikeelelt küll väga
        erinevad, kuid kus võib leida huvitavaid seoseid.<br />

        <br />

        **Kaija Saariaho** kuulub nende soome heliloojate hulka, kelle looming
        on avaldanud mõju kogu maailmas. Ta õppis Sibeliuse Akadeemias ja
        Freiburgi Muusikakõrgkoolis ning 1982. aastal jätkas loometegevust
        IRCAMi uurimisinstituudis Pariisis – linnas, mis on sellest ajast jäänud
        tema kodulinnaks. IRCAMis töötas Saariaho välja arvuti-assisteeritud
        kompositsioonimeetodi ja omandas vilumuse nii lindilugude
        komponeerimisel kui ka live-elektroonika käsitlemisel. Enne tööle
        asumist IRCAMis tutvus Saariaho prantsuse spektralistide ning nende
        kompositsioonitehnikaga, mis põhineb heli spektri analüüsil. See
        inspireeris teda looma uusi harmoonilisi struktuure ja uusi
        noteerimisvõtteid, näiteks märkimaks üles nii mikrotonaalseid liikumisi
        kui ka heli üleminekut puhtast toonist helikõrguseta müraks.<br />

        [www.saariaho.org](http://www.saariaho.org/)<br />

        <br />

        **Arvo Pärdi** muusika olemuslikuks sihiks näib olevat vaikus, nii
        paradoksaalselt kui see ka ei kõla, sest ta ei näe muusika olemust mitte
        ainult nootides ja helides. Tema jaoks võivad helid olemuslikule üksnes
        vihjata, samuti nagu sõnad jäävad alati ainult vihjelisteks. Tõeline
        jääb alati helide vahele. Seepärast võrreldakse Pärdi loomelaadi ka
        paastumisega, vabatahtliku loobumisega: kahandamine on talle
        rohkendamisest palju olulisem, väljendusvahenditega on ta alati olnud
        kokkuhoidlik, koguni kitsi, ja ometi on tema muusika helde.<br />

        [www.arvopart.ee](http://www.arvopart.ee/)<br />

        <br />

        [www.kammermuusikud.ee](http://kammermuusikud.ee/)
    description_en: >-
        HELIjaKEEL’s Saariaho festival will feature the music of Finland’s most
        renowned contemporary composer Kaija Saariaho in addition to works by
        Estonian composers Arvo Pärt, Jüri Reinvere and Helena Tulve. These will
        be performed by musicians from Estonia and abroad, including soprano and
        harpist Arianna Savall (Spain) and flautist Camilla Hoitenga (USA).<br
        />

        <br />

        The 2015-2016 season of HELIjaKEEL (SOUNDandLANGUAGE) led by
        Kammermuusikud, in addition to its usual mandate of juxtaposing music
        and poetry, focuses more on different musical styles. The opening
        concert of the HELIjaKEEL Saariaho festival – MIRRORS will feature the
        music by Arvo Pärt and Kaija Saariaho. Although the styles of these two
        composers are different, it is also possible to find unifying elements
        in their music.<br />

        <br />

        **Kaija Saariaho** is a prominent member of a group of Finnish composers
        and performers who are now, in mid-career, making a worldwide impact.
        She studied at the Sibelius Academy and continued her studies in
        Freiburg and from 1982, at the IRCAM research institute in Paris – the
        city which has been most of the time her home ever since. At IRCAM,
        Saariaho developed techniques of computer-assisted composition and
        acquired fluency in working on tape and with live electronics. Before
        coming to work at IRCAM, Saariaho learned to know the French
        ‘spectralist’ composers, whose techniques are based on computer analysis
        of the sound-spectrum. This analytical approach inspired her to develop
        her own method for creating harmonic structures, as well as the detailed
        notation using harmonics, microtonal and detailed continuum of sound
        extending from pure tone to unpitched noise.<br />

        [www.saariaho.org](http://www.saariaho.org/)<br />

        <br />

        However paradoxical it might be, silence seems to be the essential
        purpose of **Arvo Pärt’s** music: he does not consider the notes or
        musical sounds as the essence of music. For him, the sounds only point
        towards the essential, in the same way as words always only serve as a
        hint towards something more. The essential will always remain hidden
        between the sounds. Often, Pärt’s creative method is compared with
        fasting, with voluntary asceticism: for him, reduction is far more
        important than enlargement. He has always been frugal with his means of
        expression, even parsimonious – and yet his music is benevolent.<br /> 

        [www.arvopart.ee](http://www.arvopart.ee/)<br />

        <br />

        [www.kammermuusikud.ee](http://kammermuusikud.ee/)
