    description_et: >-
        <strong>Jean-Marc Montera</strong> on Prantsuse improskeene üks
        koloriitsemaid kujusid, kelle muusikalised juured on pärit rockmuusikast
        ja kes juba aastal 1978 lõi Marseilles koosluse GRIM (Group of Musical
        Research and Improvisation), mis on tegev tänaseni. Tema
        koostööpartnerite rida on pikk: Fred Frith, Barre Phillips, Thurston
        Moore, Louis Sclavis, Lee Ronaldo, Michel Doneda jpt.<br />

        Ta paistab silma oma erakorselt laia koostöö poolest eri žanrite
        esindajatega: viuaal - Salvo Cuccia, José Cesarini, teater – Hubert
        Colas, Jean-Claude Berutti, Peter Palitzsc, tants – Odile Duboc,
        collective Skalen, Sandy Amério, Lionel Scoccimaro, Richard Baquié…<br
        />

        Tal on olnud au osaleda kahel väga erilisel kontserdil – Sonic Youth (La
        Villette-Paris 2007) ja Patti Smith (Fondation Cartier - Pariis
        2009).<br />

        <a href="http://www.jmmontera.fr">www.jmmontera.fr </a><br />

        <a href="http://www.grim-marseille.com">www.grim-marseille.com</a><br />

        <br />

        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.<br />

        <br />

        <a href="http://www.improtest.ee">www.improtest.ee </a><br />

        <br />
    description_en: >-
        <strong>Jean-Marc Montera</strong> is a French guitarist with origins in
        rock, specializing in free improvisation and sound experimentation, he
        performs solo and in different groups. Exploiting the full range of
        amplified and acoustic strings: resonances, percussion, distortions,
        extensions and misappropriations of all styles, he evokes a world of
        abstract sound and the daily mechanisms of life and the city. Amongst
        the most active musicians in the field of improvisation, since the
        1970’s he has increased encounters and contact with other artistic
        worlds so much so that he is breaking the barriers between the different
        genres. He participates in many collaborations, for example with image –
        Salvo Cuccia, José Cesarini..., theatre – Hubert Colas, Jean-Claude
        Berutti, Peter Palitzsch…, dance – Odile Duboc, collective Skalen, and
        Fine arts, Sandy Amério, Lionel Scoccimaro, Richard Baquié...<br />

        He has collaborated with Fred Frith, André Jaume, Barre Phillips, Loren
        Mazzacane Connors, Thurston Moore, Lee Ranaldo, Louis Sclavis, Michel
        Doneda, Ahmad Compaoré, Christine Wodrascka, Pauline Oliveros, Pascal
        Contet, Gérard Siracusa… He was invited to two special concerts with
        Sonic Youth (La Villette-Paris 2007) and Patti Smith (Fondation Cartier
        – Paris 2009).<br />

        Jean-Marc Montera co-founded GRIM (Group of Musical Research and
        Improvisation) in 1978. He joined forces with stage director Hubert
        Colas in 1999 to found Montévidéo, centre of contemporary art creations
        in Marseille. The centre’s priority is to create links, to establish
        interactivity between music and theatre in their most modern forms and
        to increase confrontations between artists and disciplines.<br />

        <br />

        Improtest is a concert series that brings improvisational music from
        local and foreign authors to local audience. The concerts have been
        taking place since 2005 once a month.<br />

        <br />

        <a href="http://www.improtest.ee">www.improtest.ee </a><br />

        <br />
