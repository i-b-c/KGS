    technical_info_et: "<p>Lavastaja: <strong>Alissa Šnaider</strong><br />Esitaja:<strong> Kaja Kann</strong><br />Helikunstnik: <strong>Renzo van Steenbergen</strong><br />Valguskunstnik: <strong>Oliver Kulpsoo</strong><br />Dramaturg: <strong>Laur Kaunissaare</strong><br />Dramaturg: <strong>Taavi Eelmaa</strong></p>\n<p><strong></strong>Graafiline disain:\_<strong><strong>Jaan Evart</strong></strong><br />Teleklipp: <strong>Tencu</strong></p>\n<p>Etenduse dokumentatsioon: <strong>Epp Kubu</strong></p>\n<p>Fotod: <strong>Lee Kelomees, Kristin Made</strong></p>\n<p>Projektijuht: <strong>Mairika Plakso</strong><br />Kaasprodutsent: Kanuti Gildi SAAL<br />Toetaja: Eesti Kultuurkapital<br />Esietendus: 29.09.2015 Kanuti Gildi SAAL</p>\nEtendus on eesti ja inglise keeles."
    technical_info_en: "<p>Director: <strong>Alissa Šnaider</strong><br />Performer: <strong>Kaja Kann</strong><br />Sound artist: <strong>Renzo van Steenbergen</strong><br />Light artist: <strong>Oliver Kulpsoo</strong><br />Dramaturge:<strong> Laur Kaunissaare</strong><br />Dramaturge: <strong>Taavi Eelmaa</strong><br />Graphic design: <strong>Jaan Evart</strong></p>\n<p>TV clip:\_<strong>Tencu</strong></p>\n<p>Documentation of the performance:\_<strong>Epp Kubu</strong></p>\n<p>Photos:\_<strong>Lee Kelomees, Kristin Made</strong></p>\n<p>Project manager: <strong>Mairika Plakso</strong><br />Co-production: Kanuti Gildi SAAL<br />Supported by: Eesti Kultuurkapital<br />Premiere: 29.09.2015 Kanuti Gildi SAAL</p>\n<p>\_</p>\n<p>The performance is in English and in Estonian.</p>"
