    description_et: >-
        Ulrika Karlsson on arhitekt ning servo stockholm-i ja vastasutatud
        arhitektuurikoosluse Brrum asutajaliige. Ta on digitaalsete meetodite
        fookusega professor KTH arhitektuurikoolis Rootsis. Karlsson on lisaks
        Konstfack – University College of Arts, Craft and Design
        sisearhitektuuri ja mööblidisaini osakonna juhataja. Ta on olnud
        urbanistika külalislektor UCL Bartlett-i arhitektuuri koolis ja õpetanud
        UCLA-s. Tal on arhitektuurikraad Columbia ülikoolist ja Swedish
        University of Agricultural Sciences maastikuarhitektuuri diplom.  

        Karlsson on panustanud mitmetesse arhitektuuriajakirjadesse nagu
        Perspecta, Via, Arkitektur ja AD. Ta on osalenud näitustel Veneetsia
        Arhitektuuribiennallil, Centre Pompidou’s, ArkDes’s, SFMoMA-s,
        Cooper-Hewitt National Design Museum-is, Wexner Center for the Arts-is,
        MoMA/QNS-is, Artists Space-is, MAK-is ja Storefront for Art and
        Architecture’is. servo tööd on SFMoMA ja FRAC Centre’i
        püsikollektsioonis.  

        Tema mänguline lähenemine tehnoloogia ja materjalidega
        eksperimenteerimisele on kantud huvist arhitektuurse representatsiooni
        ja selle tõlgenduste vastu, mis mõnikord väljendub materjali ja
        informatsiooni sünergias.  


        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile.  


        [www.servo-stockholm.com](http://www.servo-stockholm.com/)
    description_en: >-
        Ulrika Karlsson is an architect and founding member servo stockholm and
        of the newly started architectural design collaborative Brrum. She is a
        professor of architecture at KTH School of Architecture, with a focus on
        digital methods and tools. Karlsson is also a professor at Konstfack –
        University College of Arts, Craft and Design. She has been a visiting
        faculty at Bartlett, UCL, London, teaching Urban Design. Karlsson has
        also taught at UCLA's Department of Architecture and Urban Design. She
        received her Architecture degree from Columbia University and Landscape
        Architecture degree from the Swedish University of Agricultural
        Sciences.   

        Karlsson has lectured and exhibited internationally and contributed to
        numerous journals including Perspecta, Via, Arkitektur and AD. She has
        exhibited at the Venice Architecture Biennale, the Centre Pompidou,
        ArkDes, SFMoMA, the Cooper-Hewitt National Design Museum, the Wexner
        Center for the Arts, MoMA/QNS, Artists Space, the MAK Center for Art and
        Architecture, and the Storefront for Art and Architecture. servo’s work
        is part of the permanent collections of SFMoMA and the FRAC Centre.  

        Engaging a playful use of technology and material experimentation, her
        practice has a specific interest in the role of architectural
        representations and their translations, where we sometimes encounter the
        conflation of material and information. A current project with Brrum
        includes “And or not”, a proposal for a public artwork for the planned
        new park, Norrastationsparen in Hagastaden, Stockholm, which will be
        finished 2021. 
          
        [www.servo-stockholm.com](http://www.servo-stockholm.com/)    


        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment.
