    description_et: >-
        Antoine Picon on Harvard Graduate School of Design’is arhitektuuri
        ajaloo ja tehnoloogia professor ning uurimuse juhataja Ecole Nationale
        des Ponts et Chaussées Pariisis. Picon, kes on õppinud nii inseneeriat,
        arhitektuuri kui ajalugu, keskendub arhitektuursete ja urbaansete
        tehnoloogiate ajaloole 18. sajandist tänapäevani. Ta on kirjutanud neli
        raamatut üleminekust varamodernistlikust ühiskonnast
        industriaalajastusse. Raamatuga “La Ville territoire des cyborgs” (1998)
        alustas Picon digitaalse tehnoloogia ja kultuuri mõju uurimist
        arhitektuurile ja linnaehitusele. Tallinnas räägib ta teemal
        “Arhitektuur ja materiaalsus: Vitruviusest digitaalajastuni”.  

        [www.gsd.harvard.edu/person/antoine-picon/](http://www.gsd.harvard.edu/person/antoine-picon/)<br
        />


        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile. Loengud on inglise keeles ning tasuta.  

        [www.avatudloengud.ee/](http://www.avatudloengud.ee/)<br />
    description_en: >-
        Antoine Picon is the G. Ware Travelstead Professor of the History of
        Architecture and Technology and Director of Research at the Harvard
        Graduate School of Design and Director of Research at the Ecole
        Nationale des Ponts et Chaussées in Paris. Trained as an engineer,
        architect, and historian, Picon works on the history of architectural
        and urban technologies from the eighteenth century to the present. He
        has published extensively on this subject.

        Four of his books are devoted to the transition from early-modern
        societies to the industrial era.

        With La Ville territoire des cyborgs (1998), Picon began to investigate
        the changes brought to cities and architecture by the development of
        digital tools and digital culture.  

        His three most recent books are dealing extensively with this question.
        Digital Culture in Architecture: An Introduction for the Design
        Profession (2010) offers a comprehensive overview of this important
        transition. Ornament: The Politics of Architecture and Subjectivity
        (2013) focuses on the "return" of ornament in digital architecture to
        further the investigation. Finally, Smart Cities: A Spatialised
        Intelligence (2015) discusses its impact on cities.  

        http://www.gsd.harvard.edu/person/antoine-picon/


        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment. The lectures are
        held in English, free of charge.  

        [www.avatudloengud.ee/](http://www.avatudloengud.ee/)<br />
