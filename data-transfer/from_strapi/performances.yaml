    description_et: >-
        **Theodore Parker** on muusik, kes tegeleb kitarri ja elektroonika
        väljendusvõimaluste uurimisega erinevates akustilistes keskkondades
        improvisatsioonilise muusika raames. Teda huvitavad laiendatud
        mängutehnikad, helispatsialisatsioon suhtes konkreetse ruumiakustika
        eripäradega. Theodore on ansambli Punkt Nihu liige ja teeb sageli
        koostööd aristidega nagu Taavi Kerikmäe, Roomet Jakapi, Ekke Västrik ja
        Raul Keller.<br />

        <br />

        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.<br />

        [www.improtest.ee ](http://www.improtest.ee /)
    description_en: >-
        **Theodore Parker** is a musician exploring the use of guitar,
        electronics, and acoustics in improvised music creation. His interest
        revolves around extended approaches to instrumental technique and the
        spatialisation of sound in unique acoustic environments. Theodore is
        member of noise ensemble Punkt Nihu and has regularly performed with
        Taavi Kerikmäe, Roomet Jakapi, Ekke Västrik and Raul Keller. <br /> 

        <br />

        Improtest is concert series that brings improvisational music from local
        and foreign authors to local audience. The concerts have been taking
        place since 2005 once a month.<br />

        [www.improtest.ee ](http://www.improtest.ee /)
