    description_et: >-
        Löökriistamängija Ahto Abner, bassimängija Rivo Laasi ning
        klahvpillimängija-kitarrist Tarvo Kaspar Toome on koos aastaid lavalaudu
        painutanud improansamblis Lippajad, mille koosseis on pidevas
        muutumises. Märtsijooksuga ühineb Priit Lehto häälega.  
          
        Mis siis toimub? Jänes ja Karu vaatavad, kuidas Hunt sätib trumme.
        Vahepeal aitavad. Aga muidu teevad allapoole vööd nalju ja suitsevad
        ohjeldamatult. Kõikidel on piinlik.  

        Ehk siis kujutage nüüd seda ette: Ahto kukub pulmatordist välja ja
        tamburiini täristamine on alanud; temaga liitub Rivo käpiknukkudega,
        mina sätin soengut. See Kolmas Mees ei saa ikka veel midagi aru ja on
        murelik. Ma saadan talle energiat. Hoopis Ahto saab pihta ja kukub
        bossanoovatama.  
          
        Miks me seda teeme? Sest koduvägivald pole kunagi raha sisse toonud? Ja
        kõikidel on natuke piinlik?  
          
        Sae käest küsiti, miks sa saed? Saag vastas: sest puud on.  
          
        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.
    description_en: >-
        So, what´s going on? The Rabbit and The Bear look how The Wolf has set
        up the drum set. They join him to help. And make slapstick jokes while
        doing so. Everyone seems to be embarrassed.  

        Try to imagine this: Ahto falls out of the wedding cake and the
        tambourine starts to rattle; Rivo joins him with hand puppets and I
        adjust my hairstyle. This Third Man still does not understand a thing of
        what is going on and looks worried. I send him my energy in support. But
        it´s Ahto who gets hit with it and starts “bossa nova-ing”.  
          
        Why are we doing this? Because domestic violence has never produced a
        proper income? And everyone is little bit embarrassed?  
          
        Mr. Saw was asked once - why do you saw? Mr. Saw replied: because the
        wood is there.
          
        Improtest is concert series that brings improvisational music from local
        and foreign authors to local audience. The concerts have been taking
        place since 2005 once a month.
