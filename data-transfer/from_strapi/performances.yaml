    description_et: >-
        Tõstmine on spordiala, mis seisneb rauast kangi tõstmisel põrandalt pea
        kohale. Eelduseks on keha, mis on sõltuvuses repetatiivsest treeningust
        ja tehniliselt täpsest sooritusest.   

        "B B" tegeleb kehakultuuri ja spordi temaatikaga, luues pinge näiliselt
        tugeva ning aimatavalt hapra keha vahel. Raskuste tõstmist saab võtta
        metafoorselt, kuid kui kerkib esile pilt naistõstjast, muutub selle
        tähendus pakilisemaks ja spetsiifilisemaks, rõhutades vaatleja mõjuvõimu
        naise keha võimalike funktsioonide üle. Kui palju sellest tugevast
        kehast muutub illusoorseks, kui ta on kinnistunud ideede ja rollide sees
        kaotamas oma voli?  

        Köitvaks muutuvad puutumata alad - lüngad - nendes kinnistunud
        struktuurides. Rikkad piirkonnad, kus juba nähtud ja nihestunud ideed on
        kokku varisenud ning õhku on jäänud puuduolev tulevik - potentsiaal.
        Tulemuseks on sensuaalne treening, mis püüab matemaatilisel pinnal leida
        selles teadmatuses vastuseid. Midagi selles stereotüüpide-reeglistikus
        välja arvutada. Pragmaatilisel, matemaatilisel - ühtlasi äärmiselt
        abstraktsel meetodil - jõuda avarama liiklemiseni.   
          
        barbell - kang  

        snatch - rebimine. kangi tõstmine maast pea kohale ühe katkematu
        liigutusega  

        clean & jerk - tõukamine. kangi tõstmine esmalt maast rinnale ning
        seejärel rinnalt pea kohale  

        deadlift - jõutõmme. kangi tõstmine maast puusadeni (võimaldab lisada
        kangile rohkem raskust)  

        AHAP (as heavy as possible) - nii raske kui võimalik  

        EM (every minute) - igal minutil  
          
          
        Netti Nüganen on lõpetanud Amsterdami Kunstikoolis koreograafia eriala.
        Tema video- ja lavatööd on enamjaolt soolod, mis on tugevalt mõjutatud
        vaatleja-vaadeldava hierarhilistest suhetest. Viimaste aastate jooksul
        on Nüganen jõudnud kulturismi ja crossfiti kaudu raskejõustikuni, mille
        abil püüab ta ümbermõtestada (tugeva naise) stereotüüpseid mustreid nii
        vaataja kui ka vaadeldava seisukohast. Kus asetseb tähelepanu all oleva
        keha enda võim vaatleja suhtes, et otsustada oma funktsiooni ja omaduste
        üle? Leides lohutust ideede paljususest ning vasturääkivustest, püüab
        Nüganen läheneda valvsa ja hoolika tähelepanuga kõigele, mis tundub
        võõras ja kohatu. Tema töid on muuhulgas näidatud Tartu Kunstimuuseumis,
        KIM? galeriis (Riia), Uferstudios (Berliin), Theatre Frascatis
        (Amsterdam) ning Lissaboni Filmifestivalil.
    description_en: >-
        An elusive workout, "B B" approaches weightlifting with a
        friction-creating dry sensuality, featuring a female lifter on a
        mathematical surface, working out possible exits and shifts in the
        already figured-out solutions. A practice of seemingly strong, yet
        fragile body, dependant on repetitive training and technically precise
        performance. How much of this strong body becomes illusive as it is
        loaded with the weights of limited functions and portrayals that are
        projected upon her? Attracted by the gaps between the already
        established structures, all that is left to linger is the lacking future
        - potential - to arrive to more spacious territories.  
          
        barbell -  a long bar used in weight training. weight plates possibly
        attached on each end  

        snatch - an olympic weightlifting movement where the objective is to
        lift the barbell from the ground to overhead in one continuous
        motion     

        clean & jerk - an olympic weightlifting movement where the objective is
        to lift the barbell from ground to overhead in two movements. clean:
        lifting the bar from the ground on the shoulders. jerk: raising the bar
        from the shoulders to overhead   

        deadlift - a weight training movement in which a barbell is lifted off
        the ground to the level of the hips. this enables to work with heavier
        weights  

        AHAP - as heavy as possible    

        EM - every minute  
          
          
        Netti Nüganen has graduated from choreography department in SNDO,
        Amsterdam. Her video and stage works are mainly solos that question the
        hierarchical relations between the subject and the spectator.
        Bodybuilding, crossfit and weightlifting make her celebrate the empty
        and banal, welcoming displacement and gaps between recognisable signs
        and references. Finding solace in contradictions and pluralism, she
        treats everything known with careful deconstruction and everything
        unknown with vigilant attention. Her works have been shown in Tartu
        Kunstimuuseum, KIM? gallery (Riga), Uferstudios (Berlin), Frascati
        (Amsterdam) and Lisbon Film Festival.
