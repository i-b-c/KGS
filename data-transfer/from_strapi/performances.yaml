    description_et: >-
        <!-- Toimetatud 8.01.16 --><strong>Florian Walter</strong> on
        Saksamaalt, Essenist pärit muusik ja helilooja, kes mängib saksofone,
        klarnetit ja lisab sellele vürtsi elektrooniliste abivahendite abil.
        Tema käekiri ühendab veenvalt droone, müra ja musique concréte'i
        kaasaegse improvisatsiooniga.<br />

        <br />

        <strong>Achim Zepezauer</strong> on Dortmundis elav multidistsiplinaarne
        artist, kes on olnud tegev filmi, raadio, muusika ja kunsti
        valdkondades. Alates aastast 2005 on ta impro bändi THE DORF liige.
        Tallinnas atub üles live electronic ja DIY osakonna esindajana.<br />

        <br />

        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.<br />

        <br />

        <a href="http://www.improtest.ee">www.improtest.ee </a><br />

        <br />
    description_en: >-
        <!-- Toimetatud 8.01.16 --><strong>Florian Walter</strong>&nbsp; is a
        musician and composer who seeks new ways to develop and construct sound
        and to perform it in a situative context, without falling back into the
        stereotypes of traditional music. He developed an uncommon way of
        producing dense and microscopic fields of sound which aesthetically blur
        the borders between drone, noise, musique concrete, and contemporary
        improvisation.<br />

        <br />

        <strong>Achim Zepezauer</strong> - after a few gates started bleating
        and Achim Zepezauer took to one’s heels, he is now back with his
        tischlein elektrish to present electro-acoustic ear candy via live
        sampling of vinyl, tapes, and everything that he can trap.<br />

        <br />

        Improtest is a concert series that brings improvisational music from
        local and foreign authors to the local audience. The monthly concerts
        have been taking place since 2005.<br />

        <br />

        <a href="http://www.improtest.ee">www.improtest.ee</a><br />

        <br />
