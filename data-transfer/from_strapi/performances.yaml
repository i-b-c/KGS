    description_et: >-
        Kärdla, Liepaja, Klaipeda, Göteborg… ja nüüd Tallinn. Tere tulemast!<br
        />

        <br />

        CONNEXT on lavastus ühenduvusest, lähedusest ja piisavast distantsist,
        mis on vajalik, et saada olla lähedal. <br /> 

        <br />

        Rūta Ronja Pakalne on lõpetanud Läti Kultuuriakadeemia tantsu ja
        koreograafia erialal (BA) ja õppinud samas ka tantsu / teatri
        magistriprogrammis, samuti õppis ta Brüsselis P.A.R.T.S.-is ja hetkel
        õpib BFM-is audiovisuaalse meedia magistriprogrammis. Ta tegutseb
        vabakutselise etenduskunstnikuna, olles viimastel aastatel esinenud ja
        õpetanud Eestis, Lätis, Belgias ja Islandil. Teda huvitab tantsu- ja
        filmikunsti ühendamine, detailide märkamine mikroliikumistes.
        Tantsukunstis huvitab Rūtat autentne kehateadlikkus ja isikliku jälje
        jätmine iga liikuja enda mineviku ja oleviku kogemuste baasilt.<br />

        <br />

        Laura Kvelstein on aastate jooksul töötanud tantsijana Fine5
        Tantsuteatris ja teeb vabakutselise tantsukunstnikuna kaasa erinevates
        koostööprojektides nii Eestis kui välismaal. Aeg-ajalt annab Laura oma
        teadmisi edasi, juhendades kaasaegse tantsu, balleti või
        kontaktimprovisatsiooni tunde/töötubasid. Hetkel huvitab teda enim
        puudutus kui elukvaliteedi ülioluline, aga tihti unustatud osa.<br />

        <br />

        LAT.EST festival saab teoks vahetult pärast Läti 100.sünnipäeva Kanuti
        Gildi SAALis ning tutvustab Läti kaasaegseid (etendus)kunstnike ning
        nende mõtteid ja tegemisi. Samuti on see pühendatud koostööle ja kõigele
        mis meid ühendab.

        LAT.EST festivali korraldab Kanuti Gildi SAAL koostöös Läti Uue Teatri
        Instituudiga ning see kuulub nii EV100 kui LV100 kultuuriprogrammi.
    description_en: >-
        It is a performance about connection and connectivity, as well as
        finding the right distance in order to (be)come closer.<br />    
         <br />
        Rūta Ronja Pakalne works as an independent artist in performing arts,
        has graduated of a BA program in dance and choreography at Latvian
        Academy of Culture (Riga, Latvia), studied at dance school P.A.R.T.S.
        (Brussels, Belgium.), one year of MA studies in dance/theater at Latvian
        Academy of Culture (Riga, Latvia), currently studying at Baltic Film,
        Media, Arts and Communication school, MA in Audiovisual Media:
        Television and Documentary film. She has been traveling and teaching in
        Latvia, Estonia, Iceland, Belgium and other places in recent years. She
        has always been interested in how to combine dance and film arts, by
        looking closely into micro movements of each detail that we share. Rūta
        works mainly on discovering the mover’s own authentic body awareness and
        personal imprint, in context of their experience, based on past, present
        and future happenings.<br />

        <br />

        Laura Kvelstein has worked as a dancer in Fine5 Dance Theatre and
        participates as a freelance dance artist in various projects in Estonia
        and abroad. From time to time Laura is invited to share her knowledge in
        the form of workshops or classes at different festivals or on other
        occasions. At the moment she is most interested in promoting touch as an
        essential but often neglected aspect in increasing our quality of life.
