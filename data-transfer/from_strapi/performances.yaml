    description_et: >-
        Tania Tovar Torres on arhitekt, kirjanik ja kuraator, kelle huvi keskmes
        on arhitektuurist ning ehitatud keskkonnast lähtuvad narratiivid. Ta on
        Mexico Citys asuva arhitektuursete uurimusprojektide tutvustamisele
        keskendunud kuurerimisplatvormi ja projektiruumi Proyector asutaja,
        direktor ning peakuraator. Samal ajal on ta Saksamaa Säästva Arengu
        Koostööameti konsultant Mehhikos. Varasemalt töötas ta Kanada
        arhitektuurikeskuses Montrealis, Arthur Rossi nimelises
        arhitektuurigaleriis New Yorgis ning Teaduse ja Kunsti ülikoolimuuseumis
        Mexico Citys. Tema uurimusi on kajastanud Arquine (Mehhiko), MAS Context
        (USA) ja ARQ (Tšiili) ajakirjad, ning CCA (Kanada) ja UIC (Hispaania).
        Tania õppis Mehhiko ülikoolis ja Stuttgarti disainiülikoolis Saksamaal
        ning omandas magistrikraadi arhitektuuri kriitilistes, kuratoorsetes ja
        kontseptuaalsetes praktikates Columbia ülikoolis New Yorgis.


        [www.taniatovartorres.com](https://www.taniatovartorres.com/)


        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile.
    description_en: >-
        Tania Tovar Torres is an architect, writer and curator with an interest
        for narratives where architecture and the built environment stand as
        main character. She is a founder of Proyector, a curatorial platform and
        exhibition space based in Mexico City devoted to the promotion of
        architecture research projects. Tania is currently Director and Chief
        Curator of Proyector, as well as a consultant for the German Cooperation
        Agency for Sustainable Development in Mexico. Previously she has worked
        at the Canadian Centre for Architecture in Montreal, the Arthur Ross
        Architecture Gallery in New York, the University Museum of Science and
        Art and the National Council for Educational Development in Mexico City.
        Her research and work has been published in Arquine (MEX), MAS Context
        (USA) and ARQ (CHL) Magazines, the CCA (CAN) and the UIC (ESP). Tania
        graduated as an architect from the National Autonomous University of
        Mexico, studied at the Stuttgart State Academy of Fine Arts and Design
        in Germany, and holds a Masters in Critical, Curatorial and Conceptual
        Practices in Architecture from the Columbia Graduate School of
        Architecture Planning and Preservation in New York.


        [www.taniatovartorres.com](https://www.taniatovartorres.com/)


        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment.
