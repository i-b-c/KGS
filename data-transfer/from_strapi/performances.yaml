    description_et: >-
        Füüsilis-psühhedeelne sisekaemuslik tragöödia koomilis-poeetilises
        võtmes. Või vastupidi. Kõik oleneb vaatenurgast.<br />

        <br />

        Jätaks ajalehes pool lehekülge tühjaks ja kirjutaks suurelt: “MINE VAATA
        ISE!” Ja alla loetamatult pisikeses kirjas: “Hoiatus! Lavastus võib
        tekitada enneolematut tungi visata hundiratast, puhuda seebimulle ja
        suudelda tundmatut!” – Põim Kama, Postimees<br />

        <br />

        Lavastus annab vaatajale võimaluse omaenese ülemullitav hingesita ämber
        täiega kummuli virutada, visata turjalt sinna settinud taak –
        positsioon, kohustused, elu paratamatus, keele ängistus,
        nõudepesumasinasse kuhjunud nõud, mitte kusagile viivad mõtted, ämma
        sünnipäev. Ning rebida ennast alukate väele ja mõttes kaasa mürgeldada,
        möirata, püherdada, rammida, peksta, põgeneda torustikus tiirlevate
        nõmedate mõtete ja emotsionaalsete mürgiaurude käest puhtasse kehalisse
        ekstaasi. Ja siis ennast tühjaks tõmmelnuna ja armastuse altari ees
        puhastununa minna tagasi oma hallide seinte ja valge laega koju, panna
        nõudepesumasin tööle ja heita abikaasa kõrvale, ilma et padi oleks
        igatsusest läbi vettinud. – Katrin Maimik ja Andres Maimik, Eesti
        Ekspress<br />

        <br />

        <strong>Renate Keerd</strong> on vabakutseline lavastaja ja koreograaf,
        kelle lavastusi on esitatud paljudel teatri- ja tantsufestivalidel
        Euroopas, Skandinaavias ja Aasias. Renate on pälvinud kahel korral Eesti
        sõltumatu tantsuauhinna Philip Morris Eesti kui Aasta Läbilööja ja Aasta
        Tegija. Tema lavastus PURE MIND pälvis rahvusvahelisel teatrifestivalil
        Minskis festivali Grand Prix. Lavastuse eest “Põletatud väljade hurmaa”
        pälvis Renate Tartu Kultuurikandja laureaadi tiitli. 2012. aastal asutas
        ta oma füüsilise teatri trupi Kompanii NII.<br />

        <br />

        [www.nuku.ee](http//:nuku.ee/)
    description_en: >-
        A physical-psychedelic introspective tragedy in a comic-poetic key. Or
        vice versa. It all depends on your viewpoint.<br />

        <br />

        This very physical, comic and when necessary even blissfully tragic
        production demonstrates that when the theatre is alive, the classical
        narrative can be discarded without any qualms. - Keiu Virro, Eesti
        Päevaleht.<br />

        <br />

        Renate Keerd has managed to take the physical means of expression and
        create a completely universal stage language easily understood by all,
        and its resourcefulness, wittiness and boundless humour never cease to
        surprise. It speaks to those who are looking for laughs as well as those
        who seek more profound philosophical ideas. - Põim Kama, Postimees<br />

        <br />

        **Renate Keerd** is freelance director and choreographer. Her
        productions have been performed in numerous theatre and dance festivals
        in Europe, Scandinavia and Asia. Her works have been described as
        provocative, humorous, inventive, poetic, witty and sharp. She has
        received the Philip Morris Estonia Dance Award twice. In 2015 her
        performance PURE MIND won the Grand Prix in an International Theatre
        Festival held in Minsk. In 2016 she was the laureate of Estonian Annual
        Theatre Awards. In 2012 she founded her own physical theatre company –
        Kompanii NII.<br />

        <br />

        [www.nuku.ee](http//:nuku.ee/)
