    description_et: >-
        **Eglė Budvytytė ** 

        “Incantation Karaoke”  

        2018  

        <br>

        Ökofeminismi ideedest lähtudes ja oma jõudu laulust ammutades,
        kanaliseerib „Incantation Karaoke“ mitmeid eluvorme, nagu taimed ja
        loomad, bakterid ja seened, keda on praegune aeg vigastanud või keda
        ohustab inimlik ülbus, aga kes on meie ökoloogias tasakaalu
        säilitamiseks hädavajalikud. Rütmi, korduste, hääle helilaine muutmise
        ja füüsilise läheduse kaudu soovib Budvytytė tõmmata publiku
        erinevatesse meeleseisunditesse ja kollektiivsuse astmetesse.  

        <br>

        **Eglė Budvytytė** joonistab oma vokaal- või koreograafiaesinemistega
        välja kehade ja nende keskkondade vahelised suhted, vaadeldes näiteks
        kodeeritud käitumist avalikus ruumis või kombates piire inimliku ja
        mitteinimliku vahel.  

        <br>

        Eglé Budvytyté on Amsterdamis tegutsev kunstnik, kes töötab etendus- ja
        visuaalse kunsti ristumiskohas. Tema töid on eksponeeritud näiteks
        Lofoteni rahvusvahelisel kunstifestivalil, Block Universe festivalil
        Londonis, programmi Art Dubai Commissions raames aastal 2017, Liste
        kunstimessil Baselis, 19. Sydney biennaalil, De Appel Arts Centre’is
        Amsterdamis, CACis Vilniuses ja Stedelijk muuseumis Amsterdamis.
        Budvytytė oli 2012. aastal resident Pariisis Palais de Tokyo muuseumi
        programmis Le Pavillon’is ja 2013. aastal Wielsis Brüsselis.  

        <br>

        <br>

        **Gerry Bibby**  

        “Throwing Voice (Borrowed Time)”  

        2020  

        <br>

        Üritades kaugusi ületades kontakte luua, pani tekstide ansambel hääled
        väljuma kehadest, mis neid kuuldavale toovad, et asuda ruumidesse ja
        esemetesse, milles ja mille kaudu neid kuuldakse. Kaasates eeldatavasti
        elutuid materjale, mis selle võimalikuks teevad, aga ka sissetoodud
        elemente, jäljendatakse kõhurääkijat, kes heidab oma hääle välja
        lootuses, et tema põlvel istuv nukk selle kinni püüab ja seda
        kehastab.  

        Ja/kuigi nagu juhtub meie kõhurääkijaga, ei kuulu see hääl täielikult ei
        seda kõnelevale kehale ega ka kohale, mis seda vastu võtab. See jääb
        hoopis kusagile mujale õhku.

        Berliinis tegutsev **Gerry Bibby** trotsib oma loominguga rangeid
        kategooriaid. Tema teosed koosnevad täpselt välja arvutatud
        skulptuursetest žestidest, mida on segatud tekstiliste ja
        koreografeeritud, etenduslike elementidega. See konkreetne skulptuuri,
        teksti ja esinemise ühend venib ajas ja ruumis, võimaldades kultuurilisi
        ja sotsiaalpoliitilisi viiteid mänguliselt õõnestada. Bibby
        loomepraktika on vaikimisi kinnistatud kunstniku ja institutsiooni
        vahelisse suhtesse või näituse konteksti, sekkudes infrastruktuuri, mis
        tema loomingut võõrustab. Juhindudes soovist tegeleda kunsti
        produktsiooniga, mis ei ole autonoomne ja teostub alles suhtes
        sotsiaalsete ja materiaalsete oludega, suhtub ta soosivalt paigast ja
        olukorrast tulenevatesse komplikatsioonidesse.  

        Bibby teoseid on näidatud Midway moodsa kunsti galeriis Minneapolises,
        O-Town House’is Los Angeleses, Lumiar Cité’s Lissabonis (kõik 2018.
        aastal) ja Kunsthaus Bregenzis (2014). 2020. aastal osales ta Busani
        biennaalil Lõuna-Koreas. Gerry Bibby kirjutas romaani „The Drumhead“
        (Sternberg Press, 2014) ja on Berliini ajakirja Starship üks
        toimetajatest.  

        <br>

        <br>

        **Jelena Glazova**  

        “Greed”  

        2019  

        <br>

        Teos “Greed” hõlmab deklameeritud luuletustest tekkinud helimaastikku.
        See algab helidega, mida tehakse ettelugemisega Jelena Glazova viimasest
        luulekogust „Greed” (2019, Riia). Kõnelemine vallandab helid, mis
        kasvavad massiivseks, kõikehõlmavaks lõuendiks.  

        **Jelena Glazova** on Riiast pärit kunstnik ja luuletaja, kes tegeleb
        eksperimentaalse elektroonilise muusikaga – ta loob
        ambient-helimaastikke, mis on tavaliselt üles ehitatud töödeldud
        vokaalist. Ta on esinenud eksperimentaalse muusika ja helikunsti
        festivalil Sound around Kaliningrad (Kaliningrad, Venemaa), Noise and
        Fury (Moskva, Venemaa), Poetronica (Moskva, Venemaa), Vilnius Noise Week
        (Vilnius, Leedu), muusikafestivalil Skaņu Mežs (Riia, Läti),
        elektroonilise muusika festivalil Art’s Birthday (Stockholm, Rootsi)
        jne. Ta on olnud külalishelilooja keskustes EMS Stockholm ja WORM
        Rotterdam.

        Jelena on kolme luulekogu autor. Esimene kogu „Transfers“ (2013, vene ja
        läti keeles) kandideeris Läti kirjanduse aastapreemiale (LALIGABA),
        teine kogu „Plasma“ (2014) ilmus Eestis (eesti ja inglise keeles) ning
        kolmas raamat „Greed“ ilmus 2019. aastal ja kandideeris Läti
        luulepäevade auhinnale. Jelena luulet on tõlgitud läti, inglise, soome,
        poola, eesti, leedu ja rootsi keelde.
    description_en: >-
        **Eglė Budvytytė**  

        “Incantation Karaoke”  

        2018    

        <br>

        Eglė Budvytytė is an artist based in Amsterdam working at the
        intersection between performing and visual arts. Her work was shown
        amongst others at Lofoten International Art festival; Block Universe
        Festival, London; Art Dubai commissions 2017; Liste, Art Basel; 19th
        Biennale of Sydney; De Appel Arts Centre, Amsterdam; CAC in Vilnius; and
        Stedelijk Museum in Amsterdam. Budvytytė was resident at Le Pavillon,
        Palais de Tokyo, Paris, in 2012 and at Wiels, Brussels, in 2013.    

        <br>

        <br>

        **Gerry Bibby**  

        “Throwing Voice (Borrowed Time)”  

        2020  

        <br>

        In an attempt to make contact by bridging distances, an ensemble of
        texts made sound leave the bodies that speak them to inhabit the spaces
        and objects in which, and through which they are heard. Involving the
        assumedly inanimate materials that make this possible, alongside
        introduced elements, it echoes the work done by the ventriloquist who
        throws her voice, hoping it will be caught and embodied by the puppet on
        her knee.  

        <br>

        And/But as is the case with our ventriloquist, the voice here does not
        belong entirely to either the body that spoke it, or the site that
        receives it. Instead, it lingers somewhere, elsewhere.  

        <br>

        Berlin-based **Gerry Bibby** defies strict categories with his artistic
        practice. His works are made up of precisely calculated sculptural
        gestures, infused with textual and choreographed, performative elements.
        The specific compound of sculpture, text and performance stretches
        temporally and spatially, allowing for playful subversions of cultural
        and sociopolitical references. Implicitly, Bibby’s practice is embedded
        in the relationship between the artist and the institution, or
        exhibitionary context, by means of intervening in the infrastructures
        that host his production. By exploring his interest in admitting an
        artistic production that is not autonomous, one that becomes itself in
        relation to social and material realities, he welcomes the complications
        of site and situation.  

        <br>

        Recently Bibby's works were shown in the Midway Contemporary Art Gallery
        in Minneapolis, the O-Town House in Los Angeles, Lumiar Cité in Lissabon
        (all in 2018) and the Kunsthaus Bregenz (2014). In 2020, he participated
        in the Busan Biennale in South Korea. Gerry Bibby is the author of the
        novel The Drumhead (Sternberg Press, 2014) and is co-editor of the
        magazine Starship in Berlin.  

        <br> 

        <br> 


        **Jelena Glazova**  

        “Greed”  

        2019  

        <br>

        **Jelena Glazova** is an artist and poet from Riga, Latvia, working in
        experimental electronic music – creating ambient soundscapes, usually
        constructed from processed vocals. She performed at experimental music
        and sound art festival Sound around Kaliningrad (Kaliningrad, Russia),
        Noise and Fury (Moscow, Russia), Poetronica (Moscow, Russia), Vilnius
        Noise Week (Vilnius, Lithuania), music festival Skaņu Mežs (Riga,
        Latvia), electronic music festival Art's Birthday (Stockholm, Sweden)
        etc. She was a guest composer at EMS Stockholm, WORM Rotterdam, etc.  

        <br>

        Jelena is the author of 3 books of poetry. First book Transfers (2013,
        in Russian and Latvian) was nominated for Latvian Annual Literary Award
        (LALIGABA), second book Plasma (2014) was published in Estonia in
        Estonian and English, third book Greed was published in 2019 and was
        nominated for Latvian Poetry Days Award. Jelena's poetry is translated
        into Latvian, English, Finnish, Polish, Estonian, Lithuanian, Swedish
        languages.
