    description_et: >-
        <strong>Onur Sönmez</strong> on disainer, kes tegutseb liideste- ja
        interaktsioonidisaini vallas. Tema töid on eksponeeritud järgnevates
        kohtades: Veneetsia Arhitektuuribiennaal, Saatchi galerii Londonis,
        Contemporary Istanbul, Ars Electronica, Transmediale ‘15 Berliinis,
        Media Facades Festival Europe, Connecting Cities, Linz 09 European
        Capital of Culture raames.<br />

        Pärast visuaalse kommunikatsiooni bakalaureusekraadi omandamist
        Istanbuli Bilgi Ülikoolis läks ta täisstipendiumiga Linzi, Austriasse,
        kus omandas liidesekultuurides magistrikraadi Linzi Kunstiülikoolis,
        töötas Ars Electronika Futurelab-is ja Boschi disainistuudios Münchenis
        ning hetkel töötab ta Kontrastmomendis liidesedisainerina, kus muu
        hulgas arendab interaktiivseid liideseid ja juhtimismeetodeid BMW
        grupile.<br />

        <a href="http://www.onursonmez.com">www.onursonmez.com</a><br />

        <br />

        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile.<br />

        <br />
    description_en: >-
        <strong>Onur Sönmez</strong> is a designer, who has a wide range of
        interest in interaction / interface design research. He has been
        exhibited at Venice Architecture Biennale, Saatchi Gallery London,
        Contemporary Istanbul, Ars Electronica, Transmediale ‘15 Berlin, Media
        Facades Festival Europe, Connecting Cities, Linz 09 European Capital of
        Culture etc.<br />

        After receiving his BA degree (with Honours) in Visual Communication
        Design at the Istanbul Bilgi University with full scholarship he moved
        to Linz - Austria, completed his Masters degree of Interface Cultures at
        the Kunstuniversitat Linz and worked for Ars Electronica Futurelab,
        Bosch Design Studio Münich and currently working for Kontrastmoment as
        an Interface Designer on the development and design of interactive
        interfaces and control concepts for BMW Group (including BMWi, Mini and
        Rolls- Royce) and other interesting projects.<br />

        <a href="http://www.onursonmez.com">www.onursonmez.com</a><br />

        <br />

        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment.<br />

        <br />
