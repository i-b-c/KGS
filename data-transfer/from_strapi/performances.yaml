    description_et: >-
        Gesamtkunstwerk on Kinoteatri ja Paavo Piigi humoorikas lavastus, mis
        uurib, kuidas erinevad kunstiliigid inimestele mõjuvad ja neid
        mõjutavad.  
          
        - Kui eestlased nägid esimest korda teatrietendust, olevat nad hirmust
        jooksma pistnud.  
          
        - John Stuart Mill kaalus 20-aastaselt enesetappu, kui tema kätte sattus
        Wordsworthi luulekogu. See tekitas temas hingelise vapustuse ja võitis
        tagasi elule.  
          
        - Aastal 1842 langes naispublik Liszti klaverikontsertide ajal
        minestusse – nähtust hakati nimetama lisztomaaniaks.  
          
        - Saksa sõduritele jagati Esimeses maailmasõjas 150,000 Nietzsche
        raamatut "Nõnda kõneles Zarathustra", et tõsta nende võitlusmoraali.  
          
        - Vanakreeka maalikunstnik Zeuxis olevat surnud naeru kätte, vaadates
        omaenda maali, millel vanem naisterahvas oli palunud kujutada end
        Aphroditena. 


        **Paavo Piik** on 35-aastane dramaturg, lavastaja, luuletaja ja
        sportlane.  
          
        **Kinoteater** on sõprade rühmitus, mis 2011. aastast on loonud
        erinevaid stand-up etendusi, poliitilis-teatraalse sarja „Manifest“,
        lahanud mustkunstniku- ja õpetajaametit, uurinud vanglaelu, toonud
        lavale kaasaegset näitekirjandust ning kokku pannud mitmeid rohkem ja
        vähem naljakaid muid projekte. 


        ¹ Keerulise saksakeelse pealkirjaga lavastus, mis räägib kunsti mõjust
        inimesele.
