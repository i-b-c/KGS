    description_et: >-
        Argo Vals esitleb koostöös plaadifirmaga Vaiguviiul kahe kontserdiga
        oma 2020. aasta albumit “In Loving Memory Of”. 


        Esitlused toimuvad 1.11 Tallinnas Kanuti Gildi SAALis ja 8.11 Tartu Uue
        Teatri väikeses saalis.   


        Argo ei ole laval vaid oma live-elektroonikaga, vaid kokku on tulnud ka
        tema bänd koosseisus Karl-Markus Kohv – trummikomplekt; Karl Petti –
        elektrikitarrid, klahvpillid; Kaie Olmre – klahvpillid; Argo Vals –
        kitarrid, klahvpillid; Alyona Movko – visuaalid ja Taavo Teras –
        helikunstnik  


        “Kitarristi, multiinstrumentalisti ja helilooja Argo Valsi kolmandat
        täispikka albumit eelnevatega (“Tsihcier”, 2012 ja “Nokturn”, 2015)
        võrreldes tundub, et sel korral lubab ta muusikal minna rohkem sinna,
        kuhu see ise tahab ega ürita seda nii teadlikult suunata.” – Kirke
        Karja (pianist, jazzmuusik ja helilooja)  


        “Ei ole harv juhus, kus kuulates üht ja arvates, et juba on teine
        mängima hakanud, tuleb välja, et vana viis kestab edasi. Selline
        mänglevus annab albumile juurde mõnusa voolavuse ning tunni möödudes
        tekib iga kord hämmastus, kui järsku kõlab viimane lugu „Väsimatule
        unistajale slomo”. Ja isegi see muusikapala ei lõppe nii, nagu kuulaja
        võiks aimata. - Kärt Kelder (kultuuriajakirjanik)
