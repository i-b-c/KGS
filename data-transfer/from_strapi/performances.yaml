    description_et: >-
        Kanuti Gildi SAALi populaarseim etenduskunstide post-simman MADE IN
        ESTONIA MARATON tuleb kes-teab-mitmendat korda ning toimub nagu ikka
        ühel märtsikuu laupäeval – seekord 7. märtsil kell 18:00 (kuni ~
        22:00ni). Seekord nagu-ka-iga kord selgub esinejate täis-nimekiri alles
        paar päeva enne üritust – seega parima diiliga põrsas kotis – mis
        täpselt toimuma hakkab pole teada, aga kindlasti saab see olema
        mõtlemapanev, segadusse ajav, meelelahutuslik, vintsutav ja naljakas.   
          
        MADE IN ESTONIA MARATON on lühivormide festival, kus esinejal
        (esinejatel) on kuni 15 minutit laval võimalik teha mida tahes. Laval
        nähtav peab olema originaallooming, mis on valminud spetsiaalselt
        maratoni jaoks. Seega kui loed seda ja tekib tunne, et ise või keegi,
        keda tead, peaks kindlalt osa võtma, siis anna sellest teada hiljemalt
        25. veebruaril aadressil maarja@saal.ee saates oma etteaste
        lühikirjelduse, etendajate nimed ja tehnilised vajadused.  
          
        VALMIS! START! LÄKS!  
          
        *Mitte segi ajada samanimeliste koopiatega.
    description_en: >-
        The most popular performing arts festivity MADE IN ESTONIA MARATHON of
        Kanuti Gildi SAAL is coming for the nth time and is held like usual on
        one Saturday in March – this time on the 7th of March at 6:00 PM (until
        approx. 10:00 PM). This time as always the full performers list is made
        public only few days before – it’s the best leap of faith deal ever – we
        don’t know what exactly is going to happen, but surely it’s going to be
        thought-provoking, confusing, entertaining, tiring and humorous.  
          
        MADE IN ESTONIA MARATHON is a contemporary performing arts festival of
        short formats, where performers have maximum 15 minutes to do whatever
        they want on stage. The performance, short film etc. must be original
        creation especially made for the marathon. If you read this and feel an
        idea coming or if you a person who has, let us know about by writing to
        maarja@saal.ee , please include the technical rider, names of the artist
        and short description of the performance.   
          
        READY! STEADY! GO!
    other_works: null
    technical_info_et: |-
        Valguskujundused: **Rommi Ruttas**  
