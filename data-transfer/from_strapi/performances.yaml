    description_et: >-
        Kanuti Gildi SAAL andis jaanuaris oma 15.  juubelihooajaks välja Ott
        Sandraku kirjutatud raamatu “Püha Kanuti gildist ja selle majadest”.
        Raamat on põgus sissevaade Püha Kanuti gildi ja selle kahe maja
        värvikirevale ajaloole, mis paljastab nii mõndagi majade tegelikust
        tähtsusest eesti haridus- ja kultuuriloos. Loengud on jagatud raamatu
        järgi kaheks: esimeses räägib ta Püha Kanuti gildi ajaloost ning teises
        loengus keskendub eelkõige Kanuti gildi mõlema – nii vana kui ka uue
        maja arhitektuurilisele ja kultuuriloolisele eripärale. Loengutes
        jagatakse nii raamatus olevaid teadmisi kui ka lisainformatsiooni mõlema
        alateema kohta. Huvilistele läheb jagamisele ka trükisoe raamat!<br />

        <br />

        Raadiosaatest Ööülikool tuntud **Ott Sandrak** on mahlase ütlemisega
        ajaloolane ja muinsuskaitse spetsialist, kes on keskendunud muude
        tegevuste hulgas erinevate ehitismälestiste uurimisele ja
        restaureerimisele.
    description_en: >-
        In January Kanuti Gildi SAAL published a book for its 15th season titled
        “St Canute’s Guild and its buildings” by Ott Sandrak. The book is a
        introduction to the St Canute’s Guild and to the history of both of its
        buildings, revealing the importance of their existence in Estonian
        historical and cultural discourse. The given lectures are divided into
        two subjects similar to the book: the first lecture is about the history
        of St Canute’s Guild and the other is focused on the architectural and
        cultural significance of its two buildings. The lectures are contained
        with the information from the book and also beyond. For all the
        aficionados – you can also obtain the brand new book here!<br />

        <br />

        Also known from the radio-show Ööülikool, the well-rounded and opiniated
        historian **Ott Sandrak** is focused among other subjects on research
        and restauration of historical buildings.
    other_works: null
