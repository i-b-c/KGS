    description_et: >-
        Läänemere lood ja legendid  
          
        Õrnas ja puudutavas lavastuses „Virmaliste vennad” tulevad jutustamisele
        maagilised lood ja legendid eesti, soome, leedu, läti ja poola
        pärimusest. Lavastust raamivad eesti folkloorist pärinev muistend
        „Virmaliste vennad” ja rahvalaul „Veere, veere, päevakene”. Lavastust
        elavdavad laulud ja lihtsate pillidega loodud muusika; müstilised lood
        kantakse ette varjuteatrina. Valguse, varjude ja nukkude abil loovad
        Krakovi teatri Figur näitlejad mitmevärvilisi pilte.  
          
        Nad lasevad laval liikuda tabamatutel varjunukkudel, mis valgusmängude
        läbi ellu ärganuna jõuavad kujutlusvõime kõige salajasematesse
        soppidesse ning kannavad vaataja kirjeldamatusse ruumi. Laval võib näha
        nii mereelukaid, veealuseid losse, merede valitsejaid kui ka
        võluuhmrit.  
          
        Muusikaliselt ja visuaalselt paeluv lavastus on mõeldud nii lastele,
        peredele kui kõigile, kes hindavad head muusikat, teatrit ja põnevaid
        lavastusi.  
          
        **Teatr Figur Kraków** on ringi reisiv nuku- ja varjuteater, kelle
        missiooniks on luua originaalseid vaatemänge ja kunstisündmusi, otsida
        uusi väljendusvorme ja leida uudsust traditsioonilistes
        nukuteatritehnikates.  

        TFK annab etendusi nii Krakówi lavadel, nukuteatrifestivalidel kui ka
        väikeste külade kultuurikeskustes Poolas ja välismaal. Kümne
        tegutsemisaasta jooksul on teater välja toonud 15 lavastust. TFK
        suurimaks huviks on varjuteater, teatripedagoogika ja sotsiaalne kunst.
        Regulaarselt toimuvad õpitoad lastele, noortele ja täiskasvanutele.  
          
        **CHOREA** sai alguse 2004. aastal Lublinis. 2007. aastal seadis teater
        end püsivalt sisse Lodzi linnas, kus asuti tööle hämmastavates
        industriaalsetes ruumides 19. sajandist pärinevas tehases nimega
        Kunstiinkubaator.  

        14 tegusemisaasta jooksul on CHOREA teater välja arendanud oma
        haridusliku ja kunstilise programmi. CHOREA liikmed on organiseerinud
        mitmeid rahvusvahelisi töötubasid ja kunstiprojekte, mitu aastat omaenda
        rahvusvahelist teatrifestivali Retroperspektywy ja üleriigilist
        teatrifestivali Perspektywy, ning toonud välja üle 40 teatrilavastuse,
        etenduse ja kontserti.  2015. aastal salvestasid CHOREA liikmed albumi
        „Unelaulud” ning avaldasid näitlejate käsiraamatu „Näitleja füüsiline
        treening”.
    description_en: >-
        Baltic tales and legends  
          
        This exquisite and touching performance titled “Brothers of the Northern
        Lights” features magical stories based on the Baltic Sea tales and
        legends sung in Estonian, Finnish, Lithuanian, Latvian and Polish. The
        stage is enlivened by singing and filled with music produced by several
        simple instruments, while mysterious stories are performed with the use
        of shadow theatre techniques.  
          
        Actors from Teatr Figur Krakow create multicolour images with the help
        of such artistic means of expression as light, shadows and puppets.
        Flashing across the stage are the quite corporeal but at the same time
        elusive shadowy puppets. Brought to life by an appropriate play of
        lights, the figures enter the most intimate spheres of imagination and
        transfer the audience into an indefinable space. The performance
        features inhabitants of the sea world, underwater castles, marine
        creatures, rulers of the underwater kingdoms, and a magic grinder.  
          
        Pleasing both to the eye and the ear, this musically and visually
        attractive performance is addressed to children, families, as well as
        enthusiasts of good music, theatre performances and interesting
        productions.  
          
        Teatr Figur Kraków is a touring puppet and shadow theatre, whose mission
        it is to create original spectacles and artistic events, to seek new
        forms of expression and to find modernity in traditional puppet
        techniques.  

        TFK gives its performances in Kraków, on host stages, at puppet theatre
        festivals as well as in the smallest of cultural centres and villages in
        Poland and abroad. In its ten years of activity, TFK has staged 15 new
        plays. The team’s main field of interest is shadow theatre, theatre
        pedagogy and social art.  TFK regularly holds theatrical workshops
        addressed to children, youth and adults.  
          
        CHOREA Theatre was founded in 2004 in Lublin. Since 2007 they have a
        permanent base in the city of Lodz, working in an amazing industrial
        theatre located in 19th-century factories named Art_Inkubator in The Art
        Factory.  

        During its 14 years of activity, CHOREA Theatre has fully developed its
        educational and artistic programme. CHOREA artists have organized many
        international workshop sessions, transnational artistic projects,
        several editions of their own International Theatre Festival
        Retroperspektywy and nationwide Theatre Festival Perspektywy, and
        created more than 40 theatre productions, performances, and concerts. In
        2015 CHOREA artists recorded a musical album 'Lullabies' and published
        an actors’ training handbook 'Actors’ physical training”.
