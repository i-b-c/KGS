    description_et: "Enric Ruiz Geli koos tema asutatud Barcelona \_interdistsiplinaarse arhitektuuribürooga Cloud 9 tegeleb projektidega \_nii arhitektuuri kui kunsti vallas, lisaks digitaalsete protsesside ja tehnoloogiliste materjalide arendamisega. Arhitekti mitmekülgsed projektid varieeruvad lavakujundustest ja hoonetest \_installatsioonide ja patentideni, koostöös erinevate partneritega.  \nHuvitudes tehnoloogia arengutest digitaalses tootmises ja sooritavast (performatiivsest) arhitektuurist, loob ta intelligentseid struktuure emuleerides ja jäljendades loodust, luues pilootprojekte globaalse soojenemise võimalikeks stenaariumiteks.  \nEnric Ruiz Geli / Cloud 9 on riiklikult ja rahvusvaheliselt tunnustatud uurija ja innovatsiooni rakendaja disainis, kelle tuntumate tööde hulka kuuluvad orgaanilise vormiga ökoloogiline ja futuristlik Villa Nurbs Empuriabravas, elBulliFoundationi peakoka Ferran Adra elamis-ja töötamislabor Cap de Creus, väga ökonoomselt ehitatud Net Zero Building jpm.  \n\n[www.ruiz-geli.com](http://www.ruiz-geli.com/)\n\nArhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste laiemale ringile. Loengud on inglise keeles ning tasuta."
    description_en: "Enric\_Ruiz Geli and his\_interdisciplinary\_architectural team Cloud\_9 in\_Barcelona works\_at\_the\_interface\_between architecture and\_art, digital\_processes\_and\_technological material development. The architects’ multifaceted projects include stage designs and buildings, installations and patents, and are realized together with collaborative partners. Committed to\_the use\_of\_new\_technological developments for digital\_fabrication and the\_performative\_character of architecture,\_which\_creates intelligent structures in emulation\_of\_nature, its\_green\_agenda is\_to\_look\_at Pilot\_Projects\_in Global Warming Scenarios.    \nEnric\_Ruiz\_Geli\_/\_Cloud\_9\_been\_awarded\_nationally\_and\_internationally for\_the\_Research\_and Innovation applied\_to\_the design at, above\_other\_multiple times,\_the\_Research and\_Development Award of the\_Southern\_California\_Institute\_of Architecture and the Catalonian Award of Environment for the Sustainable Architecture.  \nThe\_most\_important projects include\_the Villa\_Nurbs\_in\_Empuriabrava,\_an\_organically formed, ecological and futuristic house; the\_Millennium\_Project\_in Valladolid, with an urban\_retrofitting\_and using for the\_first time\_10\_urban\_wind turbines; elBulliFoundation for the chief Ferran Adrà as a living laboratory in Cap de Creus; and the Media - ICT building in\_Barcelona that has been awarded as\_Best\_Building of the World\_by\_WAF\_2011;\_a Net\_Zero Building with\_a\_very competitive cost of construction.  \n\n[www.ruiz-geli.com](http://www.ruiz-geli.com/)\n\nAt the Open Lecture Series internationally renowned architects, artists, theoreticians, critics and urbanists from all around the globe give talks to offer fresh perspectives on architecture, design, urban development and critical thought. The lectures are open to everyone interested in the future of our living environment. The lectures are held in English, free of charge."
