    description_et: >-
        <!-- Toimetatud 28.01.17 -->Mu vend pakkus hiljuti välja universaalse
        tutvustusteksti, mida võiks minu meelest edaspidi kasutada kõikide
        Kinoteatri lavastuste puhul:<br />

        <br />

        Melih on šokis, kuuldes, et Kenani endise naise nimi oli Melek, kes võib
        olla ta õde. Melih ostab maja, milles Melek elab ja läheb talle külla.
        Veysel nõustub lõpuks lahutusega. Selim mõistab, et Zeynepit sunnitakse
        Erkutiga abielluma.<br />

        <br />

        Melih on seekord Sander. Sandri pilt on seal üleval. Ta tuli ükskord
        ideega, et võiks teha lavastuse pornost. Internetipornost ja üldse.
        Mulle väga meeldis see mõte, sest see on teema, millest ei ole eriti
        räägitud ja milles samas peitub palju meie praegusele maailmale
        olemuslikku: üksindus, anonüümsus, enesekesksus, kiirus, visuaalsus,
        vägivald. Ühest pabernutsakusse lastud spermatilgast näha kogu
        universumit jne.<br />

        <br />

        See on monolavastus. Mis tähendab, et ainult üks inimene on laval. Pole
        näitlejatevahelist dialoogi ega keemiat. Suht igav. Toimub Kanuti Gildi
        SAALis, esietendus peaks olema 17. veebruaril.<br />

        <br />

        Sander Rebane mängib muidu põhikohaga Endla teatris Peeter Paani. Meil
        on mõned inimesed veel abiks. Veiko Tubin teeb heli. Emil Kallas
        valgust. Kristjan Suits lava. Revo Koplus tehnilist poolt. Alari Rammo
        produtseerib. Ei ühtki naist, aga lahedad kutid kõik. Ja Kulka
        toetab.<br />

        <br />

        Tervitan.<br />

        Paavo
