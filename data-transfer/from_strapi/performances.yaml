    description_et: >-
        Helilavastus “Cathexis” on meelelisi aistinguid ühendav, samas lahutav
        ja lahustav lavastus, milles kõik peale tähenduste saab oluliseks.
        Kuidas mõista meelelisust? Mis suudab geomeetriliselt tuttavates
        vormides tekitada üllatusi? Kuidas panevad ruumispetsiifiliselt
        kohandatud helid külastajaid käituma ning milliseks kujuneb
        grupitunnetus ja kaaslaste usaldus?    

        <br>

        Helilavastus “Cathexis” tegeleb lisaks meeliste aistingute
        manipulatsiooni fookusele ka performatiivsele installatsioonile omase
        objektikeskse lavaruumi ja selle anatoomiaga. “Cathexis” on lavastusena
        väga omanäoline, otsiv ja eksperimenteeriv ning sobib kaasaegse kunsti
        vaatajaskonnale ja otsingulisust hindavale publikule laiemalt.    


        <br>

        **Henri Hütt** on (etendus)kunstnik, kelle laia loominguspektrisse
        kuuluvad tehnoloogilise dominandiga etenduskunsti vormid,
        helilavastused, lavastatud näitused, kureerimine, kirjutamine,
        installatiivsete etenduste genereerimine ja muu tabamatu. Henri lähtub
        kestuses olemisest, sest kes palju teeb, see jõuab vähe ajalukku. Tema
        loomingulistest variatsioonidest leiab käesolevas kümnendis lavastusi,
        mis hõlmavad ja koondavad kõiki kohalikke teatreid ning etenduskunsti
        keskuseid, kuid leidub ka tühja ruumi mikrotonaalset värelust.    

        <br>

        Abstraktsete rütmistruktuuride meistrite **Mihkel Tombergi** ja **Roland
        Karlsoni** erinevatest nägemustest sünnib omanäoline nüansirohke ja
        vastandeid siduv tervik, kus kohtuvad kõikvõimalike elektroonikastiilide
        variatsioonid. Algorütmide helikäekirja läbivaks lüliks on aga oma nime
        vääriliselt keerukad rütmitöötlused, mis pigem vabastavad raamidest, kui
        aitavad defineerida žanrikuuluvust. Nende elektrooniline helimuusika
        võib vastavalt valitsevale atmosfäärile olla nii ämbientlik sfäärides
        hõljumine kui ka saata nädalavahetuse peoakrobaatikat. Algorütmid on
        loonud muusikat paljudele Henri Hüti lavastustele ning sellest on
        omakorda arenenud koostööd helilavastuste vallas, millest nimekamad on
        aset leidnud Kumu Öö ja varasemate Üle Heli festivalide raames.
        Kunstnikena tegeleb kolmik seostatult kaasaegse etenduskunsti laiendatud
        väljadega ning helikunstile keha andmisega.
