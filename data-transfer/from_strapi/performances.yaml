    description_et: >-
        On loomulik, et igapäevaselt astume üle mitmete lävede, vahel peatudes,
        teinekord tormates. Lävi ehk künnis saab tihti kohtumispaigaks eri
        maailmade vahel, kus ühel pool on asjade seis üks, teisel pool teine.
        Künnisel peatumisest saab kui kahevahelolek, üleminek, millegi lõpp või
        millegi algus. Künnis on kui piir, piiriala, mis võib nii ühendada kui
        lahutada, piirata kui avada uusi võimalusi. Muudatused võivad olla meile
        nii ootamatud kui ka teadlikud valikud, pealesurutud või vabad.  
           
        Kuus noort kunstnikku tõlgendavad lävelseismist, metamorfoosi ning
        uurivad, kas piirideta maailm on võimalik või on piirid kõikjal me
        ümber.  
          

        Ole hea ja astu üle läve.
    description_en: >-
        We cross several thresholds every day – sometimes stopping, sometimes
        rushing. The threshold becomes a meeting place between different worlds:
        a border where things happen on one side one way and differently on the
        other.  It is a space that can both connect and subtract, restricting
        when new opportunities open up. Stopping on the threshold presents a
        unique dichotomy: a transition between the end of something and the
        beginning of another with unexpected changes alongside conscious
        choices, both imposed or free.  
          
        THRESHOLD features works by six young artists who are currently studying
        in the Department of Jewellery and Blacksmithing at the Estonian Academy
        of Arts.  Each seeks to delineate the physical boundaries and conceptual
        possibilities of thresholds or their inherent potential for
        transformation; thus, revealing whether a world without borders is
        imaginable or whether there are immovable borders surrounding us.  
          
        We invite you to step over the threshold.
