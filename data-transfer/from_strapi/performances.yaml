    description_et: >-
        “HIGHER” on tantsuetendus, mis on inspireeritud ja saanud ainest
        klubides käimise ja tantsimise kogemusest. Sellist tantsuliiki ei ole
        kerge kategoriseerida – see täidab seltskonnatantsu kultuurilist rolli,
        kohati on siin esindatud mitmed tehnikad, stiilid ja mõjud, ning see
        väljendab erakordselt selgelt tantsu peamist eesmärki, inimese
        eneseväljendust.  

        <br>

        Filosoof Julia Kristeva on öelnud: „Mis puutub inimeseks olemisse,
        omaksvõetud poliitilisse, seksuaalsesse, religioossesse, tuttavasse
        identiteeti, siis on meil käes suurte identiteedikriiside aeg. Meil on
        vaja leida keel, mis läheb kaugemale inimlikust, et sellistest
        kriisidest üle saada ja esile kutsuda uus renessanss. Selleks keeleks
        võib olla tants.“ Kuid see tantsu vabastava jõu tõlgendamine ühe
        palvetamise ja eksistentsi tähistamise vormina ning klubi tõlgendamine
        selle ülendava tegevuse paigana, mis sobib igati kokku sageli kasutatud
        võrdlusega klubide ja kirikute vahel, on jäänud täielikult kõige
        levinuma ettekujutuse varju, mille kohaselt on klubi kõigest vaba aja
        veetmise koht.

        Selles lavastuses üritame tuua klubi maagilise olemuse musta kasti
        teatraalsesse/etendavasse konteksti ning usaldame tantsu kui praktikat,
        mis kompenseerib asjaolu, et me ei saa iial olla keegi teine, ning saada
        Üheks.  

        <br>

        **Michele Rizzo** uurimistööl põhinev loomepraktika koreograafi ja
        visuaalkunstnikuna ammutab inspiratsiooni klubikultuurist ja reividest
        kui kogemusest, mis peaks olema kui mikrokosmos, kus inimene eksisteerib
        ja uurib kõige ontoloogilisemaid omadusi: suhet iseendaga, suhteid
        teistega, suhet ruumi ja ajaga. Selle uurimuse maastik on ööklubi –
        kavandatud siseruumides asuva paradiisina, milles asuva tehnika abil
        saab unustada kohaliku aja ja ruumi, ja kuhu saab pageda argimaailmast.
        Koht, kus klubiskäijad sulavad kokku ühises, sõnastamata, kodeeritud,
        kaitstud, kuid koletus, katarsist võimendavat ruumis. Rizzo hinnangul on
        reiv legitiimne liikumise võim, mida harrastatakse mitte tootlikkuse,
        vaid mõnu eesmärgil. See nauding võib süüdata tule, mis ulatub
        klubiseintest kaugemale, silub traumasid ja ravib identiteedikriise.  

        <br>

        Michele Rizzo on Amsterdamis tegutsev Itaalia koreograaf ja kunstnik,
        kes lõpetas 2011. aastal Amsterdami School for New Dance Development’i
        (SNDO) ja 2015. aastal Amsterdami Sandbergi Instituudi visuaalkunsti
        magistriprogrammi. Viimasel viiel aastal on Rizzo loonud koreograafiat
        teatrites ja näitusesaalides, kus ta on tegelenud liikumise kui
        identiteeti kujundava tegevusega. Kuigi kõiki tema teoseid ühendab selge
        huvi muutumise poeesia, saamise ja ületamise vastu, kristalliseeruvad
        sellise multidistsiplinaarse lähenemise tulemused sageli väga
        eripalgelisteks esinemisteks. Ta on regulaarne koreograafia ja
        liikumisõppe külalisõppejõud SNDOs Amsterdamis ning on korraldanud
        töötubasid näiteks ImPulsTanz festivalil Viinis, Sandbergi Instituudis
        Amsterdamis, ISACis Brüsselis ja Studio 303-s Montrealis.
    description_en: >-
        HIGHER is a dance performance inspired and based on the experience of
        clubbing and club dancing. Such form of dance, which is not easily
        ascribed to any category, taking the cultural role of social dance and
        also at times featuring various techniques, styles, and influences, is
        extremely explicative of what ultimately seems to be the purpose of
        dancing, intended as a human form of expression.  

        <br>

        Philosopher Julia Kristeva once said: “As to be human, embraced
        political, sexual, religious, familiar identity, we are undergoing a
        time of major identity crises. We need to find a language that
        transcends the human in order to overcome such crises and awake a new
        Renaissance. This language can be dance”. To interpret this cathartic
        power of dance, as its being a form of prayer and celebration of
        existence, and a club is a place for such transcending activity, which
        entirely matches the often used association of clubs to churches,
        however, obscured by the most common understanding of clubbing as a mere
        recreational activity.  

        <br>

        In this performance, while trying to transfer the magical essence of the
        club in the theatrical/representational context of the black box, and
        trusting in dance as the practice that compensates for the fact that we
        can never be each other, we attempt to become One.  

        <br>

        **Michele Rizzo**’s research-based practice as a choreographer and
        visual artist draws inspiration from club culture and the experience of
        raving intended as a microcosmos in which the human exists and explores
        its most ontological characteristics: relationship with the self,
        relationship with the other, relationship with space and time. The
        landscape of his research is the nightclub, intended as an interior
        haven built with such technology that allows the neglect of local time
        and place, and in which to escape from the daily world. A place in which
        club-goers merge in a communal, undefined yet coded, protected yet
        monstrous space, that enhances the experience of catharsis. According to
        Rizzo the rave is the legitimate reign of movement which is not
        cultivated for the sake of productivity, but for the sake of pleasure.
        This pleasure is able to ignite a fire that goes beyond the walls of the
        club, soothes traumas, and heals identity crises.  

        <br>

        Michele Rizzo, Italian choreographer and artist based in Amsterdam,
        graduated in 2011 the School for New Dance Development in Amsterdam
        (SNDO), and in 2015 the Sandberg Institute Amsterdam in the Dirty Art
        Department Master program for visual arts. In the past five years, Rizzo
        has produced choreographic works for theatres and exhibition spaces, in
        which he has dealt with movement as an identity-forming agency. Although
        all his works are united by a distinctive interest in the poetics of
        transformation, becoming and transcending, the outcomes of such a
        multidisciplinary approach often crystallize in very different
        performances. He is a regular guest teacher in choreography and movement
        research at the SNDO in Amsterdam, and has taught workshops at, among
        others, ImPulsTanz Vienna, Sandberg Institute Amsterdam, ISAC Bruxelles,
        Studio 303 Montreal.
