    description_et: >-
        **Ninh Lê Quan** on isikupärase käekirjaga löökpillimängija, kes kuulub
        euroopa vabaimprovisatsiooni absoluutsesse tippu. Tema mängustiili
        iseloomustab väga tundlik sonoristlik kõlamaailm, virtuoossed laiendatud
        mängutehnikad ja terav ajatunnetus. Ninh peab oluliseks suhtestumist
        konkreetse ruumi akustikaga. <br />

        <br />

        **Taavi Kerikmäe** on pianist ja elektronmuusik. 

        Tema muusikat võiks iseloomustada kui musique concret, mida esitatakse
        lives. Taavit köidavad helilised objektid oma kordumatutes tämbrites ja
        akustilistes omadustes. <br /> 
         <br />
        “Heli tegeleb meiega ja meie tegeleme heliga”<br />

        <br />

        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.
    description_en: >-
        **Ninh Lê Quan** is appriciated percussionist who is considered to be
        one of the top free-improvisation artist in Europe. Very sensitive
        sonoric sound scape, virtuously extended playing techniques and sharp
        time sense characterize his playing style. Ninh considers very important
        to relate to the acustics of specific room. <br />
          <br />
        **Taavi Kerikmäe** is a pianist and electron musician. His music can be
        described as musique concret that is played live. Taavi is fascinated by
        acoustic objects with their uniqe timbers and acoustic features.<br />

        <br />

        “Sound deals with us and we deal with sound”<br />

        <br />  

        Improtest is concert series that brings improvisational music from local
        and foreign authors to local audience. The concerts have been taking
        place since 2005 once a month.
