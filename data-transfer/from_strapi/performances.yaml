    description_et: >-
        Enne kui võtab lõpliku vormi tantsulavastus “feelings”, mis tegeleb
        tunnetega, toimub Kanuti Gildi SAALis showing “pre-feelings”. “feelings”
        saab olema nii tants kui selle toimumispaik, kus tunded on ühtaegu nii
        läbipaistmatud kui plastilised, kus tunnete vormid ja vormi tunnetus
        kattuvad niimoodi, et jääb ebaselgeks, kas see, mida sa tunned tuleneb
        sinust või keskkonnast.  


        *Ühel hommikul vaatad sa pilve ja näed mingit kuju. Sa taipad, et see
        kuju on sinus eneses, nii et sa kujundad selle põhjal arvamuse, et parem
        on saada sõpradeks. Järgmisel päeval näed sa veel kujusid, igal pool on
        kujud! Sa saad nende kõigiga sõbraks ja neist saavad sinu nähtamatud
        kambajõmmid. Nad suunavad sind ja ei võta kaua aega, kuni sa hakkad
        neile täielikult lootma. Sa ei suuda ilma nendeta enam elada.  

        Mõnel päeval aga on nad sinu vastu õelad, nad manipuleerivad, viivad
        sind eksiteele või lausa kummitavad sind. Neil päevil kahtlustad sa, et
        nad on topeltagendid. Ja sa hakkad kahtlema, kas nad on sinu nähtamatud
        sõbrad või on nad kellegi teise nähtamatud sõbrad.  *


        “feelings” on üks osa pikaajalisest uurimustööst “analysis”, mis tegeleb
        tunnete poliitikaga. “analysis” saab alguse tantsust ja võtab vormi
        erinevates formaatides, kontekstides ja koostöödes. “analysis” küsib
        küsimusi subjekti ja tunnete suhete kohta. Olgu tegemist subjekti endi
        tunnete või teiste tunnetega. “analysis” saab alguse eeldusest, et
        tunded on pigem läbipaistmatud kui läbipaistvad, pigem vahendatud kui
        vahetud ning tunded on eelkõige midagi, mida sa viid ellu, mitte midagi
        mida sa omad. Sellest lähtudes on aimatav ka selle edasine
        liikumissuund, kuidas kujutada mismoodi need väited võiks avalduda
        inimeste, tantsu ja maailma vahelistest suhetes ning väljaspool.  


        “analysis” algatas Adriano Wilfert Jensen 2017. aastal ja senini on
        Karima El Amrani, Stefan Govaart, Sandra Lolax, Alexandra Tveit, Marie
        Ursin, Dean Blunt, Anne Juren, Simon Asencio, Dina El Kaisy ja Chloe
        Chignell olnud osalised selle edasi arendamises.
    description_en: >-
        “feelings” will be a dance performance about and with feeling(s) and
        before it we propose “pre-feelings” at Kanuti Gildi SAAL. “feelings”
        wants to be a setting and a dance where feelings are opaque and plastic,
        where forms of feelings and feelings of forms overlap, and where it is
        unclear if what you feel is coming from you or to you.


        *One morning you look at a cloud and see a figure. You realize that this
        figure is in you, so you figure you better make friends. The following
        day you see more figures, figures everywhere! You make friends with all
        of them, and they become your invisible posse. They guide you, and it
        doesn’t take long before you are totally relying on them. You can’t live
        without them anymore.

        Some days though, they are mean to you, they manipulate, mislead or even
        ghost you. On those days you suspect them to be double agents. And you
        start to doubt whether they are your invisible friends, or the invisible
        friends of somebody else.* 



        “feelings” is one part of “analysis”: a long term research project into
        the politics of feeling(s). analysis is rooted in dance and unfolds in
        various formats, contexts and collaborations. analysis asks questions
        about the relations between subjects and feelings. Be it the feelings
        “of” subjects themselves or “of” others. analysis starts from the
        suppositions that feelings are opaque rather than transparent, mediated
        rather than immediate, and that feelings are something you do rather
        than something you have. From there it feels its way forward, trying to
        contour how such propositions could inform relations between people, in
        dance and beyond.


        “Analysis” was initiated by: Adriano Wilfert Jensen in 2017 and so far
        Karima El Amrani, Stefan Govaart, Sandra Lolax, Alexandra Tveit, Marie
        Ursin, Anne Juren, Simon Asencio, Chloe Chignell, Dina El Kaisy and Dean
        Blunt have been part of its development.
    other_works: null
    technical_info_et: >-
        “pre-feelings” esitavad: **Chloe Chignell, Stefan Govaart, Alexandra
