    description_et: "6 päeva jooksul mängivad ühe brittide tuntuima sõltumatu teatritrupi liikmed ühe kaupa ette 36 Shakespeare’i näidendit.  \n\nSoola- ja pipratoos moonduvad kuningaks ja kuningannaks. Vaasist saab prints. Tikutoosist saab kelner. Tualettpaberirullist kõrtsmik. Veepudelist sõnumitooja. \n“Kogutud teostes” loovad kuus etendajat kõigist Shakespeare’i näidenditest kompaktsed versioonid, mida etendatakse koomiliselt ja koduselt, kasutades ühemeetrisele lavapinnale asetatud tavalisel laual tegelaskujudeks argiesemeid.  \n\nForced Entertainmentil on huvitunud kaua aega virtuaalsest ja kirjeldavast etendusvormist, uurides läbi aastate erinevaid viise kuidas tuua ebatavalisi stseene, kujundeid ja lugusid lavale keele kaudu. Trupi täiesti uudsel suunal vaadeldakse lavastusega “Kogutud teosed: lauapealne Shakespeare” Shakespeare’i komöödiates, tragöödiates, ajaloolistes kirjutistes ja hilisemates näidendites jutustuste dünaamilisust. Järgneb lihtne ja idiosünkraatiline, absurdne ja veidralt kütkestav lo-fi stiilis kodukootud nukuteater. Näidendite lood ärkavad ellu ilmekas miniatuurvormis. \n \n“Kogutud teostega” käsitleb Forced Entertainment esmakordselt draamakirjandust ja Shakespeare’i pärandit. Tulemuseks on näidendite kohatine samaväärseks tegemine - toimub õrnalt koomiline näidenditekstide uuesti sõnastamine köögikapist ja toidupoest pärit esemete kaudu, kuid samas pühitsetakse jõudu, mis on neis näidendites, jutuvestmises ja teatris iseendas.\n\nForced Entertainment endast:  \n“Meie looming proovib avastada, mida teater ja etenduskunst võivad tänapäeval tähendada. See on alati pigem vestlus või läbirääkimine; miski, mis peab olema elav. Me oleme huvitatud lavastuste tegemisest, mis tekitavad põnevust, esitavad väljakutse, küsivad küsimusi ning lõbustavad inimesi. Me oleme huvitatud nii segaduse kui ka naeru põhjustamisest.\nMe alustasime koostööd 1984. aastal. Sellest ajast oleme me teinud palju erinevaid projekte nagu näiteks teinud nimekirju, mänginud mänge, rääkinud plära, olnud vaikuses, tekitanud korralageduse, pannud end riidesse, võtnud riided seljast, kõigele üles tunnistanud, etendanud võlutrikke, rääkinud nalju, mänginud kloune, mänginud surnut, jäänud purju, rääkinud lugusid ning esinenud kuus, kaksteist ja isegi kakskümmend neli tundi järjest. Me oleme töötanud tekstidega, tantsinud ja liigutanud, me oleme suhtunud tähenärijalikult asjadesse, me oleme improviseerinud. Me oleme teinud tõsist etendust, mis kukkus välja koomiliselt ja koomilist etendust, mis oli hoopis surmtõsine. Sellega süveneme me teatrisse ja etenduskunstidesse, ning me mõtleme, mis need vormid on meie jaoks ja milliseid dialooge nad suudavad avardada kaasaegse publikuga.\nLisaks etendustele oleme teinud ka installatsioone galeriides, kohaspetsiifilisi etendusi, raamatuid, fotograafia kollaboratsioone, videosid ja isegi ühe riukaliku giidiga bussireisi. Mitmes mõttes on see teatrikompanii meie tegemiste aluspõhi, inimsuhete ehitamise haruldane näidis, kus pika aja vältel säilitatakse ja jätkatakse ühise sõnavara arendamist, töötamisviisi ja uuendamist.”  \n\nForced Entertainment tegutseb lavastaja Tim Etchells’i juhtimisel. Forced Enterteinment on esinenud Eestis Baltoscandali festivalil 2014 ja Tim Etchells osales Baltoscandali festivalil 2016. \n2016.aastal autasustati truppi väga prestiizika Ibseni teatri auhinnaga, pikaajalise teatrikunsti arendamise eest. \n\nForced Entertainment “Complete Works: Table Top Shakespeare” (Kogutud teosed: lauapealne Shakespeare) Tallinnas kava:  \n\nTeisipäev 5.09  \n18:00 \"Antony and Cleopatra\" (\"Antonius ja Kleopatra\")\tesitab Cathy Naden     \n19:00 \"The Merchant of Venice\" (\"Veneetsia kaupmees\") esitab Nicki Hobday  \n20:00 \"Coriolanus\" esitab Jerry Killick  \n21:00 \"As You Like It\" (\"Nagu teile meeldib\") esitab Robin Arthur  \n\nKolmapäev 6.09   \n18:00 \"Richard II\" esitab Terry O’Connor  \n19:00 \"Henry IV Part 1\" esitab Jerry Killick  \n20:00 \"Henry IV Part 2\" esitab Jerry Killick  \n21:00 \"Much Ado About Nothing\" (\"Palju kära ei millestki\") esitab Richard Lowdon\n\nNeljapäev 7.09  \n18:00 \"Henry V\" esitab Nicki Hobday    \n19:00 \"Pericles\" esitab Cathy Naden  \n20:00 \"The Comedy of Errors\" (\"Eksituste komöödia\") esitab Terry O’Connor      \n21:00 \"King Lear\" esitab Robin Arthur  \n\nReede/ 8.09    \n18:00 \"Henry VI\" Part 1 esitab Richard Lowdon  \n19:00 \"Henry VI\" Part 2 esitab Richard Lowdon  \n20:00 \"Henry VI\" Part 3 esitab Richard Lowdon  \n21:00 \"Twelfth Night\" (\"Kaheteistkümnes öö\") esitab Jerry Killick  \n\nLaupäev/ 9.09   \n12:00 \"Othello\" esitab Cathy Naden   \n13:00 \"All’s Well That Ends Well\" (\"Lõpp hea kõik hea\") esitab Nicki Hobday  \n14:00 \"Julius Caesar\" esitab Robin Arthur  \n15:00 \"The Merry Wives of Windsor\" (\"Windsori lõbusad naised\") esitab Terry O’Connor  \n16:00 \"Macbeth\" esitab Richard Lowdon  \n18:00 \"Richard III\" esitab Nicki Hobday  \n19:00 \"Troilus and Cressida\" esitab Jerry Killick  \n20:00 \"The Winter’s Tale\" (\"Talvemuinasjutt\") esitab Cathy Naden  \n21:00 \"Loves Labour’s Lost\" (\"Asjatu armuvaev\") esitab Robin Arthur  \n22:00 \"Hamlet\" esitab Terry O’Connor  \n\nPühapäev/ 10.09   \n12:00 \"Titus Andronicus\" esitab Robin Arthur  \n13:00 \"Taming of the Shrew\" (\"Tõrksa taltsutus\") esitab Nicki Hobday  \n14:00 \"Cymbeline\" esitab Terry O’Connor  \n15:00 \"King John\" esitab Cathy Naden   \n16:00 \"A Midsummer Night’s Dream\" (\"Suveöö unenägu\") esitab Jerry Killick  \n18:00 \"Romeo and Juliet\" esitab Terry O’Connor  \n19:00 \"Timon of Athens\" (\"Timon Ateenast\") esitab Robin Arthur  \n20:00 \"Measure for Measure\" (\"Mõõt mõõdu vastu\") esitab Cathy Naden  \n21:00 \"Two Gentlemen of Verona\" (\"Kaks veroonlast\") esitab Nicki Hobday   \n22:00 \"The Tempest\" (\"Torm\") esitab Richard Lowdon\n\nTänud RSC My Shakespeare initsiatiivile, kes tellis Tim Etchells’i teose “Be Stone No More”, mis oli esimene, veel arengujärgus versioon sellele projektile.  \n\nForced Entertainment loominguline meeskond: Robin Arthur, Tim Etchells (kunstiline juht), Richard Lowdon (kujundaja), Claire Marshall, Cathy Naden ja Terry O’Connor.  \nForced Entertainment korralduslik meeskond: Eileen Evans (tegevjuht), Jim Harrison (produktsioonide manager) ja Natalie Simpson (kontori juht).\n\n“Forced Entertainment, having daringly shaken up traditional approaches to theatre and performance, make for playful and thought-provoking works.” PLAYS TO SEE   \n“The Complete Works excel in their simplicity.” THE STAGE  \n“A tiny boat ride across an infinite sea of plot.” FOREST FRINGE (ANDY FIELD VIA TWITTER)     \n“It’s a reminder that one person – armed with a story and some bric-a-brac – can create colossal worldS.” THE STAGE   \n“Is it possible for a jar of Roses lime marmalade to blush?” THE GUARDIAN   \n“If you told me a few days ago I would feel genuine empathy for a bottle of Tabasco, I’d have probably laughed in your face and called you crazy.” A YOUNGER THEATRE  \n\nKoduleht: [www.forcedentertainment.com/](http://www.forcedentertainment.com)  \nFacebook [www.facebook.com/pages/Forced-Entertainment/247617408590375](https://www.facebook.com/pages/Forced-Entertainment/247617408590375)  \nTwitter @ForcedEnts"
    description_en: >-
        A salt and pepper pot for the king and queen. A ruler for the prince. A
        spoon for the servant. Lighter fluid for the Innkeeper. A water bottle
        for the messenger.   


        One by one, over 6 days, Forced Entertainment performers condense every
        Shakespeare play ever written into a series of 36 intimate and lovingly
        made miniatures, played out on a one metre table-top using a collection
        of un-extraordinary everyday objects.   


        Forced Entertainment have long had an obsession with virtual or
        described performance, exploring in different ways over the years the
        possibilities of conjuring extraordinary scenes, images and narratives
        using language alone. In a brand new direction for the company, Complete
        Works explores the dynamic force of narrative in a simple and
        idiosyncratic summary of Shakespeare’s comedies, tragedies, histories
        and late plays, creating worlds as vivid as they are strange.    


        Since forming Forced Entertainment in 1984, the six core members of the
        group have sustained a unique artistic partnership for more than 30
        years, confirming their position as trailblazers in contemporary
        theatre. The company’s substantial canon of work reflects an interest in
        the mechanics of performance, the role of the audience and the
        machinations of contemporary urban life. The work is distinctive and
        provocative, delighting in disrupting the conventions of theatre and the
        expectations of audiences. Forced Entertainment’s trademark
        collaborative process – devising work as a group through improvisation,
        experimentation and debate – has made them pioneers of British
        avant-garde theatre and earned them an unparalleled international
        reputation.   

        2016 the company was awarded with the prestigious International Ibsen
        Award. 


        Forced Entertainment “Complete Works: Table Top Shakespeare” in Tallinn
