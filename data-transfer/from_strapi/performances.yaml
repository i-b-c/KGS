    description_et: >-
        Kui sa plaksutad, kas bakterid sinu kätel tunnevad valu?  

        Residentuuris uurib Karolin seda hetke, mis jääb etenduse lõpu ja
        aplausi vahele.  


        **Karolin Poska** on vabakutseline tantsukunstnik, kes on lõpetanud TÜ
        Viljandi Kultuuriakadeemia tantsukunsti eriala. Karolinil ei ole veel
        suuri auhindu ja prominentseid koostööpartnereid, kellega uhkustada ja
        ta ei kavatse ka siinkohal luisata. Oma etendustes on ta
        eksperimenteerinud live-elektroonilise muusika ja tantsu piiridega, kuid
        kunagi ei või teada, millega ta järgmisena katsetab.  


        NB! Karolini fotonäitus on üleval alates 16.veebruarist Kanuti Gildi
        SAALi fuajees.
    description_en: >-
        What happens to the bacteria on your hands when you clap your hands
        together? Does this make the bacteria feel pain?  

        In this residency Karolin is investigating the moment between clapping
        and the end of a performance.  


        **Karolin Poska** is a freelance dance artist, who has graduated
        University of Tartu Viljandi Culture Academy Dance Art Faculty. Karolin
        does not yet have big awards or collaborations with famous people to
        brag with and she does not plan to make them up. In her performances she
        has explored the connections between live electronic music and dance,
        but you never know with what is she going to experiment with next.  


        NB! Photo exhibition of Karolin is opened from 16th of February at
        Kanuti Gild SAAL lobby.
