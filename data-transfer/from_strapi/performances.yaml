    description_et: >-
        **NB!<br />

        Kristjan Suitsu “Waiting for the future” toimub Kanuti Gildi SAALi III
        korrusel 22. ja 23.10 kell: 16:00 + 17:00 + 18:00<br />

        Piletilevist ostes saate valida endale sobiva kellaaja.**<br />

        <br />

        Valgus- ja ruumiinstallatsioon    


        Mis juhtub tulevikus, mida toob homne, mis saab olema, mis jääb
        saavutamata, mis suunaline on liikumine või liiklus? Installatsioon
        keskendub aja ja ruumi ning keskkonna ja inimlikkuse suhetele. 
         
        Aeg  

        vari  

        loojang  

        tõus  

        nähtu  

        nähtamatu  

        ootus  

        hirm  

        ärevus  



        **Kristjan Suits** on filmi- ja teatrikunstnik. Õppinud Taanis Aarhusi
        Tehnikakõrgkoolis multimeedia disaini, TÜ Viljandi Kultuuriakadeemias
        valguskujundust ja Eesti Kunstiakadeemias filmistsenograafiat. 2018.
        aasta augustist Tallinna Linnateatri peakunstnik.
    description_en: >-
        **NB!<br />

        Kristjan Suits' “Waiting for the future” takes place on the 3rd floor of
        Kanuti Gildi SAAL on Oct 22nd and 23rd at: 16:00 + 17:00 + 18:00<br />

        You can choose a suitable time when buying from Piletilevi.**<br />

        <br />

        Light and spatial installation    


        What will happen in the future, what will tomorrow bring, what will be,
        what will be unattainable, what is the direction of movement or traffic.
        The installation focuses on the relationships between time and space and
        the environment and humaneness.    
         
        Time  

        shadow  

        sunset  

        ascent  

        seen  

        unseen  

        anticipation  

        fear  

        anxietys  



        **Kristjan Suits** is a film and theatre artist. He has studied
        multimedia design at the Technical College of Aarhus in Denmark, light
        design at the University of Tartu Viljandi Culture Academy and set
        design at the Estonian Academy of Arts. From August 2018, he works as
        the head designer at the Tallinn City Theatre.
