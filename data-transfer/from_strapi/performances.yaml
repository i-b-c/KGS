    description_et: >-
        Jalajäljed lumel on anonüümsemad kui meie igapäevased harjumused ja
        tegevused. Iga liigutus jätab meist maha andmekogumid, mis jäävad kuhugi
        alles nagu sisalikutee kivil.   

        „...kuigi mee-eee seda ei nää-ää-ä-äe...“ (karjuda Tõnu Tepandi
        häälega)  

        Seega ma loodan, et keegi ei pahanda, kui teda Kanuti Gildi SAAL-i
        uksest sisenedes varjatult jälgima asutakse. Hoidke silmad lahti! Keegi
        fuajees (kohalikus keeles „metsas“) kohvijoomist teesklev ja teile vbl
        tuntud inimene jälgib teid silmanurgast. Erutav? Ärritav? Ahistav? Kui
        sa juba oled siin, siis sa ka osaled. Tegid just 6 sammu. Riputasid jope
        vasakult 35nda riidepuu peale. Noogutasid 3 korda vestluspartneri väite
        peale. Tundke ennast vabalt, numbrijada jääb teist maha niikuinii. Isegi
        kui te mitte midagi ei tee, on seda võimalik numbriliselt kirjeldada
        ümbritseva keskkonna muutuste kaudu. Sina istud peldikus, aga Madridi
        Real lööb selle aja jooksul 2 väravat. Ning keegi korjab sellegi numbri
        üles, salvestab ja rakendab. Antud olukorras teen seda mina ning iga
        teie kõige mõttetumgi liigutus hakkab mõjutama performance´i kulgu. Aga
        teie tahe ei otsusta siin midagi. Istuge kasvõi 27 minutit tualetis.
        Enne saalitulede kustumist ei ole teil aimugi, mis mõju on teie
        „kineetilisel jalajäljel“ tänaõhtusele performance´ile. Edasise teevad
        ära juba masinad, mateeria ja inimkeha. Teie töö on selleks korraks
        tehtud. Lõdvestuge! Nautige!  


        Erik Alalooga muusikalise eneseväljenduse nurgakiviks on analüütiline
        interaktsioon mateeria ning konstrueeritud originaalobjektidega.
        Kompositsiooni väikseimaks ühikuks ei ole mitte lõpuni puhastatud noot
        vaid perioodiliselt korduv muster. 

        Korduste käivitamiseks kasutab ta erinevaid meetodeid. Mootorid
        käivitavad ning hoiavad töös mehhaanilisi objekte, mille töötsüklid
        tekitavad selgelt eristatavaid helimustreid. Füüsiline mäng objektide ja
        materjalidega võimaldab kõige suuremal määral manipuleerida impulsi
        tugevuste, rütmide ja kiirustega ning varustada teos dünaamilisema
        improvisatsioonikihiga. Elektrooniliste looper´ite kasutamine võimaldab
        objektide töö kuuldavast tulemist välja korjata lühikesi helilõike ning
        nendest kombineerida erinevaid kogumeid. 

        Muusika – see on materjalide tugevusõpetus, deformatsiooni jälg,
        reflekside kiirendused, liigutuste füüsiline ergonoomika, eksituste
        meelevaldne rakendamine, katse-eksituse meetodi ülimuslikkus ning toores
        jõud.   


        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.
    description_en: >-
        Footprints on snow are more anonymous than our everyday habits. Every
        move we make will leave traces behind. All data will be saved
        somewhere.  

        So i hope you don´t mind if your moves will be secretly observed since
        you enter Kanuti Gildi SAAL. Keep your eyes open! Someone in lobby
        (forest in local slang) whom you might know well can follow your steps.
        Exiting? Irritating? Harassing? If you are here, you are in. You
        participate. You made 6 steps. You hanged your coat to 35th hang from
        left. Relax! Trace of numbers will be left behind anyway. Even if do not
        do enything, it is still possible to describe it through changes of
        environment around you. You sit in lavatory, but Real Madrid will score
        2 goals during that time. And someone will pick up these numbers, save
        them and apply. In this case it will be me. Even your most pointless
        action can influence upcoming performance. And your will can´t change
        anything. Even if you sit 27 minutes in toilet. Before kick off
        tonight´s show you will not have any idea how your „kinetic footprint“
        will affect a performance. Don´t worry! It all will be done by machines,
        matter and human body. Your work is done for now. Enjoy!  

        A cornerstone of Erik Alalooga´s musical expression is an analytical
        interaction with matter and self-made objects. Basic unit of composition
        isn´t a note, but periodically repeated pattern. Different methods are
        used to launch these cycles. Motors launch and keep running mechanical
        objects, which´s cycle creates clearly distinguishable sound-pattern.

        Physical play with objects and matter allows manipulations with
        impulses, rhytms and speeds. It will provide necessary layer of
        dynamical improvisation to current artpiece. Use of electronic loopers
        allows to pick up short sections of sounds from object´s sonic
        expression and to combine different patterns. Inaccuracy of manual
        loopers will guarantee presence of organic human touch in
        technology-based artpiece. It can create endless amount of rhythm bases
        for sonic layers to add. General structures of pieces are pre-composed,
        but inaccuracy described above, allows to use playful improvisation.

        Erik Alalooga´s background as installation- and performing artist
        reveals strongly in visual expression of objects, space and performer.
        Therefore best perceptual impression can be recieved mainly in live
        performances. Visual separation will lose a essential quality from
        complete artpiece.  

        https://hammasratas.com/   


        Improtest is concert series that brings improvisational music from local
        and foreign authors to local audience. The concerts have been taking
        place since 2005 once a month.
