        Unustage laul, unustage bel canto. Isabelle Duthoit hääl viib meid
        otsekontakti häälega. See on füüsiline helikogemus

        **Isabelle Duthoit** on professionaalne klarnetimängija, kes alustas
        vokaalikatsetusi autodidaktina. Hiljem on ta hääletehnikaid õppinud
        Jaapani Noh ja Bunraku teatrite juures Kyotos. 

        Improviseerijana on tema pikas koostööpartnerite nimistus näiteks Phil
        Minton, Tim Hodginson, Luc Ex, Franz Hauzinger, Daunik Lazro jpt  


        **Taavi Kerikmäe** on pianist ja elektronmuusik. Tema muusikat võiks
        iseloomustada kui musique concret'i, mida esitatakse laivis. Taavit
        köidavad helilised objektid oma kordumatutes tämbrites ja akustilistes
        omadustes. "Heli tegeleb meiega ja meie tegeleme heliga"


