        Emer Värk on vabakutseline kunstnik kes tegeleb peamiselt video ja
        valgusega ja sellega kuidas need mõjutavad meie tajusi, emotsioone ja
        tundeid.
    description_en: >-
        Beauty and the pain, the grotesque and fetishism. Universe and body.<br
        />

        Abstract keywords from what to try to find a narrative to form visuals —
        the movie.

        The starting point is cinema in the medium of theater. <br />

        <br />

        Emer Värk is an Estonian artist primary focused on projections and light
        in the space and its influences on our perception, mood and emotions.<br
