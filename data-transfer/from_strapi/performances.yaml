    description_et: >-
        KOSMOS Architects on virtuaalne koostööplatvorm, mis ühendab partnereid
        Baselis, Moskvas, Bangkokis ja New Yorgis. Büroo tegevus ühendab kunsti
        tehnoloogiaga ning globaalsed kogemused kohaliku kontekstiga.


        Kitaev sai oma diplomi Moskvas, kus asutas arhitektuuribüroo Meganom.
        Seejärel kolis ta Šveitsi, kus töötas neli aastat Herzog & de Meuron’i
        arhitektuuribüroos ning nüüd keskendub KOSMOSele. Paralleelselt
        arhitektuuriga tegeleb KOSMOS õpetamise, uurimuse, tootedisaini ja
        publitseerimisega. KOSMOSe esimene ehitatud projekt on Kaasaegse
        Kultuuri Keskuse ajutine muuseum Garaaž Moskvas.  


        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile. Loengud on inglise keeles ning tasuta.
    description_en: >-
        KOSMOS Architects is an office collaborating virtually, bringing
        together partners based in Basel, Moscow, Bangkok and New York. The
        office combines art and technology, global experience with respect to
        local context, European professionalism and Russian drive.  


        Artem Kitaev graduated in Moscow, started in Moscow office Meganom, then
        moved to Switzerland where he worked for 4 years for Herzog de Meuron,
        then focused on KOSMOS only. In parallel with architectural design
        KOSMOS is teaching, working on researches, industrial design and
        publications. First project built by KOSMOS team is Temporary Museum for
        Centre of Contemporary Culture Garage in Moscow.  


        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment. The lectures are
        held in English, free of charge.
