    description_et: >-
        „P-projekt“ on interaktiivne etendus, mis põhineb Dimchevi sõnul tähega
        „p“ algavatel sõnadel: pianiino, püünis, puts, poeesia, Poppers ...
        Lisame nüüd sellele veel ühe olulise „p“-tarindi: paid public
        participation ehk publiku tasustatud osalemine. Sel ajal, kui publik
        sooritab tegelikult üht osa etendusest, on ta ikka veel kantud Dimchevi
        geniaalsusest. Ja kindlasti ei jääda Ivo kohalolekust ilma ka laval,
        kuna sündmus tõstab tema head tuju ja mõtteselgust ainult esile. Väita,
        et etenduse käigus kombatakse publiku piire, oleks vähe öeldud. Dimchev
        ei soovi inimesi naeruvääristada, tekitada neis ebamugavust ega uurida,
        kui kaugele nad on valmis minema. Tekitatavad ühendused on palju
        läbipaistvamad, neid määratlevad vaba tahe ja tasustatud töö – harv
        olukord, mis eksisteerib puhtal kujul ehk ainult teatris? Esineja kargab
        (püsti). Mängib, kepsutab, maksab. Teadustab avalikult: osalemist
        taotletakse järelejätmatult!<br />

        <br />

        <strong>Ivo Dimchev</strong> (1976) on koreograaf ja etenduskunstnik
        Bulgaariast. Tema looming on äärmuslik ja värvikas segu etenduskunstist,
        tantsust, teatrist, muusikast, joonistustest ning fotograafiast. Dimchev
        on rohkem kui 30 etenduse autor. Ta on pälvinud arvukaid rahvusvahelisi
        tantsu- ning teatriauhindu ja esitlenud oma loomingut kogu Euroopas ning
        Lõuna- ja Põhja-Ameerikas.<br />

        Oma kunstiloomingu kõrvalt juhendab Ivo Dimchev meistriklasse Riiklikus
        Teatriakadeemias (Budapest), Belgia Kuninglikus Balletikoolis
        (Antwerpen), Kunstikõrgkoolis (Bern), DanceWebis (Viin) jne. Ta on
        Bulgaarias tegutseva sihtasutuse Humarts asutaja ja direktor ning
        korraldab kord aastas toimuvat üleriigilist kaasaegse koreograafia
        konkurssi. Pärast etenduskunsti magistriõpinguid DasArtsi
        teatriakadeemias Amsterdamis (2009), kolis Ivo Dimchev Brüsselisse ning
        avas seal oma etenduskunstistuudio&nbsp;Volksroom,&nbsp;kus igal nädalal
        esitletakse noori kunstnikke erinevatest riikidest. Alates 2013. aasta
        on Ivo Dimchev 4 aasta jooksul resideeriv kunstnik Kaaitheateris
        Brüsselis.&nbsp;2014 avas Ivo Sofias, Bulgaarias uue nüüdiskunstile ja
        -muusikale keskendunud sõltumatu stuudio MOZEI.&nbsp;<br />

        <br />
    description_en: >-
        “P project”&nbsp;is an interactive performance, which – according to
        Dimchev – is based on words starting with the letter P: piano, prey,
        pussy, poetry, Poppers … Now let’s add one essential syntagma on P to
        that: paid public participation. While the audience indeed carries out
        one part of this performance, it is still infused with Dimchev’s genius.
        And we will most certainly not be deprived of Ivo’s presence on stage,
        as this event only serves to highlight his good humour and lucidity.
        Claiming that the performance tests the audience’s boundaries just
        wouldn’t do it justice. Dimchev has no desire to ridicule people, make
        them uncomfortable, or explore how far they are willing to go. The
        connections it forges are much more transparent, defined by free will
        and paid work – a rare situation, and perhaps one that now only exists
        in its pure form in theatre? Performer pops (up). Playing, prancing,
        paying. Pronouncing publicly: participation persistently pursued!<br />

        <br />

        <strong>Ivo Dimchev</strong> (1976) is a choreographer and performer
        from Bulgaria. His work is extreme and colorful mixture of performance
        art, dance, theater, music, drawings and photography. Dimchev is author
        of more then 30 performances. He has&nbsp;received numerous
        international&nbsp;awards for dance and theater and has presented his
        work all over Europe, South and North America.<br />

        Besides his artistic work Ivo Dimchev gives master classes in the
        National theater academy (Budapest), the Royal dance conservatorium of
        Belgium (Antwerp), Hochschule der Künste (Bern), DanceWeb (Vienna) etc.
        He is founder and director of Humarts foundation in Bulgaria and
        organizes every year a National competition for contemporary
        choreography. Since Oct 2009 after doing his master studies on
        performing arts at Dasarts academy (Amsterdam), Ivo Dimchev moved to
        Brussels where he opened&nbsp; a performance
        space&nbsp;Volksroom&nbsp;which weekly presents international young
        artists. From Jan 2013 Ivo Dimchev is an Artist in Residence
        in&nbsp;Kaaitheater / Brussels&nbsp;for 4 years.&nbsp;In 2014 Ivo opened
        his new place&nbsp;MOZEI in Sofia Bulgaria, an independent space focused
        on contemporary art and music.&nbsp;<br />

        <br />
