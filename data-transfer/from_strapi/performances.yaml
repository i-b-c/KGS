    description_et: >-
        me alustasime. katkematust huvist üksinduse ja üksilduse vastu. meie
        enda ja meie inimeste. ja teie.meie alguspunkt on nüüd siin. võib-olla
        ideaalides. seal lärmi tegemise ja rahu leidmise maastikel.  

        väljas on üks ja sees on teine. ei tahaks ilma jääda, aga tundub, et
        suures osas jääme. jääme välja. ja jätame välja. või kao(ta)me ära. aga
        siis me tuleme tagasi. ikkagi.  

        mäletad, sa ütlesid, et tegelt tahaks rääkida ja siis järgmine hetk
        küsisid luba, et lahkuda. ja siis ütlesid, et ei taha enam üksi olla.
        mäletad, kuidas see ruumi täitis.  

        tegelt tahaks, et oleks lõbus. peab ju olema.  

        äkki hakkab keegi hullult kaasa elama. ja siis me naerame selle peale.
        ja siis lõpuks keegi ei usu, et meid kotib.  

        tegelt tahaks silma vaadata.  

        kurat, kuidas seda üksiolemist vahel vihkame ja siis jälle nii kalliks
        peame.   
          
        Katrin Kubber on sel kevadel lõpetamas TÜ VKA tantsukunsti eriala.
        Lisaks õppimisele töötab ta veebiajakirjas Tantsukuukiri igakuise
        rubriigi „Mitte ainult kunstist“ autorina. Ta on prof. Kalju Komissarovi
        nim. stipediumi laureaat 2019. Kunstnikuna huvitab teda hetkel
        ruumispetsiifiliste lavastuste loomine ja teatraalsete elementide
        kasutamine tantsulavastuse kontekstis.
    description_en: >-
        we started. with a continuous interest in loneliness and being alone. of
        our own and our people. and yours. now our starting point is here. maybe
        in ideals. on the landscapes of making noise and finding peace.   

        we don’t want to miss out, but it seems that mostly we do. miss out. or
        omit. or disappear.  
         but we come back. eventually.  
        remember, you said you wanted to talk but then a moment later asked for
        permission to leave. and then you said that you didn’t want to be alone
        anymore.   

        actually, we would like it to be fun. it must be.  

        maybe someone really starts to sympathize. and then we laugh about it.
        and eventually no one believes that we give a damn.   

        actually we would like to look into each other’s eyes.   

        damn, how we sometimes hate being alone and on the other hand hold it so
        dear.  
          
        Katrin Kubber is graduating dance teacher/choreographer specialty in
        University of Tartu Viljandi Culture Academy this spring. In addition to
        studying, Katrin is working as an author and an interviewer in Estonian
        dance art and dance education union’s web magazine „Tantsukuukiri“. As
        an artist she is interested in creating room-specific performances and
        using theatricality in the context of dance performances.
