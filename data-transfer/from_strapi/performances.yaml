    description_et: >-
        Meid huvitab suhe valguse ja keha vahel. Soovime panna need kaks kokku
        kontsentreeritud hetke, kus nad saavad teha koostööd/moodustada tiimi ja
        täita koos ruumi.   
          
        Meie huvi kangelaste ja selle vastu, kuidas nad on, või kuidas nad
        võiksid olla valgustatud, tekitas soovi uurida lähemalt, mil moel valgus
        võib esindada teatud võimupositsiooni.  
          
        How do you light a hero? How bright is a hero?   

        What kind of a hero? Very well lit hero!  

        Oh, there is a hero! My hero! My hero!   

        Where is the hero? No, too dim for a hero.  
          
        Hanna Kritten Tangsoo on koreograaf ja valguskunstnik.   

        Markus Daßau õppis jazz-trumme ja töötab helikujundajana, salvestab ja
        miksib ning mängib ka erinevates kollektiivides. Ta on tegev erinevates
        žanrites improvisatsioonilisest muusikast rocki ja etenduskunstideni.   

        Hanna ja Markus elavad ja töötavad Berliinis.    
          
        Residentuuri toetab Eesti Kultuurkapital.
    description_en: "We are interested in the relationship between light and body. To put them two in a shared concentrated moment, where they can team up and take the space together.   \n  \nOur curiosity towards heroes and the way a hero is lit or could be lit, brought us to a wish to research more closely how light could represent a certain power position and how light itself can evoke the feeling of being powerful.   \n\L\L  <br>\nHow do you light a hero? How bright is a hero?   \nWhat kind of a hero? Very well lit hero!  \nOh, there is a hero! My hero! My hero!   \nWhere is the hero? No, too dim for a hero.\L\L  \n  \nHanna Kritten Tangsoo is a choreographer and light designer.  \nMarkus Daßau studied jazz drums and is working as a sound designer recording and mixing records as well as playing in bands. He is active in a variety of genres from improvised music to rock or performance art.  \nHanna Kritten and Markus are based in Berlin.    \n  \nRecidency is supported by the Estonian Cultural Endowment."
