    description_et: >-
        Martin Tamke on CITA (Centre for Information Technology and
        Architecture) dotsent Kopenhaagenis. Ta tegeleb disainiuurimusega
        raalkujustamise ja selle materialiseerimise teemal. CITA-s on ta olnud
        selle asutamisest alates 2006. aastal ja välja töötanud sealsed
        disainiuurimuse meetodid. Tema disaini- ja tootmiseksperimendid puidu ja
        komposiitmaterjalidega kompavad konstruktiivsete süsteemide
        arhitektuursete kasutusvõimaluste piire. Ta on juhtiv teadur
        digitaalsete ehitusmeetodite vallas, kellel on ette näidata mitmed
        edukad koostööd tööstusega. Hetkel osaleb ta teadusprojektides BIM-i ja
        kompleksmudeldamise vallas ning Horisont 2020 teadusasutusi, tööstust ja
        projekteerimisettevõtteid siduvas InnoChain teadusvõrgustikus, mille
        eesmärk on välja töötada sidusamaid töömeetodeid ehitusvaldkonnas.  

        https://kadk.dk/en/  



        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile.
    description_en: >-
        Martin Tamke is Associate Professor at the Centre for Information
        Technology and Architecture (CITA) in Copenhagen. He is pursuing a
        design led research on the interface and implications of computational
        design and its materialization. He joined the newly founded research
        centre CITA in 2006 and shaped its design based research practice.
        Projects on new design and fabrication tools for wood and composite
        production led to a series of digitally fabricated demonstrators that
        explore an architectural practice engaged with bespoke behaviour. He is
        considered a leading researcher in the emerging field of digital
        production in building industry with successful engagement in several
        research and industry based projects. Currently he is involved in the
        7th framework project DURAARK, pursuing research into the creation of
        semantically rich links between Point Clouds and BIM in architectural
        workflows, the Danish funded 4 year Complex Modelling research project
        and the Horizon2020 project InnoChain, investigating future digital
        workflows between the engaged industry and academic partners.  

        https://kadk.dk/en/  


        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment.
