    description_et: >-
        **Kahjuks oleme sunnitud tänaseks planeeritud Digikultuuriaasta seminari
        "Puuris või pilves - kas teater saab olla võrgus?” edasi lükkama. Uue
        toimumise aja anname teada lähiajal.**  
          
        Eesti etendusasutused leidsid end COVID-19 piirangute tõttu raske valiku
        ees: kas jätta kavandatud lavastused ja etendused ära, lükata edasi või
        kolida digisse. Mitmed valisid viimase variandi.   


        Mida me sellest kogemusest õppisime ja milliseid praktilisi järeldusi
        saame teha teatri tulevikuks?   

        Selle üle arutame digikultuuriaasta ja Kanuti Gildi SAALi korraldatud
        seminaril Puuris või pilves - kas teater saab olla võrgus?  

        Digivõimalustest ja tekkinud uutest praktikatest vahetavad mõtteid Maike
        Lond, Emer Värk ja Kristjan Suits.  

        Arutelu moderaator on digikultuuriaasta juht Martin Aadamsoo.  


        Sissepääs [EELREGISTREERIMISEGA
        SIIT](https://fienta.com/et/puurisvoipilves?4e9a56391c0e8eb42497a505a1b68051).   

        Kohtade arv piiratud.
