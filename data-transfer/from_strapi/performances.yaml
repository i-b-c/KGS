    description_et: >-
        Hirmud ühendavad inimesi, ületades sotsiaalseid klasse. „Pelko/Fear“
        liigub detailsest üldiseks, kohalikust globaalseks, väikesest suureks.
        Me räägime isiklikest ja lokaalsetest hirmudest, mis muutuvad üldiseks
        ja globaalseks – vähemalt mõttetasandil. Isiklikud hirmud on
        universaalsed. Me küsime, mida ma kardan? Mida jätan tegemata, kuna
        kardan? Hirm tapab uudishimu ja piirab elu. Kas me vaatame mujale ja
        miks? Kas ma julgen kellelegi silma vaadata, kas ma julgen vastu astuda
        probleemile, endale, teistele? Teisest küljest – hirm kaitseb meid ja
        muudab elu turvalisemaks. Kes kasutab hirme ära, kes hirmutab ja miks?
        Millal tekitab turvalisuse loomine hirmu?  
          
        Juha Valkeapää on vokaal- ja etenduskunstnik Helsingist.
        Magistrikraadiga teatriteaduses ja ungari keeles on ta kunstnikuna
        iseõppija. Oma 25-aastase karjääri jooksul on ta nii üksi kui erinevates
        grupeeringutes loonud lavastusi, installatsioone, raadioteoseid ja
        helimaastikke, mida on esitatud mitmel pool Soomes ja ka
        rahvusvaheliselt. 2014. aastast on Valkeapää etenduskunstide maja Mad
        House Helsinki üks vedajatest.  
          
        Taito Hoffrén on laulja, interpreet ja helilooja ning õppinud Sibeliuse
        Akadeemia folkmuusika osakonnas. Töötanud teatris nii helilooja kui
        helikunstnikuna, kirjutab ta hetkel doktoritööd runolaulust Helsingi
        Kunstiülikoolis. Lisaks tegutseb Hoffrén heliinsenerina ja on oma
        plaadifirma “Äänia” alt välja andnud rohkem kui 30 Soome ja
        maailmamuusika kogumikku. Aastatel 2006-2015 oli ta Sommelo Ethno
        muusikafestivali kunstiline juht. Ta elab Pukkilas.  
          
        Valkeapää ja Hoffrén on varem koos töötanud projektides: “Wooden Guy”
        (2016), “Ten journeys to a place where nothing happens” (2010-14), “Male
        Spaces” (2006-08), “Vocal theatre Iki-Turso” (1999-) ja “Kalevala”
        (1997-1999).  
          
        www.juhavalkeapaa.net  

        www.taitohoffren.aania.fi
    description_en: >-
        Fears unite people, passing social classes. “Pelko/Fear” moves from
        detail to general, from local to global, from small to big; we talk
        about personal and local fears, that become general and global, at least
        at the level of thought. Personal fears are universal. We are asking,
        what do I fear. What do I skip because I’m afraid? Fear kills curiosity
        and restricts life. Do I turn my eyes away and why? Do I dare to look
        somebody into the eye, do I dare to face the issue, myself, the other?
        On the other hand, fear protects us and makes life more secure. Who is
        taking advantage of our fears, who is fearmongering, and why? When does
        creating security cause fear?  
          
        Juha Valkeapää is a vocal artist and performance maker based in
        Helsinki. As an artist, he’s autodidact, with MA from Helsinki
        University where he studied theatre science and Hungarian language.
        During his 25-year long career he has created – both as solo artist and
        in various groups – performances, installations, radio pieces and
        soundscapes that have been presented at festivals and venues in Finland
        and internationally. Since 2014 Valkeapää has been one of the makers of
        Mad House Helsinki, a house for performing arts.  
          
        Taito Hoffrén is a singer, versatile musician, and composer, who studied
        at the Sibelius Academy Folk Music department. He has worked widely in
        theatre, both as a composer and sound designer. Currently he’s writing
        doctoral thesis on runo singing at the University of Arts, Helsinki.
        Furthermore, Hoffrén operates as a sound engineer, and has published
        more than 30 albums of Finnish ethno and world music on his record label
        ”Ääniä” (‘voices/sounds’). 2006–2015 he worked as an artistic director
        of Sommelo Ethno Music Festival. He lives in Pukkila.  
          
        Valkeapää and Hoffrén have worked together previously five times:
        “Wooden Guy” (2016), “Ten journeys to a place where nothing happens”
        (2010-14), “Male Spaces” (2006-08), “Vocal theatre Iki-Turso” (1999-)
        and “Kalevala” (1997-1999).  
          
        www.juhavalkeapaa.net  

        www.taitohoffren.aania.fi
