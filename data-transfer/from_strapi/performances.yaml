    description_et: >-
        “Ekke Moor“ aastal 2015 on liikuv, aktiivne, kohati tantsuline mäng
        klišeedega eestlase elust ja unistustest/hirmudest. Liikumises
        katsetatakse eesti rahvatantsu mustritega, miksitakse muusikat ja
        loodushelisid, mängitakse lavakujunduse, kostüümide ja valgusega.
        Lavakooli tudengite mängus on Ekke keskseks tegelaseks ning jälgitakse
        ta võimatust end oma tõelisest tundest lahti

        rebida. Lavastuse peateemat tasub otsida küsimusest, mille sõnastas
        Gailit: “Maski võib ju vahetada, aga kuidas vahetada hinge?”


        Meie ees on Eesti teatri tulevik – EMTA Lavakunstikooli 27.lend!


        www.vatteater.ee

