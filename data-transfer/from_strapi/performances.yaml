    description_et: >-
        “Mind paelub eristus väidetavalt privaatse ja väidetavalt avaliku vahel
        ning ma püüan käsitleda küsimust, mida tähendab elada näiliselt
        kriisikindlas ühiskonnas, mis ometi endiselt on sunnitud rakendama
        salastatust.” Barbara Kruger  
           
        “(SOMETHING I’VE ALWAYS DREAMED OF)” ehk “(MIDAGI, MILLEST OLEN ALATI
        UNISTANUD)” on kohaspetsiifiline avalik loeng meie igapäevaelus
        kasutusel olevatest ebaseaduslikest praktikatest.  
            
        Piir selle vahel, mis on illegaalne ja mis mitte, on väga õhuke.
        Seaduslikkus iseenesest ei ole absoluutne väärtus, vaid parameeter, mis
        varieerub sõltuvalt paigast maailmas, ajast, milles elame, ja
        privileegidest, mida naudime.  
           
        “(SOMETHING I’VE ALWAYS DREAMED OF)” on work-in-progress uurimus, mis
        soovib kutsuda inimesi astuma lähemale piirile legaalsuse ja
        illegaalsuse vahel. Seaduslikkus on norm. See määratleb ära selle, mida
        peetakse normaalseks, õiguspäraseks - teisisõnu õigeks. See jagab ümber
        võimu ja selle tajumist ühiskonnas eesmärgiga eristada, liigitada,
        jagada ja kontrollida.  
           
        Konkreetsemalt öeldes soovin uurida selle skaala teatud lõiku.
        Täpsemalt, suhet illegaalse tegevuse ja avaliku ruumi vahel, nagu
        näiteks plakatite metsik ülespanek. Ma soovin rääkida sellest, kuidas me
        saame seda tegevust kõigi silme all imiteerida, pakkudes sellega
        publikule välja võimalikke viise, kuidas omaenda väiteid avalikult
        esitada ja avalikku vastupanu osutada. Ma soovin õhutada meenutama, et
        vajadusel on seadusele mittekuuletumine võimalik ning võimalik on leida
        selleks ruum, kui seda ruumi iseenesest ei eksisteeri.  
           

        Sara Leghissa on Milanos baseeruv kunstnik, etendaja ja uurija. Olles
        lõpetanud kaasaegse ajaloo õpingud, lõi ta koos F. De Isabellaga
        kompanii Strasse, mis tegeleb etenduste välja toomise ja uurimistööga
        etenduskunstide vallas. Strasse tegutseb performance'i ja kinokunsti
        raamistikus, uurides liikumise ja linnaruumi vahelisi suhteid ning
        kasutades filmikeelt filtrina selleks, et mõista ja kaalutleda
        reaalsust. Etendajana on ta koostööd teinud erinevate kompaniide ja
        koreograafidega, nagu näiteks Teatro Valdoca, -DOM, Giorgia Nardin, Muta
        Imago. Itaalia skeenel organiseerib ta  koostöös Annamaria Ajmone'iga
        üritusi Nobodys Business – etenduskunstide praktikate jagamise
        sõltumatut platvormi ja NESSUNOt – pidu, kuhu kutsutakse erinevate
        valdkondade kunstnikke eesmärgiga tuua kokku nende suured erinevused
        ning segada sisuloomet ja kontekste.  
          
        www.casastrasse.org/
    description_en: >-
        *“I'm fascinated with the difference between supposedly private and
        supposedly public and I try to engage with the issue of what it means to
        live in a society that's seemingly shock-proof, yet still is compelled
        to exercise secrecy.”* Barbara Kruger  
          
        "(SOMETHING I’VE ALWAYS DREAMED OF)" is a site-specific public lecture
        about illegal practices present in our daily life.   
          
        The line between what’s legal and what isn’t is very fine.  

        Lawfulness is not an absolute value, but a parameter that changes
        according to where we are in the world, the time we live in and the
        privileges we enjoy.  
          
        "(SOMETHING I’VE ALWAYS DREAMED OF) is the work in progress of a
        research that wants to invite people to get closer to the border between
        legality and illegality.   

        Lawfulness is a norm, it defines what is considered to be normal,
        legitimate, in other words right, redistributing power and the
        perception of power within society, in order to define, categorise,
        divide and control.   
          
        In particular, I’d like to investigate a specific portion of the
        spectrum, namely the relationship between illegal acts and public space,
        like wild posting banners. I’d like to talk about the way we can perform
        this action mimetically, before everyone’s eyes, suggesting the audience
        possible forms of public display and public resistance, by means of
        their own words. I’d like to use it also as an exhortation to remind
        that is possible to disobey the law, if necessary, and to take the space
        to do that, if this space doesn’t exist.  
          
          
        Sara Leghissa is an artist, performer and researcher based in Milano.
        Graduated in Contemporary history, she co-founded, with F. De Isabella,
        the company Strasse, involved in production and research in the
        performing arts. Strasse works within the frames of performance and
        cinema, investigating the relationship between movement and urban
        landscape and using film language as a filter to understand and weight
        reality. As a performer, she has collaborated with various companies and
        choreographers, as Teatro Valdoca, -DOM, Giorgia Nardin, Muta Imago. For
        the Italian scene, she co-organizes, with Annamaria Ajmone, Nobodys
        Business, an Independent Platform for Sharing Practices in the
