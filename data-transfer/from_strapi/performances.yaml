    description_et: >-
        Seemned on Improtesti alaprogramm, kus astuvad üles noored, uuema
        generatsiooni improviseerijad. Seekordsel kontserdil esinevad
        rahvusvahelise nüüdismuusikaõppe magistriprogrammi COPECO noored
        helikunstnikud.  

        [www.copeco.net](http://copeco.net/)


        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.
    description_en: >-
        Seeds is a special sub concert series within the frames of Improtest
        series introducing the younger generation of free improvisers. This time
        you will hear young sound artists from international new music master
        program COPECO.


        [www.copeco.net](http://copeco.net/)


        Improtest is concert series that brings improvisational music from local
        and foreign authors to local audience. The concerts have been taking
        place since 2005 once a month.
