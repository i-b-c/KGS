    description_et: >-
        Mikko Savela on Soome päritolu kitarrist, kes resideerub Umeås, Rootsis.
        Pärast mitmetes

        kooslustes erinevate muusikažanrite uurimist on Savela pöördunud
        improvisatsiooni juurde ning hakanud katsetama eri viisidel
        kitarrimänguga. Nüüdseks kasutab ta kitarri pigem löökpillina mõlema
        käega keeli sõrmitsedes ning pilli lüües. Peale kitarri kasutab ta
        erinevaid mikrofone ja elektroonikat. Savela on teiste seas mänginud ka
        koos Will Guthrie’, Jérôme Noetingeri, Yan Juni, Hankil Ryu’ ja Hong
        Chulkiga.



        Improtest on kontserdisari, mida korraldab MTÜ Improtest ja mis toob
        kuulajateni improvisatsioonilise muusika nähtusi meilt ja mujalt. Sarja
        kontserdid toimuvad alates 2005. aastast kord kuus.



        www.improtest.ee
