    description_et: >-
        sel ajal kui postkommunistlik<br />

        Maskuliin ja Feminiin<br />

        tuksuvad sama tukset<br />

        melanhoolse iidkatlana tähise<br />

        põhjataeva all<br />

        töötab üks suurem kaamera<br />

        ja vanakooli<br />

        lindikettad<br />

        keerlevad tühja<br />

        ja üks kord veel<br />

        end of the evening<br />

        vähendades valgust<br />

        lastes rahvamassil varjata<br />

        hangede heledust<br />

        üks nõiduslik mõte<br />

        viimasest tangost<br />

        hõreneb tasa<br />

        ja kustub<br />

        lõplikult<br />

        <br />

        Kristian Smeds<br />

        (tõlkinud Taavi Eelmaa)<br />

        <br />

        Kristian Smedsi uusimas lavateoses kohtuvad kaks võimast
        näitlemistalenti: Annamária Láng Ungarist ja Juhan Ulfsak Eestist. Nende
        paarismängus tekib kirglik, absurdne ja humoorikas teaterlik tants.
        Äärmiselt visuaalne ning muusikaline etendus „Just filming“ on ka siiras
        austusavaldus filmikunstile.<br />

        <br />

        <strong>Kristian Smeds</strong> on Soome näitekirjanik ja lavastaja. Ta
        on lavastajatööd teinud nii Soomes, Eestis, Leedus, Belgias, kui mujal
        Euroopas. Eestis on ta näiteks Von Krahli lavale toonud "Jänese aasta"
        ja "12 Karamazovit", Juhan Ulfsak ja Eva Klemets on osalenud ka tema
        rahvusvahelises teatrilavastuses "Mental Finland".<br />

        <br />

        Näitlejanna <strong>Annamária Láng</strong> on üks tuntumaid artiste
        Ungari sõltumatu teatri ringis.&nbsp; Láng oli kaua seotud Árpád
        Schilling asutatud teatri Krétakör´iga, peale lahkumist on ta töötanud
        vabakutselisena. Láng on töötanud teatrites ja filmides Ungaris,
        Saksamaal, Šveitsis ja Prantsusmaal.<br />

        <br />

        Näitleja ja lavastaja <strong>Juhan Ulfsak </strong>on üks Eesti
        silmapaistvamaid kaasaegse teatri tegijaid. Ta on Eesti esimese
        iseseisva teatri Von Krahli trupi asutajaliige, teinud koostööd
        erinevate kunstnikutega Eestis, Saksamaal ja Soomes, sealhulgas osalenud
        mitmes Kristian Smedsi lavastuses: Year of the Hare, The Seagull, Mental
        Finland and Der Imaginäre sibiriske Zirkus des Rodion Raskolnikow.
        Eelmine aasta lavastas Ulfsak Von Krahli teatris, Teater NO99s ja Eesti
        Draamateatris. 2016. aasta sügisel lavastab ta William Goldingu
        “Kärbeste jumala” Soome Teatriakadeemias.<br />

        <br />

        <br />
    description_en: >-
        post-communist<br />

        Masculinity and Femininity<br />

        strike a common spark<br />

        under the eternally starry vault<br />

        of the melancholic northern sky<br />

        meanwhile the big camera is rolling<br />

        and the old school’s<br />

        reel of tape<br />

        is spinning loose<br />

        and once again<br />

        as the fin-de-soirée<br />

        lights grow dim<br />

        and the folk spill into the town-squares<br />

        the glistening snow lies fann’d beneath<br />

        an evanescent<br />

        forever flown<br />

        magic-moment memory<br />

        of the last tango<br />

        <br />

        Kristian Smeds<br />

        (trans. Eva Buchwald)<br />

        <br />

        Kristian Smeds’ latest stage work brings together two formidable acting
        talents:&nbsp; Annamária Láng from Hungary and Juhán Ulfsak from
        Estonia.&nbsp; Their partnership produces a theatrical dance rich in
        passion, absurdity and humour.&nbsp; A highly visual and musical
        performance, just filming is also a heart-felt tribute to cinematic
        art.<br />

        <br />

        Actress <strong>Annamária Láng</strong> is one of Hungary’s best known
        artists on independent theatre circuit. Láng was long associated with
        the Krétakör theatre founded by Árpád Schilling, but since leaving the
        company she has worked freelance. Láng has worked in theatre and film in
        Hungary, Germany, Switzerland and France.<br />

        <br />

        Actor and director <strong>Juhán Ulfsak</strong>, is one of Estonia’s
        most influential contemporary artists. He is a founder member of
        Estonia’s first independent theatre, the Von Krahl company. Ulfsak has
        worked with leading figures from the art world in Estonia, Germany and
        Finland. He has participated in several productions by director Kristian
        Smeds: The Year of the Hare, The Seagull, Mental Finland and Der
        Imaginäre sibiriske Zirkus des Rodion Raskolnikow. Last year Ulfsak
        worked as a director for the Von Krahl company , Theatre N0 99, and the
        Estonian Drama Theatre. In autumn 2016 he will be directing William
        Golding’s Lord of the Flies at the Finnish Theatre Academy.<br />

        <br />
