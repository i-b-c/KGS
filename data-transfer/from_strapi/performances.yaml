    description_et: >-
        Geograafiline striptiis ehk dokumentaal väljarändamisest jutustatuna
        inimkehadel.  


        Läbi kõrbe – selja taha.   

        Mäest üles – mööda selgroogu alla.   

        Üle mere – otse nina alla.   

        Päeval, kui puhkes sõda, lahkusime kodust.  


        Geograafia ja poliitika laienevad ja kanduvad orgaanilistele lavadele –
        meie kehadele. Saame teada, mida tähendavad tegelikult puudutus,
        kohalolek ja vastupidavus. Lavastusega „Nähtamatud maad” esitab
        visuaalteatriduo Livsmedlet iseendale väljakutse ühendada ainulaadsel
        viisil nukuteater ja koreograafia.  


        Livsmedlet on teatraalne koostöö nukunäitleja, lavastaja ja näitleja
        Ishmael Falke ning tantsija, koreograafi ja teatritegija Sandrina
        Lindgreni vahel. Koostöö sai alguse 2011. aastal ühisest soovist luua
        kõnetavaid ja uuenduslikke visuaalteatrilavastusi, mis panevad proovile
        publiku ümbruse- ja igapäevaelutaju. Nad kasutavad oma töös tantsu,
        füüsilise teatri, nüüdisaegse nukukunsti ja objektiteatri elemente,
        kombineerides neid üllatavate ja vahel tavatute jutuvestmise,
        materjalide ja töömeetodite valikutega. Livsmedlet loob lavastusi nii
        tänavatele kui teatrisaalidesse. Soomes tegutsev duo on esinenud ka
        Rootsis, Norras, Venemaal, Hollandis, Tšehhis, Inglismaal, Hispaanias,
        Iisraelis ja Kuubal.
    description_en: >-
        A geographical striptease or a documentary about emigration, told on the
        human bodies.  


        Across the desert, behind our back.   

        Up the mountain, down our spine.   

        Over the sea, just under our nose.   

        On the day the war broke out, we left home.  


        Geography and politics are physically extended and transformed into
        organic performance platforms – our bodies – and we learn what touch,
        presence, and endurance really are about. With “Invisible Lands”, the
        visual theatre duo Livsmedlet challenges themselves in a unique meeting
        between puppetry and choreography.  


        Livsmedlet is a theatrical collaboration between Ishmael Falke
        (puppeteer, director, actor) and Sandrina Lindgren (dancer,
        choreographer, theatre maker). The collaboration was established in 2011
        with the shared ambition to create relevant and innovative visual
        theatre works that challenge audience’s perspective of their
        surroundings and everyday life. Their works are derived from a mix of
        dance, physical theatre, contemporary puppetry and object theatre,
        combined with surprising and sometimes unconventional choices in
        storytelling, materials and working methods. Livsmedlet create works for
        the streets as well as for the theatre. Based in Finland, the company
        has been performing also in Sweden, Norway, Russia, Netherlands, Czech
        Republic, England, Spain, Israel and Cuba.
