    description_et: >-
        Residentuuris töötab Maria uue soologa "Fuchsia", kus rõhk on isiku
        konstrueerimisel, ümber korraldamisel ning (enese)vojerismil virtuaal­
        ja sotsiaalmeedias. Lavastuses tundub keha vaataja pilgu all lagunevat,
        võnkudes mõnu, ükskõiksuse ja kannatusseisundite vahel. Lavastus
        demonstreerib soovi võtta kontroll subjektiloome ja kehapildi üle, mis
        on suhes­ tatud moe, internetijärgse disaini ja visuaal­ kultuuriga.
        Kunstnik uurib keha kui karakteri ja brändi fabritseerimist taolisest
        eneseeksponee­ rimisest tuleneva üksinduse kõrval.



        __Maria Metsalu__ on Eesti koreograaf ja etendaja, kes õpib Amsterdamis
        SNDO's (School for New Dance Development). Ta loob põhiliselt soolosid,
        kus huvitub oma persona loomisest, enese müto­ logiseerimisest ja
        mina­loomest. uurides füüsi­ list ja virtuaalreaalsusi, mängivad tema
        töös tähtsat rolli sotsiaalne vahetus ja muutumine. Ta tegeleb oma
        identiteedi vormimisega, kasutades fabritseeritud naistegelasi ja
        esitledes neid virtuaal­ ja sotsiaalmeedias, eesmärgiga panna nad elama
        füüsilises lavastuses. Viimastel aastatel on fookus liikunud lavalt
        kujutava kunsti ja video suunas.


        Residentuur  [Facebookis](
        https://www.facebook.com/puhavaimusaali.resident)


        Video intervjuu -


        Avalik ettenäitamine toimub inglise keeles ja on tasuta.


        Info residentuuri ja showingute kohta www.saal.ee ja [pühavaimu
        blogis](http://www.pyhavaim.blogspot.com)

        Residentuuri toetab: Eesti Kultuurkapital
