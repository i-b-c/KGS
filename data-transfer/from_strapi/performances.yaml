    description_et: >-
        **Jaan Malin** aka **Luulur** (1960) on tuntud kui Eesti üks parimaid
        luuleesitajaid, häälutaja ja möirutaja, tõeline ühemehemootor. **Roomet
        Jakapi** (1973) on multitalent, filosoof ja muusik, kes tegeleb samuti
        eksperimentaalse luuleesitamisega. Aeg-ajalt satuvad Malin ja Jakapi
        kokku ning sageli on selle tulemuseks pöörane spektaakel, kus pannakse
        mängu kõik näolihased ja hääletoonid. 2018. aasta jaanuaris aga tekkis
        Malini-Jakapi dünaamilisel duol inspireeriv olukord Pärnumaa
        muusikutega, mis aitas luua uutlaadi loomingulise väljendusviisi, mis ei
        taha hästi asetuda ühegi hästi defineeritud žanri Prokrustese sängi.
        Kooslus kannab nime MASSIA ning seltskonnas on lisaks Malinile ja
        Jakapile helilooja ja dirigent **Andrus Kallastu** (1967), flötistid
        **Leonora Palu** (1979) ja **Monika Mattiesen** (1966), viiuldaja ja
        helilooja **Indrek Palu** (1977), muusikateadlane ja helilooja **Gerhard
        Lock** (1978) ja tema vend, samuti helilooja **Hans-Gunter Lock**
        (1974). Sedavõrd kirevalt ja loomingulise potentsiaaliga seltskonna
        sõrmede alt ja huulte vahelt ei saa tulla kindlasti midagi igapäevast! -
        Jan Kaus
