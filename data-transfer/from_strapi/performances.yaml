    description_et: >-
        Marek Talts on kitarrist, kes mängib erinevates ansamblites ja
        projektides, mille muusikaline fookus on rütmimuusikal ja
        improvisatsioonil. Mareki jaoks on huvitav osaleda muusikaprojektides,
        milles ühendatakse erinevaid muusikastiile. Ta tegutseb koosseisudes
        Mingo Rajandi kvintett, Trio Maag, Kadri Voorandi kvartett, Liisi
        Koiksoni ansambel ja ansambel Ro:Toro.   

        Muusikat on Marek õppinud Georg Otsa nimelises Tallinna Muusikakoolis ja
        TÜ Viljandi Kultuuriakadeemias, kus töötab ka õppejõuna. Käesoleval
        aastal andis muusik välja oma esimese sooloalbumi "Abstract Dance", mis
        sisaldab vabaimprovisatsioone ja omaloomingut. Albumi tegemise eesmärk
        oli soov eksperimenteerida kitarrihelidega ning olla loominguliselt enam
        vastutav ja aktiivne.  

        Albumit saab kuulata [siin](8http://y2u.be/hO0uYuw8Pok9)  
          
        [https://marektalts.bandcamp.com](https://marektalts.bandcamp.com)  
         
          
        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.
    description_en: >-
        Marek Talts is an Estonian guitar player, involved in many ensembles and
        projects,

        mainly focused in rhythm and improvsational music. He describes he’s
        main interest in music-projects that blend and mix different styles of
        music. His previous collaborations include: Mingo Rajandi Quintet, Trio
        Maag, Kadri Voorand Quartet, Liisi Koikson ensemble, Ro:Toronto and many
        more.    
          
        He had studied guitar in Georg Ots Tallinn Music Scool and in Viljandi
        Culture Academy

        University of Tartu. In the latter he now works as a guitar teacher.   
          
        This fall he released he’s first solo album ,,Abstract Dance’’.  

        You can listen album [here](http://y2u.be/hO0uYuw8Pok9)  
          
        [https://marektalts.bandcamp.com](https://marektalts.bandcamp.com)  
          
        Improtest is a concert series that brings improvisational music from
        local and foreign authors to local audiences. The concerts have been
        taking place since 2005 once a month.
