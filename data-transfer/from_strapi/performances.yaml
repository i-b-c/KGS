    description_et: >-
        Kirssidel on pehme nahk, liha ja neil on sees teatud sorti luu. Nende
        mahl on punane kui veri. Kui neid kohelda nii, nagu inimesed mõnikord
        kohtlevad teisi inimesi, siis muutuvad need inimesteks või vähemalt
        elusateks asjadeks, mis kutsuvad endaga samastuma. Inspireerituna
        muinasjuttudest, milles asjad mõnikord elustuvad ning muutuvad pinnaks,
        millele projitseerida omaenda kogemusi ja fantaasiaid. Performance'is
        „Death is Certain“ (“Surm on kindel”) on Eva Meyer-Keller paigutanud
        kirsid peaossa. Viljadelt eraldatakse sabad, aga neid ei pesta ja neilt
        ei eemaldata kive. Selle asemel neid tapetakse. Ta teeb selle ära
        käsitsi, selliselt, et see muudab igapäevase millekski brutaalseks.

        Vaatajale meenutatakse surmasid filmides, aga samuti hukkamiste
        tegelikkust, seda, kuidas need päriselt toimuvad: individuaalsest ja
        kollektiivsest kogemusest pärinevad seosed magusa surma näol
        köögilaual.  
          
        Oma performance'is lõikab Berliini kunstnik Eva Meyer-Keller kirsse
        lahti, tükeldab ja põletab neid pedantselt üksikasjaliku tegevuse
        käigus, piinates neid ohtratel viisidel. Puuviljad on stiliseeritud
        subjektideks ja igapäevased esemed muutuvad tapariistadeks, mida vaataja
        kipub seostama piinamisstsenaariumiga. Meyer-Keller võõrandab knopkasid,
        plasttopse ja nööpnõelu, pannes neid tööle kirsside kallale, seades nii
        paika diskursiivse raamistiku selleks asendusrollidega mänguks. Näib, et
        keegi ei saa tunda end turvaliselt, sest meil kõigil on konkreetseid
        mälupilte – pilte filmidest, kogemustest, uudistest, asjadest, mis
        lõppkokkuvõttes laenavad neile tegevustele oma tähenduse, muutes kirsid
        elusaks ja pannes šokolaade kujutama surnuaeda. Kirsside konsistents ja
        värv näib olevat eriti hea valik, tehes neist ideaalsed sümboolsed
        tähenduse kandjad nende peal toime pandud eksperimentides. Meyer-Keller
        on hõivatud metsikult iroonilise mänguga kollektiivsete ja
        individuaalsete tapmispiltide ümber, mis asustavad iga indiviidi
        kujutlusvõimet. Ta kasutab siinjuures kirssi kui paradoksaalset,
        stiliseeritud kujundit tegevusega kaasnevaks mustaks huumoriks.  

        www.evamk.de  
          
