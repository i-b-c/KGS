    description_et: >-
        Mario Carpo on arhitektuuriteoreetik, kelle fookus on digitaalsel
        arhitektuuril. Õppinud Firenze Ülikoolis, jätkas ta uurimistööd Euroopa
        Ülikooli Instituudis, kus valmis ka doktoritöö moodsa ajaloo teemal.
        Carpo teadustöö ja väljaanded keskenduvad arhitektuuriteooria,
        kultuuriajaloo, meediaajaloo ja informatsioonitehnoloogia
        vastastikmõjudele. Mitmed tema teosed on olnud digitaalsuse
        arhitektuuriajalukku kirjutamisel märgilise tähtsusega. Mario Carpo on
        arhitektuuriajaloo professor Londoni Ülikooli kolledžis Bartletti
        Arhitektuurikoolis, eluaegne professor Pariisi La Villette'i
        Arhitektuurikoolis, Kanada Arhitektuurikeskuse õppekeskuse juht ja
        Yale'i ülikooli Vincent Scully külalisprofessor. Samuti on ta õpetanud
        teistes arhitektuurihariduse

        poolest ülemaailmse tähtsusega koolides nagu Cornelli Ülikool või
        Massachusettsi Tehnoloogiainstituut (MIT).


        2011. aastast alates on sarja raames loenguid pidanud mitmed
        maailmakuulsad arhitektid, teoreetikud, kriitikud ja urbanistid, et
        tutvustada arhitektuuri, disaini, linnaehituse ning kriitilise mõtte
        värskeid vaatenurki. Loengud on mõeldud nii arhitektuuritudengitele ja
        erialaprofessionaalidele, kui ka ruumikultuuri huviliste laiemale
        ringile.



        Varasemaid loenguid vaata www.artun.ee/avatudloengud


        Kontakt: arhitektuur@artun.ee

        Toetajad: Eesti Kultuurkapital, Eesti Kunstiakadeemia

        Inglise keeles
