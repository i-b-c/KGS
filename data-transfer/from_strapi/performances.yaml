    description_et: >-
        Kristy Balliet on arhitekt ja dotsent Ohio State ülikooli Knowlton'i
        arhitektuurikoolis. Hetkel juhendab ta Lõuna-Kalifornia
        arhitektuuriinstituudis (SCI-Arc) disainistuudiot. Ta on BairBallieti
        kaasasutaja ja spekulatiivseid arhitektuurseid meediume uuriva
        üritustesarja Possible Mediums Project'i kaasalgataja. 2006-2011 oli ta
        Viini rakenduskunstiülikoolis Greg Lynni abiprofessor. Seal algatas ta
        siiani toimiva IoA Sliver galerii ja üritustesarja ning andis välja
        kogumiku “Visual Catalog: Greg Lynn’s Studio”. Ta on lõpetanud
        Philadephia ülikooli ja UCLA arhitektuuris ja linnaplaneerimises.<br />

        [www.kristyballiet.com](http://www.kristyballiet.com/)<br />

        <br />

        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile. <br />

        <br />

        Loengusarja toetab Eesti Kultuurkapital ja korraldab Eesti
        Kunstiakadeemia arhitektuuriteaduskond.
    description_en: >-
        Kristy Balliet is an architectural designer and assistant professor at
        The Ohio State University’s Knowlton School of Architecture. She is
        currently a design faculty member at SCI-Arc. She is the co-founder of
        BairBalliet and the co-chair of the Possible Mediums Project – a series
        of events showcasing design investigations based in speculative
        architectural mediums. From 2006-2011, Balliet was an assistant
        professor at The University of Applied Arts, Vienna in Studio Greg Lynn.
        While there she was the co-creator of the IoA Sliver lecture/gallery
        series and published the collected work of the studio in Visual Catalog:
        Greg Lynn’s Studio. She is a graduate of Philadelphia University and the
        UCLA Department of Architecture and Urban Design and has practiced
        architecture in Philadelphia at Erdy McHenry Architecture. Kristy is
        currently editing the forthcoming publication Massive Attack, IoA Sliver
        Lecture Series-Selected Friends and Enemies.<br />

        [www.kristyballiet.com](http://www.kristyballiet.com/)<br />

        <br />

        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment.<br /> 

        <br />

        The lecture series is supported by Estonian Cultural Endowment and
        organised by the Faculty of Architecture of the Estonian Academy of
        Arts.<br />
