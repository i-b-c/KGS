    description_et: >-
        Valitud miraažid õnnest<br />

        <br />

        Lugu, mida jutustab romaanikirjanik Gailit, on ju päris lihtne.
        Rannaküla noormees läheb laia maailma õnne otsima, mingit õnne ta ei
        leia, kaotab lootuse, jõuab koju tagasi ja ennäe imet - kodus leiab
        õnne. Muinaslooline roadmovie storyline paistab tänaste väljarändamiste
        foonil isegi üllatavalt päevakajaline. Gailiti romaan ilmus pöördelisel
        ajal ja täna on aeg taas tume.<br />

        Meie „Ekke Moor“ aastal 2015 saab olema liikuv, aktiivne, kohati
        tantsuline mäng klišeedega eestlase elust ja unistustest/hirmudest.
        Katsetame eesti rahvatantsu mustritega liikumistes, miksime muusikat ja
        loodushelisid, mängime lavakujunduse, kostüümi ja valguse võimalustega.
        Lavakooli tudengite mängus toome Ekke keskseks tegelaseks ja jälgime
        peategelase võimatust end oma tõelisest tundest lahti rebida. Lavastuse
        peateemat tasub otsida küsimusest, mis sõnastatud Gailiti enda poolt:
        "Maski võib ju vahetada, aga kuidas vahetada hinge?"<br />

        <br />

        EMTA Lavakunstikooli 27. lennu bakalaureuselavastus valmib Kuressaare
        Linnateatri ja VAT Teatri koostöös.<br />

        <br />

        [www.vatteater.ee](http://www.vatteater.ee/)<br />

        [www.kuressaarelinnateater.ee](http://www.kuressaarelinnateater.ee/)
    description_en: >-
        “Ekke Moor“ in 2015 is a dynamic, active, sometimes dance-like game with
        the cliches about the life, dreams and fears of an Estonian.
        Choreography experiments with the patterns of Estonian national dress,
        music is mixed with nature sounds, while stage design, costumes and
        lighting design are all played with as well. Ekke is the protagonist of
        theatre students play, while the character’s ability to set himself free
        of his real feelings is observed. The main theme of the performance can
        be found in the question formulated by Gailit: “Masks can be changed,
        but how to change soul?“<br />

        <br />

        Let us welcome the graduates of Estonian Music and Theatre academy, the
        future of Estonian theatre!<br />

        <br />

        [www.vatteater.ee](http://www.vatteater.ee/)<br />

        [www.kuressaarelinnateater.ee](http://www.kuressaarelinnateater.ee/)
    other_works: null
    technical_info_et: >-
        Autor: <strong>August Gailit</strong><br />

        Dramatiseerija ja lavastaja: <strong>Aare Toikka</strong><br />

        Kunstnik: <strong>Iir Hermeliin</strong><br />

        Koreograaf: <strong>Kristjan Rohioja</strong><br />

        Muusikaline kujundaja: <strong>Ardo-Ran Varres</strong><br />

