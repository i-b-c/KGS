    description_et: >-
        **Robert Vierlinger** on valdkondadeülene konsultant ja teadlane. Robert
        on kaasalgatanud Viini Rakenduskunsti Ülikoolis mitmeid teadusprojekte
        arhitektuuri ja tehnoloogia vallas. Tema uurimisteemadeks on digitaalse
        disaini representeerimine, multimodaalsed optimiseeringud,
        tootmis-tehnoloogilised arengud ja materjali intelligentsus. Samuti 
        konsulteerib ta Bollinger+Grohmann inseneribüroos disaini- ja
        optimiseerimisvallas nii rahvusvahelisi võistlusprojekte kui ka ehituses
        olevaid hooneid. Robert õppis arhitektuuri Delftis ja Viinis, viimati
        Hani Rashidi stuudios Viini Rakenduskunsti Ülikoolis ja peab hetkel
        loenguid mitmetes rahvusvahelistes disainiülikoolides.<br />

        [www.bollinger-grohmann.com](http://www.bollinger-grohmann.com/)<br />

        [www.nformations.com](http://www.nformations.com/)<br />

        <br />

        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile.<br />

        <br />

        Loengusarja toetab Eesti Kultuurkapital ja korraldab Eesti
        Kunstiakadeemia arhitektuuriteaduskond.
    description_en: >-
        **Robert Vierlinger** is an interdisciplinary consultant and researcher.
        At the University of Applied Arts Vienna he has co-initiated several
        research projects in architecture and technology, investigating digital
        design representation, multi-modal optimization, machine learning and
        material intelligence. Procedural design and optimization on
        international competition and construction projects are the basis of his
        consultancy at Bollinger+Grohmann engineers. He studied structural
        design in Delft and Vienna, studied architecture in Studio Hani Rashid
        Vienna and since has been lecturing at the Angewandte, AA, CITA, ZHA,
        USC LA, CU Hongkong and many more.<br />

        [www.bollinger-grohmann.com](http://www.bollinger-grohmann.com/)<br />

        [www.nformations.com](http://www.nformations.com/)<br />

        <br />

        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment.<br />

        <br />

        The lecture series is supported by Estonian Cultural Endowment and
        organised by the Architecture department of Estonian Art Academy.
