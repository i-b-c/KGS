    description_et: "20.-28. oktoobril toimuv etenduskunstide biennaal NU Performance Festival ning 25. oktoobril algav muusikafestival Üle Heli ühendasid jõud, et tuua publikuni mitmekesine rahvusvaheline ja kohalik etenduskunste ning muusikat sisaldav programm. Tihe koostöö samaaegselt toimuvate festivalide vahel aitab luua senisest veelgi vaheldus- ja ideederikkama unikaalse terviku. Alates 6. juunist müüki tulnud piiratud kogus ühiseid festivalipasse võimaldavad külastada nii etendusi ja performance'id, kui ka kontserte ja klubiüritusi, mis toimuvad oktoobri eelviimasel nädalal.  \n\nNU Performance Festival 2018 keskmes on objektse kunsti ajaliin ning performatiivsed võimalused, mis mõtestavad ümber publiku individuaalset ja kollektiivset kogemust.  \n \nKui teatril on objektsele kunstile pakkuda dramaturgilist ajaliini ning distsipliini, siis vastupidise vahetusena annab näitusesaalide kunst teatrile tõlgendusvabadust ja formaadi variatiivsust.\n  \nLavaline aeg muudab objekti vastuvõttu: objektse kunsti ajatelg, ruumi dramaturgia, selle kontekst ja kommunikatiivsus fokusseerivad publikut teadvustamata aladele ja aspektidele.  \n\t  \nPubliku roll ja tähendus sellises vaatemängus on mitmes mõttes olla kunstiteose osa. Enda kohalolu panus teose tekkes loob nii võimaluse kui ka vastutuse.  \n \nVaatemäng moodustub objektsuse performatiivsusest. Objekt ise ongi vaatemäng.    \n\nNU Performance Festival 2018 programmi huvi on tuua esile ootamatut, viia kõrvale harjumuspärasest ning luua pinnast performatiivsuse avaramale tajumisele. \n\nNU Performance Festivali 2018 kuraatoriteks on Henri Hütt ja Mihkel Ilus, kes on kunstnike-duona tegutsenud läbi seitsme aasta. Hetkel töötavad nad järgmise ühise näituse ja lavastuse kallal ning on aktiivsed ka oma autoripraktikates.  \n\n\n**Henri Hütt** on (etendus)kunstnik, kes väärtustab loomingulisi hübriidvorme, kuhu kuuluvad nii tehnoloogilise dominandiga etenduskunsti vormid, helietendused, lavastatud näituse kontseptsiooni arendamine ning koostööd erinevate valdkondade kunstnikega. Hütt on rühmituse MIMproject liige ning Baltikumi ja Skandinaavia kunstiülikoolide võrgustiku DAMA koordinaator. \n\n**Mihkel Ilus** on visuaalkunstnik, kelle põhifookus on maal laiendatud väljal. See tähendab, et sageli töötab Ilus suuremõõtmelise installatsiooniga, milles maaliline lähenemine omab keskset rolli. Ilusa praktika oluline osa on ka kaasaegse näitusekultuuri ja etenduskunsti põimumine. Viimasel ajal tegeleb peamiselt objektse kunsti erinevuste uurimisega black box ja white cube tingimustes.\n\n\nKäesoleval aastal toimuval festivalil Üle Heli on oodata kontserte, klubiõhtuid, heliinstallatsioone ning haridusliku eesmärgiga seminare ja vestlusringe. Samuti toimuvad festivali otsingulisele ja avastamisrõõmu taotlevale lähenemisele omaselt sündmused erinevates kohtades nii Tallinnas kui ka festivali lõpupäeval, 28. oktoobril toimuva eksootilise väljasõidu kaudu kaugemalgi.\nHeliüleste tasandite muusikafestival Üle Heli keskendub žanrimääratluste asemel muusika tähenduslikkusele ja seostele erinevate kunstivaldkondadega. Festivali huviorbiidis muusikalised nähtused, mis väljuvad etteantud raamidest ja suhestuvad ümbritsevaga vabalt ning loominguliselt, esitades küsimusi ja pakkudes erinevaid tõlgendamis- ning dialoogivõimalusi ka heliülestel tasanditel. <br /> \n<br />\nVII NU Performance Festival “Objekt ja kollektiiv / Object with audience”  \nEtenduskunstide festival / Performing arts festival  \n20.-28.10.2018 Tallinn  \n\n**KAVA / PROGRAM**  \n\n**Laupäev / Saturday 20.10**  \n\n20:00 NU Performance Festival: avaõhtu / opening night  \nKoht: Sveta Baar (Telliskivi 62, Tallinn)  \nuksed / doors: 19:00  \n\n\n**Esmaspäev / Monday 22.10**  \n\n13:00 15:00 17:00 19:00 21:00 23:00 Kadri Noormets   (Tallinn) “MAANDATUD TÕOTUS”   \nKoht: Kanuti Gildi SAAL (Pikk 20, Tallinn)  \n\n16:00 Vestlusring “Objekt kui esineja” / discussion panel   “Object as performer”  \nKoht: EKA uus galerii (Põhja pst. 7, Tallinn)  \nTasuta/Free Entrance  \n\n16:00 17:00 18:00 Kristjan Suits (Tallinn) “Waiting for the future”  \nKoht: Kanuti Gildi SAAL, III korrus (Pikk 20, Tallinn)  \n\n20:30 Andrius Katinas, Vera Nevanlinna, Salla Salin (Helsingi) “Paper piece”  \nKoht: Kultuurikatel, Katelde saal (Põhja pst. 27a, Tallinn)  \n\n\n**Teisipäev / Tuesday 23.10**  \n\n13:00 15:00 17:00 19:00 21:00 23:00 Kadri Noormets (Tallinn) “MAANDATUD TÕOTUS”   \nKoht: Kanuti Gildi SAAL (Pikk 20, Tallinn)  \n\n16:00 17:00 18:00 Kristjan Suits (Tallinn) “Waiting for the future”  \nKoht: Kanuti Gildi SAAL, III korrus  \n\n19:00 Gisèle Vienne, Peter Rehberg (Pariis, Viin) “Jerk, the radioplay”  \nKoht: ERR 1. stuudio (Kreutzwaldi 14, Tallinn)  \n\n\n**Kolmapäev / Wednesday 24.10**  \n\n13:00 15:00 17:00 19:00 21:00 23:00 Kadri Noormets (Tallinn) “MAANDATUD TÕOTUS”   \nKoht: Kanuti Gildi SAAL (Pikk 20, Tallinn)  \n\n17:00 19:00 20:00 Lawrence Malstaf (Tromsø) “SHRINK 01995”  \nKoht: Mustpeade maja, Valge saal (Pikk 26, Tallinn)  \n\n19:00 Gisèle Vienne, Peter Rehberg (Pariis-Viin) “Jerk, the radioplay”  \nKoht: ERR 1. stuudio (Kreutzwaldi 14, Tallinn)  \n\n\n**Neljapäev / Thursday 25.10** \n\n17:00 19:00 20:00  Lawrence Malstaf  (Tromsø) “SHRINK 01995”  \nKoht: Mustpeade maja, Valge saal (Pikk 26, Tallinn)  \n\n19:00 Nanna Nordström ja Gideonsson Londré (Stockholm) “Thin Man (part 1)”  \nKoht: Kunstihoone (Vabaduse väljak 6, Tallinn)  \n\n\n**Reede / Friday 26.10**  \n\n16:00 Vestlusring “Objekt kui esineja” / discussion panel “Object as performer”  \nKoht: EKA uus galerii (Põhja pst. 7, Tallinn)  \nTasuta  \n\n19:00 Nanna Nordström, Gideonsson Londré (Stockholm) “Thin Man (part 2)”  \nKoht: Kunstihoone (Vabaduse väljak 6, Tallinn)  \n\n20:30 Mårten Spångberg (Stockholm-Berliin) “Digital Technology”  \nKoht: Kanuti Gildi SAAL (Pikk 20, Tallinn  \n\n\n**Laupäev / Saturday 27.10**  \n\n16:00 Performatiivsed raamatuesitlused / Performative book presentations  \nKoht: Kanuti Gildi SAAL (Pikk 20, Tallinn)  \n\n19:30 Julía Rodriguez (Mexico City-Berliin) “Later”  \nKoht: Kanuti Gildi SAAL (Pikk 20, Tallinn)   \n\n21:00 Laivi (Tallinn) “Mystifying mundane” + festival Üle Heli kontsert  \nKoht: ARSi Projektiruum (Pärnu mnt 154, Tallinn)  \n\n\n**Pühapäev / Sunday 28.10**  \n\n17:00 mysteerium väljasõit koos festivaliga Üle Heli  \nBuss väljub kell 17:00 Rahvusraamatukogu eest, tagasi kell 23:00. Bussipileti saab osta bussist.<br />\nBussile registreerumine ja lisainfo: info@ule-heli.ee   \n\n\n-  -  -  \nVII NU Performance Festival  \n\nKuraatorid: **Henri Hütt, Mihkel Ilus**   \nKorraldaja: **Uue Performantsi Selts**  \nKaaskorraldaja: Kanuti Gildi SAAL  \nVisuaalne identiteet: **Henri Hütt, Jaan Evart, Mihkel Ilus**  \nFestivali initsiaatorid: **Anders Härm, Priit Raud**  \nTv-klipp: **Taavi “Miisu” Varm** (Varm Studio)  \nGraafiline disain: **Jaan Evart**  \nTõlked: **Kaisa Kaer**  \nTehniline direktor: **Revo Koplus**  \n\nToetajad ja partnerid:  \nEesti Kultuurkapital, Hasartmängumaksu Nõukogu, Tallinna, Kultuuriamet, Rootsi suursaatkond, Nordic Culture Point, Valmiermuiža, Eesti Kunstiakadeemia, Sveta Baar, Mustpeade Maja, ERR Raadioteater, Kultuurikatel, ARSi maja, Tallinna Kunstihoone, Eesti Kunstnike Liit, JCDecaux, festival Üle Heli jt."
    description_en: >-
        In the center of NU Performance Festival 2018 is the timeline and
        performative possibilities of object based art. It redefines the
        individual and collective experience of the audience.
          
        When theater has to offer to visual arts the dramaturgy based timeline
        and discipline, then vice versa the exhibition culture to theatre gives
        liberty of interpretation and varieties of format.  


        Stage time changes the reception of an object: timeline of an object,
        the dramaturgy of space, its context and communicativity focus the
        audience towards unexplored areas and aspects.   


        The role and significance of the audience in the spectacle in many ways
        is to be one component of the artwork.  


        The spectacle consists of performativity of objecthood. Object itself is
        the spectacle.  


        The program of NU Performance Festival 2018 will bring forward the
        unexpected and drift apart from the conventional for paving ground to
        wider perception of performativity.


        The curators of NU Performance Festival 2018 are Henri Hütt and Mihkel
        Ilus, who have worked together as an artist-duo more than seven years.
        They are currently working on their next collaborative exhibition and
        performance, as well are active in their artist practices
        individually.  
          

        **Henri Hütt** is an artist-performer, who is primarily a dancer. Since
        the beginning of this decade, he has created many technological
        performative acts, staged exhibitions, sound performances and other
        unprecedented formats. Henri Hütt is also part of the MIMproject team
        and coordinates Dance And Media Art network DAMA in Scandinavia and the
        Baltics.  
          

        **Mihkel Ilus** is a visual artist, whose main focus is painting and its
        extended field. Ilus often works with large-scale installations where
        painting plays the central role. In the practice of Ilus, contemporary
        exhibition culture and performance practices are inextricably
        intertwining. Recently Ilus has been concentrating on the distinction of
        objecthood as such in conditions of the white cube and black box
        situations.<br />

        <br />

