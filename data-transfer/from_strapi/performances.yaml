    description_et: "Skriiningprogramm tutvustab kolme väga eriilmelist kunstnikku - Shana Moulton, Hannah Black ja George Jacotey/DEEP4FEET. See on mänguline vaade kehale, sellega kaasnevatele paranoidadele, arusaamistele ja ootustele.\n\nShana Moulton “Repetitive Stress Injuries” (2008), 12:26’ \nHannah Black “The Neck” (2014), 3:14’ \nDEEP4U: George Jacotey Kimmo Modigi, Jennifer Chani, Shawné Michaelain Holloway “Hot New World Viewz” (2016), 2:03’\n\nShana Moulton on California päritolu New Yorgis elav meediakunstnik, kes vaatleb kaasaja paineid läbi oma alterego Cynthia. Cynthia on intiimselt autobiograafiline psühhedeelne autoportree, kes on kutsutud ellu, et uurida vananemist, keha hääbumist ning hingelist segadust maailmas, kus \_retseptiravimid, ilutooted ja spirituaalsed tõekspidamised kannavad võrdset kaalu. Shana kasutab värvikaid performance’eid ja videoteoseid, et kirjeldada haledaid olukordi humoorika sürrealismiga. Ta loob kummastavaid ja sugestiivseid narratiive, kombineerides veidrat huumorit, low-tech lähenemist ja popi-tundlikkust. \n“Repetitive Stress Injuries” (“Ülekoormusvigastused”, 2008) jälitab kunstniku alter ego Cynthiat, kelle viib rännakule rühtiparandav kaelaseadeldis. \n[www.shanamoulton.info](http://www.shanamoulton.info/)\n\nHannah Black on Berliinis elav kunstnik, kirjanik ja toimetaja. Tema esseed, videod ja Twitteri konto kutsuvad vaatajaid lahti harutama sügavalt juurdunud arusaamu kehadest, identiteedist ja võimust, kasutades selleks luulelisi ja teravaid paljastusi intiimsuse ja võõrandumise poliitika teemal. Tema teosed on pandud kokku popmuusikast ja autobiograafilistest fragmentidest ning ta ammutab ainest feministlikest, kommunistlikest ja radikaalsete mustanahaliste autorite ideedest. Peaaegu alati oma elukogemusele toetuv Black paikneb kusagil üliolulise kriitika ja ennastpilava sarkasmi vahel, mis ajendab ennast hindama, kuid ei mõju võõrastavalt. \n“The Neck” (“Kael”, 2014) dekonstrueerib Blacki lapsepõlve arusaama naise kehast.\n [www.twitter.com/nanpansky](http://www.twitter.com/nanpansky/)\n\nGeorges Jacotey on Ateenas tegutsev performance’i- ja videokunstnik, kes töötab soo ja identiteedi probleemistikuga - nii internetis kui ka mujal. Parajasti uurib ta queer-kunsti, queer’ide kujutamist, soolist voolavust, enesearendust ja eneseavaldamist, kasutades peamise tööriista ja tegutsemispaigana internetti. Tema looming seab küsimärgi alla ja analüüsib selliseid teemasid nagu sugude kujutamine ning loovuse ja vaesuse suhe finantskriisijärgses maailmas. \n“Hot New World Viewz” (2016) on mänguline identiteedi, assimileerumise ja kehakuvandi otsing. Video on tehtud koostöös  Kimmo Modigi, Jennifer Chani ja Shawné Michaelain Hollowayga grupina DEEP4U\n[www.georgesjacotey.info](http://www.georgesjacotey.info/)"
    description_en: "The screening programme presents three very different artists - Shana Moulton, Hannah Black and George Jacotey. It is a playful look at the body, its concomitant paranoias, ideas and expectations.\n\n\nShana Moulton “Repetitive Stress Injuries” (2008), 12:26’ \nHannah Black “The Neck” (2014), 3:14’ \nDEEP4U: George Jacotey Kimmo Modigi, Jennifer Chani, Shawné Michaelain Holloway “Hot New World Viewz” (2016), 2:03’\n\n\n\n\nShana Moulton is a New York based \_media artist who explores contemporary anxieties through her filmic alter ego, Cynthia. She creates evocatively oblique narratives in her video and performance works. Combining an unsettling, wry humor with a low-tech, Pop sensibility, Moulton plays a character whose interactions with the everyday world are both mundane and surreal, in a domestic sphere just slightly askew.  Cynthia is intimately autobiographical, a kind of psychedelic self-portrait set up to explore living and ageing and believing in a world where prescription drugs, beauty products and spiritual principles all carry equal weight. As her protagonist travels through variety of anxiety-fuelled situations and navigates the enigmatic and possibly magical properties of her home decor, Moulton initiates relationships with objects and consumer products that are at once banal and uncanny. \nShana uses colorful psychedelic performance to describe pathetic situations with humorous surrealism. \n“Repetitive Stress Injuries” (2008) follows the artist's alter-ego, Cynthia, as she is taken on a journey by her posture-improving cervical traction device.\n\n\nHannah Black is an artist, writer and editor currently based in Berlin. Her essays, videos as well as her Twitter presence invite you to unpack deep-seated ideas about bodies, identity, and power through poetic and sharp exposés on the politics of intimacy and alienation. Her work is assembled from pop music and autobiographical fragments and draws on feminist, communist and black radical thought. Almost always writing from the perspective of lived experience, Black occupies the space between vital critique and self-deprecating sarcasm that provokes self-evaluation without being alienating. \n“The Neck” (2014) deconstructs Black's understanding of a female body as a child.\ntwitter.com/nanpansky\n\nGeorges Jacotey is s Athens based performance, and visual artist who works with video, gender and the problematisation of identity – on and offline. He is currently examining notions of queer art, queer representation, gender-fluidity, self-improvement and self-publication using the internet as his primary tool and territory. His work questions and critiques issues such as gender representation and the relationship between creativity and poverty in a post financial crisis world.\n“Hot New World Viewz” (2016), which is playful quest of identity, assimilation and body image. This video is a collective work in collaboration with Kimmo Modig, Jennifer Chan and Shawné Michaelain Holloway as DEEP4U.\n\nGeorgesjacotey.info"
