    description_et: >-
        <strong>Milota Sidorova</strong> on urbanistlike projektide ja
        strateegilise arenduse konsultant. Ta on õppinud maastikuarhitektuuri,
        linnaplaneerimist, graafilist disaini, filmi, urbanistikat, sotsiaalse
        uurimise meetodeid ja personalijuhtimist Euroopas, Aasias ja Ameerikas.
        Ta oli rahvusvahelise linnaplaneerimisfestivali reSITE asutajaliige ja
        koordinaator. 2014 omandas ta doktorikraadi maastikuarhitektuuri
        erialal, teemaks: Turgude katalüseeriv mõju avalikule ruumile. Alates
        2012 on ta kaardistanud avalikku ruumi mõjutavaid avaliku sektori
        tegureid Bratislavas ja Prahas. 2015 kaasasutas ta WPS Praha –
        võrgustiku, mis edendab naisi arhitektuuris, linnaplaneerimises ja
        kogukondade edasiviimises.<br />

        <a href="http://www.wpsprague.com">www.wpsprague.com</a><br />

        <br />

        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile.<br />

        <br />
    description_en: >-
        <strong>Milota Sidorova</strong> is a consultant of urban projects and
        strategic development. She studied landscape architecture, urban
        planning, graphic design, film production, urbanism, methods of social
        research and human resource management in different schools around
        Europe, Asia and America. She was a founding member and coordinator of
        the international urban planning festival reSITE. In 2014 she finished
        doctoral studies in landscape architecture on the topic: Catalytic
        impacts of markets on public spaces. Since 2012 she has been mapping
        actors in non-governmental sector engaged with public space in
        Bratislava and Prague. In 2015 she co-founded initiative WPS Prague – a
        network promoting active women in architecture, urban planning and
        development of community life.<br />

        <a href="http://www.wpsprague.com">www.wpsprague.com</a><br />

        <br />

        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment.<br />

        <br />
