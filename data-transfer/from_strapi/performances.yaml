    description_et: >-
        Brenda kõnnib jääl. Brenda teeb seda 5 korda päevas, kokku 324859 korda.
        Pärast kilomeetreid vahtu jääl on ees beebivankrite parkimisplats.
        Tolmuimeja tiirleb ümber kärude, imeb tühjaks aju ja keha, ajades
        organid segamini. Käsi transformeerus kombitsaks, aju sai kinni vurrust,
        see tiris ta võõrkehale. Häälekurrust pikenes välja väät, Brenda pakkus
        istujaile lahtistit.   
          
        “Kliinik pärast paati” on performatiivne installatsioon, mida esitatakse
        sessiooni formaadis. Väljatõugatu ja vangistatud eksleja seavad üles
        kliiniku, kus peamotiivina tegeletakse häirete võimendamise ja
        aktsepteerimisega. Häireid töödeldakse kliinikus täiustatud
        fiktsioonini.  

        Sessioon sisaldab ebaharilikke fragmente väljatõugatu poolt sisse imetud
        mälestustest.  
           
        Tähelepanu!  

        Kliinik on avatud vaid aktiivsel ajal. Igal täistunnil toimub sessioon.
        Kõrvaltoimete esinemisel palun konsulteerida laborandiga.  
          
          
        [Madlen Hirtentreu](https://www.madlenhirtentreu.com) on vabakutseline
        kunstnik, kes tegeleb erinevate perspektiivide kaudu territoriaalse
        piiratuse ja sellest väljapääsemisega. Tihti leiutades selleks uusi
        manipulatsioonimeetodeid. Materjal omandab Madleni töödes tihti
        arhiveerija rolli. Osaleb mõõdukalt projektides ja näitustel Eestis ja
        väljaspool. Ta on tegev ka teistel väljadel, olgu selleks laborilaud,
        tehase masin või kontoritool.  
          
          
        **Installatsiooni performatiivne osa algab igal täistunnil.   

        Palun registreeri end sobivale sessioonile:**   

        - 14.08 / 20:00 - 22:00 Kohad on täitunud!  

        - [16.08 / 16:00 - 18:00](https://doodle.com/poll/whih89ddc4rsu3ii)  

        - [23.08 / 16:00 - 18:00](https://doodle.com/poll/6u24hdcgyvgiak7e)  

