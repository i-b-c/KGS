    description_et: >-
        Moto:  

        Heli ühendab meid ja on seda ühel või teisel moel teinud läbi inimkonna
        ajaloo. Inimese vaikuseotsingud tähendavad tegelikult mõtisklemiseks
        sobiliku ruumi otsinguid, mitte ihalust vaikuse enese järele. Isegi
        tänapäeval tuleb heli ohjata mitte tehnoloogia ega jõu, vaid eetika
        abil. Selleks on vaja maailma kus keegi pole teistest märkimisväärselt
        valjuhäälsem ja kus kedagi ei suruta ähvarduste sunnil surmavaikusesse,
        vaid kus kõik võivad igapäevast elu elades ümiseda, vilistada, ja
        omavahel rääkida – ja kuulda teisi sedasama tegemas.  

        David Hendy “Müra, heli ja hääled.”  


        Vana mees, endine helirežissöör Johannes Krapp orienteerub vabalt Eesti
        kultuuriloos, ajalugu on talle kättesaadav nagu Vana-Kreeka laulikutele,
        keda juhendas muusa. Ta on võtnud endale ülesandeks raadio abil ajalukku
        sekkuda ja saata minevikku oluline teade. Raadio on katki ja ootab
        parandamist. Krappi käe all raadio elustub ja sekkub Naisdiktor. Algab
        ühine ajarännak mälestustes ja viimase 200 aasta Eesti (muusika)ajaloos
        ning Ringhäälingu lõpututes arhiivimaterjalides.  

        Näidend on üles ehitatud muusikateose kompositsiooni põhimõttel.
        Ajalooline materjal on kollaažitehnikat kasutades pihustunud
        fragmentideks. Krapp mäletab, teab, kommenteerib...

        Kas tal õnnestub saata teadet minevikku?  


        www.uusteater.ee
    description_en: >-
        An old man and a former Sound Director, Johannes Krapp, navigates freely
        in the Estonian culturology. History is accessible to him, much like to
        the bards in Ancient Greece who were guided by the muses. He has made it
        his mission to intervene in history by using a radio to send an
        important message to the past. The radio is broken and needs to be
        fixed. Under Krapp's direction, the radio becomes alive and a Woman
        Announcer intervenes. Together, they begin travelling through time and
        memory, passing through the last two hundred years of Estonian (musical)
        history and into the endless archival materials of radio broadcasts.  

        The play is composed upon the principles of a piece of music.  

        The historical material has been shattered into fragments by using
        collage techniques.  

        Krapp remembers, knows, comments...  

        Will he be able to send a message to the past?  


        www.uusteater.ee
