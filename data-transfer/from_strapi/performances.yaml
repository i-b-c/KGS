    description_et: >-
        “WHAT DOES THE SPACE KNOW” (mida ruum teab) on interaktiivne
        tantsuetendus / installatsioon, mille koreograafia on loonud ja mida
        esitavad Farah Saleh (PAL/UK)  ja Mirjam Sögner (DE/AT). Publik on
        oodatud liikuma ruumis etenduse ajal ning suhestuma ruumi ja tööga
        mitmel moel. Peale esmast Ramallahi Goethe Instituudi poolt algatatud
        uurivat faasi, on neil huvi luua uus töö. Selle peamine eesmärk on
        kollektiivselt ette kujutada, ehitada, luua, kehastada ja aktiveerida
        ajutisi ruume. Oma varasemas uurimuses on Farah ja Mirjam tegelenud
        peamiselt kadunud ruumide tunnustamisega Palestiinas. Lähtudes sellest
        soovivad nad nüüd liikuda rohkem proaktiivsesse, väestatud ja
        universaalsemasse dimensiooni. Nende sihiks on luua nii performatiivne
        kui ruumiline struktuur, mis annab vaatajale kaasahaarava kogemuse
        ruumidest nii enda ümber kui sees, mis kutsub neid tajuma ruume
        teistmoodi ja inspireerib kollektiivselt ette kujutama mõeldamatuid
        arhitektuure.



        Farah Saleh on palestiina tantsija ja koreograaf, kes on aktiivne nii
        Palestiinas, Euroopas kui USA-s. Ta on õppinud lingvistilist ja
        kultuurilist medieerimist Itaalias paralleelselt jätkates oma kaasaegse
        tantsu õpinguid. Alates 2010 on ta osalenud kohalikes ja
        rahvusvahelistes projektides järgmistes kooslustes - Sareyyet Ramallah
        Dance Company (Palestiina), the Royal Flemish Theatre and Les Ballets C
        de la B (Belgia), Mancopy Dance Company (Taani/Liibanon),
        Siljehom/Christophersen (Norra) ja Candoco Dance Company (UK). Ta on
        õpetanud tantsu, koordineerinud ja kureerinud projekte alates 2010
        üheskoos Palestiina tsirkusekooli, Sareyyet Ramallahi ja Ramallahi
        kaasaegse tantsu festivaliga ning on ka 2016 aastal alguse saanud
        iga-aastase Ramallahi tantsu suvekooli kaaslooja.

        (www.farahsaleh.com)[www.farahsaleh.com]


        Mirjam Sögner on austria koreograaf ja esineja, kes töötab Berliinis ja
        Viinis. Ta on õppinud kaasaegset tantsu ja kunstiuuringuid MUK’is Viinis
        ja ArtEZ’is Arnheimis. Tema töid on näidatud erinevates teatrites -
        Frascati (Amsterdam), Dancehouse (Melbourne), Circuit-Est (Montreal),
        Brut (Viin), Dansens Hus (Oslo), Rote Fabrik (Zürich) jm. Tema soolo
        “LARA” valiti 2016 aastal Aerowaves võrgustiku poolt üheks
        paljulubavaimaks tööks. Mirjam sai 2016 aastal nii DanceWEB kui STARTS
        stipendiumi Austria kultuurinõukogu poolt. Aastal 2015 aastal määrati
        talle Berliini Senati poolt Tanzstipendium ja uurimisstipendium Austria
        kultuurinõukogu poolt. 2017 aastal kutsuti ta Goethe Instituudi poolt
        uurivasse residentuuri Circuit-Est / Montreali. Koreograafina on ta
        töötanud järgmiste kooslustega - Dschungel Wien (Farbenreich2016, My
        Body in Me2015), Kibbutzim College Tel Aviv (We Fade to Grey),New
        Talents Biennale Cologne 2014 (Äther) ja õpetab regulaarselt ArtEZ
        Arnheimi tantsu osakonnas. Esinejana on ta teinud koostööd järgmiste
        kunstnikega - Siegmar Zacharias, Helene Weinzierl, Julian Barnett jpt.
        2018 lõi ta soolotöö - “RAYS” performatiivne kohtumine radiatsiooniga
        brut’is Viinis. 2019 aastal esietendus tema trio “SPEAKING VOLUMES”
        Sophiensäle’s Berliinis. 

        (mirjamsoegner.com)[http://mirjamsoegner.com/]


        MORE THAN THIS on koostööprojekt, mis seob omavahel 6 festivali ja
        kultuuriorganisatsiooni ning 5 koostööpartnerit ja 6 kaasatud kunstnikku
        Euroopast ja väljastpoolt. MORE THAN THIS on projekt, mis toob esile
        kaasaegsed etenduskunstid kui vahendi, mille abil on võimalik ümber
        mõtestada komplekssuse väärtust ning vaidlustada üksikute narratiivide
        ja fikseeritud identiteetide kristalliseerumist. Etenduskunstid kui
        sellised on perfektne mõtteruum, milles tegeleda külalislahkuse
        mõistega.

        (morethanthis.eu)
    description_en: >-
        WHAT DOES THE SPACE KNOW is an interactive dance performance /
        installation choreographed and performed by Farah Saleh (PAL/UK) and
        Mirjam Sögner (DE/AT). The audience is invited to move through the room
        during the performance and interact with the space and the work in
        various ways. After a first research phase initiated by the Goethe
        Institute Ramallah they are now keen to move into the creation of a new
        work. The main objective of the intended piece is how to collectively
        envision, build, create, embody and activate temporary spaces. In their
        previous research Farah and Mirjam dealt mostly with testimonials of
        vanished spaces in Palestine. From there they want to move into a more
        pro-active, empowered and universal dimension. It is their goal to
        create both a performative and spatial structure that guides the
        audience through an embodied experience of the spaces around and within
        them, that invites them to perceive spaces differently and that inspires
        them collectively envision unthinkable architectures. Public 



        **Farah Saleh** is a Palestinian dancer and choreographer active in
        Palestine, Europe and the US. She has studied linguistic and cultural
        mediation in Italy and in parallel continued her studies in contemporary
        dance. Since 2010 she took part in local and international projects with
        Sareyyet Ramallah Dance Company (Palestine), the Royal Flemish Theatre
        and Les Ballets C de la B (Belgium), Mancopy Dance Company
        (Denmark/Lebanon), Siljehom/Christophersen (Norway) and Candoco Dance
        Company (UK). Saleh has also been teaching dance, coordinating and
        curating artistic projects since 2010 with the Palestinian Circus
        School, Sareyyet Ramallah and the Ramallah Contemporary Dance Festival.
        In 2016 she co-founded the Ramallah Dance Summer School, which will run
        on a yearly basis.

        (www.farahsaleh.com)[www.farahsaleh.com]


        **Mirjam Sögner** is an Austrian choreographer and performer who works
        between Berlin and Vienna. She studied contemporary dance, dance making
        and artistic research both at MUK Vienna and ArtEZ Arnhem in the
        Netherlands. Her pieces tour internationally to theatres such as
        Frascati Amsterdam, Dancehouse Melbourne, Circuit-Est Montreal, Brut
        Wien, Dansens Hus Oslo, Rote Fabrik Zürich. Her first solo-work “LARA”
        was selected by the Aerowaves Touring-Network as one of the most
        promising new dance pieces in Europe in 2016. In 2014 Mirjam received
        both a DanceWEB Scholarship as well as the STARTStipendium awarded by
        the Austrian Cultural Council. In 2015 she furthermore held the
        Tanzstipendium from the Senat Berlin and a Research Scholarship from the
        Austrian Cultural Council. In 2017 she was invited to a research
        residency at Circuit-Est / Montreal by the Goethe Institute. As a
        choreographer Mirjam has furthermore worked for Dschungel Wien
        (Farbenreich2016, My Body in Me2015), Kibbutzim College Tel Aviv (We
        Fade to Grey),New Talents Biennale Cologne 2014 (Äther) and regularly
        teaches at ArtEZ Arnhem at the Dance Department. As a performer Mirjam
        collaborated with Siegmar Zacharias, Helene Weinzierl, Julian Barnett.
        In 2018 she created the solo-work “RAYS” - a performative encounter with
        radiation at brut Vienna. This year the trio “SPEAKING VOLUMES”
        premiered at Sophiensäle Berlin.

        (mirjamsoegner.com)[http://mirjamsoegner.com/]


        MORE THAN THIS is a cooperation project among 6 festivals and cultural
        organisations with the collaboration of 5 associated partners and
        engaged 6 artists. MORE THAN THIS is a project that focuses on the
        contemporary performance as a fundamental tool to rethink the value of
        complexity, as a tool to challenge the crystallisation of single
        narratives and fixed identities, and a perfect specific space to work on
        displacement and hospitality.

        morethanthis.eu
