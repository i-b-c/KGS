    technical_info_et: >-
        Lavastaja: **Alissa Šnaider**  

        Etendajad: **Maarja Tõnisson, Kaisa Kattai, Alan Proosa, Andrius
        Mulokas, Ruslan Stepanov**  

        Dramaturg: **Maike Lond Malmborg**  

        Kunstnik: **Madlen Hirtentreu**  

        Helikunstnik: **Renzo van Steenbergen**  

