    description_et: "Viimasel ajal kuulab Joanna palju (romantilist) ajakohast pop-muusikat ja vanu nostalgiaküllaseid hitte. Teda paelub see, kui paljud inimesed üle maailma sama muusikat veel kuulavad. Oma tubade sügavustes. Teatud universaalsus ja omamoodi koosolemine. Samasus. Ent on ka kerge värin rinnus: kas on üldse okei, kui mulle meeldib Justini viimane album? On midagi põnevat ja erutavat selles, kuidas kunstiline eneseväljendus annab justkui loa öelda välja need kõige roosamad ja limasemad mõte-tunded, mida ööpimeduses igale teisele, isegi mitte endale, ei ütleks. Ja miljonid inimesed kuulavad ja neile meeldib, sest nad samastuvad. Saavad aru. Bruno Mars, chill out, pole vaja siin kõigi nimel granaate püüda ja oma pead tera alla panna ja rongi ette viskuda ja kuule oma ajju lasta. Kuigi jah, mõistan. Vahel ma mõtlen, et 'armastus' ja 'süda' peavad olema küll enimkasutatumad sõnad muusikas. See nõuab ikka omajagu julgust, see romansside kirjapanek ja kogu maailma ees oma kasutu luhtaläinud armastuse kuulutamine. Üks sõber kord ütles, et peaksin keskenduma oma tööle, sest \"everything else is just a sideshow\". Umbes nagu \"Tee tööd, näe vaeva, siis tuleb ka armastus.\" (Kõlab veidike nagu kaitsemehhanism?) Ma ei tea, miskipärast valib Joanna alati ikka selle 'tema' esimesena. Romantilises ja mitteromantilises mõttes. Sest kaksi-kolme-nelja on ikka soojem ja parem. Väärtuste küsimus? Ta ei vabanda, kui on öelnud liiga palju. Ekspressionisti pole vaja karta, iseasi kas ta meile meeldib.\_  \nIseasi on, mida päriselt öelda tarvitseb?\_  \n\nOled oodatud \"Rafaello - ütleb rohkem kui tuhat sõna\" showingule, kus kohtuvad ja segunevad:  \ninstallatsioon  \nperformance  \nimprovisatsioon  \nmuusika  \nlaulmine  \ntants  \nliikumine  \nJoanna garderoob  \nroosid  \nkatsetus  \n\nKell 15:00 – 18:00  \nInstallatsioon-performance on muutuva iseloomuga. Tulemine-olemine-minemine vastavalt vabale tahtele kogu kestuse vältel.  \n\n\"no time to catch flights, only feelings\"  \n\n**Joanna Kalm** on koreograaf ja tantsija/etendaja. Residentuuris uurib ta ekspressiivsust avalikus ja varjatud ruumis."
    description_en: "Recently, Joanna has been listening to a lot of contemporary (romantic) pop-music and old nostalgic hits. She is intrigued by the amount of people out in the world listening to the same music. In the depths of their rooms. On their headphones. There is a kind of universality and togetherness to this phenomena. Sameness. She cannot help to escape the slight flutter in her chest: is it even okay for me to like Justin’s last album? It is exciting how artistic expression gives one a permission… an opportunity to say out loud all the most pink and slimy truths, which we do not even dare to admit to ourselves in the darkness of the night. And millions of people listen to these songs, they like them, because they sympathise. Bruno Mars, chill out, no need to catch grenades for everyone and put your head on a blade and jump in front of a train and shoot bullets into your brain. Though, yes, I do understand.  \nSometimes I think 'love' and 'heart' must be the most frequently used words in music. It requires quite a bit of courage, this writing of love songs and then declaring your yet another useless, wasted, broken love in front of the whole world. One of my friends told me to focus on my work, for \"everything else is just a sideshow\". Similarly to \"Work at it hard and love shall come.\" (Perhaps it’s a protective mechanism?) I don’t know why, but for some reason Joanna always chooses the 'him'/'her' first. In a romantic and unromantic way. It is much warmer and better to be together - two, three, four or more of us. Questions of value judgement? She doesn’t apologise when she has said too much. There is no reason to fear an expressionist, whole different matter is if we actually like one. Whole different questions is what is actually needed to be said?  \n\nIn the showing of “Rafaello - more than a thousand words” the following meet and mix:  \ninstallation  \nperformance  \nimprovisation  \nmusic  \nsinging  \ndance  \nmovement  \nJoanna’s wardrobe  \nmany roses  \nexperimentation  \n\nInstallation-performance is changing and evolving in its nature. Coming-being-going according to your wish during the whole duration from 15:00 to 18:00.  \n\n\"no time to catch flights, only feelings\"\_  \n\n**Joanna Kalm\_**is a choreographer and dancer/performer. During the residency she is focusing on expression in the public and secluded spaces."
