    description_et: >-
        “Cock, Cock.. Who’s There?” on ärritav, liigutav ja isiklik etendus
        noore naise uuringutest intiimsusest ning vägivallast.
        Internetiplatvormide ja silmast-silma kokkupuudete kaudu viib Samira
        Elagoz publiku teekonnale, mille käigus võidab ta tagasi jõu, leiutades
        uuesti seksuaalsuse autonoomse väljendamise ning meestega suhestumise
        katsed.<br />

        <br />

        “Pean end käitumise uurijaks, kes kasutab oma kehaehitust ja staatust
        sellise teabe hankimiseks, mis ei tarvitseks olla teistel võimalik.
        Muutun katseloomaks omaenda laboris. Avastamise ja loomise protsessist
        on kantud mitte ainult see, kuidas maailma vaatan, vaid ka see, kuidas
        tean midagi iseendast.”<br />

        <br />

        <strong>Samira Elagoz</strong> on Soome/Egiptuse kunstnik, kes elab
        hetkel Amsterdamis. Ta lõpetas 2016. aasta juulis Amsterdami
        Kunstikõrgkooli (SNDO) bakalaureusekraadiga koreograafia alal. Viimased
        kolm aastat on ta uurinud ekraanide, objektiivide ja küberruumi
        vahendusel piinliku täpsusega võimalusi kokkupuudeteks võõrastega.
        Internet on tema töövahend, mis toimib nii mänguväljaku, lava kui
        inspiratsiooniallikana. Ta loob teoseid peamiselt video kujul ja esitleb
        neid tavaliselt kas installatsiooni või loeng-etenduse vahendusel. Olles
        etenduskunstide haridusega, ühendab ta selle kunstiliigi aspekte video
        ja filmiga ning loob nii oma ainulaadset laadi “dokumentaalfiktsiooni”.
        Oma teoste loomiseks on ta käinud võõrastega kohtumas reisidel
        Amsterdamis, Berliinis, Tokyos, New Yorkis, Miamis, Havannas ja
        Helsingis. Projekti on toetatud Soome Kultuurirahastust ja Kölnis
        jagatava auhinnaga Blooom Award. 2014. aasta oktoobris võitis Samira
        Kölnis 1200 kandidaadi hulgast auhinna Blooom Award oma lühifilmiga
        “Four Kings”.<br />

        <br />
    description_en: >-
        “Cock, Cock.. Who's There?” is an unsettling, touching and private
        documentary performance of a young woman's research into intimacy and
        violence. Through online platforms and close encounters Samira Elagoz
        takes the audience on her journey of regaining power, reinventing
        autonomous expression of sexuality and attempts to relating to men.<br
        />

        <br />

        “I consider myself a behavioural researcher, utilising my physique and
        status to get information others might not. I become a test rat in my
        own laboratory. The process of discovery and creation informs not only
        how I view the world, but how I know myself.”<br />

        <br />

        <strong>Samira Elagoz</strong> is a Finnish/Egyptian artist currently
        based in Amsterdam. She graduates as a choreography BA from the
        Amsterdam University of the Arts in July 2016. The last three years she
        has meticulously explored the possibilities of intimate encounters with
        strangers through screens, lenses and cyberspace. The Internet is her
        tool, functioning as a playground, a stage, and an inspiration. She
        creates work mainly on video, and usually presents them either in an
        installation or as a lecture performance. Educated in performative arts,
        she incorporates aspects of this medium with that of video and film,
        creating her own unique brand of “docu-fiction”. For her work she has
        travelled meeting strangers in Amsterdam, Berlin, Tokyo, New York,
        Miami, Havana, Helsinki. The project has received support from The
        Finnish Cultural Foundation and Blooom Award, Cologne. In October 2014
        Samira won the Blooom Award in Cologne out of 1200 applicants, with her
        first short film “Four Kings”.<br />

        <br />
