    description_et: >-
        Matthias Rippmann on alates 2010. aastast Block Research Group (BRG)
        liige, kus ta 2016 kaitses oma doktorikraadi. Hetkel juhib ta BRG
        digitaalse tootmise uurimisgruppi NCCR, jätkates oma teadustööd
        post-doktorantuuris. Tema uuringud põhinevad konstruktsioonist lähtuval
        disainil ja automatiseeritud tootmisvõimalustel. Rippmann on
        modelleerimistarkvara RhinoVAULT arendaja,  mis tegeleb TNA-põhiste
        koorikute genereerimisega. Ta omandas arhitekti hariduse Stuttgarti ka
        Melbourne’i ülikoolides. Matthias on töötanud Behnisch Architekten
        büroos Stuttgartis, LAVA arhitektuuribüroos, Lightweight Structures and
        Conceptual Design intsituudis ning Werner Sobck inseneribüroos. Aastal
        2010 kaas-asutas ta arhitektuuri ja konsultatsiooni firma Rippmann
        Oesterle Knauss GmbH.  

        [www.block.arch.ethz.ch/](http://www.block.arch.ethz.ch/)  


        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile. Loengud on inglise keeles ning tasuta.
    description_en: >-
        Matthias Rippmann has been a member of the Block Research Group since
        2010, where he obtained his doctorate in 2016. Currently, he is a
        postdoctoral researcher, leading the BRG’s digital fabrication research
        in the National Centre of Competence in Research (NCCR) Digital
        Fabrication. He conducts research in the field of structurally informed
        design and digital fabrication. He is the developer of the form-finding
        software RhinoVAULT, which offers TNA-based exploration of funicular
        shells. He studied architecture at the University of Stuttgart and the
        University of Melbourne. He worked in Stuttgart at Behnisch Architekten,
        LAVA, the Institute for Lightweight Structures and Conceptual Design and
        Werner Sobek Engineers. In 2010, he co-founded the architecture and
        consultancy firm Rippmann Oesterle Knauss GmbH (ROK).  

        [www.block.arch.ethz.ch/](http://www.block.arch.ethz.ch/)  


        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment. The lectures are
        held in English, free of charge.
