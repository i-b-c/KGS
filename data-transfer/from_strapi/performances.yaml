    description_et: >-
        Uurisime, kui lähedaseks võiksid saada kaks võõrast naist.  

        Me usaldasime, olime võrdsed, õppisime üksteist tundma, viibisime
        keerulistes situatsioonides, kehastasime kedagi, kes me ei ole, olime
        meie ise, rääkisime, puudutasime, tegime head, panime hullu, laulsime,
        improviseerisime, lõime, jõime, paljastasime end, paljastasime teisi,
        poseerisime, eksisime, olime teadmatuses.  

        Aga üks väärtus korraga.  

        Otsustasime usaldada.  
          
        Elina Masing on etenduskunstnik oma loomingulise tee alguses ning otsib
        võimalusi kuidas selle vormi kaudu enda ja maailma kohta rohkem teada
        saada. Ta tahtis enda ellu mingit pikaajalist protsessi, kus omab jumala
        rolli. Teda hakkas huvitama kuhu jõuaks kahe võõra neiu "lavastatud"
        suhe. Muidugi jõudis ta selleläbi tuhande uue küsimuseni, näiteks kuidas
        saadud kogemust kasutada.
    description_en: >-
        We researched how close two unfamiliar women could become.  

        We trusted, were equal, got to know each other, overcame difficult
        situations, embodied someone we were not, were ourselves, talked,
        touched, were good to one another, went crazy, sang, improvised,
        created, drank, exposed ourselves, exposed others, posed, made mistakes,
        were in the unknown.  

        But one value at the time.   

        We decided to trust.  
          
        Elina Masing is a starting performance artist and she is looking for
        ways to get to know herself and the world through this art form. She
        wanted to experiance a longlasting process, where she would have a role
        of God. She became interested in where would a "directed" relationship
        between two unfamiliar women grow. Of course that in itself created a
        thousand more questions, for example how to use what we found.
