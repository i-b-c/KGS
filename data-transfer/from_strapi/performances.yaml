    description_et: >-
        Lõppemas on meie kuuajane residentuur Püha Vaimu Saalis ja võtame selle
        protsessi kokku avaliku showinguga.  


        Milline on ‘väikese jutu’ kehaline kogemus/väljendus? Kuidas small talk
        liigub ja mis agendad/impulsid seda juhivad? Mis jääb alles, kui sõnad
        ära võtta? Ehk polegi vaikus nii hull? Või on see veel hullem?  


        Südame tuksed sagenevad. 

        Keha temperatuur tõuseb.  

        Palgele ilmub puna ja higi.  

        Mõtted jooksevad püüdmatu kiirusega.  

        Pilk seikleb nii palju, et pea hakkab ringi käima ja tuleb seinast kinni
        hoida.  

        Kui vaid saaks selle palli juba veerema!  


        Miks on mõne jaoks vestluse algus piinarikas kogemus, teiste jaoks puhas
        nauding ja mõnus ajaviide?   



        Tegutseme mõlemad tantsu ja teatri ristumisaladel ning sellest
        tulenevalt huvitab meid sõna ja liikumise koostöö - nii konfliktis kui
        harmoonias. Nagu Douglas Dunn on juba enne meid (1973) väga osavalt
        kirjeldanud: talking is talking is dancing is dancing is talking is
        dancing is talking is talking is dancing is dancing.
    description_en: >-
        “small talk”  

        *noun*  

        polite conversation about unimportant or uncontroversial matters,
        especially as engaged in on social occasions.  


        <img src="https://saal.entu.ee/api2/file-4938" class="img-responsive">

        <br />

        There is no exact equivalent for 'small talk' in Estonian. 

        <br />

        small talk / big moves

        <br />

        What is the embodied experience/ expression of small talk? How does
        small talk move and what agendas or impulses drive it? What is left when
        words are removed?

        <br />

        We both work in the intersection of theatre and dance and therefore we
        are interested in the collaboration of words and movement - both in
        conflict and harmony. As Douglas Dunn has articulated (already in 1973):
        talking is talking is dancing is dancing is talking is dancing is
        talking is talking is dancing is dancing.

        <br />
