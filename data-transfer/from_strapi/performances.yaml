    description_et: >-
        Christina Ciupke, Nik Haffneri ja Mart Kangro uut lavastust võib
        vaadelda kui nende eelmise ühise lavastuse “wait and see” (2012) järge.
        Tookord tegelesid kolm kunstnikku füüsilise ja verbaalse suhtlemise
        intiimsete kihistustega ning uurisid kuidas üksikisiku tegevus võib viia
        ühise pingutuseni. Oma uut koostööd alustasid nad küsimusest, mil määral
        on iga üksikisik asendatav. Tasapisi nihkus nende fookus sellele,
        millest moodustub meie arusaam teisest inimesest. <br />

        <br />

        Lavastus pakub esinejatele välja mängulise dialoogi struktuuri -
        teineteisele küsimuste esitamise algorütmi. Seda seoses igaühe isiklike
        kogemuste, mälestuste, mõtete arhiiviga, mis paljastab teatud osa meie
        olemusest. Neid küsimusi ei esitata kunagi kuuldavalt. Paberile
        kirjutatult lebavad need laual, millest kujuneb tegelik lava. Selle
        arhiivi ühisel käivitamisel võimendatakse seda põgusat hetke, mil mõte
        alles vormi võtab, enne kui lugu muutub konkreetseks. See on otsimise ja
        kõhkluse hetk. Mõte, mis on alles vormumas, kaalutakse läbi veelkord.
        See on korraga nii käesolev hetk kui mälestus.<br />

        <br />

        Meenuva, kogetu, loodetu vastastikune mõju ja vastureaktsioonid
        hääletutele küsimustele tiirlevad umber selle, mis on peaaegu tabu
        arvestades tänapäeval juurdunud skeptilisust igas vormis essentialismi
        vastu kunstis ja ühiskonnas, milleks on inimese identiteet. See
        identiteet ei tähenda pelgalt pojektsiooni, vaid pigem seda, mis on meie
        päris olemus ning mis avaldub läbi selle kui me püüame teisest rohkem
        teada saada. Iga järgnev küsimus selles lihtsas mängustruktuuris avab
        uue tahu selles roteeruvas teineteist portreteerivas koreografeerimise
        protsessis.<br />

        (Daniel Belasco Rogers, Arzu Saglam)<br />

        <br />

        Koreograaf ja tantsija **Christina Ciupke** elab ja töötab Berliinis. Ta
        loob oma projekte koostöös kunstnikega nii tantsuvaldkonnast kui muudest
        distsipliinidest. Teda huvitavad selles kontekstis “projektsiooni,
        retrospektsiooni ja spekulatsiooni” konflikti ja vastastikuse mõju
        sfäär, keskendudes esinemis olukordadele laiemas tähenduses. Christina
        teeb mitmete kunstnikega koostööd pikaajaliselt, sh filmitegija Luscy
        Cash, helilooja Boris Hauf, visuaalkunstnik Lars ø Ramberg, koreograaf
        Nik Haffner, koreograaf Mart Kangro ja dramaturg Igor Dobričić. Aastatel
        2003-2004 oli ta külaliskunstnik ZKM kunsti- ja meediakeskuses
        Karlsruhes. 2013 aastal sai ta magistrikraadi koreograafias Amsterdami
        Kunstikoolist. Tema tööd nt “kannst du mich umdrehen” (2011), “wait and
        see” (2012) ja “undo, redo and repeat” (2014) tuuritavad hetkel nii
        Saksamaal kui mujal.<br />

        [www.christinaciupke.com](http://christinaciupke.com/)<br />

        <br />

        **Nik Haffner** on tantsija ja koreograafina sageli seotud projektidega,
        mida ta loob koostöös teistega. See huvi on viinud teda koostööni
        kunstnikega mitmetest eri distipliinidest ning mitesugugustest
        harivatest projektidest. 2008. aastast on ta õpetanud Berliini
        kõrgkoolidevahelises tantsukeskuses HZT ning 2012 aastal sai ta selle
        keskuse kunstiliseks juhiks. Kuni 2000. Aastani tantsis ta William
        Forsythe'i kompanii Ballett Frankfurt tantsija. Sel perioodil arendast
        ta välja media publikatsiooni “Improvisation Technologies” koostöös
        Karlsruhe kunsti  ja meedia tehnoloogia keskusega ZKM. Perioodil
        2011-2013 tegi ta koostöd Jonathan Burrowsi ja Matteo Fargioniga nende
        online skoori “Seven Duets” webi väljaande MotionBank.org raames.<br />

        <br />

        **Mart Kangro** on Tallinnas elav ja töötav tantsija ja koreograaf.
        Peale mitmeid aastaid Eesti Rahvusballetis tantsimist pühendus ta vaid
        enda kunstilisele tegevusele, milles ta enamasti ise esineb. Sellest
        ajase peale on ta olnud tihedalt seotud Kanuti Gildi SAALiga. Ta on
        mitmeid kordi teinud koostööd Thomas Lehmeni, Christina Ciupke ning
        helilooja ja heliartisti Taavi Kerikmäega, kellega koos ta on lähemalt
        uurinud kaasaegse muusika esitaja rolli. Tema tööd “Talk to Me” esitleti
        2012. aastal festivalil Foreign Affaires. Viimasel ajal on ta loonud
        lavastusi kurikuulsas teatris NO99 Tallinnas. <br />

        <br />

        <a href="http://www.saksakevad.ee">www.saksakevad.ee</a>
    description_en: >-
        Christina Ciupke, Nik Haffner and Mart Kangro's latest piece can be seen
        as a continuation of their last piece together in 2012, "wait and see".
        Back then the three performers explored the intimate layer(ing)s of
        physical and verbal communication and examined how individual actions
        influence and emerge out of the collective. The current collaboration
        began with the question, 'to what extent is every individual
        replaceable?' This starting point shifted during the research process to
        'how is it possible to grasp what makes a person?'.<br />

        <br />

        The performance devises a playful dialogue structure of algorithmically
        alternating questions between the performers. In reference to a personal
        archive - of experience, memory, thought - something of what and who we
        are is revealed. These questions are never uttered audibly in the space.
        Written on paper, they lie silently on the table which constitutes the
        actual stage. In a mutual activation of this archive a space is given
        for a brief moment before a thought unfolds itself, before a story
        becomes concrete. It is a moment of searching and of doubt. A thought in
        development and a memory standing by are reconsidered a second time.
        They are always both things - a present and a memory.

        <br />

        The interplay of the remembered, experienced, hoped and the responses to
        the silent questions, circles around something that is almost a „no-go“
        regarding today’s ingrained scepticism in art and society towards all
        forms of essentialism: which is human identity. This identity is not
        intended as pure projection, but certainly as something that "makes us"
        and also emerges out of the act of "telling- something-about-you“
        intending to find out about the other. The simple serial game structure
        makes each question a further facet in which Christina Ciupke, Nik
        Haffner and Mart Kangro take turns to choreograph each others portraits
        as self- and othered images.<br />

        (translation: Daniel Belasco Rogers, Arzu Saglam)<br />

        <br />

        **Christina Ciupke** is a performer and choreographer based in Berlin.
        In her artistic practice she develops projects in collaboration with
        artists from dance and other disciplines. Within this frame she
        investigates the correlation and area of conflict between the notions of
        ”projection, retrospection and speculation” focusing on performative
        moments in a broader context. Ongoing collaborations maintain with
        film-maker Lucy Cash, composer Boris Hauf, visual artist Lars Ø Ramberg,
        choreographer Nik Haffner and Mart Kangro and dramturge Igor Dobričić.
        From 2003 to 2004 Christina Ciupke is guest artist at the Center for Art
        and Media (ZKM) in Karlsruhe. In 2013 she receives her M.A. in
        Choreography from the Amsterdam School of the Arts. Her works e.g.
        “kannst du mich umdrehen” (2011), “wait and see” (2012) and “undo, redo
        and repeat” (2014) tour national and international. <br />

        [www.christinaciupke.com](http://christinaciupke.com/)<br />

        <br />

        As dancer and choreographer **Nik Haffner** is involved in projects that
        he often develops together with others. This interest has led to
        collaborations with artists from many disciplines and educational
        projects. Since 2008 he has been teaching at Interuniversity Centre for
        Dance Berlin (HZT). In 2012 he has been appointed Artistic Director of
        the HZT Berlin. Until 2000 he was dancing in William Forsythe company
        Ballet Frankfurt. During this time he co-developed the media-publication
        "Improvisation Technologies" in cooperation with ZKM, Centre for Art and
        Media Technology in Karlsruhe. In 2011-13 he worked together with
        Jonathan Burrows and Matteo Fargion on their online score „Seven Duets“
        as part of the web-publication MotionBank.org.<br />

        <br />

        The choreographer **Mart Kangro** lives and works in Tallinn. After
        dancing for several years at the Estonian National Opera, he dedicated
        himself solely to his own artistic work, in which he often performs
        himself. Since that time he is closely associated with Kanuti Gildi
        Saal. Mart Kangro has several times collaborated with Thomas Lehmen,
        Christina Ciupke and with the composer and soundartist Taavi Kerikmäe,
        with whom he investigated the role of the performer in contemporary live
        music. In 2012 his performance „Talk to Me“ was presented in the frame
        of the Festival Foreign Affairs. In the most recent years he created two
        performances for the infamous NO99 in Tallinn.<br />

        <br />

        <a href="http://www.saksakevad.ee">www.saksakevad.ee</a>
