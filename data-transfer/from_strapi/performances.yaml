    description_et: "Mis kord välja liigutatud, seda tagasi võtta ei saa!  \n\nRuum on Kanuti Gildi SAALi “Valge Box”, valgus “Whitewash” ja kostüümid “Casual Grey”. Žanrimääratlus on kõige üldisemalt etenduskunst, seejärel tantsulavastus, siis tsirkuse lavastus ja alles siis kujutav kunst.  \nLaval on 5 artisti, kelle tantsu- ja tsirkusetehniline tase on valitud tehnika raames perfektne – on kaanonit, sünkrooni, jadasid, pause ja palju muud. Tegeletakse ühtsuse ja lihtsusega, tervik moodustub unisoonis, kus viis erinevat keha teevad sama asja, kuid erinevas tämbris või helistikus.\_  \n\nArtistid on osad tervikust. Seal on mitu kätt, mõned jalad, küünarnukk. Liigutus või liikumatus muudab olemise tervikuks ja üheks samal ajal. Tervikuks, kus kõik üksikud on ühinenud, kas asendi või suhte kaudu. Kui iga üksik taas eraldada, siis ruumis jääb nende vahele tühimik, kuid ajalises kontekstis püsib nende vaheline asend ehk nad on siiski kõik korraga tajutavad.  \n\nAsetades lavastuse lineaarsele joonele saab väita, et see kõik on liiga lühike või liiga pikk. Lavastaja seda aga ei tee. “moiste” on tervik.  \n\nKogu meeskond on välja kasvanud OMAtsirkuse koolist või olnud sellega seotud. Kristin Made tegeleb graafilise disainiga, Kädi Metsoja koreograafia ja lavastamisega, Lars Schmidt muusika, heli ja lauluga, Kaja Kann on dramaturg, Margus Terasmees loob tehnilisi illusioone ja Alissa Šnaider, kes igapäevaselt tegeleb imago konsultatsiooniga, proovib seekord kätt kostüümikunstnikuna.  \n\nKädi Metsoja\_on lõpetanud OMAtsirkuse kooli, lavastanud tsirkuseetenduse “OMAmoodi” ning olnud koreograaf\_kohaspetsiifilisele lavastusele “Ära Ussi Ära tapa”, Kaja Kannu soolo etendusele “Be Real My Dear” ja Mart Kangro tõsielushowle “Final Countdown”. Tantsijana ja tsirkuseartistina osalenud paljudes lavastustes, millega on erinevatel festivalidel esinetud Riias, Berliinis, Kellenhusenis, Vormsis, Viimsis, Rakveres, Viljandis, New Yorgis ja San Diegos. Kädil\_ei ole illusioonide tekitamise tahet. Tsirkuse laval on tõeliselt võimalik kohtuda kehadega, sest seal ei ole neljandat seina. Kõik, mis juhtub, juhtub reaalajas. Kädi ei tegele laval tõelise looga vaid tõelise teoga."
    description_en: >-
        A move made cannot be unmade.  


        The space is Kanuti Gildi SAAL’s “white box”, the light is “white wash”
        and costumes “casual grey”. The genre is firstly performance art, then
        dance performance, then circus show and lastly visual art.  

        On stage there are five artists whose dance and circus technical level
        is perfect in the frames of technic used. There is canon, synchro,
        sequence, pause and more. They deal with unity and simplicity, a whole
        is made in unison, where five separate bodies do the same move but in
        different timbre or tonality.  


        The artists are part of a whole. There is many arms, some legs, and
        elbows. Mobility or immobility makes their presence fuse and stay
        singular simultaneously. A whole where all the singulars have merged in
        position or relations. If separated, there will be a blank space between
        them, but in terms of time, the position between them stays and they are
        all perceptible at all times.  


        Thinking of a linear line one could say, that all of this is too short
        or too long. The director doesn’t do that. “moiste” is a whole.   


        The whole team has grown out of or been involved with OMAcircus. Kristin
        Made does graphic design, Kädi Metsoja is a choreograph and director,
        Lars Schmidt makes music and sound, Kaja Kann’s a dramaturg, Margus
        Terasmees creates technical solutions and Alissa Šnaider, who everyday
        works in image consulting will try her hand in costume design.
