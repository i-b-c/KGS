    description_et: >-
        Daniel Köhler on arhitekt, urbanist, teadur ja õppejõud, kes tegutseb
        Londonis. Ta juhatab linnadisaini uurimisklastrit ning on teooria ja
        ajaloo mooduli koordinaator B-Pro nimelises arhitektuurse disaini
        magistriprogrammis Bartletti arhitektuurikoolis. Lisaks on ta liitunud
        järeldoktorantuuri programmiga Innsbrucki Ülikoolis ja Lab for
        Environmental Design Strategies kaasasutaja. Ta on õpetanud Aalto
        Ülikoolis, Vilniuse Kunstiakadeemias, SCI-Arc-is, Städelschule ja
        Ida-Londoni Ülikoolis. Köhler on arhitektuuri ja linna osa-terviku
        suhteid uuriva raamatu “The Mereological City” autor. Tema viimase aja
        uurimustöö keskendub digitaalse logistika mõjudele linnaruumis:
        kvantitatiivselt kujundatud linnad ja nende arhitektuur.  


        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile.
    description_en: >-
        Daniel Köhler is an architect, urbanist, researcher and teacher based in
        London. At the Bartlett School of Architecture Daniel leads a Research
        Cluster in Urban Design and is the Coordinator of the Theory and History
        Module of the Postgraduate B-Pro Architecture Design Program.
        Furthermore, he is a Postdoctoral Research Associate at the University
        of Innsbruck and the co-founder of the Lab for Environmental Design
        Strategies. He has taught at the Aalto University, Vilnius Art Academy,
        Sci-Arc, Städelschule and the University of East London. Daniel is the
        author of the book: "The Mereological City", a study on the modes of
        part-to-whole relations between architecture and its city during
        modernism. His recent research investigates on the physical implications
        of digital logistics: cities designed by pure quantities and their
        architecture.  


        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment.
