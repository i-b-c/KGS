    description_et: >-
        HELIjaKEEL Saariaho festivali teise kontserdi IGATSUS rõhuasetus on
        elektroonilisel muusikal, mis on olulisel kohal kontserdi mõlema autori
        – nii Kaija Saariaho kui ka Jüri Reinvere loomingus.<br />

        <br />

        **Jüri Reinvere** on eesti helilooja ja literaat, kelle looming on
        võrsunud Kesk-Euroopa kultuuriruumist. Reinvere muusika võib olla
        kirglik, kuid külmade värvidega, harmoonia konsonantne või üldse
        puududa. Mitmed tema olulistest teostest on multimediaalsed, neid
        iseloomustab dokumentalistika ja esteetilise muusika kokkupuude ning
        neid võib olla keeruline žanriliselt määratleda. Reinverele on omane
        poliitiline erksus kõrvuti äratuntavalt teoloogilise taustaga. Tähtsat
        rolli tema loomingus mängib kirjandus, eriti ingliskeelne. Paljudele oma
        muusikateostele on Reinvere teksi loonud ise. Aastal 2000 võitis
        Reinvere teos “Loodekaar” rahvusvahelise heliloojate rostrumi alla
        30-aastaste heliloojate kategoorias. Viimastel aastatel on Jüri Reinvere
        rahvusvahelist tähelepanu äratanud oma ooperitega. 2012 esietendus Soome
        Rahvusooperis Sofi Oksaneni romaanil põhinev ooper “Puhastus” ning 2014
        tuli Norra Rahvusooperis lavale “Peer Gynt”.  Jüri Reinveret ja Kaija
        Saariahot ühendab muuhulgas ka 1998. aastal Klassikaraadios salvestatud
        “Nyyd-muusika” saade Kaija Saariahost, kus saatejuhiks oli Jüri
        Reinvere. <br />

        [www.reinvere.de](http://www.reinvere.de/)<br />

        <br />

        Flötist **Camilla Hoitenga** (USA) on kodus paljudel lavadel üle
        maailma. Tema repertuaar hõlmab teoseid Bachi-eelsest kuni
        Stockhauseni-järgse ajani, instrumentaalkontsertidest kuni sooloteoste
        ning live-videot ja -elektroonikat kaasavate multimeediaprojektideni.
        Tema salvestised (eelkõige Saariaho teostega) on võitnud nimekaid
        auhindu Prantsusmaal, Inglismaal ja Põhja-Ameerikas. Talle on kirjutanud
        instrumentaalkontserte Kaija Saariaho, Péter Köszeghy, Ken-Ichiro
        Kobayashi ja Raminta Serksnyte ning ta on teinud koostööd paljude tuntud
        dirigentidega, sh Marin Alsop, Jukka-Pekka Saraste, Susanna Mälkki, Alan
        Gilbert ja Vladimir Jurowski. Erilist huvi tunneb ta jaapani kultuuri
        vastu ning olles seal sage külaline, on ta esmaesitanud  kümneid jaapani
        heliloojate talle pühendatud teoseid.<br />

        [www.hoitenga.com](http://www.hoitenga.com/)<br />

        <br />
    description_en: >-
        The second concert of the HELIjaKEEL Saariaho festival – LONGING will
        feature electronic music, which plays a major role in music of both
        composers represented on the program – Kaija Saariaho and Jüri
        Reinvere.<br />
         <br />
        **Jüri Reinvere** is an Estonian composer and author, whose works are
        rooted in the Central-European cultural space. At times, his music can
        be passionate, always retaining a northern coolness. His musical
        language ranges from consonant harmonies to an utter lack of harmony
        altogether. Multimedia works make up the core of his oeuvre, which
        includes documentary and aesthetic music, but his works are otherwise
        difficult to characterize by genre. Literary themes play an important
        role in his work, which is particularly influenced by English
        literature. Reinvere is also known for his political aptness, which is
        balanced out with his theological background. In 2000, his work
        “Northwest Bow“ won the International Rostrum of Composers in the
        category of composers under 30. Reinvere has recently garnered attention
        for his operas. In 2012, the Finnish National Opera premiered “Purge“,
        based on the novel by Sofi Oksanen, and “Peer Gynt“ was premiered by the
        Norwegian National Opera in 2014.<br />

        [www.reinvere.de](http://www.reinvere.de/)<br />

        <br />

        Flutist **Camilla Hoitenga** (USA) is at home on stages all over the
        world. Her repertoire ranges from pre-Bach to post-Stockhausen, from
        concertos to music for flute alone from state-of-the art pieces for live
        video and electronics and interdisciplinary projects. Her recordings, in
        particular those with Kaija Saariaho, have won awards in France, Great
        Britain and in North America. She has performed concertos written for
        her by composers such as Kaija Saariaho, Péter Köszeghy, Ken-Ichiro
        Kobayashi and Raminta Serksnyte and worked with conductors like Marin
        Alsop, Jukka-Pekka Saraste, Susanna Mälkki, Alan Gilbert and Vladimir
        Jurowski in concert halls and important festivals all over the world. A
        frequent guest in Japan, and with a great interest in Japanese culture,
        she has also premiered dozens of pieces written for her by Japanese
        composers.<br /> [www.hoitenga.com](http://www.hoitenga.com/)<br />

        <br />
