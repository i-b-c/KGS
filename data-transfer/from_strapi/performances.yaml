    description_et: >-
        <!-- Toimetatud 23.02.16 -->

        Renate Keerdi uuslavastus KOON on metafüüsiline ja mitteasjalik kudum
        üsnagi etteaimatavast, kuid jätkuvalt intrigeerivast inimeseloomast.
        Paradoksist, mis taasloob end igapäevaselt uuesti ja millest ammutada
        lõputult, armastusega. Trips-traps-trull.<br />

        <br />

        KOON on vabakutselise lavastaja ja koreograafi Renate Keerdi kolmas
        lavastus Tartu Uues Teatris. Seekordses lavastuses ei tee kaasa tema
        füüsilise teatri trupi Kompanii Nii liikmed, vaid Uue Teatri
        draamanäitlejad.</p>

        <p>

        **Renate Keerdi** lavastusi on esitatud paljudel teatri- ja
        tantsufestivalidel Euroopas, Skandinaavias ja Aasias. Renate on pälvinud
        kahel korral Eesti sõltumatu tantsuauhinna Philip Morris Eesti kui Aasta
        Läbilööja ja Aasta Tegija. Tema lavastus PURE MIND pälvis
        rahvusvahelisel teatrifestivalil Minskis festivali Grand Prix. 2012.
        aastal asutas ta oma füüsilise teatri trupi Kompanii Nii. Renate pälvis
        oma 2015. aasta loomingu eest Tartu Kultuurikandja laureaadi tiitli.</p>

        <p>

        <br />

        [www.uusteater.ee](http://www.uusteater.ee/)
    description_en: >-
        Renate Keerd’s latest production KOON is woven out of the metaphysical
        and the imma- terial, depicting the human animal – rather typical yet
        always intriguing. A paradox that recreates itself on a daily basis from
        which to draw endless inspiration, with love.

        KOON is the third performance in Tartu New Theatre by freelance director
        and choreo- grapher Renate Keerd. This is the first time the performers
        are New Theatre drama actors, not members of Renate’s physical theatre
        group Kompanii Nii.<br />

        <br />

        **Renate Keerd’s** productions have been performed in numerous theatre
        and dance festi- vals in Europe, Scandinavia and Asia. She has received
        the Philip Morris Estonia dance award twice – as the emerging
        choreographer in 2002 and for the best production in 2007. In 2012 she
        founded her own physical theatre company – Kompanii Nii. In 2015 her
        performance PURE MIND won the Grand Prix in international theatre
        festival held in Minsk and she got rewarded with Tartu culture prize
        Kultuurikandja for her latest creation.<br />

        <br />

        <br />

        [www.uusteater.ee](http://www.uusteater.ee/)
