    description_et: >-
        Tomorrow's Thoughts Today on Londonis baseeruv think tank, uurides
        nähtuste - fantastiline, spekulatiivne ja kujuteldav - tagajärgi. Liam
        Young on arhitekt, kes tegutseb disaini, väljamõeldise ja tuleviku
        piirimail. Ta on nõustanud ja organiseerinud spekulatiivseid,
        nüüdistehnoloogial põhinevaid ja tulevikku ennustavaid töötube Arupis,
        Phillips Technologie’s, BBCs, laiemalt filmi maastikul ja erinevates
        kunsti- ja teadusorganisatsioonides. Tema märkimisväärne teos “Under
        Tomorrows Sky” on ulmefilm, mis toimub väljamõeldud tulevikus, arendatud
        koostöös teadlaste ja tehnoloogidega ning ‘Electronic Countermeasures’
        grupiga. <br />

        [www.tomorrowsthoughtstoday.com](http//:tomorrowsthoughtstoday.com/)<br
        />

        <br />

        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile.<br />

        <br />

        Loengusarja toetab Eesti Kultuurkapital ja korraldab Eesti
        Kunstiakadeemia arhitektuuriteaduskond
    description_en: >-
        Tomorrow's Thoughts Today is a London-based think tank exploring the
        consequences of fantastic, speculative and imaginary urbanisms. Liam
        Young is an architect who operates in the spaces between design, fiction
        and futures. With TTT he has consulted and conducted workshops on
        speculation, emerging technologies and future forecasting for firms
        including Arup Drivers for Change, Phillips Technologies, BBC, the film
        industry and various arts and science organisations. His projects
        include ‘Under Tomorrows Sky’ a science fiction movie set for a
        fictional future city developed through collaborations with scientists
        and technologists and ‘Electronic Countermeasures’, a swarm of
        quadcopter drones that drift through the city broadcasting a pirate
        internet and file sharing hub.

        [www.tomorrowsthoughtstoday.com](http//:tomorrowsthoughtstoday.com/)<br
        />

        <br />

        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment. <br />

        <br />

        The lecture series is supported by Estonian Cultural Endowment and
        organised by the Architecture department of Estonian Art Academy.<br />
