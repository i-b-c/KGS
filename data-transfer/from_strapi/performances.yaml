    description_et: >-
        Boštjan Vuga lõpetas 1992 aastal Ljubljanas arhitektuuriõpingud ning
        täiendas end AA ülikoolis postgraduate programmis 1993-1995. Koos Jurij
        Sadariga asutas ta 1996. aastal praksise SADAR+VUGA (S+V), mis on
        tegutsenud üle kahe kümnendi kriitilise Euroopa arhitektuuribüroona,
        pakkudes välja lahendusi avatud ja uuenduslikele tootmis-ja
        loomisprotsessidele hoonetes. Büroo tuntuimate projektide hulka kuuluvad
        Sloveenia kaubandus- ja tööstuskoja hoone (1996), Rahvusgalerii
        Ljubljanas (1996), Stožice staadion ja vabaajakeskus (2010) ning
        Ljubljana õhuliikluse kontrollkeskus (2013). Sadar ja Vuga on pälvinud
        mitmeid rahvusvahelisi ja globaalse tähtsusega arhitektuuriauhindu
        (Bauwelt Prize, Iconic Award, Archmaraton Award, Piranesi award, Plečnik
        Prize) ning neid on kaheksal korral nomineeritud Mies van der Rohe
        auhinnale. Lisaks on Boštjan õppejõud ja kriitik tunnustatud
        arhitetuuriülikoolides ning ta kaaskureeris Montenegro Paviljoni
        "Treasures in Disguise" Veneetsia arhitektuuribeinnaalil 2014 aastal.


        [www.sadarvuga.com/](http://www.sadarvuga.com/)


        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile.
    description_en: >-
        Boštjan Vuga graduated at the Faculty of Architecture in Ljubljana in
        1992 and completed the postgraduate masters course at the AA School of
        Architecture in London from 1993-1995. Together with Jurij Sadar, they
        founded the SADAR+VUGA (S+V) office in Ljubljana in 1996, which in two
        decades took place as one of the critical European architectural
        practices with production and communication based on an open, integral
        and innovative concept. Their most acclaimed works include chamber of
        Commerce and Industry of Slovenia (1996), Central part of the National
        Gallery, Ljubljana (1996) Stadium and Multipurpose hall Stožice (2010)
        and Air Traffic Control Centre Ljubljana (2013). The office has received
        many national and global architectural awards (Bauwelt Prize, Iconic
        Award, Archmaraton Award, Piranesi award, Plečnik Prize) and eight Mies
        van der Rohe Award nominations. Additionally they teach and critic
        internationally acknowledged universities and Vuga was a co-curator at
        the Montenegro Pavilion, "Treasures in Disguise" at the 14th Venice
        Biennale of Architecture "Fundamentals", Venice 2014.



        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment. 


        [www.sadarvuga.com/](http://www.sadarvuga.com/)
