    description_et: >-
        13.Balti triennaal "Unusta tont" Tallinna näitus lõpeb performance'i
        kunsti õhtuga Kanuti Gildi SAALis, kus esinevad Merike Estna, Last Yearz
        Interesting Negro/Jamila Johnson-Small ja Elīna Lutce. 

        1979.aastal asutatud Balti triennaali ajaloos on tänavu esimene kord,
        kui triennaali korraldavad kolm Balti riiki üheskoos. Triennaal toimub
        Leedus (11. mai - 12. august), Eestis (29. juuni - 2. september) ja
        Lätis (21. september - 18. november). Kolm näitust on erinevad,
        koondudes sama pealkirja alla, nagu ühe raamatu eri peatükid. 13. Balti
        triennaal toob Tallinna Kunstihoonesse tunnustatud rahvusvahelisi ja
        kohalikke kunstnikke, kes mõtestavad kuuluvuse mõistet, lähtudes nii
        üksikisiku rollist 21. sajandil kui ka Balti riikide eripärasest
        asukohast Euroopa kaardil ja ajaloos.  
         

        AJAKAVA:  

        19:00 Merike Estna, ‘an egg, a larva, a nymph 

        performative presence, sculptures as candles, painting as a vessel'

        (esitaja Andrius Mulokas)   

        19:30 Elīna Lutce, "Alarming"   

        19:50 Vaheaeg  

        20:20 Last Yearz Interesting Negro/Jamila Johnson-Small, "i ride in
        colour and soft focus, no longer anywhere"
    description_en: >-
        Join us for the closing of the second chapter of Baltic Triennial 13 -
        GIVE UP THE GHOST, where the exhibition at Tallinn Art Hall finishes
        with an evening of performances by Merike Estna, Last Yearz Interesting
        Negro/Jamila Johnson-Small and Elīna Lutce at Kanuti Gildi Saal on
        Sunday 2 September from 7pm.

        For the first time since its foundation in 1979, Baltic Triennial 13 is
        being organised by and taking place in all three Baltic countries:
        Lithuania (May 11 – August 12), Estonia (June 29 – September 2) and
        Latvia (September 21 – November 18). The three distinct exhibitions act
        as different chapters to form the Triennial. The exhibition at Tallinn
        Art Hall centres on sensuality and intimacy as parameters to take into
        account when reflecting on belonging, focusing on the body. This chapter
        of the Triennial addresses the moving body, the fragmented body, the
        organic body, the political body and the desiring body. 


        SCHEDULE:  

        7pm Merike Estna, ‘an egg, a larva, a nymph 

        performative presence, sculptures as candles, painting as a vessel'

        (performer Andrius Mulokas)   

        7.30pm Elīna Lutce, ‘Alarming’   

        7.50pm Interlude  

        8.20pm Last Yearz Interesting Negro/Jamila Johnson-Small, ‘i ride in
        colour and soft focus, no longer anywhere’
