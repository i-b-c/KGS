    description_et: >-
        Argisus on meid peaaegu unustanud. Meie ümber on vaid see, mis on me
        vahel. On armastus, on kemplemine, on tundide viisi vaidlusi ja päevade
        kaupa nõustumisi, on kuhjade viisi naeru ja laeka täis nuttu. Oleme
        teineteise ees pidulikult kaunistatud ning jälle ausalt alasti, tantsime
        küll hommikukohvi auruna, küll tolmuebemeina valgusvihus. Voogame
        tugitooli küljelt alla sinna visatud hommikumantli rikkalikku joana,
        podiseme kui supp, praksume kui kaminaleek.

        Need valguvad maastikud kõrguvad kokku olmeulmaliseks rännakuks, mille
        lõpus ootab uus igapäev.  


        2016.aasta kevadsuvel etendus Tallinna Kassisaba korteris kunsti ja
        argireaalsuse vahekorda uuriv tantsulavastus “Olmeulmad”, kus nelja
        inimese igapäevastest kodustest hetkedest said publiku ees ja sees
        fantaasiaküllased uus-ilmad.

        Autorite nelik on sestpeale elu fantastilist tiksumist edasi tunnetanud
        ning loob seekord Koplis, endise Põhjala tehase territooriumil.
    description_en: >-
        The everyday has just about forgotten us. All that surrounds us is what
        is between us. There is love and swagger, there are hours of arguments
        and days of agreements, there's piles of laughter and a chesful of
        tears. We are festively decorated and once again sincerely naked. We
        dance as the steam of morning coffee, as specs of dust in a ray of
        light. We cascade from the armchair as the lavish dressing gown laid
        aotp it. We simmer as soup, crackle as an open fire.

        These fluid landscapes tower together into a fantastical humdrum journey
        at the end of which a new everyday lies awaiting.
