    description_et: >-
        <!-- Toimetatud 17.10.16 -->NU Performance Festival 2016 viies päev
        möödub filmiekraniseeringu ja performatiivse installatsiooni avamise
        raames.<br />

        <br />

        “Peaches Does Herself” (2012) on film Peachese samanimelisest
        elekto-rock ooperist (esietendus 2010), mis on pool- autobiograafiline
        rännak tema kui muusiku ja isiksuse kujunemisest. Filmi on näidatud
        rohkem kui 60 rahvusvahelisel festivalil ja esimest korda on seda
        võimalik näha Eestis.<br />

        <br />

        Õhtu jätkub Islandi päritolu kunstniku Kolbeinn Hugi performatiivse
        installatsiooni avamisega. Kolbeinn Hugi on muusik, visuaal- ja
        performance-kunstnik, kes loob müstilisi keskkondi, kaasates oma
        teostesse luuletajaid, muusikuid, tantsijaid ning kohati ka publikut.
        “The Future Must Be Destroyed Yesterday” on performatiivne maastik, kus
        tuleb esitamisele legende, muusikat, luulet ning kummastavat visuaalset
        materjali.&nbsp;<br />

        <br />

        Foto: Elísabet Davíðsdóttir
    description_en: >-
        <!-- Toimetatud 17.10.16 -->Peaches’ film "Peaches Does Herself" /
        Kolbeinn Hugi’s "The Future Must Be Destroyed Yesterday"<br />

        <br />

        Day 5 of NU Performance Festival 2016 will include a film screening and
        the opening of a performative installation.<br />

        <br />

        Peaches Does Herself (2012) is a film about Peaches’ electro-rock opera
        of the same title (premiered in 2010), a semi-autobiographical journey
        about her evolution as a musician and a personality. The film has been
        shown at more than 60 international festivals and will now be shown in
        Estonia for the first time.<br />

        <br />

        The evening will continue with the opening of a performative
        installation by Icelandic artist, Kolbeinn Hugi. Kolbeinn Hugi is a
        musician, visual and performance artist who creates mystical
        environments, involving poets, musicians, dancers and also, at times,
        the audience. "The Future Must Be Destroyed Yesterday" is a performative
        landscape that combines music, poetry, legends and stunning visual
        material.&nbsp;<br />

        <br />

        Photograph by: <strong>Elísabet Davíðsdóttir</strong>
