    description_et: >-
        Vanalinna Avatud Akadeemia ettekandepäeval toovad neli nimekat
        ajaloolast meieni inspireerivad teemad Tallinna algusaegadest.  
          
        KAVA  

        Ajaloolase ja arheoloogi Toomas Tamla ettekanne „Mütoloogiline Tallinn“
        lahkab Tallinna ajaloo uusaegseid müüte.  

        Arheoloog Ain Mäesalu keskendub oma ettekandes „Eestlaste ja
        ristisõdijate relvastusest 13. sajandi algul“ tolleaegsele relvastusele.
        Millega hakkasid muinaseestlased oma vallutajatele vastu ja kui moodsat
        relvastust kasutati, selgub ettekandes.  

        Ajaloolane ja numismaatik Ivar Leimus vaatleb linna alguse rahandust oma
        ettekandes

        „Millal ja kes lõi Tallinna esimesed rahad?”. Tallinna esimesed mündid
        lasi vermida Taani kuningas Valdemar II varsti pärast võidukat Lindanise
        lahingut vastrajatud kantsis Toompeal 1220. aasta paiku. Kuid see
        rahalöömine oli ühekordne ja lühiajaaline. Uuesti hakati Tallinnas münte
        vermima 13. sajandi keskel.  

        Arheoloog Erki Russow tõstatab oma ettekandes “Hansalinna lätteil”
        küsimuse, kes ja millal võis asutada Tallinna linna ning kuidas paari
        põlvkonna jooksul kujunes Soome lahe lõunakaldale linnamüüriga piiratud
        võimas kaubalinn.  
          
        Üritust modereerib ajaloolane Ott Sandrak.  
          
        www.vanalinnapaevad.ee
    description_en: >-
        Old Town Open Academy presents historians Erki Russow, Ain Mäesalu, Ivar
        Leimus and Toomas Tamla who will intriguing storys from the very
        beginning of Tallinn.
