    description_et: >-
        Tantsulavastus, mille on loonud neli Pärnu koreograafi ühendav kooslus
        4kuudis. „Sisesosinad“ jutustab lugusid meie tänasest päevast,
        hetkedest, mida ilmselt on kogenud paljud. See on lugu situatsioonidest,
        mis suunavad meid tarbima ja soetama midagi, mida me tegelikult ei vaja;
        tehislikest olukordadest, mis muudavad meie mõtlemisvõimet; väljastpoolt
        tulevatest „sosinatest“, mis kontrollivad meie elu ilma, et seda
        tahaksime.



        "Sinule saabuvad sosinad on välja valitud. Sina oled paigutatud teatud
        gruppi. On selgeks tehtud sinu huvid, sinu orientatsioonid. Ja sulle
        söödetakse (me teame, me elame ju praegu nendes sosinates) ainult seda
        informatsiooni, mis paistabki olevat ainuvõimalik informatsioon ja
        luuakse sosin et seda teist sosinat üldsegi pole olemas. Inimene tahab
        ju alati samastuda, ühineda või vastanduda millelegi ja siis ta
        vastavalt ka käitub.  

        Selle vastu aitab ainult haridus , kultuur ja mõistus ega siin teist
        teed ei ole."  

        *(Lavastust tutvustava teksti inspiratsioon pärineb KUKU raadio
        7.01.2018 Välismääraja saatest.)*<br />  

        <br />  

        Annika Viibus lõpetas 2009 aastal Tartu Ülikooli Viljandi
        Kultuuriakadeemia tantsukunsti eriala tantsuõpetaja kutse ja koreograafi
        lisakutsega. Peale ülikooli lõpetamist on ta igal aastal välja toonud
        1-2 lavastust (pooled koostööprojektidena). Kõige eredamalt on tal endal
        meeles lavastused "Aatomiku juhtumused" (2012), "Idüll" (2013), "OmaOma"
        (2013) ja "Vabadus vabanduseks" (2015). Elab Pärnus, töötab Pärnumaal ja
        Läänemaal.   


        Karoline Suhhov lõpetas 2015. aastal Tartu Ülikooli Viljandi
        Kultuuriakadeemia tantsukunsti eriala koreograafi ja tantsuõpetajana.
        Teda on loomingulisel teel mõjutanud ka põgus õppeaeg Concordia
        Ülikoolis. Karoline on tantsijana osalenud paljudes Pärnus välja toodud
        tantsulavastustes ning koreograafina on tema viimane töö “Suitsune
        Transs Tinapaberis”. Pärit Pärnust, elab ja töötab üle Eesti.


        Kardo Ojassalu lõpetas 2010 aastal Tartu Ülikooli Viljandi
        Kultuuriakadeemia tantsukunsti eriala tantsuõpetaja kutse ja koreograafi
        lisakutsega. Lisaks omandas ta 2017 aastaks sepatöö eriala. Kardo on
        olnud koreograafiks näiteks järgmistele lavastustele: „Jane Eyre“
        (Rakvere teater,2012), „Kangelapsed“ (Endla teater, 2015), „Et sa
        kaotaksid kõik“ (Endla teater,2016), „Säärane mulk“ (Endla teater,
        2017). Elab Pärnus, Töötab (peamiselt) Pärnus. 


        Evelyn Piirak on lõpetanud tantsukunsti eriala TÜ VKA-s ja lisaks
        omandanud kosmeetiku eriala. Peale ülikooli on koreograafina välja
        toonud kaks tantsulavastust "Siselend Wiesbadeni"(2016) ja "Viipekeel
        kui tants"(2015) ,viimases tantsijateks kurdid ja vaegkuuljad. Lisaks on
        teinud koreograafia Ugala teatri lavastusele “Moraal”(2016) ja tema
        loodud tants “Päikesetervitus” oli XII noorte tantsupeo kavas (2017).
        Elab Pärnus, töötab Pärnumaal.   


        Argo Valsi oluliseim tõuge haridusteel on tema jaoks 2006. aastal
        õpingute alustamine Tartu Ülikooli Viljandi Kultuuriakadeemias, kus
        avanes talle täiesti uus lahedate ja ootamatute keerutustega keskkond.
        Kontakti ja huvi tantsulavastustega tegelemiseks saigi alguse TÜ VKA-s,
        siis tekkiski tal soov oma helikeele sidumiseks teiste kunstivormidega.
        Tantsijatel oli mingi põnev ja teistmoodi hingamine, mistõttu osaleb
        Argo igal aastal keskmiselt kahe tantsulavastuse protsessis. Elab
        Tallinnas, töötab üle Eesti.  


        Rommi Ruttase kõige olulisem lüke haridusteel on arvatavasti see, kui
        2011. aastal ei saanud ta TÜ VKA katsetel sisse...näitleja erialale.
        Rommi sõnul on nii, et õppides Viljandis valguskujundust, ongi su elu
        üks kokkupuude tantsulavastustega. Elab Viljandis , töötab üle Eesti.


        Karin Sülluste lõpetas 1994 Tallinna Vanalinna õmbluskooli, kus ta
        omandas naiste ülerõivaste rätsepa eriala. Alates 2016 aasta kevadest on
        seotud oma rõivabrändi ILM by Karin loomisega.
    description_en: >-
        “Those whispers, which come to you, have been chosen for you. You are
        placed in a certain group. Your orientations and interests are made
        clear. You are only fed (we know it, because we live in those whispers)
        the information, that seems to be the single possible information and a
        whisper is created to cover up the ohterone. A person/human always wants
        to identify, unite or kontrast to something and then he/she acts
        accordingly. Education, culture and the mind will helpy ou. There is no
        ohter way.”  

        (Inspiration for the performance originates from radio KUKU’s broadcast
        Välismääraja 7.10.2018)<br />  

        <br />  

        Annika Viibus graduated University of Tartu Viljandi Culture Academy  in
        2009 as a dance teacher and choreographer. After graduating the
        University she has produced atleast 1-2 performances per year (half of
        them as co-productions). The most bright ones from past years are
        „"Aatomiku juhtumused" (2012), "Idüll" (2013), "OmaOma" (2013)  and
        "Vabadus vabanduseks" (2015). She lives in Pärnu,, though she works in
        Pärnumaa and Läänemaa.  
          
        Karoline Suhhov graduated University of Tartu Viljandi Culture Academy 
        in 2015 as a dance teacher and choreographer. Her works are influenced a
        fleeting time in Concordia University. She has been seen in many dance
        performances that have been produced in Pärnu and the latest work as a
        choreographer was „Suitsune Transs Tinapaberis“ (2016). She's is from
        Pärnu, but works  at different places all over Estonia.  


        Kardo Ojassalu graduated University of Tartu Viljandi Culture Academy 
        in 2010 as a dance teacher and choreographer. In 2017 he acquired
        blacksmithing speciality. He has been a choreographer to performances
        like Jane Eyre“ (Rakvere teater,2012), „Kangelapsed“ (Endla teater,
        2015), „Et sa kaotaksid kõik“ (Endla teater,2016), „Säärane mulk“ (Endla
        teater, 2017).  He lives and (mainly) works in Pärnu.  
         

        Evelyn Piirak graduated University of Tartu Viljandi Culture Academy  as
        a dance teacher and choreographer and acquired cosmetics speciality.
        After graduating the University she has produced two dance performances:
        "Siselend Wiesbadeni"(2016) and "Viipekeel kui tants"(2015). She has
        also created choreography for performances at Ugala Theatre, e.g.
        „Moraal“(2016). In 2017 a dance she created („Päikesetervitus“) was used
        in XII Youth Dance Celebration. She lives and works in Pärnu,
        Pärnumaa.  


        The most importants push in Argo Vals' education was in 2006, when he
        started to study in University of Tartu Viljandi Culture Academy. There
        he was introduced tototally new environment with unexpected twists and
        turns. There he found connections to dance performances and got
        interested in connecting his soundings to other art forms. He saw that
        dancers have somekind of interesting and different way of being,
        therefore he is in atleast two dance performance processes every year.
        He lives in Tallinn, and works  at different places all over Estonia.  


        Probably the most important push in Rommi Ruttas' educational road was
        in 2011, when he did not get accepted to University of Tartu Viljandi
        Culture Academy theatre arts as... an actor. He said that while studying
        lighting design, all your life is doing dance performances. He lives in
        Viljandi, works  at different places all over Estonia.  


        Karin Sülluste graduated Tallinn's Old Town Sewing School in 1994, with
        a diploma to women's outerwear tailor. Since spring 2016 she has her own
        clothing line ILM by Karin.
