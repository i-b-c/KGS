    description_et: >-
        Sel sügisel heidame korra pilgu müstikaga kaetud elukutse –
        mustkunstniku – argipäeva. Päris sellise nurga alt pole mustkunsti
        telgitagustest ilmselt kusagil maailmas räägitud. Välja arvatud Kubo ja
        Charlekas eelmisel 49. etendusel. Jah, tegemist on "Kaota mu naine
        ära.." 50. juubelitetendusega ning oleme ringiga tagasi seal, kust
        alustasime – Kanuti Gildi SAAL-is. See pole mustkunstietendus. See pole
        ka tavaline stand-up, vaid kuulub pigem žanri comedy magic, kus saab nii
        nõidust kui ka nalja. Igal juhul saab vastatud palju küsimusi, mis
        publikul tavaliselt tekivad. Näiteks.  

        Kuidas ta seda trikki teeb? Mis on maailma vanim trikk? Kuidas
        pekkiläinud trikist välja tulla? Kas publikust võetavad vabatahtlikud
        pole tõesti kokku lepitud? Mis värk nende loomadega üldse on? Kas tuvid
        kõike täis ei lase? Mitu jänest tal on?  

        Lavastus põhineb mustkunstnike Meelis Kubo ja Charleka ehk Karl Eelmaa
        kogemustel oma ametis, mis on tegelikult nende elustiil, sest trikke
        harjutatakse ka õhtul väljas käies ning kodus vaadatakse pereliikmetest
        loomade järele.  

        Lavale astuvad mustkunstnikud Charlekas ja Meelis Kubo, lavastavateks
        taustajõududeks on Paavo Piik, Paul Piik ja Henrik Kalmet.
    description_en: >-
        Kinoteater's research on magicians  

        Kinoteater opens the kitchen of magicians life with Meelis Kubo and
        Charlekas, mixing documentalism and magic while answering the main
        question through life - what's in that sleeve actually. Charlekas and
        Meelis Kubo are magicians - yes, it really is an occupation which you
        can run full-time. It gets clear that one magician gives more
        performances in a year than an actor and a dancer together. But addition
        to an occupation it's also a lifestyle - they practice tricks while
        going out in the evenings and at home they take care of animals who are
        like family members to them.  

        Kinoteater is a group of friends who gives performances outside of
        theatre institution. They started in 2011 with "Püstijalukomöödia" where
        Kalmet brothers, Jörgen Liik and Kaspar Velberg entertained audience
        with an Estonian stand-up. Last year in Kanuti Gildi SAAL they presented
        a political-theatrical series "Manifest" where Andres Maimik, Kristjan
        Port, Meelis Oidsalu, Tarmo Tarmo Tiisler, Kaja Kallas ja Mihkel Kunnus.
        Last season they also showed confession-like variety "Võidab see, kellel
        on kõige hullem mees" by Piret Krumm and Katariina Tamm.
