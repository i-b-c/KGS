    description_et: >-
        **Pearu Helenurm** on aastatuhande vahetusel tegevust alustanud
        fusion-ansambli Phlox klahvpillimängija ja üks muusika autoritest.
        Sporaadiliselt teeb kaasa ka vabamas vormis või sootuks vormita muusikat
        esitavates üksustes nagu Lahkhelid ja erinevad juhuslikud kooslused.
        Kevadeti toimuval Maikellukese päevade festivalil veab koos Heikki
        Tikasega absurd-orkestrit Estonian Bad Dream Big Band.
         
        **Margo Pajula** on peamiselt tuntud 1993. aastast tegutseva
        mürarokiansambli Zahir trummarina, lisaks mänginud otsatus hulgas muudes
        kooslustes nagu BF, Phlox, Lippajad, Estonian Bad Dream Big Band ja
        Halinga puhkpilliorkester.  


        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.
    description_en: >-
        **Pearu Helenurm** plays keyboards and is one of the authors of the
        songs for fusion-ensemble Phlox. Also sporadically involved with
        Lahkheli and other random groups which make music with more free form or
        no form at all. He is also a member of Estonian Bad Dream Big Band -
        absurd orchestra that performs at Maikellukese päevade festival
        (Lily-of-the-Valley Days Festival) in spring.
         
        **Margo Pajula** is known mostly as being a trummar for noise-rock
        ensemble Zahir. He has also played in groups like BF, Phlox, Lippajad,
        Estonian Bad Dream Big Band and Halinga brass band.  


        Improtest is concert series that brings improvisational music from local
        and foreign authors to local audience. The concerts have been taking
        place since 2005 once a month.
