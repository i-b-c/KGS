    description_et: >-
        29.11.2021-10.01.2021 on Kanuti Gildi SAALi aknal üleval **Maria
        Elisaveta Roosalu** videotöö "Kummaline sõnum teiselt tähelt", mis on
        osa Tallinna linna jõuluaja projektist "Muinasjutulised jõulud
        vanalinnas", mille raames on Pika tänava akendel kunstilised
        installatsioonid.

        <br>

        <br>

        **Maria Elisaveta Roosalu** töötab video- ja projektsioonikunsti
        vallas. 

        Ta on loonud videokujundusi ja teostanud tehnilisi lahendusi nii
        eksperimenteerivatele koreograafiatudengitele kui tuntud eesti
        avangardteatritele. 

        Maria on loonud videokujundusi kontserdi- ja festivalilavadele ning
        olnud VJ mitmetele artistidele Eestist ja mujaltki. Ta on
        eksperimenteerinud arhitektuuriliste, tehislike ja looduslike vormide
        ning videomappingu põimimisega. Hetkel lõpetab ta õpinguid TÜ Viljandi
        Kultuuriakadeemia etenduskunstide multimeedia spetsialisti erialal.
