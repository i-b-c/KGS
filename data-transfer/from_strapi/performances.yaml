    description_et: >-
        Kas me suudame emotsioone haista?  

        Esimene reaktsioon, mis meid valdab lõhnu tundes on eristamine
        meeldivaks ja ebameeldivaks. Kuid lõhnas on rohkem sisu kui lihtsalt hea
        või halb. Lõhnad lisavad tunnetuslikul tasandil elule värve,
        rikkalikkust ja uusi naudingulisi tasandeid. Lõhnad võivad mälusopist
        esile tuua sündmusi, mille juba ammu unustanud olime. Lõhna tajudes ning
        sellele keskendudes ja seda analüüsides aktiveerub meie ajus osa, mis
        seda sama lõhna vaid tajudes, ilma sellele keskendumata, ei aktiveeru.  

        Haistmismeel on üks primitiivsemaid meeli, kuid endiselt on selle meele
        täielik mõistmine jäänud mõistatuseks. Meelelise eksistentsi võimalikkus
        realiseerub läbi meie kehalise olemise. Paljuski on füüsilised aistingud
        alateadlikud, ürgsed ja võimsad oma poeetilises paratamatuses. Nagu ka
        parfüüme, saame füüsist lugeda assotsiatiivsel tasandil ning see kogemus
        on üdini isiklik.   

        Parfümeeritud õhtus tärkavad tantsulised seisundid: kehad liiguvad ja
        annavad edasi värve ning aeg-ruume, mida lõhnamolekulid kutsuvad esile
        läbi haistmismeele.   

        Odööride öö räägib meile läbi tantsu, muusika, tuntud lõhnanautleja
        Baudelaire’i poeesia ning muidugi läbi õhus mänglevate joovastavate
        odööride loo sellest, kuidas lõhnade silmale nähtamatu mateeria meie
        emotsioone mõjutab ning pikendab. 

        Tuleb üdini meeleline öö.
    description_en: >-
        Could we smell our emotions?  

        The first reaction that occurs in us while smelling is dividing the
        scents into pleasant and unpleasant. But there’s much more substance in
        the scent than just being good or bad. Odors amplify life with colors,
        richness and pleasures in the cognitive scale. They can produce events,
        that we have long forgotten. They activate the parts of the brain that
        unprovided with the scent won’t activate.

        Sense of smell is the most primitive senses, but still it’s full
        understanding is left a mystery.  The potential of the sensious
        existance is put into practise through our bodily being. In many ways
        the physical sensory experiences are subconscious, primal and powerful
        in their poetic inevitability. Likewise perfumes, we can read the
        physique in the associative level and this experience is personal.

        In the perfumed evening the danceful states become to life: bodies move
        and give forward the colors and time-space conditions, that molecules of
        scent call up through our sensory.  The night of the odors narrates us
        through dance, music and known scent-afficionado Baudelaire poetics and
        tells us the story how the scents’ invisible matter affects and prolongs
        our emotions.

        It’s going to be sensious night.
