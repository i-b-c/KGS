    description_et: >-
        NU Performance Festivali raames toimuv etendus „Fuchsia“ on esimene
        esietenduse-eelne proovisõit. Kolmeosaline projekt käivitus algselt
        Eestis 2015. aasta septembris, arenes edasi etenduseks Amsterdamis 2016.
        aasta aprillis ja transformeerus siis veebigalerii-näituseks. <br />

        <br />

        Projekti eesmärk on uurida, kuidas autopoeesi hädavajalikkus, mida
        tingib internet, on mõjutanud Metsalu elu ja kunstiloomet ning millised
        on enese subjektifitseerimise tingimused ja võimalused, mis esinevad
        iseenda kuvandi kujundamisel ning vahendamisel sotsiaalvõrgustike kaudu.
        Kogu uuringutriloogia käigus taotles Metsalu näitamise ja loomise
        viiside uurimist, võtteks tegelasena lähtepunktiks võlts-kunstigalerii.
        Selles raamis jätkab ta teemade arendamist, mis käsitlevad tema kogemusi
        arvutitüdrukuna, suhteid IRLi ja URLi vahel, tema virtuaalmaaniat,
        üliteadlikkust ning mõju, mida sotsiaalmeedia ja tema internetis elatav
        elu avaldavad tema persoonile, sh sellisest enese eksponeerimisest
        tekkinud tohutut üksildust.&nbsp; Vaataja pilgu peegelduses näib Metsalu
        keha taotlevat iseenda lagunemist ja uuesti kokkusobitumist, kuna
        Metsalu panustab juhusest sõltuvatele intensiivsustele, võnkudes
        naudingu, ükskõiksuse ning kannatuste vahel. <br />

        <br />

        Sellise väljundini on viinud soov haarata enda kätte oma subjektiivsuse
        ja kehakuvandi kujundamine läbi moe, kaasaegse disaini ning
        visuaalkultuuri seisukohtade, olles samal ajal huvitatud oma keha
        fabritseerimisest väreleval maastikul kui karakteri ning brändina.
        Metsalu seab kogu „Fuchsia“ projekti käigus kahtluse alla oma tööelu
        meelevaldsuse läbi enese esitluse aktide, mis on kui vaatemängu objekt
        ning mida ta samal ajal nii tervitab kui ka lükkab tagasi. Ta on
        huvitatud peaaegu kõikehõlmava struktuuri loomisest, mis suudaks tulla
        toime nii kaose kui ka selle tagasilükkamisega korrastava
        sümmeetrilisuse ja ikonograafiliste kujundite kaudu.<br />

        <br />

        **Maria Metsalu** (1990) on Eesti koreograaf ja etenduskunstnik, kes
        lõpetas 2016. aasta õpingud SNDOs (School for New Dance Development).<br
        />

        Ta loob peamiselt sooloteoseid, mis on kantud püsivast huvist iseenda
        persooni tekitamise, enese mütologiseerimise ja mina-loome vastu. Tema
        uurimisprotsessi olulisteks tahkudeks on füüsilise ja virtuaalse
        tegelikkuse kõrvutamine, nende kokkuviimine ja erinevuste mõistmine
        koostoime, sotsiaalse vahetuse ja teisenemise seisukohast. Eesmärk on
        kujutada visuaalkultuuri, identiteedi, apropriatsiooni, kaugkohalolu ja
        vuajerismi vahelisi suhteid, rakendades enesele viitavaid suhteid
        kehastavate tehnoloogiatega. 2014. aastal sai Metsalu ImpulsTanzis
        Viinis danceWEBi stipendiumi. Teiste seas on Maria Metsalu teinud
        koostööd Nils Amadeus Lange, Tino Sehgali, Vincent Riebeeki, Manuel
        Scheiwilleri, Fernando Belfiore ja Samira Elagozega.<br />

        <a href="http://instagram.com/dotasita">instagram.com/dotasita </a><br
        />

        [maria.metsalu.com](http://maria.metsalu.com/) </a><br />

        <br />

        NB! Enne Maria Metsalu lavastust "Fuchsia" on sama õhtul Samira Elagoze
        film "Craigslist Allstars".
    description_en: >-
        The performance, as shown during NUP, is the first try out of “Fuchsia”
        before its premiere and after finishing the threepart research period.
        The project was initially set off in Estonia in September 2015,
        developed further for the performance in April 2016 in Amsterdam and
        transformed into an online gallery exhibition. <br />

        <br />

        The aim of the project was to investigate how the imperative for
        autopoiesis, which is imposed by the Internet, has influenced Metsalu’s
        life and art production and what are the conditions and possibilities of
        selfsubjectification that happens while designing and mediating one's
        own image via social networks. Throughout the research trilogy Metsalu
        proposed an investigation of modes of exhibiting and producing by taking
        a faux art gallery as a character as the starting point. Within this
        setting she continues to develop topics around her experience as a cam
        girl, relations between IRL and URL, her virtual obsession,
        hyperconsciousness and the influence social media and her life online
        has had on her persona, including the immense loneliness which this self
        exposure has led to. Metsalu`s body seems to aim for its own
        disintegration and reconciliation when mirrored through the beholder's
        gaze by her investing in precarious intensities, oscillating between
        states of pleasure, indifference and suffering. <br />

        <br />

        Such is the outcome of her obstinate desire to take charge of the design
        of her on subjectivity and her body image in relation to fashion,
        contemporary design and visual culture, as she is interested in the
        fabrication of her body as a character and as a brand displayed in a
        flickery landscape. Throughout the“Fuchsia” project Metsalu questions
        the arbitrariness of her working life through acts of selfdisplay as an
        object of spectacle something that she both embraces and refuses and has
        an interest in creating an almost allinclusive structure, which can
        accommodate both chaos and its refusal through an organising symmetry
        and iconographic imagery.<br />

        <br />

        <strong>Maria Metsalu</strong> (1990) is an Estonian choreographer and
        performer who finished her studies from SNDO (School for New Dance
        Development) in 2016. She creates mainly solo works with an ongoing
        interest in the production of her own persona, self mythologisation of
        it and her own autopoiesis. Exploring physical and virtual realities,
        bringing them together, understanding the differences of those two in
        terms of interaction, social exchange and transformation are important
        aspects of her&nbsp; research process. She aims to articulate relations
        between visual culture, identity, appropriation, telepresence and
        voyeurism using self referential relationships with corporate
        technologies. She received the DanceWEB scholarship in ImpulsTanz Vienna
        in year 2014. Amongst others Maria Metsalu has worked together and
        performed for with Nils Amadeus Lange, Tino Sehgal, Vincent Riebeek,
        Manuel Scheiwiller, Fernando Belfiore and Samira Elagoz.<br />

        <a href="http://instagram.com/dotasita">instagram.com/dotasita </a><br
        />

        [maria.metsalu.com](http://maria.metsalu.com/)<br />

        <br />

        NB! Before Maria Metsalu performance "Fuchsia" there is Samira Elagoz
        film "Craigslist Allstars".
