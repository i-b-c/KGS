    description_et: >-
        <!-- Toimetatud 8.01.16 -->Soolo – installatsioon tantsulavastus.<br />

        <br /> 

        See kõik algas mänguga, mis viis lugudeni, sinuni, see kõik viis selle
        soololavastuseni ja meieni, nagu fotoalbum.<br />

        <br />

        Ning seda ma hakkangi uurima. Mäng, lugu, lugu, lugu, A ja B, lugu ja
        pimedus, sina, hetked küsimustega, teelolek, tagasiminek, liikumine,
        tekst ja liikumine, salvestused, lood, reaalsus ja väljamõeldis, kus on
        algus, kus on jätk, kui lõpp peaks tulema, me jätkame veeremist. Kõik
        jookseb hiljem kokku. Hilisem tuleb pärast lõppu. Lõpp tuleb pärast osa
        D ja siis me näeme, mis on juhtunud varem, me ei tea ja me ei pruugi
        kunagi vastata vajalikele küsimustele. Parim viis küsida on mitte
        vastata. Omada küsimusi, mitte vastuseid.<br />

        <br />

        <strong>Rūta Ronja Pakalne</strong> on oma professionaalse karjääri
        alguses, omades kogemusi tantsust, filmist ja produktsioonist. Paljud
        tunnevad teda Ronjana ning teavad seda, et tema energia läbib mitmeid
        tasandeid ja kihte, mis näitab ka seda, kuhu suunas tema huvid liiguvad,
        ta on alati liikumises. Ta on lõpetanud Läti Kultuuriakadeemia tantsu ja
        koreograafia erialal, õppinud Brüsseli tantsukoolis P.A.R.T.S.. Hetkel
        õpib ta Läti Kultuuriakadeemia tantsu ja teatri magistriprogrammis ning
        elab Tallinnas.&nbsp;<br />

        <br />
    description_en: >-
        <!-- Toimetatud 8.01.16 -->Solo – installation dance performance.<br />

        <br /> 

        It all began with a game that led to stories, to you, to this solo
        performance and us, just like a collection of images in a photo
        album.<br />

        <br />

        And that is what I am going to investigate. Game, story, story, story,
        story, A and B, story and darkness, you, moments of questioning, on the
        way, backwards, movement, text and movement, recordings, stories,
        reality and fiction, where the beginning is, where the continuation is,
        if the end comes, we stay rolling. It all comes together later. Later
        comes after the end. End comes after part D and then we will see what
        has happened before, we don't know and we might never get the answers we
        need. The best way is to ask, not to answer. To have questions, not
        answers.<br />

        <br />

        <strong>Rūta Ronja Pakalne</strong> is in the beginning of her
        professional career, with experience in many fields: dance, film and
        production. Many know her as Ronja and that her energy goes in many
        different levels and layers, it shows in the ways that her interest
        goes, she is always on the move. She has graduated from a BA programme
        in dance and choreography at the Latvian Academy of Culture, studied at
        the dance school P.A.R.T.S. in Brussels, and is currently enrolled in an
        MA programme in dance/theatre at the Latvian Academy of Culture, while
        being based in Tallinn.<br />

        <br />
