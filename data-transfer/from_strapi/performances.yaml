    description_et: >-
        “The Body and Soul Studio” avab üheks õhtuks oma uksed, et mõtiskleda
        meie välise kesta ja sisemaailma kokkupuutepunktide üle. Elades
        maailmas, kus tuhanded teenused justkui meie heaolu eest hoolitsevad, on
        nende vahel orienteerumine muutunud eriti keerukaks. Kiht-kihilt seda
        ainest avades, tegelevad projektis osalevad kunstnikud teemadega nagu
        enesekriitilisus, hingetreening, puudutus ja läheduseigatsus, esoteerika
        ja kultus.  
          
        “The Body and Soul Studio” on Eesti Kunstiakadeemia kaasaegse kunsti ja
        kuraatoriõppe magistrantide koostööprojekt, mida juhendavad Margit Säde
        ja Anders Härm.
    description_en: >-
        “The Body and Soul Studio” is a gallery that opens for one night to
        contemplate the relationship of our outer shell and inner world. Living
        in a world where thousands of services seemingly take care of our
        well-being, it has become tough to find our way between them all.
        Opening this topic layer by layer, the participating artists touch
        topics such as self-criticism, soul training, affection and the longing
        for intimacy, esoterics and cult movements.   
          

        “The Body and Soul studio” is a collaborative project between the
        Estonian Academy of Arts Contemporary Art and Curatorial Studies Masters
        students, supervised by Margit Säde and Anders Härm.
    other_works: null
