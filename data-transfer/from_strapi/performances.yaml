    description_et: >-
        „Eksperimendid horisondiga" on Üle Heli festivali avakontsert, kuid
        samal ajal tähistab see sündmus ka Üle Heli tegevuse algust leibelina.
        See aga ei toimu puhtalt lehelt, vaid jätkates uuel moel. Ulmeplaatide
        eelmisel kümnendil toimunud tegevust. Uue leibeli 2 esimest albumit on
        sellele otsesed vihjed sisaldades Ulmeplaatide arhiivimaterjalide põhjal
        loodud töötlusi ja järge kunagi ilmunud Veljo Tormise töötluste albumile
        „Laulu jäävuse seadus". Kontsertõhtul esinevad mõned neil albumitel
        osalevad muusikud.  


        Heliüleste tasandite muusikafestival Üle Heli keskendub žanrimääratluste
        asemel muusika tähenduslikkusele ja seostele erinevate
        kunstivaldkondadega. Käesoleval aastal on festivali teemaks
        „vertikaalhorisont", mis jätkab möödunud aastal alustatud heli ja ruumi
        temaatika käsitlemist liikudes heli ruumiliselt ulatuvuselt helisündmuse
        tasandile, kui horisontaalsele justkui lisanduks vertikaalne
        dimensioon.  


        Avakontserdi ja festivali kava alates 20.september:
        [http://www.ule-heli.ee/](www.ule-heli.ee)
    description_en: >-
        "Experiments With Horizon" is the opening concert of Üle Heli festival,
        but also marks the launching of Üle Heli record label. The label doesn't
        start from empty ground as it continues the work of Ulmeplaadid from the
        point the latter stopped about a decade ago. The new label's first two
        releases are also directly connected with the past. First release
        includes new arrangements based on material found from archives of
        Ulmeplaadid and second release is a new edition of Veljo Tormis remixes
        album consisting of mainly new and unreleased music. The concert will
        feature some of the artists who are connected to these two first albums.


        Üle Heli rather than focusing on genres the festival of music beyond
        sound is working with the meaning behind music and it's connections with
        other art fields. This year the topic of the festival is "vertical
        horizon", which is continuing the research of last years topic on sound
        and space by moving from it's spatial level of sound to the event of
        sound, as if to the horisontal with the vertical dimension added.


        The program of the opening concert and festival is up from 20th
        September: [http://www.ule-heli.ee/](www.ule-heli.ee)
