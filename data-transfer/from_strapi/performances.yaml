    description_et: >-
        énouement - s. see magusvalu tunne, kui oled saabunud tulevikku ja
        näinud, milliseks see kujuneb, aga sul ei ole võimalust mineviku-endale
        seda öelda  
           
        Ma olen lõpus olnud, ma nägin, mis seal juhtub. Nüüd lähen tagasi
        algusesse.  

        .. Alguses selgub, et olen lõpu juba unustanud.
    description_en: >-
        énouement - n. the bittersweetness of having arrived in the future,
        seeing how things turned out, but not being able to tell your past
        self  
          
        I've been at the end, I know what happens there. I've now decided to go
        back to the beginning.   

        .. It turns out that at the beginning, I've already forgotten the end.
