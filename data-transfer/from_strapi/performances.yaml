        NB! made in estonia maraton visitors have free entrance to the
        afterparty at KuKu Klubi!


        ---


        “condemned forever to becoming and never to being”  (Karl Scheffler)  


        It seems that nowadays many try to emphasize the power of final product
        rather than the process. Marathon was born in the spirit of process and
        it will never be completely ready, there’s just too many variables.  


        It’s a festivity, which celebrates liberalism and performing arts:
        performers of all countries, unite! It’s a real performing arts
        Bacchanalia, which happens traditionally in three different settings
        (although everything can change): black, white and “naked” stage.  


        After the tenth jubilee (there’s some arguing over this aswell) we are
        going together to the after party at KuKu Klubi, where we continue the
        night with even freer stage and programme.  Things are all fixed, but
        the One hasn’t told us yet, what exactly is going to happen. Maybe we
        will get bread and circuses, maybe not even that.  In this existing
        world nothing is certain and it’s an honour to celebrate its
        potentiality and impossibility along with all. MARATON, LET’S GO!  


        Artists of current marathon: Joanna Kalm, Chungin, Henri Hütt, Roland
        Arnoldt & Eerik Kändler, Karolin Poska, Steve Vanoni, Lauren Bachmann &
        David Wittinghofer, Üüve-Lydia Toompere, Katrin Kreutzberg, Raho Aadla,
        Kirsi Mari Lepik, Evi Pärn & Jekaterina Kultajeva, Minna Triin Kohv,
        Liis Vares & Pavel Semjonov, Pärtel Eelmere, Anna Kaarma, Aimur Takk,
        Jaak Sapas, Kristina-Maria Heinsalu & Doris Feldmann etc.
         
        PS. After party at KuKu Klubi!
