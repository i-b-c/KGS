    description_et: >-
        Kanuti Gildi SAAL tähistab Soome 100. juubelit kahe lavastusega, meile
        juba tuttavalt kunstnike kollektiivilt <br />**W A U H A U S**.
        **Eläköön, Suomi!​**<br />

        ​<br />

        Neist esimene on “Flashdance”, mille idee sündis mõeldes vaataja
        nägemismeelest ja selle ebastabiilsusest. Mis juhtuks etenduse
        kogemisega, kui selle harjumuspärane tajumine on häiritud?​<br />

        ​<br />

        Flashdance-i idee sündis vaataja nägemismeelest ja selle
        ebastabiilsusest. Mis juhtuks etenduse kogemisega, kui selle
        harjumuspärane tajumine on häiritud?


        Flashdance-i tegevus toimub varjudes ja hämaras valguses. Siinses
        lavastuses on pimedus potensiaalne ruum, kus vaataja isiklikud piirid ja
        tajud ajast ning ruumist on hajutatud. Vaataja on silmitsi oma
        nägemisvõimete piiriga ja piiritu kujutlusvõime maastikuga.


        Flashdance-i keskel on suur must prügikott, mida tantsijad sees olles
        liigutavad. Koti väline vorm moodustab ühe olendi, organismi jagatud
        seisundist. Flashdance on tugev audio-visuaalne kogemus, mis ärgitab
        vaatajat kasutama kõiki oma meeli.


        ​Väljastpoolt vaadates, me ei tea, milline sisemus on. Valguses seistes
        me ei näe pimedust. Meie ühiskonnas, mis on valgusest ja kontrollist
        läbi tungitud, äratab Flashdance üles müstilise ja alateadvusliku.

        ​

        ​​Flashdance on teine osa triloogiast, mis on oma nime saanud
        tantsufilmidest. Triloogia lavastused on inspireeritud filminimede
        sõnalistest interpretatsioonidest ja on fokusseeritud vaataja
        tunnetuslikule kogemusele. Esimene osa triloogiast, Dirty Dancing
        esietendus oli Zodiak-is - Uue Tantsu Keskuses Helsingis ja seda nägi
        meie publik 2015. aasta lõpus<br />  

        ​<br />

        **W A U H A U S** on Helsingis tegutsev kunstirühmitus, mis on aktiivne
        kaasaegses etenduskunstide maailmas. <br />W A U H A U S-i kuuluvad
        lavastaja Anni Klein, stsenograaf Samuli Laine, koreograaf Jarkko
        Partanen ja helikunstnikud Jussi Matikainen ning Heidi Soidinsalo. Nad
        loovad oma töid erinevates ruumides, nii väikestes
        eksperimentaalteatrites kui ka suurtel staadionitel. <br />W A U H A U
        S-i töid on kirjeldatud kui kaasaegne etenduskunst, mis kasutab
        pop-kultuuri, on võimeline samaaegselt lahutama meeli kui ka valgustama
        meie ühiskonna struktuure. W A U H A U S-i töid defineerib esteetika,
        kus erinevad materjalid, valgus ja heli suhestub elava esinejaga.
    description_en: >-
        The starting point for Flashdance was the viewer’s sense of sight and
        its destabilization. We wondered, what would happen to the performance
        experience when the main sense one normally uses to take in performances
        is disturbed.  
         
        Flashdance takes place in shadows, in a dim light. In the performance
        darkness opens up a potential space in which the audience’s personal
        boundaries and sense of time and space dissipate. The audience is faced
        with the limits of their ability to see and the boundless terrain of
        their imagination.  


        At the centre of Flashdance is a giant black garbage bag that the
        dancers operate from the inside. The uniform surface of the bag creates
        a single creature, an organism of shared agency. Flashdance is a
        strongly audiovisual experience that challenges the audience to
        encounter the performance with all of their senses.  


        ​From the outside, we cannot know what the inside is like, and standing
        in the light, we cannot see into the darkness. In our society, which is
        penetrated by light and control, Flashdance evokes that which is
        mysterious and unconscious.  


        ​Flashdance is the second part of a trilogy named after dance movies.
        The performances in the trilogy are inspired by literal interpretations
        of the film names and focus on the sensory reception of the audience.
        The first part of the trilogy, Dirty Dancing, was premiered at Zodiak -
        Center for New Dance in Helsinki in 2014.<br />  

        ​<br />

        **W A U H A U S** is a Helsinki-based arts collective, active in today's
        performance field. The members of W A U H A U S are director Anni Klein,
        scenographer Samuli Laine, choreographer Jarkko Partanen and sound
        designers Jussi Matikainen and Heidi Soidinsalo. They create their own
        work in various spaces, from small experimental theatres to huge
        stadiums. The group's works have been described as contemporary
        performances that utilize popular culture, and are simultaneously
        entertaining as well as capable of illuminating the structures of our
        society. The works of W A U H A U S are defined by an aesthetic, in
        which different materials, light and sound interwine with living
        performers.
