    description_et: >-
        ### 17. rahvusvaheline etenduskunstide festival  

        15.-27. august 2017 Tallinn  


        <br>

        SAAL Biennaal on kahenädalane etenduskunstide festival. See on võimalus
        läbi kaheteistkümne ja enama kohtumise kunstnike ja nende lavastustega
        mitte ainult osa saada, vaid ka ühiselt luua ruumi ja aega ilma kindla
        teadmiseta, kuhu see välja viib. Näha detaile, mida muidu ei märka või
        mida eelistame ignoreerida. Proovida midagi, mida muidu ei teeks.
        Vaadata kaugemale iseenesestmõistetavast - kas selles peitub võimalus
        millegi uue tekkeks?


        <br>

        SAAL Biennaali kohtab seekord nii Kanuti Gildi SAALis, Von Krahli
        Teatris kui Vabal Laval, aga ka hoopis Linnahalli taga, Tallinna
        Ülikooli Akadeemilises Raamatukogus, MIMstuudio keldris, EKA
        klassiruumides ja OMAtsirkuse saalis. On etendusi, mis toimuvad
        teatrisse mineja jaoks ootuspärasel ajal ja viisil, aga ka etendusi, mis
        juhtuvad ootamatult vanalinna ilmunud trendika seebipoe tagaruumides
        (Julian Hetzel “Schuldfabrik”) või mis sünnivad hoopis vaataja enda
        tegevusest raamatukogu lugemissaali laua taga (Ant Hampton, Tim Etchells
        “The Quiet Volume”) või mille puhul teatrisaali lava täitub meie poolt
        igapäevaselt tekitatava füüsilise ja virtuaalse prügiga (Sarah Vanhee
        “OBLIVION”) või mis on maetud salajastele kalmudele (Tania El Khoury
        “Gardens Speak”) või mis kestavad terve öö ehk hämarikust koidikuni
        (Mårten Spångberg “Natten”).  


        <br>

        SAAL Biennaal 2017 festivalile on kaasatud meie publikule juba tuntud,
        aga ka tundmatud kunstnikud: Julian Hetzel (Utrecht), MOTUS (Rimini),
        Nele Suisalu ja Maarja Tõnisson (Tallinn), Sarah Vanhee (Brüssel), Rima
        Najdi (Berliin), Kadri Noormets ja Asia Baś ja Gabriel da Luz
        (Tallinn-Cape Town-Belo Horizonte), Tania El Khoury (Beirut), Ant
        Hampton ja Tim Etchells (Heidelberg-London), Galerie (rahvusvaheline),
        Karl Saks (Tallinn), Iggy Lond Malmborg (Malmö-Tallinn), Mårten
        Spångberg (Stockholm-Brüssel).  


        <br>

        Lisaks nende kunstnike tööde kogemisele on aeg koos Eesti Teatri
        Agentuuri jagatud mõtete sarjaga arutleda teemadel teater / valmisolek –
        kas ja mismoodi me oleme valmis selleks reaalsuseks, mis on juba
        normaliseerunud meie ümber? Aga ka aeg sirvida üheskoos POST-DANCE
        raamatut, mis kätkeb endas võimalust kujutleda veel kujuteldamatut või
        hoida käes mõnda alles valmivat uhiuut trükist!  


        <br>

        SAAL Biennaal kui mosaiikpeegeldus meist endist – kuidas seda mõista,
        kui puudub juhend? Mis on see, mida saad endaga kaasa etenduselt, mille
        tarbeks võtad tunni ning juhiseid järgides muutud passiivsest
        pealtvaatajast aktiivseks elluviijaks? Milline on sinu etenduskogemus,
        mille käigus sinu ratsionaalne mõistus taandub teiste tajude ees?  

        „Olen alati arvanud, et kui ei proovi ei saa teada. See käib nii minu
        kui seekordse SAAL Biennaali kuraatori kohta, aga ma usun, et ka
        festivalile kaasatud kunstnike ja ma loodan, et samuti iga võimaliku
        vaataja kohta.“   

        Annika Üprus, SAAL Biennaal 2017 kuraator.   


        <br>

