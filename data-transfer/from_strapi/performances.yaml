    description_et: >-
        **NB!<br />

        Lawrence Malstaf-i “SHRINK 01995” toimub Mustpeade maja Valges saalis
        24. ja 25.10 kell: 17:00 + 19:00 + 20:00<br />

        Piletilevist ostes saate valida endale sobiva kellaaja.**<br />

        <br />

        Kaks suurt läbipaistvat kiletükki ja seadeldis, mis nende vahelt
        aeglaselt õhu välja imeb, jättes keha vaakumpakendisse ja vertikaalselt
        rippuma. Läbipaistev toru kahe pinna vahel võimaldab seal viibival
        inimesel õhuvoolu reguleerida. Kiletükkide vahelise kasvava surve tõttu
        tardub sissepakitud keha pind aegamisi mitmeteks mikrovoltideks.
        Performance’i ajal liigub inimene nende vahel aeglaselt ja vahetab
        poose, mis varieeruvad looteasendi sarnasest asendist poosini, mis
        meenutab ristilöödud keha. 


        **Lawrence Malstaf**i looming asub visuaal- ja teatrikunsti piirimail.
        Ta loob installatsioone ja performance’eid, mis on keskendunud
        liikumisele, kokkusattumustele, korrale ja kaosele, ning
        individuaalsetele mitmeplaanilistele tajuruumidele. Lisaks loob ta
        suuremaid liikuvaid keskkondi, millega käsitletakse ruumi ja
        orienteerumist, kasutades külastajat sageli kaasloojana. Lawrence’i
        teostes on lähtepunktiks või inspiratsiooniks ning installatsioonide
        käivitajateks füüsika ja tehnoloogia.<br />

        <br />

        Lawrence Malstafi installatsioone iseloomustavad elavad esemed,
        kineetiline arhitektuur ja füüsiline osalemine. Loodud reageerivad
        keskkonnad loovad teatraalseid olukordi, milles külastaja kohalolu
        muutub teose dramaturgia lahutamatuks osaks. Tema masinad ilmutavad
        ebastabiilse korra, juhuse ja muutuste keerukas mängus tundeid, kahtlusi
        ja teisi inimlikke omadusi.<br />

        <br />

        2008ndal aastal pälvis ta Hollandi preemia Witteveen + Bos - prize for
        Art + Technology, 2009ndal aastal Prix Ars Electronica preemia Golden
        Nica ja 2010 Excellence Prize’i 13. Jaapani meediakunsti festivalil
        Tokyos. 2011. aastal valiti ta projekt „Pavillion“ iMinds Art&D
        valikusse. 2013 võitis ta Norra Hedda preemia parima stsenograafia
        kategoorias ning lõi 2014ndal aastal lavakujunduse Jon Tombre ja Cecile
        Løveidi auhinnatud etendusele „Visning“.      
          

        [www.lawrencemalstaf.com/](http://www.lawrencemalstaf.com/)
    description_en: >-
        **NB!<br />

        Lawrence Malstaf's “SHRINK 01995” takes place at House of the Black
        Heads' White Hall on Oct 24th and 25th at: 17:00 + 19:00 + 20:00<br />

        You can choose a suitable time when buying from Piletilevi.**<br />

        <br />

        Two large, transparent plastic sheets and a device that gradually sucks
        the air out from between them leave the body vacuum-packed and
        vertically suspended. The transparent tube inserted between the two
        surfaces allows the person inside the installation to regulate the flow
        of air. As a result of the increasing pressure between the plastic
        sheets, the surface of the packed body gradually freezes into multiple
        micro-folds. For the duration of the performance the person inside moves
        slowly and changes positions, which vary from an almost embryonic
        position to one resembling a crucified body. 


        The work of **Lawrence Malstaf** is situated on the borderline between
        the visual and the theatrical. He develops installation and performance
        art with a strong focus on movement, coincidence, order and chaos, and
        immersive sensorial rooms for individual visitors. He also creates
        larger mobile environments dealing with space and orientation, often
        using the visitor as a co-actor. His projects involve physics and
        technology as a point of departure or inspiration and as a means for
        activating installations.<br />

        <br />

        Living objects, kinetic architecture and physical interaction are
        characteristic of the installations by Lawrence Malstaf. His responsive
        environments generate theatrical situations involving the visitor as an
        essential presence in their dramaturgy. In a complex play with unstable
        order, chance and change his machines display emotion, doubt and other
        human qualities.<br />

        In 2008, he received the Witteveen + Bos - prize for Art + Technology
        (NL), in 2009 the Golden Nica at Prix Ars Electronica (A) and in 2010
        the Excellence Prize at The 13th Japan Media Arts Festival in Tokyo
        (JP). In 2011, his project 'Pavilion' was selected for iMinds Art&D call
        (B). In 2013, he won the Norwegian Hedda Prize for best scenography and
        made the scenography for the award winning show “Visning” by Jon Tombre
        and Cecile Løveid in 2014.



         
        [www.lawrencemalstaf.com/](http://www.lawrencemalstaf.com/)
