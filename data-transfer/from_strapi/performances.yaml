    description_en: >-
        VII NU Performance Festival: Object with Audience  



        The focus of this NU Performance Festival is the timeline and
        performative possibilities of object art, and performances that
        reinterpret the role of the audience as a part of the performance, both
        in the individual as well as collective experience. We are interested in
        looking for performativity where one is not used to finding it.  



        The background for the programme of NUP18 is the changing audience
        relations in the experiencing of visual and performing arts. Performing
        arts offer a collective and therefore uniting experience for artworks
        with a timeline, whereas the experience of an exhibition can provide a
        very individual opportunity to engage the artwork and take in the
        exhibition rituals at one’s own pace. We are particularly interested in
        the collaboration of fields with mutually complementary methods,
        creating new possibilities to approach object art and new ways of
        experiencing together.  
         

        One could ask what does objecthood perform? When it comes to the
        performativity of an object, we have looked at how the time on stage
        transforms the reception of an object, with the dramaturgy of the space
        adding to how the work is seen and interpreted. The artwork itself is
        often not the end result – on the contrary, it can serve as a platform
        and meeting place in a collective experience. This, in turn, leads to a
        transformation of audience relations. For instance, the audience can
        discover that they are almost alone in the theatre or looking at the
        performer like they would look at an image or looking at each other and
        themselves in such a way that sees the outlines of the artwork
        vanish.   



        A change in the artwork’s perception modes also alters the audience’s
        role, meaning and awareness of themselves as a part of the artwork. The
        audience is no longer merely experiencing, they are co-creators because
        the contribution of their presence in the creation of the artwork brings
        both possibilities as well as responsibility. In many ways, the audience
        IS the action, demanding a role in the whole or in the structure of the
        temporal and spatial format. In these relations of perception and
        experience, the object is both a catalyst as well as a recipient,
        prompting us to look for performativity in fields that go beyond the
        common ground of visual and performing arts.  
         

        Henri Hütt & Mihkel Ilus  

        October 2018  



        Henri Hütt is a (performance) artist with an interest in creative hybrid
        forms that involve various technologically dominated forms of performing
        arts, sound performances, developing concepts of staged exhibitions, and
        collaborating with various artists. He is a member of the MIMproject
        group and a coordinator of the DAMA network of Baltic and Scandinavian
        universities of arts.  
         

        Mihkel Ilus is a (visual) artist working in the expanded field of
        painting. He often works with large-scale installations that prominently
        feature approaches related to painting. Combining format criticism with
        contemporary exhibition culture and performing art is an important part
        of his oeuvre. More recently, he has looked at the differences of object
        art in the black box and white cube setting and searched for
        psychological charges in materials.<br />  

        <br />  

        NU Performance Festival 2018 collaborates closely with the sonic art
        festival Üle Heli 2018 that starts on October 25 to bring wider spectre
        of experiences for the audience that appreciates experimentation. 

        In the center of NU Performance Festival 2018 is the timeline and
        performative possibilities of object based art. It redefines the
        individual and collective experience of the audience.
          
        When theater has to offer to visual arts the dramaturgy based timeline
        and discipline, then vice versa the exhibition culture to theatre gives
        liberty of interpretation and varieties of format.  


        Stage time changes the reception of an object: timeline of an object,
        the dramaturgy of space, its context and communicativity focus the
        audience towards unexplored areas and aspects.   


        The role and significance of the audience in the spectacle in many ways
        is to be one component of the artwork.  


        The spectacle consists of performativity of objecthood. Object itself is
        the spectacle.

        <br />  


        The program of NU Performance Festival 2018 will bring forward the
        unexpected and drift apart from the conventional for paving ground to
        wider perception of performativity.

        <br />

        When: October 20-28, 2018<br />

        Photo: Hannes Aasamets<br />

        <br />

