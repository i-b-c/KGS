    description_et: >-
        Christian Meaas Svendseni muusikat saab kirjeldada kolme sõnaga: bass,
        keha ja vibu. Selle pealtnäha väikese raami sees on avastamiseks terve
        helidemaailm. Heli ja muusika on omavahel suhtes mitmetel tasanditel.
        Instrumendi mängimine, eriti kontrabassi, on väga füüsiline. Christian
        paneb oma keha proovile, püüdes leida uusi võimalusi, kuidas jõuda
        heliliste aareteni, mis on peidus bassi kehas. Tema muusika annab
        mõista, et heli ja liikumine on üks ja sama ning samal ajal teineteises
        kinni. See muusikaline maailm on üks energia, üks, mis kasutab kõiki
        võimalusi ning üks, mis käsitleb kuulmist ning nägemist kui ühendatud
        kogemust.<br />

        <br />

        Christian Meaas Svendsen on Norra kontrabassi mängija, kes mängib
        ühendustes nagu Paal Nilssen-Love Large Unit, Momentum ja Duplex. Ta on
        ka oma ansambli, Nakama juht ning  plaadifirma Nakama Records algataja.
        28 aastasena on ta osalenud oma muusikaga üle 20 plaadil kui mängija,
        helilooja, produtsent või disainer. Tema sihiks on saada eriliseks ent
        paindlikuks muusikuks ning kokkuvõtlikult võib teda kirjeldada kui
        väljakutset pakkuv ning innovatiivne kontrabassi mängija, kes ühendab
        klassikalist, kaasaegset ning vaba, rütmilist muusikatraditsiooni.<br />

        <br />

        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.<br />

        [www.improtest.ee ](http://www.improtest.ee /)
    description_en: >-
        Christian Meaas Svendsen’s solo music can be boiled down to three words:
        Bass, Body, Bow. Within that seemingly small framework there is an
        entire universe of sound to explore. Sound and music is, on so many
        levels, relations. Playing an instrument, especially the double bass, is
        a very physical thing. Christian questions the cemented view of relating
        to his instrument physically, and challenges the body’s capacities in
        order to find new ways to approach the sonic treasures hidden within the
        body of the bass. His music implies that sound and movement is one and
        the same and at the same time embedded in each other. This musical
        universe is one of energy, one of utilizing all of one’s capacities and
        one of treating hearing and seeing as an incorporated experience.<br />

        <br /> 

        Christian Meaas Svendsen is a Norwegian bass player playing in
        constellations such as Paal Nilssen-Love Large Unit, Momentum and
        Duplex. He is also leading his own ensemble Nakama as well as being
        initiator of the collective label Nakama Records. At the age of 28 he
        has participated on over 20 records in a combination of
        player/composer/producer/designer. He is aiming towards becoming a
        distinctive yet flexible musician, and can be summed up as a challenging
        and innovative bass player. Although he is a firm believer that any
        creative output stands strong on its own terms, he also feels that music
        is a powerful tool to make a change in this world. His concept of music
        is not defined by genre, and he aims towards connecting the classical,
        contemporary and the free, rhythmic music tradition and to reach beyond
        the various imaginative borders created by human society and modern
        culture.<br />

        <br /> 

        Improtest is concert series that brings improvisational music from local
        and foreign authors to local audience. The concerts have been taking
        place since 2005 once a month.

        <br />

        [www.improtest.ee ](http://www.improtest.ee /)
