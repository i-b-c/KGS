    description_et: >-
        Residentuuri jooksul Kanuti Gildi SAALis viiakse testgruppide peal läbi
        fookusintervjuud, mille eesmärgiks on leida kõige enam terrorihirmu
        valla päästvaid objekte. Uurimismeetodina kasutatakse peamise elemendina
        visuaalset meediat.   


        Tõniste ja Toompere on tantsu taustaga etenduskunstnikud, kes on
        varasemalt korduvalt koostööd teinud. Residentuuriga ühineb Piret Jaaks,
        kes on näitekirjanik ja lavastusdramaturg.
    description_en: >-
        The residency in Kanuti Gildi SAAL will be used to execute focus group
        interviews designed to distinguish visual and other triggers of terror
        related fear. Our method uses visual media as primary input.   


        Tõniste and Toompere are performance artists who’s background is in
        dance. They’ve collaborated in many different projects. Jaaks is a
        playwright and dramaturg who joins them for this residency.
