    description_et: >-
        <strong>Alice Buoli</strong> on arhitekt, kellel on Milano
        Polütehnikumist territoriaaldisaini ja -haldamise doktorikraad. Tema
        doktoritöö “BorderScaping”&nbsp; on uurimus Põhja-Maroko ja Hispaania
        piiri maastikest. Tema uurimisvaldkonnaks on piirialade ja linnauurimise
        ning kaasava disaini ühisosa. Praegusel hetkel on Alice ADAPT-r FP7 ITN
        programmi raames külastav teadlane Eesti Kunstiakadeemia Arhitektuuri
        teaduskonnas.<br />

        <a
        href="http://borderscaping.tumblr.com">borderscaping.tumblr.com</a><br
        />

        <br />

        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile.<br />

        <br />
    description_en: >-
        <strong>Alice Buoli</strong> is an Architect and PhD in
        Territorial&nbsp; Design and Government. Her most recent professional
        and academic activities lie at the intersection between urban research,
        design thinking and borderlands studies, with a peculiar interest on the
        Euro-Mediterranean context and on the Spanish-Moroccan border
        landscapes. She is currently Experienced Researcher at the Estonian
        Academy of Arts, in the context of ADAPT-r FP7 ITN Program.<br />

        <a
        href="http://borderscaping.tumblr.com">borderscaping.tumblr.com</a><br
        />

        <br />

        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment.<br />

        <br />
    other_works: null
