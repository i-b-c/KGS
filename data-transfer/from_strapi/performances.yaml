    description_et: >-
        "Universumi ajaskaala on inimeluga võrreldes väga pikk. Seega ei ole
        üllatav, et kuni hiljutiseni arvati, et universum on põhiliselt
        staatiline ja ajas muutumatu." Stephen Hawking<br />

        <br />

        Teadlased, hoorad, koopamehed, tulnukad, naised, vaimud, bakterid.

        Lavastus räägib fragmenteeritud lugusid päriselust, teaduslikest
        eksperimentidest, kosmilistest tõdedest, fantastilistest juttudest ning
        mälestustest. See on täiesti kaootilises jutustuses peituv kokkulangevus
        ja universaalne tõde.<br />

        Believe<br />

        <br />

        **Rene Köster** on olnud Eesti tantsumaastikul alates 2005ndast aastast.
        Kuni 2011 aastani oli nii õpetaja kui üks loovjuhtidest Prodance
        Tantsukeskuses, kuni see oma uksed lõplikult kinni pani. Aastal 2006
        asutas Twisted Dance Company koos Carmel Kösteriga. Sellest ajast on
        trupp lavale toonud mitmeid tänavatantsu ja kaasaegse tantsu maailmat
        ühendavaid ning uuendavaid lavastusi. Kõige hiljutisem oli kaasaegse
        tantsu lavastus “RSKSD”, mis esietendus Kanuti GIldi SAALis 2015 aastal.
        Hetkel lõpetab Rene oma BA õpinguid Tallinna Ülikoolis Koreograafia
        osakonnas ja tegutseb aktiivselt Twisted Dance Company'ga.<br />
    description_en: >-
        "The time scale of the universe is very long compared to that for human
        life. It was therefore not surprising that until recently, the universe
        was thought to be essentially static, and unchanging in time." Stephen
        Hawking<br />

        <br />

        Scientists, whores, cavemen, aliens, women, ghosts, bacteria.

        Performance tells fragmented stories about real life, scientific
        experiments, cosmic truth, fantastic stories and memories. It is the
        universal truth and concurrence hiding in absolute chaos.<br />

        Believe<br />

        <br />

        **Rene Köster** has been active in the Estonian dance-scene since 2005.
        He was a teacher and creative director at Prodance Dance Center until
        2011 when the studio closed it’s doors. In 2006 he and Carmel Köster
        created Twisted Dance Company. Since then the company has produced
        performances that combine street dance with contemporary dance and dance
        theatre. The most recent “RSKSD”  at Kanuti Gildi SAAL in 2015. At the
        moment he is finishing his BA studies in choreography at Tallinn
        University and working actively with Twisted Dance Company.<br />
