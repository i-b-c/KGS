    description_et: >-
        Omanäoline kahe riigi videokunstnike kohtumine. Õhtu jooksul näitavad
        omi vähem või rohkem auhinnatud töid nii helis kui pildis Katrīna
        Neiburga, Austra Hauks, Janis Snikers, ning Emer Värk.<br />

        <br />

        **Austra Hauks** on Lätist pärit kunstnik. Ta õppis Jānis Rozentāls'i
        kunstikeskkoolis (JRRMV) must-valge fotograafia kallakuga klassis,
        samuti on ta lõpetanud stsenograafia erialal Läti kunstiakadeemia. Ta
        alustas tegutsemist teatri ja video vallas 2013. aastal. Olgugi et
        Austra peab stsenograafiat ja videokunsti oma põhisuundadeks,  meeldib
        talle eksperimenteerida – aeg-ajalt loob ta kostüümikujundusi ja töötab
        interdistsiplinaarsetes projektides. 2016 oli ta Läti teatri
        kunstiauhindade nominent “Aasta uue kunstniku” kategoorias. Sel aastal
        (2018) on ta nomineeritud “Aasta videokunstniku” kategoorias.<br />

        <br />

        **Jānis Sniķers** on Lätist pärit kunstnik. Ta on saanud tuntuks laial
        tegevusväljade spektril – tal on kraad elektroonika teadustes,
        lavastamise alal ning ta õpib hetkel stsenograafiat Läti
        kunstiakadeemias. Ometi on tema põhitegevusväljaks valguskujundus, mis
        on tema tuumikvaldkonnaks... see ei ole olnud takistuseks tegevuse
        jätkamisele video programmeerimise väljal. Alates 2011. aastast on Janis
        Snikers olnud aktiivselt tegev teatrižanris. 2016 oli ta nomineeritud
        Läti teatri kunstiauhinnale kui “Aasta valguskujundaja” ja sel aastal
        (2018) on ta nomineeritud samas kategoorias.<br />

        <br />

        Kombineerides dokumentaalseid materjale ja fiktsiooni, loob **Katrīna
        Neiburga** (Riia) isiklikul kogemusel põhinevaid lugusid, milles
        selliste ainulaadsete kategooriate nagu üksinduse ja armastuse kõrval on
        võimalik leida ka märke nii naiste sotsiaalsetest rollistruktuuridest
        kui kultuurilis-ajaloolistest viidetest või ka kriitilisi kommentaare
        nüüdisaegsele ühiskonnale. Kunstnik väljendab end imepäraselt video
        kaudu, mida täiendab  spetsiifilisel viisil välja töötatud helimaterjal
        ning mis seeläbi annab tulemuseks imetabase ja tundliku tundevärvingu
        loo jutustamisel. Ta on huvitatud inimeste eludest, nagu näiteks
        teeseene kasvatajate eriskummalise kogukonna, paneelmajade elanike,
        ööklubi tualettruumides kohatud tüdrukute, taksojuhtidena töötavate
        naiste omadest. Katrīna töid on näidatud Sidney ja Moskva biennaalidel,
        ta on olnud Ars Fennica kunstiauhinna kandidaat (2008) ja on Purvīša Art
        Prize'i laureaat (2008). Ta teeb regulaarselt koostööd stsenograafi ja
        videokunstnikuna helikunstnik Andžonis'ega ja Läti rahvusooperiga.<br />

        [www.neiburga.lv/](http://www.neiburga.lv/)<br />

        <br />

        **Emer Värk** on vabakutseline kunstnik, kes tegeleb peamiselt video ja
        valgusega ning sellega, kuidas need mõjutavad meie tajusid, emotsioone
        ja tundeid.<br />

        http://www.emervark.ee/<br />

        <br />

        LAT.EST festival saab teoks vahetult pärast Läti 100.sünnipäeva Kanuti
        Gildi SAALis ning tutvustab Läti kaasaegseid (etendus)kunstnike ning
        nende mõtteid ja tegemisi. Samuti on see pühendatud koostööle ja kõigele
        mis meid ühendab.

        LAT.EST festivali korraldab Kanuti Gildi SAAL koostöös Läti Uue Teatri
        Instituudiga ning see kuulub nii EV100 kui LV100 kultuuriprogrammi.
    description_en: >-
        A unique meeting between video artists from the both countries will take
        place. Katrīna Neiburga, Austra Hauks & Jānis Sniķers, and Emer Värk
        will be showing their more or less award-winning works in the form of
        audio and video during this evening event.<br />

        <br />

        **Austra Hauks** is an artist from Latvia. She studied at the
        Professional Art High School (JRRMV) with the specialty in a black and
        white photography, as well as graduated from the Art Academy of Latvia
        in the field of Scenography. She started her activities in the field of
        theater and video in 2013. Although Austra considers scenography and
        video art as her main direction, she likes to experiment - time to time
        she creates costume designs and works in interdisciplinary projects. In
        2016, she was nominated for the Latvian Theater Art Award in the
        category – New artist of the year. And this year (2018) she is nominated
        in a category -  Video artist of the Year.<br />

        <br />

        **Jānis Sniķers** is an artist from Latvia. He has gained knowledge in a
        wide spectrum of fields - he has a degree in Electronics sciences,
        degree in stage directing and he is currently studying Scenography at
        the Latvian Academy of Arts. However, as the main field, he pursues the
        Lighting design, which is his core work area now... which has not been
        any obstacle to pursue Video programming field as well. Since 2011 Janis
        Snikers is actively working in the theater genre. In 2016 he has been
        nominated for the Latvian Theater Art Award as Lighting designer of the
        Year and this year (2018) he is nominated in the same category.<br />

        <br />

        Combining documental materials with fiction, **Katrīna Neiburga** (Riga)
        creates stories based on personal experience, in which, alongside such
        unique categories as solitude or love, it is possible to find
        indications both to the woman’s social role structures and cultural
        historical references or critical commentaries on modern society. The
        artist wonderfully expresses herself through video which, supplemented
        by specifically elaborated sound material, results in an amazing and
        sensitive intonation of narration. She is interested in the lives of
        people, such as the peculiar community of tea mushroom growers, block
        housing inhabitants, girls met at nightclub bathrooms, women that work
        as taxi drivers. Katrīna has exhibited her works in Sidney and Moscow
        biennale, has been a candidate for Ars Fennica art prize (2008) and is
        the Purvīša Art Prize winner (2008). She regularly collaborates with the
        sound artist Andžonis and with the Latvian National Opera as
        scenographer and video artist.<br />

        [www.neiburga.lv](http://www.neiburga.lv/)<br />

        <br />

        **Emer Värk** is an Estonian artist primary focused on projections and
        light in the space and its influences on our perception, mood and
        emotions.<br />

        http://www.emervark.ee/<br />

        <br />
