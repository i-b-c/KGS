    description_et: >-
        Ehk võibki väita, et elame ärevuse ajastul? Oleme oskuslikud
        orienteerujad info ülekülluses, halbades uudistes ja kahtlastes uutes
        teadmistes. Kiirus, millega aju uut informatsiooni sünteesib on kiirem
        kui kunagi varem. Jääb üle olla valvel, ergas nagu loom, süda tukslemas
        põues.  

        <br>

        Paljud elusorganismid valivad raskete aegade üleelamiseks talveune.
        Nahkhiired on enda toiduahela tippkiskjad, ükski teine loom ei ole
        nahkhiirte söömisele spetsialiseerunud. Eestis levinud põhja-nahkhiired
        langevad külmemate ilmade saabudes talveunne, mis võib olenevalt aastast
        kesta kuni kaheksa kuud. Kogutud energia varudega võetakse ette
        talvitumine, mille ajal organism lülitub vähetarbivale režiimile,
        südametöö aeglustub kuni 60 korda. Peale und alustatakse taas puhtalt
        pinnalt.  

        <br>

        Elu, mis sinusoidsena meid õõtsumas hoiab, koosneb rütmidest ja
        helidest. Grupp kunstnikke tuleb kokku üheks õhtuks, et pühendada meile
        kõigile mõned helid, kes tunnevad, et kõike on saanud liiga palju. Raske
        on lõõgastuda ja edasi minna. Proovides suigutada meid kuhugile
        mõnusasse ja pehmesse paika, vahest puhkusele või isegi unne. Hoides
        kokku energiat, toimides minimaalsel energiakulutusel oleme valmistumas
        restardiks. Tihtilugu ei olegi see nii kerge. Iga lõpp on omamoodi
        ärevaks tegev ning me kipume ka häid asju edasi lükkama. Aga enne
        proovime ennast lõdvaks lasta.  

        <br>

        Grupp on spetsiaalselt kokku tulnud NU Performance Festivaliks.  

        Kõik osalejad on ühel või teisel viisil kohtunud Eesti Kunstiakadeemias
        kaasaegse kunsti magistriõppekaval. Kuraatoriharidust omandaval **Kleer
        Keret Talil** on soov panna erinevad autoripositsioonid ja ideed
        etteastes “Värelev Siinus” kokku kõlama. Segades keelt, muusikat ja
        emotsionaalseid toimemehhanisme, proovib **Hanna-Liisa Lavonen** tuua
        esile Karjala itku kosmoloogilist olemust. Vabakutseline näitleja
        **Jaanika Arum** ja helikunstnikud **Helen Västrik** ja **Katrin Enni**
        asuvad lahti kodeerima närviliste rütmimootorikate olemust. **Helle Ly
        Tomberg** ja **Ellen Vene** uurivad kunstniku hääleulatust juhutöö
        majandust fetišeerivas maailmas ning otsivad alternatiivset
        hingekosutust eneseabiguru õpetussõnadest. Aus ja süüdimatu **Andre
        Joosep Arming** toob sisse poeetilise mängu aja kulgemise teemadel.
    description_en: >-
        Perhaps it is safe to say that we are living in an age of anxiety? We
        can skilfully navigate the overabundance of information, bad news and
        dubious new knowledge. The brain is synthesising new information at
        unprecedented speeds. There is no choice but to be alert like an animal,
        heart pounding.  

        <br>

        Many living organisms choose hibernation to survive the hard times. Bats
        are the top predators of their food chain; no other animal has
        specialised in eating bats. When the weather turns cold, the northern
        bats living in Estonia hibernate for up to eight months depending on the
        year. Using their energy storage, they hibernate through the winter, and
        while their organisms switch to an energy-saving regime, their hearts
        will slow down by up to 60 times. After the hibernation, they start with
        a clean slate.  

        <br>

        The life that keeps us swaying like sinusoids consists of rhythms and
        sounds. A group of artists will come together for one night to dedicate
        some sounds to all of us feeling like there is just too much of
        everything. It is difficult to relax and go on. Trying to lull us into a
        cosy and soft state, perhaps a rest or even sleep. By trying to save
        energy, operating with minimal energy waste, we are ready for a restart.
        It is often not that easy. Every end is disconcerting in a way, so we
        tend to postpone even the good things. However, before that, we will try
        to relax.  

        <br>

        The group has been formed especially for the NU Performance festival.  

        All participants have met in one way or another through the contemporary
        art curriculum at the Estonian Academy of Arts. Future curator **Kleer
        Keret Tali** wants to harmonise various author positions and ideas in
        the Shimmering Sine performance. Combining language, music and emotional
        coping mechanisms, **Hanna-Liisa Lavonen** strives to highlight the
        cosmological essence of the Karelian lament. Freelance actor **Jaanika
        Arum** and sound artists **Helen Västrik** and **Katrin Enni** start
        decoding the essence of nervous rhythm motilities. **Helle Ly Tomberg**
        and **Ellen Vene** explore the vocal range of an artist in a world that
        fetishizes the gig economy and look for alternative comfort from the
        words of wisdom of self-help gurus. The honest and irresponsible **Andre
        Joosep Arming** will introduce a poetic game on the subject of the flow
        of time.
