    description_et: >-
        Peatükkide ja statement'ide dialoog:

        koos Cana Bilir-Meier'i, Alexander Koch'i, Patricia Reed'i, Maria
        Lind'i, Joanna Warsza'ga  
          
        Mis on avalik avalikus kunstis? Mis kaasneb töötamisega väljaspool
        institutsionaalsete seinte kaitset? Mida linnakureerimine teeb? See
        tekstikogumik võtab Müncheni ette juhtumianalüüsiks ja dokumenteerib
        PUBLIC ART MUNICH 2018 raames toimunud projekte, mis käsitlesid
        poliitilisi, ideoloogilisi ja majanduslikke nihkeid, ulatudes Baierimaa
        Nõukogude Vabariigi asutamisest aastal 1919 kuni põgenike saabumiseni
        Hauptbahnhof'i 2015. aastal. See asetab kunsti avaramate küsimuste
        konteksti avaliku sfääri grammatikast ja sellest, mida kujutab endast
        avalikkus tänapäeval. Samuti mõtiskleb see kontekstispetsiifilise
        linnakureerimise, performatiivsuse ja kunsti üle, mida luuakse pigem
        minutites kui ruutmeetrites. Kunstiprojektid, vestlused ja esseed
        joonistavad välja narratiivi sellest, kuidas kunst saab tekitada
        kohtumisi ettearvamatuga, sobitada ebaharilikku ja panna vastaspublikut
        kohale ilmuma.  
          
        See tekstikogumik ilmus Joanna Warsza' kureeritud Public Art Munich 2018
        – Game Changers (30. aprill – 27. juuli 2018) raames. PAM, mis toimub
        Müncheni linna eritellimusel, on Müncheni suurim avalik kunstiprogramm.
        Selle 2013. aastal esmakordselt toimunud väljalaset – A Space Called
        Public/Hoffentlich Öffentlich – kureerisid Elmgreen &
        Dragset.pam2018.de  
          
        Freiraum on Goethe Instituudi algatatud projekt, mille raames korraldab
        Kanuti Gildi SAAL sarja temaatilisi üritusi Tallinnas. Freiraum ehk
        Vabaruumi on kaasatud 53 partnerit kultuuri-, kunsti- ja
        teadusringkondadest ning kodanikuühiskonnast, kes tegelevad 40 linnas
        küsimusega - mida tähendab vabadus tänapäeva Euroopas? Freiraumi
        koostööpartnerid püstitasid projekti alguses kohalikust kontekstist
        tulenevalt vabadusega seotud küsimused, millest lähtudes püütakse
        üheskoos otsida vastuseid 2018-2019 jooksul läbi viidavate ürituste
        raames. Kanuti Gildi SAALi dialoogipartneriks Kunsthaus Dresden, kes
        tõstatas küsimuse: olukorras kus linn ja avalik ruum on aina rohkem
        mõjutatud parempoolsete populistlike initsiatiivide poolt alates aastast
        2014 - mida saab kunst kui vabaduse keel teha käesoleval ängistuse ajal?
        Kanuti Gildi SAAL püstitas küsimuse: kas on me võime olla õnnelikud?
        keskendudes vabaduse ja vastutuse vahelistele suhetele ning era- ja
        avaliku elu positiivsetele aspektidele Eestis.  

        www.goethe.de/prj/fre/en/index.html
    description_en: >-
        What is public in public art? What are the contingencies of working
        outside of the protection of the institutional walls? What makes city
        curating? This reader takes Munich as a case study, and documents the
        projects of PUBLIC ART MUNICH 2018 dealing with political, ideological
        and economical shifts, spanning from the founding of the Bavarian Soviet
        Republic in 1919 to the arrival of refugees at the Hauptbahnhof in 2015.
        It contextualizes art within the broader questions of the grammar of the
        public sphere and of what constitutes publicness today. It also reflects
        on the concept of context-specific city curating, performativity and art
        conceived in minutes rather than square meters. Art projects,
        conversations and essays plot a narrative of how art can cultivate
        encounters with the unpredictable, negotiate uncommonness, and provoke
        counter-publics to come.  
          
        This reader is published on the occasion of Public Art Munich 2018 –
        Game Changers (April 30-July 27, 2018), curated by Joanna Warsza. PAM,
        commissioned by the City of Munich, is Munich’s biggest public art
        program. Its first edition in 2013, A Space Called Public/Hoffentlich
        Öffentlich, was curated by Elmgreen & Dragset.pam2018.de  
         
        Freiraum is an initiative of Goethe Institute and Kanuti Gildi SAAL will
        organise a series of events related to the topic of freedom in Tallinn.
        Freiraum as sphere of freedom or free zone unites 53 partners from
        culture, science and civil society all over Europe who in more than 40
        cities of Europe will be grappling with the concept of freedom in our
        contemporary world. Paired European cities are developing projects to be
        presented to the public in a series of events in 2018 and 2019. Kanuti
        Gildi SAAL dialogue partner is Kunsthaus Dresden and they formulated
        question - against the backdrop of the increasing use of the city and
        public space as a setting for right-wing populist initiatives since late
        2014, what can art, as a language of freedom, do in times of widespread
        resentment? Kanuti Gildi SAAL posed a question: are we wrong to be
        happy? Focusing on the nexus between freedom and responsibility as well
        as on positive aspects of free private and public life.

        https://www.goethe.de/prj/fre/en/index.html
