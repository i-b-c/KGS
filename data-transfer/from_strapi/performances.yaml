    description_et: >-
        22.–25.oktoobril toimub Tallinnas esmakordselt uus kunagise Hea Uus Heli
        jälgedes korraldatud festival, mis keskendub helikunstile, kuid seob
        seda teiste kunstivaldkondadega. Festivali nime meie trükise valmimise
        ajaks pole veel avaldatud. Küll aga on Kanuti Gildi SAALil hea meel
        võõrustada ühte osa festivalist 23.oktoobril.

        Esimesel aastal on festivali teemaks maailmade loomine ning meie keldri
        saalis ning suures saalis leiavad aset erinevad sündmused ühise
        nimetajaga “Eikellegimaa”.



        Suures saalis saab pärastlõunal osaleda Hasso Krulli (literaat), Kaupo
        Palo (kvantfüüsik) ja Peeter Lauritsa (kunstnik) vestlusringis maailmade
        loomisest ning õhtul avaneb keldrisaalis installatsioon, mille idee
        kasvas välja vokaalinstrumentaaltrio Eeter (Anna Hints, Marja-Liisa
        Plats, Ann Reimann) ja elektronmuusikute Mihkel Tombergi ning Aivar
        Tõnso poolt loodavast ühisest kontsertprogrammist, millel on tugev side
        folkloorist pärinevate kosmogooniliste tekstide ning nende tänapäevaste
        seadetega. Installatsiooni loomisel kasutatakse ühiselt loodud muusika
        motiive ning kunstilisele lahendusele aitavad kaasa skulptor Eike Eplik
        ja videokunstnik Tencu (Andres Tenusaar).



        Õhtu lõpetab Algorütmide ja Henri Hüti koostöös valminud
        kontsertetendus. Algorütmid (Mihkel Tomberg ja Roland Karlson) on loonud
        muusikat paljudele Henri Hüti etendustele. Seekord on rollid vahetunud
        ja Henri Hütt rikastab Algorütmide kontsertesinemist lavastuslike
        elementidega. Algorütmid esitab muusikat oma kauaoodatud järgmisel
        aastal ilmuvalt debüütalbumilt.
