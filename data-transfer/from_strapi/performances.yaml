    description_et: >-
        Vaata festivali siin: http://elektron.live/


        **15:00 Seminar "Where Have All The Magic Gone"**  

        Seminar sellest, mis saab teatrist, kui teatrit pole  
          
        Rahvusvahelisel seminaril arutame ja fantaseerime kunstnike,
        kuraatorite, teoreetikute ja teiste loominguga tegelevate inimestega
        tunni aja jooksul, mis juhtus teatriga, kuhu ta kadus, mis saab edasi ja
        milliseid võimalusi praegune pretsedenditu olukord meile pakub.  
          
        Seminaril osalevad Kathrin Tiedemann (The Forum Freies Theatre
        kunstiline juht, Düsseldorf)), André Eiermann (Agderi Ülikool /
        teatriteaduste dotsent), Hedi-Liis Toome (teatriuurija ja õppejõud Tartu
        Ülikooli kultuuriuuringute instituudis), Mette Edvardsen
        (etenduskunstnik) ja Hendrik Kaljujärv (e⁻lektron). Modereerivad Annika
        Üprus ja Maarja Kalmre.  
          
        **16:00 HIRROAKI UMEDA**  // nagu etendus //  

        Hiroaki Umeda elab ja töötab Tokios. Ta on multidistsiplinaarne
        kunstnik: koreograaf, tantsija, heli-, pildi- ja valguskujundaja. Tema
        tööd on nii minimalistlikud kui radikaalsed, õrnad ja vägivaldsed ning
        paljuski seotud tema kaasaegsete Jaapani juurtega. Tema stiil on
        paljuski mõjutatud kõrgtehnoloogilise visuaalse kunsti poolt. 2000.
        aastal asutas Hiroaki Umeda oma kompanii S20 ning on alates sellest
        tuuritanud nii teatri -kui ka kunstifestivalidel üle maailma.  

        http://hiroakiumeda.com/  
          
        **17:00 MIKROBIOM PRCHESTRA**  // nagu kontsert //  

        Peaaegu elus muusikaline instrument, mille helimodulatsioonid põhinevad
        mikrobioomi kolooniate analüüsil.   
          
        Mikrobioomi Orkester on kunstiprojekt mille eesmärk on uurida suhteid
        inimese, masina ja mikroorganismide vahel ja seda läbi info helilise
        esitamise, visualiseerimise ja kollektiivse etendamise.  

        Ansambli, mida juhib Andrei Bundin, liikmed kasutavad kontserdi jooksul
        spetsiaalseid  algoritme, mis on loodud mikrobioomi kolooniate tegevuse
        helindamiseks.   
          
        Andrei Bundin, PhD, (sündinud 1987) on helilooja ja meediakunstnik. Ta
        on tuntud läbi projektide nagu Smartphony, Concert for Smartphones,
        Virtual Sound Gallery, MIDI.Website, Sphere, Conundrum for Table and
        Electronics jne. Hetkel töötab ta Muusika-, teatri- ja
        koreograafiainstituudis Herzeni Ülikoolis ja New Media laboratooriumis
        Alexandrinkiy Teatri Uuel Laval. Ta on pälvinud auhinna parima muusika
        eest Eindhoveni Filmifestivalil, on 2018. aasta Sergei Kuryokhini
        Auhinna nominent ja Web Audio konverentsi komitee liige ja osaleja.   

        https://bundin.info
    description_en: >-
        Join the festival at http://elektron.live/  
          
        **15:00 Seminar "Where Have All The Magic Gone"**  

        A seminar on what happens in/with theatre, when there’s no theatre  
          
        In this international one-hour seminar we are discussing and fantasizing
        with artists, curators, theorists and other creatives about and over
        what happened with theatre, where did it go, what will it become next
        and which opportunities does this unprecedented situation have for us.  
          
        Participants of the seminar are Kathrin Tiedemann (artistic and managing
        director FFT, Düsseldorf), André Eiermann (University of Agder /
        Associate Professor of Theatre.), Hedi-Liis Toome (theatre researcher
        and lecturer at the Institute of Cultural Research at the University of
        Tartu), Mette Edvardsen (performing artist) and Hendrik Kaljujärv
        (e⁻lektron). Moderators are Annika Üprus and Maarja Kalmre.  
           
        **16:00 HIRROAKI UMEDA** // almost a show //  

        Hiroaki Umeda is a choreographer and a multidisciplinary artist now
        recognized as one of the leading figures of the Japanese avant-garde art
        scene. Since the launch of his company S20, his subtle yet violent dance
        pieces have toured around the world to audience and critical acclaim.
        His work is acknowledged for the highly holistic artistic methodology
        with strong digital back ground, which considers not only physical
        elements as dance, but also optical, sonal, sensorial and, above all,
        spatiotemporal components as part of the choreography. Based on his
        profound interest in choreographing time and space, Umeda has spread his
        talent not only as a choreographer and dancer, but also as a composer,
        lighting designer, scenographer and visual artist.  

        http://hiroakiumeda.com/  

            
        **17:00 MIKROBIOM PRCHESTRA**  // almost a concert //  

        Semi-alive musical instrument based on the analysis of microbiome
        colonies.  
          
        Microbiome Orchestra is an art experiment aimed on the exploration of
        relations between human, machine, and micro-organisms from the point of
        sonification, visualization, and collective performance.   

        During the performance the members of the ensemble managed by Andrei
        Bundin extract sounds using specially developed algorithms for
        sonification of the colonies of the microbiom.  
          
        Andrei Bundin (b. 1987) – PhD, composer, media artist. He is known for
        such projects as Smartphony, Concert for Smartphones, Virtual Sound
        Gallery, MIDI.Website, Sphere, Conundrum for Table and Electronics, etc.
        Currently he works at the Instute of Music, Theatre and Choreography of
        Herzen University, and at the Laboratory for New Media (the New Stage of
        Alexandrinskiy Theatre). Best Music Award at the Eindhoven Film Festival
        2019, Sergey kuryokhin Award 2018 nominee, participant and program
        committee member of the Web Audio Conference.   

        https://bundin.info
