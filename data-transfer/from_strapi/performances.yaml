    description_et: >
        Õhtu täis eteduskunsti!<br />

        <br />

        Õhtu algab kell 19:00 Kris Lemsalu performance’iga “Veenuse sünd”. Kris
        Lemsalu on kunstnik, kelle teosed on samal ajal haprad ja vägivaldsed,
        luksuslikud ja efermeersed, tõstes esile kunsti ihaldatavuse küünilist
        tahku ja pakkudes samavõrra sellisele küünilisusele huumori ning iroonia
        kaudu vastumürki.<br />

        <br />

        Õhtu jätkub algusega kell 19:30 Helena Keskküla poolt festivali jaoks
        valmiva kontsert-etendusega “+1”. Tegemist on audiovisuaalse kontserdiga
        ühe olematu alter-iidoli tõusust ja langusest.<br />

        <br />

        Peale seda kell 20:30 algab Skriiningprogramm, mis tutvustab kolme väga
        eriilmelist kunstnikku - Shana Moulton, Hannah Black ja George
        Jacotey/DEEP4FEET. See on mänguline vaade kehale, sellega kaasnevatele
        paranoidadele, arusaamistele ja ootustele.<br />

        <br />

        Shana Moulton “Repetitive Stress Injuries” (2008), 12:26’<br />

        Hannah Black “The Neck” (2014), 3:14’<br />

        DEEP4U: George Jacotey Kimmo Modigi, Jennifer Chani, Shawné Michaelain
        Holloway “Hot New World Viewz” (2016), 2:03’<br />

        <br />

        Performance-installatsiooni “The Future Must Be Destroyed Yesterday”
        autor Kolbeinn Hugi on pärit Islandilt. Kolbeinn on välja töötanud
        keeruka audiovisuaalse keele, kasutades juhuslikke materjale, veevahtu,
        kangaid ja kihilisi sünteesitud helimaastikke.<br />

        <br />

        Terve õhtu jooksul toimuvad ka ette teada ja ette teatamata
        aktsioonid!<br />

        <br />

        <br />

        <br />

        <br />

        <br />

        <br />

        <br />
    description_en: >
        The evening starts at 19:00 with a performance “The Birth of Venus” by
        Kris Lemsalu. Kris Lemsalu is an artist who’s works appear fragile and
        violent, luxurious and empemerical at the same time, highlighting the
        cynical aspect of art’s desirability, as much as providing an antidote
        to that cynicism by means of humour and irony.<br />

        <br />

        The evening continues at 19:30 with a concert-performance “+1” by Helena
        Keskküla. It is an audiovisual concert created specially for the
        festival and is about the rise and fall of a non-existent alter idol.<br
        />

        <br />

        The screening programme presents three very different artists - Shana
        Moulton, Hannah Black and George Jacotey. It is a playful look at the
        body, its concomitant paranoias, ideas and expectations.<br />

        <br />

        Shana Moulton “Repetitive Stress Injuries” (2008), 12:26’<br />

        Hannah Black “The Neck” (2014), 3:14’<br />

        DEEP4U: George Jacotey Kimmo Modigi, Jennifer Chani, Shawné Michaelain
        Holloway “Hot New World Viewz” (2016), 2:03’<br />

        <br />

        “The Future Must Be Destroyed Yesterday” is a performance-installation
        by an Icelandic artist Kolbeinn Hugi. Kolbeinn has developed a complex
        audiovisual language, using found materials, water-foam, fabrics and
        layered synthesized soundscapes.<br />

        <br />

        Be ready for announced and unannounced actions during the evening!<br />
