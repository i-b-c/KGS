    description_et: >-
        Marjan Colletti on itaalia arhitekt, teadur ja teoreetik, Londonis
        baseeruva arhitektuuristuudio

        marcosandmarjan looja ning partner. Ta omandas arhitektuurihariduse
        Innsbrucki Ülikoolis, kus ta juhib Eksperimentaalse Arhitektuuri
        Instituuti. Oma doktorikraadi kaitses ta Londoni Ülikooli kolledžis,
        Bartletti Arhitektuurikoolis, kus ta töötab digitaalosakonna direktori,
        stuudio juhendaja ja doktoriastme õppejõuna. Ta on õpetanud arvukates
        koolides nii Aasias, Euroopas kui Ameerika Ühendriikides ning tema
        kirjutisi disainiuuringute teooriast on laialt avaldatud. Muuhulgas
        toimetas

        ta ajakirja Architectural Design auväärset 80. juubelinumbrit
        Exuberance, mille teemaks oli

        digitaalne virtuoossus kaasaegses arhitektuuris. Ta on kureerinud
        kümneid näituseid ja osalenud veelgi rohkematel, sealhulgas mitmetel
        Veneetsia Arhitektuuribiennaalidel.


        Loeng kuulub samasse sarja 24. septembri loenguga ning on mõeldud nii
        arhitektuuritudengitele

        ja erialaprofessionaalidele, kui ka ruumikultuuri huviliste laiemale
        ringile.


        Varasemaid loenguid vaata www.artun.ee/avatudloengud


        Kontakt: arhitektuur@artun.ee

        Toetajad: Eesti Kultuurkapital, Eesti Kunstiakadeemia

        Inglise keeles
