    description_et: >-
        John Butcheri looming sisaldab mitmeid erinevaid tahke:
        vabaimprovisatsiooni, kompositsioone, katsetusi feedbackiga, esinemisi
        tavatutes ja ebatavalise akustikaga kohtades.  

        Tema koostööpartnerite nimekiri sisaldab sadu muusikuid: Derek Bailey,
        John Tilbury, John Stevens, The EX, Akio Suzuki, Gerry Hemingway,
        Polwechsel, Gino Robair, Rhodri Davies, Okkyung Lee, John Edwards, Toshi
        Nakamura, Paul Lovens, Eddie Prevost, Mark Sanders, Ståle Liavik
        Solberg, Christian Marclay, Otomo Yoshihide, Phil Minton ja Andy Moor -
        kui nimetada mõned.  

        Butcher peab lugu musitseerimisest erinevate koosseisudega - alates
        suurtest koosseisudest nagu Butch Morrise London Skyscraper, WRD
        Sümfooniaorkester, kuni duodeni koos David Toopi, Kevin Drummi, Claudia
        Binderi, Paal Nilssen-Love’i, Akira Sakata, Blanca Regina, John Tilbury,
        Fred Frithi, Keiji Haino ja paljude teistega.   
          
        Liudas Mockunas valdab meisterlikult  saksofonide perekonna instrumente
        alates sopranist kuni haruldase bass-saksofonini. Tema muusika on
        plahvatusohtlik segu free jazzist, lüürilisusest ja ekspressionismist,
        meistelikust esitusest ja intrigeerivast kompositsioonist.   

        Koostööpartnerid: Marc Ducret, Ryoji Hojito, Arkady Gotesman, Stefan
        Pasborg, Jakob Riis, Petras Geniušas, Jaak Sooäär, Willian Hooker ja
        paljud teised.  
          
        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.
    description_en: >-
        John Butcher's work ranges through improvisation, his own compositions,
        multitracked pieces and explorations with feedback, unusual acoustics
        and non-concert locations.  

        Originally a physicist, he left academia in '82, and has since
        collaborated with hundreds of musicians - Derek Bailey, John Tilbury,
        John Stevens, The EX, Akio Suzuki, Gerry Hemingway, Polwechsel, Gino
        Robair, Rhodri Davies, Okkyung Lee, John Edwards, Toshi Nakamura, Paul
        Lovens, Eddie Prevost, Mark Sanders, Ståle Liavik Solberg, Christian
        Marclay, Otomo Yoshihide, Phil Minton, and Andy Moor - to name a few.   

        Butcher values playing in occasional encounters - ranging from large
        groups such as Butch Morris' London Skyscraper, WDR Sinfonieorchester
        and the EX Orkestra, to duo concerts with David Toop, Kevin Drumm,
        Claudia Binder, Paal Nilssen-Love, Akira Sakata, Blanca Regina, John
        Tilbury, Fred Frith, Keiji Haino, Ute Kangeisser and Yuji Takahashi.  
          
        Liudas Mockunas is a multi-reeds player and composer, whose name stands
        for masterly performance and intriguing compositions. His 'natural'
        idiom is an explosive mixture of free jazz, lyricism and expressionism
        combined with highly unconventional performance techniques.   

        Collaborations: Marc Ducret, Ryoji Hojito, Arkady Gotesman, Stefan
        Pasborg, Jakob Riis, Petras Geniušas, Jaak Sooäär, Willian Hooker and
        many others.  
             
        Improtest is a concert series that brings improvisational music from
        local and foreign authors to local audience. The concerts have been
        taking place since 2005 once a month.
