    description_et: >-
        Kui aastal 1987 näitas Soome televisioon filmi Emmanuelle, sõitis pool
        Eestist Tallinna seda vaatama, nagu laulupeole. Tõusis plahvatuslikult
        eestlaste iive, me saime aimu erootikast, kuid paljugi on jäänud veel
        arusaamatuks. Soomlased küll näitasid meile seda ilu, õrnust ja
        veetlust, aga ei andnud juhiseid, kuidas selleni jõuda. Kui me püüame
        kõige selle järgi haarata, on korraga kõik vale ja õhus levib vaid
        ebaadekvaatsuse vaim.  


        Meie loo kaks peategelast asuvad teele, neid ootavad ees katsumused,
        sattudes silmitsi erinevate ahistamisjuhtumitega. Kas nad jõuavad
        Emmanuelle'ini?
    description_en: >-
        In 1987, when the Finnish television broadcasted "Emmanuelle", half of
        all Estonians drove to Tallinn to see the film. The Estonian baby boom
        began, we got an idea of erotica, but much more remains mysterious. The
        Finnish television showed us its beauty, delicacy and delight, but did
        not provide us with instructions on how to reach it. If we try to seize
        it all, everything goes wrong and only the spirit of inadequacy is left
        lingering in the air.<br />  

        <br /> 

        The two main characters of our story set upon a journey, encountering
        challenges in the face of various harassment cases. Will they reach
        Emmanuelle?
