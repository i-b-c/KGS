    description_et: >-
        Millal on vabaimprovisatsioon päriselt vaba improvisatsioon? Vabadus
        nõuab vastutust ja piisavalt seiklusvaimu, julgust pimedal tänaval
        võõraga kaasa minna (muusikasse üle kantud tähenduses, muidugi) ja
        praokil ustest sisse piiluda.  
          
        „Improtest“ on rahvusvaheline kontserdisari, mis toob kuulajateni
        improvisatsioonilise muusika nähtusi meilt ja mujalt. Sarja kontserdid
        toimuvad alates 2005. aastast kord kuus. Kontserte korraldab MTÜ
        Improtest. Sel kontserdil võib osa saada festivalile valitud esinejate
        sooloetteastetest, pärast seda kohtuvad nad laval esimest korda
        „Improtesti“ kuraatorite Mart Soo ja Taavi Kerikmäega.
    description_en: >-
        Improtest is a concert series that brings improvisational music from
        local and foreign musicians to local audiences. The concerts have been
        taking place since 2005, once a month. Concerts are organized by
        Improtest non-profit organization. The audience can enjoy the solo
        performances of selected artists as well as to meet Mart Soo and Taavi
        Kerikmäe, curators of Improtest, and all of them are co-performing on
        the stage for the first time.
