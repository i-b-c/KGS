    description_et: >-
        Victor Enrich on Kataloonia fotograaf ja kunstnik. Ta on lõpetanud
        arhitektuuri eriala Kataloonia Polütehnikumis (2002). Tema iseseisvalt
        õpitud 3D visualiseerimisel ja fotograafial põhinevad tööd on kestev
        manifest ühel ja samal teemal - LINN. Linn, mis ei ole üksnes paik
        lisamiseks, eemaldamiseks ja modifitseerimiseks inimtegevusele sobivaima
        ruumi leidmisel, vaid ka koht ootuste ja lootuste elluviimiseks. Tema
        tööd keskenduvad igaühe häguste unistuste, ägestunud kirgede, kardetud
        õudusunenägude ja igava sotsiaalelu illustreerimisele läbi arhitektuurse
        linnamaastiku. Víctor Enrich studio www.victorenrich.com


        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile. 


        Loengusarja toetab Eesti Kultuurkapital ja korraldab Eesti
        Kunstiakadeemia arhitektuuriteaduskond.


        Inglise keeles.
    description_en: >-
        Victor Enrich is a catalan photographer and artist.  He graduated
        architecture in Universitat Politècnica de Catalunya in year 2002.
        Continuing with a self taught education of 3D visualisation and
        photography, his work is a constant manifest on one and the same
        subject: the City. The city, not only understood as the very well-known
        process of adding, subtracting or modifying spaces for all sorts of
        human activities but also as a complex system of nodes that involve and
        connect everybody’s blurry dreams, exacerbate passions, fearful
        nightmares or even tedious social life.

        Víctor Enrich studio www.victorenrich.com


        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment. 


        The lecture series is supported by Estonian Cultural Endowment and
        organised by the Architecture department of Estonian Art Academy.


        In English
