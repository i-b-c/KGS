    description_et: >-
        Vilde &amp; Inga on keelpilliduo Norrast, mis tegeleb laiendatud
        mängutehnikate ja uute kõlavärvide otsingutega. Nende debüütalbum
        Makrofauna ilmus ECM leibli alt 2013. aastal. Nende koostööpartnerid on
        trummar Ingar Zach ja laulja Sidsel Endresen.<br />

        <a href="http://vildeinga.com">vildeinga.com</a><br />

        <br />

        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.<br />

        <br />

        <a href="http://improtest.ee">improtest.ee</a><br />

        <br />
    description_en: >-
        Vilde &amp; Inga is a string duo playing acoustic free improvised music,
        featuring violin and double bass. By exploring non-traditional
        approaches to the instruments, the duo greatly expands their timbre
        palette. The wide horizons of colour allow the music to develop slowly
        and organically, yet with a keen underlying sense of compositional form.
        Vilde &amp; Inga released their debut album Makrofauna on ECM in 2013.
        Their second album will be released in spring 2017 under the Norwegian
        label SOFA. In October 2016 Vilde &amp; Inga received the Lindeman Prize
        for Young Musicians.<br />

        <br />

        Vilde Sandve Alnæs and Inga Margrete Aas are classically trained
        musicians from Norway. They started to play together in 2010 and have
        studied at The Norwegian Academy of Music in Oslo. Vilde &amp; Inga
        regularly plays concerts both in Norway and internationally. They also
        regularly play concerts with the Norwegian percussionist Ingar Zach. Aas
        and Alnæs are also both involved in a new trio with Sidsel Endresen
        (voice) called Azkadenya.<br />

        <a href="http://vildeinga.com">vildeinga.com</a><br />

        <br />

        Improtest is concert series that brings improvisational music from local
        and foreign authors to local audience. The concerts have been taking
        place since 2005 once a month.<br />

        <br />
