    description_et: >-
        Ahvatlus on põgeneda tihkesse metsa,  

        joosta paljajalu käbidel ja ära eksida;  

        noppida magusaid mürgimarju, ning puudelt lakkuda  

        mee-moel nirisevat sillerdavat vaiku;  

        Joovastusest sügavamasse segadusse vajuda, kännu taha   

        komistada ning pugeda pimedasse koopasse, samblateki alla ja   

        uinuda haldjate hellitava hällilaulu hüpnoosis,  

        unistades tugevast trollist, kes kuivanud allika ääres kastepiiski   

        kogudes,  

        mu kaela kirvega katkestaks.
          
          
        Jette Loona Hermanis on Eesti ja Läti verd etenduskunstnik, esineja ning
        koreograaf, õppinud teatrit, tantsu ja muusikat ning hetkel lõpetab
        Amsterdami Kunstikoolis SNDO koreograafia eriala. Jette töö igaveseks
        saatjaks on müstiline transtsendentsus ehk ületavus; igatsusega
        väljendada afekti. Tugevalt digiajastust mõjutatuna on materjalil karjuv
        tung enese tsentraliseerimise ning online minapildi raiumise järele,
        eksponeerides tundelisi narratiive enese ja eksistentsialismi suhtes.
        Storytelling kui kontsept, mille alt

        mitmetähenduslikud suhtumised ning ideed tärkavad.
    description_en: >-
        Jette Loona Hermanis is a performance artist, choreographer and
        performer who’s blood is both Estonian and Latvian. She has studied
        theater, dance and music and is currently graduating from the SNDO
        Choreography bachelor in University of the Arts in

        Amsterdam. An eternal accompany of Jette's work is mystifying
        transcendence and longing to express an effect. Strongly influenced by
        the digital age, the material carries a screaming obsession with
        self-centralization and online self-portrayal, exhibiting emotional
        narratives of self and existentialism. Storytelling as a concept from
        which ambiguous attitudes and ideas emerge.
