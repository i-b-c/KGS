    description_et: >-
        Kanuti Gildi SAAL tähistab Soome 100. juubelit kahe lavastusega, meile
        juba tuttavalt kunstnike kollektiivilt W A U H A U S. Eläköön, Suomi!<br
        />

        <br />

        “Private Dancer” on kolmas osa lavastuste triloogiast, mis on oma nime
        saanud tantsufilmidest. Eelmised osad, “Dirty Dancing” ja “Flashdance”
        esietendusid Zodiak-is aastal 2014 ja 2016. Selles seerias on rõhutatult
        kõrvuti koos nii “elutud asjad” nagu värvitud hapupiim ja suur must
        prügikott, elavad esinejad laval kui ka publiku mitmeid meeli kätkev
        kogemus.<br />

        <br />

        “Private Dancer”-i keskmes on heli ja selle kinesteetiline olemus. Heli
        saavutatakse läbi millegi liikumise. See reisib meie kõrvadesse ning
        sealt edasi vibreerides väikestesse kehaosadesse, mis tõlgitakse
        tundeks, millestki, mis juhtus. Iga heli põhjustab meis erilise
        vastukaja. On raske ette näha, mida heli tähendab inimesele. Kui heli on
        oma allikast lahti võetud, on see vaba ja võimalik muutma kuulaja
        isiklikku, kujuteldavat maastikku.<br />

        <br />

        “Private Dancer”-is tekitatakse helisid suu liikumise kaudu. Heli on
        äärmiselt aktiivne süvend – see täitub toidu ja õhuga,  juhib meid keha
        sügavustest naha pinnale ja väljendab meie sisemust välisele maailmale.
        Lavastuses vaadeldakse suud kui valvatud väravat. Mida me laseme suust
        sisse ja välja on reguleeritud normide poolt, mis ainult ei säilita meie
        füüsilist keha ja tema baasvajadusi vaid toob esile ka meie sotsiaalsed
        ning ühiskondlikke suhteid teistega.<br />

        <br />

        “Private Dancer” kutsub publikut kuulama oma tervet keha. Lavastus
        sirutub “teise”, keha piiride ja lõputute võimaluste poole kuulamise
        kaudu.<br />

        <br />

        **W A U H A U S** on Helsingis tegutsev kunstirühmitus, mis on aktiivne
        kaasaegses etenduskunstide maailmas. <br />W A U H A U S-i kuuluvad
        lavastaja Anni Klein, stsenograaf Samuli Laine, koreograaf Jarkko
        Partanen ja helikunstnikud Jussi Matikainen ning Heidi Soidinsalo. Nad
        loovad oma töid erinevates ruumides, nii väikestes
        eksperimentaalteatrites kui ka suurtel staadionitel. <br />

        W A U H A U S-i töid on kirjeldatud kui kaasaegne etenduskunst, mis
        kasutab pop-kultuuri, on võimeline samaaegselt lahutama meeli kui ka
        valgustama meie ühiskonna struktuure. W A U H A U S-i töid defineerib
        esteetika, kus erinevad materjalid, valgus ja heli suhestub elava
        esinejaga.
    description_en: >-
        “Private Dancer” is the third part of the trilogy of performances named
        after dance movies. The previous parts “Dirty Dancing” and “Flashdance”
        premiered at Zodiak in 2014 and 2016. In this series of pieces we have
        emphasized the juxtaposition of non-human agents – such as dyed sour
        milk and a huge black plastic bag – with human performers on stage, as
        well as the multisensory experience of the audience.<br />

        <br />

        The basis of “Private Dancer” is in sound and its kinaesthetic nature.
        Sound is generated through the movement of something. It travels to our
        ears, and there, through the vibrations of tiny parts in our body, is
        translated to a sensation of what happened. Every sound causes a unique
        reaction within us. It is impossible to foresee what a sound will mean
        to a person. When a sound is detached from its source, it is free to
        move and transform into each listener’s personal, imaginary
        landscape.<br />

        <br />

        In “Private Dancer” sounds are created through the movements of the
        mouth. The mouth is an extremely active cavity – it fills with food and
        breath, leads us from the depths of the body to the surface of the skin
        and expresses our inside to the outside world. We have looked at the
        mouth as a guarded gateway. What we let in and out through our mouth is
        regulated by norms that not only uphold our physical body and its basic
        needs, but also reveal our social and societal relationships of
        others.<br />

        <br />

        “Private Dancer” invites the audience to listen with their entire body.
        Through listening the performance stretches towards the other, the
        boundaries of bodies and their vast possibilities.<br />

        <br />

        **W A U H A U S** is a Helsinki-based arts collective, active in today's
        performance field. The members of W A U H A U S are director Anni Klein,
        scenographer Samuli Laine, choreographer Jarkko Partanen and sound
        designers Jussi Matikainen and Heidi Soidinsalo. They create their own
        work in various spaces, from small experimental theatres to huge
        stadiums. The group's works have been described as contemporary
        performances that utilize popular culture, and are simultaneously
        entertaining as well as capable of illuminating the structures of our
        society. The works of W A U H A U S are defined by an aesthetic, in
        which different materials, light and sound interwine with living
        performers.
