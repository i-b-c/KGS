    description_et: >-
        „Later“ hõlmab rida üritusi, mis kutsuvad meid ekslema ajutistel aladel,
        ajama ja kustutama jälgi, uurima suutmatust märgata seda, mida me
        vaatame, imbuma mitmetesse kujutlustesse, sulatama kokku esiplaani ja
        tausta, vaatama kadunut ja seda, mis ei ole veel täielikult kadunud,
        muutuma kohe juhtuva tunnistajateks enne, kui jõuame sellele isegi
        mõelda.  


        **Julia Rodríguez** on Mehhikos sündinud kunstnik, kes elab ja töötab
        Berliinis ja Mexico Citys. Tema looming asetub etenduskunsti valdkonda
        ja avaneb mitmes keskkonnas. Oma praegustes töödes käsitleb ta sõna ja
        tähenduse vahelist lõhet, ootuste poliitikat ning ihade ja rutiinide
        vahelisi lünki. Ta loob koreograafiat keeltele, olukordadele, esemetele
        ja tantsudele. Lisaks osaleb ta nii kaaslooja kui ka esinejana teiste
        kunstnike projektides.
    description_en: >-
        *Later* ventures into a series of events that invite us to wander
        through temporary territories, to trace and erase, to explore the
        inability to spot what we are looking at, to infiltrate into multiple
        imaginaries, to blend the foreground with the background, to look at
        what is gone and what hasn’t fully disappeared yet, to become carriers
        of what is about to happen before we even think about it..<br />

        <br />


        **Julia Rodríguez** is a Mexican-born artist who lives and works between
        Berlin and Mexico City. Her artistic practice is situated within the
        performing arts field and unfolds in various environments. In her
        current work, she explores the gap between word and meaning, the
        politics of expectation, and the spaces between desires and routines.
        She choreographs languages, situations, objects and dances. Furthermore,
        she develops projects with other artists both as a collaborator and as a
        performer.
