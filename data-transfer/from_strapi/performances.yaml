    description_et: >-
        Martina Georgina ja Keithy Kuuspu kutsuvad vaatama nende viimast ja
        lõplikku Püha Vaimu SAALi residentuuris läbitud "YOU YOU" protsessi
        jagamist.  
          
        **reaalsus**  

        *nimisõna*  

        olek või kvaliteet tegelikkuses eksisteerivast või toimuvast, mitte
        ettekujutatavast ja arvatavast.  


        **pilt**  

        *nimisõna*  

        üldmulje, mida inimene, organisatsioon või toode avalikkusele esitleb.

          
        “Pildi peategelane on vaataja” - John Berger    
          
        Kuidas on pilt, mida sa endast projitseerid vähem tõeline, kui sinu
        igapäevane mina, kui igapäevane mina on pidevas muutumises ning tihti
        isegi mõjutatud ümbritsevast.
          
        "YOU YOU" on uurimus-etendus projekt, mis uurib piltide maailma ning
        muljeid, mida pildid annavad, nii pilte, mida projitseerime oma
        sotsiaalsete suhete vältel, kui ka pilte, mida jagame digitaalselt
        sotsiaalmeedia kaudu.  
          
        Residentuuri protsessi osana kutsusid Martina ja Keithy avalikkust
        osalema oma uurimuse väljatöötamises eesmärgiga luua “pilte”. Publikule
        anti võimalus unistada oma valitud fantaasia pildist ja seejärel aega
        ning vahendeid selle pildi projitseerimiseks ruumi, nii nagu neile
        meeldis, kasutades kunstnikke oma subjektide või objektidena. Selle
        uurimisperioodi lõplikuks jagamiseks soovivad kunstnikud paljastada
        piltide loomise protsessi ning nendest välja tulevaid hetki ja
        tegelasi.  
          
          
        **Martina Georgina** on sündinud Malta saarel, kus ta alustas projekti
        Teatru Santwarju (2015), eesmärgiga teha koostööd inimestega, kes on
        leidnud rahu oma sügavate fantaasiate ja ettekujutatud tegelikkusega.
        Hetkel leiab ta, et soovib luua tööd, mis võimaldaks tal mõista inimese
        seisundeid, keerukust ja võimalusi.  

        Ta kolis hiljuti põhja poole, Läänemere kaldale, et jätkata õpinguid
        kaasaegse füüsilise etenduskunsti õppekaval (Contemporary Physical
        Performance Making - CPPM, 2019-2021) Tallinnas, kuna ta soovib
        tugevdada enda iseseisvust ning jätkuvalt esitada väljakutseid endale,
        kui kunstnikule.  
          
        **Keithy Kuuspu** on noor etendus- ja tantsukunstnik Tallinnast. Ta on
        lõpetanud Tallinna Ülikooli Balti filmi, meedia, kunstide ja
        kommunikatsiooni instituudi koreograafia erialal. Hetkel õpib ta Eesti
        Teatri- ja Muusikaakadeemias kaasaegse füüsilise etenduskunsti õppekaval
        (CPPM). Hetkel keskendub ta reaalsuse definitsiooni ja selle piiride
        uurimisele. Oma loomingus toetub ta inimsuhetele, mõjule, mida inimesed
        üksteisele avaldavad ja kuidas ning millest sünnib inimeste ja isiksuste
        vahel energia.
    description_en: >-
        Martina Georgina and Keithy Kuuspu are inviting you to join them for
        their final sharing of "YOU YOU" as part of their residency at Püha
        Vaimu SAAL.    

          
        **realness**  

        *noun*  

        the state or quality of actually existing or occurring in fact, and not
        being imagined or supposed.  
          
          
        **image**  

        *noun*  

        the general impression that a person, organization, or product presents
        to the public.  

        *verb*  

        make a representation of the external form of.  
          
          
        “The main character of the picture is the viewer” - John Berger    
          
        How is the image you project of yourself any less of a projection than
        your daily self if your daily self fluctuates from moment to moment, and
        as it is sometimes even influenced by its surroundings?  
          
        "YOU YOU" is a research performance project exploring the world of
        images and the impressions such images give off, both the images we
        project during our social interactions and the images we share digitally
        through social media.  
          
        As part of their process Martina and Keithy have earlier invited the
        public to participate in their research development with the intention
        to make “images”. The public were given a chance to dream up some
        fantasy image of their choice and were then given the time and tools to
        project this image into the space as they liked, using the artists as
        their subjects or objects. For this final sharing of this research
        period the artists wish to expose the process behind making images and
        the moments and characters that come out of such images.   
          
        **Martina Georgina** was born on the Island of Malta, where she started
        a growing project Teatru Santwarju (2015) with the purpose to work with
        individuals who find sanctuary in building on from their deep fantasies
        and imagined realities.   

        She currently finds herself wanting to create work that allows her to
        make sense of the human condition, complexities and possibilities.    

        She has now moved further north, near the Baltic sea to further her
        studies in the Masters in Contemporary Physical Performance Making -
        CPPM (2019 - 2021) in Tallinn, Estonia; as she would like to strengthen
        her independence  and continue to challenge her autonomy as an
        individual artist.    
           
        **Keithy Kuuspu** is a young performance and dance artist from Estonia,
        Tallinn. She has graduated Tallinn University Baltic Film, Media, Arts
        and Communication School in dance. Right now she is learning in Estonian
        Academy of Music and Theatre (Masters in Contemporary Physical
        Performance Making – CPPM).    

        Keithy investigates the question and boundaries of realness. She is
        particularly interested in the processes and reactions of human
        interaction, the influence people have on each other, and how and from
        which energy is generated between people and individuals.
