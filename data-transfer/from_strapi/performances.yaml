    description_et: >-
        Rachel Armstrong on eksperimentaalse arhitektuuri professor Newcastle
        ülikoolis ning rahvusvaheliselt tunnustatud akadeemik ja teerajaja
        keskkonnateemalistele lahendustele arhitektuuris ja
        interdistsiplinaarses praktikas. Ta disainib ja konstrueerib
        arhitektuurseid rakendusi, mis põhinevad tehis-orgaaniliste omaduste
        kasutamisel keemilistes ja bioloogilistes süsteemides. Ta loob
        prototüüpe, mida on mh eksponeeritud ka Veneetsia Biennaalil (2010,
        2015), mille abil saab näidata, kuidas on võimalik rakendada elavate
        organismide süsteemide omadusi keskkondlike probleemide ja puudujääkide
        lahendamisel. Rachel on ühtlasi konsultant nüüdistehnoloogia tööstusele
        madala süsiniku sisaldusega lahenduste loomisel.  


        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikuid, kriitikuid ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile.
    description_en: >-
        Rachel Armstrong is Professor of Experimental Architecture at Newcastle
        University, an internationally acclaimed academic and pioneer in
        innovating environmental solutions and interdisciplinary practice. She
        designs and engineers architectural applications in the built
        environment, which are based on the properties of life-like chemical and
        biological systems. She produces prototypes that have been
        internationally exhibited at festivals such as the Venice Biennale
        (2010; 2015), which demonstrate how it may be possible to harness the
        properties of living systems to address environmental solutions. She
        also consults with industry to advise on convergent technologies and low
        carbon solutions.  


        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment.
