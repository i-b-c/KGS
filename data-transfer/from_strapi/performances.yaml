    description_et: >-
        Eesti Kunstiakadeemia graafilise disaini osakonna lõputööde esitlused on
        avalikud. Kuulama ja vaatama on oodatud kõik huvilised. Lõputööde
        esitlused toimuvad inglise keeles.<br />

        <br />

        Sel kevadel lõpetab Eesti Kunstiakadeemia graafilise disaini osakonna 14
        noort disainerit. Lisaks lõputööde esitlusega Kanuti Gildi SAALis
        tähistatakse seda 1. juunil EKA galeriis avatava lõputööde näitusega.
        Tudengid on viimase viie kuu jooksul vorminud oma kolmeaastase
        õppekogemuse projektideks, millega näitusel on võimalik tutvuda.
        Lõpetamiseks on tudengid teinud nii omaalgatuslikke disaniprojekte, kui
        ka töid klientidega.<br />

        <br />

        Osalevad disainerid: Laura Herma, Johann Kabonen, Maria Kesküla, Henri
        Kutsar, Else Mare Lagerspetz, Henno Luts, Maria Muuk, Harles Neljand,
        Andree Paat, Maren Poel, Juuso Veikko Siltanen, Anne Loore Sundja, Aimur
        Takk ja Iida Kaisa Urm.<br />

        <br />

        Eesti Kunstiakadeemia graafilise disaini osakonna lõputööde näituse
        avamine toimub EKA galeriis (Vabaduse väljak 6/8 sisehoovis) 1. juuni
        2016, kell 18:00<br />

        Näitus kestab 2.–22. juuni 2016, galerii on avatud T–L 12:00–18:00<br />

        [gd16show.artun.ee](https://gd16show.artun.ee/)

        <br />
    description_en: >-
        The final presentations of the graduating students of the Department of
        Graphic Design of Estonian Academy of Arts is a public event open for
        everybody. The presentations will be held in English.<br />

        <br />

        This spring, 14 young designers are graduating from the Department of
        Graphic Design of the Estonian Academy of Arts. For the past five
        months, students have formed their knowledge and experience through
        different final projects – self-initiated design works as well as
        projects with clients. <br />

        <br />

        Participating designers: Laura Herma, Johann Kabonen, Maria Kesküla,
        Henri Kutsar, Else Mare Lagerspetz, Henno Luts, Maria Muuk, Harles
        Neljand, Andree Paat, Maren Poel, Juuso Veikko Siltanen, Anne Loore
        Sundja, Aimur Takk and Iida Kaisa Urm.<br />

        <br />

        In addition to these presentations at Kanuti Gildi SAAL, the graduating
        students are opening their final exhibition at the Academy’s gallery on
        June 1st. <br />

        <br />

        GD 16 Show<br />

        Opening on June 1, at 18:00<br />

        EAA Gallery, in the courtyard of Vabaduse väljak 6/8<br />

        Exhibition dates: June 2 – June 22<br />

        Gallery open from Tuesday till Saturday 12:00–18:00<br />

        [gd16show.artun.ee](https://gd16show.artun.ee/)<br />

        <br />
