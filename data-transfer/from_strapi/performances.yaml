    description_et: >-
        “TAHE” mõjub teematiliselt ja kunstiteosena äärmiselt lõpetatult, heites
        õhku ka hüvastijätu nukraid õilmeid, kerget kahetsust ja külmatunnet.
        Kindlasti on see Keerdi senises loomingus abstrakseim ja intuitiivseim,
        mõjudes lahtiütlemisena lavalisest algoritmist ja märgilistest
        konstruktsioonidest. Esmapilgul paistab, et Keerd on loobunud tõsiste
        teemade käsitlemisel senisest filtrist, mis peitis need kobrutavasse 

        absurdihuumorisse ja atraktiivsesse füüsilisse vaatemängu. (Põim Kama/
        Postimees)
    description_en: >-
        Thematically, and as a piece of art, “TAHE” (“WILL”) has an extremely
        well-rounded presence, as it exudes the sombre stages of goodbye, a
        certain air of regret and a chilling feeling. In relation to Keerd's
        previous pieces, this is definitely the most abstract and intuitive, and
        seemingly departs from the algorithm of the stage and its signified
        constructions. From the first, it seems that Keerd has forsaken the
        filters used for dealing with serious subject matter, revealing themes
        that were until now concealed in overflowing surreal humour and visually
        engaging physical spectacle. (Põim Kama/ Postimees)
