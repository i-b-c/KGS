    description_et: >-
        Sander (see pildil) tuli ükskord ideega teha lavastus pornost.
        Internetipornost ja üldse. Mulle mõte väga meeldis, sest teemast pole
        eriti räägitud, aga selles peitub palju meie praegusele maailmale
        olemuslikku: üksindus, anonüümsus, enesekesksus, kiirus, visuaalsus,
        vägivald. Ühest pabernutsakusse lastud spermatilgast näeb kogu
        universumit jne.  

        Välja tuli monolavastus. Mis tähendab, et ainult üks inimene on laval.
        Pole näitlejatevahelist dialoogi ega keemiat. Suht igav. Aga siiski
        hariv. Natuke lõbuski.  

        Sander Rebane mängib muidu põhikohaga Endla teatris Peeter Paani. Meil
        on mõned inimesed veel abiks. Veiko Tubin teeb heli. Emil Kallas
        valgust. Kristjan Suits lava. Revo Koplus tehnilist poolt. Alari Rammo
        produtseerib. Ei ühtki naist, aga lahedad kutid kõik. Ja Kulka toetab.  

        Tervitan.  

        Paavo Piik


        [www.kinoteater.ee]( http://www.kinoteater.ee/)<br />
    description_en: >-
        Sander (pictured above) came to me with an idea to stage something on
        pornography. Internet porn and so on. I really liked the idea because it
        is a topic not often talked about in theatre. And it immediately
        involves many themes essential to our contemporary world: loneliness,
        anonymity, clicking, visuality, violence. A drop of sperm in the paper
        tissue reflecting the whole universe etc.  

        "Ei Tao" is a monoproduction. This means only one performer is on stage.
        So there is no dialogue or chemistry between actors, quite boring.
        Educating though. Even a bit funny.  

        Sander Rebane mostly plays Peter Pan at Pärnu Endla Theatre. I mostly
        write for Kinoteater and Tallinn City Theatre. We have a couple of more
        people. Veiko Tubin works sound. Emil Kallas does the lights. Kristjan
        Suits applies stage design. Revo Koplus handles technical stuff. Alari
        Rammo is producing. Really nice guys all.  

        Paavo Piik

         [www.kinoteater.ee]( http://www.kinoteater.ee/)<br />
