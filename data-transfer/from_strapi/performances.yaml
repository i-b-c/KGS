    description_et: >-
        Lõpetamata Linn  


        rahvusvaheline konverents linnaplaneerimisest


        Pea igal otsusel on mingi ruumiline mõõde, tulevikku ulatuv mõju ja
        tagajärg. Paljuski on linnad seesuguste väga erinevatest
        distsipliinidest tulenevate otsuste ja kestvate protsesside tulem.
        Uurime, kes ja kuidas seda tulemust teadlikult suunavad ja mida tahame
        linnalt tulevikus.  


        Konverentsil küsime:  


        Kuidas loovad tulevikku erinevad erialad?  

        Kas pikad strateegilised plaanid on mõistlikud ja võimalikud, või
        liigume me üha enam kiirete ja taktikaliste otsuste suunas? 

        Kui pea kõigi osaliste ja protsesside kohta on pea kõik andmed saadaval,
        siis kuidas teeme üldistusi ning otsuseid?

        Kui linnad peavad pakkuma head elukeskkonda kogu ühiskonnale, siis
        kellele täpsemalt ja kellega me sellest räägime?

        Kuidas töötame juhusliku ja ettemääramatuga, kas planeerida ja kavandada
        saab täringuid visates?  

        Kuidas sätestame tulevikku, kas selle saabumist saab ette määrata
        jooniste, kirjelduste, kavade ja seadustega?  


        [Eelregistreerumine
        siin](https://docs.google.com/forms/d/e/1FAIpQLSd-UqLAFhWfDQ7OjMxF0hfJrhccvZxWQvYWjd2NOk_KI6SuKA/viewform)


        Esinejad:   

        **Thomas Auer** alustas oma karjääri 1994 aastal peatselt pärast
        Transsolari asutamist ning tema väljapaistev insenerivõimekus ja
        juhtimisoskused tõid ta aastal 2000 ettevõtte juhtkonda. Tuginedes
        põhjalikele teadmistele integreeritud ehitussüsteemidest ja hoonete
        energiatõhususest, on Thomas arendanud energia- ja ehitusteenuste
        kontseptsioone projektidele üle terve maailma ning pälvinud tunnustust
        nende innovaatilise disaini ja energiatõhususe eest. Tema väljatöötatud
        kontseptid on maailma tipparhitektide loomingulise käekirja tähtis osa.
        Thomas on osalenud paljudes rahvusvahelistes disainiprojektides ja
        -võistlustel koostöös maailma tuntud arhitektidega. Tema projektidest on
        saanud Transsolari ajaloo verstapostid - nt KfW panga hoone Frankfurtis
        ja Charles de Gaulle’i lütseum Damaskuses - Manitoba Hydro peakorterit
        Winnipegis (Kanada), peetakse üheks Põhja-Ameerika energiatõhusaimaks
        kõrghooneks.  


        **Markus Schaefer**il (MSc, MArch, SIA) on magistrikraad arhitektuuris
        Harvardi ülikoolist ning lisaks sellele magistrikraad neurobioloogias
        Zürichi ülikoolist. Enne koos Hiromi Hosoyaga Hosoya Shaefer Architects
        asutamist juhtis Schaefer Rotterdamis AMOt – AMO on Rem Koolhaasi
        asutatud OMA arhitektuuribüroo mõttekoda ja uuringute osakond. Nii oma
        töö eest OMAs kui Hosoya Shaeferis on Markus Schaefer võitnud mitmeid
        rahvusvahelisi auhindu. Schaefer peab sageli loenguid ja kirjutab
        arhitektuurist ning on partner ja uuringute juht CityTrackerX AGs, mis
        on erarahastusega uuringute ja arendusettevõte, mis tegeleb linnade
        toimimise analüüsiga reaalajas. 


        **Johannes Kuehn** asutas 2001. aastal Berliinis koos Simona Malvezzi ja
        Wilfried Kuehniga Kuehn Malvezzi. Alates 2016. aastast on ta ehituse ja
        disaini professor Bauhausi ülikoolis Weimaris. Kuehn Malvezzi töö
        fookuseks - ning üldisemalt ka nende disainistrateegia lähtepunktiks -
        on näitused ja muuseumid: kõikidel skaaladel, alates näitusekujundustest
        ja lõpetades linnaga, lähtuvad nad kuraatorlikust lähenemisest
        arhitektuurile. Kuehn Malvezzi tegi Documenta 11 arhitektuurse disaini,
        näitusekujundused Flick Collection’ile Hamburger Bahnhofis Berliinis
        ning Julia Stoscheki kollektsioonile Düsseldorfis. Viimane kandideeris
        ka rahvusvahelisele Mies van der Rohe kaasaegse arhitektuuri
        preemiale.  

        Praksise teiseks fookuseks on kuraatorlik lähenemine linlikule
        arhitektuurile ja avalikule ruumile. Kuehn Malvezzi võitis 2012. aastal
        rahvusvahelise konkursi religioonidevahelise pühakoja House of One
        projekteerimiseks Berliini Petriplatzile. Viimastel aastatel on järjest
        olulisemaks muutunud eluasemeprojektid: käesoleval aastal lõpetas
        ettevõte uue elamurajooni Stuttgarti lähedal (Villengärten am Relenberg)
        ning hetkel töötab projektidega, mis mõeldud Mainzi ja Baden-Badenisse. 

        Kuehn Malvezzi kriitiline lähenemine rekonstrueerimisele pälvis
        eripreemia Humboldt-Forumi konkursil, samuti Saksa kriitikute preemia
        arhitektuuri kategoorias (2009). Nende projektid on väljas olnud
        mitmetel rahvusvahelistel näitustel, sh Veneetsia XIV
        arhitektuuribiennaalil ja Chicago I arhitektuuribiennaalil (2015).  


        Lõplik programm selgub peagi.

        [Facebook](https://www.facebook.com/events/305756989895863/?acontext=%7B%22ref%22%3A%222%22%2C%22ref_dashboard_filter%22%3A%22upcoming%22%2C%22action_history%22%3A%22[%7B%5C%22surface%5C%22%3A%5C%22dashboard%5C%22%2C%5C%22mechanism%5C%22%3A%5C%22main_list%5C%22%2C%5C%22extra_data%5C%22%3A[]%7D]%22%7D)


        Uurimisprojekt "Lõpetamata Linn"  



        EKA arhitektuuri ja linnaplaneerimise osakond algatas 2017. aasta
        alguses uurimisprojekti "Lõpetamata linn", mis tegeleb Tallinna
        linnaehituslike visioonide ja ruumiliste stsenaariumitega. Projekti
        annavad oma akadeemilise panuse nii osakonna õppejõud, teadurid ja
        doktorandid kui ka väljastpoolt kutsutud spetsialistid.  


        Uurimistöö keskendub 6 suuremale teemale: planeerimispraktikad, linna
        struktuur, linna tihedus, linna piir, suur infrastruktuur linnas ning
        linna iseloom. Iga teemaga tegeleb ühe semestri vältel viieliikmeline
        uurimisgrupp. Iga teema kohta korraldab toimkond ühe rahvusvahelise
        töötoa ning paralleelselt käib töö ka EKA arhitektuuri ja linnaehituse
        ning urbanistika tudengitega. Kuuele semestripikkusele
        uurimistöö-lõigule eelneb sarnaste näidete analüüs mujalt maailmast ja
        teemat avav rahvusvaheline konverents. Järgneb kokkuvõttev töö näituse
        ja raamatu formaadis, mis seovad kogu uurimistöö terviklikuks
        käsitluseks. Protsessi lõpetab uurimistöö tulemusi nii spetsialistidele
        kui laiemale huviliste ringile tutvustav rahvusvaheline konverents.  


        Eesti Kunstiakadeemia arhitektuuriteaduskonna uurimisprojekt LÕPETAMATA
        LINN saab toeks tänu E.L.L. Kinnisvara toetusele, koostööpartnerina on
        kaasatud ka Tallinna linn.  


        Valmis on saanud ka projekti 1. semestri tulemusi tutvustav trükis, mis
        on allalaetav
        [siin](https://drive.google.com/file/d/0B6pvXIq1lye2M1ZkYUh4a0JvbjA/view)
