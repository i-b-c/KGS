    description_et: >-
        Mitme kirjastuse uudisteoseid esitletakse performatiivne külg ees. Nende
        aktsioonide peategelaseks on raamat ja selle esitlemise võimalused. <br
        />

        <br />

        **ELSE LAGERSPETZ, LOORE SUNDJA**<br /> 

        **The Bible Hounds Songbook**<br />

        Knock! Knock! Books


        „The Bible Hounds Songbook” koondab kokku kolme seniavaldamata laulu
        kavandit, mis olid mõeldud saatma Bible Houndsi (e. k. Piiblipenide-)
        nimelist lastesaadet. Piiblipenid on fiktiivne B-kategooria animasari,
        mis oleks võinud sündida 1980ndate lõpu USA-s ning saada kristlike
        perekondade pühapäevahommikuseks meelelahutuseks. Nõukogude liidu
        järgses kristluse taasavastanud Baltikumis oleks Piiblipenid aga leidnud
        oluliselt rohkem kõlapinda kui oma sünnimaal. Sarja ainsat hooaega
        vürtsitasid muusikalised numbrid, mis olid tihti ootamatult julged ja
        kahemõttelised konservatiivse lastesaate kohta. Songbookis avavad
        Piiblipenide lõbusat ja absurdset maailma noodid, illustratsioonid ja
        sahtlissekirjutatud episoodide kirjeldused.


        **Knock! Knock! Books** on Tallinnas ja Helsingis tegutsev iseseisev
        kirjastus, mis publitseerib väljamõeldud raamatuid. Viimase kahe aasta
        jooksul on Knock! Knock! Books osalenud raamatumessidel näiteks New
        Yorgis, Berliinis ja Helsingis ning välja andnud teoseid koostöös
        kirjastustega Lugemik ja Colorama.<br />

        [knock-knock.ee/](http://knock-knock.ee/)<br />

        <br />

        24 pp<br /> 

        220 × 300 mm <br />

        Edition: 400<br /> 

        Offset printing <br />

        Staple bound<br /> 

        Inglise keeles<br /> 

        Autorid ja disain: **Else Lagerspetz & Loore Sundja** <br />

        Illustratsioonid: Linda Gajewski, Else Lagerspetz & Loore Sundja<br /> 

        Muusika: Bill Tolley, Mikko Lagerspetz, Else Lagerspetz & Loore
        Sundja<br /> 

        Lava: Bagnard and Kavivanar<br /> 

        Printed by Aktaprint<br /> 

        Published by Knock! Knock! Books in collaboration with Lugemik <br />

        ISBN 978-9949-7234-3-0<br /> 

        2018<br /> 



        **MOVEMENT RESEARCH**


        Uues antoloogias, mille toimetajaks on Mårten Spångberg, vaadeldakse
        uuesti movement research’i (liikumise, liigutuse uurimus, uuringud,
        käsitlus), et algatada arutelusid keha, liikumise ja kehastatud
        teadmiste kohta meie kaasaegsetes ühiskondades. Raamat koosneb
        tantsijate ja koreograafide, aktivistide ja filosoofide kaastöödest,
        milles kõik lähtuvad liikumise ning liigutuse käsitlemisest.<br /> 

        Mida movement research tähendab tänapäeval? Mis on saanud kehalistest
        praktikatest, kui kõikjal maailmas peavad suurfirmad joogastuudioid? Mis
        on saanud keha suhtest iseenda ja maailmaga, kui selle mängumaa on
        suuresti sotsiaalmeedia? Mida kujutab endast keha teaduslik käsitlemine,
        kui identiteedist on saanud tarbeese? Mida tähendab enda eest
        hoolitsemine, kui neoliberaalne valitsus ihaldab sitkeid alluvaid? Kas
        keha võib täita alternatiivsete strateegiate ja vastupanu rolli?
        Käesolev raamat tõestab, et võib küll!<br />

        <br />

        Toimetaja: **Mårten Spångberg**<br />

        Kaastöö: Tamara Antonijevic, Eleanor Bauer, Franco Berardi, Alice
        Chauchat, Yves Citton, Bojana Cvejic, Vanessa Desclaux, Mette Edvardsen,
        Tristan Garcia, Austin Gross, Graham Harman, Nikima Jagudajev, Anne
        Juren, Ana Juvanowich, Henrike Kohpeiß, Jennifer Lacey, Sri Louise,
        Mårten Spångberg, Ellen Söderhult<br />

        Kaastoimetajad: Moriah Evans, Lauren Bakst<br />

        Toetajad: The Swedish Art Council, Black Box theatre Oslo<br /> 

        Täname: Rootsi Suursaatkond Tallinnas<br />

        <br />

        **;PARANOIA PUBLISHING GROUP LTD**<br />

        <br />

        ;paranoia publishing group ltd. on rahvusvaheline suurematsorti
        kirjastuskompanii<br />


        nimi tuleb soome-ugri sõnadest „para“ (ülim) ja „noid“ (varitseja)<br />

        nime puhul tekkiv tähendusnihe on iseloomulik kirjastuse fookusele,
        mille fookuses on kõige psühhootilisemad transborder dataflow'd,
        pöördumatult immanentsi ületavad deterritorialisatsioonid,
        metatähenduste breakbeat ning hallutsineerivad psühhogeograafiad<br />


        need on statistiliselt kõige normaalsemad tekstid kaasaja
        kirjastusturul<br />

        ;paranoia eesmärk on vastutustundlik tegevus, tarbija rahulolu ja
        reaalsuse hävitamine.<br />

        [www.paranoia.ee/](http://www.paranoia.ee)<br />

        <br />

        **MARGE MONKO**<br /> 

        Women of the World<br />

        Lugemik<br />

        <br />

        Järjekorras neljas Marge Monko ja Lugemiku koostöös valminud trükis
        põhineb Monko videole „WoW” („Women of the World”), mida esimest korda
        näidati tema soolonäitusel “Stones Against Diamonds, Diamonds Against
        Stones” (kuraator Evelien Bracke) Tallinna Linnagaleriis, 12. jaanuarist
        kuni 11. veebruarini 2018.<br />

        Marge Monko uurib oma töödes iha fenomeni, reklaamitööstuses
        kasutatavaid koode ja strateegiaid, samuti naise kujutamist. Video
        lähtepunktiks oli firma De Beers 2003. a. reklaamikampaanias kasutatud
        lause „Kõik maailma naised, tõstke oma parem käsi". Ettevõte, mis siiani
        kontrollib suurt osa toorteemantide kaevandamisest ja levitamisest, oli
        selle kampaania sihtrühmaks valinud naised, kes saavad endale ise
        teemantsõrmuse ostmist lubada.<br />

        Video koosneb Hongkongis ja Antwerpenis filmitud materjalidest, 3D
        animatsioonidest, trükireklaamidest ja muust leidmaterjalist.
        Kaadritagune tekst keskendub De Beersi marketingi strateegiatele läbi
        erinevate aastakümnete, sealhulgas kuulsale sõnumile A Diamond is
        Forever ja müüdile, mille kohaselt teemantid on armastuse ja pühendumise
        sümbolid.<br />

        [lugemik.ee](https://www.facebook.com/lugemik)<br />

        <br />

        80 pp<br />

        140 × 245 mm<br />

        Edition: 400<br />

        Offset printing<br />

        Softcover<br />

        Inglise keeles<br />

        Tekst: **Marge Monko**<br />

        Graafiline disain: Indrek Sirkel<br />

        Set in Set in Gothic by Dinamo (Johannes Breyer & Fabian Harb), and EB
        Garamond<br />

        Printed by Tallinn Book Printers<br />

        Toetaja: Eesti Kultuurkapital<br />

        Published by Lugemik<br />

        ISBN 978-9949-7234-2-3<br />

        2018<br />
    description_en: >-
        New titles by several publishers are presented with the performative
        side up. The protagonists of these events are books and the
        possibilities of presenting them.<br />

        <br />

        **ELSE LAGERSPETZ, LOORE SUNDJA** <br />

        The Bible Hounds Songbook<br />

        Knock! Knock! Books



        *The Bible Hounds Songbook* brings together the drafts for three
        unpublished songs which were composed for the soundtrack of the
        children’s programme Bible Hounds. It is a fictitious B-list animated
        series that could have been conceived in the United States of the late
        1980s and become the staple in the Sunday morning entertainment of
        Christian families across America. In the post-Soviet Baltic States,
        where Christianity was being rediscovered, Bible Hounds would have
        gained considerably more ground than in the country of its birth. The
        single season of the series was enlivened by musical numbers, which were
        often surprisingly bold and suggestive for a conservative children’s
        programme.<br /> 

        In Songbook, the fun and absurd world of Bible Hounds is explored by
        notes, illustrations and descriptions of episodes that never saw the
        light of day.<br /> 

        <br />

        **Knock! Knock! Books** is an independent publisher based in Tallinn and
        Helsinki that publishes fictitious books. In the last two years, Knock!
        Knock! Books has taken part in book fairs in New York, Berlin and
        Helsinki and published works with publishers like Lugemik and
        Colorama.<br /> 

        [knock-knock.ee/](http://knock-knock.ee/)<br /> 

        <br /> 

        24 pp <br /> 

        220 × 300 mm  

        Edition: 400  

        Offset printing 

        Staple bound <br /> 

        In English <br /> 

        Written and designed by Else Lagerspetz & Loore Sundja<br />  

        Illustrations by Linda Gajewski, Else Lagerspetz & Loore Sundja 

        Music by Bill Tolley, Mikko Lagerspetz, Else Lagerspetz & Loore Sundja  

        Set in Bagnard and Kavivanar  

        Printed by Aktaprint <br /> 

        Published by Knock! Knock! Books in collaboration with Lugemik <br /> 

        ISBN 978-9949-7234-3-0 <br /> 

        2018<br />  

        <br /> 

        **MOVEMENT RESEARCH**
         
        In a new anthology, edited by Mårten Spångberg, movement research is
        reexamined to open discussions about the body, movement and embodied
        knowledge in our contemporary societies. The book consists of
        contributions from a wide variety of perspectives written by dancers and
        choreographers, activists and philosophers that all take movement
        research as their starting point.<br />

        <br />

        What is movement research today? What has happened to body practices
        when corporate interests run yoga studios across the world? What are the
        body’s relations to itself and the world when social media to a large
        extent is its playground? What is research into the body when identity
        has become a commodity? What is self-care when neoliberal governance has
        a craving for resilient subjects? Can the body function as a site for
        alternative strategies and resistance? This book is evidence that it
        can!<br />

        <br />

        Editor: **Mårten Spångberg**<br />

        Contributions by: Tamara Antonijevic, Eleanor Bauer, Franco Berardi,
        Alice Chauchat, Yves Citton, Bojana Cvejic, Vanessa Desclaux, Mette
        Edvardsen, Tristan Garcia, Austin Gross, Graham Harman, Nikima
        Jagudajev, Anne Juren, Ana Juvanowich, Henrike Kohpeiß, Jennifer Lacey,
        Sri Louise, Mårten Spångberg, Ellen Söderhult<br />

        Supporting editors: Moriah Evans, Lauren Bakst<br />

        Supported by: The Swedish Art Council, Black Box theatre Oslo<br /> 

        Special thanks: Rootsi Suursaatkond Tallinnas / Embassy of Sweden in
        Tallinn

        <br />

        <br />

        **;PARANOIA PUBLISHING GROUP LTD**


        ;paranoia publishing group ltd is a major international publishing
        company


        The aim of ;paranoia is to change meanings and give people the reality
        that they do not have


        The semantic shift in the name „paranoia“ is characteristic to our
        agenda – it derives from ancient Finno-Ugric words para and noid,
        meaning supreme and request


        We pose the basic questions about the established hierarchies of meaning
        within semiosphere 



        We provide our clients with carefully selected textual operations:


        - the most psychotic transborder dataflows 

        - irreversibly immanence-crossing deterritorialisations

        - breakbeat of meta-meanings and hallucinating psychogeographies


        – these are statistically the most abnormal texts in the modern literary
        market

        [www.paranoia.ee/](http://www.paranoia.ee/)<br />

        <br />

        **MARGE MONKO**<br /> 

        **Women of the World**<br />

        Lugemik<br />

        <br />

        The fourth collaboration between Marge Monko and Lugemik is based on
        Monko’s video WoW (Women of the World), first exhibited at her solo
        exhibition Stones Against Diamonds, Diamonds Against Stones, curated by
        Evelien Bracke, Tallinn City Gallery, January 12 – February 11, 2018.
        <br />

        <br />

        Marge Monko explores the phenomenon of desire, the codes and strategies
        used in advertising, and the representation of women through publicity
        images. The point of departure for the video was the slogan Women of the
        World, Raise Your Right Hand used in De Beers' advertising campaign in
        2003. With this message the company, which until this day controls the
        majority of mining and distributing rough diamonds, was targeting the
        women who can afford their own diamond ring. <br />

        The video consists of footage filmed in Hong Kong and Antwerp, 3D
        animations, print ads, and other found material. The voice over text is
        focusing on De Beers' marketing strategies through decades, the
        emergence of the famous slogan A Diamond is Forever, and the creation of
        a myth of diamonds as symbols of love and commitment.<br />

        [lugemik.ee](https://www.facebook.com/lugemik/)<br />

        <br />

        80 pp<br />

        140 × 245 mm<br />

        Edition: 400<br />

        Offset printing<br />

        Softcover<br />

        In English<br />

        Text by Marge Monko<br />

        Graphic design by Indrek Sirkel<br />

        Set in Set in Gothic by Dinamo (Johannes Breyer & Fabian Harb), and EB
        Garamond<br />

        Printed by Tallinn Book Printers<br />

        Supported by Cultural Endowment of Estonia<br />

        Published by Lugemik<br />

        ISBN 978-9949-7234-2-3<br />

