    description_et: >-
        Kristina Schinegger on Austria arhitekt, arhitektuuribüroo Soma
        kaasasutaja. Ta õppis arhitektuuri Viini Rakenduskunstiülikoolis, Wolf
        D. Prixi juhendamisel ja Londoni Ülikooli kolledžis Bartletti
        Arhitektuurikoolis. Teda on korduvalt premeeritud, muuhulgas Austrian
        Building Award’iga 2005. aastal, eksperimentaalsete tendentside
        tunnustusauhinnaga arhitektuuris 2006. aastal ja MAK Schindleri
        stipendiumiga 2008. aastal. Ta on olnud arhitektuuriteooria lektor Viini
        Tehnikaülikoolis ja

        alates 2012. aastast on ta koos Stefan Rutzingeriga Londoni Ülikooli
        kolledžis Bartletti Arhitektuurikoolis Unit 15 juhataja.


        Loeng kuulub samasse sarja 24. septembri ja 8. oktoobri loenguga ning on
        mõeldud nii arhitektuuritudengitele ja erialaprofessionaalidele, kui ka
        ruumikultuuri huviliste laiemale ringile.
