    description_et: >-
        NB! MUUDATUS ALGUSAJAS, UUS ALGUS KELL 14:00!


        Eesti Vabariigi juubeli puhul toovad teatriprogammi “Sajandi lugu”
        raames Rahvusooper Estonia ja Kanuti Gildi SAAL koostööna välja Manfred
        MIMi ooperi “Eesti ajalugu. Ehmatusest sündinud rahvas”.  


        Õnneliku juhuse tõttu sattus partnerite valdusesse Eesti ooperimaastikul
        seni avastamata libreto ning tundmatus noodikirjas partituur. Teose on
        kuuekümnendate paiku loonud novaatorlik leiutaja ja teadlane Manfred
        MIM. Juba pea kaks aastat kestnud visa töö tulemusena on MIMproject'i
        rohkem kui kümnest erinevate alade loovinimestest koosnev ühendus läbi
        töötanud enamiku Manfred MIMi märkmeid ning restaureerinud ja
        dešifreerinud partituuri. Tegemist on monumentaalse ülesandega,:
        Manfredi poolt pakutud lahendused nõuavad tehnika viimase sõna
        kasutamist ning kogu Rahvusooper Estonia, Kanuti Gildi SAALi ja
        MIMproject’i maksimaalset loomingulist ja tehnilist jõudu.  


        Ooperi “Eesti ajalugu. Ehmatusest sündinud rahvas” teisel avalikul
        tutvustamisel esitatakse katkendeid Manfred MIMi pärandi tõlkest
        kehakeelde, sealjuures segades klassikalist liikumist kaasaegsega.
        Ooperi koreograafilist materjali esitavad Eesti Rahvusballeti tantsijad.
        Lisaks 2016. aasta maikuus Kanuti Gildi SAALis esitletud avamängule saab
        nüüd kuulda ka esimesi ooperi elektroonilise muusika katkeid.
    description_en: >-
        NB! CHANGE IN STARTING TIME, NEW PRESENTATON TIME IS AT 14:00!


        On the occasion of the jubilee of the Republic of Estonia, Estonian
        National Opera and Kanuti Gildi SAAL will collaborate on a new opera
        “Estonian History. A Nation Born of Shock” by Manfred MIM.  


        Due to a lucky coincidence partners got a hold on of a yet undiscovered
        opera’s libretto and musical score written in an unknown way. Opera is
        created around sixties by innovative scientist and inventor Manfred MIM.
        After two years of insistent work by more than 10 creative members of
        MIMproject, they have now analysed through most of Manfred MIM’s notes
        and restored and deciphered the musical score. Creating the opera is a
        monumental task, as his ideas request the newest technology and maximum
        creative and technical force by the Estonian National Opera, Kanuti
        Gildi SAAL and MIMproject.  


        On the second showing of the opera, fragments form the translation of
        Manfred MIM’s legacy into a body language will be introduced, thereby
        mixing classical movement with the contemporary one. Opera’s
        choreographical material will be presented by the Estonian National
        Ballet dancers. In addition to the overture introduced in May 2016,
        excerpts from the opera’s electronical music will be played for the
        first time.
