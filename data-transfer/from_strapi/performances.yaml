    description_et: >-
        Jah, tõsi see on! Esimest korda külastab Eestit maailmakuulus
        Peaches!<br />

        <br />

        Peaches (Berliin) on legendaarne muusik, produtsent,
        performance-kunstnik, aktivist ning mida kõike veel võib ta nime taha
        kirjutada. Ta alustas oma tegevust 2000ndatal ja saavutas
        maailmakuulsuse singliga “Fuck the Pain Away”, peale mida on ta mööda
        maailma tuuritanud ja nihutanud piire elektroonilise muusika, hip-hopi
        ja punk-rocki vahel. Peaches ei nihuta piire mitte ainult
        muusikastiilide vahel, vaid seab kriitiliselt küsimuse alla
        stereotüüpsed kuvandid soorollidest ja seksuaalsusest. Tema
        performance’id on seksuaalselt laetud, äärmiselt visuaalsed ja jõulised
        vaatemängud.<br />

        <br />

        NU Performance Festivalil toimuva kontserdi keskmeks on üle kuue aasta
        ilmunud stuudioalbum “Rub” (2016).<br />

        <br />

        Õhtu avaesinejaks on karismaatiline Black Cracker (New York/ Berliin).
        Ta on muusik, performance-kunstnik ja mainekas slam-poetry tegija, kelle
        viimaste koostööde hulka kuuluvad koostööd HAU teatriga Berliinis, Saksa
        ooperiga ja teiste mainekate muusikute ning etenduskunstnikega üle
        maailma.

        Eestisse tuleb ta oma varsti välja antava albumiga COME AS U R!, mis
        varieerub talle omase Industial R&B/OFF Popi vahel, kombineerides
        hip-hopi, souli ja jersey clubi elemente.<br />

        <br />

        Õhtu lõpetab eesti päritolu Maria Minerva, kes elab ja tegutseb Los
        Angeleses.

        Minerva (kodanikunimega Maria Juur) on rahvusvaheliselt tunnustatud
        laulja, laulude kirjutaja ning keskkonnaaktivist.<br />

        NU Perfromance Festivalil tuleb esitamisele “Beyond the velvet rope”,
        sametine muusikaline avantüür, mis viib meid öösse.<br />
    description_en: >-
        Yes, it is true! The world-famous Peaches will be visiting Estonia for
        the first time!<br />

        <br />

        Peaches (Berlin) is a legendary musician, producer, performance artist,
        activist, and God-knows-what-else can be affixed to her name. She
        started out in the 2000s, achieving worldwide fame with the single ‘Fuck
        the Pain Away’; subsequently, she has been touring the world, shifting
        the boundaries between electronic music, hip-hop and punk rock. Not only
        does Peaches transfigure musical styles, but she also critically
        questions stereotypical images of gender roles and sexuality. Her
        performances are sexually charged, extremely visual, powerful
        spectacles.<br />

        <br />

        The concert at NU Performance Festival will centre on the studio album
        Rub (2016), her first in over six years.<br />

        <br />

        The opening act will be the charismatic Black Cracker (New York /
        Berlin). He is a musician, performance artist and acclaimed slam poet
        whose latest collaborations include working with the HAU theatre in
        Berlin, Deutsche Oper and other renowned musicians and performance
        artists from across the world.<br />

        He will be coming to Estonia with his soon-to-be-released album COME AS
        U R!, a variation on his hallmark Industrial R&B/OFF Pop, that combines
        elements of hip-hop, soul and Jersey club.<br />

        <br />

        The evening will be closed by the Estonia-born Maria Minerva, who is
        based in Los Angeles.

        Maria Minerva (legal name Maria Juur) is an internationally renowned
        singer, songwriter and environmental activist.

        For NU Performance Festival they will perform ‘Beyond the velvet rope’,
        a velvety musical adventure that will take you into the night.<br />
