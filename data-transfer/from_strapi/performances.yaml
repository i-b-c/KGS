    description_et: >-
        Lavastus „Mina, Sisyphos” vaatleb inimese igavest tagasijõudmist iseenda
        juurde. Juba antiikajast alates on filosoofid pead murdnud inimkäitumise
        absurdsuse üle. Millise tee ta ka valiks, kes iganes ta ka püüaks olla,
        milliseid väljapääse ta ka otsiks – ta jõuab alati tagasi iseenda
        juurde. Inimelu on ühe ja sama tegevuse kordumine. Spiraalne, muutumatu,
        etteaimatav. See pidev kordumine paneb meid mõtisklema mitte inimelu
        mõtte, vaid mõttetuse üle.  
          
        Aastal 2014 Marieta Golomehova ja Veselka Kuncheva asutatud teatri
        Puppet’s Lab („Nukulabor”) eesmärk on otsida uusi teatrivorme ja
        -vahendeid. Marieta ja Veselka on koostööd teinud juba üle 15 aasta ning
        võitnud mitmeid riiklikke ja rahvusvahelisi auhindu.  
          
        Sisyphose müüdist inspireeritud lavastus, mis keskendub inimese
        võitlusele iseendaga ehk sellele, kuidas inimese iga otsinguline rännak
        jõuab tagasi tema enda juurde. Lavastuses on väga mõjusaid visuaalseid
        nukulahendusi, mis aitavad lahti mängida inimese identiteedi igavikulisi
        küsimusi. Monolavastuse näitleja-tantsija teeb meeldejääva soorituse,
        „žongleerides” mängleva kergusega tantsuteatri, miimi ja nukuteatri
        vahel. – NuQ Treff festivali kunstiline juht Leino Rei.  
          
        Tähelepanu!   

        Lavastuses kasutatakse lavatossu.
    description_en: >-
        In “I, Sisyphus” we explore the journey of man’s eternal return to
        himself. Ever since antiquity, philosophers have pondered the absurdity
        of human behavior. Whichever road one may take, whoever else one tries
        to become, whatever escape-routes one might venture, he always continues
        to return to himself. Human life is a repetition of one and the same
        action. Spiraling, same, predictable. And this constant action makes us
        meditate not on the meaning, but on the meaninglessness of human life.  
          
        Inspired by the myth of Sisyphus, the show focuses on a man’s struggle
        with himself; on how his every quest leads back to himself. The
        performance includes some striking visual puppetry solutions, which are
        in dialogue with the main topic and help to play out the eternal
        questions of human identity. The actor-dancer of the solo show gives a
        memorable performance by effortlessly juggling dance, mime and puppet
        theatre. – Festival’s Artistic Director Leino Rei  
           
        The theatre company Puppet’s Lab was founded in 2014  by Marieta
        Golomehova and Veselka Kuncheva. The  aim of the company is to search
        new forms and innovative means in  theatre. Marieta and Veselka have
        worked together for more than 15 years. They have received many
        prestigious international and national awards.
