    description_et: >-
        **"THIRST" kui kinematograafiline keskkond on avatud 24.11 kell
        16:00-23:00 ning 25.11 kell 12:00-19:00**<br /> 

        <br /> 

        "THIRST" ("JANU") on audiovisuaalne filmi-installation, mis kujutab
        Atlandi ookeani raevuka tormi ajal. Visuaalselt ja heliliselt
        väljendusrikka meremaastiku dokumentatsioon on ränga tormi Fääri saartel
        ühekaadrilise lõikamata jäädvustuse tulemus koos helisalvestisega.
        Audiovisuaalne installatsioon kutsub sisenema häiritud vete, tuule,
        vihma ja müra maastikku ning kuulama seda distantsilt. Tegevus, mis on
        võimatu looduslike asjaolude korral, mil imetlus on asendunud hirmuga.
        Töö on esitatud kui suuremõõtmeline kinoinstallatsioon pimedas ruumis.
        Tagant projitseeritav ekraan on asetatud põranda tasapinnale, et
        publikul oleks võimalik vabalt selle ümber liikuda js et pakkuda
        ookeanirannikule sarnast kogemust.

        Projektsiooni ekraan on küllaltki suur ning seda saadab piisavalt
        tugevalt võimendatud heli, et ühtida tormi ajal kuuldava helilise
        efektiga.


        "THIRST" on kujutatud kui visuaalset monumenti ookeanile ränga tormi
        ajal, dokumentaal, mis pakub ainulaadset vaadet dünaamilisele
        maastikule, mille tekitab suurte mitte kunagi puhkavate veemassiivide
        rahutus, tuul ja vihm. Selle idee inspiratsioon tulenes isiklikust
        tormikogemusest, mida oleks olnud võimatu edastada muul moel, kui
        visuaalselt.

        Hõlbustamaks karmi ookeanimaastiku üle kandmist looduslikest
        tingimustest siseruumi oli vajalik kasutada niivõrd tõepärast
        esitusviisi, kui tehnilised võimalused seda lubasid.

        Selleks et seda ülesannet täita, mõeldi välja järgnev strateegia. 

        Filmimine toimus talvetormide perioodil Fääri saarte Atlandi ookeani
        rannikul. Visuaalselt ja heliliselt väljendusrikka merestseeni
        dokumentatsioon tehti ränga tormi ühekaadrilise lõikamata jäädvustusena
        koos live heli salvestusega. See filmiti liikumatult pinnalt rannikul,
        nii et kaamera vaatepunkt kattuks ligilähedaselt inimperspektiiviga,
        justkui seistaks kalda kindlal kaljul.

        Tehnilises plaanis andis filmimine tulemuseks 4k kinokvaliteediga
        materjali kestvusega ca 50 minutit.


        **Voldemārs Johansons**'i tööd sulatavad ühte tema huvi kunsti, heli ja
        teaduse vastu.Ta loob ekperimentaalseid projekte, mis sünteesivad kunsti
        ja heli ning uurivad erinevaid nähtusi, esitades kogemust nii kuuldavate
        vormide ja heli ruumilisuse kaudu kui ehitades keskkondi visuaalsetest
        ja akustilistest struktuuridest. Tema uurimuse huvipunktid on suunatud
        akustilise informatsiooni ja ruumiliste vormide orgaanilisele
        kombinatsioonile heliliste keskkondade ja skulptuuride loomisel,
        vaadeldes akustilisuse, visuaalsuse ja ruumilisuse ühendmorfoloogiat.
        Tema töödes lahustuvad nähtava ja nähtamatu taju piirid, luues
        sünteesitud tajusituatsioone.

        "Kunsti privileeg on olla võimeline rääkima sellest, mis on tõestamata,
        tundmatu, sedasi avardades mõtlemise silmapiiri," kommenteerib autor. 

        Johansons on osalenud Veneetsia arhitektuuribiennaalil, ArtGENDA'l,
        Ruhrtriennale'l, WAVES'il, muusikafestivalidel TodaysArt (Hamburg),
        Sound Forest (Riga), Unsound (Krakow) muu hulgas.

        JANU on näidatud Santarcangelo dei Teatri'l (Italy, 2016), Kochi
        Biennale'l (India, 2016 -2017), Festival Parallèle'il (Marseille, 2017),
        Lielais Dzintars'is / Great Amber Concert Hall'is (Liepaja, 2017), M/S
        Taani meremuuseumis (2017- 2018), Vooruit'is (Ghent, 2018).<br />

        [johansons.info](https://johansons.info/)<br />

        <br />

        LAT.EST festival saab teoks vahetult pärast Läti 100.sünnipäeva Kanuti
        Gildi SAALis ning tutvustab Läti kaasaegseid (etendus)kunstnike ning
        nende mõtteid ja tegemisi. Samuti on see pühendatud koostööle ja kõigele
        mis meid ühendab.

        LAT.EST festivali korraldab Kanuti Gildi SAAL koostöös Läti Uue Teatri
        Instituudiga ning see kuulub nii EV100 kui LV100 kultuuriprogrammi.
    description_en: >-
        **THIRST as a cinematic environment is open at 24.11 from 16:00 to 23:00
        and 25.11 from 12:00 to 19:00**<br /> 

        <br /> 


        THIRST is an audiovisual film installation depicting the Atlantic Ocean
        during a fierce storm. The documentation of the visually and sonically
        expressive marine landscape was produced in the Faroe Islands as
        single-shot uncut registration of violent storm with a sound recording.
        The audio-visual installation invites to enter the landscape of troubled
        waters, wind, rain and noise and to observe and listen to it from a
        distance, the action impossible in the natural circumstances when
        admiration is replaced with fear. The work is presented as a large-scale
        cinematic installation in a dark space. The back-projection screen is
        positioned at floor level for audience free to walk around to offer an
        experience similar to that of attending an ocean coast. 

        The projection screen is reasonably large and accompanied with a
        sufficient sound 

        amplification to match the sonic effect heard during a storm.


        THIRST is envisioned as a visual monument to the ocean during violent
        storm, a 

        documentary that offers a singular view to dynamic landscape produced by
        agitation of large masses of water, never at rest, wind and rain. The
        inspiration for this idea came from a personal experience of a storm
        that would be impossible to tell otherwise than visually. 

        In order to facilitate the transfer of the austere ocean landscape from
        the natural conditions to an indoor space, it is necessary to employ a
        mode of presentation 

        as truthful as possible by technical means. 

        In order to accomplish this task, the following strategy was devised. 

        The filming was carried out during the period of winter storms in the
        Faroe Islands on the coast of the Atlantic Ocean. The documentation of
        the visually and sonically expressive marine scene was produced as a
        single-shot unedited registration of a violent storm, with a live sound
        recording. It was shot from a steady ground of the coast, so that the
        camera view coincides closely with a human perspective when standing on
        the firm rock of shore.

        In technical terms, the filming resulted with 4k material of cinema
        quality and 

        duration of ca. 50 minutes. 


        The work of **Voldemārs Johansons** merges his interests in art, sound
        and science. He creates experimental projects that synthesize art and
        sound and explore diverse phenomena representing the experience through
        audible forms and spatiality of sound as well as building environments
        from visual and acoustic structures. His research interests address
        organic combination of acoustic information and spatial forms in
        creation of sonic environments and sculptures, examining the joint
        morphology of acoustic, visual and spatial domains. In his work the
        borders of visible and invisible perception dissolve creating a
        synthesized perceptual situations. 

        "Art has the privilege of being able to speak about the unproven, the
        unrecognized, thus broadening the horizons of thinking," comments the
        author. 

        Johansons has participated in Venice Architecture Biennale, ArtGENDA,
        Ruhrtriennale, WAVES, music festivals TodaysArt (Hamburg), Sound Forest
