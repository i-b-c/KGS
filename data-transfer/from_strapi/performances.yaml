    description_et: >-
        Selgelt omanäoline soome kaasaegse muusika kooslus defunensemble
        esmaesitleb kõige olulisemaid töid nii klassikalisest kui kaasaegsest
        elektro-akustilisest repertuaarist. Käesoleval õhtul tulevad esitlusele
        järgmiste heliloojate tööd: Veli-Matti Puumala, Kemialliset Ystävät ja
        Sami Klemola. Defunensemble loodi 2009. aastal ning on tuntud oma
        innovatiivsete kontsertide poolest, millel esitletakse soome kaasaegse
        muusika skeene kõige aktiivsemaid tegijaid. See on rahvusvaheline ja
        uuriva laadiga muusika ja defunensemble on tabanud naelapea pihta.<br />

        <br />

        <a href="http://defunensemble.fi">defunensemble.fi</a><br />

        <br />

        Õhtu programm: Veli-Matti Puumala: New work (first performance),
        Kemialliset Ystävät / Jan Anderzén: New work (first performance), Sami
        Klemola: New work (first performance)
    description_en: >-
        Highly distinctive Finnish contemporary music group, defunensemble,
        gives premieres of the most essential electroacoustic repertoire both
        classic and current, while simultaneously actively commissioning new
        works incorporating the latest technologies. Tonight defunensemble will
        perform new works by composers Veli-Matti Puumala, Kemialliset Ystävät
        and Sami Klemola. The group formed in 2009 is known for its innovative
        concert programmes performed by some of the most active personalities in
        the Finnish contemporary music scene. This is international exploratory
        music, and tonight defunensemble will nail it.<br />

        <br />

        Formed only as recently as in 2009, defunensemble has astonishingly fast
        established itself as one of the most important contemporary music
        groups in Finland. The ensemble’s vigorous mission is to systematically
        delve into the world of electroacoustic music. Defunensemble gives
        Finnish premieres of the most essential electroacoustic repertoire both
        classic and current, while simultaneously actively commissioning new
        works incorporating the latest technologies. With artistic director Sami
        Klemola the ensemble’s concert concepts have proven to be highly
        innovative, blending different sub-genres of the electroacoustic
        persuasion with an unprecedented street credibility—any dusty notions of
        classical music are soon forgotten. A serious professional undertaking,
        the musicians and sound designers of defunensemble are some of the most
        active personalities in the Finnish contemporary music scene. After
        conquering the major Finnish festivals, the ensemble is already gaining
        international pull, their concert calendar is filling rapidly.<br />

        <br />

        <a href="http://defunensemble.fi">defunensemble.fi</a><br />

        <br />

        Evening program: Veli-Matti Puumala: New work (first performance),
        Kemialliset Ystävät / Jan Anderzén: New work (first performance), Sami
        Klemola: New work (first performance)
