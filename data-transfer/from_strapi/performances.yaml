        Saksa arhitekt Jannis Merz lõpetas Innsbrucki ülikooli 2013. aastal ning
        alustas tööd Snøhetta ahitektuuribüroos, peamiselt rahvusvaheliste
        projektidega. Üks põnevamaid näiteid tema tööst on Bolanzo õhutrammi
        jaam, mis esindab Snøhetta arhitektuuri ja maastiku sidumisel põhinevat
        filosoofiat. Snøhetta töödes on maastik enamat kui vaid kontekst - seda
        kasutatakse sotsiaalse ja demokraatliku instrumendina, inimese ja
        arhitektuuri vahelise ühendava lülina. <br />

        Koostöös Prantsuse arhitektuuristuudio Cao Perrot’ga, töötas Jannis
        viimased paar aastat Swarovski Crystal World projektiga Wattensis.
        Tuntuks saanud kui Mängutorn, on Swarovski projekt prototüüpne näide
        hoonest, mis kasutab maastikulisi vahendeid vertikaalselt organiseeritud
        ning üksteise kohale asetatud siseruumides. <br />
         [snohetta.com](http://snohetta.com/) <br />
         <br />
        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile. Loengud on inglise keeles ning tasuta. <br />
    description_en: >-
        Graduated at the University of Innsbruck Jannis started working as an
        architect for Snøhetta in 2013, contributing to several international
        projects, like for example the cable car station in Bolzano,
        strengthening Snøhettas philosophy focusing on the deep connection
        between architecture and landscape. In Snøhettas work, landscape is more
        than context - it is often utilized as a social democratic tool,
        allowing human interaction.

        In collaboration with the French studio Cao Perrot, he worked at the
        innovative project for Swarovski Crystal World in Wattens. The so-called
        “Playtower” is a prototypical example of a building that uses landscape
        vocabulary in a series of stacked interior spaces. <br />
         [snohetta.com](http://snohetta.com/)  <br />
         <br />
        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment. The lectures are
        held in English, free of charge. <br />
