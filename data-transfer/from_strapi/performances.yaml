    technical_info_et: "Loodud ja esitatakse koostöös: **Tamara Alegre, Simon Asencio, Linda Blomqvist, Louise Dahl, Emma Daniel, Hana Lee Erdman, Adriano Wilfert Jensen, Mårten Spångberg, Else Tunemyr, Marika Troili, Alexandra Tveit**  \nSuur tänu **Liza Penkovale**, kelle tantsumaterial on Natteni keskmeks.  \_\nNatten sündis tihedas koostöös tudengitega PARTS-ist. Meie aeg koos oli eriline. Suur aitähh **Liza Baliasnaja, Nikita Chumakov, Sien Van Dycke, Akiyoshi Nita, Eileen Van Os, Laura Maria Poletti, Kamola Rashidova, Adriano Vicente.**  \nTänud **Mette Edvardsen**, lihtsalt imeline, ja **Linda Blomqvist** (igavesti), **Silvia Fanti, Silvia Bottiroli, Tove Dahlblom, Maria Jerez, Alejandra Pombo, Christophe Slagmuylder, Jon Resdal Moe, Danjel Andersson, Ben Woodard, Christian Töpfner**.  \nKoostöös: XING Bologna, Kunsten Festival Des Arts Brussels, Black Box Theatre Oslo, Santarcangelo Festival, MDT Stockholm  \nSai võimalikuks PAF St. Erme toetusel.  \nToetajad: The Swedish Arts Grants Committee, The Swedish Art Council, The City of Stockholm  \nKestus: 23:00-6:06  \nKeel ei ole takistuseks!<br /> \n<br />\nÜksikpiletid: 10/14 EUR kuni 09.08, 10.08 alates 12/16 EUR  \nSaripilet: ostes korraga 5 või enam piletit (ühele või erinevatele üritustele) 9 EUR<br />\nNB! Lavastus toimub OMAtsirkuses / Kopli 25."
    technical_info_en: "With and by: **Tamara Alegre, Simon Asencio, Linda Blomqvist, Louise Dahl, Emma Daniel, Hana Lee Erdman, Adriano Wilfert Jensen, Mårten Spångberg, Else Tunemyr, Marika Troili, Alexandra Tveit**  \nA special thanks to **Liza Penkova** who provided a central dance material to Natten.  \nNatten was developed in close collaboration with a group of students at PARTS. Our time together was extraordinary. Thank you so much Liza Baliasnaja, Nikita Chumakov, Sien Van Dycke, Akiyoshi Nita, Eileen Van Os, Laura Maria Poletti, Kamola Rashidova, Adriano Vicente.  \nThanks to Mette Edvardsen just amazing and Linda Blomqvist (forever), Silvia Fanti, Silvia Bottiroli, Tove Dahlblom, Maria Jerez, Alejandra Pombo, Christophe Slagmuylder, Jon Resdal Moe, Danjel Andersson, Ben Woodard, Christian Töpfner.  \nIn collaboration with: XING Bologna, Kunsten Festival Des Arts Brussels, Black Box Theatre Oslo, Santarcangelo Festival, MDT Stockholm  \nMade possible with the support of PAF St. Erme  \nSupported by: The Swedish Arts Grants Committee, The Swedish Art Council, The City of Stockholm.  \nDuration: 23:00-6:06  \nLanguage no problem!<br />\n<br />\nSingle tickets: 10/14 EUR on\_presale until 09.08, starting from 10.08 priced 12/16 EUR<br /> \nSerial ticket: if you buy 5 or more tickets at once (to the same or different events) 9 EUR<br />\nNB! The performance takes place at OMAtsirkus / Kopli 25."
