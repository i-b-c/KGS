    description_et: >-
        <strong>Scott L. Miller</strong>, Ph.D, on helilooja, kompositsiooni
        ning elektroakustilise muusika ja teooria professor St. Clouds State
        Ülikoolis USA-s. Ühtlasi on ta Ameerika Elektroakustilise Muusika Ühingu
        (SEAMUS) president.Ta on tuntud&nbsp;interaktiivse kammermuusika ning
        Kyma reaalajas&nbsp;kasutamise poolest.<br />

        <br />

        <strong>Mart Soo</strong> on kitarrist, pedagoog ja helilooja.
        Improvisatsiooniline muusika, jazz, minimalism, maailmamuusika. Mänginud
        mitmete tuntud improviseerijatega: Fred Frith, Xavier Charles, Paul
        Lovens, Jean-Marc Montera, Eugene Chadbourne jpt. Esinenud Euroopas,
        Jaapanis ja USAs.<br />

        <br />

        Aprillis 2016. aasta andsid Miller ja Soo THREE FREE RADICALS nime all
        välja digialbumi Diary of a Left-Handed Sleepwalker (Panoramic
        Recordings pan04).<br />

        <br />

        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.<br />

        <a href="http://www.improtest.ee"><br />

        www.improtest.ee</a><br />
    description_en: >-
        <strong>Scott L. Miller</strong> is known for his interactive
        electroacoustic chamber music, ecosystemic performance pieces, and use
        of the Kyma sound design environment in free improvisation. He is a
        Fulbright Scholar, has been a Lucas Arts Fellow, and twice been named a
        McKnight Composer Fellow. He is currently a Professor of Music at St.
        Cloud State University, Minnesota, and President of the Society for
        Electro-Acoustic Music in the U.S. (SEAMUS).<br />

        <br />

        <strong>Mart Soo</strong> is Tallinn based guitarist, composer and
        improviser. In addition to guitar, he employs live electronics in the
        performance of free improvisation, jazz, and minimalist music. He
        composes for radio plays, theater, and film. Mart Soo has performed and
        collaborated with an impressive cast of international musicians at
        festivals throughout Europe, Japan, and the U.S. The musicians he has
        worked with represent a wide and diverse range of music styles - jazz,
        classical, non-Western, improvised, electro-acoustic, vocal: Fred Frith,
        Xavier Charles, Brian Melvin, Markus Reuter, Uchihashi Kazuhisa, Weekend
        Guitar Trio, Paul Lovens, Jean-Marc Montera, Vox Clamantis etc.<br />

        <br />

        Under the name THREE FREE RADICALS Miller and Soo released digital album
        Diary of a Left- Handed Sleepwalker(Panoramic Recordings pan 04) in
        April 2016.<br />

        <a
        href="http://www.newfocusrecordings.com/catalogue/three-free-radicals-diary-of-a-left-handed-sleepwalker/">http://www.newfocusrecordings.com/catalogue/three-free-radicals-diary-of-a-left-handed-sleepwalker/</a><br
        />

        <br />

        Improtest is concert series that brings improvisational music from local
        and foreign authors to local audience. The concerts have been taking
        place since 2005 once a month.<br />

        <br />

        <a href="http://www.improtest.ee">www.improtest.ee</a><br />
