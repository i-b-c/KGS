    description_et: >-
        Tuul on suur rändaja. Ta aitab rõõmuga laevu merel ja keerutab tolmu ka
        kõige kaugematel teedel. Ta paneb hõbekellad helisema ja paljud jutud,
        mille tuul kaugetelt maadelt kaasa toob, saavad tõeks. Aga kus tuul
        elab? Asume koos rännakule, et ta kodu leida.  


        See sõnatu lavastus on suurepärane näide sellest, et kunst ei vaja
        keelt. Teater Mali etendus tõestab selgelt, et sõnad ja vestlused võivad
        olla sama ebavajalikud kui kallid aksessuaarid. „Kus elab tuul“ tuletab
        meile meelde, et kunst ja ilu võivad sündida kõige lihtsamatest
        asjadest, näiteks plastikust.


        See on üllatavalt lihtne ja selge lugu väikelastele, mis muudab tuule
        elavaks tegelaseks. Hiiglaslikud kiled tekitavad laval lausa
        tuulepuhanguid. Ühel hetkel puhub üle väikeste vaatajate kerge tuuleke,
        järgmisel aga merevett pritsiv tormi-iil. Lühikesed lookesed tuiskavad
        järjestikku mööda nagu tuulest viidud: näeme lugusid jaanimardika kinni
        püüdnud mehest, lehviva salliga vaprast poisist ja magava tüdruku
        värvilistest unenägudest.  


        Lavastuse peategelane on ilmastikunähtus – teedelt ja muinasjuttudest
        tuttav tuul. Olles laval küll nähtamatu, peegeldub ta kujutlusvõime jõul
        vastu vaatajate nägudelt. See sõnadeta lugu tuule mõtte otsimisest on
        ehk pigem üks kaunis ja värvikas seiklus kui lihtsalt teatrietendus.  


        1990.aastal asutatud Novgorodi laste- ja noorsooteatrit Mali juhib
        kunstiline juht Nadežda Aleksejeva. Teater on rahvusvahelise laste- ja
        noorteteatrite ühenduse ASSITEJ ning IETM-i liige ja osaleb aktiivselt
        Vene teatriliidu projektides. Mali on külastanud teatrifestivale
        Jaapanis, Lõuna-Koreas, Norras, Austrias, Šveitsis, Türgis,
        Prantsusmaal, Hispaanias, Lätis, Leedus, Eestis, Ungaris, Poolas ja
        mujal, samuti osalenud festivalidel Moskvas ja Peterburis. 1992. aastal
        pani Mali aluse rahvusvahelisele teatrifestivalile Kingfestival, mis
        keskendub mütoloogiale teatrivaldkonnas ning on võõrustanud enam kui 150
        teatrit üle maailma. Tänapäeval on Mali dünaamiliselt arenev teater,
        milles ruumi eksperimenteerimisele, muutustele ja uuenduslikele
        vormidele. Teater ei karda nihutada žanripiire ja toob lavale nii
        draama- kui ka liikumis- ja objektiteatrilavastusi.
    description_en: >-
        The wind is a great traveller; it is happy to help ships in the open sea
        and it raises dust on the most distant of roads. Silver bells ring with
        its help and numerous stories, brought by the wind from far away, come
        true. But where does the wind live? Let’s set off on a journey to find
        its home.  


        Novgorod theatre Mali for children and youth was founded in 1990 and is
        headed by the artistic director Nadezhda Alexeeva. The theatre is a
        member of International Association of theatres for children and youth
        (ASSITEJ), an IETM member and an active participant of projects of the
        Theatre Union of Russia. It has visited theatre festivals in Japan,
        South Korea, Norway, Austria, Switzerland, Turkey, France, Spain,
        Latvia, Lithuania, Estonia, Hungary, Poland and others, as well as
        Russian festivals in Moscow, Saint-Petersburg, etc. In 1992, theatre
        “Mali” founded the International Theatre Kingfestival, which is
        dedicated to mythology in theatrical sphere and has hosted more than 150
        theatres from across the world. Nowadays, theatre "Mali" is a
        dynamically developing theatre space; there is room for experiment,
        transformation, and innovational forms. The theatre is not afraid to
        expand genre borders and creates both drama performances as well as 
        performances of object and movement theatre.
