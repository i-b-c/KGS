    description_et: >-
        <!-- Toimetatud 25.01.16 -->

        <p>

        Kõik on võimalik.<br />

        <br />

        <strong>Alvar Loog (Sirp): </strong>Renate Keerdi „PURE MIND”,
        kompromissitu take no prisoners tüüpi kunstiteos, mis tulistab salve
        publikusse pidemeni tühjaks. Keerdi mänguliselt provokatiivne lavastus
        hülgab suurema osa teatriga seonduvatest konventsionaalsetest
        tähendusloome mehhanismidest ja laiatarbe tähendussisudest ning – mis on
        eriti tänu- ja tähelepanuväärne – kaotab vähimagi sideme kirjanduse ning
        kirjanduslikkusega, mis on olnud sajandeid traditsiooniliselt igasuguse
        teatriteo ainumõeldavaks vundamendiks. Selline lavastus kaunistaks ja
        rikastaks iga teatri- ning (miks mitte ka) rokifestivali.<br />

        <br />

        <strong>Mele Pesti (Eesti Päevaleht):</strong> „PURE MIND” veeretas
        lavale puhta mängu, sukeldus häbitult värvilisse alateadvusse ja lubas
        vaatajal enda omas sobrada, ei kartnud sensuaalsustki. Seksistlik
        vahemärkus: kui Eesti teatri refrääni kuulub ohtralt üheülbalisi
        objektistatud naiste rolle, siis siin olid ilusad noored mehed naistega
        võrdselt vabaks lastud.</p>

        <p>

        [www.uusteater.ee](http://www.uusteater.ee/)
    description_en: >-
        Renate Keerd's „PURE MIND", uncompromising take no prisoners work of art
        that empties breech straight into the audience. Playfully provocative
        performance abandons most of conventional meaning creation mechanisms
        and wide range contents related to theatre and - which is especially
        remarkable - looses the connections with literature and literary,
        things, that have traditionally been the base of any theater practice
        through centuries. A performance like this would decorate any theater
        and (why not)  rock festival."  Alvar Loog / Sirp<br />

        <br />

        **Renate Keerd** is an Estonian freelance choreographer and director who
        has performed her works in many international festivals in Europe and
        Asia. Has been the laureate of Estonian dance award Philip Morris twice.
        In 2004 she founded a contemporary dance and theatre studio DREEK and in
        2012 a company of physical theatre Kompanii NII.<br />

        <br />

        **Kompanii Nii** is a physical theatre group with its own but where by
        performances different guest performers may be added. Director and
        artistic director is Renate Keerd, members are Liisa Tetsmann, Taavi
        Rei, Maarja Roolaht and Gerda-Anette Allikas.<br />

        <br />

        [www.uusteater.](http://www.uusteater.ee/)
