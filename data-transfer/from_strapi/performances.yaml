    description_et: >-
        Lelio Giannetto on bassimängija Palermost, Itaaliast. Ta on olnud
        aktiivne nii jazzmuusika kui eksperimentaalse muusika skeenel alates
        1980. aastate algusest. Tema jazzmuusikas alanud karjäär on järk-järgult
        liikunud nüüdismuusika ja improvisatsiooni radikaalsemate vormide
        suunas. Lelio on aktiivne artist nii kodumaal Sitsiilias kui ka
        rahvusvaheliselt, kus tema lavapartnerite seas on teiste hulgas näiteks
        Fred Frith, Joélle Leandre, Michel Doneda, Butch Morris jpt. Lelio
        Giannetto on uue muusika organisatsiooni Curva Minore kunstiline juht.  


        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.   

        [www.improtest.ee ](http://www.improtest.ee /)<br />
    description_en: >-
        Lelio Giannetto is a bassist from Palermo, Italy. Active on the Jazz and
        Experimental scene since the early Eighties, his career began with Jazz
        and has progressively moved towards contemporary music and radical
        improvisation. A specialist in Solo performances he has played for first
        music of Sicilian composers such as Incardona, Gagliano and Crescimanno
        next to works of John Cage, Giacinto Scelsi, and Giovanni Damiani. In
        the early Nineties he was amongst the founders of BASSESFERE in Bologna,
        of the MAMA QUARTETTO with Jim Dvorak, Carlo Actis Dato, Marcello
        Magliocchi and the Trio D'Orchi. He has collaborated with Gianni Gebbia,
        Fabrizio Puglisi, Ernst Reijsiger, Jean-Mark Montera, Pino Minafra,
        Joëlle Leandre, Fred Frith, Butch Morris, Wolter Wierbos, Antonello
        Salis, Maggie Nicols, Bob Osterberg, etc. He has participated in many
        music festivals including Angelica Bologna, Clusone, Bolzano, Bimhuis
        Amsterdam, Festival Ibleo del Jazz, Podewil Berlino etc. Lelio Giannetto
        is the art director of CURVA MINORE contemporary sounds, association for
        development of contemporary music working in Sicily since 1997.   


        Improtest is concert series that brings improvisational music from local
        and foreign authors to local audience. The concerts have been taking
        place since 2005 once a month.  

        [www.improtest.ee ](http://www.improtest.ee /)<br />
