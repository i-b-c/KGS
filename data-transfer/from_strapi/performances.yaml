    description_et: >-
        “Binaural vision” on multimeedialavastus, milles on võrdsel kohal neli
        meediumit - liikumine, video, heli ja ruum. See on lavastuslik
        eksperiment, et tekitada lavalolija ning publiku jaoks ulmeline
        alternatiivreaalsus. Teades, et tavapärase kiire elutempo keskel on
        paljudel inimestel fookus käesolevatel kohustustel või muudel isiklikel
        mineviku-, oleviku- ja tulevikuteemadel, oma mõtetel ning lahendusi
        vajavatel probleemidel, soovime luua publiku jaoks maailma, kus lasta
        neil meel täielikult vabaks ning rännata ennastunustavalt, lasta end
        minna kaasa hüpnoosiga ning jõuda transiseisundisse. Kõigi meediumite –
        liikumine, video, heli, ruum – sümbioosis loome hüpnootilise vaatemängu,
        mis tekitaks reaalsuses kahtlemise illusiooni.<br />

        <br />

        Liikumine - <strong>Rauno Zubko</strong><br />

        Rauno Zubko on tantsuõpetaja ning vabakutseline koreograaf ja lavastaja.
        Oma töös hoiab ta end pidevas arengus läbi katsetuste ja praktika,
        tekitades endale uusi väljakutseid. Loomingus soovib ta publikule jätta
        võimalikult suure vabaduse tõlgendamiseks. Tema jaoks on oluline köitev
        visuaalne ning kompositsiooniline tervik. Liikumises peab kõige
        olulisemaks kehateadlikkust ning kohalolu ruumis ja hetkes.<br />

        <br />

        Video ja visuaalid - <strong>Mikk-Mait Kivi</strong><br />

        Mikk-Mait Kivi on multimeediakunstnik, kes on loonud aastate jooksul
        teoseid erinevates valdkondades alates graafilisest disainist ja
        fotograafiast kuni suuremate installatsioonide ja üritusteni välja.
        Talle meeldib alati leida uusi lähenemisi ja võimalusi, kuidas astuda
        samm edasi sellest, mida on eelnevalt teinud. Peamine põhimõte selle
        juures on, et iga järgmine projekt peaks olema parem, huvitavam ja
        teistsugusem, kui eelmine. Praegu on tema jaoks oluline luua
        tehnoloogiliste lahenduste ja inimeste vahel võimalikult vahetu ja
        otsene suhe, läbi mille saab võimendada ruumi reaalsust &nbsp;reaalajas
        otsuseid tehes.<br />

        <br />

        Heli - <strong>Kristjan Kiik</strong><br />

        Kristjan Kiik on vabakutseline helikunstnik. Oma muusikaga soovib ta
        võimalikult väheseid vahendeid kasutades publiku kuulmismeelte täit
        tähelepanu köita.<br />

        <br />

        Ruum -<strong> Kaia Tungal</strong><br />

        Kaia Tungal on vabakutseline stsenograaf. Soovides hallata erinevaid
        meediume ning erialaselt paindlikuks jääda, on ta jaganud oma aja filmi
        ja teatri vahel, püüdes erialast mitmekülgsemat kogemust saada. Oma
        loomingus eelistab ta kasutada enamasti minimalistlikku stiili, kuid
        lähtub eelkõige käesolevast teosest, sellega seotud inimestest,
        keskkonnast ning eelkõige sõnumist. Loomingu puhul ongi kõige tähtsam
        sõnum, mida loodud visuaal peab toetama. Oluline on see, mis saab
        teosest siis, kui autor on teosest lahkunud ja tekib loodu kokkupuude
        vaatajaga.<br />

        <br />

        Koreograaf, lavastaja, etendaja: <strong>Rauno Zubko</strong><br />

        Video, visuaalid: <strong>Mikk-Mait Kivi</strong><br />

        Helikujundus: <strong>Kristjan Kiik</strong><br />

        Kunstnik: <strong>Kaia Tungal</strong><br />

        Lavastuslik abi:<strong> Laura Kvelstein</strong><br />

        Kaasproduktsioon: Kanuti Gildi SAAL<br />

        Toetajad: Teater Von Krahl, Eesti Kultuurkapital, Hiiumaa
        TantsuFestival<br />

        Tänud: Sandra Veermets, Ando Naulainen<br />

        Kestus: 90’<br />

        NB! Lavastust on võimalik toetada Hooandjas - www.hooandja.ee
    description_en: >-
        Binaural Vision is a multimedia performance that comprises of four
        elements – movement, video, sound and space. Through a performative
        experiment, we are aiming to create an alternate reality. The fast pace
        of modern life forces people to focus on their daily routine or on past,
        present or future concerns. Acknowledging the need to escape the circle,
        we are set out to create a world in which the audience can let their
        senses drift freely into a state of trance. Through the symbiosis of the
        mediums – movement, video, sound and space – we are creating a hypnotic
        spectacle, which will transform reality into illusion.

        <br />

        Choreography, directing, performance:&nbsp;<strong>Rauno
        Zubko</strong><br />

        Video, visuals: <strong>Mikk-Mait Kivi</strong><br />

        Sound: <strong>Kristjan Kiik</strong><br />

        Stage Design:<strong> Kaia Tungal</strong><br />

        Consultant: <strong>Laura Kvelstein</strong><br />

        Coproduction: Kanuti Gildi SAAL<br />

        Supporters: Von Krahl Theatre, Estonian Cultural Endwoment, Hiiumaa
        TantsuFestival<br />

        Many thanks to: Sandra Veermets, Ando Naulainen<br />

        Duration: 90'<br />

        NB!&nbsp;The project can be supported at the crowd funding
        site&nbsp;Hooandja – www.hooandja.ee<br />
