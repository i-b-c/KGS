    description_et: >-
        Olete oodatud meie residentuuri work-in-progress showingule, mis algab
        Kanuti Gildi Saalist. Showingu osa on teekond läbi linna ja asi ise
        kestab kokku umbes 40 minutit.


        Residentuuris uurisime inimesi ja subkultuuri, kelle fookuses ja hobiks
        on autod. Nende tundmine, tuunimine; autodes ja autodega hängimine,
        suvalt ringi sõitmine. Norra keeles råning, Eestis võiks seda parema
        termini puudumisel kutsuda autoosluseks.

        Meid huvitab rånerite performatiivne ja teatraalne potentsiaal: kuidas
        autode kogunemisest saab etendus ja üksikust autost tantsija
        råningurituaali koreograafias.


        Hazel Barstow (NO) töötab stsenograafia, performance’i ja kujutava
        kunsti kohtmis- ja ülemineku-punktis. Tema looming toetub tihti
        isklikule kogemusele ja kasutab loo jutustamiseks ka detaile ühiskonna
        kollektiivsest mälust. Hazelit huvitab väljamõeldise ja tõelisuse
        omavaheline suhe ning inimeste kujutelmad üksteisest, omavahelistest
        suhetest ja ühiskonnast laiemalt. Läbiv teema tema teostes on banaalsus
        ja (võlla)huumor.


        Maret Tamme (EE) on etenduskunstnik Eestist. Hetkel töötab ta erinevate
        teatriprojektide raames Taanis, Saksamaal ja Eestis nii stsenograafi,
        lavastaja kui ka dramaturgina. Teatris hindab Maret ausust ja tühja
        ruumi potentsiaali. Teda huvitab keskkonnasäästlik stsenograafia, mis on
        sümbioosis või mõtestatud konfliktis nii olemasoleva ruumi kui ka
        lavastusega.
    description_en: >-
        A research into performative qualities of cars and the subculture called
        råning (Norwegian) or autooslus (term to be specified in Estonian). We
        are fascinated by people who have cars and purposeless driving as a
        hobby. How the cars hang out. How rånere define their freedom of
        expression and how to use qualities of their car-gathering rituals in
        performative actions.   


        We investigate towards a possible carography: a dance piece performed by
        cars and their owners.   




        **Hazel Barstow** (NO) works in the crossover between scenography,
        performance and fine arts. Her works often derive from details of her
        own life and society as a basis of storytelling. She is currently
        investigating the relationship between biography and fiction, and what
        kind of images we have of each other and our roles in society. A
        recurring theme in her projects is banality and the use of humour to
        enhance serious topics. Her performances are usually constructed with a
        clear frame which allows for improvisations and “stunts”.   


        **Maret Tamme** is a developing theatre artist from Estonia. She is
        currently working on theatre productions in Denmark, Germany and Estonia
        where her work is in a dynamic flow between scenography, directing and
        dramaturgy. In theatre Maret appreciates honesty and the potential of
        void spaces. She is interested in creating sustainable scenography that
        relates to and questions profoundly the exciting architecture as well as
        the action in space. As a theatre artist the most important is to be
        relevant to the present moment.<br />
