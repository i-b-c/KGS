    description_et: >-
        19. sajandil mõjutasid ühiskonna ja teadmiste loomet oluliselt rassism,
        kolonialism ja anti-semitism ning natsionalism. Sel ajal hävitati
        järjekindlalt kõiki põlisrahvaid, kes ei vastanud “tsiviliseeritud”
        normile. Sellegipoolest mõjutavad need hävitatud narratiivid meie
        kohalikku ja globaalset konteksti tänasel päeval.  

        “Tafukt/Päike/Ateena” on tantsuetendus, mis on osa triloogiast, mis
        tegeleb Põhja-Aafrika põlisrahvuse Amazigh’i episemoloogia ja
        mütoloogiaga. Lavastuste triloogia keskendub kolmele naisjumalannale,
        kes on kultuuride ja ajaloo hübriidid: Nithe, Tanit ja Ateena.

        Amazigh’i kultuuri järgselt on Ateena tegelik sünnipaik Tritonise järv
        Liibüas, enne kui tema tegelaskuju adopteeriti kreeklaste poolt Vahemere
        teisel kaldal. Nende epistemoloogiate algallikate sügavamad uuringud
        annavad meile võimaluse teatud olulisi osi ajaloost re-defineerida ja
        välja pakkuda või ette kujutada teistsuguseid lahenduskäike, et
        vaidlustada hetkel valitsevaid koloniaalseid ja patriarhaalseid
        kaanoneid. Sel kujul saab lavastus toimida kui vastupanuvahend selleks,
        et luua ruumi uuele mineviku tõlgendamise paradigmale, et jõuda
        kaasahaaravama tulevikuni.  
          
        Radouan Mriziga (1985) on koreograaf Marrakech’ist, kes hetkel elab ja
        töötab Brüsselis. Peale tantsuõpinguid Marokos, Tuneesias ja
        Prantsusmaal lõpetas ta P.A.R.T.S.’i Brüsselis. Küllaltki kiiresti asus
        ta tegelema oma loominguga ning lavastuste tuuritamisega üle kogu
        maailma. Mriziga on pikaajaline resident Moussem Nomadic Arts Centre’s
        ja perioodil 2017-2021 ka Kaaitheater’is Brüsselis.   
          
        MORE THAN THIS on koostööprojekt, mis seob omavahel 6 festivali ja
        kultuuriorganisatsiooni ning 5 koostööpartnerit ja 6 kaasatud kunstnikku
        Euroopast ja väljastpoolt. MORE THAN THIS on projekt, mis toob esile
        kaasaegsed etenduskunstid kui vahendi, mille abil on võimalik ümber
        mõtestada komplekssuse väärtust ning vaidlustada üksikute narratiivide
        ja fikseeritud identiteetide kristalliseerumist. Etenduskunstid kui
        sellised on perfektne mõtteruum, milles tegeleda külalislahkuse
        mõistega.   
          
        https://morethanthis.eu  
          
        Residentuur Tallinnas saab teoks projekti MORE THAN THIS raames EL Loov
        Euroopa kultuuriprogrammi ja Eesti Kultuuriministeeriumi toetusel.
    description_en: >-
        In the 19th century racism, colonialism, anti-Semitism and nationalism
        was significant in the shaping of society and in knowledge production.
        In this time every kind of indigenous or popular knowledge that did not
        correspond to that of the ‘civilized’, was consistently destroyed. These
        erased narratives still influence our present towards local and global
        contexts.  

        “Tafukt/The Sun/Athena” is a dance solo and the first part of a trilogy
        focused on epistemologies and mythology of the Tamazigh – the indigenous
        population of Northern Africa. The trilogy will concentrate on three
        female goddesses that are hybrids between cultures and histories: Nithe,
        Tanit and Athena.  

        Based on Tamazigh studies, the birthplace of Athena was Lake Tritonis in
        Libya, before she was adopted by the Greeks on other side of the
        Mediterranean. Extensive research into the origin of these
        epistemologies allows us to re-define, propose and dream the missing
        parts of certain essentials in history so as to challenge the current
        colonial and patriarchal canon. In this way, performance can function as
        a tool of resistance to carve out space for a new paradigm of
        reflections regarding the past, to arrive at a more inclusive future.  
          
        Radouan Mriziga (1985) is a choreographer and dancer from Marrakech,
        currently living and working in Brussels. After studying dance in
        Morocco, Tunisia and France, Radouan Mriziga graduated from P.A.R.T.S.
        in Brussels. Fairly quickly he began to focus on his own work and
        touring his creations worldwide. Mriziga is long-time
        artist-in-residence at Moussem Nomadic Arts Centre, and between
        2017-2021 at Kaaitheater (Brussels).   
          
        MORE THAN THIS is a cooperation project among 6 festivals and cultural
        organisations with the collaboration of 5 associated partners and
        engaged 6 artists.

        MORE THAN THIS is a project that focuses on the contemporary performance
        as a fundamental tool to rethink the value of complexity, as a tool to
        challenge the crystallisation of single narratives and fixed identities,
        and a perfect specific space to work on displacement and hospitality.   
          
        https://morethanthis.eu  
          
        Residency in Tallinn takes place within the MORE THAN THIS project that
        is supported by EU Creative Europe program and the Ministry of Culture
        of Estonia.
