    description_et: >-
        Videoprojekti „Nurga taha kaduv koer tegutseb nurgataguses edasi”
        linastus  


        Esimese eluaasta jooksul hakkab laps mõistma, et objektid, mis väljuvad
        meie vahetust kogemusest, ei kao maailmast, vaid kestavad edasi kusagil
        mujal. Objektidel on meist eraldiseisev eksistents ka siis, kui me neid
        vahetult ei taju, kui me neid ei näe, ei kompa, ei haista, ei kuule.
        Jean Piaget, 20. sajandi Šveitsi aregupsühholoog andis sellele nähtusele
        nime Permanence de l'objet, objekti püsivus. Piaget leidis, et objekti
        kui mõtestatud terviku adumise võime on oluline etapp ruumi- ja
        enesetaju, kujutlusvõime ja keele kujunemisel. Selle tulemusel avarduvad
        tajupiirid, tekib arusaam maailmast väljaspool meie isiklikku, vahetut
        kogemuslikku horisonti. Objektid mitte ainult ei ela oma elu meist
        sõltumatult, nad ka pidevalt vormivad meid ja meie olemust nii oma
        materiaalses kui ideelises eksistentsis.  


        Sellelt mõtteliselt hüppelault tõukuvad 6 kunstniku videoteosed, mis
        uurivad objektide ning füüsilise maailma läbipõimitust meie kogemise,
        käitumise, mõtlemise ja loominguga. **Heleliis Hõim, Silvia Sosaar,
        Maris Karjatse, Kadi Reintamm, Carl-Robert Kagge ja Tamar Paal**
        kõnetavad obsessioone, harjumusi, paineid, soove, ning kiindumusi, mis
        objektid ja objektsus meis tekitavad.  


        Linastusele järgneb vabas vormis koosolemine, koht kinnitamisel.

        Kõik oodatud!
    description_en: >-
        "The dog continues to exist behind the corner". Video project
        screening  


        During its first year of life a child starts to understand that objects
        continue to exist even when they can’t be perceived. Objects have a
        separate existance from us even when we can’t see, touch, smell or hear
        them. Jean Piaget, the 20th century Swiss developmental psychologist,
        named this understanding Permanence de l'objet, object permanence. He
        believed that the conception of objects as separate entities is a
        fundamental step in developing our sense of space and sense of self, as
        well as imagination and language. This understanding expands our
        perception, we develop the understanding of a world beyond our
        immediate, personal experience. Objects, in their material and
        immaterial forms, not only live their own lives, they also continuously
        shape us and our ways of being.  


        From this starting point 6 artists explore the interconnectedness of our
        perception, behaviour, thinking and creativity with objects and the
        material world around us. **Heleliis Hõim, Silvia Sosaar, Maris
        Karjatse, Kadi Reintamm, Carl-Robert Kagge and Tamar Paal** explore
        obsessions, habits, anxieties, desires and attachments that objects and
        objectification bring forth in us.
