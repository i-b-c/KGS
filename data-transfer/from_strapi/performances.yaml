    description_et: >-
        Julia Körner (s. 1984) on Salzburgis, Austrias asuva disainiettevõtte JK
        Design GmbH juht ja looja ning õppejõud Kalifornia ülikoolis, Los
        Angeleses. Oma töös on ta ühendanud moe- ja tootedisaini ning
        arhitektuuri, spetsialiseerudes 3D-printimisele ja robottehnoloogiatele.
        Tema töid on antud valdkondades kõrgelt tunnustatud ja kajastatud
        muuhulgas ajakirjas National Geographic, Veneetsia Biennaalil, Pariisi
        moenädalal ning eksponeeritud muuhulgas Viini Rakenduskunstide Muuseumis
        ja Belvedere Muuseumis, Orleansi Kaasaegse Kunsti Fondis FRAC, Brüsseli
        Kaunite Kunstide Keskuses BOZAR ja Chicago Kunstiinstituudis. 2014.
        aastal võitis ta Global 3D PrintShow tõusva tähe auhinna. Julia
        intrigeerivaid töid iseloomustatakse kui ilusa orgaanilise esteetika
        kehastust.

        Salzburgis, Austrias sündinud Körner lõpetas kiitusega Viini
        Rakenduskunstide Ülikooli arhitektuurimagistriprogrammi. Seejärel õppis
        ta innovatiivseid tehnoloogiaid ja disaini Londoni AA
        arhitektuurikoolis. Ta on töötanud rahvusvahelistes büroodes nii New
        Yorgis kui Londonis, sealhulgas Rosse Lovegrove Studios. Õpetanud on ta
        Viini Rakenduskunstide ülikoolis, Lundi ülikoolis Rootsis ning
        Arhitektuuri Assotsiatsiooni külalisõppejõuna Pariisis ja Jordaanias.
        Hiljutistes 3D-printimisprojektides on ta teinud koostööd
        kõrgmoedisainer Iris Van Herpeniga ning 3D-printimisettevõttega
        Materialise. 2015. aasta märtsis tuli välja tema esimene 3D-prinditud
        valmismoekollektsioon SPOROPHYTE, mille tootis Stratasys Ltd. <br />

        [www.juliakoerner.com](http://www.juliakoerner.com/)<br />
         <br />
        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile. <br />

        <br />

        Loengusarja toetab Eesti Kultuurkapital ja korraldab Eesti
        Kunstiakadeemia arhitektuuriteaduskond.
    description_en: >-
        Julia Körner (b.1984) is founder and principal of JK Design GmbH based
        in Salzburg, Austria, and holds a lecturer position at the University of
        California, Los Angeles. She works at the convergence of fashion design,
        architecture, and industrial design specialising in additive
        manufacturing and robotic technology. Her work stands out, recognised
        today at the top level of these disciplines, and has been featured in
        National Geographic Magazine, at Venice Biennale, Paris Haute Couture
        and institutions such as MAK Vienna, Belvedere Vienna, FRAC Centre
        Orleans, BOZAR Brussels and Art Institute of Chicago to name a few. In
        2014 she won the Global 3d PrintShow Award in the category "Rising
        Star”. The constantly intriguing aspect of Julia’s work is the
        embodiment of a beautiful organic aesthetic.<br />

        Born in Salzburg, Austria, she holds a Master of Architecture with
        distinction from the University of Applied Arts, Vienna. Further, she
        was awarded a Master of Science in emergent technologies and design from
        the Architectural Association, London. Julia worked with international
        offices in both New York and London, including Ross Lovegrove Studio.
        She has been teaching at the University of Applied Arts Vienna, Lund
        University in Sweden and the Architectural Association Visiting School
        in Paris and Jordan. Recent collaborations for additively manufactured
        fashion pieces involved Haute Couture fashion designer Iris Van Herpen,
        and 3D printing company Materialise. In March 2015 she launched her
        first 3D printed ready-to-wear fashion collection SPOROPHYTE,
        manufactured by Stratasys Ltd.<br />

        [www.juliakoerner.com](http://www.juliakoerner.com/)<br />

        <br />

        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment. <br />

        <br />

        The lecture series is supported by Estonian Cultural Endowment and
        organised by the Faculty of Architecture of the Estonian Academy of
        Arts.
