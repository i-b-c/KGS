    description_et: >-
        "Kapriisid 3,5" on performatiivne installatsioon, milles domineerib
        musta ja valge maagia kokkupõrge. Valgus tardub skulptuuriks,
        teatrikardin mõraneb. Oluline on vaatenurkade paljusus. Teatri
        mitte-dramaatilised elemendid on toodud esile, liigne elulähedus jäetud
        tahaplaanile. Kehad laval on ettekääne alistuda ruumile, milles
        kunstiteosed saavutavad kogu aktiivse ja passiivse tähelepanu. Kapriisid
        kui meetod tegeleb performatiivse installatsiooni ning installatiivse
        performance'i võimaluste ning võimatustega. Endast loobumisega jõutakse
        vaatemängu loomise alguspunkti.  


        "Kapriisid 3,5" algab etenduskunsti kollektiivsest kogemusest musta
        kasti esteetikas ning transformeerub samm-sammult valge kuubi
        individuaalsesse üksindusse, jättes vaataja ruumiga kollektiivselt
        üksi.  


        Eelnevaid "Kapriiside" peatükke on teostatud ning esitatud nii
        etenduskunstikeskustes kui galerii keskkondades. Töötamine neile
        ruumidele iseloomulikuga on meid märkamatult protsessist kaotama
        hakanud.  


        HENRI HÜTT on Rakverest pärit (etendus)kunstnik, kes väärtustab
        loomingulisi hübriidvorme, kuhu kuuluvad tehnoloogilise dominandiga
        etenduskunsti vormid, helietendused, lavastatud näituse kontseptsiooni
        arendamine ning koostööd erinevate valdkondade kunstnikega. On rühmituse
        MIMproject liige ning Baltikumi ja Skandinaavia kunstiülikoolide
        võrgustiku DAMA koordinaator.  

         

        MIHKEL ILUS on visuaalkunstnik, kelle põhifookus on maali laiendatud
        väljal. See tähendab, et Ilus sageli töötab suuremõõtmelise
        installatsiooniga, milles maaliline lähenemine omab keskset rolli. Ilusa
        praktika oluline osa on ka kaasaegse näitusekultuuri ja etenduskunsti
        põimumine. Viimasel ajal tegeleb peamiselt objektse kunsti erinevuste
        uurimisega black box ja white cube tingimustes.
    description_en: >-
        "Caprices 3,5" is a performative installation dominated by the frontal
        collision of black and white magic. Light freezes into sculpture,
        theatre curtain cracks. Perspective matters. All the stage-technical
        arsenal and the components of the play are brought forward, excessive
        intimacy is left behind.  


        "Caprices 3,5" transforms from the collective experience of the black
        box to the individuality of the white cube, leaving the spectator to
        surrender the space.   


        Previous chapters of "Caprices" have been presented in performing arts
        venues as well as in a gallery environment. Working with the
        characteristics of the space have slowly faded us away from the
        process.  

         

        HENRI HÜTT is an artist-performer, who is primarily a dancer. Since the
        beginning of this decade, he has created many technological performative
        acts, staged exhibitions, sound performances and other unprecedented
        formats. Henri Hütt is also part of the MIMproject team and coordinates
        Dance And Media Art network DAMA in Scandinavia and the Baltics.  

         

        MIHKEL ILUS is a visual artist, whose main focus is painting and its
        extended field. Ilus often works with large-scale installations where
        painting plays the central role. In the practice of Ilus, contemporary
        exhibition culture and performance practices are inextricably
        intertwining. Recently Ilus has been concentrating on the distinction of
        objecthood as such in conditions of the white cube and black box
        situations.
