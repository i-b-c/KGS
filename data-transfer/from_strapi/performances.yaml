    description_et: >-
        Udo Kasemetsa (1919-2014) on naljatamisi nimetatud kõige vähemtuntud
        kõige kuulsamaks eesti heliloojaks, kelle kohta leidub artikkel vast
        igas väärikamas muusikaentsüklopeedias. Kanadas, kus Udo Kasemets veetis
        suurema osa oma elust, nimetati teda „ilmselt kõige kompromissitumaks
        muusikuks Kanada muusika ajaloos”, tema mõju Toronto muusikaelule ja
        järgnevatele põlvkondadele on raske ülehinnata. 16. novembril 2019
        möödub täpselt 100 aastat Udo Kasemetsa sünnist. Sellele sündmusele on
        pühendatud EMTA-s kultuuriteaduste ja kunstide doktorikooli poolt
        korraldatav rahvusvaheline konverents teemal "Seletades universumit  –
        süsteemid, kunst ja inimesed”, mille programmiga on tihedalt seotud ka
        käesolev kontsert. Konverentsi raames saab lisaks kuulda Kasemetsa
        teoseid EMTA Uue Muusika Ansambli ning Eesti Elektroonilise Muusika
        Seltsi Ansambli esituses. Kogu üritus püüab kasvõi väikest osa Kasemetsa
        pärandist "koju tagasi" tuua.  
          
        Ansambel U: on aktiivseim ning tuntuim uue muusika ansambel Eestis.
        Ansamblile on iseloomulik tundlik kõlapilt, avatus julgetele
        eksperimentaalsetele ideedele ning ka kõige nõudlikumate teoste
        esitamine dirigendita. Kõrvuti eesti nüüdismuusika festivalidega on U:
        esinenud olulistel rahvusvahelistel festivalidel. U: tegeleb nii uue
        muusika klassikasse kuuluvate teoste kui ka eksperimentaalsete
        kompositsioonidega. Üks ansambli oluline suund on süvenemine
        improvisatsiooni ja ebatraditsioonilise notatsiooni tõlgendamist
        nõudvate teoste ettekandmisesse.  


        Kavas:   

        Giovanni Pierluigi da Palestrina (1525-1526) “Tu es Petrus” a 6 (1572)  

        Udo Kasemets (1919-2014) “Sound, Smell, Taste, Touch, or How to Take a
        Trip Without LSD” (1965)  

        Udo Kasemets “4’33” Fractals” mistahes esitajatele (2000)  

        Udo Kasemets “Trigon” realisatsioon 9 esitajale (1963)  

        Udo Kasemets “Future is past … is …  now” 4 või enamale esitajale
        (1996)  
          
        www.uuu.ee
    description_en: >-
        Udo Kasemets (1919-2014) has been jokingly called the most famous least
        known composer of Estonia. There is an article about him in every
        respected music encyclopedia. In Canada, where Kasemets spent most of
        his creative life, he was named "probably the most uncompromising
        musician in history of Canadian music". His influence to music life
        especially in Toronto, in particular introducing thinking inspired by
        John Cage, Marhsall McLuhan and Buckminster Fuller, played an utmost
        importance. It is hard to overestimate his influence to the following
        generations. Yet in Estonia Kasemet's music has been played very little
        and the knowledge about Kasemets is not wide spread. 

        To fill this gap and to celebrate Udo Kasemet's 100th anniversary (he
        was born exactly on November 16, 1919), to introduce his music, ideas
        and background, ensemble U: in collaboration with Estonian Academy of
        Music and Theatre is organizing conference "Explaining universe –
        systems, humans and arts" and concerts with music by Udo Kasemets.  
          
        Ensemble U: is currently the most active and renowned contemporary music
        ensemble in Estonia. It has gained recognition for its ability to
        perform even the most demanding works without a conductor, openness for
        bold experimental ideas and sensitivity for sound. In addition to
        Estonia U: has performed at many important international festivals. U:
        performs the masterworks of modern composers as well as experimental
        compositions. One distinct field for U: is to delve into improvisational
        works and perform pieces that require the rendering of non-traditional
        notation.  
          
        In program:  

        Giovanni Pierluigi da Palestrina (1525-1526) “Tu es Petrus” a 6 (1572)  

        Udo Kasemets (1919-2014) “Sound, Smell, Taste, Touch, or How to Take a
        Trip Without LSD” (1965)  

        Udo Kasemets “4’33” Fractals” for whatever instruments (2000)  

        Udo Kasemets “Trigon” rrealisation for 9 performers (1963)  

        Udo Kasemets “Future is past … is …  now” 4 or more performers (1996)  
          
        www.uuu.ee
