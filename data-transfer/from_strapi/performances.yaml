    technical_info_et: >-
        Autor, lavastaja, kunstnik ja muusikaline kujundaja: **Renate Keerd**<br
        />

        Laval: **Katrin Pärn, Piret Simson, Janek Joost, Helgur Rosental**<br />

        <br />

        Lavastuse sündi toetavad: EV Kultuuriministeerium, Tartu linn, Eesti
        Kultuurkapital, Ecoprint<br />

        Esietendus:10. märts 19:00 Tartu Uues Teatris<br />

        <br />

        Järgmised etendused Tartus: 11+12+14+15+16 märts algusega kell 19:00<br
        />

        21+22+23 aprill algusega kell 19:00<br />

        5+6+7 mai algusega kell 19:00</p>

        <p>

        Etendused Tallinnas Kanuti Gildi SAALis: 25+26+27+28 aprill algusega
        kell 19:30</p>

        <p>

        Etenduse ajal pildistamine ja filmimine ei ole lubatud.</p>

