    description_et: >-
        Sünges ruumis, mis on täidetud rohelise värvi lõpmatute
        variatsioonidega, uurivad üheksa tantsijat kehalise olemuse võimalusi ja
        seavad neid kahtluse alla. See on biotoop, kus jäsemete, kopsude ja
        jalgade hägu on täielikus sümbioosis organismiga, mida nad asustavad.  
          
        Lea Moro on Šveitsist pärit etendaja ja koreograaf, kes elab Berliinis
        ja Zürichis. Ta on lõpetanud Inter-University Dance Berlini Ülikoolis,
        õppinud veel LABANi keskuses Londonis ja Scuola Teatro Dimitris
        Šveitsis. Alates 2013. aastast on ta loonud mitmeid rahvusvaheliselt
        tuuritanud lavastusi nagu näiteks “(b)reaching stillness” (2015), ja “Le
        Sacre du Printemps, a ballet for a single body” (2013/14) ning nüüd ka
        “Their Limbs, Their Lungs, Their Legs”, mida esitatakse Soomes, Eestis
        ja Šveitsis. 2019. aastal on kavas veel BA lõpulavastuse loomine
        Stockholmis DOCHis ning töö pikaajalise projektiga “Sketch of
        Togetherness”.  
          
        TADaC (Theatre Academy Dance Company) on tantsukompanii, mis on osa
        Helsingi Kunstiülikooli Teatriakadeemia Tantsu eriala
        magistriprogrammist. Oma viimasel aastal teevad tudengid koostööd
        koreograafiga, kelle nad koos oma õppejõududega külla on kutsunud.
        Lavastusse panustavad alati ka lavakunstnikud ja loodud tööd esitatakse
        Soomes ja välismaal. TADaC on loodud eesmärgiga hõlbustada tudengite
        üleminekut koolist tööellu ja pakub osalejatele võimaluse anda etendusi
        erinevates kohtades ja kultuuriruumides. Loodud lavastus on ka
        lõpetajate magistritöö kunstiline osa.
    description_en: >-
        In a gloomy space with a fantastic variety of green colors, nine
        performers explore and reconsider modes of bodily existence. A biotope
        where the boundaries of limbs, lungs and legs blur in complete symbiosis
        with the organism they inhabit.  
          
        Lea Moro is a performer and choreographer from Switzerland, based in
        Berlin and Zurich. She studied at the Scuola Teatro Dimitri (BA in
        Physical Theatre), LABAN Centre London (Diploma in Dance Studies) and
        graduated 2014 from the Inter-University Centre for Dance Berlin (BA
        Dance, Context, Choreography). Her works “(b)reaching stillness” (2015)
        and “Le Sacre du Printemps, a ballet for a single body” (2013/14) have
        been performed internationally and now also “Their Limbs, Their Lungs,
        Their Legs” will be presented in Finland, Estonia and Switzerland. In
        2019 – 21 Lea Moro develops the artistic long-term project “Sketch of
        Togetherness”, in April 2019 she creates the BA graduation work at DOCH
        Stockholm and will be teaching at the Inter-University Centre for Dance
        Berlin and at Manufacture Lausanne.  
          
        TADaC (Theatre Academy Dance Company) is a dance company within the MA
        Degree Programme in Dance Performance at the Theatre Academy of the
        University of the Arts Helsinki. In the final year of their MA studies
        dancers collaborate with a choreographer they have jointly invited with
        the professors of their study programme. Together with a team of
        designers they create a work that is being performed in Finland and
        internationally. TADaC was designed to facilitate the transition from
        training to professional practice and is fulfilling this mission by
        giving an opportunity to gather experience in touring in various places
        and cultural environments. This work is the artistic part of the
        Master’s thesis for the graduating dancers.
