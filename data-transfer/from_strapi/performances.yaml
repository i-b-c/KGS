        Tallinn Bicycle Week’i seminar avab jalgratta ja linna olemust ja
        seoseid.<br />

        <br />

        Milline on hea linn, milline on hea linlane, milline on hea linlase hea
        ratas? Kas linnale on hea, kui linlane rattaga sõidab? Aga linlasele?
        Miks on jalgratas oluline tööriist linna arengus ja hindamisel?<br />

        <br />

        Nendel radadel arutlevad erinevate erialade inimesed meil ja mujalt.<br
        />

        <br />

        [www.tbw.ee](http//:tbw.ee/)
    description_en: >-
        Tallinn Bicycle Week’s seminar opens the nature of a good city and
        bicycle and their relations.<br />

        <br />

        What makes a good city? What makes a good citizen? What makes a bike
        good for a good citizen? Is it good for the city if people use bicycles?
        But for people? Why is bicycle a good tool foor city development and
        evaluation?<br />

        <br />

        These questions lead the talks of presenters from different
        disciplines.<br />

        <br />

        [www.tbw.ee](http//:tbw.ee/)
