    description_et: >-
        HELIjaKEEL Saariaho festivali lõppkontserdil MÄNG kõlavad kõrvuti Kaija
        Saariaho ja Helena Tulve muusika.<br />

        <br />

        **Helena Tulve** muusika keskmes on lakkamatu muutumine ja sellega
        seotud protsessid ajas ja ruumis, energia transformeerumine. Tema
        muusika kasvab välja lihtsatest algimpulssidest, olles mõjutatud
        looduslikest mustritest, orgaanilisusest ja eluenergia ühtsusest, mis
        haarab endasse keerukuse ja vastuolud, erinevad olekud, vormid ja
        liikumised. 2000. aastast on Helena Tulve Eesti Muusika- ja
        Teatriakadeemia kompositsiooniõppejõud (2011 professor, 2012 prorektor),
        alates 2015. aastast „Eesti muusika päevade“ kunstiline juht. Ta on
        pälvinud oma loomingu eest rohkesti preemiaid ja autasusid, sealhulgas
        võitis 2004. aastal tema sümfooniaorkestriteos “Sula” Pariisis
        rahvusvahelise rostrumi. Helena Tulve on iseloomustanud Kaija Saariaho
        muusikat järgmiselt: Tema muusika kulgeb pigem aeglaselt ühest
        seisundist teise ja on tugevalt protsessikeskne, teoste kõla võib olla
        väga õhuline ja unenäoline, aga eriti varastes teostes on ka tihedust ja
        jõudu, kõik kokku on nagu unenäopilt.<br />

        <br />

        Laulja ja harfimängija **Arianna Savall** (Hispaania) sündis Baselis
        katalaani muusikute perekonnas. Oma lauljadebüüdi tegi ta 2002. aastal
        Barcelona ooperimajas Eurydice rollis oma isa Jordi Savalli juhatatud C.
        Monteverdi ooperis “Orfeus”. Kriitikute sõnul oli see üks kauneimaid
        ning maagiliseimaid versioone “Orfeusest”. Kirg vanamuusika ja
        improvisatsiooni vastu on juhtinud teda ka teistsuguse
        muusikavaldkonnani – kaasaegse muusikani. 2006. aasta juunis Tallinnas
        astus ta vokaalsolistina üles Helena Tulve teoses “Lijnen”, mille
        salvestas hiljem ka Olari Eltsi ja NYYD Ensemble`ga ECM-ile. Olari Eltsi
        dirigeerimisel esines ta ka Rennes`i Ooperis Kaija Saariaho teosega
        “Quatre Instants”. Ta on osalenud ka mitmel Helena Tulve teose
        esiettekandel Monaco Ooperis koos Vox Clamantisega Jaan-Eik Tulve
        juhatusel. 2008 esitas ta koos Amsterdami tšello-oktetiga Arvo Pärdi
        teose “L'abbé Agathon”. 2010 esines ta mitmel Arvo Pärdi muusikale
        pühendatud festivalil (sh Arvo Pärdi 75. sünnipäevale pühendatud Nargen
        festival). Arianna hääle ilu tekitab tunde nagu oleks tegemist reaalselt
        haldja häälega (El 9 Nou, MMVV 2010, M. Rius). Kriitikud on viidanud ka
        talle kui “harfihaldjale”.<br />

        [www.ariannasavall.com](http://www.ariannasavall.com/)<br />

        <br />

        <a href="http://www.kammermuusikud.ee"><br />

        www.kammermuusikud.ee</a>
    description_en: >-
        The final concert of the HELIjaKEEL Saariaho festival – PLAY will
        juxtapose music by Kaija Saariaho and Helena Tulve.<br />

        <br />

        The music of **Helena Tulve** is characterized by a process of unceasing
        change in time and space, and the transforming of energies. Her music is
        heavily influenced by natural patterns, the unity between organic and
        vital energy, sprouting forth from simple impulses. Her music is also
        marked with complexity and contradictions, a multitude of different
        states of existence, form and movement. In 2000, Helena Tulve began
        teaching composition at the Estonian Academy of Music and Theatre,
        becoming a professor in 2011 and vice dean in 2012. From 2015, she is
        also artistic director of the Estonian Music Days Festival. She has been
        the recipient of numerous awards, including first prize at the 2004
        International Composers Rostrum in Paris for her orchestral piece
        “Sula“. About the music of Kaija Saariaho, Helena Tulve has said: Her
        music tends to move between states very slowly, and is very much centred
        on the process. Her pieces can be very airy and dreamlike, but in her
        early works one can also find density and power. All in all, her music
        is like a picture from a dream.<br />

        <br />

        Singer and harpist **Arianna Savall** (Spain) was born in Basel into a
        family of Catalan musicians. 2002 saw her debut in the Barcelona opera
        house in a production of Claudio Monteverdi's “Orfeo” directed by her
        father Jordi Savall, in which she took the role of Eurydice. Critics
        praised the production as one of the most beautiful and magical versions
        of “Orfeo”. Her passion for early music and for improvisation has led
        her to the other extreme: contemporary music. In June 2006 she performed
        as a singer in the work by Helena Tulve “Lijnen” in Tallinn, which was
        also later recorded by ECM with the group Nyyd Ensemble, conducted by
        Olari Elts, with whom she also performed at the Rennes Opera, singing
        “Quatre Instants” by K. Saariaho. She has undertaken several projects
        with Helena Tulve which premiered at the Monaco Opera with Vox Clamantis
        with Jaan-Eik Tulve conducting. In 2008 she sang “L'abbé Agathon” by
        Arvo Pärt with the Amsterdam Cello Octet. In 2010, she performed at
        several festivals dedicated to the music of Arvo Pärt, including the
        Nargen Festival (Estonia), which celebrated the 75th birthday of the
        Estonian composer. It is as if the beauty of Arianna's voice were truly
        the voice of a fairy. (El 9 Nou, MMVV 2010, M. Rius) The critics also
        refer to her as The fairy of the harp.<br />

        [www.ariannasavall.com](http://www.ariannasavall.com/)<br />

        <br />

        <a href="http://www.kammermuusikud.ee"><br />

        www.kammermuusikud.ee</a>
