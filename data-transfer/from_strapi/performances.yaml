    description_et: >-
        NU Performance Festival 2016: CORPORATE OCCULT_lets talk about the body
        baby raames tuleb Tallinna legendaarne Huoratron (Last Gang Records),
        kes on Põhjamaade elektroonilise muusika üks tumedamaid ja tulisemaid
        tegijaid. Huoratron loodi 2003 aastal geniaalse DJ, produtsendi ning
        8-biti eksperimenteerija Aku Raski (Helsingi) poolt ning peale seda on
        saatnud Huoratroni rahvusvaheline edu. Huoratroni muusika on
        industriaalne, eksperimenteeriv ja apokalüptiline metali ning art-rock
        sugemetega electro. Tema performance’id on jõulised ja elavad, võiks
        isegi öelda et transtsendentaalsed.<br />

        <br />

        Õhtul astuvad üles ka siinsel muusika-, video- ja etenduskunsti
        maastikul tuntud ning hinnatud tegijad Emer Värk ja Renzo van
        Steenbergen oma audiovisuaalse performance’iga. Peo tõmbavad käima MÜRGi
        Djd.<br />
    description_en: >-
        NU Performance Festival 2016: CORPORATE OCCULT_lets talk about the body
        baby will feature a gig in Tallinn by Huoratron (Last Gang Records), one
        of the darkest and hottest figures in Nordic electronic music. Created
        in 2003 by pioneering DJ, producer and 8-bit experimenter Aku Raski
        (Helsinki), Huoratron has enjoyed international success ever since.
        Huoratron’s music is industrial, experimental and apocalyptic electro
        with elements of metal and art-rock. His performances are powerful and
        lively, verging on the transcendental.<br />

        <br />

        The evening will also include an audio-visual performance by Emer Värk
        and Renzo van Steenbergen, an acclaimed duo on the Estonian music, video
        and performance scene. MÜRK DJs will get the party started.<br />
