    description_et: >-
        Ma ei taha teada, mida see asi tähendab. See on reis, mille koos
        publikuga ette võtan. Võib-olla õnnestub meil koos aru saada, mis peitub
        ridade vahel, ning liikuda edasi väikeste tantsude ja  mitmete
        esemetega, mis koos minuga ellu ärkavad. See on natuke nagu räägiks
        raamatust, mida kõik on lugenud, aga hästi ammu ja mäletatakse erinevaid
        asju ja nüüd mängitakse neid uuesti, meie ees, aga rohkem meie sees, ja
        seal on ka üks üpris aeglane film. Film – nagu see teos – on seal pigem
        nagu telekas, mis on mahakeeratud heliga käima jäetud. Mulle meeldivad
        telekad, mis lihtsalt seisavad, ilma et keegi neid vaataks. Ma kujutan
        ette, et see on aeg, kui telekas tõeliselt lõbutseb, lihtsalt naudib
        pilte ja jadasid nende endi pärast, mitte selle pärast, mida nad
        kujutavad.<br />  

        Mul on sõber, kelle nimi on Juan Dominquez. See on tõesti mõnusalt
        voolav nimi ja lõpuks sööme koos jäätist, ilma et me eriti räägiks. Nii
        armas on nautida midagi tõeliselt head ja teha seda vaikuses. Kui natuke
        oodata, on võimalik lihtsalt kohale ilmuda.<br />   

        Seitse aastat tagasi sai alguse üks rännak. Seiklus, mida alustati
        selleks, et uurida esemete salaelu. Kas aja koostis muutub kuidagi
        seetõttu, et on elanud esemete vahetus läheduses: mitte esemete kui
        tööriistade või suveniiride, lemmikloomade või lähedaste asemike, vaid
        kui lihtsalt esemete? Siin peitub midagi enamat kui performatiivsus, see
        on lihtsalt viimasel ajal pisut häbelikuks muutunud.<br />   

        Esemed tõmbuvad eemale. <br />  

        Vananedes kahaneb inimese tulevik sekund-sekundilt. Mingil hetkel jõuab
        minevik tulevikule järele. Elamine teadmisega, et su tulevik on möödas,
        tähendab kohanemist üksildusega. <br />  

        „Digital Technology“ on mõtisklus esemete seltsis, muljete vool, mis
        lõpeb ja siin me oleme ja see pole midagi erilist, eks?<br />   

        **Mårten Spångberg** on Berliinis ja Stockholmis elav ning töötav
        koreograaf. Oma töös keskendub Spångberg tantsu laiendatud mõistele,
        millele ta läheneb erinevates tehnikates läbi viidud
        eksperimentaalpraktikate ja väljendusviiside kaudu. Spångberg on olnud
        etenduskunstis tegev nii esineja kui loojana aastast 1994. Leibeli
        „International Festival” alt tegi Spångberg koostööd arhitekti Tor
        Lindstrandiga, projekti raames uuriti sotsiaal- ja laiendatud
        koreograafia mõisteid. 1996-2005 organiseeris ja kureeris Spångberg
        festivale Rootsis ja rahvusvahelisel areenil, ning oli üks
        suhtlusvõrgustiku INPEX asutajatest. Spångbergil on rikkalik
        kogemustepagas nii teooria kui praktika õpetamises. 2011. aastal ilmus
        Spångberg’i esimene raamat „Spangbergianism”. Hetkel on Spångberg
        dramaturgia- ja koreograafiaprofessor tantsu ja teatri kateedris Oslo
        Rahvusliku Kunstiakadeemia juures. Tema viimased tööd; „La Substance,
        but in English”, „The Internet”, „Natten” ja „Gerhard Richter, une pièce
        pour le théâtre” on pälvinud palju rahvusvahelist tähelepanu.
    description_en: >-
        I don’t want to know what this thing is all about. A little trip that I
        do with the audience. Together we can perhaps figure out what’s between
        the lines and move on in small dances, a bunch of object that animate
        themselves in companionship with me. It’s a little like talking about a
        book that we all read but really long ago and remember different things
        and now they are played again, in front of us but more inside and there
        is also a quite slow film. A film - like the piece - that’s there more
        like the television left on without sound. I like television sets that
        sit there without nobody looking. I image that that’s the time when the
        TV really enjoys itself, appreciating the images and sequences for what
        they are not what they show.<br />  

        I have a friend whose name is Juan Dominquez. It’s a name with really
        nice flow and in the end we eat ice-cream together without speaking too
        much. That’s so sweet, to enjoy something really good and in silence. If
        you wait for a while, it is possible to just show up.<br />  


        Seven years ago a journey started. An adventure taken up to study the
        secret life of objects. Does the texture of time transform through
        living in close proximity with objects; not as tools or souvenirs, not
        as pets or substitutes for loved ones, but as objects, just objects?
        There’s more to it than that performativity, it’s just grown a little
        shy, lately.

        Objects withdraw.<br />  

        As one grows older ones future decreased, second by second. At some
        point the past catches up with ones future. To live with the experience
        that one’s future lies behind is to cope with loneliness.<br />  

        Digital Technology is a meditation in the company of objects, a feed of
        impressions that comes to an end and there we are and it’s nothing
        special, ok?<br />  

        **Mårten Spångberg** is a choreographer living and working in Berlin and
        Stockholm. His interest concerns dance in an expanded field, something
        he has approached through experimental practice in a multiplicity of
        formats and expressions. He has been active on stage as a performer and
        creator since 1994. Under the label International Festival, Spångberg
        collaborated with architect Tor Lindstrand and engaged in social and
        expanded choreography. From 1996-2005 he organised and curated festivals
        in Sweden and internationally, and initiated the network organisation
        INPEX. He has considerable experience in teaching both theory and
        practice. In 2011, his first book, Spangbergianism, was published.
        Mårten Spångberg is professor in dramaturgy and choreography at Oslo
        National Academy of The Arts, departments of dance and theatre. His more
        recent works La Substance, but in English, The Internet, Natten and
        Gerhard Richter, une pièce pour le théâtre has gained extensive
        international recognition.
