    description_et: >-
        Rahvusvaheline Nüüdismuusika Festival AFEKT2018 esitleb Euroopa
        nüüdismuusika lavadel tuntust koguva Eestis resideeruva Iraanlasest
        helilooja ja dirigendi Arash Yazdani loodud Tallinna Uue Muusika
        Ansamblit.  

        Multimediaalne programm esitleb praeguse aja nüüdismuusikale omast
        keskset esteetikat, mis on seotud videokunsti erinevate
        väljendusvahenditega, eesmärgiga hägustada heli, kontsepti ja visuaali
        piirjooni. Autoriteks on Berlinale filmifestivalil esitletud
        videokunstnik Rainer Kohlberg, populaarse Adult Swim kanali animaator
        David O’Reilly ning kontseptuaalsele meediale keskenduvad multitalendid
        Simon-Steen Andersen ja Alexander Schubert.<br />

        <br />

        Tallinna Uue Muusika Ansambel on fikseerimata koosseisuga rühmitus
        Eesti muusikamaastikul, omamoodi platvorm uue muusika kogemise
        võimaluste loomiseks. Ansambel soovib tuua kuulajani parima osa uuest

        muusikast ning pakkuda kaasaegsetele heliloojatele väljundit loomingu

        esmaesitamiseks.


        Alates loomisest aastal 2012, on Tallinna Uue Muusika Ansambel jäänud

        ustavaks oma lubadusele tuua publiku ette värsket uut muusikat,
        rikastades oma hoolikalt valitud pro- grammi ja lähenemisega kohalikku
        kultuurielu. Ansamblil olid 2015. aastal mitmed põnevad kontserdid
        erinevates Euroopa riikides (kontserdid Barcelonas, Peterburis,
        Helsingis, Stockholmis, Budapestis, Pariisis ja Bukarestis) soovides

        tuua publikuni nii noorte kui ka tuntud meistrite poolt loodud

        uut muusikat. 2016. aastal esines ansambel mainekal reMusik uue muusika
        festivalil Peterburis ning sama aasta oktoobris AFEKT festivalil
        Tallinnas. Kuna oluline osa ansambli töös on tutvustada noorte
        heliloojate loomingut ja nende värsket lähenemist muusikale, peame
        oluliseks tellida teoseid mitmetelt erineva taustaga heliloojatelt.


        Ansambel on varasemalt koostööd teinud mitmete eesti
        muusikafestivalidega

        (Tallinn Music Week, Värske heli festival Sügisfest, festival AFEKT),

        lisaks Mixtur festivaliga Barcelonas, reMusik festivaliga Peter- buris,

        Resonanta ühinguga Pariisis, FUGA arhitektuurimuuseumiga Bu- dapestis,

        Fylkingeni ühinguga

        Stockholmis, Korvat

        Auki ühiguga Helsingis

        ja Inner Sound

        New Arts Festivaliga

        Bukarestis. 2017.

        aasta oktoobris

        korraldas Tallinna

        Uue Muusika

        Ansambel

        mikrotonaalse

        muusika festivali nii

        Tallinnas kui Berliinis

        ning sai palju

        positiivset vastukaja antud festivali korraldamisel.

        Lisaks uudisteoste tellimisele eesti ja välismaistelt heliloojatelt,
        soovib Tallinna

        Uue Muusika Ansambel tuua Eestis esiettekandele mitmed oluliste

        nüüdismuusika heliloojate teosed, nagu näiteks Georg Frie- drich Haas
        ́i,

        James Tenney ́, Gerard Grisey, Michael Maierhof ́i, Alvin Lucier ́ jt
        muusika.
    description_en: >-
        International Contemporary Music Festival AFEKT 2018 presents Tallinn
        New Music Ensemble, founded by Estonian-based Iranian composer and
        conductor Arash Yazdani, musician increasingly well-known on European
        contemporary music scenes.  

        The multimedial program presents the central aesthetics of contemporary
        music, blurring the boundaries between sound, concept and media, and
        related to video art and its various ways of expression. Featured on the
        program are video artist and media designer Rainer Kohlberger, presented
        at Berlinare Film Festival, as well as Adult Swin channel film-maker
        David O’Reilly, and conceptual media multitalents Simon Steen-Andersen
        and Alexander Schubert.
