    description_et: >-
        “Physics and Phantasma” pühendub fantaasia funktsioonile, tekkimisele ja
        meie vajadusele selle järele. Fantaseerimine on inimesele omane võime,
        mis ulatub kaugemale headusest ja kurjusest. Fantaasia on meie ihadele
        raamistik ja vajalik vahend selleks, et meist saaks terviklikud
        subjektid. Samal ajal on see ka iga revolutsioonilise potentsiaali ning
        rassistlike eelarvamuste aluseks. Antud lavastuses on see miski
        fantasmaatiline (*phantasmatic, ingl.k.) kaitsemehhnism, mis aitab meil
        aduda ebatäiusliku maailma vastuolusid.   


        Teater on tühi ruum, lihtsalt vaikiv raamistik, millesse me asetame oma
        teosed. Just see tühjus võimaldab meil jätta kõrvale geograafilised ja
        ajalised seaduspärad ning reisida ajas ja ruumis. See tühjus on hinnatud
        nii publiku kui ka loojate poolt. Lavastuses “Physics and Phantasma” on
        see tühjus tajutav ka millegi sügavalt dramaatilisena – tühjus, mida
        peab täitma, millegagi(!); millegi muu kui mittemillegagi; millegagi,
        mis on kaetud fantaasialooriga. Etendus, mängides fantaasia loomisega,
        proovib olla see loor. Loor, mis pannakse mängu publiku ja vaataja
        vahel.    


        Fantaseerimine on keelepõhine praktika. Seega kutsub Iggy Lond Malmborg
        meid etendusele, mis koosneb tervenisti sõnadest (või hoopis sõnade
        puudusest). Oma uues soolos töötab ta kergema ja vähem selgitava
        stiiliga, kui varasemates töödes. Tulemuseks on lavastus, kus Iggy poolt
        pakutud motiivid leiavad aset peamiselt vaataja kujutluses. Motiivid,
        mis varieeruvad kõige igapäevasematest fantasmilistest nägemustest kuni
        kõige süngemate, vägivaldsemate sügavusteni meie kujutlusvõimes.    
          
        Iggy Lond Malmborg (1987) on vabakutseline näitleja ja etenduskunstnik,
        kes tegutseb nii Malmös kui Tallinnas. Kuigi klassikalise
        näitlejaharidusega (Malmö Teatriakadeemia), kasutab ta erinevaid
        esteetikaid ja stiile nii soolodes kui koostöödes. Tema põhihuvi seisneb
        reaalse etendussituatsiooni olukorra kasutamises mudelina, millele
        rakendada lavastuse diskursust. Kasutades strateegiaid, mida võib
        võrrelda minimalismiga, toob ta fookusesse teatri (võimu)struktuurid,
        vaadeldes teatrit kui hierarhilist masinat, mis koosneb (alateadlikest)
        kaasamise ja eraldamise mustritest.    

        Hetkel tuuritab ta lavastustega "b o n e r" (2014), "99 Words for Void"
        (duo Maike Lond Malmborgiga 2015), "Physics and Phantasma" (2017) ja
        "Things in my mouth" (2019), mis kõik on valminud koostöös Kanuti Gildi
        SAALiga. Neid lavastusi on näidatud erinevatel festivalidel ja
        etenduspaikades, nagu Spielart (München), Baltic Circle (Helsingi), TnBA
        (Bordeaux), Baltoscandal (Rakvere), Auawirleben (Bern),
        Nanterre-Amandiers (Pariis), FFT (Düsseldorf), Bastard Festival
        (Trondheim), Sophiensäle (Berliin), Staatstheater Nürnberg, Nowy Teatr
        (Varssavi), Palm Off Fest (Praha) ja Dublin Theatre Festival. 

        Alates 2009. aastast teeb ta koostööd Johannes Schmitiga duo White on
        White nime all, 17/18 hooajal esietendusid neil Maxim Gorki teatris
        Berliinis lavastused “Fuck me ! (we didn’t make it)“ ja “Tyskland“.   
          
        NB! 26. märtsi etendusele järgneb vestlus kunstnikuga mida juhib Anders
        Härm.

        NB! Etendus sisaldab ebatsensuurset keelt, mis võib mõjuda solvavalt
        ning ei ole sobiv alla 18 aastastele.
    description_en: "\"Physics and Phantasma\" devotes itself to the function, production and need of fantasy. To fantasize is a technical ability beyond good and evil. It is the setting for our desire and a necessary tool for us to become, what we call, whole subjects. At the same time the basis of any revolutionary potential and the foundation of racist prejudice. In the thinking of this piece, the phantasmatic is far most a defence mechanism enabling us to comprehend with the inconsistencies of the world.  \n\nThe theatre is an empty space, just a silent framework in which we situate our pieces. It is that emptiness which allows us to put the laws of geography and time aside and travel anywhere at anytime. This nothingness is not only presupposed by us the audience; it is also, often, celebrated by us the makers. In “Physics and Phantasma” though, it is perceived as something deeply traumatic - a void that has to be filled, with anything(!) other than nothing, covered in a veil of fantasy. The piece intends to become that veil, to study its creation and how it is being put into play in-between the audience and performer.     \n\nFantasizing is a language practice. Thus, Iggy Lond Malmborg invites to a piece fully consisting of words (or the possible lack of them). With this new solo he explores a toned-down and less explanatory style than in the earlier works. The result is a piece that mainly takes place within the audience imagination, through affirmation of- or resistance against suggested motives; a phantasmatic imagery ranging from the most arbitrary kind to the darkest places of human imagination.  \n\nIggy Lond Malmborg (1987) is an actor and performance maker based in Malmö and Tallinn. Though a formation in traditional acting (the Theatre academy of Malmö) his pieces span over a wide range of aesthetics and styles, both solo and collaborative work. His main artistic interest is to use the performance event as a model onto which the pieces discourse directly can be applied. By using strategies that can be compared to minimalism, he sheds light on the politics of theatre and read it as a hierarchical machine with (unconscious) patterns of inclusion and exclusion.   \n\LHe is currently touring with \"b o n e r\" (2014), \"99 Words for Void\" (duo with Maike Lond Malmborg, 2015), \"Physics and Phantasma\" (2017) and \"Things in my mouth\" (2019). All which are made in close collaboration with Kanuti Gildi SAAL (Tallinn). The works have been presented in festivals and venues such as: Spielart (Münich), Baltic Circle (Helsinki), TnBA (Bordeaux), Baltoscandal (Rakvere), Auawirleben (Bern), Nanterre-Amandiers (Paris), FFT (Düsseldorf), Bastard Festival (Trondheim), Sophiensäle (Berlin), Staatstheater Nürnberg, Nowy Teatr (Warsaw), Palm Off Fest (Prague) and Dublin Theatre Festival. \LSince 2009 he is collaborating with Johannes Schmit under the name White on White, during the season 17/18 they premiered “Fuck me ! (we didn’t make it)“ and \"Tyskland\" at Maxim Gorki Theater, Berlin.  \n  \nNB! The performance contains explicit language that can be perceived as offensive and is not suitable for minors under the age of 18.  \nNB! The performance on March 26 will be followed by artist talk led by Anders Härm."
