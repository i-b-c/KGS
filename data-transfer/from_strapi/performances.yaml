    description_et: >-
        Me elame 21. sajandil, kus hirm ümbritseva ees moodustab suure osa
        inimeste igapäevaelust. Sellest inspireeritult keskendub lavastus
        *uncanny*-like ruumide ja situatsioonide loomisele. Ajal, mil meid
        ümbritseb Trumpi retoorika, Putini Venemaa, Euroopas jõudu koguv
        natsionalism ja populism, kahanev demokraatia ning kliima muutuste ümber
        käiv diskussioon, tundub vältimatu keskenduda ühe tegelaskuju isiklikule
        loole, teda ümbritsevale reaalsusele, hirmudele ja unistustele.   

        Mis juhtub siis, kui hakkad kahtlema kõiges ümbritsevas? Kui iga
        element, mida oled võimeline defineerima, on muutnud järgmiseks hetkeks
        oma põhiolemust? Mis saab siis, kui vahetegemine tuttavliku ning võõra
        puhul muutub võimatuks ilma moondumise, enesekaitse, valetamise,
        põgenemise, peitupugemise, võitluse või isegi vaenlase hävitamiseta?  

        Mis on sõda? Miks ajalugu ennast kordab?  

        Ühel päikesepaistelisel kevadpäeval 2017. aastal võis lugeda ajalehest
        inimkonna ajaloo jooksul õhitud suurimast konventsionaalsest lõhkekehast
        – *The Mother of All Bombs*. Lavastuses “Uncanny You” muutub tegelaskuju
        *Mother Bomb* meediatormi epitsentriks. See vahejuhtum paneb
        pealtvaatajad higistama justkui nad ise seisaksid kõrbes põletava päikse
        all. Avalik tähelepanu ning imetlus viib *Mother Bomb*i kokku *Üksildase
        Ränduriga* – koos alustavad nad teekonda alla pimedasse orgu.  


        **Ann Mirjam Vaikla** on lavastus- ja kujutav kunstnik. Ta on äsja
        saabunud New Yorgist, kus ta oli aasta praktikal Storefront for Art and
        Architecture galeriis Soho linnaosas. 2015. ja 2016. aastal osales ta
        Watermilli Keskuse rahvusvahelises suveprogrammis Long Islandil, mida
        juhib teatrilavastaja Robert Wilson. 2015. aastal lõpetas ta oma õpingud
        Norra Teatriakadeemias stsenograafia erialal.    


        **Lærke Grøntved** on etendus- ja performance kunstnik. Ta on osa
        sõltumatust teatrigrupist T.I.T.S. Ta on reisinud lavastustega “Forced
        Beauty” ja “MINE” ning esinenud koos Bianca Casady’ga (Cocorosie) tema
        2015. aasta Euroopa tuuril. Eelmine aasta esines ta Tallinnas SISU
        Sümpoosionil oma soolokontserdiga “Before the Storm”. 2015. aastal
        lõpetas ta oma õpingud Norra Teatriakadeemias näitlemise erialal.
    description_en: >-
        We are living in the 21st century where fear has become an ever
        expanding part of everyday life. Driven from that the performance
        focuses on uncanny spaces and situations. In the times of Trump’s
        rhetorics, Putin’s Russia, growing nationalism and populism in Europe,
        declining democracy and speculations around the climate change, it is
        inevitable for us to focus on the individual, its´ surrounding reality,
        its' struggles and wild dreams.  

        What happens when one starts to question everything and everybody around
        her? What if each element we are able to determine changes its’ being in
        the next moment? What happens when the mixture between the familiar and
        the unfamiliar gets so utterly prevailing that it’s necessary to
        transform, defend, lie, run, hide, fight and kill..?  

        What is war? Why history keeps looping itself?   

        On a sunny spring day in 2017 one could read from the newspapers about
        the biggest conventional explosive of humankind – The Mother of All
        Bombs. In “Uncanny You” the character Mother Bomb becomes the center of
        the media storm. It makes everybody sweat as if they were under the
        frying desert sun. All this attention and admiration by the masses
        brings her together with the Lonely Visitor – together they begin the
        journey into the uncanny valley.   


        **Ann Mirjam Vaikla** is a theatre and visual artist. Recently she came
        back from New York where she did her year long internship at the
        Storefront for Art and Architecture gallery in Soho. For the last two
        summers she participated the Watermill Center International Summer
        program on Long Island led by the theatre director Robert Wilson. In
        2015 she graduated her studies in scenography at the Norwegian Theatre
        Academy.  


        **Lærke Grøntved** is a theatre maker and performance artist. She is a
        part of the independent theatre group T.I.T.S and has been touring with
        the performances “Forced Beauty” and “MINE” and with Bianca Casady
        (Cocorosie) on her Europe Tour 2015. Last year in Tallinn she performed
        her solo concert “Before the Storm” at SISU symposium. In 2015 she
        graduated her studies in acting at the Norwegian Theatre Academy.
