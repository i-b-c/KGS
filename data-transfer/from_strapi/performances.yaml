    description_et: "POSTEDEN on poeetiline vaatemäng ja argiste situatsioonide emotsionaalne peegeldus, mille keskmes on rõivad kui Eedeni-järgse ajastu materiaalne kehastus: rõivad kui düstoopia illustratsioon, rõivad kui keha abstraktsioon. Kaetud kehade paratamatu saatus on aksepteerida ebanaturaalsust uue loomupärana. Kord, mis leevendab hirmu teadmatuse ja võõra ees, on sünteetiline. Rõivad varjavad ja paljastavad flirtivalt nii keha kui mõtteid. Nii põlgus kui armastus väljendavad ühtsuseiha. Rahuldus on kättesaamatu, mistõttu igatsus muutuse järgi on igikestev. Tsüklilises ennastkordavas ahelas on iga kordus indiviidi jaoks siiski omal moel unikaalne kogemus.  \n  \nPOSTEDEN on Laivi performatiivsete moeinstallatsioonide seeria 4. etendus. Sellele on eelnenud “Mystifying Mundane” (27.10.18), “Long Live Trashed Bodies” (16.3.18)\_ ja “When I Was a Girl & Life Was Yet Ahead” (20.10.17). Performatiivsete moeinstallatsioonide seeria tegeleb materjalide kui kehakatete kehaliste ja kehatute esitlusviisidega ekspermenteerimisega. Ruumi täitev atmosfäär kujuneb koos liikumise, heli- ja valguslahendustega.  \n  \nLaivi on kunstnik, kes väljendab end erinevate moekäsitluste kaudu, analüüsides rõivastust ja keha katmise meetodeid laiemalt nii visuaal-esteetilisel, funktsionaalsel kui ekspressiivsel tasandil. Tema loomingut iseloomustab materjalipõhine eksperimenteeriv lähenemine pindadele ja vormidele. Laivi on õppinud moedisaini erialal Eesti Kunstiakadeemias (BA 2012) ja Aalto Ülikoolis Helsingis (MA 2017). Ta on end täiendanud Londonis, Kopenhaagenis ja Barcelonas. Alates 2014. aastast on ta osalenud kaasaegse kunsti grupinäitustel ning eksponeerinud oma loomingut mitmel isikunäitusel."
    description_en: >-
        POSTEDEN is a poetic spectacle, an emotional reflection of mundane
        situations. Clothing is seen as the material embodiment of post-Edenic
        spirit: illustrating dystopia and abstracting the body. The destiny of
        clothed bodies is to accept the unnatural situation as the new norm. The
        order that relieves the fear of the unknown is artificial. Clothing both
        conceals and uncovers the body and mind. Disdain and love express the
        longing for unity. The stable state of satisfaction is unachievable,
        feeding the yearning for change. The cycle of life is repeating, yet on
        the individual level, every recurrence is a new experience.  
          
        POSTEDEN is 4th episode in the series of performative fashion
        installations by Laivi, following “Mystifying Mundane” (27.10.18), “Long
        Live Trashed Bodies” (16.3.18) and “When I Was a Girl & Life Was Yet
        Ahead” (20.10.17). The series experiments with presenting materials as
        bodycoverings both on and off the body. The atmosphere is created
        together with movement, light and sound.  
           
        Laivi is an artist working with different approaches to fashion,
        analysing clothing and methods of covering the body on aesthetic,
        functional and expressive levels. Her approach to surfaces and shapes is
        material-based and experimental. Laivi studied fashion design at the
        Estonian Academy of Arts (BA 2012) and Aalto University in Helsinki (MA
        2017). She has also studied in London, Copenhagen and Barcelona. Since
        2014 she has participated in numerous contemporary art exhibitions and
        has had several solo shows.
