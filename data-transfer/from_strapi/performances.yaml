    description_et: >-
        Ansambel U: /Tallinn  

        Cikada /Oslo  

        Divertimento Ensemble /Milan   

        Ensemble Taller Sonoro /Sevilla  
          
          
        Hea publik, kutsume teid kuulama auhinnatud nüüdismuusikaansambleid ja 
        parimate heliteoste poolt hääletama! Üleeuroopalise noorte heliloojate
        konkursi DYCE - Discovering Young Composers of Europe finaalkontsert.   
          
        4 ansamblit  

        4 Euroopa piirkonda  

        12 väljavalitud kandidaati  

        4 võitjat, kes jätkavad rahvusvahelist koostööd  
          
        Komposiitkontserdil esitavad neli ansamblit 4 linnas neljast Euroopa
        piirkonnast valitud 3 parimat teost. U: kontsert Kanuti Gildi SAALis
        toimub elavas ettekandes, kolme ülejäänut saab publik kuulata
        videoülekande vahendusel samas saalis. Iga piirkonna parim teos selgub
        kõigi nelja kontserdi publiku hääletuse tulemusena ning võitnud
        heliloojatelt tellitakse uus teos aastaks 2020.   
          
          
        Õhtu kava:  
          
        -> 16:00 - 16:45 Ansambel U: (Tallinn, elav esitus)  

        Piotr Peszat "Real Life Proof"  

        Pawel Siek "Lignes d'hauntologie / 1949?"  

        Juhani Vesikkala "Chosen families"   
          
        (16:45-17:15 kohvipaus)   
          
        -> 17:15 - 18:00 Ansambel Cikada (Oslo, videoülekanne)  

        Pablo Galaz Salamanca: Fundamental Particles (2014–15)  

        Patrick Friel: Water_Spires_Skies (2017)  

        Andreas Tsiartas: PNOE' (2018)  
          
        (18:00-18:30 kohvipaus)  
          
        -> 18:30 - 19:15 Divertimento Ensemble (Milano, videoülekanne)  

        Hunjoo Jung "Gestalt I"  

        Raphaël Languillat "crucifixion (perugino)"  

        Yiqing Zhu "Gigue"  
          
        19:15 - 20:30 Vaheaeg, catering  
          
        -> 20:30 - 21:15 Ansambel Taller Sonoro (Sevilla, vidoülekanne)  

        João Ceitil "ChacoN"  

        Daniel Ortega Gonzalez "De la unidad y la fragmentación"  

        Adrien Trybucki "Infinite Extension"  
          
        Õhtu tuleb pikk, aga väga meeleolukas! Kohvipausid ja catering U: poolt.
    description_en: >-
        Ensemble U: /Tallinn  

        Cikada /Oslo  

        Divertimento Ensemble /Milan   

        Ensemble Taller Sonoro /Sevilla   
          
        Dear Audience, we invite you to listen to the concerts by awarded
        contemporary music ensembles and to vote for the best pieces by young
        composers! The Finale of the contest for young composers: DYCE -
        Discovering Young Composers of Europe.  
          
        4 ensembles  

        4 regions in Europe  

        12 selected pieces  

        4 winners that continue international  collaboration   
          
        Four concerts by four ensembles, in the four partner cities, with a
        streaming broadcast from each concert hall to the other three. Audiences
        will accordingly be able to listen to the 3 best pieces from each
        region, i.e.12 pieces: 3 in live by ensemble U: in Tallinn and 9 in
        streaming. The audiences will be able to vote and select 4 winning
        scores from the pieces they listened to (live and in streaming), 1 from
        each European region. The four winning composers will be commissioned to
        compose a new piece for 2020.  
          

        Program of the evening:  
          
        -> 16:00 - 16:45 Ansambel U: (Tallinn, elav esitus)  

        Piotr Peszat "Real Life Proof"  

        Pawel Siek "Lignes d'hauntologie / 1949?"  

        Juhani Vesikkala "Chosen families"  
          
        (16:45-17:15 coffee break)   
          
        -> 17:15 - 18:00 EnsembleCikada (Oslo, live streaming)  

        Pablo Galaz Salamanca: Fundamental Particles (2014–15)  

        Patrick Friel: Water_Spires_Skies (2017)  

        Andreas Tsiartas: PNOE' (2018)  
          
        (18:00-18:30 coffee break)  
          
        -> 18:30 - 19:15 Divertimento Ensemble (Milano, live streaming)  

        Hunjoo Jung "Gestalt I"  

        Raphaël Languillat "crucifixion (perugino)"  

        Yiqing Zhu "Gigue"  
          
        19:15 - 20:30 Intermission, catering  
          
        -> 20:30 - 21:15 Ensemble Taller Sonoro (Sevilla, live streaming)  

        João Ceitil "ChacoN"  

        Daniel Ortega Gonzalez "De la unidad y la fragmentación"  

        Adrien Trybucki "Infinite Extension"  
          
        It will be a long day! But a pleasant one. An opportunity to gather and
        listen in a new way, to share moments of confrontation and of
        livelihood.
