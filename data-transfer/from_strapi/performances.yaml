    description_et: >-
        <!-- Toimetatud 10.04.17 -->Mis kord välja liigutatud, seda tagasi võtta
        ei saa!<br />

        <br />

        Ruum on Kanuti Gildi SAALi “Valge Box”, valgus “Whitewash” ja kostüümid
        “Casual Grey”. Žanrimääratlus on kõige üldisemalt etenduskunst, seejärel
        tantsulavastus, siis tsirkuse lavastus ja alles siis kujutav kunst.<br
        />

        Laval on 5 artisti, kelle tantsu- ja tsirkusetehniline tase on valitud
        tehnika raames perfektne – on kaanonit, sünkrooni, jadasid, pause ja
        palju muud. Tegeletakse ühtsuse ja lihtsusega, tervik moodustub
        unisoonis, kus viis erinevat keha teevad sama asja, kuid erinevas
        tämbris või helistikus.<br />

        <br />

        Artistid on osad tervikust. Seal on mitu kätt, mõned jalad, küünarnukk.
        Liigutus või liikumatus muudab olemise tervikuks ja üheks samal ajal.
        Tervikuks, kus kõik üksikud on ühinenud, kas asendi või suhte kaudu. Kui
        iga üksik taas eraldada, siis ruumis jääb nende vahele tühimik, kuid
        ajalises kontekstis püsib nendevaheline asend ehk nad on siiski kõik
        korraga tajutavad.<br />

        <br />

        Asetades lavastuse lineaarsele joonele saab väita, et see kõik on liiga
        lühike või liiga pikk. Lavastaja seda aga ei tee. “moiste” on tervik.<br
        />

        <br />

        Kogu meeskond on välja kasvanud OMAtsirkuse koolist või olnud sellega
        seotud. Kristin Made tegeleb graafilise disainiga, Kädi Metsoja
        koreograafia ja lavastamisega, Lars Schmidt muusika, heli ja lauluga,
        Kaja Kann on dramaturg, Margus Terasmees loob tehnilisi illusioone ja
        Alissa Šnaider, kes igapäevaselt tegeleb imago konsultatsiooniga,
        proovib seekord kätt kostüümikunstnikuna.<br />

        <br />

        Kädi Metsoja&nbsp;on lõpetanud OMAtsirkuse kooli, lavastanud
        tsirkuseetenduse “OMAmoodi” ning olnud
        koreograaf&nbsp;kohaspetsiifilisele lavastusele “Ära ussi ära tapa”,
        Kaja Kannu sooloetendusele “Be Real My Dear” ja Mart Kangro
        tõsielushow'le “Final Countdown”. Tantsijana ja tsirkuseartistina
        osalenud paljudes lavastustes, millega on erinevatel festivalidel
        esinetud Riias, Berliinis, Kellenhusenis, Vormsis, Viimsis, Rakveres,
        Viljandis, New Yorgis ja San Diegos. Kädil&nbsp;ei ole illusioonide
        tekitamise tahet. Tsirkuse laval on tõeliselt võimalik kohtuda kehadega,
        sest seal ei ole neljandat seina. Kõik, mis juhtub, juhtub reaalajas.
        Kädi ei tegele laval tõelise looga vaid tõelise teoga.<br />

        <br />

        Lavastaja:&nbsp;<strong>Kädi Metsoja</strong><br />

        Helikujundus: <strong>Lars Schmidt</strong><br />

        Stiil ja MUAH, lavakujundus: <strong>Alissa Šnaider</strong><br />

        Graafiline disain: <strong>Kristin Made</strong><br />

        Dramaturg: <strong>Kaja Kann</strong><br />

        Tehnilised trikid: <strong>Margus Terasmees</strong><br />

        Tsirkuseartistid: <strong>Edgar Vunsh, Markus Muide, Kreete Tarmo, Liis
        Maria Kaabel, Marta Vunsh</strong><br />

        Produtsent: Eksperimentaalse Liikumise Keskus<br />

        Koostööpartnerid: OMAtsirkus, Kanuti Gildi SAAL, Tallinna Vanalinna
        Päevad<br />

        Toetajad: Eesti Kultuurkapital, AkroKoda, Trikivabrik<br />

        Esietendus: 12.05.2017 Kanuti Gildi SAALis<br />

        Kestus: 50 minutit<br />

        Language no problem!<br />

        NB! Etendus 4. juunil kell 15:00 toimub&nbsp;Tallinna Vanalinna
        Päevade&nbsp;raames!<br />
    description_en: >-
        <!-- Toimetatud 10.04.17 -->A move made cannot be unmade.<br />

        <br />

        The space is Kanuti Gildi SAAL’s “white box”, the light is “white wash”
        and costumes “casual grey”. The genre is firstly performance art, then
        dance performance, then circus show and lastly visual art.<br />

        On stage there are five artists whose dance and circus technical level
        is perfect in the frames of technic used. There is canon, synchro,
        sequence, pause and more. They deal with unity and simplicity, a whole
        is made in the unison, where five separate bodies do the same move but
        in different timbre or tonality.<br />

        <br />

        The artists are a part of a whole. There are many arms, some legs, and
        an elbow. Mobility or immobility makes their presence fuse and stay
        singular simultaneously. A whole where all the singulars have merged in
        the position or relations. If separated, there will be a blank space
        between them, but in terms of time, the position between them stays and
        they are all perceptible at all times.<br />

        <br />

        Thinking of a linear line one could say that all of this is too short or
        too long. The director doesn’t do that. “moiste” is a whole.<br />

        <br />

        The whole team has grown out of or being involved with OMAcircus.
        Kristin Made does graphic design, Kädi Metsoja is a choreographer and a
        director, Lars Schmidt makes music and sound, Kaja Kann is a playwright,
        Margus Terasmees creates technical solutions and Alissa Šnaider who
        daily works as an image consultant will try her hand in costume
        design.<br />

        <br />

        By: <strong>Kädi Metsoja</strong><br />

        Sound: <strong>Lars Schmidt</strong><br />

        Style and MUAH, stage design: <strong>Alissa Šnaider</strong><br />

        Graphic design: <strong>Kristin Made</strong><br />

        Dramaturgical aid: <strong>Kaja Kann</strong><br />

        Technical solutions: <strong>Margus Terasmees</strong><br />

        On stage: <strong>Edgar Vunsh, Markus Muide, Kreete Tarmo, Liis Maria
        Kaabel, Marta Vunsh</strong><br />

        Producer: Experimental Movement Centre<br />

        In collaboration with: OMAtsirkus, Kanuti Gildi SAAL, Tallinna Vanalinna
        Päevad<br />

        Supporters: Cultural Endowment of Estonia, AkroKoda, Trikivabrik<br />

        Duration: 50’<br />

        Premiere: 12.05.2017 Kanuti Gildi SAAL<br />

        Language no problem!<br />

        NB! The performance on June 6 at 15:00 is a part of Tallinn Old Town
        Days!<br />
