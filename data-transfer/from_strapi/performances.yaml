    description_et: >-
        **Queer Womxn DJ collective**  

        <br>

        Queer-fem amatöör-DJ-de (veel nimetu) kollektiiv asutati Vilniuses
        kõigest aasta tagasi. See juhindub usust, et meie ruume peame juhtima
        meie. Meie eesmärk on üksteist võimestada ja toetada, koos luua ja
        raputada cis-meeste mõju all olevat ööelu muusikaga, millel ei ole
        žanri- ega mängureegleid.

        Meie setid on pandud kokku rütmide ja poliitika, luupimise ja trotsi,
        lõbu ja uudishimuga eksperimenteerimise vaimus, lisaks suurest soovist
        jagada armastust muusika vastu, mida naudime. Iga kord puldi taga on
        nagu esimene kord!  

        <br>

        <br>

        **James Lorién MacDonald**  

        “I Got Online and Went Mad”  
         
        <br>

        See teos on osa kestvast dekonstrueeritud püstijalakomöödia projektist.
        Enamik nalju on nagu vorst: kui peab seletama, kuidas see valmib, kaob
        kõigil hea tuju ja nad lähevad ära, ent mulle meeldib võtta osadeks
        naerutagused protsessid ja need kõigile vaatamiseks välja panna. „I Got
        Online and Went Mad“ on uus teos, mis käsitleb pilkamist ja vabastamist,
        äpusid ja kunne, neid, kes on woke ja neid, kellel näpud põhjas, ja
        seda, miks me laseme end endiselt sotsiaalmeedial piinata. Sellal kui
        nähtamatud tegutsejad kasumit saavad, anname oma hirmud, alanduse ja
        valu neile tasuta kätte ja võistleme viieteistkümne millisekundi
        kuulsuse nimel üürikeses päevakommentaaris.  

        <br>

        „Minu loomingus on piiride peal tegutsemine alati olnud keskne. Ma olen
        poolsoomlane ja elan kultuuride vahel. Olen transsooline ja nii elan
        samuti kultuuride vahel. Mu looming põrkab ringi vastuvõetavate žanrite
        vahel, olles kord püstijalakomöödia jaoks „liiga kunstipärane“, kord
        kunsti jaoks „liiga rahvalik“. Minu hinnangul teenib suurem osa neid
        eristusi – rahvus, sugu, žanr – infrastruktuure, mis kerkisid nende
        majutamiseks. Kuid infrastruktuuride vahel tegutsedes peab hääl pidevalt
        nende kahe vahel tõlkima. Esinemistes tunnen huvi selle vastu, kuidas
        kontekst ja sotsiaalsed sidemed annavad naljale mitte ainult sisu, vaid
        ka tähenduse.“  

        <br>

        **James Lórien MacDonald** kasvas üles Londonis Ontario osariigis ja
        omandas Toronto Ülikoolis bakalaureusekraadi teatri ja inglise
        kirjanduse alal. Ta elab praegu Helsingis ja töötab peamiselt
        püstijalakoomikuna ning on tegev Live Artis ja Nordic Larpis. Teda
        paelub läbivalt kehastumine, kestus, ühiskondlike normide õõnestamine,
        huumor ja trollimine. 2014. aastal hakkas ta meditsiiniliselt sugu
        vahetama ja oli esimene transsooline koomik Soomes. Ta korraldab ja
        kureerib selliseid etendusi nagu Feminist Comedy Night, draglesque ja
        queer varietee-etendus „Punch Up! – resistance and glitter“, ja
        queer-salongi „Attic Underground“.  


        <br>

        <br>


        **MajorDanger**  

        ca 5 min  

        <br>

        **MajorDanger** on mittebinaarne, eesti dräg artist ja aktivist, kes
        avastab sugu läbi poliitilise, humoori- ja šarmispektri. Ta on esinenud
        nii Eestis kui Lätis ning kuulub Latvian Drag King kollektiivi.
        MajorDanger toob oma poliitilise patriarhaati purustava etteaste
        šarmikalt NU Performance Festivali lavalaudadele.  

        <br>

        <br>


        **Querelle**  

        “I Need My Nails Done“  

        2020    

        <br>

        Terroristliku drag-püstijalaetenduse ajal kutsutakse publikut panema
        Querelle’i sõrmedele kunstküüsi ja kuulama (või jagama) vihast ajendatud
        lugusid küsimustest, mis puudutavad LGBTQ+ kogukonda. Querelle on teinud
        terroristlikke drag-DJ etendusi ja võidelnud igava heteronormatiivse
        ühiskonna vastu alates aastast 2016.  

        **Edvinas Grinkevičius** on kuraator, kunstnik ja aktivist, kes elab
        praegu Kaunases. Ta on töötanud alates 2017. aastast kuraatorina Kaunase
        Kunstnike maja residentuuriprogrammi juures. Alates 2016. aastast on
        Grinkevičius olnud vastandkultuuriliikumise WE ARE PROPAGANDA üks
        algataja ja kaaskuraator, aga ka aktiivne liige sotsiaalkeskuses Emma,
        mis on vasakpoolse poliitilise mõtlemise ja alternatiivse kultuuri ruum.
        Samal aastal algasid terroristlikud drag-DJ esinemised Querelle’i nime
        all. Tema lai looming koosneb kuraatori- ja kunstitegevusest, mida kõike
        seob huvi vasakpoolsete ja queer-ideede ning praktika vastu, mille
        eesmärk on pakkuda transformatsioonipotentsiaaliga loomepraktikat, eriti
        institutsionaalsetes struktuurides.
    description_en: >-
        **Queer Womxn DJ collective**  

        <br>

        A (still nameless) collective of amateur queer fem DJ’s was established
        in Vilnius only a year ago. It’s driven by a belief that our spaces need
        to be led by us. We aim to empower and support each other, to create
        together and to shake up the night-life scene that is dominated by
        cis-men, through music that has no limitations of genre or rules of
        playing with it.  

        <br>


        Our sets are put-together with a spirit experimentation between beats
        and politics, loops and defiance, fun and curiosity and a big wish to
        share the love of music that we enjoy. Everytime behind the decks is
        like the first time!  

        <br>

        <br>


        **James Lorién MacDonald**  

        “I Got Online and Went Mad”  

        <br>

        This piece is part of an ongoing project in deconstructed stand-up
        comedy. Most jokes are like sausage; if you have to explain how it's
        made, everyone loses enjoyment and leaves the room, but I like to take
        apart the processes behind laughter and lay them out for anyone to see.
        I Got Online and Went Mad is a new work exploring mockery and
        liberation, cucks and kings, the woke and the broke, and why we continue
        to torture ourselves with social media. While invisible actors profit,
        we provide our anxieties, humiliation, and pain to them for free, and
        compete for fifteen milliseconds of fame in the hottest take.  

        <br>

        "My practice has always been about straddling borders. I am half-Finnish
        and live between cultures. I am transgender and as such also live
        between cultures. My work bounces between acceptable genres,
        occasionally being "too artsy" for stand-up and "too popular" for art. I
        see most of these distinctions - nationality, gender, genre - as serving
        the infrastructures that arose to house them. When working in between
        infrastructures, however, a voice must constantly translate and
        interpret between the two. In my stand-up work I'm interested in how
        context and social bonds deliver meaning, not just the content of the
        joke."  

        <br>

        **James Lórien MacDonald** grew up in London, Ontario, and then
        completed a BA in Theatre and English Literature from the University of
        Toronto. He currently lives in Helsinki and works primarily in stand-up
        comedy, Live Art, and Nordic larp. He is consistently drawn to questions
        of embodiment, duration, undermining social norms, humour, and trolling.
        In 2014 he began medically transitioning and was the first trans
        comedian working in Finland, and hosts and curates shows like Feminist
        Comedy Night, the draglesque and queer variety show Punch Up! -
        resistance and glitter, and the queer salon Attic Underground.  

        <br>

        <br>

        **MajorDanger**  

        <br>


        **MajorDanger** is a non-binary Estonian drag artist and activist who is
        exploring gender through a political, humorous and charming lens.
        MajorDanger has performed in Estonia and Latvia and is part of the
        Latvian Drag King Collective. At the NU Performance Festival stage,
        political patriarchy is crushed in MajorDanger’s charming performance.  

        <br>

        <br>

        **Querelle**  

        “I Need My Nails Done“  

        2020  

        <br>

        During the terrorist drag stand-up performance the audience is invited
        to apply fake nails on Querelle’s fingers and listen to (or share)
        anger-inspired stories about issues concerning the LGBTQ+ community.
        Querelle is performing terrorist drag DJ performances and fighting
        against the boredom of heteronormative society since 2016.  

        <br>

        **Edvinas Grinkevičius** is a curator, artist and activist, currently
        based in Kaunas. Grinkevičius has worked as a curator of Kaunas Artists’
        House residency programme from 2017. Since 2016 Grinkevičius has been
        one of the initiators and co-curators of WE ARE PROPAGANDA, the
        counter-culture queer movement, also an active member of the social
        centre Emma, a space of left political thought and alternative culture.
        The same year marked the beginning of performing terrorist drag DJ
        performances under the name of Querelle. The broad spectre of his
        practice consists of curatorial and artistic activities, all connected
        through an active interest in leftist and queer ideas and practices,
        which aim to provide artistic practices with a transformative potential
        especially within institutionalised structures.
