    description_et: >-
        Yael Reisner praktiseerib arhitektuuri disainides, juhendades, uurides
        ja kirjutades. Ta alustas õpinguid bioloogina Jerusalemma Heebrea
        ülikoolis, kaitses magistrikraadi Londoni AA arhitektuurikoolis ning
        doktorikraadi RMIT ülikoolis Austraalias.   

        Yael Reisner sündis Tel Avivis ning on elanud Londonis alates 1990.
        aastast, kus asutas uurimusliku arhitektuuribüroo Yael Reisner Studio
        aastal 2004. Nii tema doktoritöö (2009) kui ka avaldatud raamat
        “Architecture and Beauty, Conversation with Architects About A Troubled
        Relationship”, kaasautor Fleur Watson (Wiley 2010) on fokuseeritud
        arhitektuuri ja esteetika vaheliste segaste suhete mõistmisele ja
        selgitamisele. Uurimus vaatleb disaini ja arhitektuuri alates 1930.
        aastatest kuni tänaseni, käsitledes subjektiivsuse ja ilu mõisteid
        arhitektuuris ning kaasates arhitektuuri uurimisse emotsionaalse
        kogemuse.   


        [www.yaelreisner.com](http://www.yaelreisner.com/)


        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile.
    description_en: >-
        Architect Dr. Yael Reisner, an architectural designer, academic,
        researcher, writer. She has a PhD in architecture (by design) from RMIT
        Melbourne, Australia, a Diploma from the Architectural Association in
        London and a BSc in Biology from the Hebrew University in Jerusalem.  

        Born in Tel Aviv, she has lived in London since 1990 where she is the
        director of Yael Reisner Studio, an architectural research lead practice
        since 2004, whereas she started her professional independence at the
        studio in 1988, in Tel Aviv, and continued in London.

        Both her Doctoral thesis (2009) and her published book “Architecture and
        Beauty, Conversation With Architects About A Troubled Relationship”,
        with Fleur Watson (Wiley 2010), were focused at understanding the
        troubled relationship between architecture and aesthetic since the 1930s
        along with studying the complex attitude amongst architects to the
        presence of the Self in architectural design, and its reflections upon
        the profession, developing an approach to architecture that involves an
        emotional experience, while studying the nature of the relationship
        between architecture and beauty in a trial to introduce beauty to
        architecture. 


        [www.yaelreisner.com](http://www.yaelreisner.com/)   


