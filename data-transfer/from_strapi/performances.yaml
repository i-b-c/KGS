    description_en: >-
        [**NUP 2020 newspaper**](https://saal.entu.ee/api2/file-21553)  

        <br />   

        VOICE AND SOMETHING MORE attempts to grasp voice: to work with voice, to
        recognise voice; to use voice; to listen to and interfere with voice; to
        fight for a voice; to agree, argue and sing along with voice, make
        bodies move and fall asleep to voice.   

        <br>

        Anne Carson writes in her essay “The Gender of Sound”, “It is in large
        part according to the sounds people make that we judge them sane or
        insane, male or female, good, evil, trustworthy, depressive,
        marriageable, moribund, likely or unlikely to make war on us, little
        better than animals, inspired by God.” To understand all the meanings of
        the voice, the voice must be witnessed as an event, something that
        revolves around bodies, an entity in its own right inherent to the body
        and to language.   
         <br>
        Yet, the voice belongs to neither. It operates autonomously – it sounds,
        gestures, exposes, hides, worries, calms, irritates, creates, damages
        and makes us laugh. It resonates, it hypnotises, it syncs, it has its
        sonorities – its silences, its rhythms and its intonations. Whatever it
        does, however it moves, the voice rarely goes unnoticed. The voice does
        not move away from the body. It expands it, carries it forwards, trying
        to connect it with the outside world.  

        <br>

        As the body is bound to its poetics and politics, its accents and
        dialectics, its grammar with its errors, so is voice. Language lingers
        in the mouth, slips out to chat a little, has its vocabulary on tip of
        the tongue, repeats and corrects itself… What is hidden by language,
        body utters. Through the voice, be it vocal or silent, we make ourselves
        heard, be it in the landscape, in the room, in society or in politics.
        It is through voice that private becomes public.   

        <br>

        This year, the festival programme combines a polyphony of artistic
        expressions and statements. It gives the stage to unfolding the
        emotional, social and political potentials of voice. It features poetry,
        the making of rhythm, synthetic sounds, inscribed narratives and
        historical contexts, humour, agency, participatory and collective voice,
        silence and, as the title suggests, something more. The juxtaposition of
        these different positions illustrates and challenges how dominant
        narratives, gender constructs, and the ruling political rhetoric can be
        questioned through the performativity of voice. Artists from a wide
        variety of backgrounds explore and redefine contemporary speech acts,
        work through vocal and linguistic boundaries, shift meanings and
        identities.   
         <br>
        While most of the festival’s performances and concerts take place at
        Kanuti Gildi SAAL, Sveta Bar and the venue at Sakala 3, the programme is
        accompanied by a series of shows on IDA radio. The NUPP (button in
        Estonian) programme offers a complementary insight, including
        introductions and follow-ups to the practices of festival’s
        participants. The medium of radio transfers voice and sound from one
        place to another and therefore makes it possible to play with all kinds
        of relationships: live and recorded, present and absent, living and
        dead, as well as with the ones who are listening and the ones who are
        not.    

        <br>

        Combining newly commissioned and existing performances, readings,
        modular synthesiser compositions, process-based collaborations as well
        as concerts, the festival’s focus tunes in to these technical,
        conceptual yet coincidental relations of voice. 

        To insist upon variety, the programme is divided into different chapters
        that show the way while getting lost in VOICE AND SOMETHING MORE.     

        Egija Inzule, Margit Säde  

        <br>

        **Margit Säde** is an independent curator and art worker based in
        Tallinn and Zurich. Switching between the roles of curator, educator,
        producer and artist, her main topics of interest are subjectivity,
        precarity and collectivity as well as language, human psyche and voice.
        In her work she emphasises the self-organised, the collaborative and
        ongoing nature of art practice. From 2017 to 2020 she worked as a head
        of Contemporary Art Master Programme and visiting associate professor at
        the Estonian Academy of Arts.  

        <br>

        **Egija Inzule** is curator and current director of NAC of Vilnius
        Academy of Arts in Nida, Lithuania. In order to respond to the hybrid
        character of NAC that includes running a residency programme, organising
        an international doctoral school, curating the arts programme, hosting
        students’ seminars and managing the general premises of NAC, Inzule
        works on developing processes and initiate productions that emerge from
        historical, geopolitical and sociopolitical analysis and reflection on
        the location with focus on significance and agency of the place.   

        There she co-founded the research/residency programme Neringa Forest
        Architecture, a transdisciplinary project focussing on spatial and
        material processes, forestry and policy-making to analyze the broader
        scope of forest-as-infrastructure in the Nordic-Baltic region.<br>

