    description_et: >-
        Eesti Kunstiakadeemia arhitektuuri ja linnaplaneerimise magistritööde
        kaitsmised on avalikud. Kuulama ja vaatama on oodatud kõik huvilised.<br
        />

        <br />

        Magistrantide lõputööks valitud teemad varieeruvad sel aastal start-up
        kogukonnast Marsi koloniseerimiseni, mängulisest Rummust digitaalselt
        võimendatud ruumielamusteni, puidu kui materjali detailsetest sõlmedest
        hoone lammutamiseni. Tegeletakse aktuaalsete teemadega nagu pagulased
        Eestis ja tervishoid maakonnakeskustes. Analüüsitakse masskohandamise
        võimalikkust Mustamäe paneelmajade näitel ning tegeletakse
        kaitserajatiste olemuslikkusega.<br />

        <br />

        Magistrantidega diskuteerivad hindamiskomisjoni liikmed: Epp Lankots,
        Veljo Kaasik, Toomas Tammis, Siiri Vallner, Eik Hermann, Peeter Pere
        ning väliskriitikutena Leonard Ma ja Klaske Havik.<br />

        <br />

        Sel aastal juhendasid nelja magistristuudiot arhitektid:<br />

        Prof. Andres Ojari ja Markus Kaasik<br />

        Prof. Andres Alver ja Indrek Rünkla<br />

        Katrin Koov ja Aet Ader<br />

        Renee Puusepp ja Martin Melioranski<br />
    description_en: >-
        The Public Defence of the MA Theses of Architecture and Urban Design

        The defence of the MA theses of the Faculty of Architecture and Urban
        Design of the Estonian Academy of Arts is a public event open to
        everybody.<br />

        <br />

        This year the topics range from a start-up community to the colonisation
        of Mars, from a playful take on Rummu to a digitally enhanced spatial
        experience, and from the detailed knots of wooden material to the
        demolition of a building. Similarly, current topics such as immigration
        in Estonia and healthcare services in county centres will be tackled.
        The students will also analyse the possibility of mass customisation on
        the example of prefabricated buildings in Mustamäe and deal with the
        characteristics of fortifications.<br />

        <br />

        MA students will discuss their work with the following evaluation
        committee members: Epp Lankots, Veljo Kaasik, Toomas Tammis, Siiri
        Vallner, Eik Hermann, Peeter Pere and external evaluators Leonard Ma and
        Klaske Havik.<br />

        <br />

        This year the Master's Studio was supervised by architects:<br />

        Prof. Andres Ojari and Markus Kaasik<br />

        Prof. Andres Alver and Indrek Rünkla<br />

        Katrin Koov and Aet Ader<br />

        Renee Puusepp and Martin Melioranski<br />
