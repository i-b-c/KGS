    description_et: >-
        BASKIN EHK NALJA PÕHIVORMID on uurimus huumorist. Tahame teada, mis on
        naljakas tänapäeval, siin ja praegu, täna, kus kõik on lubatud. Nalja
        eest ei panda vangi, aga huumoriajakirja toimetuses töötamine võib olla
        eluohtlik.  

        Oleme kogenud, kui kerge on olla tõsine ja sügavmõtteline. Oleme
        teadlikud, kui mugav on olla traagiline ja kurb. Oleme teadlikud, kui
        tänamatu on inimeste rõõmustamine ja naerma ajamine. Oleme teadlikud,
        kui keeruline see on. Aga ikkagi.  

        Segame parimate kavatsustega kokku estraadinumbrid, prantsuse komöödia,
        muusikalise draama, nõukogude kino, meelejahutaja, vabaõhukomöödia,
        kuulsuste elulood, anekdoodid ja legendid, tembime kõike kunstiliste
        liialdustega ning looritame ähmaste vihjetega.  

        Tulemuseks on Tartu Uue Teatri esimene komöödia.


        www.uusteater.ee
    description_en: >-
        “Baskin ehk Nalja põhivormid“ is a study on humour. Authors want to know
        what is funny nowadays, here and now, today, when everything is allowed,
        no one is sent to jail for a joke, but working in an editorial board of
        humour magazine might be life threatening. They have experienced how
        easy it is to be serious and sapiential. They are aware, how convenient
        it is to be tragic and sad. They are aware, how ungrateful is to rejoice
        people and make them laugh. How complicated that is. But still. With
        their best intentions, vaudeville, french comedy, musical drama, soviet
        cinema, entertainment, open air comedy, anecdotes and legends are mixed,
        manufactured with artistic exaggerations and veiled with hazy hints.  
        The result is the first comedy of Tartu Uus Teater.  


        www.uusteater.ee
