    description_et: "<!-- Toimetatud 20.03.17 -->\n<p>\n\tArdo Ran Varrese debüütlavastus, mis on üles ehitatud kui muusikateos. Sõnad, mõtted, liikumine, rütmid ja helid on reastatud ja komponeeritud pigem klassikalise muusika kui harjumuspärase dramaturgia reeglite kohaselt. See ei takista aga lavaltoimuvat teatrietendusena vaatamast ja nägemast.<br />\n\tOn vana mees ja on tema esimene raadio täis helisid, hääli ja mälestusi. Ta mäletab koos oma raadioga kõike. Ta teab, mis juhtuma hakkab. Kui saaks vaid sekkuda ja ajalugu muuta!<br />\n\t<br />\n\t<em>Heli ühendab meid ja on seda ühel või teisel moel teinud läbi inimkonna ajaloo. Inimese vaikuseotsingud tähendavad tegelikult mõtisklemiseks sobiliku ruumi otsinguid, mitte ihalust vaikuse enese järele. Nagunii tuleb lõpuks välja, et me teeme mõttetööd kõige paremini siis kui kuuleme lähikonnas teisi inimesi. Lärmakas maailmas on õiglus, mõõdukus ja inimlik mõõde ülimalt olulised. Heli sügavam olemus tähendab, et teatud määral on see alati ühisomand. Kui heli kulgeb vabalt läbi õhu nõuab see teatavat laadi “ela ja lase teistel elada” eetost. Hollandlaste 1970. aastate müravähendamise kampaania ajal võeti kasutusele üks lööklause ja vahest on käes aeg see taaselustada. See ütles lihtsalt… “Olgem üksteise vastu tasased.” See võib meie tänapäevase maailmaga harjunud kõrvadele tunduda pisut lahjavõitu ning vaidlustes, ängides ja kahtlustes läbinämmutatud ja ärakäiatud. Ent see tuletab meelde, et isegi tänapäeval tuleb heli ohjata mitte tehnoloogia ega jõu, vaid eetika abil. Selleks on vaja maailma kus keegi pole teistest märkimisväärselt valjuhäälsem ja kus kedagi ei suruta ähvarduste sunnil surmavaikusesse, vaid kus kõik võivad igapäevast elu elades ümiseda, vilistada, ja omavahel rääkida – ja kuulda teisi sedasama tegemas.</em></p>\n<p>\n\tDavid Hendy “Müra, helid ja hääled.”</p>\n<p>\n\tLaval<br />\n\tALEKSANDER EELMAA<br />\n\t(Eesti Draamateater)<br />\n\t<br />\n\tHääled raadios<br />\n\tGARMEN TABOR jt<br />\n\t<br />\n\tLavastaja ja muusikaline kujundaja<br />\n\tARDO RAN VARRES<br />\n\t<br />\n\tDramaturg<br />\n\tDONALD TOMBERG<br />\n\t<br />\n\tKunstnik<br />\n\tHENRY GRIIN<br />\n\t<br />\n\tEsietendub<br />\n\t21. aprill 2017 Tartu Uue Teatri proovisaalis<br />\n\t<br />\n\tLavastus valmib koostöös ERR Raadioteatriga</p>\n"
