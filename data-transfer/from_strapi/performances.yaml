    description_et: "AJAKAVA<br />\n<br />\n18.00 valge tagasein I<br />\n<br />\n**Priit Raud** - sissejuhatus<br />\n**Jaak Sapas** \"frame 1\", 6’<br />\nmuusika: paul kalkbrenner; tänud: marje kask; lepa talu 2016<br />\n**Chungin** „Ootan sõpra“, 3’<br />\nKunstnikku huvitab vormiliselt korvpall kui puhtalt koreograafilis-esteetiline liikumine ja liigutuste- ja ruumisemitootika. Igal liigutusel on ju tähendus, so funktsioon, st sportliku soorituse suund, kuid sellest sportlikust maatriksist väljaspool on tegemist kehalise tegevusega, mis võib pakkuda\_ ilu puhtalt esteetilises plaanis. („Ei ole midagi ilusamat, kui liigutav inimene“, Anton Kubrik) Sel pinnal, kaob ära eraldussein korvpallli ja balleti vahel. Mõlemad on puhtalt inimkeha väljenduse ja liigutuste ja ruumi vaheline tants, mis loob uue ruumi dimensiooni.\_<br />\nÖeldakse, et hea etendus on see kui saab naerda, nutta ja mõelda. Kas tuliselt põneva korvpallilahinguga ei kaasne samu affekte?\_ Chungin ei piirdu ainult vormi mänguga. Performance'i sisuline teravik on suunatud erinevate akuutsete probleemide pihta ühiskonnas. Luubi alla võetakse\_ küsimused nagu identiteet, üksindus, sõprus, grupikuuluvus, indiviid versus kollektiiv, sallivus jne.<br />\n**Henri Hütt** “Why do birds suddenly appear?”, 1’<br />\nIlmutuse ilmumise võimalikkusest…<br />\nTöörühm: Henri Hütt & Kaie Olmre<br />\n**Janis Rizhovs** “Made in estonia”, 7’<br />\nvideo - installatsioon - loodusdokk<br />\nTöörühm: Kadi Põder, Robin Juhkental, Epp Salulaid<br />\n**LAIK** “Tuletung”, 10’<br />\nTuletungis projetseerib LAIK ekraanile video tulest. Leekide liikumist ja hõõgumist lähemalt vaatama jäädes tekib paratamatult hüpnootiline seisund, üleminek muutunud teadvuse seisundisse. LAIK eksperimenteerib kohapeal helidega, kasutades selleks nt vihmapilli, süntesaatorit, tšellot, viiulit, kellasid, erinevaid olmevahendeid...<br />\nLAIK soovib oma performance´iga esile tuua, kui kerge on jääda tulekeeli imetledes hüpnootilisse lõksu, midagi liikuvat vaatama. Argielus kujutab see ühetaolise meedia, pildi- ja uudisvoo, pidevate seina- ja staatusuuenduste (ahel)sissetungi. <br />\nInterdistsiplinaarne kunstirühmitus LAIK on tegutsenud alates 2012. aastast. LAIK liikmed: Anu Vask, Kaspar Aus, Gerhard Lock, Kristino Rav, Jekaterina Kultajeva ja Juhan Vihterpal ühendavad erinevate kunstivaldkonande praktikad, kasutades oma ühisloomingus peamiselt liikumis-, heli-, performance ́i-kunsti meediume. <br />\n<br />\n20 minutit pausi <br />\n<br />\n19:10 Valge tagasein II<br />\n<br />\n**Harilikud Ränd Öömid** “Tantsuline aktiviteet ÜPRISKI okei heli saatel (ehk ood Koolitantsule)”, 8’<br />\nAutorid: Karoline Suhhov ja Katrin Kreutzberg<br />\n**Ruta Ronja Pakalne** “Almost Alone, 8’<br />\n“Almost alone” is made in different areas of Iceland. Combining very touristy spots with pure nature and 'middle of nowhere' - with a goal to see beauty and roughness in nature that Iceland has. Inspired by the movement of surroundings Rūta Ronja Pakalne tries to in-print them in her body movement and play with the coherence.\_<br />\nIn the middle of nowhere of Icelandic nature the feeling is that you are on your own but not quite, there is always a feeling that trolls or some creatures are following you and never leaving you alone.<br />\nThe short dance film is made in collaboration with a good friend of Rūta - Arndis Benediktsdottir, who took big part in showing what the real Icelandic freedom can be.<br />\n**Veronika Vallimäe, Minna Hint & Lilli-Krõõt Repnau** “Igavene error”<br />\nLähtesõnaks on errorid, nii isiklikud kui ka ühiskondlikud. Nad on võtnud vastu otsuse häälestada end teadlikult errori lainele, miksida tehnikaid, suhestuda, märgata, reageerida, mängida läbi, esitada küsimusi.<br />\n**Jakob Tulve, Anita Kossareva & Linda Vainomäe** Untitled city 1, 10’<br />\nLoome konseptuaalse linna, mis järgib kindlaid improvisatsioonilisi reegleid.<br />\n**Jaana Heinsalu** \"I see YOU!\", 5’<br />\nMade by Jaana Heinsalu & Martin Tõnumaa<br />\nMusic by Meditative Mind- Heart Chakra Meditation<br />\n**Evi Pärn** “white faces in a black box ehk “legitiimsus, eks? Vol 2”, 10’<br />\n“Iga viies laps läheb Eestis tühja kõhuga magama.” (uuringud) \nMTÜ Eesti Avatud Ühiskonna Instituudi uuring aastast 2012 näitab, et iga kolmas Eesti naine kannatab perevägivalla käes. Aastal 2016 on 38% kõigist õigusrikkumistest põhjustanud perevägivald. (AK 9.03.2016) <br />\nPolitsei ja Piirivalveamet korraldas aktsiooni, mille käigus postitasid enda Facebooki seinale 24 tunni jooksul kõik väljakutsed – kokku oli neid umbes 600, neid analüüsides tuli välja, et enim kasutatud sõnapaar oli joobes mees.<br />\nTöörühm: Mihhail Malkin, Jekaterina Kultajeva<br />\n**Chungin** “Ootan sõpra” vt eelmist plokki, 8’<br />\n**Liisi Lasn, Arvi Piir & Oskar Tikka** \"ruumis, ruumina, ruumiks\",<br />\n\"ruumis, ruumina, ruumiks\" peegeldab ruumi transformeerumist spetsiifilise etenduskunstiürituse toimumispaigaks, kus läbi etteasteid vaatama tuleva publiku naturaalse käitumislaadi saab esile tõsta nende endi tähtsust selles.<br />\n<br />\n30 minutit pausi<br />\n<br />\n21: 00 Tühi lava<br />\n<br />\n**Joanna Kalm** “not not an artist talk”, 10’<br />\nlavastatud vestlus Joanna Kalmu läbiviimisel Helina Karvakuga<br />\nMa kohtusin Helinaga etenduskunstide töötoas, hiljem tantsutundides, natuke varem sain teada, et ta on odaviskaja.. või tegeleb odaviskega. Ja temas on midagi poeetilist. Ta on vist elukunstnik. Vaatleb, mõtleb, uurib elu olemust. Ja siis viskab oda. Ja seal kehas ning vaimus on ülim teadlikkus.. tundlikkus. On viimistletud liikumine. On tants. Odatants.\nEsmalt räägime tantsu ja odaviske ja kunsti ja elu omavahelistest puutepunktidest.\nNende motivaatoritest, mõtestatusest, eesmärkidest, vajalikkusest, tulemuslikkusest...<br />\nNing siis on fookuses<br />\nkeha<br />\noda<br />\ntants.<br />\n**Andra & Helena Ehrenbusch** \"Dialoog\", 4,5<br />\nTekst - It's all about relationship<br />\nEsitus ja koreograafia: Helena ja Andra Ehrenbusch<br />\n**Tuuli Velling, Jorven Viilik & Kristjan Kesküla** \"Demograafiline kriis\", 6,5’<br />\nPerformance räägib kahest paralleelselt toimuvast sotsiaalsest protsessist aastatel 2006–2016.<br />\n**Chungin** “Ootan sõpra” ,vaata üle-eelmist plokki, 8’<br />\n**Epp Kubu** “Solvumisteni! ”, 15’<br />\nRäägivad pereliikmed, sõbrad, tuttavad ja kontvõõrad, kellega kohtusin ajavahemikus 1.03.2016-11.03.2016<br />\n**Rait Rosin** \"Piip, ahv ja president\", 6’<br />\nSoloperformans keskendub poliitilisele korrektsusele, mis seob kire lemmikloomade ja lemmiktegevuste vastu meie igapäevaste mõtetega. Igapäevane kemplemine ja huvitavalt aja veetmine tähendavad üheaegselt ka kõige esinduslikumale indiviidile riigisüsteemis tähelepanuväärselt erinevaid olukordi.<br />\nheli: SEBASTIAN MATTIAS SELIRAND ja KRISTEL AASLAID \"Tahan presidendiks\" (kestus 2 minutit)<br />\n**Carmel Köster / Rene Köster aka CKin2U / Chloé laGucci** \"Werq in Progress\", 10’\nChloé laGucci & CKin2U dekonstrueerivad\_ voguingu viit elementi*\_<br />\n*floor performance<br />\nhands performance<br />\nduckwalk<br />\ncatwalk<br />\nspins&dips<br />\nMuusika: Lenkemz<br />\n<br />\nOrienteeruv lõpp-aeg kell 22.00<br />\n<br />\nEtenduse plokkide ajal on uks kinni, vaheaegadel lahti. <br />\n<br />\nLisaks: **Mart Kangro** “Crazy talks”<br />\nVaheaegadel: Ulla Väljaste & Terezie Stindlova, Martis Roosimaa & Meeri Kaburi installatsioon fuajees.<br />\n<br />\n<br />\nAastal 2002 oli Eesti märki välja töötanud meeskonna soovitus mitte märkida Eesti toodetele “Made in Estonia”, vaid “Welcome to Estonia”, eriti pärast seda, kui Eesti on liitunud Euroopa Liiduga ja rahvuslikku märgistust toodetele ei ilmu. Näiteks oleks rõival koos hinnasildiga küljes tervitussilt. Kulutatud rahast 3,3 miljonit kulus turu-uuringutele; 4,7 miljonit brändikontsept- sioonile, loovlahendustele, brändiraamatule ja tootmiskonsultatsioonidele; 4,7 miljonit krooni materjalide tootmisele ja ürituste korraldamisele ning 0,4 miljonit krooni läks halduskuludeks.<br />\n<br />\nmade in estonia maraton ei karda rahvuslikku märgistust ning seda julgust näitab ta sel aastal juba üheksandat korda. Tasuta läbi viidud turu- uuringud viitavad, et tegu on ohtlikult populaarse üritusega, kuhu esinejaid ja vaatajaid ilmuvad nii ukse kui akna kaudu. Terve õhtu toovad erinevad etendus-, video-, heli-, tantsu- ja-jumal-teab- mis-kunstnikud-veel lavale oma loovlahendusi ja isiklikust brändist tulenevaid tunnetuslikke lühivorme. Mõne jaoks festival, teise jaoks pidustus, kolmanda jaoks arusaamatu taidlemine. Olenemata sildistamisest ja arvamustest, toovad kõiksugu kunstnikud ühel õhtul oma originaalloomingut lavale trikoloorist vaevatud SAALis –&nbsp; kõigepealt mustas kastis, siis valges ja lõpuks “alasti” laval.<br />\n<br />\nWillkommen to made in estonia maraton!<br />\n<br />"
    description_en: >-
        In 2002, the team developing the Estonian brand suggested that companies
        wouldn’t label their products with the tag “Made in Estonia” Instead
        they should go for “Welcome to Estonia”, especially after joining the
        European Union, and not using national labels on the products any more.
        From their budget 3.3 million kroons went to market research; 4.7
        millions to concept deve- lopment, creative solutions, brand portfolio
        and production consultations;&nbsp; 4.7 millions to material
        manufacturing and event organizing; and 0.4 million to administrative
        expenses.<br />

        <br />

        made in estonia marathon is not afraid of national labeling, and that
        courage is demonstrated this year for the ninth time. According to free
        market research the event is so unorthodoxly popular that audience and
        performers appear behind both windows and doors. All through the evening
        performance-, video-, sound- and god-knows- what artists bring you their
        own creative solu- tions and self-branded cognitive short forms. Some
        say it’s a festival, others festivity or third may suggest a cryptic
        wandering. Regardless of opinions and labeling, artists present their
        original pieces for one evening only at SAAL – a stage obsessed with
        tricolored feeling – first a black box, then white, following au
        naturel.<br />

        <br />

        Willkommen to made in estonia marathon!<br />

        <br />

        The list of the performers: 

        Chungin,

        Henri Hütt,

        Carmel Köster,

        Rene Köster,

        Janis Rizhovs,

        Jaak Sapas,

        Mart Kangro,

        Evi Pärn,

        Nele Suisalu,

        Veronika Vallimäe,

        Minna Hint,

        Lilli-Krõõt Repnau,

        Rait Rosin,

        Kunstirühmitus Laik,

        Epp Kubu,

        Andra Ehrenbusch,

        Helena Ehrenbusch,

        Ulla Väljaste,

        Terezie Stindlova,

        Jakob Tulve,

        Anita Kossareva,

        Linda Vainomäe,

        Liisi Lasn,

        Arvi Piir,

        Oskar Tikka,

        Meeri Kabur,

        Martis Roosimaa,

        Kristjan Kesküla,

        Jorven Viilik,

        Tuuli Velling,

        Harilikud Ränd Öömid, etc.
