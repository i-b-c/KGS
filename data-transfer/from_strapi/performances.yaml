    description_et: >-
        e‾lektron avab oma esimese festivali **Hiroaki Umeda** kahe lavastusega,
        mis põhinevad tehnoloogia ja inimkeha vastasmõjudel.  

        Lavastuses *Accumulated Layout* (2007) mängib Umeda vaataja visuaalse
        tajuga – ta ühendab keerukaid ereduse, kiiruse, reaktsiooni ja valguse
        peegeldumisnurkade kombinatsioone. “Valgus ja liikumine toimivad siin
        sünkroonis, komponeerivad stimulatsioonimustrite variatsioone,” ütleb
        Umeda. Need mustrid kuhjuvad, neist moodustub Umeda esituse
        sisestruktuur.  


        Lavastuses *Intensional Particle* (2015) tekitab Umeda oma loomingulise
        mänguväljaku digitaalsesse reaalsusesse, mis on tihedalt täis
        “ebastabiilset stabiilsust”. Ta kontrollib heli ja valgust liigumisega
        ning sulab protsessi käigus oma keskkonnaga kokku. Tema visuaalid ning
        kineetiline väljendus on plahvatavad, katkendlikud, muudavad ette
        hoiatamata oma ilmet ja mõju. Etendus tekitab vaatajas mulje, et kõik on
        üürike, ebapüsiv. See on efemeersuse esteetika, kõigepealt see plahvatab
        ja siis kustub ootamatult.
    description_en: >-
        e‾lektron opens its first festival with two performances by **Hiroaki
        Umeda**, which are based on the interaction between technology and the
        human body.  

        By intricately designing the strength, the brightness, the speed and the
        refracting angle of lights, in *Accumulated Layout* (2007) Umeda
        skillfully shifts the visual recognition of the audiences. 'The light
        and the move go hand in hand to compose various stimulation patterns,'
        says Umeda. With passage of time, these stimulation patterns gradually
        accumulate within the audiences' bodies: infusing in them ineffaceable
        residual images.
         
        In *Intensional Particle* (2015), Umeda reinterprets the particles in
        space as not static molecules but rather as 'active particles (or, mass
        points)'; and, visualizes, in space, the 'intensional force' that
        particles conceal. The audience will be experiencing a digital reality
        saturated with 'unstable stability': the raging streamlines vanishes
        after a minute, and the luminous waterfall vaporizes after a second.
        Therefore, despite the existence of an explosive canvas soaked with
        digital curvatures right before our eyes, it simultaneously gives us a
        fragile impression.
