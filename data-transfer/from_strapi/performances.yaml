    description_et: >-
        "Sotsiaalne orjus" on seisund, mis on tänapäeval enamikele omane.
        Sotsiaalse orjuse sünonüümiks võib pidada nii intellektuaalset kui ka
        reaalset orjust, mille mingit vormi me kõik mingil kujul omame. Kas
        sellest seisusest sündivad erinevad loomed on miski, mida pidada pühaks,
        väärtustada, armastada? <br />

        Või heita kõik kõrvale ja minna edasi.<br />

        <br />

        **Jarmo Reha** on vabakutseline lavastaja ja näitleja, kes on varasemalt
        olnud teatris NO99. Reha on lõpetanud EMTA Lavakunstikooli XXVI lennu
        näitlejana. Tema viimaste tööde hulka kuuluvad rollid mängufilmis
        "Portugal" ning lavastustes "BIG DATA" ja "Pikse pill". <br />

        Lavastajana debüteeris ta hiljuti projektiga "Oomen", mis leidis aset
        Narva Kreenholmi Manufaktuuris(2018).<br />

        Järgmiseks ettevõtmiseks on koostöölavastus Brüsselis resideeruva
        lavastajaga Armel Roussel — "Elagu elu, mis põletab rinda"(2019).<br />
    description_en: >-
        "Social slavery" is a state of being, which is nowadays common to barely
        everyone. Synonyms for social slavery can be intellectual but also
        physical. Everyone of us possess these structures in ourselves and
        between others in one form or the other. Are these structures capable of
        creating something, which we could cherish, love or hold as sacred?

        Or we just cast it all aside, and walk on.<br />

        <br />

        **Jarmo Reha** is a freelancing theatre director and actor, who has
        formerly been in the ensemble of Theatre NO99. Reha has finished
        Estonian Academy of Music and Theatre as an actor. <br />

        As an actor, his last projects have been film "Portugal" and stage
        pieces "BIG DATA" and "Pikse Pill".<br />

        As a director, he debuted 2018 in Narva, with project "Oomen".)<br />

        His next endeavor shall be a co-directed project with Armel Roussel in
        Brussels – "Long live the life, that burns the chest"(2019).<br />
