    description_et: >-
        20 aastat tagasi olime me Jonnuga kahekesi kuskil saalis. Võibolla oli

        teisi lapsi ka. Aga see ei ole see, kuidas ma tahan neid aegu mäletada.

        Minu mälestuses oleme me Jonnuga kahekesi. Harjutame lepatriinu tantsu.

        Nüüd on 20 aastat hiljem. Me vahel oleme ikka Jonnuga kahekesi saalis.
        Aga

        harva. Meid on nüüd nii palju. Igalpool. Privaatsus on haruldane nähtus

        OMAtsirkuses. Kõik koos ja hästi palju ja kogu aeg. Selline on meie elu

        nüüd.<br />


        <br />

        11.novembril, OMAtsirkuse sünnikodus, toimub väike pidu ühe suure

        seltskonna auks. Selle õhtu muudavad meeldivaks OMAd, sõbrad, mõtte- ja

        vihakaaslased. Paneme kõik kenad riided selga ja teeme näo, et me ei

        jooksnud sinna otse trennist. Katame oma spordirinnaka paela ära

        siidisärgiga ja vahetame kohvikruusid veinipokaali vastu.
