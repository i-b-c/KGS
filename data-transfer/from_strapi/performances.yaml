        <br />

        Punases Majas 4.novembril  toimuva “NU Performance Festival meets MÜRK”
        (Huoratron / Last Gang Records, Emer Värk & Renzo van Steenbergen, MÜRK
        DJd) pilet eelmüügis ning kohapeal 10 eurot.<br />

        <br />

        **Festivali pass: 35 EUR**<br />

        NU Performance Festivali passiga saab külastada kokku 7 etendusõhtut
        Kanuti Gildi SAALis ning 4. novembri õhtust üritust Punases Majas.
        Festivali passi ostes palume valida Dana Micheli lavastuse “Mercurial
        George” külastamise kuupäeva (29. oktoober kell 19:30 või 30. oktoober
        kell 17:00, Kanuti Gildi SAALis).<br />

        Festivali passis ei sisaldu 1. novembri kontsert Punases Majas (Peaches,
        Black Cracker, Maria Minerva).<br />
