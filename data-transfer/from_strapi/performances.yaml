    description_et: >-
        Kui uskuda üldlevinud arvamust, siis me ei saaks elada tänasest
        paremal ajal. Meile on kõik võimalik – saame õppida, mida iganes me
        soovime; elada ja reisida ükskõik kus ja kuhu; armastada ja olla
        armastatud enda valitud kellegi või millegi poolt; kanda nii kleite kui
        pükse; uskuda, mida soovime; kuulutada tõdesid, mida ainult meie
        usume. Valikuid kui palju!  
          
        Kas see ongi täius?  
          
        Aina rohkem inimesi käib psühholoogi juures või krõbistab
        antidepressante. Kas see on tingitud teadlikkuse kasvust nende
        probleemide suhtes või ei saa me selle keerulise, kõike võimaldava
        uue maailmaga lihtsalt hakkama? Seame endale eesmärgid ja standardid,
        mida me täita ei suuda, ning sipleme iseenda loodud ideaalide
        rägastikus, kus me ei ole kunagi piisavalt head, piisavalt lahedad,
        piisavalt ägedad voodis ja nii edasi. Oleme hoopis tühjaks lastud
        õnnetusehunnikud, kes oma piltidel Instagramis elavad unistuste elu,
        aga sisimas tahavad üle kõige koju minna, ukse lukku keerata,
        lakkamatult nutta ning enam mitte kunagi väljuda.  
          
        Mis seal ikka kurvastada! Musta Kasti 2019. aasta detsembris esietenduv
        uuslavastus keerab vindi peale ja toob lavale muusikali, kus tantsu,
        naeru ja laulu saatel seda täiuslikkust kõverpeeglist vaadatakse,
        leides elupäästvat rõõmu ka kõige mustematest värvidest.  
          
          
        Birgit Landberg lõpetas 2015. a. kevadel TÜ Viljandi Kultuuriakadeemia
        lavastaja ning näitleja erialal. “Evolutsiooni revolutsioon” on kolmas
        uuslavastus peale teatrikooli, tema varsemate lavastuste, “Peks
        mõisatallis” (Must Kast) ja “Titaanide heitlus” (Kinoteater), järel.
        Birgit ei hinda kunsti kunsti pärast, Birgitile ei meeldi ka kunsti
        pärast kannatamine.
    description_en: >-
        It’s a common belief that everything is possible and the times could not
        be better. We can study whatever we desire, be the person we wish to be,
        love and be loved by anyone, wear what we want, act like we want to act,
        believe in anything and declare truths that only we believe in. Choose
        what your heart desires!  
          
        Isn’t that perfection?   
          
        But for some reason more and more people are breaking down under the
        immense pressure of trying to be perfect. We use drugs and prescription
        pills to keep us afloat. Is it because of our growing  awareness of
        mental health problems or are we simply unable to cope with this complex
        – “everything’s possible” mindset? We set ourselves goals and standards
        that we cannot meet, and so we trample in a net of self-created ideals.
        People that are aimlessly getting by, but making sure that at least in
        Instagram photos their lives are perfect - always sunny and smiling. And
        all they really want is to hide themselves in their homes to cry, and
        never leave again.  
          
        Premiering in December 2019, theatre Must Kast will bring to the stage a
        musical where through dance, laughter and singing this “perfection” is
        turned upside down to find life-saving joy in the darkest of colors.  
          
        Director Birgit Landberg graduated from Tartu University Viljandi
        Culture Academy in the spring of 2015. “Revolution of evolution” follows
        the footsteps of her previous performances like “Beating at the stable
        of the manor” (in Must Kast) and “Fight of the titans” (in Kinoteater).
        Birgit does not appreciate art for the sake of art nor does she
        appreciate suffering for the name of art.  
           
        Director Birgit Landberg graduated from Tartu University Viljandi
