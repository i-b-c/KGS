    description_et: >-
        Professor **Brian Cody** on Hoonete ja Energia Intsituudi (Institute for
        Buildings and Energy) dekaan Grazi Tehnikaülikoolis ning
        konsultatsioonifirma Energy Design Cody asutaja. Energy Design Cody
        arendab uuenduslikke energia- ja kliimakontrollikontseptsioone
        rahvusvahelistele arhitektuurbüroodele üle maailma. Tema fookus on
        energiatõhususe maksimeerimine hoonetest linnadeni läbi teadustöö,
        akadeemia ja praktika. Enne Grazi Tehnikaülikooli (2003) oli ta
        rahvusvahelise inseneri- ja konsultatsioonibüroo Arup juhataja. Brain
        Cody kuulub erinevatesse žüriidesse ja nõuandekogudesse ning on lisaks
        külalisprofessor ja Energy Designi stuudio juhataja Viini Rakenduskunsti
        Ülikoolis.<br />

        [www.energydesign-cody.com](http://energydesign-cody.com/)<br />

        <br />

        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile. <br />

        <br />

        Loengusarja toetab Eesti Kultuurkapital ja korraldab Eesti
        Kunstiakadeemia arhitektuuriteaduskond. <br />

        <br />
    description_en: >-
        Professor Brian Cody is the head of the Institute for Buildings and
        Energy at Graz University of Technology and founder and CEO of the
        consulting firm Energy Design Cody, also based in Graz, which is
        responsible for the development of innovative energy and climate control
        concepts on construction projects all over the world. His focus in
        research, teaching and practice is on maximizing the energy performance
        of buildings and cities. Before his appointment at Graz University of
        Technology in 2003 he was associate director of the international
        engineering consultancy Arup. Professor Cody serves as member on many
        advisory boards and juries and is Visiting Professor and Head of the
        Energy Design Unit at the University for Applied Arts in Vienna. <br />

        [www.energydesign-cody.com](http://energydesign-cody.com/)<br />

        <br />

        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment. <br />

        <br />

        The lecture series is supported by Estonian Cultural Endowment and
        organised by the Architecture department of Estonian Art Academy.<br />
