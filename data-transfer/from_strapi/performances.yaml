    description_et: >-
        POST HORN on Raul Kelleri ja Hello Upani vabaimprovisatsiooniduo, mis
        keskendub eksperimentaalsusele, heli ning mürauuringutele. Keller ja
        Upan improviseerivad erinevates kooslustes koos alates 2000. aastast,
        2004. a koos Heikki Tikasega (BF, MKDK) salvestatud Projekt Unisoni
        ‘DOHC’ pani aluse nende müraeksperimentidele, alates 2006. aastast
        tegutsesid koos Katrin Essensoniga LokaalRaadiona, selle nime all
        jätkatakse eksperimentaalraadiosaadetega. Keller ja Upan on erinevates
        vabaimprovisatsiooni ja eksperimentaalheli koosseisudes ning duona
        andnud kontserte Soomes, Leedus, Poolas, Saksamaal ja Brasiilias.  


        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.
    description_en: >-
        POST HORN is Raul Keller’s and Hello Upan’s free improvisational duo,
        which focuses on experimentality, sound and noise research. Keller and
        Upan have been improvising together in different constellations since
        2000. In 2004 they recorded Projekt Unison ‘DOHC’ with Heikki Tikas (BF,
        MKDK) and this was a start of their noise experiments. Since 2006 they
        have collaborated with Katrin Essenson as LokaalRaadio, they continue
        making experimental radio shows under this name. Keller and Upan have
        been giving concerts as a duo or with different free improvisation and
        experimental sound groups in Finland, Lithuania, Poland, Germany and
        Brazil.  


        Improtest is concert series that brings improvisational music from local
        and foreign authors to local audience. The concerts have been taking
        place since 2005 once a month.
