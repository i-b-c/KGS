    description_et: >-
        see baseerub 365-l 10 realisel miskil.  

        senini on ilmunud neist sadakond.  

        üks 10 realine miski on sõnadesse tõlgitud minimalistlik ruum, mis on
        seatud kümnesse nummerdatud ritta. iga tekkinud ruumi olemus baseerub
        sünkroniseeritud mõtlemisel ning pannakse kirja vaid juhul kui aeg ja
        ruum on mõtlejad füüsiliselt kokku viinud. sõnad tekivad kuulamise ja
        teineteisega millestki rääkimise kaudu.  


        festivalil jagatakse 10 realise miski loomise protsessi avatud ruumis.
        publikut oodatakse tutvuma laualolevate tekstidega - mis on siiani
        kirjutatud, millised on sarnasused, milles seisneb struktuur, mis
        moodustab terviku. täites samal ajal ruumi oma kohaloluga, uurides miks
        ja kuidas muutub abstraktne isiklikult loetavaks, millisel hetkel saab
        dokumendist hoopis luule.

        olete palutud võtma istet ja jääma ringi.  


        AIR WITH CONTENT varasemalt:  

        Bunkier Sztuki Gallery (Kraków, Poola), TOKONOMA Exhibition Space
        (Kassel, Saksamaa), Grüntaler9 (Berliin, Saksamaa)  


        kadri noormetsa ja asia baś’i vaheline koostöö sai alguse 2013. aastal
        berliinis, kus töötati esimese ühise projekti touching (a true story of
        two climbers and their perilous journey over and under the seats)
        kallal, mida hiljem vilniuses, leedus ka esitleti. alates sellest, on
        nad olnud aktiivses dialoogis, kohtudes erinevates euroopa paigus.
        hetkel töötavad nad pikaajalise projekti - air with content kallal.
        selle esimene esitlus toimub aastal 2018, veel teadmata pealkirja all.
        nende koostöö on puu.  


        asia baś on poola etenduskunstnik, jutustaja ja tundmatutesse
        kohtadesse reisija. baś on londonis baseeruva kunsti- ja
        meediarühmituse “the people speak” aktiivne liige ning osaleb
        projektides, kus tema peenekoeline subjektiivsus ja tuntav kohalolu on
        väga oodatud. baś on osalenud zorka wollny, selene states’e, tino
        sehgal’i, romeo castellucci, ivana muller’i, kadrinoormetsa jt
        projektides. hetkel tegeleb eurütmiaga ning vaatleb loodust kaplinnas
        lõuna-aafrikas.  


        kadri noormets on eesti etenduskunstnik ja kirjutaja, kes töötab
        teatriga. vaadetelt tihti radikaalne. isegi kui avaldab raamatu või
        astub välja galeriis, täpsustab see tema seisukohta teatrist -
        organiseeritud kontsentratsiooni ruumist, nagu seda on potentsiaalselt,
        essentsiaalselt ka kunst, muusika või kirjandus.  


        gabriel da luz on brasiilias, belo horizontes baseeruv kunsti ning
        kunstivoolude ja performatiivsuse uurija. oma loomingus süveneb da luz
        tantsu, muusika, laulukirjutamise, lugemise ja kirjutamise, narratiivi
        ja tekstuaalsuse teemadesse, lisaks ajaloo, antropoloogia, filosoofia,
        urbanistika ning kirjanduse vallas tehtud uuringutesse. viimasel ajal on
        da luz olnud aktiivne lissabonis asuva keskuse c.e.m. (centro em
        movimento) juures. sealt sai alguse ka lähem koostöö kadri noormetsaga
        (alates 2017. aastast on da luz projekti kolmas liige).  


        (Lavastust tutvustav originaaltekst on inglise keeles.)
    description_en: >-
        it is based on 365 of 10 degree something-s.  

        so far 100 of those emerged.  

        one 10 degree something is a minimalistic microcosm translated into
        words, put into ten numbered lines. the essence of each microcosm
        created is based on synchronised thinking and written down only when
        sharing time and space physically. the words appear through listening
        and talking to each other about something.  


        at the festival the process of creating 10 degree something will be
        shared in an open space. visitors are invited to explore the texts on
        the table - what has been written, what are the similarities, what is
        the structure, what makes the whole. at the same time filling the room
        with their presence, investigating why and how the abstract becomes
        personally readable, when does the document become a poem instead.

        you are invited to take a sit and stay around.   


        AIR WITH CONTENT previously:  

        Bunkier Sztuki Gallery (Kraków, Poland), TOKONOMA Exhibition Space
        (Kassel, Germany), Grüntaler9 (Berlin, Germany)  


        the collaboration between kadri noormets and asia baś started in 2013 in
        berlin where they worked on their first project “touching (a true story
        of two climbers and their perilous journey over and under the seats)”,
        followed by the showing in vilnius, lithuania. since then they’ve been
        in active dialogue, meeting each other in various places in europe.
        currently they are busy with a long term project called “air with
        content”. in 2018 they are presenting its first manifestation, title yet
        unknown. their collaboration is a tree.  


        asia baś is a polish performer, storyteller and traveller to unknown
        places. she is an active member of the people speak - london based arts
        and media collective, and performs in projects where her subtle
        subjectivity and strong presence are needed. she performed in works by
        zorka wollny, selene states, tino sehgal, romeo castellucci, ivana
        muller, kadrinoormets and many more. currently trains eurythmy and
        observes nature in cape town, south africa.  


        kadri noormets is an estonian performing artist and text creator working
        on theatre. often radical in her views. even if releasing a book or
        making an appearance in gallery, it is to elaborate her statement about
        theatre - an organised space of concentration, as well as art, music or
        literature potentially, essentially is.  


        gabriel da luz is a researcher of arts, movement and performativity,
        inhabitant of the city of belo horizonte, brasil. his creations are
        accompanied by investigations on dance, music, songwriting, reading and
        writing, narration, textuality; and studies on history, anthropology,
        philosophy, urbanities, literature. recently he was involved in
        researches with c.e.m. (centro em movimento) in lisboa, portugal - the
        same place where a close relation with kadri noormets started.

        (since 2017, he is a third member of the project)
