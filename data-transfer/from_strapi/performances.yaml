    description_et: >-
        “Likes” põhineb kahe kõige populaarsema Youtube'i nähtuse – *cover
        dance*'i tutoorialite ja erinevaid joogatehnikaid käsitlevate videote –
        analüüsil. Kunstnik pöördub publiku poole sotsiaalantropoloogilisest
        perspektiivist lähtuva sõnavõtuga, käsitledes „like'ide“ sotsiaalset
        väärtust meie digitaalses ühiskonnas.  
          
        *COVER DANCE* & JOOGA  

        Popstaaride lauludele loodud koreograafiad koguvad miljoneid vaatajaid,
        laike ja jagamisi. Need tantsukoreograafiad on loodud teatud inimeste
        poolt justnimelt selleks, et teised neid omandaksid ja taasesitaksid.
        Seega kaverdavad ja panevad sotsiaalmeediasse üles oma isiklikke
        tõlgendusi neist tantsudest miljonid inimesed, olles osa ülipopulaarsest
        internetinähtusest nimega *Cover Dance*. Nähtus ise sai alguse
        Lõuna-Koreas, mõjutatuna K-pop muusikast, tantsustiilist ja
        visuaalidest.  

        "LIKES" füüsiline material baseerub mõnedel sotsiaalmeedias eriti palju
        like'e saanud tantsudel ja veel teiselgi samavõrra populaarsel
        internetinähtusel – joogal. Internet on võimaldanud esile kerkida uutel
        jooga hübriidvormidel, nagu näiteks 'yogalates, yogavoga, yogadance,
        yogabeer, yogagoat, yoganude, yogarave*...  
          
        LAIGID  

        Laigid on virtuaalne tööriist, mida kasutab tänapäeval enamik inimesi,
        eriti aga noorem põlvkond kogu sotsiaalmeediavõrgustikus. Võib olla
        mitmeid põhjusi, miks keegi soovib internetis saada või anda laike.
        Mõnede inimeste jaoks on laigid võimas viis, kuidas väljendada oma
        empaatiat ja poolehoidu mingi sisu või isiku suhtes. Teiste jaoks avavad
        laigid uue mõõtme prestiiži või majandustegevuse vallas. Kuna paljud
        ettevõtted ja korporatsioonid kasutavad laike (neid ostes ja müües)
        majanduslikel kaalutlustel (saamaks kaalu ülitiheda konkurentsiga ja
        ülihierarhiseeritud globaalsel turul), on laigid omandamas uut mõõdet
        kaubeldava sotsiaalse prestiiži sümbolina.

        Millise koha omandab keha, vorm, välimus, tohutul hulgal kordi
        sotsiaalmeediast läbi lastud kehakuvand suhtes likidega? Millise koha
        omandavad laigid kui sotsiaalse prestiiži uued tähistajad seoses nende
        kommertsialiseerimisega ja võib-olla kaudselt ka keha ja kehakuvandi
        kommertsialiseerimisega interneti vahendusel?

        Kui me räägime laikidest kas me räägime siis üksnes nupulevajutusest
        internetis? Või me räägime ühtlasi sellest, kuidas me vaatame, loeme ja
        mõistame teist inimest?
          
          
        Núria Guiu on Barcelonast pärit ja seal baseeruv kunstnik. Ta on
        *Iyengar* jooga tsertifitseeritud õpetaja, õpib UOC ülikoolis
        antropoloogia ja inimevolutsiooni erialal ning on lõpetanud klassikalise
        tantsu “Institut del Teatre de Barcelona's”. Ta kuulus IT Dansa
        noortekompaniisse ja töötas hiljem tantsijana selliste kompaniide juures
        nagu Cullberg Ballet, Gisele Vienne, Carte Blanche Dance Company,
        Batsheva Dance Company (Kamuyot), Ingri Fiksdal, Jasmin Vardimon, La
        Veronal, Kobalt Works, Manuel Rodriguez. Alates 2012. aastast on teda
        huvitanud koreograafia ning ta on loonud teosed "La Muda" (esietnedus
        Oslo ooperiteatris), "Portal" (esietendus Oktoberdans festivalil
        Bergenis). Tema viimane sooloteos "Likes" valiti välja Euroopa
        platformil Aerowaves 2018 ja seda on esitatud muuhulgas sellistel
        festivalidel nagu Fira de Tàrrega, Festival Batard, Taiwan Dance
        Festival. Samuti on ta töötanud koreograaf Arco Renz'i kunstilise
        assistendina Aasia riikides (Kambodžas, Filipiinidel, Vietnamis, Koreas)
        aset leidnud projektides ja Gisèle Vienne'i assistendina lavastuse Crowd
        juures.
    description_en: >-
        Likes bases itself on the analysis of two of the most popular Youtube
        phenomena: cover dance and tutorials and videos on the different
        tech-niques of yoga. The artist approaches the audi-ence from a
        socio-anthropological perspective with a speech about the social value
        of a “like” in our digital societies.
          
        COVER DANCE & YOGA  

        Dance choreographies made on songs from pop stars acumulates milions of
        viewers, likes and shares. The dance choreographies are created
        specifically by some individuals for its appropriation and
        re-performance, so milions of people covers and re-post in social media
        their personal interpretation of the dances through this  

        very popular phenomenon in internet called: Cover Dance. The phenomenon
        started in South Korea influ-enced by K-pop music, dance and visuals.  
          
        LIKES takes as a physical material base some of this highly liked dances
        in social media as well as another phenomenon also very popular on the
        internet: Yoga. Internet has facilitated the emergence of new hybrid
        forms of yoga such as: *Yogalates, yogavoga, yoga-dance, yogabeer,
        yogagoat, yoganude, yogarave...*  
          
          

        Núria Guiu is an artist based/from Barcelona. She is a certified Yoga
        Iyengar teacher, a student of a Degree in Anthropology and Human
        Evolution at the UOC university and graduated in classical dance at the
        “Institut del Teatre de Barcelona”. She was a part of IT Dansa young
        company and later she worked as a dancer with companies such as Cullberg
        Ballet, Gisele Vienne, Carte Blanche Dance Company, Batsheva Dance
        Company (Kamuyot), Ingri Fiksdal, Jasmin Vardimon, La Veronal, Kobalt
        Works, Manuel Rodriguez. Since 2012 she has been interested in
        choreography and has created pieces such as La Muda, premiered at the
        Oslo Opera House, Portal, premiered at the Oktoberdans Festival in
        Bergen. Her last solo work, Likes, has been selected by the European
        platform of Aerowaves 2018 and presented at festivals such as Fira de
        Tàrrega, Festival Batard, Taiwan Dance Festiaval, among others. She has
        also worked as an artistic assistant for Arco Renz choreographer in
        projects developed in Asian countries such as Cambodia, Philippines,
        Vietnam, Korea and as an assistant to the new creation of Gisele Vienne;
        Crowd.
