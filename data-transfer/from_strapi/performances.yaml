    description_et: >-
        Kapriisid III on performatiivne installatsioon, milles domineerib musta-
        ja valge maagia kokkupõrge. Valgus tardub skulptuuriks, teatrikardin
        mõraneb. Oluline on vaatenurkade paljusus. Teatri mitte-dramaatilised
        elemendid on toodud esile, liigne elulähedus jäetud tahaplaanile.
        Kapriisid kui meetod tegeleb performatiivse installatsiooni ning
        installatiivse performance'i võimaluste ning võimatustega. Toome teatri
        terminoloogia karakteriseeritult lavale. Metafüüsiliseks jäävad terminid
        nagu neljas sein, kontekst, teatrimaagia ja siirus kohtuvad oma kehaga.


        Kapriisid III algab etenduskunsti kollektiivsest kogemusest musta kasti
        esteetikas ning transformeerub samm-sammult valge kuubi individuaalsesse
        üksindusse, jättes vaataja ruumile alistuma. 


        Eelnevad Kapriiside väljundid on teostatud ning esitatud Eestis. Kolmas
        osa valmib koostöös Kiasma Teatriga, keskendub sealse konkreetse
        lavaruumi iseärasustele, milles 20. aasta jooksul erinevad aktsioonid
        toimunud on.<br />

        <br />


        [Intervjuu Henri ja
        Mihkliga](https://www.youtube.com/watch?v=FEPTLI7HWEo#action=share)<br
        />

        <br />

        Henri Hütt on (etendus)kunstnik, kes väärtustab loomingulisi
        hübriidvorme,

        kuhu kuuluvad nii tehnoloogilise dominandiga etenduskunsti vormid,

        helietendused, lavastatud näituse kontseptsiooni arendamine ning
        koostööd

        erinevate valdkondade kunstnikega. On rühmituse MIMproject liige ning

        Baltikumi ja Skandinaavia kunstiülikoolide võrgustiku DAMA
        koordinaator.<br />

        <br />

        Mihkel Ilus on visuaalkunstnik, kelle põhifookus on maali laiendatud
        väljal.

        See tähendab, et Ilus sageli töötab suuremõõtmelise installatsiooniga,
        milles

        maaliline lähenemine omab keskset rolli. Ilusa praktika oluline osa on
        ka

        kaasaegse näitusekultuuri ja etenduskunsti põimumine. Viimasel ajal
        tegeleb

        peamiselt objektse kunsti erinevuste uurimisega black box ja white cube

        tingimustes.
    description_en: >-
        Caprices III is a performative installation dominated by the frontal
        collision of black and white magic. Light freezes into sculpture,
        theatre curtain cracks. Perspective matters. All the stage-technical
        arsenal and the components of the play are brought forward, excessive
        intimacy is left behind.


        Caprices is an ongoing project that brings together practices of
        contemporary performance and exhibition culture. The approach that
        describes our method is re-evaluating the characterization of the fourth
        wall, context, theatre magic and sincerity.


        Caprices III transforms from the collective experience of the black box
        to the individuality of the white cube, leaving the spectator to
        surrender the space. Two previous part has been produced and played in
        Estonia. The third edition is a collaboration with Kiasma Theatre,
        putting the theatre space in special focus to celebrate Kiasma’s 20th
        anniversary.

        <br />


        [Interview with Henri and
        Mihkel](https://www.youtube.com/watch?v=FEPTLI7HWEo#action=share)<br />

        <br />

        Henri Hütt is an artist-performer, who is primarily a dancer. Since the
        beginning of this decade, he has created many technological performative
        acts, staged exhibitions, sound performances and other unprecedented
        formats. Henri Hütt is also part of the MIMproject team and coordinates
        Dance And Media Art network DAMA in Scandinavia and the Baltics.


        Mihkel Ilus is a visual artist, whose main focus is painting and its
        extended field. Ilus often works with large-scale installations where
        painting plays the central role. In the practice of Ilus, contemporary
        exhibition culture and performance practices are inextricably
        intertwining. Recently Ilus has been concentrating on the distinction of
        objecthood as such in conditions of the white cube and black box
        situations.

