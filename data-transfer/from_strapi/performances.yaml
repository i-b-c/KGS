    description_et: >-
        EKA arhitektuuriteaduskonnas räägitakse 16. veebruaril tõelistest
        tulevikuteemadest: mis juhtub arhitektiametiga ja linnadega, kui robotid
        ehitustandri üle võtavad? Kas arhitektist on saamas vaid süsteemi
        kirjutaja, roboti kodeerija või hoopis kõike haldav looja?       


        Hollandi arhitekt Jelle Feringa on üks Taanis asuva Odico
        arhitektuurirobotite tehase rajajaid ja juhte. Feringa räägib
        neljapäeval Tallinnas sellest, mis võiks arhitektuurimaailmas muutuda
        robootika rolli kasvades: mida robotid juba täna teha suudavad ning
        kuidas uued võimalused meie elukeskkonda juba lähitulevikus muuta
        võiksid. Kuulama on oodatud nii arhitektuuritudengid, professionaalid
        kui lihtsalt ruumihuvilised.  


        Lisaks avatud loengule annab Feringa järgmisel päeval Tallinnas EKA
        tudengitele arhitektuurirobootika töötoa, katsetades
        arhitektuuriosakonna uut robotit. “See on üks kaasaegse arhitektuuri
        olulisemaid küsimusi – kuidas saada digitaalne informatsioon reaalsesse
        materjali ilma kompromissideta geomeetrias ja ruumilises ülesehituses,
        samas kättesaadava rahalise ja ajalise kuluga. Robotite kasutamine on
        siin üks viise toomaks keeruka geomeetriaga ruumid ja vormid
        digitaalsest maailmast igapäevasesse materiaalsesse kogemusse,” ütleb
        arhitektuuriteaduskonna dekaan Toomas Tammis.  


        Odico (rajatud 2012) on esimene tehas, mis on spetsialiseerunud
        robotitele arhitektuuris - tänaseks on tehas teostanud nii väiksemaid
        kui suuremaid projekte. Odico rajajate endi sõnul moodustab kolmandiku
        nende tööst tarkvara, kolmandiku riistvara ning kolmandiku nende
        teadmised ja kogemused geomeetria ja arhitektuuri vallas. Feringa on
        lisaks veel büroo EZCT Architecture & Design Research kaasasutaja;
        projekte, milles ta osalenud on, on laialdaselt eksponeeritud nii Mori
        kunstimuuseumis Tokyos, Archilabi näitusel Orléansis, Barbicani galeriis
        kui Londoni disainimuuseumis, samuti Pompidou keskuse püsikollektsioonis
        Pariisis. Tema tööd, mis presenteerivad robotite kasutamisvõimalusi
        arhitektuuris on hetkel eksponeeritud Zaha Hadidi galeriis Londonis,
        Meta Utopia näitusel.  

        http://www.odico.dk/  


        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikuid, kriitikuid ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki.  

        www.avatudloengud.ee
    description_en: >-
        What strings architecture, economy, robotics & modernity together?  

        On February 16th at 6 pm, the Open Lecture Series of the Faculty of
        Architecture will be happy to present Dutch architect Jelle Feringa at
        Kanuti Gildi SAAL (Pikk 20, Tallinn). For the last few years, Feringa
        has been working on projects that try to harness the full potential of
        robots in architecture, building up Danish architectural robotics
        company Odico. In Tallinn, Feringa will talk about the changes that
        robotics are bringing to architecture and to the cities around us. In
        the future, what will the role of the architect be? Open Lectures are
        open to all architecture students, professionals and general audience
        intrigued by spatial matters: the lectures are in English and free of
        charge.  


        In addition to the open lecture, Feringa will give a small workshop in
        Tallinn on the following day, focussing on introducing students to the
        new robot of the Estonian Academy of Arts architecture department and
        testing its capabilities. “This is one of the most important issues of
        contemporary architecture: how to transfer digital information into
        physical material without compromising the geometry and spatial
        structure and yet with obtainable financial and time resources. Using
        robots is one of the ways to make sure geometrically intricate spaces
        and shapes can be transferred from digital world into our daily material
        experiences,” explains Dean of Faculty of Architecture Toomas Tammis.  


        Jelle is co-founder and CTO at Odico formwork robotics the first factory
        to specialize in architectural robotics. He is co-founder of EZCT
        Architecture & Design Research The work of the office is widely
        exhibited, exhibitions include the Mori Art Museum, Tokyo, Archilab,
        Orléans, Barbican Gallery, London Design, Miami/Basel and is part of the
        permanent collection of the Centre Pompidou, Paris. Jelle is a PhD
        candidate at the Hyperbody research group, TU Delft. His efforts in
        architectural robotics, both industrial and experimental are currently
        on display at the Zaha Hadid gallery in London, as part of the Meta
        Utopia exposition.  

        http://www.odico.dk/  


        Open Lecture Series is supported by Estonian Cultural Endowment and
        organised by the Estonian Academy of Arts architecture department.  

        www.avatudloengud.ee
