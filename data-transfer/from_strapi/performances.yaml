    description_et: >-
        “Ma leian, et iga kujutis, mis murrab lahti meie tavapärast
        kujutlusvõimet ja loob lootust, on viis mässata keskvõimu vastu. Ma
        leian, et lapse üleskasvatamine ja tema väljakujunemise toetamine
        viisil, mis säilitab ja kaitseb tema imestamisvõimet kui olemasolevat
        korda õõnestavat mõtlemist, on mõjuvõimas ja rahutukstegev. Lootuse
        tagasi andmine tulevikule, jaanimardikate kogule ja uuetele
        põlvkondadele, on olemasolevat korda õõnestav tegevus.  
          
        Mind huvitab vastutustunne, mille ma annan laste kätesse, mille toetan
        nende kindlale usule oma nägemusse tulevikust ja mõtetesse tuleviku
        kohta. Selline tegevus kannab sügavalt harivat tähendust; ideed
        etendusest kui maagilisest ja vajalikust teost. Mina usun utoopia poole
        teel olemisse kui sotsiaalsesse eesmärki, isegi kui selle tulemus jääb
        üksnes millekski imetabaseks ja käegakatsutamatuks, mõistetamatuks.  

        Selline tegu, ükskõik kui väike, sisaldab endas vajalikku ajanihet.” 
        Francesca Grilli  
          
          
        Francesca Grilli on Itaalia päritolu kunstnik, kes hetkel baseerub
        Brüsselis. Tema uurimistöö võngub kahel väljal: visuaalkunsti ja
        etenduskunsti omal. Ta kasutab multidistsiplinaarset keelt, millest
        lähtuvalt voolavad tema etendused kunstisaalide ja etenduskunsti
        festivalide vahel. Alati pöörab ta erilist rõhku helile, selle
        igasuguses vormis ja võtmes.  

        Grilli on välja töötanud mitmeid projekte lähtudes
        „vastupaneva/vastupidava keha“ ideest. Tema varasemates
        performatiivsetes projektides peegeldas keha vastupidavust: pannes
        kõigest hoolimata ja kõige puhul vastu elule, ajale, allakäigule.
        Viimastes töödes vannub „vastupanev/vastupidav keha“ alla „ära
        tarbimise“ ideele või võitleb sellega. Igas teoses on olemas mingi
        kadumine, mis tuleneb mingist teoses sisalduvast tegevusest. Ta uurib
        helide maailma. Tema teosed liiguvad eraelulistest ja isiklikest
        elementidest lähtudes vaataja tegevusruumi, tõmmates teda kaasa
        mitmetähenduslikule ja rahutukstegevale territooriumile.  

        Tema teoseid on näidatud paljudes rahvusvahelistes paikades, nagu
        näiteks Palais De Tokyo (2017), Van Abbemuseum Eindhoven'is (2015-2017),
        „Azione – Interazione“ MAXXI muuseumis Roomas (2016), „viceversa“
        Itaalia Paviljonis 55. Veneetsia biennaalil (2013), MADRE - Museo d'arte
        contemporanea Donnaregina's Napolis (2012), Serpentine Gallery's
        Londonis (2010) ja Manifesta7'l Bolzanos (2008).  

        Samuti on ta osalenud mitmetel etenduskunsti festivalidel, nende hulgas
        Santarcangelo Festival (2017- 2019), Kunsthalle Osnabrueck Saksamaal
        (2017), O museu como performance Serralves Foundation'is Portugalis
        (2017), Homo Novus Festival Riias (2016), Drodesera Festival
        (2006/2017), Romaeuropa Festival (2011), Rencontres chorégraphiques
        Pariisis (2010).  
          
        Francesca Grilli on Santarcangelo Festivali residentkunstnik
        (2017-2019).  
          
        www.francescagrilli.com
    description_en: >-
        “I consider any poetic image, that breaks our normal imagination and
        creates hope, a form of rebellion against central power. I consider it
        powerful and perturbing to be able to raise and form a child so that it
        conserves and safeguards marvel as a subversive thought. To bring back
        hope to the future that is to be, to the body of the fireflies and to
        the new generations, is a subversive action.   
          
        I am interested in the sense of responsibility, which I put in the
        children’s hands, in their firm belief in their visions and in their
        ideas of the future. The action contains a profound sense of education,
        of the idea of the performance as a magical and necessary act. I believe
        in a utopia-in-the-making as a social objective, even if it remains a
        wonderful and intangible, incomprehensible product.  

        This act, however minimal, contains a necessary fracture with time.”  

        Francesca Grilli  
          
          
        Francesca Grilli is an Italian artist currently based in Bruxelles. Her
        research vibrates in two fields: visual art and performing art. She uses
        a multidisciplinary language where the performance flows between visual
        art spaces to performing festivals, with a special attention to sound in
        all its forms and registers.  

        Grilli has developed several projects around the concept of the
        resistant body. In the earlier performative projects the body was
        engaged as a reflection of the resistance to life, to time, to decline,
        in spite of everything and for everything. In these last works, the
        resistant body gives in to or struggles against the concept of being
        consumed. Present in every artwork is in fact a disappearance, which is
        the result of an action contained in the work itself. She explores the
        realm of sound her works move from private and personal elements into
        spectators' space of action, drawing them into an ambiguous and
        unsettling territory.   
          
        Her work has been exhibited in many internationals venues such as Palais
        De Tokyo (2017), Van Abbemuseum in Eindhoven (2015-2017), Azione –
        Interazione at MAXXI Museum in Rome (2016), viceversa - Italian Pavillon
        at 55th Biennale di Venezia (2013), MADRE Museo d'arte contemporanea
        Donnaregina in Naples (2012), Serpentine Gallery, London (2010) and
        Manifesta7 in Bolzano (2008). She has also participated in numerous
        performance festivals including: Santarcangelo Festival (2017- 2019),
        Kunsthalle Osnabrueck, Germany (2017), O museu como performance at
        Serralves Foundation, PT (2017), Homo Novus Festival in Riga (2016),
        Drodesera Festival (2006/2017), Romaeuropa Festival (2011), Rencontres
        chorégraphiques in Paris (2010).  
          
        Francesca Grilli is currently an Associated Artist of Santarcangelo
        Festival 2017-2019.  
          
        www.francescagrilli.com
