    description_et: >-
        See on kiri Jumalale, kellesse me ei usu. Postkaart armastajale, keda me
        ei tunne. See on lootuste ja hirmude maastik. Keskaegne luuletus, mille
        tükkideks rebime, et tundmatusele vastu astuda. 


        Nagu teose nimest aimata, on „Paper Piece” fookuseks ja lähtekohaks
        erinevad paberi kui teose peamise koreograafilise vahendi
        koreograafilised ja performatiivsed käsitlused. Tantsu, installatsiooni
        ja performance’i vahel laveerides uurib see teos vaatemängu kui usu,
        eheda kogemuse, rituaalide ja jumalikkuse jälge.<br />

        Idee on pärit Andrius Katinase soololavastusest „WORK”, mis esietendus
        Zodiakis 2013. aastal. Kunstilise trupi tuumiku moodustavad kaks
        koreograafi-tantsijat, Andrius Katinas ja Vera Nevanlinna, ning
        visuaalkunstnik ja ruumikujundaja Salla Salin.<br />

        <br />

        **Andrius Katinas** on Soomes tegutsev leedu tantsukunstnik. Ta õppis
        teatri- ja tantsukunsti Leedu Muusika- ja Teatriakadeemias ja Soome
        Teatriakadeemias. Alates 1999. aastast on ta töötanud esineja ja
        koreograafina nii Soomes kui ka Leedus. Ta keskendub peamiselt
        erinevatele koostöövormidele ning pidevale uute lähenemisviiside ja
        perspektiivide otsingule tantsus.


        **Meri Ekola** sai Helsingi Kunstiülikooli Teatriakadeemiast
        magistrikraadi valguskunsti erialal. Tal on kogemused etenduskunstide ja
        arhitektuurse valguskunsti valdkonnas. Töö valguskunstnikuna on
        ajendanud teda kompima valgustuse väljendusvõimaluste piire. Viimastel
        aastatel on ta keskendunud valguskujundusele, mis võib etenduses täita
        aktiivset, otsekui esineja rolli. Tema viimaste koostööpartnerite hulgas
        on näiteks Hotel Pro Forma ja Opera de la Monnaie de Munt.



        **Ninu Lindfors** sai 2000. aastal Helsingi Kunstiülikooli
        Teatriakadeemiast magistrikraadi tantsu erialal. Ta on töötanud
        tantsijana selliste Soome koreograafide ja truppidega nagu Jenni Kivelä,
        Helsingi Dance Company, Tero Saarinen Company ja Liisa Risu. Alates
        2008. aastast töötab koreograafina Taittuu Prison Theatre’s.<br />

        <br />

        **Saara Norvio** on Helsingis tegutsev tantsija ja tantsulooja. Ta
        lõpetas 2008. aastal Helsingi Kunstiülikooli Teatriakadeemia ja on
        teinud kaasa mitmetes lavastustes ja projektides.<br />

        <br />

        **Salla Salin** looming põhineb tegelikkuse struktuuride ja mõistete
        käsitlusel, mille kohaselt on ruum keerukas suhete kude. Ta loob ruume
        ja olukordi, mis koosnevad tihti eri distsipliinidest või kõiguvad nende
        vahel. Tema teosed on peamiselt suuremahulised installatsioonid, mis
        vaataja endasse haaravad, ning juhivad tähelepanu taju ja eksistentsi
        vahelistele seostele. Salinil on magistrikraadi visuaalkunstis (2014) ja
        etenduskunstides (2005).<br />

        <br />

        **Tuomas Norvio** töötab helikunstniku, helilooja, muusiku, miksija ja
        produtsendina nii laval kui ka stuudios. Tal on elektroonilise muusika
        taust ning ta tegutseb erinevates kunstiliikides ja žanrites. Norviot
        huvitab akustiliste ja konkreetsete helide kasutamine loomingu alusena.
        Ta on loonud muusikat ja heli kaasaegsetele tantsu-, tsirkuse- ja
        teatrietendustele, installatsioonidele, dokumentaalfilmidele ja mitmtele
        kunstnikele. <br />

        <br />

        **Vera Nevanlinna** on vabakutselise tantsija ja koreograaf. Ta on
        teinud koostööd näiteks chameckilerneri, Miguel Gutierrezi, Deborah Hay,
        Mart Kangro, Thomas Lehmeni, Kirsi Monni, Eeva Muilu, Liisa Risu, Ervi
        Siréni, Katri Soini ja Paula Tuovineniga. Lisaks on ta loonud
        interdistsiplinaarseid kunstiprojekte skulptor Maria Dunckeri, fotograaf
        Elina Brotherusi, režissöör Kimmo Leedi, viiulimängija Pekka Kuusisto ja
        bändiga Rinneradio. Aastail 2009–2011 oli Vera Zodiaki loominguline
        juht, mängis aastail 1999–2001 trummi bändis Branded Women ja lisaks
        tantsuõpingutele on ta lõpetanud Muurla tehnikumi fotograafia
        erialal.<br />

        <br />

        **Vera Selene Tegelman** on Helsingis tegutsev vabakutseline tantsija.
        Ta omandas 2009. aastal Helsingi Kunstiülikooli Teatriakadeemias
        magistrikraadi. Teda huvitab performatiivsuse käsitlemine kaasaegse
        kunsti kontekstis. Ta on töötanud Soome uue põlvkonna koreograafidega,
        nagu Heli Meklin ja Virva Talonen, vanameistri Tommi Kitti ja tema
        trupiga, Tsuumi Dance Theatre’ga ning rahvusvaheliselt tunnustatud
        visuaalteatri ja kaasaegse tsirkuse trupiga WHS. Neist viimase
        etendusele „Lähtö“ (Lahkumine) lõi ta koreograafia.
    description_en: >-
        It is a letter to God, whom we don't believe in. A postcard to a lover,
        whom we don't know. It is a

        landscape of hopes and fears. A medieval poem we tear apart in order to
        face the unknown.



        As the name of the work suggests, the main focus and idea of Paper Piece
        lies in different choreographic and performative treatments of paper as
        the main choreographic medium. Navigating between dance, installation
        and performance art, this stage work studies the concept of spectacle as
        a vestige of faith, authentic experience, rituals and divinity.<br />

        The idea originates from Andrius Katinas’ solo WORK, which was premiered
        in Zodiak in 2013. The main artistic team consists of two
        choreographer-performers, Andrius Katinas and Vera Nevanlinna, and of
        visual artist, spatial designer Salla Salin.<br />

        <br />

        **Andrius Katinas** is Lithuanian dance artist based in Finland. He
        studied theatre and dance arts at Lithuanian Academy of Music and
        Theatre and Theatre Academy of Finland. Since 1999, he has been actively
        working as a performer and choreographer both in Finland and Lithuania.
        His main focus lies in different modes of collaboration and continuous
        search for new approaches and perspectives in dance making.



        **Meri Ekola** received her MA in lighting design from the Theatre
        Academy of the University of the Arts Helsinki. She has gained
        experience by working in the wide field of performing arts and
        architectural lighting design. Her work as a lighting designer has led
        her to question the expressive limits of lighting. In recent years she
        has concentrated in working on a lighting design able to carry an active
        part in the performance, as taking a role of a performer. Her latest
        collaborators are Hotel Pro Forma and Opera de la Monnaie de Munt among
        others.




        **Ninu Lindfors** received her MA in Dance from the Theatre Academy of
        the University of the Arts Helsinki in 2000. She has worked as a dancer
        for Finnish choreographers and companies, such as Jenni Kivelä, Helsinki
        Dance Company, Tero Saarinen Company and Liisa Risu. Since 2008 she has
        been working as a choreographer in Taittuu Prison Theatre.<br />

        <br />

        **Saara Norvio** is a Helsinki-based dancer and dance maker. She
        graduated from the Theatre Academy of the University of the Arts
        Helsinki in 2008 and has been subsequently working in various
        performances and projects.<br />

        <br />

        **Salla Salin** practice is informed by investigations on the structures
        and concepts of reality, reflecting an understanding of space as a
        complex weft of relations. Salin creates spaces and situations which
        frequently incorporate or balance between different disciplines.
        Manifesting mostly in large scale immersive installations and/or
        interdisciplinary projects, her work poses questions about the
        relationship between perception and existence. Salin has graduated with
        an MFA degree both in Visual Arts (2014) and Performing Arts (2005).<br
        />

        <br />

        **Tuomas Norvio** works as a sound designer, composer, musician, mixer
        and producer, on stage as well as in the studio. His background is in
        electronic music and he currently works between different art forms and
        genres. Norvio is interested in using acoustic and concrete sounds as a
        basis of his work. He has made music and sound for contemporary dance,
        circus and theatre, installations, documentary films and different
        artists.<br />

        <br /> 

        **Vera Nevanlinna** (is a freelance dancer and choreographer. Vera has
        worked with chameckilerner, Miguel Gutierrez, Deborah Hay, Mart Kangro,
        Thomas Lehmen, Kirsi Monni, Eeva Muilu, Liisa Risu, Ervi Sirén, Katri
        Soini and Paula Tuovinen among others. Vera has made interdisciplinary
        art productions with sculptor Maria Duncker, photographer Elina
        Brotherus, film director Kimmo Leed, violinist Pekka Kuusisto and the
        band Rinneradio. Between 2009 and 2011, Vera was the artistic director
        of Zodiak – Center for New Dance in Helsinki. Vera was also a drummer in
        the band Branded Women from 1999 to 2001 and in addition to her dance
        studies she graduated as a photographer from Muurla Folk College.<br /> 

        <br /> 

        **Vera Selene Tegelman** is a Helsinki-based freelance dancer.  She
        graduated as a Master of Dance from the Theatre Academy of the
        University of the Arts Helsinki in 2009. She is interested in
        researching new performativity in the context of contemporary art. She
        has worked with the young generation of Finnish choreographers such as
        Heli Meklin and Virva Talonen, with the grand old master Tommi Kitti and
        his company, with Tsuumi Dance Theatre and the internationally
        recognised visual theatre and contemporary circus company WHS. With the
        latter, she also worked as a choreographer in the company’s piece Lähtö
        (Departure).
