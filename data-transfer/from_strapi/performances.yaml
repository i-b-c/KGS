    description_et: >-
        Renate Keerdi lavastus “PÕLETATUD VÄLJADE HURMAA” on žanriliselt
        füüsilis-psühhedeelne sisekaemuslik tragöödia koomilis-poeetilises
        võtmes. Või vastupidi. Kõik oleneb vaatenurgast.<br />

        <br />

        <strong>Põim Kama (Postimees):</strong> Jätaks ajalehes pool lehekülge
        tühjaks ja kirjutaks suurelt:<br />

        “MINE VAATA ISE!” Ja alla loetamatult pisikeses kirjas: “Hoiatus!
        Lavatstus võib tekitada<br />

        enneolematut tungi visata hundiratast, puhuda seebimulle ja suudelda
        tundmatut!”<br />

        <br />

        <strong>Katrin Maimik, Andres Maimik (Eesti Ekspress):</strong> Lavastus
        annab vaatajale võimaluse omaenese ülemullitav hingesita ämber täiega
        kummuli virutada, visata turjalt sinna settinud taak – positsioon,
        kohustused, elu paratamatus, keele ängistus, nõudepesumasinasse kuhjunud
        nõud, mitte kusagile viivad mõtted, ämma sünnipäev. Ning rebida ennast
        alukate väele ja mõttes kaasa mürgeldada, möirata, püherdada, rammida,
        peksta, põgeneda torustikus tiirlevate nõmedate mõtete ja
        emotsionaalsete mürgiaurude käest puhtasse kehalisse ekstaasi. Ja siis
        ennast tühjaks tõmmelnuna ja armastuse altari ees puhastununa minna
        tagasi oma hallide seinte ja valge laega koju, panna nõudepesumasin
        tööle ja heita abikaasa kõrvale, ilma et padi oleks igatsusest läbi
        vettinud.<br />

        <br />

        <strong>Liisi Aibel (Postimees):</strong> Üllatavate ja vaimukate
        lahenduskäikude ning inimfüüsise omapärase kasutamise tõttu soovitan
        “Põletatud väljade hurmaad” kõigile, kellele meeldib teatris käies veidi
        riskida.<br />

        <br />

        <strong>Iiris Viirpalu (Müürileht):</strong> „Põletatud väljade hurmaas”
        võib näha taas, kuidas legodena ümber mängitavad inimmustrid ja leidlike
        koreograafiliste piltide loomine on autori vaieldamatu trumpäss. Renate
        Keerdi lavastusi iseloomustab pideva ohumomendi tuntav kohalolek ning
        esinejate nähtav ohutaju.<br />

        <br />

        <strong>Renate Keerd</strong> on vabakutseline koreograaf ja lavastaja,
        kes on oma lavastusi esitanud paljudel teatri- ja tantsufestivalidel
        Euroopas, Skandinaavias ja Aasias. Oma eelviimases lavastuses “Pink
        Flamingos, Crazy Horses”, mis on loodud kahasse koos Hispaania lavastaja
        ja koreograafi Maria Ibarretxega, astus Renate taas üle mitme aasta
        lavale ka etendaja rollis. Renate on pälvinud kahel korral Eesti
        sõltumatu tantsuauhinna Philip Morris Eesti kui Aasta Läbilööja ja Aasta
        Tegija. 2006. aastal asutas ta Dreek Stuudio ja 2012. aastal oma
        füüsilise teatri trupi Kompanii Nii, millel on oma kindel põhituumik,
        kuid millele võivad etenduseti lisanduda ka külalisesitajad.<br />

        <br />
    description_en: >-
        Renate Keerd’s production, “The Charm of Burnt Fields” (“Põletatud
        väljade hurmaa”), is of the genre of a physical-psychedelic
        contemplative tragedy in a comic-poetic form. Or the other way around.
        It all really depends on your viewpoint.<br />

        <br />

        **Põim Kama (Postimees - an Estonian daily)**: “In a newspaper I would
        leave half the page empty and just write in bold: “GO SEE IT YOURSELF!”
        And at the bottom in an illegible script I would add: “Warning! The play
        may cause an unusual desire to do a cartwheel, blow soap bubbles or kiss
        a stranger!”<br />

        <br />

        **Katrin Maimik, Andres Maimik (Eesti Ekspress - an Estonian weekly)**:
        “The production gives the viewer a chance to smash down their
        overflowing bucket of inner shit and throw off their weighty burdens –
        their position, their duties, the inevitability of life, the anxiety of
        language, the dishes piled in the dishwasher, thoughts that lead
        nowhere, the mother-in-law’s birthday. And just rip of your clothes down
        to your undies and play along in your mind, roar and romp and racket,
        wallow, crash and slam, escape from stupid thoughts and the emotional
        poisonous fumes circulating in the piping – into a pure physical bliss.
        And then, having twitched yourself empty and cleansed yourself in front
        of the shrine of love, go back to your home of grey walls and white
        ceilings, turn on the dishwasher and lie down next to your spouse,
        without the pillow being soaked from yearning.<br />

        <br />

        **Iiris Viirpalu (Müürileht)**: “In “Burnt Fields” one can again see how
        using human patterns like Lego men, and creating inventive choreographic
        pictures is the undeniable ace up the author’s sleeve. Renate Keerd’s
        plays are characterised not only by the performers’ visible sense of
        danger, but also by a constant perception of danger from the
        audience.<br />
    other_works: null
