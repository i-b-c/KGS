    description_et: >-
        KAVA  
          
        Shai Cohen (1968, Iisrael)  

        “Noumenon” / “Noomen” ansamblile audiovisuaalidega (2018, esiettekanne)
          
        Max C. Vinetz (1996, USA)  

        “here” / “siin” flöödile, elektrikitarrile ja elektroonikale (2017)  
          
        Alexander Schubert (1979, Saksamaa)  

        “Star Me Kitten” lauljale, paindlikule ansamblile, videole ja
        elektroonikale / for singer, flexible ensemble, video and electronics
        (2015)  
          
        Francesco Filidei (1973, Itaalia)  

        “I funerali dell’Anarchico Serantini” / “Anarchico Serantini matused”
        kolmele või kuuele interpreedile (2005-2006)  
          
        Stefan Prins (1979, Belgia)  

        “Generation Kill – offspring 1” löökpillidele, tšellole, kahele
        muusikule mängukonsooliga, live-elektroonikale ja live-videole (2012)  
          
        Tallinna Uue Muusika Ansambel on fikseerimata koosseisuga rühmitus,
        platvorm uue muusika kogemise võimaluste loomiseks. Ansambel soovib tuua
        kuulajani parima osa uuest muusikast ning pakkuda nüüdisheliloojatele
        teose esiettekande väljundit. 2012. aastast on TUMA toonud publiku ette
        värsket uut muusikat, rikastades hoolikalt valitud kava ja
        lähenemisviisiga kohalikku kultuurielu. Kuna ansamblile on tähtis
        tutvustada noorte heliloojate loomingut ja nende värsket lähenemist
        muusikale, peetakse oluliseks tellida teoseid mitmelt eri taustaga
        heliloojalt. Peale uudisteoste tellimise eesti ja välisheliloojatelt,
        soovib Tallinna Uue Muusika Ansambel tuua Eestis esiettekandele oluliste
        nüüdismuusika heliloojate (Georg Friedrich Haas, James Tenney, Gérard
        Grisey, Michael Maierhof, Alvin Lucier) teoseid. Ansambel on koostööd
        teinud mitme eesti muusikafestivaliga (Tallinn Music Week, “Sügisfest”,
        “Afekt”), samuti festivaliga “Mixtur” Barcelonas, “reMusik” Peterburis
        jt. 2017. ja 2018. aasta sügisel korraldas TUMA mikrotonaalse muusika
        festivali Tallinnas ja Berliinis ning sai palju head vastukaja.  


        www.enmtallinn.com
    description_en: >-
        Shai Cohen (1968, Iisrael)  

        “Noumenon” / “Noomen” for ensemble with audiovisuals (2018, premiere)
          
        Max C. Vinetz (1996, USA)  

        “here” / “siin” for flute, electric quitar and electronics (2017)  
          
        Alexander Schubert (1979, Saksamaa)  

        “Star Me Kitten”  for singer, flexible ensemble, video and electronics
        (2015)  
          
        Francesco Filidei (1973, Itaalia)  

        “I funerali dell’Anarchico Serantini” / “Anarchico Serantini matused”
        for three or six interpreters (2005-2006)  
          
        Stefan Prins (1979, Belgia)  

        “Generation Kill – offspring 1” for drums, cello, two musicsians with
        game consoles, live electronics and live video (2012)  
          
        Founded in 2012 by Arash Yazdani, Ensemble for New Music Tallinn is a
        platform for widening opportunities to make acquaintance with new music.
        The ensemble is made of a core of principal members and a larger body of
        collaborators or guest artists. ENMT is proud to provide unique and
        daring experiences for its audience, introducing the less discovered
        aspects of new music. Alongside commissioning new pieces, ENMT has been
        responsible for the Estonian premieres of several milestone works by
        Georg Friedrich Haas, James Tenney, Michael Maierhof and Alvin Lucier
        among others.  
          
        ENMT has had performances at and collaborations with MIXTUR Festival
        Barcelona, St. Petersburg International New Music Festival “reMusik”,
        Fylkingen Stockholm, Värske Heli Festival Sügisfest, Tallinn Music Week,
        Resonanta concert series in Paris and FUGA Budapest Center of
        Architecture. In the autumn of 2017 and 2018, TUMA organized a festival
        of microtonal music in Tallinn and Berlin for which plenty of positive
        feedback was given.  
          
        www.enmtallinn.com
