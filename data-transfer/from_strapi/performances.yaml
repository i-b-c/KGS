    description_et: >-
        „Tt – tribute to Buckminster Fuller, Marshall McLuhan, John Cage“ on
        Kasemetsa interaktiivne multimeediateos aastast 1968, milles publik saab
        mõjutada oma otsustega nii heli, visuaale kui ka valguskujundust.  


        **Udo Kasemetsa** (1919–2014) on naljatamisi nimetatud kõige vähemtuntud
        kõige kuulsa­ maks eesti heliloojaks, kelle kohta leidub artikkel vast
        igas väärikamas muusikaentsük­ lopeedias. Kanadas, kus Udo Kasemets
        veetis suurema osa oma elust, nimetati teda „ilmselt kõige
        kompromissitumaks muusikuks Kanada muusika ajaloos“, tema mõju Toronto
        muusika­ elule ja järgnevatele põlvkondadele on raske üle hinnata.  


        **Eesti Elektroonilise Muusika Seltsi Ansambel EMA** on 2017. aastal
        loodud koosseis, mis on pühendunud elektroonilise kammermuusika
        mängimisele. Ansambli eesmärgiks on ületada tehnoloogilised kammitsad
        ning arendada tundlikku musitseerimist, üksteisele reagee­ rimist ning
        teravat kuulamist, kasutades ära erinevate elektrooniliste instrumentide
        usku­ matult rikkalikke kõlavõimalusi.
    description_en: >-
        “Tt – tribute to Buckminster Fuller, Marshall McLuhan, John Cage” is an
        interactive multimedia composition by Kasemets from year 1968, where the
        audience can influence the sound, visuals and light design with their
        decisions.  


        **Udo Kasemets** (1919–2014) has been jokingly called the most famous
        least known composer of Estonia. There is an article about him in every
        respected music encyclopedia. In Canada, where Kasemets spent most of
        his creative life, he was named “probably the most uncompromising
        musician in the history of Canadian music”.  

        **The Estonian Electronic Music Society (EES)** was founded in 2017. The
        aim of the Society is to introduce and develop contemporary electronic
        music in Estonia. In order to achieve a wider audience, it is planned to
        systemati­cally organize concerts, workshops, lectures and professional
        meetings to create an inter­ national audience for creative life, to
        record music, to publish and to present Estonian electronic music
        internationally.
