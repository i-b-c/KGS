    description_et: >-
        Platvormil toovad noored publiku ette nende enda loodud tantsu- või
        etenduskunsti lühivormi. Sel aastal kutsusime noori üles olema oma
        loomingus uurimuslikud, arendama enda liikumiskäekirja ning tegelema
        teemadega, mis on neile hetkel olulised.

        Platvorm annab väljundi noortele, kes soovivad katsetada oma ideid ja
        koguda kogemusi publikuga, esitada või esineda, lavastada ja avastada.
        Kutsume juba tegevaid kunstnikke noorte töid vaatama, et siduda tantsu-
        ja etenduskunstide kogukonda!

        Platvormi korraldab teist korda Hiiumaa TantsuFestivali meeskond.
        Üritusega soovime anda noortele juurde ühe väljundi ja võimaluse end
        proovile panna huvi- ja kõrghariduse vahel. Korraldajate suurem eesmärk
        on oma tegevusega toetada uute tantsukunstnike pealekasvu ning valdkonna
        sidusust.


        Oma loominguga astuvad teie ette / On stage with their creations:
        Kristin Made, Pääsu-Liis Kens, Hanna Gerta Alamets, Elise Pottmann,
        Elina Masing, Marie-Loviise Mänd, Maryn-Liis Rüütelmaa, Annabel Teetamm,
        Aune Tenslind, Janette Norkko, Maarja-Eliisabet Roosalu, Aneta Varts,
        Allar Valge, Annabel Matkur, Kaisa Kattai, Edgar ja Marta Vunš,
        Anna-Maria Laius, Anita Kuroljova, Markus ja Mark Monak, Lauren
        Grinberg, Erik Juhandi, Eliisabel Jõelda, Maria Solei Järvet, Agnes
        Berezcki, Karolin Käärik, Keithy Kuuspuu, Janna-Liina Leemets, Stella
        Lise Maanurm, Sandra Põld.    


        Rohkem infot Hiiumaa TantsuFestivalist leiad lehelt
        [tants.org](http://tants.org/)<br />
    description_en: >-
        Platvorm is an event for young dance creators to present their work on
        stage. This year the organisers called out to the young to be
        exploratory, to work on their personal movement style and to create work
        about topics relevant to them here and now.

        Platvorm is organised by the team of Hiiumaa Dance Festival. We wish to
        create more opportunities for young dance enthusiasts and in a broader
        sense we want to support the development of new dance artists and unite
        the dance community. 


        More info about Hiiumaa Dance festival:
        [tants.org](http://tants.org/)<br />
