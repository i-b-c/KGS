    description_et: >-
        “Liivlaste pärandus” pole ainult Veljo Tormise kooritsükli pealkiri,
        vaid ka eksistentsiaalne teema. Selle läbitunnetamiseks kutsub
        Läti-Eesti loominguline kollektiiv oma publiku kaasa avastuslikule
        rännakule, mis läbib looduskauneid paiku, hingematvaid helimaastikke,
        tuttavlikke külaolustikke ja linnaruume ning arhiivitolmu alt
        lambivalgesse toodud elulugusid. Need lood kutsuvad mõtlema, mida
        tähendab “liivlaste pärandus”, kes selle pärandas ja kes selle endale
        omistas.<br /> 

        <br />

        Kultuurilise julgeoleku lipu all triivib täna osa Eesti ja Läti
        ühiskonnast paremäärmusluse suunas. Kadumise hirmu tunti neis Läänemere
        riikides ennemgi. Omariikluse algusaegadel tahtis Läti valitsus ühendada
        kolm suurimat läti hõimu ühtset keelt ja kultuuri viljelevaks rahvaks ja
        tillukeselt liivi rahvalt oodati sulandumist. Noor Eesti rahvus otsis
        minapildile tuge kuuluvusest suuremasse soomeugri rahvaste perekonda.
        Moderniseerunud rahvana eeldati, et väiksemad soomeugri rahvad võtavad
        kanda missiooni jääda looduslähedaseks ja autentseks ning hoiavad nii
        eesti soomeugri juuri. Mida tahtsid liivlased? Täna saab seda vaid maha
        jäänud pärandi põhjal oletada, sest liivlased olid siin kandis
        esimestena lahkujad. <br />

        <br />

        Nii Riias kui Tallinnas toimuvate LAT.EST festivalide tuumaks on
        omanäoline lavastus liivlastest “The First to Leave “ (Esimesena
        lahkuja). Olgugi et suhtumine liivlastesse on kummaski riigis erinev, on
        see rahvus mänginud olulist rolli riigiks olemise ning Lätis ja Eestis
        valitsevate erinevate ideoloogiate kontekstis. Liivlaste saatus on kui
        meeldetuletus kõige ebapüsivast loomusest siin maailmas ja kui hoiatus,
        et ühe väikese rahvuse kadumine võib olla kiire ja kohene. Etendus
        vaatleb lähemalt kummagi riigi poliitika rolli liivlaste elus ja mida
        täna tähendab olla liivlane. Lõpuks küsib see küsimuse: „Kas kadumine on
        päriselt tragöödia?“ „Esimesena lahkuja“ autoriteks on helilooja Toms
        Auniņš, stsenograafid Austra Hauks ja Epp Kubu, koreograafid Joanna Kalm
        ja Karolin Poska, visuaal- ja videokunstnik Kristina Norman, dramaturg,
        lavastaja ja etendaja Kārlis Krūmiņš ning lavastaja Valters Sīlis.
        Tallinna etendustel osalevad ka kammerkoor Collegium Musicale ning eesti
        tantsijad.<br />


        <br />

        “Ma arvan, et see tükk ei saa olema niivõrd liivlastest kuivõrd
        erinevatest vaadetest liivi teemale. Ajal, mil Läti ja Eesti olid vast
        asutatud riigid, oli neil erinev ideoloogiline toetuspind. Läti jaoks
        oli oluline leida viis, kuidas rahvust ühendada, tulenevalt Läti
        territooriumil kõneldavatest erinevatest keeltest ja liivlasi nähti kui
        tähtsusetut gruppi selles protsessis. Samas kui Eesti riigi jaoks oli
        oluline otsida juuri laiemas finno-ugri kultuuris, kuhu samuti kuulusid
        liivlased. Nende lahustumist Läti kultuuri tajusid eestlased
        tragöödiana. Mitmed kultuuriaktivistid ja folkloristid ning samuti
        poliitikud tõstsid päevakorda liivlaste kadumisest päästmise. See ei
        sobinud kokku läti suure narratiiviga. Tekkis konflikt Oskar Looritsa –
        kõige silmapaistvama folkloristi ja liivi kultuuri uurija – ümber. Tema
        kogus kokku ja koostas liivlaste rahvalaulude „piibli“. Väidetavalt
        sisaldas see kogumik kõiki teadaolevaid liivlastele laule. Üks neist
        lauludest “Tšītšōrlinkizt”, tegemist on kõige vanema liivi lauluga,
        kordub lavastuse käigus.” Kristina Norman<br />

        <br />

        “Üks selle lavastuse teemadest käsitleb viisi, kuidas mingi enamus
        tarvitab võimu vähemuse suhtes ja püüab muuta viimast olematuks. Mingit
        probleemi, mis puudutab väikest arvu inimesi, saab ignoreerida, sest see
        puudutab üksnes 0.5% elanikkonnast… Läti kirjanik Aleksandrs Grīns
        kirjutas sellest, kuivõrd kasumit mitte andvad liivlased olid ja kuidas
        nende olemasolu ennast ära ei tasunud. Aga globaalses kontekstis ei tasu
        ka lätlaste olemasolu ennast ära! Proovi vaid võrrelda, kui palju rohkem
        kasumit teenib vene keeles kirjutatud raamat läti keeles kirjutatu
        kõrval. Kasumlikkuse argumenti, mida võiks kasutada mõni hiigelrahvus,
        kasutasid lätlased liivlaste vastu!” Valters Sīlis<br />

        <br />

        “Inimeste võitlus oma õiguse eest olemas olla on paeluv, kuidas see ära
        lõigatakse erinevatel viisidel ja mis lõpuks alles jääb. Pole nii, et
        kõik kaob. Pole absoluutset lõppu. Pigem võtab see teistsuguse kuju.
        Keegi ei kaota isiklikult kultuuri. Sa võid tunda end oma kultuuriga
        väga üksikuna, aga see on midagi muud.” Kārlis Krūmiņš<br />

        <br />

        "Kümme aastat tagasi sattusin Riias elades liivi keele kursustele. Keelt
        õppides tekkis mul suurem huvi liivlaste kultuuri vastu. Juhuslikult
        sattusin ühel päeval külla liivi keele õpetaja Tõnu Karmale, kes elas
        Riias Agenskalnsi asumis. See kohtumine jäi mulle eredana meelde ja
        tahaksin seda elamust jagada. Miks ma tookord alustasin liivi keele
        õppimist? Ei tea. Võibolla on see mitteteadvustatud pöördumine oma
        juurte juurde? Võibolla meis kõigis on liivlane peidus? /Epp Kubu<br />

        <br />

        Tänud: Valts Ernštreits, Ēriks Kāpbergs, Zoja Sīle, Helmī Stalte, Julgī
        Stalte, Dāvis Stalts, Ulla Fraser, Baiba Šuvcāne, Rita Treija, Ieva ja
        Kārlis Zemīši Oleru muiža'st, Sirje ja Sepideh Ardalani Massiast, Olita
        Kalna, Meelis Muhu, Maima Grīnberga, Valters Ščerbinskis, Jaak Prozes,
        Ineta Sipunova, Andrejs Strokins, Läti riigi ajalooarhiiv, Läti
        kultuuriakadeemia riiklik filmikool, Jānis Liniņš, Kārlis Lapiņš,
        Katrīna Dūka, Jānis Laucenieks, Aleksis Aleksis, Mārtiņš Jēkabsons,
        Kristīne Ķikute-Krievkalna, Marta Lortkipanidze ja kõik, kes annetasid
        raamatuid.<br />

        <br />

        LAT.EST festival saab teoks vahetult pärast Läti 100.sünnipäeva Kanuti
        Gildi SAALis ning tutvustab Läti kaasaegseid (etendus)kunstnikke ning
        nende mõtteid ja tegemisi. Samuti on see pühendatud koostööle ja kõigele
        mis meid ühendab.

        LAT.EST festivali korraldab Kanuti Gildi SAAL koostöös Läti Uue Teatri
        Instituudiga ning see kuulub nii EV100 kui LV100 kultuuriprogrammi.
    description_en: >-
        “Livonian heritage” is both a title of Veljo Tormis' cycle of choir
        pieces, but as well an existential theme. To get a sense of it, a
        Latvian-Estonian artists' collective invites the audience to join them
        on a journey through sublimely beautiful places of nature, breath-taking
        soundscapes, prosaic sceneries of hamlets and cities, and through the
        life-stories that are dag out from beneath the layers of archive dust to
        be read in the warmth of lamplight. These stories invite you to think
        what does “Livonian heritage” actually mean, who bequeathed it and who
        appropriated it. <br />

        <br />

        Under the flag of cultural security, a part of the Latvian and the
        Estonian society today is drifting in the direction of radical
        conservatism. But the fear of extinction is not new among the small
        nations at the Baltic coast. In the first period of national
        independence, the Latvian state was busy unifying the three main Latvian
        tribes and inventing a single Latvian language and culture. Livonians
        who were very few were supposed to melt in. The young Estonian nation
        was searching for a foothold for their identity in belonging to the
        large family of Finno-Ugric people. It was assumed in Estonia that
        smaller Finno-Ugric tribes would take on the mission to stay
        close-to-nature and remain authentic in their ways of life and thus
        preserve the Finno-Ugric cultural roots of Estonians who were now a
        modernized nation. What did Livonian people want? Today it's only the
        archives that can help us guess what the answer could be. In this part
        of the Baltic coast, Livonians were the first small ethnicity to
        leave.<br />

        <br />

        At the core of the LAT.EST festivals in Riga and in Tallinn is the
        distinctive piece about Livonians called “The First to Leave“. Even
        though the attitude towards Livonians is different in each country, this
        nation has played an important role in the context of statehood and
        different ideologies governing Latvia and Estonia. The fate of Livonians
        stands as a reminder about the impermanent nature of all things in the
        world and a warning that disappearance of a small nation can be quick
        and imminent. The performance takes a closer look at the role of each
        country’s politics in the life of Livonians and what does it mean to be
        a Livonian today. Eventually, it asks a question: Is the disappearance
        really a tragedy? The authors of “The First to Leave” are composer Toms
        Auniņš, set designers Austra Hauks and Epp Kubu, choreographers Joanna
        Kalm and Karolin Poska, visual and video artist Kristina Norman,
        dramaturg, director, and performer Kārlis Krūmiņš, and director Valters
        Sīlis. Chamber choir Collegium Musicale and Estonian dancers will be
        part of the performances held in Tallinn.<br />

        <br />

        “I think this piece will not be so much about Livonians as about the
        different perspectives on the Livonian topic. When Latvia and Estonia
        were newly established states, they had different ideological grounds.
        For Latvia it was important to find a way to unify the nation because of
        the different languages spoken on the Latvian territory and Livonians
        were regarded as a marginal group in this process. While for the
        Estonian state it was important to search for roots in the larger
        Finno-Ugric culture where Livonians also belonged. Their dissolving into
        Latvian culture was perceived by Estonians as a tragedy. Many culture
        activists and folklorists, and also politicians raised the agenda to
        save the Livonians from disappearing. This did not go well with the
        Latvian grand narrative. There was a conflict around Oskar Loorits, the
        most outstanding Estonian folklorist and researcher of the Livonian
        culture. He collected and compiled the “Bible” of the Livonian folk
        songs „Volkslieder der Liven”. Allegedly, this collection contained all
        songs known to Livonians. One of these songs, and this is the most
        ancient Livonian song, “Tšītšōrlinkizt”, will re-occur during the
        piece.” Kristina Norman<br />

        <br />

        “One of the issues in this piece is about the way in which a majority
        exercises power over minority and tries to make it non-existing. A
        problem that concerns a small number of people can be ignored because it
        concerns only 0.5% of the population… Latvian writer Aleksandrs Grīns
        wrote about how unprofitable the Livonians were and how their existence
        did not pay off. But in a global context the Latvians don’t pay off
        either! Just try to compare the profit a book written in Russian would
        make over one written in Latvian. The argument about profitability that
        could be used by a giant nation, was used by Latvians against
        Livonians!” Valters Sīlis<br />

        <br />

        “It is fascinating how people fight for their right to exist, how it is
        cut off in different ways and what eventually remains. It’s not like
        everything disappears. There is no absolute end. Rather it takes a
        different shape. Nobody personally loses the culture. You might feel
        very lonely with your culture, but that is something different.” Kārlis
        Krūmiņš<br />

        <br />

        "Ten years ago when I lived in Riga I happened to join the liv language
        course. While learning the language I became more interested also about
        their culture. By chance I happened to visit Tõnu Karma who lived in
        Ageskalns area in Riga and is a liv language teacher. This encounter was
        very particular and i would be happy to share this experience. Why did I
        start studing liv language above all? No clue. Maybe it was an
        unconscious way to address my roots? Maybe we all have our hidden liv?”
        Epp Kubu<br />

        <br />

        Thanks to Valts Ernštreits, Ēriks Kāpbergs, Zoja Sīle, Helmī Stalte,
        Julgī Stalte, Dāvis Stalts, Ulla Fraser, Baiba Šuvcāne, Rita Treija,
        Ieva and Kārlis Zemīši from Oleru muiža, Sirje and Sepideh Ardalani from
        Massia, Olita Kalna, Meelis Muhu, Maima Grīnberga, Valters Ščerbinskis,
        Jaak Prozes, Ineta Sipunova, Andrejs Strokins, Latvian State Historical
        Archives, Latvian Academy of Culture National Film school, Jānis Liniņš,
        Kārlis Lapiņš, Katrīna Dūka, Jānis Laucenieks, Aleksis Aleksis, Mārtiņš
        Jēkabsons, Kristīne Ķikute-Krievkalna, Marta Lortkipanidze and to
        everyone who donated books.<br />

        <br />

        LAT.EST festival will take place at Kanuti Gildi SAAL right after the
        centennial of Latvia and will introduce the thoughts and deeds of the
        contemporary Latvian (performing) artists. It is also dedicated to the
        collaboration and to all that brings us together.

        LAT.EST is organized by Kanuti Gildi SAAL in collaboration with New
        Theatre Institute of Latvia and is part of the culture programmes EV100
        and LV100.
