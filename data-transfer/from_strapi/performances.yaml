    description_et: >-
        [**NUP 2020 ajaleht**](https://saal.entu.ee/api2/file-21553)  

        <br /> 

        HÄÄL JA MIDAGI VEEL üritab haarata häält: töötada häälega, tunnustada
        häält, kasutada häält, kuulata häält ja sellesse sekkuda, võidelda hääle
        eest, nõustuda, häälega vaielda ja kaasa laulda, hääle taktis kehad
        liikuma panna ja uinuda.   

        <br>

        Anne Carson kirjutab essees „The Gender of Sound“ (Heli sugu): „Me
        otsustame peamiselt just inimeste tehtavate häälte järgi, kas nad on
        mõistuse juures või hullud, mehed või naised, head, kurjad,
        usaldusväärsed, masendunud, abiellumiskõlbulikud, suremas, kas nad
        tungivad meile kallale või mitte, kas nad on vaid pisut paremad kui
        loomad, Jumala sisendatud.“ Hääle kõigi tähenduste mõistmiseks tuleb
        olla tunnistajaks häälele kui sündmusele, millelegi, mis keerleb ümber
        kehade, eraldi olemusena, mis on omane kehale ja keelele.   

        <br>

        Ometi ei kuulu hääl kummalegi. See tegutseb autonoomselt – kõlab,
        viitab, paljastab, peidab, muretseb, rahustab, ärritab, loob, kahjustab
        ja ajab meid naerma. See resoneerib, hüpnotiseerib, kõlab kokku, sellel
        on oma kõlalisus – oma vaikused, rütmid ja intonatsioonid. Ükskõik
        kuidas see ka käitub ja liigub, hääl jääb harva märkamatuks. Hääl ei
        eemaldu kehast. Hääl avardab seda, kannab seda edasi, üritab seda
        välismaailmaga ühendada.   

        <br>

        Nii nagu keha on ka hääl oma poeesia ja poliitika, aktsentide ja
        dialektide, vigadega grammatika kütkes. Keel viivitleb suus, lipsab
        korraks välja lobisema, tema sõnavara on keeleotsal, ta kordab ja
        parandab end... Selle, mida keel peidab, ütleb välja keha. Häälega, olgu
        siis valju või vaiksega, teeme end kuuldavaks, olgu siis väljas, toas,
        ühiskonnas või poliitikas. Just hääle kaudu saab privaatne avalikuks.   

        <br>

        Tänavune festivaliprogramm seob kokku terve loominguliste väljenduste ja
        avalduste polüfoonia. See annab sõna hääle emotsionaalse, ühiskondliku
        ja poliitilise potentsiaali avamisele. Programmi kuulub luule, rütmi
        loomine, sünteetilised helid, sisse kirjutatud narratiivid ja
        ajaloolised kontekstid, huumor, tegevus, osalemine ja kollektiivne hääl,
        vaikus, ja – nagu pealkirigi vihjab – midagi veel. Nende erinevate
        seisukohtade kõrvutamine illustreerib seda, kuidas valdavaid narratiive,
        konstrueeritud soorolle ja valitsevat poliitilist retoorikat saab hääle
        performatiivsusega kahtluse alla seada. Väga erineva taustaga kunstnikud
        uurivad ja annavad uusi määratlusi tänapäeva kõneaktidele, töötavad läbi
        hääle- ja keelepiirid, nihutavad tähendusi ja identiteete.   

        <br>

        Kuigi suur osa festivali esinemistest ja kontsertidest toimub Kanuti
        Gildi SAALis, Sveta Baaris ja Sakala 3 hoones, saadab programmi ka IDA
        raadio saatesari. Programm NUPP pakub täiendavat pilguheitu, mis hõlmab
        ka festivali esinejate loomingu tutvustamist ja lähemalt selgitamist.
        Raadio kui meedium kannab hääle ja heli ühest kohast teise ning teeb nii
        võimalikuks mängida kõikvõimalike suhetega – elavate ja salvestatud,
        kohalolevate ja eemalviibivate, elavate ja surnutega ning nendega, kes
        kuulavad, ja nendega, kes ei kuula.   

        <br>

        Äsja tellitud ja varem valminud performance’eid, lugemisi,
        modulaarsüntesaatorite kompositsioone, protsessipõhiseid koostöid ja
        kontserte kombineerides häälestab festivali kese end hääle tehniliste,
        kontseptuaalsete, ent ka juhuslike suhete lainepikkusele.   

        <br>

        Mitmekesisuse mõttes on programm jaotatud eri peatükkideks, mis on
        teejuhiks neile, kes kaotavad end HÄÄLES JA MILLESKI
        VEEL.                

        Egija Inzule, Margit Säde   

        <br>

        **Margit Säde** on Tallinnas ja Zürichis töötav sõltumatu kuraator ja
        kunstitöötaja. Kuraatori, haridustöötaja, produtsendi ja kunstniku
        rollide vaheldudes on tema peamisteks huvipakkuvateks teemadeks
        subjektiivsus, prekaarsus, kollektiivsus ja ka keel, inimpsüühika ning
        hääl. Oma ettevõtmistes rõhutab ta isealgatatud, koostööl ja protsessil
        põhinevat kunstipraktikat. 2017 – 2020 töötas ta Eesti Kunstiakadeemias
        Kaasaegse Kunsti magistriprogrammi õppekava juhi ja külalisdotsendina.  

        <br> 

        **Egija Inzule** on kuraator ja Vilniuse Kunstiakadeemia Nida Art Colony
        (NAC) praegune juht Nidas, Leedus. Selleks et vastata NACi hübriidsele
        iseloomule, mis hõlmab endas nii residentuuriprogrammi, rahvusvahelise
        doktorikooli korraldamist, kunstiprogrammi kureerimist, üliõpilaste
        seminaride korraldamist ja NACi üldist haldamist, töötab Inzule
        protsesside arendamisel ja algatab produktsioone, mis lähtuvad
        ajaloolisest, geo- ja sotsiopoliitilisest analüüsist ja asukoha
        mõtestamisest, keskendudes selle koha olulisusele ja rollile.   

        Ta on uurimus- ja residentuuriprogrammi Neringa Forest Architecture
        (Neringa Metsa Arhitektuur) kaasasutaja. Organistasioon keskendub
        ruumilistele ja materiaalsetele protsessidele, metsandusele ja politiika
        kujundamisele, et analüüsida metsa kui infrastuktuuri laiemat ulatust
        Põhja- ja Baltimaade regioonis.

