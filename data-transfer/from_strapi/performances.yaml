    description_et: >-
        Arhitekt Lina Ghotmeh lõpetas kiitusega  Ameerika Ülikooli Beirutis ja
        École Spéciale d’Architecture'i Pariisis. Enne DGT asutamist
        praktiseeris ta Pariisis, Londonis ja Beirutis, tegi tihedat koostööd
        arhitekt Jean Nouveliga. Aastal 2006 võitis ta oma esimese
        rahvusvahelise võistluse - Eesti Rahva Muusemi konkursi, mille peale
        asutas rahvusvahelise arhitektuuriplatvormi DGT koos Dan Dorelli ja
        Tsuyoshi Tane’iga. Lina töid iseloomustab tundlik arhitektuur läbi
        multi-disiplinaarsuse ja uurimustöö. Ta on saanud mitmeid auhindu ja
        tunnustusi (AJAP 2007‐08, French Architecture Academy Dejean Prize 2016,
        GRAND PRIX AFEX). Lina on seotud ka akadeemilise maailmaga - ta on
        õppejõud École Spéciale d’Architecture'is ja pidanud seminare teistes
        tunnustatud arhitektuuriülikoolides (Parsons School of Design, Paris;
        the Rhode Island School of Design, RISD, Providence; the Royal Academy
        of Arts,  London; Columbia University, New York).<br />

        [dgarchitects.com](http://www.dgtarchitects.com/)<br />

        <br />

        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile. Loengud on inglise keeles ning tasuta.<br />
    description_en: >-
        Lina Ghotmeh is an architect, ‘distinction’ graduate from the American
        University of Beirut and the École Spéciale d’Architecture, Paris. Prior
        to establishing her office, she had worked between Paris, London and
        Beirut collaborating with Ateliers Jean Nouvel. In 2006, after winning
        the 1st Prize of the international competition of the Estonian National
        Museum, she established along with Dan Dorell and Tsuyoshi Tane DGT /
        Architects: an international design platform based in Paris. Lina
        practices a sensitive architecture through a multi‐disciplinary and
        research driven approach. She has received numerous awards, among which:
        the Areen and the Azar Awards prized along her studies, the French
        Ministry of Culture Architecture prize "AJAP 2007‐08", and the French
        Architecture Academy Dejean Prize 2016. In 2010, she was selected for
        the "10 for 2010 Visionary Architects for a new decade" by the European
        Architects Review and recently the Estonian National Museum has been
        awarded the GRAND PRIX AFEX. Lina is also actively involved in the
        academic world. She has taught Architecture as an Associate Professor at
        the École Spéciale d’Architecture (2008‐2015). She has also lectured,
        led workshops and been juror at architectural schools and institutions
        including Parsons School of Design, Paris; the Rhode Island School of
        Design, RISD, Providence; the Royal Academy of Arts in London and
        Columbia University in New York.<br />

        [dgarchitects.com](http://www.dgtarchitects.com/)<br />

        <br />

        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment. The lectures are
        held in English, free of charge.
