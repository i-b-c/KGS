    description_et: >-
        NB! “The Quiet Volume” on audiosensoorne rännak kahele osalejale, mis
        toimub Tallinna Ülikooli Akadeemilises Raamatukogus (Rävala pst 10):  

        16+18+22+23.08 ajavahemikul 14:00-16:00, sissepääs 2 inimesele iga 20
        min järel, (viimane sissepääs kell 16:00).  

        17+21.08 ajavahemikul 14:00-18:00, sissepääs 2 inimesele iga 20 min
        järel (viimane sissepääs kell 18:00).<br />

        Piletilevist ostes saate valida endale sobiva kellaaja.<br />  


        “The Quiet Volume” on sosistamisega rikastatud, isetoimiv autoteatri
        formaadis etendus kahele inimesele, mis kasutab ära teatud pingevälju,
        mis tekivad raamatukogudes igal pool maailmas. Erinevate inimeste
        kogemus lugemisest avaneb kombineerides vaikust ja keskendumist.  


        Kaks publikuliiget / osalejat istuvad kõrvuti. Nii sosistatud kui
        kirjutatud sõnu järgides leiavad nad end raamatukuhjas enneolematut rada
        uuristamas. Teos paljastab lugemiskogemuse keskmes oleva veidra maagia,
        võimaldades näiliselt sügavalt sisemistel kogemusest väljuda
        ümbritsevasse ruumi ning imbuda ühest lugejasfäärist teise.   


        “See lehekülje praegune hetk on see, mis mind haarab kaasa - praegune
        hetk, see üks, nende märkide/koodide, tähtede ja sõnade asetusest
        loodud.” Tim Etchells  


        “”The Quiet Volume”, see lühike Ant Hamptoni ja Tim Etchellsi etendus
        viib vaataja raamatutemaailma, olles samas väga maagiline teater. See
        teater on mõtete astmeline konstruktsioon, mis tekib läbi vaatamise,
        kuulamise ja lugemise. Muutes lugemisoskuse temaatiliseks
        fookuspunktiks, haarab selline teater endasse ja poeb vaatajale naha
        alla (...) Andes teatavaid juhiseid kuidas mitte näha, õigemini on selle
        sihiks nägemise korrigeerimine. Seejuures on kõige kaunim see, et
        etteantud teksti ja kõrvaklappidest kõlavate juhendite mõju on nii
        sisemine kui väline, keskendudes materiaalsetele objektidele sama palju
        kui nendega seotud mõttekogumikele.” Doris Meierhenrich, Berliner
        Zeitung, 20.09.2010<br /> 


        <br />Ant Hampton on Briti visuaal- ja etenduskunstnik, kelle looming
        1998. aastast, mis algselt oli Rotozaza nime all, on enamalt jaolt
        hõlmanud inimeste suunamist ette valmistamata etendussituatsioonide
        kaudu. 2007. aastast  hakkas see vorm kaasama ka publikut: tema
        Autoteatro seeriad on käinud tuuridel paljudes paikades ning mõned
        näited on: “Etikett” (Etiquette), “Vaikne köide” (The Quiet Volume), Cue
        Chine, OK OK , “See pole mu hääl, mis räägib”(This Is Not My Voice
        Speaking) ja “Lisainimesed” (The Extra People). Ant teeb sageli koostööd
        kunstnikega nagu Tim Etchells, Christophe Meierhans, Britt Hatzius,
        Gert-Jan Stam, Ivana Müller ja Anna Rispoli.<br />

        <br />[www.anthampton.com](http://www.anthampton.com)<br />

        <br />Tim Etchells on Suurbritannias resideeruv kunstnik ja kirjanik,
        kelle looming liigub etenduskunstide, visuaalkunsti ja fiktsiooni vahel.
        Ta on töötanud paljudes eri kontekstides ning märkimist vajab tema
        osalus Sheffieldist pärit etenduskunstike trupi Forced Entertainment
        juhina. Tema töid on näidatud olulistes kultuuriinstitutsioonides üle
        kogu maailma ning hetkel on ta Lancasteri ülikoolis performance’i ja
        kirjutamise professor. Etchellsi loomingut on hiljuti näidatud Tate
        Modernis, Cubitti galeriis, Haywardi galeriis ja Bloomberg SPACE
        Londonis, Turner Contemporary’s, The Grundy and Compton Verney
        Suurbritannias, Witte de With Rotterdamis ja MUHKA’s Antwerpis.<br />

        <br />[timetchells.com](http://www.timetchells.com)
    description_en: >-
        NB! “The Quiet Volume” is an audio-sensory journey for two participants
        at a time, that takes place at Tallinn University Academic Library
        (Rävala avenue 10):  

        16+18+22+23.08 between 14:00-16:00, entrance for 2 persons every 20 min
        (last admittance 16:00).  

        17+21.08 between 14:00-18:00, entrance for 2 persons every 20 min (last
        admittance 18:00).<br />

        You can choose a suitable time when buying from Piletilevi.  


        The Quiet Volume is a whispered, self-generated and 'automatic'
        performance (Autoteatro) for two at a time, exploiting the particular
        tension common to any library worldwide; a combination of silence and
        concentration within which different peoples' experiences of reading
        unfold.  


        Two audience members / participants sit side-by-side. Taking cues from
        words both written and whispered they find themselves burrowing an
        unlikely path through a pile of books. The piece exposes the strange
        magic at the heart of the reading experience, allowing aspects of it we
        think of as deeply internal to lean out into the surrounding space, and
        to leak from one reader's sphere into another's.  


        "This now of the page is what grips me - the present moment, this one,
        summoned here with this arrangement of marks/code, ink/pixels, letters
        and words." Tim Etchells  


        ""The Quiet Volume", this small play by Ant Hampton and Tim Etchells
        leading a spectator into the world of books, is theatre of a very
        magical kind. A theatre of the gradual construction of thoughts whilst
        seeing, listening and reading. A theatre that pulls the world in and
        around, closer to and into the spectator, by making the very ability to
        read the world its thematic focus point. (...) It offers a kind of
        instruction for how to become blind: effectively nothing other than the
        careful readjustment of sight. Here it works most beautifully, because
        the direction of viewing or thinking suggested to the spectator via
        headphones and text always works both internally and externally,
        focussing on the material objects just as much as on the clusters of
        thoughts to which they are attached." Doris Meierhenrich, Berliner
        Zeitung, 20.09.2010<br /> 
         
        <br />Ant Hampton is a British artist and performance maker whose work,
        which began in 1998 under the name Rotozaza, has most often involved
        guiding people through unrehearsed performance situations. From 2007
        this started to include the audience: his Autoteatro series tours widely
        and includes Etiquette, The Quiet Volume, Cue China, OK OK, This is Not
        My Voice Speaking and The Extra People. Ant often collaborates with
        other artists, including Tim Etchells, Christophe Meierhans, Britt
        Hatzius, Gert-Jan Stam, Ivana Müller and Anna Rispoli.<br />

        <br />[www.anthampton.com](http://www.anthampton.com)<br />

        <br />Tim Etchells is an artist and a writer based in the UK whose work
        shifts between performance, visual art and fiction. He has worked in a
        wide variety of contexts, notably as the leader of the world-renowned
        Sheffield-based performance group Forced Entertainment. Exhibiting and
        presenting work in significant institutions all over the world, he is
        currently Professor of Performance & Writing at Lancaster University.
        Etchells’ work has been shown recently at Tate Modern, Cubitt, Hayward
        Gallery and Bloomberg SPACE in London, at Turner Contemporary, The
        Grundy and Compton Verney in the UK, at Witte de With, Rotterdam, and
        MUHKA (Antwerp).<br />

        <br />[timetchells.com](http://timetchells.com)
