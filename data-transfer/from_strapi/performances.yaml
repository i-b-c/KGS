    description_et: >-
        Teater pole klooster, enesessesulgumise kants. teater | valmisolek
        küsib, kas oleme valmis meie ümber juba normaliseerunud reaalsuseks ja
        võtab fookusesse etenduskunstide  'reageerimisvõime ja -tahte viimastel
        aastatel üha ärevamaks muutuvas maailmas. Mündil on loomulikult ka teine
        külg, sest sama oluline on uurida, millisteks muutusteks
        etenduskunstides peab valmis olema ühiskond. Teemapäeval võtavad sõna ja
        diskuteerivad külalised nii välismaalt kui ka Eestist, teiste hulgas
        Liibanoni kunstnik Rima Najdi, Poola Nowy Teatri dramaturg Piotr
        Gruszczyński ning Läti lavastaja ja dramaturgi duo Valters Sīlis and
        Jānis Balodis.    


        „teater | ...“ on kaks korda aastas toimuv jagatud mõtete sari, mille
        eesmärgiks viia kokku hetkel aktuaalsed teatrit puudutavad küsimused,
        mille üle arutlemiseks tavaliselt igapäevatöö kõrval aega ei jää, ning
        inimesed, keda üldjuhul neil teemadel sõna võtmas ei kuule. Nii ongi üks
        pool sarja pealkirjast alati sama „teater“, kuid mõisted teisel pool
        eraldavat kriipsu aegruumis muutuvad. „teater|valmisolek“ on sarja
        kahekümnes kohtumine.  
          
        Eesti Teatri Agentuur vahendab teatrivaldkonda puudutavaid autoriõigusi,
        edendab eesti näitekirjandust, koondab ja edastab teatriinfot, tutvustab
        Eesti teatrit välismaal ning kogub ja publitseerib Eesti
        teatristatistikat.
    description_en: >-
        Estonian Theatre Agency is dealing with copyright issues of plays,
        developing Estonian playwriting, gathering and distributing theatre
        information, introducing Estonian theatre abroad and collecting and
        publishing of Estonian theatre statistics.   


        Theatre is not a cloister, a stronghold of eremitism. theatre |
        wakefulness asks whether we are ready for the reality that has become
        normality and focuses on the preparedness of performing arts in a world
        that is becoming more and more troubled. Also, it examines what are the
        possible changes in performing arts the society has to be ready for.
        Given topics will be dissected and discussed by experts from Estonia and
        abroad, including Lebanese artist Rima Najdi, dramaturge of Nowy Teatr
        Piotr Gruszczyński from Poland and Latvian director and dramaturge duo
        Valters Sīlis and Jānis Balodis. The event has a synchronized
        translation into English.   


        theatre | wakefulness is Estonian Theatre Agency's event series of
        shared thoughts organised twice a year. The main aim of the seminars is
        to bind theatre and society, as well to encourage people afield the
        theatre world to help us think outside of the box.
