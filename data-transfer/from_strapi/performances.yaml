    description_et: >-
        **Roomet Jakapi** on Tallinnas baseeruv vokaalakrobaatik ja
        improviseerija. Tema partnerid improvaldkonnas on olnud Emilio Gordoa,
        Louise Dam Eckardt Jensen, Fred Frith, Jerzy Mazzoll, Sławek Janicki,
        Gintas K, Taavi Kerikmäe, Mart Soo, Ensemble U:, Repoo Ensemble, LAKi ja
        mitmed muud koosseisud.    

        [sites.google.com/site/rjakapi/](https://sites.google.com/site/rjakapi/)<br
        />


        **Lauri Hyvärinen** on kitarrist ja improviseerija Helsingist. Teda
        huvitab musitseerimise juures eksperimentaalsus ja noise. Ta on teinud
        koostööd muusikutega Ilja Belorukov, Jack Wright, Sergio Castrillon,
        Hong Chulki, Alan Wilkinson jt. On esinenud Euroopas, Venemaal, Jaapanis
        ja Baltimaades.    

        <a href="http://laurihyvarinen.com ">laurihyvarinen.com </a><br />


        **Improtest** on kontserdisari, mis toob kuulajateni
        improvisatsioonilise muusika nähtusi meilt ja mujalt. Sarja kontserdid
        toimuvad alates 2005. aastast kord kuus.  

        <a href="http://improtest.ee">improtest.ee</a><br />
    description_en: >-
        **Roomet Jakapi** is a vocalist and improviser based in Tallinn. He has
        performed with Emilio Gordoa, Louise Dam Eckardt Jensen, Fred Frith,
        Jerzy Mazzoll, Sławek Janicki, Gintas K, Taavi Kerikmäe, Mart Soo,
        Ensemble U:, Repoo Ensemble, LAKi, and many other musicians and
        groups.  

        [sites.google.com/site/rjakapi/](https://sites.google.com/site/rjakapi/)<br
        />


        **Lauri Hyvärinen** is a guitar player from Helsinki. For most of his
        life he has concentrated on experimental and improvised music as well as
        noise. He works to find a balance between an instrumental impulse and a
        respect for silence and presence. Besides his solo ventures Hyvärinen
        has played with musicians such as Ilia Belorukov, Hong Chulki, Tommi
        Keränen, Jone Takamäki, Alan Wilkinson, Jack Wright, Morishige Yasumune
        and Naoto Yamagishi. Hyvärinen has performed widely in Europe, Japan,
        Russia and the Baltics.  

        <a href="http://laurihyvarinen.com ">laurihyvarinen.com </a><br />


        **Improtest** is concert series that brings improvisational music from
        local and foreign authors to local audience. The concerts have been
        taking place since 2005 once a month.    

        <a href="http://improtest.ee">improtest.ee</a><br />
