    description_et: "“On minu reaalsus ja sinu reaalsus ja reaalne reaalsus, kus me kohtume.”“+1” on audiovisuaalne kontsert ühe olematu alter-iidoli tõusust ja langusest.\L\L<br />\n\L\L<br />\n**Helena Keskküla** (s 1992) lõpetas Eesti Kunstiakadeemia vabade kunstide teaduskonna installatsiooni ja skulptuuri erialal. 2013-2014 täiendas Keskküla end Viini Kunstiakadeemias. Keskküla töötab peamiselt video ja heliga. Tema looming räägib noorusest, ühiskonna suhtumisest ja ootustest, millele kunstnik vastab vaimukalt perspektiive vahetades. 2014. aastal moodustas Keskküla koos Art Nõukasega duo Art ja Helena, kellega on teinud kaks isiknäitust. 2016. suvel leidis aset kunstniku teine soolonäitus „Pärnu upub, mina sellega koos“, millest sai alguse koostöö koreograaf Kadri Sireliga, kes on koreograafiks NU Performance Festivali etendusel „+1“. \L\L<br />"
    description_en: "“There are my reality, your reality and the real reality, where we meet.”“+1” is an audiovisual concert about the rise and fall of a non-existent alter idol. \L\L<br />\n\L\L<br />\n**Helena Keskküla** (born 1992) graduated from the Estonian Academy of Arts, majoring in Installation and Sculpture in the Faculty of Fine Arts. From 2013 to 2014 Keskküla pursued further study at the Academy of Fine Arts Vienna. Keskküla mainly works with video and sound. Her work is about youth and society’s attitude and expectations, to which the artist responds by wittily switching between perspectives. In 2014 Keskküla formed the duo Art and Helena with Art Nõukas, with whom she has put on two exhibitions. In the summer of 2016 the artist held her second solo exhibition, “Pärnu is drowning, I am drowning with her,” which was the inception of her collaboration with the choreographer Kadri Sirel, who is the choreographer for her concert “+1” at NU Performance Festival."
    other_works: null
    technical_info_et: "Autor, esitus, video, muusika: **Helena Keskküla**\L\L<br />\nKoreograaf: **Kadri Sirel**\L\L<br />\nStsenograaf: **Kati Saarits** \L\L<br />\nTehniline abi: **Tõnis Jürgens**\L\L<br />\nMuusikaline abi: **Henrik Rakitin**\L\L<br />\nKaamera: **Helena Keskküla, Art Nõukas, Kati Saarits, Noah Kolb**\L\L<br />\nMuusika produktsioon: **Helena Keskküla, Kalle Pilli, Henrik Rakitin**\L\L<br />"
    technical_info_en: "Autor, esitus, video, muusika: **Helena Keskküla**\L\L<br />\nKoreograaf: **Kadri Sirel**\L\L<br />\nStsenograaf: **Kati Saarits** \L\L<br />\nTehniline abi: **Tõnis Jürgens**\L\L<br />\nMuusikaline abi: **Henrik Rakitin**\L\L<br />\nKaamera: **Helena Keskküla, Art Nõukas, Kati Saarits, Noah Kolb**\L\L<br />\nMuusika produktsioon: **Helena Keskküla, Kalle Pilli, Henrik Rakitin**\L\L<br />"
