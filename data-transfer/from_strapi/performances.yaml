    description_et: >-
        Villem Jahu on vabakutseline kunstnik kelle peamiseks meediumiks on
        heli. Seda mitmetes eri vormides: nii instalatsioonide kujul kui ka
        mitmetes eksperimentaalmuusika projektides.

        Loomingus pakub eelkõige huvi suhestumine konkreetse keskkonnaga, selle
        omapärade ja toimemehhanismide uurimine ning ka hüppamine tundmatusse
        vabaimprovisatsioonilisse suhtlusse materjali ja mängukaaslastega.  

        Alates aastast 2010 esineb Villem Jahu regulaarselt soolo
        heliperformancitega kasutades iseehitatud süntesaatoreid,
        signaalimuundureid ja muid elekroonilisi instrumente.  
          
        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.
    description_en: >-
        Villem Jahu uses sound as hes premium medium- in installations as well
        in experimental music projects.  

        Since 2010 he performs regularily as a solo artist using own made 
        synthesizers and other electronic devices. He had collaborated with
        Madis Zilmer,Rac hel Kinbar,Jonas Van den Bosche, Taavi Suisalu among
        others.  
          
        Improtest is concert series that brings improvisational music from local
        and foreign authors to local audience. The concerts have been taking
        place since 2005 once a month.
