    description_et: >-
        Olles vangikongis ametis oma vabamõtlemise teemalise romaani
        kirjutamisega, kuulutas Marquis de Sade 1785. aastal, et inimkirel on
        lubatud korda saata kuritegusid. See hetk uusaegse Lääne ajaloos
        tähistab seksuaalvabaduse ja võimu seotuse moraalset ambivalentsust. Kui
        pornograafia legaliseerimine Taanis 1967. aastal laiendas erootilist
        vabadust soolise võrdõiguslikkuse suunas, siis tänapäeva pornograafia
        hõlmab endas poliitiliselt mitmekesist väljendust ja kasutusala, queer
        ja feministlikest hoiakutest kuni seksuaalse piinamiseni sõjategevuses.
        Pornograafia afektiivse mõjujõu võti peitub ehk päris selle sõna
        juurtes: pernanai (kreeka k.) = “müüma”. See selgitab, kuidas
        pornograafiline „rahapauk“ toimib „pomm-uudiste“ pöördeliste
        tagajärgede, märulistseenide plahvatuslikkuse või ehtsa sõjaporno
        brutaalsuse puhul.  

        Lähtudes mõttest, et pornograafia on lekkinud ühiskonna paljudesse
        valdkondadesse, uurib Mette Ingvartsen pornograafilisuse toimimist hulga
        erootiliste ja afektiivsete materjalide vahendusel. Enamikel neist on
        vähe pistmist otsese seksiga, ent neis ilmnevad mõned
        pornograafilisusele iseloomulikud jooned: julmus, kliiniline täpsus,
        vägivald ja valu, aga teinekord ka naer, erutus ja põnevus. Miksides
        füüsilisi tegevusi narratiivsete kirjeldustega, luuakse spekulatiivne
        koreograafia. Kogemused, mis vaatajale selle etenduse käigus osaks
        saavad, võivad ulatuda kujuteldavatest kuni kõhus keerama panevateni.  
          
          
        Mette Ingvartsen on Taani päritolu koreograaf ja tantsija. Alates 1999.
        aastast õppis ta Amsterdamis ja Brüsselis, kus ta 2004. aastal lõpetas
        etenduskunstide kooli P.A.R.T.S. Oma esimese lavastuse “Manual Focus”
        (2003) lõi ta koolis õppimise ajal. Tema varajased teosed, mis hõlmavad
        endas lavastusi “50/50” (2004), “to come” (2005), “It’s in The Air”
        (2008) ja “GIANT CITY” (2009), püstitavad küsimusi afekti, taju ja
        aistingu teemadel seoses keha kujutamisega. Tema teoseid iseloomustab
        hübriidsus ning need tegelevad koreograafiliste praktikate
        laiendamisega, kombineerides tantsu ja liikumist teiste valdkondadega
        nagu visuaalkunst, tehnoloogia, keel ja teooria.  
          
        Oluline liin tema loomingus arenes välja aastatel 2009 - 2012 seeriaga
        "The Artificial Nature Series", mis keskendus inimesest ja
        mitte-inimesest toimija vaheliste suhete ümberkujundamisele koreograafia
        kaudu. Seeria koosneb kolmest lavastusest, milles inimese kohalolu
        puudub: “evaporated landscapes” (2009), “The Extra Sensorial Garden”
        (2011), “The Light Forest” (2010), ja kahest, millesse inimkuju tagasi
        tuuakse “Speculations” (2011) ja grupitöö “The Artificial Nature
        Project” (2012).  
          
        Vastukaaluks suhestub tema viimatine seeria The Red Pieces: “69
        positions” (2014), “7 Pleasures” (2015), “to come” (extended) ja “21
        pornographies” (2017) inimsaavutuste ajalooga, keskendudes alastusele,
        seksuaalsusele ja sellele, kuidas keha on ajalooliselt olnud tanner
        poliitilisele võitlusele.  
          
        Ingvartsen asutas oma kompanii 2003. aastal ja tema teoseid on esitatud
        üle kogu Euroopa, samuti USA-s, Kanadas ja Austraalias. Ta on olnud
        residentkunstnik Kaaitheater'is Brüsselis (2012 - 2016), Volksbühne'l
        Berliinis ja kuulub võrgustikku APAP.  
          
        Ta on omandanud filosoofiadoktori kraadi UNIARTSis / Lundi ülikoolis
        Rootsis.

        Loomingu, etendamise, kirjutamise ja loengute pidamise kõrval kuulub
        tema tegevuste hulka ka õpetamine ja õpitubade kaudu üliõpilastega oma
        uurimistöö jagamine ülikoolides ning kunstiakadeemiates.  
          
        www.metteingvartsen.net
    description_en: >-
        Writing a novel about libertinage from his prison cell in 1785, Marquis
        de Sade declared that the nature of human passions authorizes crime.
        This moment in Western modernity marks the moral ambivalence in the bind
        between sexual liberation and power. While the legalization of
        pornography in Denmark in 1967 expanded the erotic freedom towards more
        gender equality, pornography today includes a politically wide range of
        expressions and uses, from queer and feminist stances to sexualized
        torture in war. The key to the affective power of pornography lies
        perhaps in the very root of the word: pernanai (Greek) = “to sell.” It
        explains how the pornographic “money-shot” operates in the climactic
        effects of “breaking news,” in the explosivity of action scenes or in
        brutality of authentic war porn.  
           
        Starting from the idea that pornography has leaked into many areas of
        society, Mette Ingvartsen explores the operations of the pornographic
        through a collection of erotic and affective materials. Most of them
        have little to do with explicit sex, yet they show some characteristics
        of the pornographic: expressions of cruelty, clinical precision,
        violence and pain, but sometimes also of laughter, excitement and
        thrill. By mixing physical action with narrative descriptions, a
        speculative choreography is created. The experiences that the viewer
        might undergo in this performance extend from imaginary to intense
        visceral sensations.  
          
          
        Mette Ingvartsen is a Danish choreographer and dancer. From 1999 she
        studied in Amsterdam and Brussels where she in 2004 graduated from the
        performing arts school P.A.R.T.S. Her first performance “Manual Focus”
        (2003) was made while she was still studying. Her early pieces comprise
        among others of "50/50" (2004), "to come" (2005), "It’s in The Air"
        (2008) and "GIANT CITY" (2009) - performances questioning affect,
        perception and sensation in relation to bodily representation. Her work
        is characterized by hybridity and engages in extending choreographic
        practices by combining dance and movement with other domains such as
        visual art, technology, language and theory.  
          
        An important strand of her work was developed between 2009 and 2012 with
        "The Artificial Nature Series", where she focused on reconfiguring
        relations between human and non-human agency through choreography. The
        series includes three performances devoid of human presence: "evaporated
        landscapes" (2009), "The Extra Sensorial Garden" (2011) "The Light
        Forest" (2010) and two in which the human figure was reintroduced:
        "Speculations" (2011) and the group work "The Artificial Nature Project"
        (2012).  
           
        By contrast her latest series, "The Red Pieces": "69 positions" (2014)
        "7 Pleasures" (2015), "to come (extended)" and "21 pornographies" (2017)
        inscribes itself into a history of human performance with a focus on
        nudity, sexuality and how the body historically has been a site for
        political struggles.  
          
        Ingvartsen established her company in 2003 and her work has since then
        been shown throughout Europe, as well as in the U.S, Canada and
        Australia. She has been artist-in-residence at Kaaitheater in Brussels
        (2012-2016), Volksbühne in Berlin, and associated to the APAP network.  
          
        She holds a PhD in choreography from UNIARTS / Lunds University in
        Sweden.

        Besides making, performing, writing and lecturing, her practice also
        includes teaching and sharing research through workshops with students
        at universities and art schools.  
          
        www.metteingvartsen.net
