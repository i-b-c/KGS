        nad esitanud mitmeid põnevaid kavasid nagu näiteks Eesti heliloojate
        Tüüri, Eespere, Kangro, Kõrvitsa ja Tambergi esitluskontsert Århusi
        muusikamajas. Kontserdil astutakse üles marimbafonidel ja erinevatel
        löökpillidel, esitades uusi palu nii oma- kui välismaistelt
        heliloojatelt. Kavas muuhulgas: Urmas Sisaski “Kuijti-Huuijti” op. 153
        (esiettekanne), René Eespere “Murdepunkt I–II” (esiettekanne), Koppel,
        Morag, Dorman, Marino,

        Lopez.



        Heigo Rosin on populaarse telekonkursi “Klassikatäht” finalist, De
        Linkprijs’i konkursi võitja Hollandis. Ta on soleerinud Klaipėda
        Kammerorkestri, Eesti Riikliku Sümfooniaorkestri, Vanemuise
        sümfooniaorkestri, Tallinna Kammerorkestri ning Eesti Muusika- ja
        Teatriakadeemia sümfooniaorkestri ees. Rosin on esinenud soolokavadega
        Eestis, Poolas, Soomes, Belgias, Taanis ja Itaalias.


        Jonas Weitling on nõutud solist ja kammermuusik, kes mänginud Århusi
        Sümfooniaorkestri ja Århus Sinfonietta koosseisus. Ta on edukalt
        osalenud mitmetel konkurssidel Taanis. Weitling on õppinud Freiburgi
        Kõrgemas Muusikakoolis, praegu täiendab end Århusi Kuninglikus
        Muusikaakadeemias.


        www.concert.ee
