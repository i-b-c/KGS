    description_et: >-
        **Theodore Parker** on kitarrist, elektro-akustiline- ja impromuusik. Ta
        on loonud improviseeritud muusikat tantsuetendustele, performatiivsetele
        installatsioonidele ja teatrile ning hetkel omandab doktorikraadi Eesti
        Muusika ja Teatriakadeemias.  
          
        **Jaanus Siniväli** on kontrabassimängija ning elektronmuusik, kes
        tegeleb heli baasil multidistsiplinaarsete teoste loomisega.  
          
        Ta esitab kaasaegset muusikat ja tegeleb vabaimprovisatsiooniga ning
        kasutab oma etteastetel kontrabassi, DIY baasil modulaarsüntesaatorit
        või kontrabassi koos samaaegselt kontrollitava modulaarsüntesaatoriga.  
          
        Huvi ida ja lääne mõttepraktika vastu on viinud muusika ja kunsti
        funktsiooni otsinguile, mis manifesteeruvad Metphysical Studies seerias.
        Sealt tuleb huvi otsida lahendusi olukordadele, kus muusika funktsioon
        on muutuv või määratlemata, nagu heli kasutus fikseeritud parameetritega
        improvisatsioonis või mänguelemendiga teostes. Samuti töö
        multidistsiplinaarsete kooslustega, mis koosnevad helist ja tekstist,
        liikumisest, visuaalidest ning videost.  

        Ta lõpetas CoPeCo rahvusvahelise magistriprogrammi aastal 2018, kus ta
        lõpuprojektiks oli töö heli, liikumise ja visuaali ühendamisest
        fikseeritud parameetritega improvisatsioonilises keskkonnas. Ta on tegev
        Eesti Elektroonilise Muusika Seltsis (EES) ning on Helikoosoleku üks
        korraldajatest.<br />

        <br />

        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.
    description_en: >-
        **Theodore Parker** is a guitarist, electro-acoustic musician, and
        improviser. He has created improvised music for dance, performance
        installations, and theatre. He currently pursues Phd studies at the
        Estonian Academy of Music and Theatre.  
          
        **Jaanus Siniväli** is creator of contemporary multidisciplinary pieces,
        double bass player and

        electronic musician.  
          
        He is active in playing contemporary music and free improvisation. His
        main performance setups include double bass, DIY based modular
        synthesizer and double bass with foot controllable modular synthesizer.
        Interest in western and eastern practice of thinking has led to a search
        for function of music and arts which is manifested in Metaphysical
        Studies series in the form of performances and text scores. From there
        comes the curiosity to find solutions to situations where function of
        music is altering or unknown which has resulted in the use of sound in
        fixed free improvisation and game set-ups. As well as work in
        multidisciplinary collaborations consisting either sound and text,
        -movement, -

        visuals or video.  
          
        He finished CoPeCo international masters program in 2018 where he worked
        on a project

        combining sound, movement and visuals in an environment of fixed
        improvisation. He is active in Estonian Society of Electronic Music
        (EES) and co-organizer of Helikoosolek sound gatherings in Tartu.<br />

        <br />

        Improtest is concert series that brings improvisational music from local
        and foreign authors to local audience. The concerts have been taking
        place since 2005 once a month.
