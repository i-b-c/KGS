    description_et: >-
        “OK. Mida iganes. Me oleme lihtsalt anti-poliitiliselt romantilised meie
        tegeliku sotsiaalse elu suhtes. Me ei ole poliitika eest vastutavad.
        Meie olemegi poliitika peamine antagonism, mis kangastub iga
        politiseerimise püüde, iga omavalitsuse rakendamise, iga iseseisva
        otsuse ja selle väärtusetu miniatuuri, iga tekkiva riigi taga ja selle
        peamine pesapaik.”  

        “The Undercommons” Stefano Harney & Fred Moten  


        Tere tulemast “Think Much. Cry Much.” etendusele. Etendusele, mis ei
        muuda sinu elu.  


        Sinu ohutuse nimel ei esitle see etendus pagulasi või ei ürita esile
        kutsuda empaatiat pagulaste või asüülitaotlejate suhtes. Sinu
        turvalisuse nimel ei ürita see etendus küündida inimkannatustest aru
        saamiseni. See ei seleta ära terrorismi, islamiusku või seksuaalset
        ahistamist avalikes kohtades.  


        See etendus toimib nii, et sa saaksid tunda end mugavalt, et sa ei peaks
        läbi elama, seda mida pagulane piiri ületades kogeb. Sa ei tunne end
        üldse nagu pagulane. See etendus ei loo hädaohuolukordi, nii et see ei
        seleta või paku lahendust pagulaskriisile. See ei maini sõna “kriis”
        üldse.   


        See etendus aitab sul tegeleda piiridega seotud rituaalidega ja piiride
        helikeskkonaga, et aru saada piiridest kui konstruktsioonidest. See
        etendus annab mõista, kuidas me kõik oleme piiride eest vastutavad.   


        Tere tulemast piirialale ja piiridele.  

        Tere tulemast “Think Much. Cry Much.” etendusele.  


        Rima Nadi on Berliinis resideeruv etenduskunstnik. Tema tööd paigutuvad
        vahealadele, mida ta samas ka küsimuse alla seab. Teda huvitab kuidas
        identiteet konstrueeritakse ja kuidas seda tajutakse, keskendudes meie
        keha elamiskogemusele. Ta on huvitatud keha haavatavusest seoses soo,
        turvalisuse, mobiilsuse ja represesentatsiooni politiseeritusega. Tema
        looming nii tegevusena kui artefaktina seab küsimuse alla stereotüüpe,
        keele ebaõnnestumisi ja nii tegelikke kui väljamõeldud piire.

        Tema loomingut on esitletud Ameerika Ühendriikides, Euroopas ja Põhja
        Aafrikas. Samuti oli üks tema töödest esindatud Saksamaa ja Türgi
        akadeemikute, kunstnike ja aktivistide sümpoosiumi näitusel “Entangled
        Perspectives on Participatory Citizenship” Haus der Kulturen der Welt’is
        Berliinis 2015. aastal ning Tuneesia rahvusvahelisel feministliku kunsti
        festivalil Chouftouhonna.  

        Najdi on olnud residentuurides mitmel pool maailmas, muuhulgas ka
        Watermilli keskuse rahvusvahelises suveresidentuuri programmis 2011.
        aastal ning Sundance teatrilaboratooriumis Marokos. Hetkel on ta osaline
        projektis Urban Heat, mis on rahvusvahelise võrgustiku Festivals In
        Transition nelja aastane algatus, mida toetab Euroopa Kultuuriprogramm.
        Rima on ka CTM Radio Lab 2017 võitja.  

        [www.rimanajdi.com](http://rimanajdi.com/)
    description_en: >-
        "OK. Whatever. We're just anti-politically romantic about actually
        existing social life. We aren't responsible for politics. We are the
        general antagonism to politics looming outside every attempt to
        politicize, every imposition of self-governance, every sovereign
        decision and its degraded miniature, every emergent state and home sweet
        home." "The Undercommons" Stefano Harney & Fred Moten  


        Welcome to Think Much. Cry Much. A performance piece that will not
        change your life.  


        For your safety, this piece will not represent refugees, or try to
        create empathy towards refugees and asylum seekers. For your security,
        this piece will not attempt to reach an understanding of human
        suffering. It will not explain terrorism, Islam or sexual harassment in
        public spaces.  


        This piece will work to keep you comfortable, so that you don’t go
        through the experience of a refugee crossing a border. You won’t feel
        like a refugee at all. This piece will not create an emergency, so it
        will not explain or offer a solution for the refugee ‘crisis’. It will
        not mention the word ‘crisis’ at all.   


        This piece will assist you by working on border rituals, to understand
        borders as a construct, and on the sound body of the borders. This piece
        will explain how we are all responsible for borders.   


        Welcome to borderlines and boundaries.   

        Welcome to Think Much. Cry Much.   


        Rima Najdi is a Berlin-based performance artist. Her work occupies and
        (re)negotiates in-between spaces. She grapples with the ways in which
        identity is constructed and perceived, focusing on the lived experience
        of the body. She is interested in the vulnerability of the body in
        relation to the politicized tropes of gender, safety, mobility and
        representation. In action or as artefact, her art questions stereotypes,
        the failure of language and both real and imagined borders. 

        Her work has been presented throughout the United States, Europe and
        North Africa, including in an exhibition for "Entangled Perspectives on
        Participatory Citizenship," a symposium of German and Turkish academics,
        artists and activists held at Berlin's Haus der Kulturen der Welt in
        2015, and at Tunisia's international feminist art festival
        Chouftouhonna. 

        Najdi has also taken part in residency programs around the world,
        including the Watermill Center International Summer Residency program in
        2011 and the Sundance Theatre Lab in Morocco, She is currently a member
        of Urban Heat, a four-year project initiated by the Festivals in
        Transition (FIT) network and supported by Creative Europe. She is the
        winner of CTM Radio Lab 2017.   


        [www.rimanajdi.com](http://rimanajdi.com/)
