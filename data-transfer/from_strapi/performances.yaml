    description_et: >-
        <!-- Toimetatud 10.12.15 -->

        <p>

        BASKIN EHK NALJA PÕHIVORMID on uurimus huumorist.<br />

        Tahame teada, mis on naljakas tänapäeval, siin ja praegu, täna, kus kõik
        on lubatud, nalja eest ei panda vangi, aga huumoriajakirja toimetuses
        töötamine võib olla eluohtlik.<br />

        Segame parimate kavatsustega kokku estraadinumbrid, prantsuse komöödia,
        muusikalise draama, nõukogude kino, meelelahutaja, vabaõhukomöödia,
        kuulsuste elulood, anekdoodid ja legendid, tembime kõike kunstiliste
        liialdustega ning looritame ähmaste vihjetega.<br />

        Tulemuseks on Tartu Uue Teatri esimene komöödia.<br />
    description_en: >-
        “Baskin ehk Nalja põhivormid“ is a study on humor. Authors want to know
        what is funny nowadays, here and now, today, when everything is allowed,
        no one is sent to jail for a joke, but working in an editorial board of
        humor magazine might be life threatening. They have experienced how easy
        it is to be serious and sapiential. They are aware, how convenient it is
        to be tragic and sad. They are aware, how ungrateful is to rejoice
        people and make them laugh. How complicated that is. But still. With
        their best intentions, vodevills, french comedy, musical drama, soviet
        cinema, entertainment, open air comedy, anecdotes and legends are mixed,
        manufactured with artistic exaggerations and veiled with hazy hints. The
        result is the first comedy of Tartu Uus Teater.<br />
    other_works: null
