    description_et: >-
        Kujuta ette situatsiooni, kus leiad end taasühendatuna kõigega, mille
        oled varasemalt kõrvale heitnud, kustutanud või minema visanud. Asjad,
        mõtted ja suhted, millest olid end lahti lasknud või unustanud - siin
        nad nüüd on. Need asjad on sinu, sa hoolid neist. Sa lülitad sisse
        tagurpidikäigu, hindad ümber ja taaspühendud. Kõigil asjadel elus on
        mingi väärtus. Mis hetkest ei ole sinu prügi vaid sinu prügi? Tuleb
        meelde stseen Bunuel’i äraspidimaailma kujutavast filmist „The Phantom
        Of Liberty“, kus peoperemehed ja külalised situvad üheskoos ümber laua,
        aga söömisega tegelevad ihuüksi tualetis.   


        Oblivion on etendus kõigest, mida Sarah Vanhee oleks pidanud ühe aasta
        jooksul töö- ja elamise käigus minema viskama. Etendus on aeglaselt
        kulgev ood hästiununenud asjade ja tunnete taastulemisele.  


        Sarah Vanhee kunstiline tegevus on tihedalt seotud performance- ja
        visuaalkunsti ning kirjandusega. Oma töödes kasutab ta erinevaid
        formaate, sisu tihti spontaanselt kohapeal - vaatajate elutubades,
        vanglas, ärikohtumistel või pargis (taas)luues. 

        Vanhee värskemate projektide hulka kuuluvad „The C-Project, Turning
        Turning (the choreography of thoughts)“ (Frascati Producties & CAMPO),
        „Untitled, Lecture For Every One“ (CAMPO) ja „I screamed and I screamed
        and I screamed“ (Contour).

        Vanhee on kunstiraamatu „Untranslatables - a guide to translingual
        dialogue” kaasautor ja “The Miraculous Life of Claire C and TT“ autor.  

        Lisaks eelnevale tegeleb autor coaching-nõustamise, õpetamise,
        intervjuude läbiviimise ning tekstide kirjutamisega. Tema töid on
        nomineeritud Ton Lutz prijs 2007 (äramärgitud töö) auhinnale ning Prix
        Jardin d’Europe (2010) ja VSCD Mimeprijs 2012 auhindadele. Vanhee
        ettevõtmised CAMPOs said alguse loeng-performance’iga „Me and My
        Stranger (2009)“. 2011. aastal jätkus koostöö kahe etenduskunstniku ning
        mitme filosoofia-, neuro-lingvistika-, psühhoanalüütika-,
        performance-teooria- ning matemaatikateadlasega etenduses „Turning
        Turning (a choreography of thoughts)“ (Frascati Productions and
        CAMPO).  

        Projekt „Untitled“ sai alguse 2012. aastal. Projekti käigus külastatakse
        inimeste kodusid ning vestlus areneb külastatavate kodudes leiduva
        kunsti teemadel. Koostöös kohalike kunstimajade ja eraisikutega on
        „Untitled“ aset leidnud mitmes eri linnas, teiste hulgas Leuvenis,
        Brüsselis, Frankfurdis ja Gentis. 2013 augustis lõi Vanhee koostöös
        Belgias asuva Mecheleni linna vangla vangidega installatsiooni „I
        screamed and I screamed and I screamed“. Projekti toetas Contour
        2013.<br />2013. aasta kevadel tehti algust „Lecture For Every One“
        loengutesarjaga, mille käigus korraldati etteteavitamata nn
        „loomingulisi sekkumisi“ kohtades, kus inimesed tavaliselt eraelulistel
        või tööalastel eesmärkidel kogunevad. Nii pangahoonetes,
        linnavalitsustes, jalgpallimeeskondadele kui mujal esitatud lühiloeng
        „Lecture For Every One“ keskendub kaasajaühiskonnale, kui ühiselt
        konstrueeritavale reaalsusele. 2014. aastal Augusti TantsuFestivalil oli
        Sarah Vanhee oma loeng-lavastusega "Lecture for Every One".


        [www.sarahvanhee.com/](http://www.sarahvanhee.com)
    description_en: "Imagine this place where you find yourself reconnected to everything you have discarded, deleted or thrown away. Objects, thoughts, relations you had already cut yourself loose from and forgotten about, now they are all there again. They are yours, you care about them. You reverse, re-value, re-invest. Every thing is worth something. When does your trash stop being your trash? Think an inverse world, for instance that scene in Bunuel’s The Phantom Of Liberty where hosts and guests shit together around the dinner table and eat alone in the toilet.   \n\nOblivion is a performance with everything Sarah Vanhee would have thrown away during one year working and living. It is a slow celebration of things unhidden.  \n\nSarah Vanhee's artistic practice is linked to performance, visual art and literature. It uses different formats and is often (re)created in situ, with projects occurring in living rooms, a prison, during business meetings, in the park, …\nHer most recent work includes The C-Project, Turning Turning (a choreography of thoughts) (Frascati Producties & CAMPO), Untitled, Lecture For Every One (CAMPO) and I screamed and I screamed and I screamed (Contour).   \nVanhee is co-author of the art book Untranslatables - a guide to translingual dialogue and author of The Miraculous Life of Claire C and TT.   \nShe also coaches, teaches, and writes interviews and texts. Her work was nominated for the Ton Lutz prijs 2007 (honourable mention), Prix Jardin d’Europe (2010) and the VSCD Mimeprijs 2012.  \nHer trajectory at CAMPO started off with the lecture-performance Me and My Stranger (2009). In 2011 she created the piece Turning Turning (a choreography of thoughts) (Frascati Productions and CAMPO), in collaboration with two performers and a number of scholars from the fields of philosophy, neuro-linguistics, psychoanalysis, mathematics and performance theory.   \nIn 2012 she started Untitled. This project consists of a series of individual visits to private houses where people talk about the art works they have at home. Untitled has taken place in different cities, such as Leuven, Brussels, Frankfurt and Gent, in collaboration with local art venues and citizens.   \nIn August 2013, Sarah Vanhee made an installation together with inmates of the prison in Mechelen (BE): I screamed and I screamed and I screamed. This project was hosted by Contour 2013.  \LSpring 2013 Lecture For Every One took off, a series of unannounced artistic interventions in different places where people gather together for a specific purpose, either private or professional. Lecture For Every One is a short lecture on contemporary society as a co-creation by every-one, traveling from banks to football teams and city councils. On 2014 she visited Tallinn with her lecture-performance \"Lecture for Every One\" at August DanceFestival.\n\n[www.sarahvanhee.com/](http://www.sarahvanhee.com)"
    other_works: null
