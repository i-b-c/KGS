    description_et: >-
        Eesti Kunstiakadeemia arhitektuuri- ja linnaplaneerimise osakonna Avatud
        Loengute sarja järgmine esineja tegeleb uute tehnoloogiate rakendamisega
        arhitektuuris. 3. mail kell 18 astub Kanuti Gildi SAALi lavale
        disainiuuringute büroo Certain Measures kaasasutaja Tobias Nolte.
        Oodatud on kõik, keda paeluvad masinnägemise rakendused, andmetöötlus ja
        nende rakendamine arhitektuuris nutikama ja säästlikuma tuleviku
        nimel.<br />

        <br />

        Oma loengus pealkirjaga “Masinnägemine ja disain” (“Machine Vision and
        Design”) räägib Nolte oma büroo erinevatest projektidest, mis kasutavad
        masinnägemist erinevate rakenduste jaoks arhitektuuris. Üks põnevaim on
        ehk Mine the Scrap, mis tegeleb ehitusjäätmete taaskasutusega,
        sorteerides erineva kujuga jäätmetest välja tükke, millest tarkvara abil
        genereeritakse uusi vorme ja pinnalaotusi. Enne oma büroo asutamist oli
        Nolte Gehry Technologies New Yorgi harukontori direktor, kus ta juhtis
        arhitektide ja inseneride meeskonda parameetriliste ja arvutuslike
        tehnikate juurutamisel disainis ja ehituses. Varasemalt oli ta Gehry
        Technologies Euroopa kontori juhataja Pariisis, kus ta töötas koos
        tunnustatud rahvusvaheliste disainibüroodega nagu Gehry Partners, Zaha
        Hadid Architects, Snohetta, UNStudio, Coop Himmelb(l)au ja paljud
        teised.<br />

        <br />

        Certain Measures on disainiuuringute büroo, mis kasutab kogemuste,
        süsteemide ja ruumide loomiseks matemaatikat ja uusi tehnoloogiaid.
        Büroo loob projektidele uusi tarkvara ja riistvara lahendusi, kasutades
        vabavaralisi tööriistu ja tuginedes süvaõppele ja eriteadmistele
        arhitektuuri, matemaatika, robootika ja arvutiteaduse valdkondades,
        eesmärgiga mõista, rikastada ning muuta inimeste ruumikogemust.<br />

        <br />

        Avatud Loengute sarja raames jõuavad Tallinna põnevad arhitektid ja
        linnaplaneerijaid - nii teoreetikuid kui praktikuid - kõikjalt üle
        maailma. Kuulama on oodatud kõikide Eesti koolide tudengid – olgu siis
        arhitektuuri, urbanistika, sisearhitektuuri, disaini või vabade kunstide
        valdkonnast; samuti juba tegutsevad professionaalid, õppejõud ning
        lihtsalt arhitektuuri- ja ruumihuvilised – samuti kõik, kes kaaluvad
        arhitektuuri õppima asumist. Avatud loengud on alati tasuta ja inglise
        keeles. Loengusarja toetab Eesti Kultuurkapital.<br />

        <br />

        EKA arhitektuuri ja linnaplaneerimise osakond on arhitektuuri avatud
        loenguid korraldanud 2012. aastast alates – igal õppeaastal astub
        Tallinnas erialase publiku ette kümmekond valdkonna omanäolist praktikut
        ja hinnatud teoreetikut.
    description_en: >-
        The last lecturer of the Open Lecture Series this spring semester will
        be Tobias Nolte, stepping on the stage of Kanuti Gildi SAAL (Pikk 20,
        Tallinn) on 3rd of May at 6 pm to talk about new technologies and their
        application in architecture. Topics of his lecture range from machine
        vision to data processing and how to apply them in architecture for
        smarter and more sustainable future.<br /> 

        <br /> 

        In his lecture titled “Machine Vision and Design” Nolte will discuss the
        various projects his bureau deals with. One of the more exciting ones
        being Mine the Scrap, that focuses on the re-use of construction waste.
        They use machine vision to sort out pieces of various shapes and sizes
        from scrap materials and then use software to generate various shapes
        and layouts for generative re-use.<br /> 

        <br /> 

        Tobias Nolte is a co-founder of Certain Measures. Prior to founding his
        own practice, he was a Director at Gehry Technologies in New York where
        he led a team of architects and engineers in the implementation of
        parametric and computational methods in design and construction. He was
        previously a director at the Europe office of Gehry Technologies in
        Paris where he has worked with a variety of leading international design
        firms including Gehry Partners, Zaha Hadid Architects, Snøhetta,
        UNStudio, Coop Himmelb(l)au and several others.<br /> 

        <br /> 

        Certain Measures is an office for design science. They are a
        hypothesis-driven design practice that brings deeper insight to the
        design of experiences, systems, and spaces using mathematics, new
        technologies, refined intuition, and restless curiosity. They bring
        novel projects to life by building new software and hardware, tapping
        open-source tools, drawing on deep training and expertise in
        architecture, mathematics, robotics, and computer science, and embracing
        flexible collaboration with other owners, designers, and other experts.
        Their aim is to understand, enrich, and transform the human experience
        of space.<br /> 

        <br /> 

        The Open Lecture Series brings to Tallinn a number of exciting
        architects, urban planners, academics from across the world. All Open
        Lectures are free of charge, in English, take place every fortnight, and
        are open to everyone – for both students and professionals of the field,
        general audience and students considering architecture for their further
        studies.<br /> 

        <br /> 

        The architecture and urban planning department of the Estonian Academy
        of Arts has been curating the Open Lectures on Architecture series since
        2012 – each year, a dozen architects, urbanists, both practicing as well
        as academics, introduce their work and field of research to the audience
        in Tallinn. The series is funded by the Estonian Cultural Endowment.
