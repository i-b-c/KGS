        **Karolin Poska** “Tesla tantsijad” 4’ / laval: **Triin Marts, Kaie
        Küünal**  

        **Jaak Sapas** “frame 2” 8’  

        **Chungin** “Surm Berghainis” 10’  

        **Minna Triin Kohv** “True colors” 7'   

        **Steve Vanoni** “3 actions for a GAY and Muslim Estonia” 15’  


        20:30 tühi lava  

        **Henri Hütt** “Sisenemine sisenemisse (osa 2)” 4’  

        **Raho Aadla** “Kuidas saada taeva kehaks” 10’  

        **Aimur Takk** “A0” 1’  

        **Anna Kaarma** “A6-A0” 6’ / laval: Maria Kesküla  

        **Liis Vares & Pavel Semjono**v “vasak parem” 10’  

        **Laur Kaunissaare** “4. märts, 2017” 2’  

        **Joanna Kalm** “Puhtuses peitub ilu” 5’  


        NB! made in estonia maratoni käepaelaga saavad kõik tasuta sisse
        õhtusele järelpeole KuKu Klubisse.  


        ---


        “condemned forever to becoming and never to being”  (Karl Scheffler)  


        Tundub, et paljud üritavad tänapäeval liigset rõhku panna
        lõpp-produktile ja mitte piisavalt protsessile. Maraton sündis protsessi
        vaimus ja sellest ei saa iialgi päris valmis produkti, selleks on
        lihtsalt liiga palju osakesi ja muutujaid.  


        Tegemist on pidustusega, mis tähistab liberalismi ja etenduskunste:
        kõigi maade esinejad ühinege! Tõeline etenduskunsti bakhanaal, mis
        koosneb traditsiooniliselt (loe: kõik võib muutuda) kolmest plokist:
        must, valge ja “alasti” lava.  


        Kümnenda juubeli puhul (loe: ka selles osas on vaidlemisi) liigume
        käsikäes Kanuti Gildi SAAList KuKu Klubisse, kus jätkame protsessi
        järgmist staadiumi, veel vabam lava veel vabama kavaga. Asjad on ette
        määratud, kuid See keegi pole meid veel valgustanud, mis täpselt juhtuma
        hakkab. Võib olla, et saab leiba ja tsirkust, võimalik, et ei saa
        sedagi. Praeguses ebakindlas maailmas pole miski enam kindel ja meil on
        au tähistada selle kõige võimalikkust ja võimatust ühiselt. MARATON,
        LET’S GO!  


        Selle aasta etteastete autorid on Joanna Kalm, Chungin, Henri Hütt,
        Roland Arnoldt & Eerik Kändler, Karolin Poska, Steve Vanoni, Lauren
        Bachmann & David Wittinghofer, Üüve-Lydia Toompere, Katrin Kreutzberg,
        Raho Aadla, Kirsi Mari Lepik, Evi Pärn & Jekaterina Kultajeva, Minna
        Triin Kohv, Liis Vares & Pavel Semjonov, Pärtel Eelmere, Anna Kaarma,
        Aimur Takk, Jaak Sapas, Kristina-Maria Heinsalu & Doris Feldmann jt.


        PS. Järelpidustused KuKu Klubis!
