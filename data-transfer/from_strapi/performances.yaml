    description_et: >-
        Sigrid Savi töö "Pushing Daisies" metoodiliselt elutu jutuvestmine loob
        mängulisi melanhoolia fragmente. Etendaja seisab vastu individuaalsele
        ja kollektiivsele tahtele ja ootustele kasutades odavaid trikke,
        erootikat, nostalgiat ja illusiooni puudumist, püüdes saavutada veenvat
        efekti, vahekorda.  
          
        Metafoorid lavastuses seovad publikut aktiivsesse mōjutatud, määratud
        mōtestamise protsessi. Lavastus osutab kollektiivse meele vōi
        kultuurilise rütmi identiteedile, mis on seatud vaguralt läbi sümbolismi
        - "Lugu on lubadus, kohandumus ja dekoratiivne”.  
          
          
        Sigrid Savi on töötanud vabakutselise tantsijana Tallinna Tantsuteatris,
        Ugala Teatris, Sõltumatu Tantsu Laval, Vaba Laval ning aktiivsema
        lavastamiseni jõudnud alates 2015. aastast peale
        koreograaf-tantsuõpetaja eriala lõpetamist Tartu Ülikooli Viljandi
        Kultuuriakadeemias. Sigrid elab ja töötab hetkel Berliinis. Tema töid
        iseloomustavad brutaalselt naiivsed võtted nii ülesehituses kui ka
        esituses. Oma loomingulises töös tähtsustab Sigrid vaataja kogemuslikke
        perspektiive ja stilistilist kõla, õppides teadlikult töötama nii koos
        kaanonitega kui ka neist lahus.  

        Tema esimest soolotööd „Imagine There's a Fish“ on esitatud lisaks
        Eestile Norras, Saksamaal, Šotimaal, Lätis, Ukrainas. Koostöös Jon
        Konkoliga loodud performance`it „Not this pillow fight“ (2018) on
        esitatud New Yorkis ja Berliinis.
    description_en: >-
        The methodically dull storytelling of Sigrid Savi's work "Pushing
        Daisies" creates fragments of playful melancholia. The performer
        confronts individual and collective will and expectation while using
        cheap tricks, erotica, nostalgia, and a lack of illusion in endeavor for
        compelling effect, intercourse.  
          
        The  metaphors in this work are engaging the audience in an active
        process of influenced, indicated interpretation. The performance applies
        to the identity of our collective mind or cultural rhythm by the hands
        of carefully crafted symbolism - "A story is a promise, mobility and
        decorative".  
          
          
        Sigrid Savi has worked as a freelance dancer at Tallinn Dance Theatre,
        Ugala Theater, STL, Vaba Lava and has been active since 2015 after
        graduating from the University of Tartu Viljandi Culture Academy. Sigrid
        currently lives and works in Berlin. Her works are characterized by
        brutally naive techniques both in structure and performance. In her
        creative work, Sigrid emphasizes on the experiential perspectives from
        the viewer audience and on the stylistic accordance, learning to
        consciously work with and apart from the canons.  

        Her first solo work "Imagine There's a Fish" has been presented in
        addition to Estonia in Norway, Germany, Scotland, Latvia, and Ukraine.
        The collaboration performance with Jon Konkol "Not this pillow fight"
        (2018) has been performed in New York and in Berlin.
