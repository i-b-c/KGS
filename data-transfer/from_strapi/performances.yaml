    description_et: >-
        Martin Rästa interaktiivne heliinstallatsioon "Mõjuvald" dekonstrueerib
        mõjumehhanismide olemust empiirilises kontekstis spontaanselt
        kontrollitava heliruumi kaudu. Kui 2015.a. esimese Üle Heli festivali
        ajal  samas ruumis avatud installatsioon "Tajusfäär" oli inspireeritud
        Jakob von Uexkülli omailmateooria tajuilma mõistest, siis Martin Rästa
        installatsioon lähtub sama teooria teisest baasmõistest, milleks on
        mõjuilm. Ühtlasi on installatsioon pühendatud ka legendaarse
        muusikainstrumendi teremini sajandale sünnipäevale.  
          
        Martin Rästa on graafiline disainer, interdistsiplinaarne kunstnik ning
        muusik, kes on pühendanud valdava osa oma loomingust visuaali ja heli
        sünteesimisele ning integreerimisele erinevates eksperimentaalsetes
        vormides ja meediumites. Olulisel kohal tema loomingus on kognitiivsed
        protsessid ning empiiriline maailmatunnetus, mida saadab huvi olemuslike
        küsimuste vastu.  
          
        Heliüleste tasandite muusikafestival Üle Heli keskendub žanrimääratluste
        asemel muusika tähenduslikkusele ja seostele erinevate
        kunstivaldkondadega. Alates 2015.aastast toimuva festivali eesmärgiks on
        käesoleval aastal kokkuvõtte tegemine seni vaatluse all olnud
        erinevatest heli ja ruumiga seonduvatest teemadest.  
          
        www.ule-heli.ee
    description_en: >-
        Martin Rästa’s interactive sound installation “Impact domain”
        (“Mõjuvald”) deconstructs the nature of impact mechanisms in an
        empirical context via a spontaneously controlled sound space. Whereas
        the installation “Perceptional sphere” (“Tajusfäär”) unveiled in the
        same space during the first Üle Heli festival in 2015 was inspired by
        the notion of Merkwelt in Jakob von Uexküll’s Umwelt theory, Martin
        Rästa’s installation takes as its point of departure another underlying
        notion of the same theory, which is Wirkwelt. Furthermore, the
        installation is dedicated to the centenary of the legendary musical
        instrument teremini.  
           

        Martin Rästa is a graphic designer, interdisciplinary artist and
        musician who has dedicated the majority of his creative output to a
        synthesis of the visual and sound as well as to an integration thereof
        in various experimental forms and media. An important place in his
        creative output is held by cognitive processes and an empirical
        cognition of the world coupled with an interest in essential issues.  
          
        The Üle Heli music festival of cross-sound levels focuses on the
        meaningfulness of music and its links to various spheres of art instead
        of genre definitions. The festival, held since 2015, aims to provide
        this year a summation of the various sound- and space-related topics
        under consideration to date.   
          
        www.ule-heli.ee
