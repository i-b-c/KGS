    description_et: >-
        “Üks viibe” on viipekeelele keskenduv lavastus. 

        See on lavastus maailmaga suhtlemisest – suhtlemisest kuuljate maailma
        ja selle teise, kurtide, maailmaga.   

        Kuidas toimib kommunikatsioon? Kuidas tekivad, kantakse edasi ning
        töödeldakse  teadmisi, emotsioone ja kultuuri, üldisemalt. Kui keel on
        ainus reaalsus, millele meil on ligipääs (“Minu keele piirid on ühtlasi
        ka minu maailma piirid", ütles kunagi Ludwig Wittgenstein), siis mida
        võiksime õppida kurtide keelelt. Millised kogemused suhtlemisel on
        universaalsed ja millised ainuomased vaid viipekeelele? Kuidas on
        kujunenud nii, et ühelgi minu sõbral ei ole ühtegi kurti sõpra?     


        Näitena võib tuua mõned truismid  ameerika kontseptualisti  Jenny Holzer
        “Truismide kogumikust”. Need üldtuntud tõed tunduvad lihtsamast
        lihtsamad sinnamaani, kui asetada need viipekeele konteksti:  

        Kuula, mida su keha räägib.  

        Inimesed, kes ei kasuta töö tegemiseks käsi, on parasiidid.   

        Sõnad kipuvad olema ebapiisavad.   

        Kirjeldus on tähtsam kui metafoor.   

        Abstraktsioon on üks dekadentsi liike.   

        Oled vastutav ümbritsevale tähenduse loomise eest.    


        „Lavastus üritab leida vastuseid küsimusele, kuidas ühiskonnana
        liikmetena suhtume teineteisesse ning “teistsugusesse”. Jääb mulje, et
        tegemist on olulise küsimusega, eriti kaasaja kontekstis, kuna
        lavastuses käsitletakse keelt, kommunikatsiooni, tõrjutust ja
        integratsiooni ilma kindla geograafilise, rassilise või religioosse
        kontekstita.“, 38.Zürichi teatrifestivali „Theater Spektakel“ žürii
        lühikokkuvõte.<br />

        <br />

        **Wojtek Ziemilski** on teatrilavastaja, visuaalkunstnik. Tema tööd
        ulatuvad erinevatesse valdkondadesse, toetudes etenduskunstide
        mitmekesisusele. Tema teosed Mała narracja, Prolog, W samo południe,
        Kosmologia rozdrażewska ja Pygmalion uurivad dokumentaalteatri
        võimalusi. Sageli töötab ta mitteprofessionaalsete näitlejatega. XS Art
        Centre asutaja, Varssavi Galeria BWAga seotud Golgota Picnic Polska
        kaasasutaja. Ta annab loenguid eksperimentaalteatri uute suundade teemal
        Riiklikus teatrikunsti akadeemias Varssavis ja Varssavi ülikoolis.



        **Wojtek Pustoła** on visuaalkunstnik, kelle huviorbiidis on film,
        skulptuur, performance ja stsenograafia. Lõpetanud Varssavi Ülikooli
        skulptuuri osakonna ja Poznani multimeedia osakonna. Valik näituseid:
        “Coming Soon” Temporary Gallery Cologne; Vordemberge-Gildewart Fund
        auhind Krakowi Kaasaegse Kunsti Muuseumis; Wro Biennaal.  Wojtek on
        kaasaegse tantsuplatvormi “Centre in movement” liige. Viimastel aastatel
        teinud videoinstallatsioone ja märkimisväärselt minimalistlikku ning
        funktsionaalset stsenograafiat koostöös teatrilavastaja Wojtek
        Ziemilskiga. Elab ja töötab Varssavis ning Carraras.  

        Auhinnad:  

        - Docs in Progress Award 2017, White Cube, Visions du Reel Festival,
        Nyon, SUI  

        - Best European Project, White Cube, Bio to B, Bolonia, ITA



        **NOWY TEATR** on koht, kus avardatakse kunsti lahinguvälja. Selle on
        loonud Krzysztof Warlikowski ja grupp tema regulaarseid
        koostööpartnereid. Nowy Teatr tahab rakendada tööle dialoogiruumi
        publikuga, mitte piirata end üksnes teatrialaste püüdlustega. See on
        ruum, mis esindab uut kunstisituatsiooni, vaba tegevusväli kutsutud
        kunstnikele ja kuraatoritele; miski, mis areneb edasi ideedega inimeste
        toel. Me kuulume poola kultuuri rahvusvahelisel areenil kõige
        aktiivsemalt esindavate institutsioonide hulka.
    description_en: >-
        One Gesture is a show about sign languages.

        It is a show about communicating with the world – with the world of the
        hearing and with the world of the other Deaf. How does communication
        work? How are knowledge, emotion and culture transmitted, produced and
        processed? If language is the only reality we have access to („The
        limits of my language mean the limits of my world” – as Wittgenstein
        said), what can we learn about the world from the languages of the Deaf?
        What is universal about their experience of communicating, and what is
        unique? And how come none of my friends have any Deaf friends?  


        Let me cite a number of truisms from the collection of Truisms by Jenny
        Holzer, an American neoconceptual artist. These phrases seem the
        simplest thing there is. Until you look at them from the standpoint of
        sign language:  

        Listen when your body talks.  

        People who don’t work with their hands are parasites.  

        Words tend to be inadequate.  

        Description is more important than metaphor.  

        Abstraction is a type of decadence.  

        You are responsible for constituting the meaning of things.  


        *It is a piece that asks how do we deal with each other and the
        «otherness» in general. It feels like an important piece of work right
        now, in these times, because it talks about language, communication,
        exclusion and integration without a specific geographical, racial or
        religious context. Statement of the Jury, 38. Zürcher Theater
        Spektakel*<br />

        <br />

        **Wojtek Ziemilski** is a theatre director, visual artist. His works
        span different fields, drawing on the diversity of performative arts.
        His productions Mała narracja, Prolog, W samo południe, Kosmologia
        rozdrażewska, and Pygmalion explore the possibilities of documentary
        theatre. He often works with non-professional actors. Founder of XS Art.
        Centre, co-founder of Golgota Picnic Polska, associated with Galeria BWA
        in Warsaw. He lectures on new currents in experimental theatre at the
        National Academy of Dramatic Art in Warsaw and at the University of
        Warsaw.


        **Wojtek Pustoła** is a visual artist. His area of interest is film
        making, sculpture, performance and scenography. Graduate of Sculpture
        Department in Warsaw and Multimedia Department in Poznan. Showed his
        works in various exhibitions such as ‘Coming Soon’ in Temporary Gallery
        Cologne; Vordemberge-Gildewart Fund Award in Museum of Contemporary Art
        Cracow; Wro Biennale. Affiliated with ‘Centre in movement’, a
        contemporary dance platform for choreographers and performers. In recent
        years works with a theatre director Wojtek Ziemilski, as an author of
        video installations and scenography notable for its minimalistic and
        functional approach. 

        Lives and works in Warsaw and Carrara.   

        Awards:  

        - Docs in Progress Award 2017, White Cube, Visions du Reel Festival,
        Nyon, SUI  

        - Best European Project, White Cube, Bio to B, Bolonia, ITA



        **NOWY TEATR** is the place for broadening of the artistic battlefield.
        Created by Krzysztof Warlikowski

        and a group of his regular collaborators, Nowy Teatr wants to exploit
        the spaces of dialogue with the audience, not limiting themselves solely
        to theatrical pursuits. It is a space that represents a new artistic
        situation, a free field of action for the invited artists and curators,
        somewhere that is being developed by people with ideas. We are among the
        most active institutions in representing Polish culture in the
        international arena.
