    description_et: >-
        VII NU Performance Festival: Objekt ja kollektiiv  


        Seekordse NU Performance Festivali keskmes on objektse kunsti ajaliin ja
        performatiivsed võimalused ning etendused, mis mõtestavad ümber publiku
        kogemuse etenduse osana, seda nii individuaalses kui kollektiivses
        kogemuses. Meie huvi on otsida performatiivsust sealt, kus ei olda
        harjutud seda leidma.  



        NUP18 programmi taustaks on muutuvad publikusuhted visuaalkunstide ja
        etenduskunstide kogemises. Etenduskunstidel on pakkuda kollektiivset ja
        selle võrra ühendavat kogemust ajateljega kunstiteostele, näituse-elamus
        saab aga anda väga individuaalset võimalust kunstiteosega suhestuda ja
        omas tempos näituse-rituaale tajuda. Meid on huvitanud just nende alade
        koostöö, kus mõlema valdkonna meetodid üksteist täiendavad, luues uusi
        võimalusi nii objektse kunsti mõtestamiseks kui ka uuteks koos-kogemise
        viisideks.   



        Saab küsida nii, et mida esemelisus esitab? Objekti performatiivsusest
        oleme otsinud seda, kuidas lavaline aeg muudab objekti vastuvõttu ning
        milles ruumi dramaturgia annab teose tajumisele ja mõtestamisele palju
        juurde. Seejuures ei ole objektne kunstiteos sageli ise lõpptulemus.
        Vastupidi, see saab olla platvormiks ja kohtumispaigaks kollektiivsele
        kogemusele, mis omakorda juhatabki muutunud publikusuheteni. Näiteks
        võib sel korral publik avastada end peaaegu ainsana teatrist või
        vaatlemas etendajat kui pilti või vaatamas üksteist ja iseennast viisil,
        kus teose piirjooned on haihtunud.   



        Kunstiteose tajurežiimide muutus muudab ka publiku rolli, tähendust ja
        eneseteadvustamist teose osana. Publik ei ole selles olukorras enam
        lihtsalt tunnistaja, vaid ka kaaslooja, sest enda kohalolu panus teose
        tekkes loob nii võimaluse kui ka vastutuse. Mitmes mõttes publik ise
        ongi aktsioon, kes küsib enda osa tervikus või ajalis-ruumilise formaadi
        ülesehituses. Objektsus seejuures on nii katalüsaator kui ka adressaat
        nendes taju- ja kogemuse suhetes, mis suunab otsima performatiivsust ka
        laiematelt elualadelt kui visuaalkunstide ja etenduskunstide ühisalad. 
         

        Henri Hütt, Mihkel Ilus  

        Oktoober 2018    
         



        Henri Hütt on (etendus)kunstnik, kes väärtustab loomingulisi
        hübriidvorme, kuhu kuuluvad tehnoloogilise dominandiga
        etenduskunstivormid, helietendused, lavastatud näituse kontseptsiooni
        arendamine ning koostööd erinevate valdkondade kunstnikega. On rühmituse
        MIMproject liige ning Baltikumi ja Skandinaavia kunstiülikoolide
        võrgustiku DAMA koordinaator.  



        Mihkel Ilus on (visuaal)kunstnik, kes tegutseb maali laiendatud väljal.
        Ta töötab sageli suuremõõtmeliste installatsioonidega, kus maaliga
        seonduv lähenemine on kesksel kohal. Olulise osa tema tegevusest
        moodustab formaadikriitika ning kaasaegse näitusekultuuri ja
        etenduskunsti põimimine. Viimasel ajal tegelenud objektse kunsti
        erinevuste uurimisega black-box- ja white-cube-tingimustes, millele on
        lisandunud otsing leida psühholoogilist laetust materjalidest.  <br
        />   
         <br />
        20.-28. oktoobril toimuv etenduskunstide biennaal NU Performance
        Festival ning 25. oktoobril algav muusikafestival Üle Heli ühendasid
        jõud, et tuua publikuni mitmekesine rahvusvaheline ja kohalik
        etenduskunste ning muusikat sisaldav programm. Tihe koostöö samaaegselt
        toimuvate festivalide vahel aitab luua senisest veelgi vaheldus- ja
        ideederikkama unikaalse terviku. Alates 6. juunist müüki tulnud piiratud
        kogus ühiseid festivalipasse võimaldavad külastada nii etendusi ja
        performance'id, kui ka kontserte ja klubiüritusi, mis toimuvad oktoobri
        eelviimasel nädalal.  

        NU Performance Festival 2018 keskmes on objektse kunsti ajaliin ning
        performatiivsed võimalused, mis mõtestavad ümber publiku individuaalset
        ja kollektiivset kogemust. 

        Kui teatril on objektsele kunstile pakkuda dramaturgilist ajaliini ning
        distsipliini, siis vastupidise vahetusena annab näitusesaalide kunst
        teatrile tõlgendusvabadust ja formaadi variatiivsust.

        Lavaline aeg muudab objekti vastuvõttu: objektse kunsti ajatelg, ruumi
        dramaturgia, selle kontekst ja kommunikatiivsus fokusseerivad publikut
        teadvustamata aladele ja aspektidele. 

        Publiku roll ja tähendus sellises vaatemängus on mitmes mõttes olla
        kunstiteose osa. Enda kohalolu panus teose tekkes loob nii võimaluse kui
        ka vastutuse.

        Vaatemäng moodustub objektsuse performatiivsusest. Objekt ise ongi
        vaatemäng.<br />    

        NU Performance Festival 2018 programmi huvi on tuua esile ootamatut,
        viia kõrvale harjumuspärasest ning luua pinnast performatiivsuse
        avaramale tajumisele.<br />

        <br />


        Käesoleval aastal toimuval festivalil Üle Heli on oodata kontserte,
        klubiõhtuid, heliinstallatsioone ning haridusliku eesmärgiga seminare ja
        vestlusringe. Samuti toimuvad festivali otsingulisele ja avastamisrõõmu
        taotlevale lähenemisele omaselt sündmused erinevates kohtades nii
        Tallinnas kui ka festivali lõpupäeval, 28. oktoobril toimuva eksootilise
        väljasõidu kaudu kaugemalgi.

        Heliüleste tasandite muusikafestival Üle Heli keskendub žanrimääratluste
        asemel muusika tähenduslikkusele ja seostele erinevate
        kunstivaldkondadega. Festivali huviorbiidis muusikalised nähtused, mis
        väljuvad etteantud raamidest ja suhestuvad ümbritsevaga vabalt ning
        loominguliselt, esitades küsimusi ja pakkudes erinevaid tõlgendamis-
        ning dialoogivõimalusi ka heliülestel tasanditel.<br />  

        <br />

