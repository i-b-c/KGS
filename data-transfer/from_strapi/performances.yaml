    description_et: >-
        **e¯lektron – uudishimust juhitud**   
          
        Festival toimub aadressil https://elektron.live/
          
        Loominguline platvorm e⁻lektron avab 3. aprillil oma esimese
        tegutsemishooaja Kõheda vastasmõju festivaliga. Nimepanemise hetkel oli
        tegemist vastastikmõjude ühendteooriast tõukuva sõnamänguga. Enam mitte.
        Vahepealse ajaga on inimlike vastasmõjude kõheduse astmed põhjalikult
        läbi käidud ja selles nimes ei ole enam midagi metafoorset. See kõhedus
        ongi nüüd see, mis toimub siin ja praegu.  
          
        Õigupoolest oleks festival pidanud ära jääma. Sest inimesed ei tohi
        üksteisele lähedale tulla. Füüsilise läheduse vältimine on praegu terve
        mõistuse ja teistest hoolimise küsimus. Aga festival siiski ei jää
        ära.   
          
        Algselt pidi see minifestival tähistama e⁻lektroni algust. Tahtsime
        vaatajani tuua erinevaid teoseid näidetena etenduskunstide
        transdistsiplinaarsest või muul moel intellektuaalselt väljakutsuvast
        lähenemisviisist, kuid tingituna eriolukorrast otsustasime me liikuda
        eemale sellest, mida näidata ja keskenduda hoopis sellele, kuidas
        näidata.   
          
        Teater on sotsiaalne, kollektiivne kunstivorm – teos “juhtub” kõigi
        osalejate koosmõjul ühes ruumis ühel ajahetkel. Meid huvitab, mis on
        teater ilma teatrita, teater ilma lava, sameti ja prožektorite; teater
        ilma naeru ja silmsidemeta. Kuidas teatri põhiomadusi virtuaalses
        esituskeskkonnas taasluua? Seni kuni teatriuksed tegijatele ja
        vaatajatele suletud on, püüame me luua omamoodi simulatsiooni, mis
        taasloob need puuduvad tegurid. Kas ja mil viisil kollektiivne
        kunstikogemus uuenenud oludes võimalikuks osutub selgub Kõheda
        vastasmõju festivalil.   
          
        Tehniliselt tähendab see küsimust, kas õnnestuks luua virtuaalne
        kohalolev publik ja kas esitaja tunneb, et midagi on tõesti nii, nagu
        siis, kui inimesed veel saali said koguneda. Me katsetame, kas on
        võimalik kokkusaamistunnet esitajale ja vaatajatele tagasi anda.  
          
        Festivalil esinevad kunstnikud tulid e⁻lektroni leiutamisplaaniga kaasa.
        Ka nemad leiutavad midagi uut, midagi, mida nende teatritööd varem ei
        sisaldanud. Me kõik liigume uue kogemuse leiutamise serval. Kunstnikud,
        e⁻lektron ja vaatajad. Piirjoon esitaja ja publiku vahel on kergelt
        ähmastunud, aga mitte nii, nagu seda oleks veel eile võinud ette
        kujutada.
    description_en: >-
        **e¯lektron – powered by curiosity**  
          
        The festival takes place at https://elektron.live/. 
          
        When we, a few months ago, named our festival a “spooky action at a
        distance” we didn’t know that it will become exactly that. We decided to
        follow the action by inventing a new two-way platform where artists and
        audience can be present in the same virtual space. Sooner or later each
        of us have to invent a bicycle – ours is under construction! Non-stop
        meetings and programmers’ bird language (which only machines seem to
        understand) is e⁻lektron’s “current state of emergency”.  
          
        Here we are, all our social, economic and political behaviours and
        structures changed because of some spooky actions of an invisible agent
        at a distance – a festival of sorts.

        Initially this mini-festival was supposed to mark the beginning of
        e⁻lektron. We wanted to show few works and half-works as an examples of
        transdisciplinary or otherwise intellectually challenging approaches in
        performing arts.   
          
        Now, in this new realm, we decided to move away from “what to show” and
        instead concentrate on “how to show”. Furthermore, to think about what
        is (left of) theater when stripped from its velvet curtains, stuffy air
        and dimmed lights; from the laughter and whispers. And moved to a
        virtual space. Therefore we decided to invite more artists; invite
        artists whose work could somehow be presented in this very limited space
        (real space – a room, a lamp, a chair; computer, portrait, voice).     
          
        We are aware that the whole Internet is blooming with streams. Culture
        in a can, so to say. But we hope that we can create something more
        familiar. A theater bubble, a festival bubble. A more intimate space
        than the World Wide Web proposes.   
          
        It’s an experiment. We don’t know but we are bound to find out.
        Curiosity is eˉlektron’s nuclear fuel. No more. No less.  
          
        We are very happy to invite You to join us from 3rd to 5th of April at
        elektron.live   

         

        Timeline will be available from 1st of April.
