        Aleksey Ivanov, Jevgeni Ivanov, Juri Ivanov, Pavel Lebedev, Aleksandr
        Leonov, Konstantin Malovanenko, Ilja Manžikov, Daniil Matjušin, Jegor
        Nefedov, Samuil Petrov, Arseni Porošin, Edgar Raudsepp, Daniil Sadovin,
        Arseni Shkuro, Anton Sjomkin, Savva Smirnov, Maksim Šabanov, Milan
        Zaozerski, Albert Ude, Ilja Vaninov, Kirill Vasiliev, Artur Vishnyakov,
