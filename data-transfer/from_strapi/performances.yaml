    description_et: >-
        Valmiv töö on esimene osa Radouan Mriziga uuest etenduste,
        installatsioonide ja uurimustöö seeriast, mis fokusseerub Amazigh
        kultuurile ja ajaloole. Selle soolo puhul tegeleb ta naise kujundi ja
        mütoloogiaga Amazigh kultuuris, milles naised olid ja jätkuvalt on nii
        kunsti, käsitöö, keele, rituaalide kui muude Amazigh tsivilisatsiooni
        sotsiaalsete teadmiste edasikandjad ja kaitsjad. Naiste mütoloogia kui
        vastupanu sümbol, ühtlasi ajalooliselt ka vahend jagamaks teadmisi ja
        uskumusi teiste Vahemere tsivilisatsioonidega.  
          
        Radouan Mriziga (1985) on koreograaf Marrakech’ist, kes hetkel elab ja
        töötab Brüsselis. Peale tantsuõpinguid Marokos, Tuneesias ja
        Prantsusmaal lõpetas ta P.A.R.T.S.’i Brüsselis. Küllaltki kiiresti asus
        ta tegelema oma loominguga ning lavastuste tuuritamisega üle kogu
        maailma. Mriziga on pikaajaline resident Moussem Nomadic Arts Centre’s
        ja perioodil 2017-2021 ka Kaaitheater’is Brüsselis.   
          
        MORE THAN THIS on koostööprojekt, mis seob omavahel 6 festivali ja
        kultuuriorganisatsiooni ning 5 koostööpartnerit ja 6 kaasatud kunstnikku
        Euroopast ja väljastpoolt. MORE THAN THIS on projekt, mis toob esile
        kaasaegsed etenduskunstid kui vahendi, mille abil on võimalik ümber
        mõtestada komplekssuse väärtust ning vaidlustada üksikute narratiivide
        ja fikseeritud identiteetide kristalliseerumist. Etenduskunstid kui
        sellised on perfektne mõtteruum, milles tegeleda külalislahkuse
        mõistega.  
          
        https://morethanthis.eu  
          
        Residentuur Tallinnas saab teoks projekti MORE THAN THIS raames EL Loov
        Euroopa kultuuriprogrammi ja Eesti Kultuuriministeeriumi toetusel.
    description_en: >-
        This creation is the first part of a new series of performances,
        installations and research by Radouan Mriziga, focused on Amazigh
        culture and history. In this solo performance he will work on female
        figures and mythologies in the Amazigh culture, where women were and
        still are the ones in charge of transmitting and protecting the arts,
        the crafts, the language, the rituals and the social knowledge of the
        Amazigh civilisation. Female mythologies as a symbol of resistance, but
        historically also tools for sharing references, knowledge and believes
        with other civilisations around the Mediterranean Sea.   
          
        Radouan Mriziga (1985) is a choreographer and dancer from Marrakech,
        currently living and working in Brussels. After studying dance in
        Morocco, Tunisia and France, Radouan Mriziga graduated from P.A.R.T.S.
        in Brussels. Fairly quickly he began to focus on his own work and
        touring his creations worldwide. Mriziga is long-time
        artist-in-residence at Moussem Nomadic Arts Centre, and between
        2017-2021 at Kaaitheater (Brussels).   
          
        MORE THAN THIS is a cooperation project among 6 festivals and cultural
        organisations with the collaboration of 5 associated partners and
        engaged 6 artists.  

        MORE THAN THIS is a project that focuses on the contemporary performance
        as a fundamental tool to rethink the value of complexity, as a tool to
        challenge the crystallisation of single narratives and fixed identities,
        and a perfect specific space to work on displacement and hospitality.   
          
        https://morethanthis.eu  
          
        Residency in Tallinn takes place within the MORE THAN THIS project that
        is supported by EU Creative Europe program and the Ministry of Culture
        of Estonia.
