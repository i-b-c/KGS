    description_et: >-
        Mida tähendab tegutsemine? Algselt pidi “Le Grand Sommeil” sisaldama
        duetti, mille loojateks oleksid väike tüdruk (Jeanne) ja naine (Helena).
        Kahjuks osutusid meditsiiniline ja legaalne menetlus, selleks et
        Jeanne'il oleks olnud võimalik lapsena lavastuse osaleda, liiga
        keerukaks ja peale kuus kuud kestnud proove muutus tema osalus
        küsitavaks. Lõppkokkuvõttes aga sai “Le Grand Sommeil” tema puudumisest
        jõudu juurde.  

        Lavastus, mis oli muutunud sooloks, ühendab kaks inimest üheks kujuks:
        “lapseks, kes on suur”. Toetudes mälestusele oma endisest partnerist,
        õnnestub tantsijal ja näitlejal, Helena de Laurens'il, hägustada
        traditsioonilist lapsepõlve kujutamisviisi.  

        Lavastus kasutab täiskasvanu keha selleks, et jutustada lapse lugu
        suhetest pere, valitsuse ja kunstiga, seades kahtluse alla kehtivaid
        norme. Ühtlasi esitab see küsimuse, millist rolli saab enese loomise
        juures mängida kunst ja looming.  
          
          

        Marion Siéfert on kirjanik, lavastaja ja etendaja. Tema looming
        rakendab mitmete kunstiliste ja teoreetiliste valdkondade vahendeid ning
        teostub erinevate meediumite kaudu: lavastused, filmid, kirjutised.
        Aastatel 2015-2016 viibis ta oma doktoriõppe raames vahetusüliõpilasena
        Giessen'i Rakenduslike Teatriuuringute Instituudis Saksamaal. Seal lõi
        ta oma esimese lavastuse “2 ou 3 choses que je sais de vous”, mida
        muuhulgas esitati sellistes kohtades nagu TJCC, Festival Parallèle,
        Festival Wet°, TU-Nantes, Gaîté Lyrique. Seejärel tegi ta koostööd
        režissöör Matthieu Bareyre'iga kahe loomingulise dokumentaalfilmi –
        “Nocturnes” ja “L’époque” – teostamisel, töötades samal ajal mitmete
        kompaniide juures või lavastaja assistendina (näiteks L’Accord Sensible,
        Séverine Chavrier, Joris Lacoste ja saksa grupeering Rimini Protokoll).
        Marion Siéfert esines Monika Gintersdorfer ja Frank Edmond Yao
        lavastuses “Les Nouveaux aristocrates”, mis esietendus 2017. aastal
        Viini festivalil. 

        Alates 2017. aasta septembrist on ta residentkunstnik La Commune'is, kus
        valmis koostöös koreograafi ja etendaja Helena de Laurens'iga teos Le
        Grand Sommeil. Lavastus esietendus Pariisi Sügisfestivali 2018 raames
        ning viibib 2019-2020 tuuril Prantsusmaal ja Euroopas. Tema viimane teos
        “Pièce d’actualité n°12 : DU SALE !” on räppari ja tantsija duett, mis
        esietendus 2018. aasta märtsis La Commune'is. Seejärel esitati seda
        Nanterre-Amandiers' teatris ja see tuuritab 2019-2020 mööda
        Prantsusmaad.

          
        Helena de Laurens on kunstnik, kes võib etendustes olla nii tantsija kui
        näitleja. Varasemalt on ta koostööd teinud selliste visuaalkunstnikega
        nagu Sophie Bonnet-Pourpet, Antonio Contador, Julie Béna ja Benoît
        Ménard. Hetkel töötab ta etendajana muusiku-helilooja Julien Perez'i ja
        lavastaja Alexis Langlois' töödes. Samuti on ta osalenud François
        Chaignaud' ja Cecilia Bengolea, Dominique Brun'i, Loïc Touzé' ja
        Mathieu Bouvier' juhendatud õpitubades, samuti õpitubades P.A.R.T.S.-is
        ning Cecilia Gracio Moura barokktantsu õpitubades. Alates 2010. aastast
        on Helena de Laurens sageli teinud koostööd Esmé Planchon'iga, kellega
        ta kohtus oma teatriõpingute ajal Pariisi 7. linnajao konservatooriumis.
        Üheskoos esitavad nad loeng-performance'eid, mis kombineerivad erinevaid
        kunstilisi vorme: jutuvestmist, etlemist ja muusikalisi etteasteid.
        Helena de Laurens koos Esmé Planchon'i ja Clara Pacotte'iga moodustavad
        grupeeringu Travlators. Nad loovad kolmekesi performance'eid,
        muusikalisi etteasteid, fänniajakirjandust ja muid kultuurilisi ja
        peoüritusi. 2015. aastal kirjutas ta Elizabeth Claire'i juhendamisel
        EHESS'is magistritöö teemal Valeska Gert’i näokasutus tantsus (“La
        grimace et l’inouï : danse et visage chez Valeska Gert (1892 - 1978)”).
        Seejärel võttis ta somaatilise liikumise kursuseid BMC alal.  
          
        Jeanne sündis 2005. aastal Lyoni'is. Ta on esitanud klassikalist tansu
        alates neljandast eluaastast ja neli aastat tagasi alustas teatriga ühes
        laste ja teismeliste kompaniis. “Le Grand Sommeil” on tema esimene
        projekt professionaalse näitlejana.  
          
        Marine Brosse õppis lavakujundust Pariisis ja Lyonis (ENSATT) ning 
        Giessen'i Rakenduslike Teatriuuringute Instituudis Saksamaal. Ta töötab
        erinevate teatri- ja muude projektide ja on tihedamalt seotud
        prantsuse-kreeka kollektiiviga The Extravagant Union. Hiljuti tegi ta
        kaasa Rimini Protokolli töös “Nachlass - pièces sans personnes”.   
          
        Juliette Romens õppis valguskujundust ENSATT'is, kus ta kohtas selliseid
        erialaspetsialiste nagu Annie Leuridant, Marie-Christine Soma ja Mathias
        Roche. ENSATTis juhendas teda Jean-Pierre Vincent ja lõputööna lõi ta
        valguskujunduse koostöös Alain Françon'iga Botho Strauss'i lavastusele
        “La Trilogie du revoir”. Lõpetamise järel on Juliette Romens töötanud
        muuhulgas koos Jean-Paul Wenzel'i, Mylène Benoit', Sylvie
        Mongin-Algan'i, Anne Courel'i, Karim Bel Kacem'i, Vincent Gomez'iga.
        Samuti on ta kaastööd teinud Ziferte Production'ile alates tema loodud
        valguskujundusest koostöös Marie-Sol Kim'ga lavastusele “Le Grand
        Sommeil”.  
          
        Johannes van Bebber õppis muusikat Düsseldorfis. Seejärel liitus ta
        Geisseni Rakenduslike Teatriuuringute Instituudiga, kus ta ühtlasi annab
        ka loenguid. Helilooja ja esitajana on ta loonud muusikat ja
        helikujundust erinevatele teatrilavastustele ja filmidele. Viimati tegi
        ta koostööd grupeeringuga K.A.U. (“transit monumental”) ning Benno
        Heisel'i ja Ullrich Eisenhöfer'iga (“Cassid”y). Mõlema teose
        produtsendiks on Müncheni SPIELART festival. Johannes van Bebber on
        samuti esinenud muusikuna mitmetes etendustes, mida on esitatud HAU's
        Berliinis, Mousonturm'is Frankfurtis ja Frankfurt LAB'is Bernis, Ateenas
        ja Varssavis. Lisaks mängib ta erinevates bändides, nagu näiteks Musica
        Practica ja Club Bleu.  
          
        Valentine Solé on kostüümikunstnik. Ta alustas õpinguid Caroline Barral
        juhendatud õpitoas ja jätkas neid École de la Chambre Syndicale de la
        Couture Parisienne'is. Õpingute järel tegi ta koostööd mitmete
        koreograafide, lavastajate ja produtsentidega, nagu näiteks Ola
        Maciejewska, Kevin Jean, Ali Moini, Marion Siéfert, Marion Camy-Palou,
        Hélèna Villovitch, Angèle Chiodo'ga... Valentine Solé on samuti
        teinud loomingulist koostööd teatrikompaniiga L’Accord Sensible (“Les
        éclaboussures”, “D-Day”, “Champs d’Appel” ja “Massif Central”).
    description_en: >-
        What does it mean to act? Le Grand Sommeil was initially supposed to
        involve a duo composed by a very young girl (Jeanne) and a woman
        (Helena). Unfortunately the medical and legal procedure required to
        allow Jeanne to act in the show as a child was too heavy and after six
        months of rehearsal, her participation was compromised. Eventually, Le
        Grand Sommeil drew strength from this absence.  

        The show, which became a solo-performance, joins together two beings
        into one single figure : « a kid that’s big ». By calling upon the
        memory of her former partner, the dancer

        and actress Helena de Laurens manages to blur the traditional
        representations of

        chilhood.  

        The show uses the adult body to tell the child’s story and its
        relationship with family, government and art; questionning our norms. At
        the same time, it asks what role art and creation can play in
        self-construction.  
          
          
        Marion Siéfert is a writer, a director and a performer. Her work uses
        several artistic and theorical fields and comes to life through a
        variety of medium : shows, movies, writings. In 2015-2016, as a part of
        her PhD program, she is a guest student at the Institute for Applied
        Theatre Studies of Gießen, Germany. There, she creates her first show,
        "2 ou 3 choses que je sais de vous", which will then be presented in
        multiple venues such as TJCC, Festival Parallèle, Festival Wet°,
        TU-Nantes, Gaîté Lyrique, among others. She then collaborates with the
        director Matthieu Bareyre on two creative documentaries, "Nocturnes" and
        "L’époque", while working with several companies as a performer, a
        writer or an assistant director (with for example L’Accord Sensible,
        Séverine Chavrier, Joris Lacoste, and the German label Rimini
        Protokoll). Marion Siéfert performed in "Les Nouveaux aristocrates" by
        Monika Gintersdorfer and Frank Edmond Yao, a show that premiered during
        the 2017 Vienna Festival. Since September 2017, she is an Associate
        Artist at La Commune, where she created "Le Grand Sommeil", with the
        choreographer and performer Helena de Laurens. The show was scheduled
        during the 2018 Paris Autumn Festival and is touring around France and
        Europe in 2019 and 2020. Her new creation "Pièce d’actualité n°12 : DU
        SALE !" is a duo for a rapper and a dancer, and was created in March
        2018 at La Commune. It then performed in Nanterre-Amandiers theater and
        will be touring in France in 2019 and 2020.  
          
        Helena de Laurens is an artist who imagines performances both as a
        dancer and an actress. In the past, she collaborated with plastic
        artists such as Sophie Bonnet-Pourpet, Antonio Contador, Julie Béna and
        Benoît Ménard. She works today as a performer for the musician and
        composer Julien Perez and the director Alexis Langlois. She also
        participated in workshops led by François Chaignaud and Cecilia
        Bengolea, Dominique Brun, Loïc Touzé and Mathieu Bouvier, in P.A.R.T.S.
        and with Cecilia Gracio Moura for Baroque dance. Since 2010, Helena de
        Laurens has often been working with Esmé Planchon, a fellow student she
        met in her drama class at the Conservatoire of the 7th arrondissement of
        Paris. Together, they present lecture-performances that combine
        different artistic forms : tales, recitals and musicals. Along with Esmé
        Planchon and Clara Pacotte, Helena de Laurens is a member of the
        collective Travlators. She creates trio performances, musicals, fanzines
        and numerous other cultural and festive events. In 2015, under the
        supervision of Elizabeth Claire at the EHESS, she wrote a Master’s
        thesis on Valeska Gert’s use of faces in danse ("La grimace et l’inouï :

        danse et visage chez Valeska Gert (1892 - 1978)"). She then took Somatic
        Education classes with the Body-Mind Centering movement.
          
        Jeanne was born in Lyon in 2005. She performs ballet since the age of
        four and begins drama four years ago in a company for children and
        teenagers. "Le Grand Sommeil" is her

        first project as a professional actor.   
          
        Marine Brosse studied stage design in Paris and Lyon (ENSATT), before
        joining the Institute for Applied Theatre Studies of Gießen, Germany.
        While involved in various projects for theaters and others events, she
        often collaborates with the Franco-Greek

        collective The Extravagant Union and recently worked for the label
        Rimini Protokoll on "Nachlass – pièces sans personnes", created at the
        Théâtre Vidy-Lausanne.  
          
        Juliette Romens studied Lighting Design in ENSATT where she met lighting
        specialists such as Annie Leuridant, Marie-Christine Soma or Mathias
        Roche. At ENSATT, she worked with Jean-Pierre Vincent and produced her
        final year creation with Alain Françon on La Trilogie du revoir by Botho
        Strauss. Since graduating, Juliette Romens has worked with Jean-Paul
        Wenzel, Mylène Benoit, Sylvie Mongin-Algan, Anne Courel, Karim Bel
        Kacem, Vincent Gomez among others.  

        She is also collaborating with Ziferte Production since her work as a
        lighting designer on "Le Grand Sommeil" with Marie-Sol Kim.  
          
        Johannes van Bebber studied music in Düsseldorf. He then joined the
        Institute for Applied Theatre Studies of Gießen, Germany, where he is
        also a lecturer. As a composer and a performer, he composed the music
        and the sound design of different plays and movies.

        Recently, he worked with K.A.U. on “transit monumental”, as well as with
        Benno Heisel and Ullrich Eisenhöfer on Cassidy. Both have been produced
        by the SPIELART festival of Munich. Johannes van Bebber also played in
        several performances at the HAU in Berlin, at the Mousonturm in Frankurt
        and at the Frankfurt LAB in Bern, Athens et Warsaw. In addition, he
        plays music in different bands like Musica Practica and Club Bleu.  
          
        Valentine Solé is a costume designer. She began her learning experience
        in the workshop of Caroline Barral and pursued at the École de la
        Chambre Syndicale de la Couture Parisienne. After her studies, she
        worked with several choreographers, directors and producers, such as Ola
        Maciejewska, Kevin Jean, Ali Moini, Marion Siéfert, Marion Camy-Palou,
        Hélèna Villovitch, Angèle Chiodo... Valentine Solé also worked as an
        artistic collaborator on different creations of the theatrical company
        L’Accord Sensible: "Les éclaboussures", "D-Day", "Champs d’Appel" and
        "Massif  Central".
