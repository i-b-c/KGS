    description_et: >-
        Jakob Lange on BIG arhitektuurbüroo partner ja arhitekt alates 2003.
        aastast. Projektijuhina on ta kogunud tuntust ja võitnud mitmeid
        rahvusvahelisi võistlusi, mille hulgas on BIG arhitektuuribüroo suurimad
        projektid. Jakob juhtis arhitektina korterhoone The Mountain ehitust
        Kopenhaagenis, mis valmis aastal 2008 ning samuti Tallinna uue
        Linnavalitsuse hoone projekti, mis pälvis MIPIM Future Awardi aastal
        2011. Hetkel on tal käsil 20 000 m2 loodussäästlik kortermaja
        Stockholmis. Jakob on uudistehnoloogiaga tegeleva osakonna BIG IDEAS üks
        juhtidest, mis teostab uurimustöid informatsiooni ja uudisdisaini
        vallas. Tema tegevusala hulka kuuluvad mh rohelise aknaaia projekt,
        kohandatav mööbel, innovatiivsed ehitussüsteemid jne - tema fookus
        ulatub pisikestest detailidest suure (BIG) pildini. <br />

        [www.big.dk](http://www.big.dk/)<br />

        <br />

        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile. Loengud on inglise keeles ja tasuta.
    description_en: >-
        Jakob Lange is a partner at BIG and has collaborated with Bjarke Ingels
        since 2003. As a project leader for several award-winning projects,
        Jakob has been instrumental to many of BIG’s largest commissions. He led
        the design and development of The Mountain mixed-use residences in
        Copenhagen, completed in 2008, and served as the Project Leader for the
        new Tallinn Town Hall in Estonia, which received a MIPIM Future Award
        2011. He is currently Partner in Charge of Stettin 7, a 20.000 m2
        sustainable luxury residential building in Stockholm, Sweden. Jakob also
        heads BIG IDEAS, BIG’s technology driven special projects division.
        Through analysis and simulation, BIG IDEAS informs BIG’s design
        decisions with research-based information - Information Driven Design.
        Special projects, including a green window farm, customized furniture,
        and innovative building systems support the studio’s work from small
        details to the BIG picture.<br />

        [www.big.dk](http://www.big.dk/)<br />
         <br />
        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment. The lectures are
        held in English, free of charge.
