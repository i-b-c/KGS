    description_et: >-
        Louise Dam Eckardt Jensen on pärit Taanist ning oma muusikukarjääri
        jooksul on ta olnud aktiivselt tegev Amsterdami, Berliini ja New Yorgi
        impromuusika skeenel. Tema duo Easy Credit koos Tom Blancartega on
        Improtestil juba üles astunud ja mõlemad muusikud on oma ausa ja
        kompromissitu hoiakuga meie impromuusikute südamed võitnud.  

        Louise on väga palju tuuritanud mööda Euroopa ja USA klubisid ja
        festivale. Tema koostööpartnerite rida on pikk: Michael Evans, Gino
        Robair, Weasel Walter, Tim Dahl, Tony Buck, Peter Evans, Ingebrigt
        Haker-Flaten, Petras Vysniauskas jpt.  


        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.  

        [www.improtest.ee ](http://www.improtest.ee /)<br />
    description_en: >-
        Danish-American Louise Dam Eckardt Jensen (b.1980), a native of
        Toftlund, Sønderjylland in Denmark, has led an uncompromising career
        that has taken her abroad to Amsterdam, Berlin and New York. She
        continues her relentless quest for brutal honesty and innovative
        artistic vision around the world, as well as in her native
        Sønderjylland. Utilizing her voice, flute and sometimes electronics in
        addition to her primary instrument, the saxophone, she is best known for
        her duo The Home of Easy Credit with her husband Tom Blancarte, her post
        no-wave improv quartet Sweet Banditry, her introspective solo
        performances, her improvising saxophone quartet as well as regular work
        with musicians such as Mike Pride, Erica Dicker, Tim Dahl, Tamio
        Shiraishi, Matt Nelson, Brandon Seabrook, Michael Evans and Weasel
        Walter. Recently, she started a record label, Marsken Records, whose
        purpose is to focus on avant garde music from Sønderjylland. She has
        traveled extensively throughout the United States and Europe, performing
        at a wide range of festivals and venues. She has performed or recorded
        with musicians such as Craig Taborn, Tamio Shiraishi, Magda Mayas, Tony
        Buck, Gino Robair, Petras Vysniauskas, Kevin Shea, Sam Pluta, Nate
        Wooley, Jessica Pavone, Peter Evans, Dan Peck, Ingebrigt Håker-Flaten
        and Sandy Ewen.  


        Improtest is concert series that brings improvisational music from local
        and foreign authors to local audience. The concerts have been taking
        place since 2005 once a month.  

        [www.improtest.ee ](http://www.improtest.ee /)<br />
