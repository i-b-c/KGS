    description_et: "<h1 style=\"font-size:16px;font-weight:bold;margin:10px 0px;padding:0;\">\n\tSel aastal tähistab festival 10. juubelit!</h1>\n<br />\nSeda pidulikku sündmust kutsume me kõiki teatrihuvilisi, lisaks tavapärastele teatrisaalidele, tähistama Tallinna kõrgeimasse paika – Toompeale, kus võib üle mitme aasta taaskord trehvata maailmatasemel tänavaprogrammi. Programmi avalikustame ja piletid paneme müüki 7. märtsil.<br />\n<br />\nTreff Festival kannab kvaliteedimärki EFFE Label 2015-2016.&nbsp; Hoia end kursis festivali<a href=\"https://www.facebook.com/tallinntreff\"> Facebooki lehel.</a><br />\n<br />\nTreff on rahvusvaheline visuaalteatrifestival, mille lähtepunktideks on nüüdisaegse nukukunsti tutvustamine ja populariseerimine, nukuteatri traditsioonide hoidmine ja edasikandmine ning üllatamine teatrivormidega, mille olemasolust me eile veel ei teadnud.<br />\n<br />\nFestivali tegevjuht: Annika Land-Reisser, tel 6679 531, annika@nuku.ee"
