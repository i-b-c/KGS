    description_et: >-
        NB! "Gardens Speak" on interaktiivne helisinstallatsioon kuni kümnele
        osalejale, mis toimub MIMStuudios (Kaari pst 9):  

        19+20+21+23.08 ajavahemikul 16:00-20:00, sissepääs 10 inimesele iga 60
        min järel (viimane sissepääs kell 20:00).<br />

        Piletilevist ostes saate valida endale sobiva kellaaja.<br />  


        “Isegi surnud pole väljaspool ohtu vaenlase eest, kui ta võidab.” –
        Walter Benjamin  


        Üle terve Süüria on aedu, kus varjatakse protestijate ja aktivistide
        surnukehi, mis ülestõusu algusaegadel kaunistasid tänavaid. Need kodused
        matmised on ühendav lüli elavate ja surnute vahel. Surnud kaitsevad
        elavaid neid režiimile mitte välja andes ja elavad kaitsevad surnuid
        säilitades nende identiteete, rääkides edasi nende lugusid ja mitte
        lastes nende surmadel muutuda režiimi instrumentideks.  


        ”Gardens Speak” on interaktiivne heli installatsioon, mis koosneb Süüria
        aedadesse maetud kümne tavalise inimese suulisest ajaloost. Iga inimese
        lugu on hoolsalt kogutud kadunu perekonnaliikmetelt ja sõpradelt, et
        nende saatust saaks jagada nii nagu nad seda ise oleksid teinud.
        Jutustused on vaheldumisi helifailidega, mis koosnevad lahkunute
        viimaste tundide salvestustest.  


        Tania El Khoury on live-kunstnik, kes töötab Londonis ja Beirutis. Ta
        loob erinevaid interaktiivseid installatsioone ja etendusi, kus vaataja
        on aktiivne kaasalööja. Tema töid on näidatud viiel kontingendil
        erinevates paikades alustades muuseumitega ning lõpetades tõstukitega.
        Teda on pärjatud Total Theatre Innovation ja Arches Brick auhindadega.
        Tania on Dictaphone Grupi kaasasutaja, tegemist on Beirutis tegutseva
        linnakeskse kohaspetsiifilise uurimisgrupiga.  


        [taniaelkhoury.com/](http://taniaelkhoury.com/)
    description_en: >-
        NB! "Gardens Speak" is an interactive sound installation for up to ten
        participants at a time that takes place at MIMstudio ((Kaari pst 9):  

        19+20+21+23.08 between 16:00-20:00, entrance for 10 persons every 60 min
        (last admittance at 20:00).<br />

        You can choose a suitable time when buying from Piletilevi.<br />  


        “even the dead will not be safe from the enemy if he wins.” –Walter
        Benjamin  


        Across Syria, many gardens conceal the dead bodies of activists and
        protesters who adorned the streets during the early periods of the
        uprising. These domestic burials play out a continuing collaboration
        between the living and the dead. The dead protect the living by not
        exposing them to further danger at the hands of the regime. The living
        protect the dead by conserving their identities, telling their stories,
        and not allowing their deaths to become instruments to the regime.  

        Gardens Speak is an interactive sound installation containing the oral
        histories of ten ordinary people who were buried in Syrian gardens. Each
        narrative has been carefully constructed with the friends and family
        members of the deceased to retell their stories as they themselves may
        have recounted it. They are compiled with found audio that evidences
        their final moments.  


        Tania El Khoury is a live artist working in London and Beirut. She
        creates interactive installations and performances in which the audience
        is an active collaborator. Tania’s work has been shown in five
        continents in spaces ranging from museums to cable cars. She is the
        recipient of the Total Theatre Innovation Award and the Arches Brick
        Award. Tania is co-founder of Dictaphone Group, an urban research and
        site-specific performance collective in Beirut.  


        [taniaelkhoury.com/](http://taniaelkhoury.com/)
