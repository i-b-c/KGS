    description_et: >-
        Kristin Kuldkepp on Eesti kontrabassimängija ja elektronmuusik.
        Keskendudes põhiliselt vabaimprovisatsioonile, nüüdismuusikale ning
        interdistsiplinaarse teoste loomisele ning esitamisele, on ta tegev nii
        soolo- kui ansambliesinejana erinevates koosseisudes. Ta tegeleb
        interaktiivsete süsteemide loomisega vabaimprovisatsioonile,
        live-elektroonikale, videole ning liikumisele, mille aktiviseerimiseks
        kasutab liikumissensorites saadud ning töödeldud informatsiooni. Hetkel
        õpib ta Hamburgi Muusika- ja Teatriülikoolis multimeediakompositsiooni
        ning elektroonilist muusikat.  
          
        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.
    description_en: >-
        Kristin Kuldkepp is a free improviser on double bass and
        live-electronics. She received her MA in international master degree
        programme Contemporary Performance and Composition, which gave her
        opportunity to study and develop her ideas in various countries, such as
        Estonia, Sweden, France and Germany. Currently located in Hamburg, she
        studies multimedia composition and electronic music. She is engaged in
        the work with movement sensors, human movement studies and research of
        instrumental gestures in free improvisation. The research has led to
        free improvisational solo set-up pieces for double bass, multichannel
        live-electronics and video but also to collaborations with other art
        disciplines.   
          
        Improtest is a concert series that brings improvisational music from
        local and foreign authors to local audience. The concerts have been
        taking place since 2005 once a month.
