        Craigslist Allstars<br />

        <br />

        “LOE MINU KUULUTUST!Olen 24-aastane tüdruk, kes teeb
        dokumentaalfilmi.Otsin võõraid.Soovin sinuga sinu pool kohtuda ja
        filmida meie tutvumist.Lööme käed ja paneme kaamera lauale, kasutamiseks
        meile mõlemale.Kirjuta mulle, kui soovid kohtuda :)“<br />

        <br />

        “Viimastel aastatel on Samira Elagoz kogunud isiklikke kogemusi ja
        intiimseid kokkupuuteid võõrastega. Ta korraldas rahvusvaheliselt
        aktiivse internetivõrgustiku Craigslist kaudu silmast-silma kohtumisi
        mitmete erinevate meestega. Korraldus on lihtne – tal on kaasas kaamera,
        millega ta vastastikust tutvumist filmib.&nbsp;<br />

        <br />

        Režissöör:<strong> Samira Elagoz</strong><br />

        Nõuanded: <strong>Jeanette Groenendaal, Bruno Listopad</strong><br />

        Heli: <strong>David Krooshof</strong><br />

        Toetajad: Soome Kultuurirahastu, Blooom Award ja SNDO<br />

        Kestus: 65’<br />

        <br />

        Samira Elagoze lavastus “Cock, Cock.. Who’s There” on festivali kavas
        31. oktoobril.<br />

        <br />

        <br />

        <br />

        <span id="cke_bm_137S" style="display: none;">&nbsp;</span><strong>MARIA
        METSALU</strong><span id="cke_bm_137E" style="display:
        none;">&nbsp;</span><br />

        Fuchsia<br />

        <br />

        NU Performance Festivali raames toimuv etendus on pärast kolmeosalist
        uurimisperioodi projekti „Fuchsia“ esimene esietenduse-eelne proovisõit.
        Projekt käivitus algselt Eestis 2015. aasta septembris, arenes edasi
        etenduseks Amsterdamis 2016. aasta aprillis ja transformeerus siis
        veebigalerii-näituseks.<br />

        <br />

        Projekti eesmärk on uurida, kuidas autopoeesi hädavajalikkus, mida
        tingib internet, on mõjutanud Metsalu elu ja kunstiloomet ning millised
        on enese subjektifitseerimise tingimused ja võimalused, mis esinevad
        iseenda kuvandi kujundamisel ning vahendamisel sotsiaalvõrgustike kaudu.
        Kogu uuringutriloogia käigus taotles Metsalu näitamise ja loomise
        viiside uurimist, võtteks tegelasena lähtepunktiks võlts-kunstigalerii.
        Selles raamis jätkab ta teemade arendamist, mis käsitlevad tema kogemusi
        arvutitüdrukuna, suhteid IRLi ja URLi vahel, tema virtuaalmaaniat,
        üliteadlikkust ning mõju, mida sotsiaalmeedia ja tema internetis elatav
        elu avaldavad tema persoonile, s h sellisest enese eksponeerimisest
        tekkinud tohutut üksildust. Vaataja pilgu peegelduses näib Metsalu keha
        taotlevat iseenda lagunemist ja uuesti kokkusobitumist, kuna Metsalu
        panustab juhusest sõltuvatele intensiivsustele, võnkudes naudingu,
        ükskõiksuse ning kannatuste vahel. Sellise väljundini on viinud jonnakas
        soov haarata enda kätte oma subjektiivsuse ja kehakuvandi kujundamine
        läbi moe, kaasaegse disaini ning visuaalkultuuri seisukohtade, olles
        samal ajal huvitatud oma keha fabritseerimisest väreleval maastikul kui
        karakteri ning brändina. Metsalu seab kogu „Fuksia“ projekti käigus
        kahtluse alla oma tööelu meelevaldsuse läbi enese esitluse aktide, mis
        on kui vaatemängu objekt ning mida ta samal ajal nii tervitab kui ka
        lükkab tagasi. Ta on huvitatud peaaegu kõikehõlmava struktuuri
        loomisest, mis suudaks tulla toime nii kaose kui ka selle
        tagasilükkamisega korrastava sümmeetrilisuse ja ikonograafiliste
        kujundite kaudu.<br />

        <br />

        <span id="cke_bm_133S" style="display: none;">&nbsp;</span><strong>Maria
        Metsalu</strong><span id="cke_bm_133E" style="display:
        none;">&nbsp;</span> (1990) on Eesti koreograaf ja etenduskunstnik, kes
        lõpetas 2016. aasta õpingud SNDOs (School for New Dance Development).<br
        />

        Ta loob peamiselt sooloteoseid, mis on kantud püsivast huvist iseenda
        persooni tekitamise, enese mütologiseerimise ja mina-loome vastu. Tema
        uurimisprotsessi olulisteks tahkudeks on füüsilise ja virtuaalse
        tegelikkuse kõrvutamine, nende kokkuviimine ja erinevuste mõistmine
        koostoime, sotsiaalse vahetuse ja teisenemise seisukohast. Eesmärk on
        kujutada visuaalkultuuri, identiteedi, apropriatsiooni, kaugkohalolu ja
        vuajerismi vahelisi suhteid, rakendades enesele viitavaid suhteid
        kehastavate tehnoloogiatega. 2014. aastal sai Metsalu ImpulsTanzis
        Viinis danceWEBi stipendiumi. Teiste seas on Maria Metsalu teinud
        koostööd Nils Amadeus Lange, Tino Sehgali, Vincent Riebeeki, Manuel
        Scheiwilleri, Fernando Belfiore ja Samira Elagoziga ning andnud nende
        jaoks etendusi.<br />

        <a href="http://instagram.com/dotasita">instagram.com/dotasita </a><br
        />

        <a href="http://mariametsalu.tumblr.com/
        maria.metsalu.com">maria.metsalu.com </a><br />

        <br />

