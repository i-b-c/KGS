    description_en: >
        <!-- Toimetatud 30.09.16 --><span id="cke_bm_133S" style="display:
        none;">&nbsp;</span><span id="cke_bm_135S" style="display:
        none;">&nbsp;</span><span id="cke_bm_136S" style="display:
        none;">&nbsp;</span><br />

        <strong>Double-bill</strong><br />

        <br />

        <strong>SAMIRA ELAGOZ</strong><span id="cke_bm_136E" style="display:
        none;">&nbsp;</span><span id="cke_bm_135E" style="display:
        none;">&nbsp;</span><span id="cke_bm_133E" style="display:
        none;">&nbsp;</span><br />

        Craigslist Allstars<br />

        <br />

        “READ ME!" I’m a 24 year-old girl making a documentary film. I’m looking
        for strangers. I meet you at your place and film how we get to know each
        other. We shakehands and the camera is on the table for both of us to
        use. Msg me if you want to meet :) ”For the past years Samira Elagoz has
        been collecting personal experiences and intimate encounters with
        strangers. Through Craigslist, an internationally active internet
        network, she arranged one-on-one meetings with a wide variety of men and
        observed how they react to her. The set up is simple - she brings a
        camera, and films how they get to know each other.&nbsp;<br />

        <br />

        A film by: <strong>Samira Elagoz</strong><br />

        Advice: <strong>Jeanette Groenendaal, Bruno Listopad </strong><br />

        Sound: <strong>David Krooshof</strong><br />

        With the support of: The Finnish Cultural Foundation, Blooom Award and
        SNDO<br />

        Duration: 65<br />

        <br />

        Samira Elagoz’ performance “Cock, Cock.. Who’s There?” is in the
        festival program on October 31.<br />

        <br />

        <strong>MARIA METSALU</strong><br />

        Fuchsia<br />

        <br />

        The performance, as shown during NUP, is the first try out of “Fuchsia”
        before its premiere and after finishing the threepart research period.
        The project was initially set off in Estonia in September 2015,
        developed further for the performance in April 2016 in Amsterdam and
        transformed into an online gallery exhibition.<br />

        <br />

        The aim of the project was to investigate how the imperative for
        autopoiesis, which is imposed by the Internet, has influenced Metsalu’s
        life and art production and what are the conditions and possibilities of
        selfsubjectification that happens while designing and mediating one's
        own image via social networks. Throughout the research trilogy Metsalu
        proposed an investigation of modes of exhibiting and producing by taking
        a faux art gallery as a character as the starting point. Within this
        setting she continues to develop topics around her experience as a cam
        girl, relations between IRL and URL, her virtual obsession,
        hyperconsciousness and the influence social media and her life online
        has had on her persona, including the immense loneliness which this self
        exposure has led to. Metsalu`s body seems to aim for its own
        disintegration and reconciliation when mirrored through the beholder's
        gaze by her investing in precarious intensities, oscillating between
        states of pleasure, indifference and suffering. Such is the outcome of
        her obstinate desire to take charge of the design of her on subjectivity
        and her body image in relation to fashion, contemporary design and
        visual culture, as she is interested in the fabrication of her body as a
        character and as a brand displayed in a flickery landscape. Throughout
        the“Fuchsia” project Metsalu questions the arbitrariness of her working
        life through acts of selfdisplay as an object of spectacle something
        that she both embraces and refuses and has an interest in creating an
        almost allinclusive structure, which can accommodate both chaos and its
        refusal through an organising symmetry and iconographic imagery.<br />

        <br />

        <strong>Maria Metsalu</strong> (1990) is an Estonian choreographer and
        performer who finished her studies in SNDO (School for New Dance
        Development) in 2016. She creates mainly solo works with an ongoing
        interest in the production of her own persona, self mythologisation of
        it and her own autopoiesis. Exploring physical and virtual realities,
        bringing them together, understanding the differences of those two in
        terms of interaction, social exchange and transformation are important
        aspects of her&nbsp; research process. She aims to articulate relations
        between visual culture, identity, appropriation, telepresence and
        voyeurism using self referential relationships with corporate
        technologies. She received the DanceWEB scholarship in ImpulsTanz Vienna
        in 2014. Amongst others Maria Metsalu has worked together and performed
        for with Nils Amadeus Lange, Tino Sehgal, Vincent Riebeek, Manuel
        Scheiwiller, Fernando Belfiore and Samira Elagoz.<br />

        <a href="http://instagram.com/dotasita">instagram.com/dotasita </a><br
        />

        <a href="http://mariametsalu.tumblr.com/
        maria.metsalu.com">maria.metsalu.com </a><br />

        <br />

        Choreography: <strong>Maria Metsalu</strong><br />

        Dancers: <strong>Maria Metsalu, Charlie Laban Trier</strong><br />

