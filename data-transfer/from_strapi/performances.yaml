    description_et: >-
        Maria Keinicke Davidsen on üle kümne aasta tegelenud spordihoonete ja
        aktiivse avaliku ruumi arendamisega. Tema fookuseks on luua kvaliteetsed
        rekreatsiooniruume, mis kutsuvad liikuma ja ruumi läbi liikumise kogema.
        Kombineerides valgust, ruumi ja värve, loob ta seninägematuid siseruume
        ning kutsub esile muutusi, mis kasutaja kogemust mõjutavad. Alates
        Kuningliku Taani Akadeemia lõpetamisest arhikektuuriteaduskonnas 2003,
        on ta praktiseerinud arhitekti ja õppejõuna. Ta on juhendanud
        arhitektuuri, protsessi ja meetodeid Kopenhaageni sisearhitektuurikoolis
        ning Kopenhaageni ülikooli interdisiplinaarses linnaplaneeringu
        osakonnas. Maria töötab hetkel Keingartis, mille ta asutas koos Flemming
        Overgaardiga aastal 2007.


        [keingart.com/home/](http://keingart.com/home/)


        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikud, kriitikud ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile.
    description_en: >-
        Maria Keinicke Davidsen has more than 10 years' professional experience
        in developing sports buildings and active public spaces. She focuses on
        creating atmospheric universes that invite movement, in which, motion is
        a naturally integrated and fun experience for the user. With creative
        combinations of effects such as light, shape and colour, she unfolds the
        original interior and creates changes that transform people.

        Since Maria qualified as an architect at The Royal Danish Academy of
        Fine Arts Schools of Architecture, Design and Conservation in 2003, she
        has worked as an architect and teacher. She has taught architecture,
        processes and methods at the Copenhagen School of Interior Design, and
        spent a number of years working at the University of Copenhagen in
        connection with interdisciplinary urban planning, where her services are
        continually used. Maria is currently working at Keingart, an architect
        firm that she founded with Flemming Overgaard in 2007 (initially called
        Keinicke og Overgaard Arkitekter).


        [keingart.com/home/](http://keingart.com/home/)


        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment.
