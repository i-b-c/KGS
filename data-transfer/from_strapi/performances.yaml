    description_et: >-
        Tegemist on seitsmeloolise kogumikuga süvaelektroonilistest
        heliteostest, mis on valitud ajavahemikust 2004-2011. Taavi Tulevi
        vinüülplaadi esitlusel tuleb juttu plaadist ja kuulatakse muusikat.<br
        />

        <br />

        <strong>Taavi Tulev </strong>on elektronhelilooja, loodussalvestaja,
        helikunstnik ja projekteerija. Elektronmuusikuna tegev aastast 2000.
        Varem on ta avaldanud kuus albumit ja kaks loodusheliplaati. Lisaks oma
        nimele esitab ta oma mitmekesist muusikat ka teiste nimede alt:
        Wochtzchée, HAPE ja Laulan Sinule. Ta on tegev mitmes bändis ja
        produtseerinud artiste nagu Meisterjaan ja Barbariz. Aktiivse
        elektroonilise muusika eestvedajana on ta korraldanud alates 2002.
        aastast mitmeid pidudesarju ja paari festivali (nt. Vilsandi Trance).
        Olles tegev nii heli kui ka projekteerimise vallas, kohtab siin-seal
        tema tehtud ruumihelikujundusi ja heliinstallatsioone.<br />

        <a href="http://http://taavitulev.com"><br />

        http://taavitulev.com</a><br />

        <a
        href="http://taavitulev.blogspot.com">http://taavitulev.blogspot.com</a><br
        />

        <a
        href="http://taavitulev.bandcamp.com">http://taavitulev.bandcamp.com</a><br
        />

        <a
        href="http://www.soundcloud.com/3he">http://www.soundcloud.com/3he</a><br
        />

        <br />

        Plaadi avaldamist toetas Eesti Autorite Ühing.
    description_en: >-
        It is a collection of seven tracks of deep electronic sound works chosen
        from the period 2004-2011. During the presentation of the vinyl record
        of Taavi Tulev we will listen to the music and talk about the record.<br
        />

        <br />

        <strong>Taavi Tulev</strong> is electron composer, recorder of nature,
        sound artist and design. He has been electron musician since 2000. He
        has released previously six albums and two records of nature sounds.
        Additionally to his name he also creates music under other names:
        Wochtzchée, HAPE and Laulan Sinule. He is also active in several bands
        and has produced artists like Meisterjaan and Barbariz. As an active
        leader of electronical music scene he has organised numerous party
        series and a couple of festivals (eg Vilsandi Trance) since 2002. Being
        active both in the fields of sound and design you can also find space
        and sound designs and sound installations created by him.<br />

        <br />

        <a href="http://taavitulev.com">http://taavitulev.com</a><br />

