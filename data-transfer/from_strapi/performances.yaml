    description_et: >-
        Oma uue uurimusega “The sound of entertainment” seoses tegi
        Šveitsi-Prantsuse päritolu koreograaf Maud Blandel ettepaneku tantsija
        Maya Massele ja 3 Ensemble Contrechamps’i solistile reinterpreteerida,
        transkribeerida ja taasleiutada Mozarti divertismente. Tema lähenemise
        tagamaaks on uurida burleski kui komponeerimis modaalsust, loomaks
        musikaalset keha, mis oleks võimeline tajuloogika pea peale pöörama.   

        Tema residentuur Kanuti Gildi SAALis keskendub uurimisprotsessi
        alustuseks muusikaliste tööriistade viimistlemisele ja tegevusete
        kiirustega mängimisele.  
          
        Maud Blandel (1986) on esmalt õppinud kaasaegset tantsu, seejärel
        lavastamist (MA - La Manufacture, Lausanne) ja kujutavat kunsti (MA -
        HEAD, Geneva). Alates 2015.a. tegeleb ta omanäolise koreograafilise
        uurimusega nimetuse all “The culture of spectacular”, mis põhineb
        erinevatel olemasolevatel praktikatel. Ta on uurinud hüsteeriat
        (“Tuesday lesson’s”), ergutustantsu (“Touch Down”) ja tarantismi
        (“Lignes de conduit”) ning läbi oma tööde välja toonud kuidas
        spektakulariseerimis protsessid on neid praktikaid muutnud. Pühendunud
        koreograafia laiendatud mõistele, on Maud huvitatud kuidas saab kasutada
        teisi vahendeid koreograafilisel komponeerimisel. Paralleelselt oma
        töödega on Maud teinud koostööd lavastaja Karim Bel Kacem’i, koreograaf
        Rachid Ouramdane ja viimati Heiner Goebbelsiga tema assistendina. Maud
        Blandel on alates septembrist 2018 Lausannes tegutseva Arsenic –
        kaasaegse loome keskuse kunstnik residentuuris.  
          
        MORE THAN THIS on koostööprojekt, mis seob omavahel 6 festivali ja
        kultuuriorganisatsiooni ning 5 koostööpartnerit ja 6 kaasatud kunstnikku
        Euroopast ja väljastpoolt. MORE THAN THIS on projekt, mis toob esile
        kaasaegsed etenduskunstid kui vahendi, mille abil on võimalik ümber
        mõtestada komplekssuse väärtust ning vaidlustada üksikute narratiivide
        ja fikseeritud identiteetide kristalliseerumist. Etenduskunstid kui
        sellised on perfektne mõtteruum, milles tegeleda külalislahkuse
        mõistega.  

        https://morethanthis.eu
          
        Residentuur Tallinnas saab teoks projekti MORE THAN THIS raames EL Loov
        Euroopa kultuuriprogrammi ja Eesti Kultuuriministeeriumi toetusel.
    description_en: >-
        For her new research entitled “The sound of entertainment “, the
        French-Swiss choreographer Maud Blandel invited the dancer Maya Masse
        and three soloists of the Ensemble Contrechamps to re-interpret,
        transcribe and reinvent Mozart’s divertimenti. Behind this approach: an
        exploration of burlesque as a modality of composition, and the creation
        of a musical body capable to reverse the logic of perception. 

        To begin this research process, her residency at Kanuti Gildi SAAL will
        focus on the elaboration of musical tools and will explore how to play
        with the speed of an action.  
          
        Maud Blandel (1986) initially trained as a contemporary dancer followed
        her education in studying “direction” (MA - La Manufacture, Lausanne)
        and fine arts (MA - HEAD, Geneva). Since 2015 she develops a
        choreographic research, entitled “The culture of spectacular”, which is
        based on existing practices. Investigating on hysteria (“Tuesday
        lesson’s”), cheerleading (“Touch Down”) and tarantism (“Lignes de
        conduit”), her work reveals how processes of spectacularisation have
        transformed such practices. Occupied with the expanded notion of
        choreography, Maud keeps asking how to use tools of other media as tools
        for choreographic composition. In parallel of her work she had been
        working with the director Karim Bel Kacem, the choreographer Rachid
        Ouramdane and, more recently, with the composer Heiner Goebbels as an
        assistant. Maud Blandel is a resident artist in Arsenic - center of
        contemporary creation in Lausanne since september 2018.  
          
        MORE THAN THIS is a cooperation project among 6 festivals and cultural
        organisations with the collaboration of 5 associated partners and
        engaged 6 artists.

        MORE THAN THIS is a project that focuses on the contemporary performance
        as a fundamental tool to rethink the value of complexity, as a tool to
        challenge the crystallisation of single narratives and fixed identities,
        and a perfect specific space to work on displacement and hospitality.  
          
        Residency in Tallinn takes place within the MORE THAN THIS project that
        is supported by EU Creative Europe program and the Ministry of Culture
        of Estonia.
