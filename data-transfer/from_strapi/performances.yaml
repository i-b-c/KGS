    description_en: "NB! New beginning time of the Improtest concert on 21.02 is at 20:30!\n\n**Hara Alonso** is a multidisciplinary artist devoted to the creation of new music. Coming from classical background she is currently working in the integration of new technologies in music though\_composition, performance, improvisation and multimedia. Her sound universe is a mixture of samples of acoustic instruments, processed sounds.  \n[www.haraalonso.com](http://www.haraalonso.com/)<br />\n[haraalonso.bandcamp.com](https://haraalonso.bandcamp.com/)<br />\n[soundcloud.com/hara-alonso](https://soundcloud.com/hara-alonso/)<br />\n <br />\n\nImprotest is concert series that brings improvisational music from local and foreign authors to local audience. The concerts have been taking place since 2005 once a month.  \n<a href=\"http://improtest.ee\">improtest.ee</a><br />"
