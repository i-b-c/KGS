    description_et: >-
        Madonna teoste iseloomulik teema on mütoloogiline reaalsus. Samas teema
        on kontekstualiseeritud dialekti teooriasse, mis hõlmab ka

        reaalsuse paradoksi. Ma ei viitsi seda teksti lugeda. See on see Sandra
        Z. Kunagi oli ilge äss - tegi, mis tahtis. Vastuvoolu alati.  

        A noh 2017, vaatame kas ta on vahepeal midagi õppinud ka. Äkki ta on
        vanaks jäänud ja on igav. Ja räägib maailmarahust ja looduskaitsest ja
        tahab, et kõik vegan oleks. Või veel hullem, kui tühine mu elu on. Ja
        kui raske tal on. No igavam kui see jama, mis ma eelmine nädal vaatasin
        kindlasti ei saa olla. Päkapikkudega, Pfffff igasugust paska tehakse
        ikka, kuid teema on kontekstualiseeritud Foucaultist võimu suhted, mis
        hõlmavad reaalsust tervikuna. Bataille soovitab kasutada klassikalise
        lugemise ja muutmise narratiivi ala-kultuuriline paradigma.  


        "Keegi on kindlasti hulluks läinud, aga ma ei usu et see olen mina."

        BRIAN SEIBERT, New York Times   


        "Anname tuld!"  

        EKRE<br />

        <br />
    description_en: >-
        In the works of Madonna, a predominant concept is the concept of
        neocultural language. The figure/ground distinction which is a central
        theme of Madonna’s Sex emerges again in Material Girl.  


        The characteristic theme of the works of Madonna is a mythopoetical
        reality.  

        However, the subject is contextualised into a dialectic theory that
        includes reality as a paradox. Pickett[1] suggests that we have to

        choose between the textual paradigm of context and neocapitalist
        objectivism.  


        “Society is part of the futility of art,” says Lyotard; however,
        according to Reicher[8], it is not so much society that is part of

        the futility of art, but rather the meaninglessness, and eventually the
        dialectic, of society. But the subject is contextualised into a
        Foucaultist power relations that includes reality as a whole. Bataille
        suggests the use of the subcultural paradigm of narrative to read and
        modify class.  


        "Someone's gone completely bonkers, I don't think it's me "

        BRIAN SEIBERT, New York Times   


        "Burn the Witches!"

        <br />
