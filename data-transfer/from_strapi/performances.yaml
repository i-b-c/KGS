    description_et: >-
        “me ei ela oma elude kesksetes keeristes, meiega ei juhtu midagi,
        vähemalt vist midagi nii huvitavat, millest teistele rääkida  

        me oleme väiksed inimesed, mõtleme väikselt ja kirjutame väikeste
        tähtedega    

        me oleme tunnistajad, vaatlejad, pealtnägijad, me olime juures kui oli
        elu ja oli surm ja kõik see igapäev seal vahel  

        me oleme kogujad, jäädvustajad,  

        me elame teiste inimeste elusid  

        me räägime teiste inimeste lugusid  

        me tunneme rõõmu nende üle  

        me tunneme nende valu  

        me igatseme neid   

        me vihkame  

        ja me ei kohtu enam kunagi”  
          
        “sest meid on õpetatud madusid kartma” on lavastus inimseisundist,
        inimeseks olemisest ja inimeseks olemisest loobumisest, selles on
        tegelaste (ja nende läbi meiegi) püüdlus millegi kõrgema poole ja
        paratamatu ikaroslik läbipõlemine ja langemine, samas on see
        argipoeetiline, reserveeritud ja suuri teatraalseid tundepuhanguid
        vältiv mõtliskluste ja lugude kompilatsioon, see on paradoksidega
        leppimise meditatsioon.
    description_en: >-
        “we’re not in the spotlight of our lives, nothing ever happens to us, at
        least nothing to write home about  

        me are small people, we think our small thoughts ja write in small
        letters

        we are witnesses, observers, we were there, when life and death happened
        and everything in between  

        we are collectors,  

        we live the lives of other people  

        we tell their stories  

        we celebrate them  

        we feel their pain  

        we miss them  

        we hate  

        and we’ll never meet again”  
          
        “taught to fear snakes” is a performance about the human condition,
        about being human and losing one’s humanity, it is a struggle of the
        characters (and through them our own) toward something greater, it is
        their inevitable fall from grace, it seeks the poetic in everyday life
        and rejects grand old theatrical emotional explosions, its a compilation
        of small ideas and stories, it’s a meditation of the paradox.
