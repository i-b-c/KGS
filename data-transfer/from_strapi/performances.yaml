    description_et: >-
        <!-- Toimetatud 3.10.15 --><strong>22.-25. oktoobril toimub Tallinnas
        esmakordselt uus muusikafestival ÜLE HELI, mis žanrimääratluste asemel
        keskendub tähenduslikkusele ja seostele erinevate
        kunstivaldkondadega.</strong><br />

        <br />

        Kavas: AISHA DEVI (Tiibeti päritolu elektronmuusik Šveitšist esitlemas
        oma albumit "Of Matter And Spirit"), MONDKOPF (Prantsusmaa,
        audiovisuaalne kontsert "Hades"), ALGORÜTMIDE ja HENRI HÜTI ühine
        kontsertetendus, CHRISTIAN SKJøDT (Taani / "Dissolution and Suspension",
        helilooja Carl Nielsen "String Quartet In F-minor (Opus 5)"
        soundart-tõlgendus), SILVER SEPP (maailmade loomise erikava
        fantaasiainstrumentidel), LIZ WIRESTRING (helilooja ja harfimängija Liis
        Viira sooloprojekt võimendatud akustilise harfiga), BLEEDING TRUMPETS
        (Rainer Jancis, Big Flip The Massive (Uus-Meremaa)), DJERRO (Erkki Tero
        ämbientne sooloprojekt / debüütalbumi esitlus), ANDY HUG (unikaalse
        kõlaga progetrio: Madis Kubu, Erik Seim, Martin Lääne), MOTOBOR (Toomas
        Savi), HOLY MOTORS , HASSO KRULL, PEETER LAURITS, KAUPO PALO, oma uusi
        väljaandeid esitlevad EDMUND HÕBE ja TONT, maailmade loomist käsitlev
        „Eikellegimaa“ installatsioon (vokaalinstrumentaaltrio EETER (Anna
        Hints, Marja-Liisa Plats, Ann Reimann), elektronmuusikud MIHKEL TOMBERG
        ja AIVAR TÕNSO, skulptor EIKE EPLIK ja videokunstnik TENCU (Andres
        Tenusaar) ning palju muud.<br />

        <br />

        Esimesel aastal on festivali teema maailmade loomine. Me kõik tegeleme
        igapäevaselt oma maailmade loomisega ja nii kujuneb ka festivali
        programm erinevatest maailmadest ja nendevahelistest seostest.<br />

        <br />

        Neljal päeval leiavad aset sündmused Erinevate Tubade Klubis, Kanuti
        Gildi SAALis, Von Krahli Teatris, Eesti Rahvusringhäälingu maja
        (telemaja) 4. stuudios ja Kultuuriklubis Kelm ning toimub ka koostöö
        Prantsuse kultuurifestivaliga "Accord".<br />

        <br />

        <br />

        Festivali toetavad Eesti Kultuurkapital, Prantsuse Instituut, Taani
        Kultuuri Instituut.
