    description_et: >-
        Ilutööstuse aastakäive on sadu miljardeid eurosid. See kasvab üha. Näib,
        et me ei tunne, et oleksime sündinud piisavalt ilusatena. Miks me ennast
        muudame? Mida või keda me otsime? Vastust teab vaid tolm.  
          
        “Ilusad inimesed” on Tartu Uue Teatri lavastus, mille jaoks
        intervjueeris näidendi autor 2019. aasta kevadtalvel inimesi, kes
        hoolivad oma välimusest ning tunnevad, et ilu on neid mõjutanud ja
        saatnud läbi elu. Need intervjuud saidki sädemeks selle loo sünnil.  
          
        - - - 

        NORMAN: Milline sa välja näed?  

        MIA: Mul on perfektselt sümmeetriline nägu ja mul pole ainsatki kortsu.
        Mul on suured silmad, kõrge kaarega kulmud, kitsas nina ja lopsakad
        huuled. Mul on väga hoolitsetud käed. Ja jalad. Mu nahk on kuldseks
        päevitunud ja mu kehal ei ole karvu. Mu pikad heledad juuksed läigivad
        vitaalselt. Mul on ideaalsed proportsioonid - sihvakad jalad, liivakella
        kujuline keskkoht ja täidlased rinnad. Mu puusad ei ole liiga laiad ega
        liiga kitsad. Mu rasvkude ei ladestu ebaühtlaselt kintsudele või
        tagumikule. Mu tagumik on ideaalselt ümar ja prink. Ma ei näe välja
        päevagi vanem kui kakskümmend kuus. Gravitatsioon ei mõju mulle, ega
        sikuta mu nahka maapinna poole. Ma olen täiuslik naine.  

        NORMAN: Ah soo! Aga ma tahaksin sult küsida, et mis sa arvad, kas see
        võiks sobida… Et see naine, kes mulle meeldima hakkas, on minust palju
        vanem?  

        - - -    
          
        Lavastus on osa Piret Jaaksi loomeuurimusest Eesti muusika- ja
        teatriakadeemia lavakunstikoolis.
    description_en: >-
        The beauty industry has an annual turnover of hundreds of billions of
        euros. It keeps growing. We don't seem to feel we were born beautiful
        enough. Why are we changing ourselves? What or who are we after? Only
        dust holds the answers. Beautiful People is a production by the Tartu
        New Theater. In the early spring of 2019 the author interviewed people
        who care about their appearance and feel that beauty has influenced them
        and has been ever-present in their lives. These interviews have sparked
        the birth of this story.  
          
        The play is a part of Piret Jaaks' artistic research at the Drama School
        of Estonian Academy of Music and Theatre.
