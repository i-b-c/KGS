    description_et: >-
        Vägistamine on füüsilise ja seksuaalse vägivalla akt; anekdoote
        mõistetakse teatud laadi psüühilise segilöömisena, mille käigus kutsub
        huumor esile naudingu vabanemise. Freudi hinnangul võivad anekdoodid
        toimida ühise võiduna sotsiaalse mahasurumise üle, ehkki „otstarbega
        anekdootide puhul esineb risk, et tuleb ette inimesi, kes ei taha neid
        kuulata“. Mis on vägistamisanekdoodi otstarve? Kas soovime kuulata? Ja
        arvestades seda, et kõrv on avaus, mida meil ei ole võimalik sulgeda,
        siis kas on võimalik kunagi huumoriks nõusolekut anda?<br />

        <br />

        <strong>Vanessa Place</strong> oli esimene Whitney biennaali raames
        esinenud luuletaja; sisu kohta pandi üles hoiatus. Tema viimaste
        esinemispaikade hulgas on olnud Moodsa Kunsti Muuseum (New York),
        Nüüdiskunsti Muuseum (Los Angeles), Silencio (Pariis), Linnamuuseum
        (Ljubljana), Andrei Belõi Keskus (Peterburi), Kunstverein (Köln) ja
        Whitechapeli Galerii (London). Place töötab ka kriitiku ja kaitsjana,
        kes esindab kriminaalmenetlustes süüdistatuid.<br />

        <br />

        NB! Avatud ka Kolbeinn Hugi installatsioon "The Future Must Be Destroyed
        Yesterday", sissepääs sama piletiga.
    description_en: >-
        Rape is an act of physical and sexual violence; jokes are understood as
        a kind of psychic disruption, with humor forcing the release of
        pleasure. According to Freud, jokes can function as a shared victory
        over social repression, although “jokes that have a purpose run the risk
        of meeting with people who do not want to listen to them.” What is the
        purpose of a rape joke? Do we want to listen? And given the ear is the
        orifice we cannot close, is it ever possible to consent to humor?<br />

        <br />

        <strong>Vanessa Place</strong> was the first poet to perform as part of
        the Whitney Biennial; a content advisory was posted. Recent performance
        venues include Museum of Modern Art, New York; Museum of Contemporary
        Art, Los Angeles; Silencio, Paris; City Museum, Ljubjana; Andre Bely
        Centre, St. Petersburg, Russia; Kunstverein, Cologne; and Whitechapel
        Gallery, London. Place also works as a critic and criminal defence
        attorney.<br />

        <br />

        PS! Kolbeinn Hugi installation "The Future Must Be Destroyed Yesterday"
        is also open on that night, entrance with same ticket.
