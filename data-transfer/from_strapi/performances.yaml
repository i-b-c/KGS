        **Taavi Kerikmäe** is a pianist and electron musician. His music can be
        described as musique concret that is played live. Taavi is fascinated by
        acoustic objects with their uniqe timbers and acoustic features.<br />

        <br />

        “Sound deals with us and we deal with sound”<br />

        <br /> 


        Improtest is concert series that brings improvisational music from local
        and foreign authors to local audience. The concerts have been taking
