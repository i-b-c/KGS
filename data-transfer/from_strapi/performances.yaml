    description_et: >-
        Jose Sanchez on arhitekt, programmeerija ja mängudisainer, kes tegutseb
        Los Angeleses. Ta on Bloom Games’i partner, mis sai alguse 2012. aasta
        Londoni Olümpiamängude raames loodud BLOOMi projektist. Tema juhitud
        Plethora Project uurib võrgus jagatavate teadmiste tulevikku. Ühtlasi on
        ta Block’hood’i arvutimängu looja. See ühisloomel põhinev
        linnasimulaator nimetati Guardiani poolt 2016. aasta üheks oodatuimaks
        videomänguks. Ta on õpetanud ja loenguid pidanud paljudes tuntud
        institutsioonides üle maailma, nagu Architectural Association Londonis,
        Viini Rakenduskunsti ülikoolis, ETH Zürichis, UCLi Bartletti
        arhitektuurikoolis ja Ecole Nationale Supérieure D'Architecture
        Pariisis. Hetkel on ta õppejõud USC arhitektuurikoolis Los Angeleses.
        Tema uurimisteemaks on “Gamescapes”, mille raames ta uurib arvutimängude
        kaudu loodavaid keskkondi ja spekuleerib intelligentsi augmenteerimise,
        kombinatoorika ja avatud süsteemide kui disainimeediumi üle.  


        Arhitektuuriteaduskond kutsub Tallinnasse loengusarjale esinema maailmas
        tuntud arhitekte, teoreetikuid, kriitikuid ja urbaniste, et tutvustada
        arhitektuuri, disaini, linnaehituse ning kriitilise mõtte värskeid
        vaatenurki. Loengud on mõeldud nii arhitektuurivaldkonna tudengitele ja
        erialaga seotud professionaalidele, kui ka ruumikultuuri huviliste
        laiemale ringile.
    description_en: >-
        Jose Sanchez is an Architect / Programmer / Game Designer based in Los
        Angeles, California. He is partner at Bloom Games, start-up built upon
        the BLOOM project, winner of the WONDER SERIES hosted by the City of
        London for the London 2012 Olympics. He is the director of the Plethora
        Project (www.plethora-project.com), a research and learning project
        investing in the future of online open-source knowledge. He is also the
        creator of Block’hood, a city simulator video game exploring notions of
        crowdsourced urbanism named by the Guardian one of the most anticipated
        games of 2016. He has taught and been a guest lecturer in several
        renowned institutions across the world, including the Architectural
        Association in London, the University of Applied Arts (Angewandte) in
        Vienna, ETH Zurich, The Bartlett School of Architecture, University
        College London, and the Ecole Nationale Supérieure D'Architecture in
        Paris. Today, he is an Assistant Professor at USC School of Architecture
        in Los Angeles. His research “Gamescapes”, explores generative
        interfaces in the form of video games, speculating in modes of
        intelligence augmentation, combinatorics and open systems as a design
        medium.  


        At the Open Lecture Series internationally renowned architects, artists,
        theoreticians, critics and urbanists from all around the globe give
        talks to offer fresh perspectives on architecture, design, urban
        development and critical thought. The lectures are open to everyone
        interested in the future of our living environment.
