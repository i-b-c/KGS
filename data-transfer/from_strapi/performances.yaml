    description_et: >-
        Helilaine levimise kiirus vees on 4,3 korda kiirem kui õhus.  
          
        Jootetina sulamistemperatuur on 183,3 °C.  
          
        Sample rate: 48 000 Hz  
          
        Bits per sample: 24   
          
        2,500 luumenit ere valgusallikas. Kolm miniatuurset LCD ekraani
        mõõtudega 1280 x 800 pikslit.  
          
        Delfiin kuuleb sagedusi vahemikus 20 Hz kuni 150 kHz.  
          
        35 vatine valgusallikas.  
          
        Residency fueled by 500 mg kofeiini päevas.  
          
        Kunstikollektiiv Nerd Studio sai alguse aastal 2017 Jari Matsi ja Judith
        Partsi koostööst ja soovist tehnoloogilisi vahendeid kasutades luua
        uusi kogemusi ja elamusi. Nerd Studio kasutab tehnoloogiat võimalikult
        mänguliselt, et näha selle esialgsest funktsioonist kaugemale. Nerd
        Studio on esitlenud oma töid erinevatel festivalidel (Arvamusfestival
        2017, Itaalia - Pomezia Light Festival 2018, Šveits - Licht Festival
        Luzern 2019).   
          
        Jari Matsi on valgus- ja multimeediakunstnik, kes on osalenud erinevates
        teatriprojektides valguskujundajana. Samuti loonud valgusinstallatsioone
        ning osalenud näituste loomisel. 
          
        Judith Parts on muusik, helikujundaja, produtsent ja helitehnik, kes on
        tegelenud heliloomega nii tantsu-, teatri- kui ka video kontekstis.  
          
        https://www.instagram.com/nerdstudio_collective/  


        Kanuti Gildi SAALi residentuuri toetab Eesti Kultuurkapital.
    description_en: >-
        The melting point of solder connecting electronic components is 183,3
        °C.  
          
        Sound travels at 1,480  m/s in water which is 4.3 times as fast as in
        air.  
          
        Sample rate: 48 000 Hz  
          
        Bits per sample: 24  
          
        Light source brightness: 2,500 lumens. 3 miniature LCD screens with a
        resolution of 1280 x 800 pixels.  
          
        Dolphins hearing range is from 20 Hz to 150 kHz.  
          
        35 watt light source.  
          
        Residency fueled by 500 mg caffeine per day.    
          
        Nerd Studio is an art collective created by Jari Matsi and Judith Parts
        in 2017. The aim of the collective is to use technology in a playful way
        creating new experiences. Nerd Studio has exhibited its works in
        different festivals (Estonia – Arvamusfestival 2017, Pomezia Light
        Festival 2018, Licht Festival Luzern 2019).   
          
        Jari Matsi is a light and multimedia artist who has been involved in
        different theater productions as a lighting designer and a technician.
        He has also created multimedia installations and participated in
        exhibitions.   

        Judith Parts is a musician, sound designer and a sound engineer who has
        created music and sound design for different theater, dance and video
        productions.  
          
        https://www.instagram.com/nerdstudio_collective/  


        Residency is supported by Cultural Ministry of Estonia.
