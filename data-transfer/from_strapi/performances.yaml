    description_et: >-
        “Trieb” on etendus ja uurimustöö, mis vaatleb metafoorilisi väljendeid
        läbi liikumise, keele ja kujutise. Tõlgituna saksa keelest tähendab
        “Trieb” edasiviivat jõudu, indu, instinkti ehk kvaliteete elus, mis
        lääne arusaamas inimeseks olemisest asetsevad skaala teisel serval.
        “Trieb’ist” üleolek eeldab mõistuspäraseks olendiks ehk Anthroposeks
        saamist, tõusmaks kõrgemale sellest, mida peetakse tähtsusetuks.<br />

        See lavastus tegeleb võimaluste ruumiga ruumi potentsiga, milles
        põhjendamatu on eraldatud mõistuspärasest. Liza seab küsimuse alla
        millised kattuvad seosed ja uued väljendusviisid on võimalikud
        poeetilisel/lingvistilisel tasandil selleks, et pista rinda logose
        vägivaldset mõjuga.<br />

        Fantaasia saab alguse naeratusest, mille puhul on “silmad kui noaterad”
        ning ulatub aladeni, mis sellelt pinnalt avanevad.<br /> 

        Noa teravad ja külmad servad vormivad kujuteldavat, ihaldatavat ja
        vastuvõetavat. Silmad on tunnetuse tööriistad, mis samas ka eristavad ja
        annavad hinnanguid. Nägemise ja teadmise, teadmiste ja paljastamise,
        lõikamise ja dekonstrueerimise kontseptuaalsete seostega tegeletakse
        läbi erinevate meediumite – kõne, kujutise ja DIY animatsiooni.<br /> 

        “Trieb’s” kohtleb Liza keha kui vaadeldavat objekti ja vaadet sellele
        kui mõistuspärasuse vahendit. See lavastus flirdib vormide ja
        omadustega, mille sihiks on destabiliseerida nägemisvõimet kui otsest
        klassifitseerimisvahendit. Inspireerituna grotesksest ikonograafiast
        kasutab Liza liikumisloogikat, mis võimaldab avastada uusi
        artikulatsioone ja seoseid. Mis vastukaaluks omakorda loovad kohmakaid,
        kuid samas täpseid kujundeid, mis kategoriseerivad “võõrana”.  


        **Liza Baliasnaja** töötab tantsuga, õpib filosoofiat Brüsselis ning
        teeb koostööd järgmiste kunstnikega - Eszter Salamon, Ula Sickle, Eglė
        Budvitytė, Mårten Spångberg ja DD Dorvillier. Liza on tegus nii
        erinevates koostöö formaatides kui omal käel. Hetkel tegeleb ta oma
        soolo “Trieb” ettevalmistamisega.
    description_en: >-
        “Trieb” is a performance and a research situation which explores
        metaphoric expressions through movement, language and image. Translated
        form German, “Trieb” stands for impulsion, drive, instinct- qualities of
        life located on the opposite end of the Western conception of human
        being. To raise above “trieb” implies becoming a reasonable being, an
        Anthropos, ascending beyond that which he himself produced as
        marginal.<br /> 

        The work deals with the potent space where unreasonable is dissociated
        from the reasonable. I question what overlapping relations and new
        expressions are possible on a poetic/ linguistic level in order to
        tackle the violent effect of logos. The fantasy unfolds from the simile
        ‘eyes like knives’ and reaches to the territories which open up from
        it.<br /> 

        Sharp and cold edges of the knife shape the imaginable, the desirable
        and the acceptable. Eyes are tools of cognition, but also of
        differentiation and judgement. The conceptual links between seeing and
        knowing/ knowing and uncovering/ cutting and deconstructing are dealt
        with through various mediums- spoken word, image and something like a
        DIY animation.<br /> 

        In “Trieb”, Liza treats body as an object of sight and sight as an
        object of reason. The work flirts with shapes and qualities that intend
        to destabilize the vision as a tool of direct classification. Taking
        inspiration from the grotesque iconography, Liza uses an invented logic
        of movement which allows for new articulations and relations to be
        explored, in turn producing awkward, yet precise imagery which falls
        under the category of ‘other’.  


        **Liza Baliasnaja** works with dance, studies philosophy in Brussels and
        works with artists such as Eszter Salamon, Ula Sickle, Eglė Budvitytė,
        Mårten Spångberg and DD Dorvillier. Liza makes work both in
        collaborative context and on her own. She is currently working on a solo
        called “Trieb”.
