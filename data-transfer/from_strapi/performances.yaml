    description_et: >-
        Sürreaalne mäng musta ja valge etturiga. Inspireeritud
        kontrollimatu-test kordustest. Re-bränditud maailma sündides on etturid
        sunnitud vahet tegema vaimu ja mateeria vahel, ehitades hall-alas
        instrumenti, mis juhiks nende iga otsust, viies lähemale meisterlikult
        kontrollitud mängule. Komistades aga kollase elemendi otsa on etturid
        värvilise valiku ees - kas vaid kõhutunde põhjal astuda vastuollu loodud
        instrumentaalse meistriga, või olla kuulekad sotsiaalsed mutrid? Kas
        muuta midagi kuubi siseselt või astuda sellest näiliselt välja,
        alateadlikult vaeveldes veel mõjuala mõjutustes e. kontrollimatutes
        mustrites?  
          
        Irmeli Terras ja Heleliis Hõim on Eesti Kunstiakadeemia kaasaegse kunsti
        magistriprogrammi õpilased. Irmeli tegeleb peamiselt uusmeedia ning
        Heleliis maali meediumiga.
    description_en: >-
        A surrealistic game between black and white pawns. Inspired by non
        controllable patterns. Born into a re-branded world, the pawns are
        forced to differentiate between spirit and matter while building an
        instrument in the gray area, that will guide their every decision,
        bringing them closer to a masterfully controlled game.   

        When coming a cross with a yellow element, pawns are ahead of the
        colorful choice - just to clash with the created instrumental master, or
        to be obedient social nuts?

        Either change something inside the cube or seemingly step out of it,
        subconsciously still influenced by the gray sphere of uncontrolled
        patterns?  
          
        Irmeli Terras and Heleliis Hõim are contemporary art MA students of
        Estonian Arts Academy, Irmeli has her main focus on new media and
        Heleliis on painting.
