    description_et: >-
        Trio esitleb oma Eesti minituuri käigus uut CD-d “BEEK!”, mis salvestati
        2018. aastal Taanis.  
          
        Improtest on kontserdisari, mis toob kuulajateni improvisatsioonilise
        muusika nähtusi meilt ja mujalt. Sarja kontserdid toimuvad alates 2005.
        aastast kord kuus.  
           
        Roomet Jakapi (vokaal) on Tartu Ülikooli filosoofia ajaloo vanemteadur
        ja vokalist, kes tegutseb peamiselt vabaimprovisatsiooni, jazz-rocki,
        progerocki eksperimentaalmuusikaga. 

        On teinud koostööd muusikute ja kollektiividega nagu Mart Soo, Taavi
        Kerikmäe, Fred Frith, Laura Remmel, Ivi Raus, Theodore Parker, Louise
        Dam Eckardt Jensen, Lippajad, Phlox, Luarvik Luarvik, Kreatiivmootor ja
        EDASI.  Roomet on Kreatiivmootori koosseisus esinenud festivalidel
        Austrias, Saksamaal, Islandil, Suurbritannias, Venemaal. Osalenud 6
        albumi salvestamisel.  
          
        Niels Praestholm (kontrabass) on helilooja, improviseerija, pedagoog ja
        kontserdikorraldaja Taani jazzimaastikul. Ta on tuuritanud mööda
        Skandinaaviat, Euroopat, USA-d ja Kariibi mere piirkonda oma
        projektidega Embla,The Gyroscope String trio ja Art Ensemble South. 

        Koostööd: Kenny Drew, Horace Parlan, Clark Terry, John Tchicai, Ernie
        Wilkins ja Lee Konitz. Hetkel on ta Sondeborgi Muusikaakadeemia
        Jazziosakonna juht ja nõutud pedagoog.  
           
        Mart Soo on kitarrist, pedagoog, improviseerija ja helilooja, kes
        tegutseb peamiselt improvisatsioonilise muusika, jazzi, minimalismi ja
        maailmamuusika žanrites.

        Teinud koostööd näiteks kollektiividega Tunnetusüksus, Weekend Guitar
        Trio, Samm Bennett, Lisa Karrer & David Simons, Vladimir Tarasov Baltic
        Art Orchestra, Ensemble Uncontrolled jpt.
    description_en: >-
        On the little tour of Estonia the trio is presenting its new album “BEEK
        !” that was recorded in Denamrk in 2018.   
             
        Improtest is a concert series that brings improvisational music from
        local and foreign authors to local audience. The concerts have been
        taking place since 2005 once a month.
