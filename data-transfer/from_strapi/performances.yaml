    description_et: >-
        Ligament on side, sidekoeline kõõlusetaoline väät, mis ühendab luid
        üksteisega.<br />

        <br />

        Me oleme sotsiaalselt omavahel seotud nagu luud ligamentide abil, mille
        kaudu üksteise vabadust juhime. Lavastus esitab küsimuse meie kõigi
        juhitud vabaduse kohta.<br />

        <br />

        <a
        href="http://entsyklopeedia.ee/artikkel/ligament">http://entsyklopeedia.ee/artikkel/ligament</a><br
        />

        <br />

        <strong>Karolin Poska</strong> on vabakutseline tantsukunstnik, kes
        möödunud aastal lõpetas TÜ Viljandi Kultuuriakadeemia tantsukunsti
        eriala. Ta on täiendanud ennast Indoneesias, tantsinud Palestiina Orient
        &amp; Dance Theatre kompaniis ning osalenud muudes projektides. Karolin
        on oma etendustes&nbsp; eksperimenteerinud live-elektroonilise muusika
        ja tantsu piiridega, lavastus Ligament on nende katsetuste jätk.<br />

        <br />
    description_en: >-
        Ligament is a connective tissue like tendon that connect bones to each
        other . <br />

        <br />

        We are socially interrelated as bones are through ligaments, through we
        lead each other's freedom. The performance presents the question for all
        of us about our freedom.<br />

        <br />

        <strong>Karolin Poska</strong> is a freelance dance artist, who
        graduated from University of Tartu Viljandi Culture Academy dance art
        faculty. In her performances she has explored connections between&nbsp;
        live-electronic music and dance, her performance Ligament is a result of
        that.<br />

        <br />
